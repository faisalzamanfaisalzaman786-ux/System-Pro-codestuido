dependencies {
    // Kotlin Standard Library (Required for modern apps)
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"

    // MultiDex Support (بڑی ایپس کے لیے ضروری ہے تاکہ میتھڈ لیمٹ کا مسئلہ نہ آئے)
    implementation "androidx.multidex:multidex:2.0.1"

    // AndroidX & UI Components
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "androidx.core:core-ktx:1.12.0"
    implementation "com.google.android.material:material:1.11.0"
    implementation "androidx.constraintlayout:constraintlayout:2.1.4"

    // Android 12+ Permission Handling & Background Services
    implementation "androidx.work:work-runtime-ktx:2.9.0"
    implementation "androidx.concurrent:concurrent-futures-ktx:1.1.0"

    // Firebase (اگر آپ استعمال کر رہے ہیں)
    // نوٹ: اگر فائر بیس استعمال کرنا ہو تو بلڈ گریڈل میں گوگل سروسز پلگ ان لازمی لگائیں
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-analytics-ktx'
    implementation 'com.google.firebase:firebase-messaging-ktx' // For Notifications

    // Camera & Multimedia (General Purpose Apps کے لیے)
    def camerax_version = "1.3.1"
    implementation "androidx.camera:camera-core:${camerax_version}"
    implementation "androidx.camera:camera-camera2:${camerax_version}"
    implementation "androidx.camera:camera-lifecycle:${camerax_version}"
    implementation "androidx.camera:camera-view:${camerax_version}"

    // Networking & JSON (Retrofit/Dio support)
    implementation "com.squareup.retrofit2:retrofit:2.9.0"
    implementation "com.squareup.retrofit2:converter-gson:2.9.0"
    implementation "com.squareup.okhttp3:logging-interceptor:4.12.0"

    // Image Loading
    implementation "com.github.bumptech.glide:glide:4.16.0"
    annotationProcessor "com.github.bumptech.glide:compiler:4.16.0"

    // Local Database (Room/SQLite)
    def room_version = "2.6.1"
    implementation "androidx.room:room-runtime:$room_version"
    implementation "androidx.room:room-ktx:$room_version"
    annotationProcessor "androidx.room:room-compiler:$room_version"

    // Flutter Dependencies (Do not remove)
    implementation "androidx.lifecycle:lifecycle-common-java8:2.7.0"
    implementation "androidx.window:window:1.2.0"
    implementation "androidx.window:window-java:1.2.0"

    // Testing
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
