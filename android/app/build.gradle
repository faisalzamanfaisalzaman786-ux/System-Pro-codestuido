apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace "com.system.pro" 
    compileSdk 35 // اینڈرائیڈ 35 ہونا ضروری ہے

    defaultConfig {
        applicationId "com.system.pro"
        minSdk 24
        targetSdk 35 
        versionCode 1
        versionName "1.0.0"

        multiDexEnabled true
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    implementation "androidx.multidex:multidex:2.0.1"
    implementation "androidx.appcompat:appcompat:1.6.1"
    
    // تمام ضروری ڈیپینڈنسیز یہاں آئیں گی...
}

// 1. FFmpeg کے خراب لنک کو بائی پاس کرنے کے لیے
configurations.all {
    resolutionStrategy.eachDependency { details ->
        if (details.requested.group == 'com.arthenica' && details.requested.name.contains('ffmpeg-kit')) {
            details.useVersion "6.0"
        }
    }
}

// 2. تمام پلگ انز کو زبردستی SDK 35 پر شفٹ کرنے کے لیے
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                compileSdk 35
                defaultConfig {
                    targetSdk 35
                }
            }
        }
    }
}
