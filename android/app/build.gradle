apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'com.google.gms.google-services'

android {
    namespace "com.system.pro" 
    compileSdk 35 // زبردستی 35

    defaultConfig {
        applicationId "com.system.pro"
        minSdk 24
        targetSdk 35 
        versionCode 1
        versionName "1.0.0"
        multiDexEnabled true
        
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    implementation "androidx.multidex:multidex:2.0.1"
    
    // آپ کی تمام دیگر ڈیپنڈنسیز یہاں موجود ہونی چاہئیں (Firebase, CameraX وغیرہ)
    // جو میں نے پچھلی فائل میں دی تھیں
}

// یہ جادوئی حصہ ہے جو بلڈ کو پاس کروائے گا
configurations.all {
    resolutionStrategy {
        // یہ لائن گریڈل کو کہتی ہے کہ '6.0-2' کو بھول جاؤ اور '6.0' اٹھاؤ
        force 'com.arthenica:ffmpeg-kit-full-gpl:6.0'
        
        eachDependency { details ->
            if (details.requested.group == 'com.arthenica') {
                details.useVersion "6.0"
            }
        }
    }
}

// تمام پلگ انز کو SDK 35 پر مجبور کرنا
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                compileSdk 35
                defaultConfig {
                    targetSdk 35
                }
            }
        }
    }
}
