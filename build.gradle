plugins {
    id 'com.android.application'
}

android {
    namespace "com.systempro.faisal" // یہ ڈیفالٹ رکھیں، YAML اسے خود بدلے گا
    compileSdk 34

    defaultConfig {
        applicationId "com.systempro.faisal"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}
