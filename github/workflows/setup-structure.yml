name: System Pro Dispatch Fixer
on:
  workflow_dispatch: # یہ بٹن کو ایکٹیویٹ کرے گا
  push:
    branches: [ main, apk-build-input ] # کسی بھی پش پر چلے گا

jobs:
  fix-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Missing Fiscal Folders
        run: |
          # وہ تمام فولڈرز بنانا جو تصویر میں تجویز کیے گئے ہیں
          mkdir -p .github/workflows
          mkdir -p backend
          mkdir -p public
          mkdir -p uploads
          mkdir -p www
          touch www/.gitkeep # خالی فولڈر کو محفوظ رکھنے کے لیے

      - name: Verify Root Files
        run: |
          # چیک کرنا کہ کیا config.xml روٹ پر آ سکتی ہے
          ls -R

      - name: Finalize Structure
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "System-Pro-Bot"
          git add .
          git commit -m "Fix: Folders created to enable dispatch" || echo "No changes"
          git push origin main
