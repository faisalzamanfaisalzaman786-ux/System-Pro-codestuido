<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Color Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #121212;
            color: #fff;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .calculator {
            background: #1e1e1e;
            border-radius: 32px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #FFBB86FC;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            border: none;
            border-radius: 24px;
            background: #2C2C2C;
            color: white;
            outline: none;
            text-align: center;
        }
        input::placeholder {
            color: #AAAAAA;
        }
        .button-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .button-row button {
            flex: 1;
            padding: 16px 0;
            font-size: 28px;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .button-row button:active {
            transform: scale(0.96);
        }
        .btn-add { background: #4CAF50; }
        .btn-sub { background: #F44336; }
        .btn-mul { background: #FF9800; }
        .btn-div { background: #2196F3; }
        .btn-clear {
            width: 100%;
            background: #9C27B0;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .result {
            background: #2C2C2C;
            padding: 16px;
            border-radius: 24px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #FFBB86FC;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="title">🎨 Color Calculator</div>
        <div class="input-group">
            <input type="number" id="first" placeholder="First number">
        </div>
        <div class="input-group">
            <input type="number" id="second" placeholder="Second number">
        </div>
        <div class="button-row">
            <button class="btn-add" onclick="calculate('+')">+</button>
            <button class="btn-sub" onclick="calculate('-')">-</button>
            <button class="btn-mul" onclick="calculate('*')">×</button>
            <button class="btn-div" onclick="calculate('/')">÷</button>
        </div>
        <button class="btn-clear" onclick="clearAll()">CLEAR</button>
        <div class="result" id="result">Result: </div>
    </div>
    <script>
        function calculate(op) {
            const a = parseFloat(document.getElementById('first').value);
            const b = parseFloat(document.getElementById('second').value);
            if (isNaN(a) || isNaN(b)) {
                document.getElementById('result').innerText = "Result: Enter both numbers";
                return;
            }
            let r;
            switch(op) {
                case '+': r = a + b; break;
                case '-': r = a - b; break;
                case '*': r = a * b; break;
                case '/': 
                    if (b === 0) {
                        document.getElementById('result').innerText = "Result: Cannot divide by zero";
                        return;
                    }
                    r = a / b;
                    break;
                default: return;
            }
            document.getElementById('result').innerText = "Result: " + r;
        }
        function clearAll() {
            document.getElementById('first').value = '';
            document.getElementById('second').value = '';
            document.getElementById('result').innerText = "Result: ";
        }
    </script>
</body>
</html>
