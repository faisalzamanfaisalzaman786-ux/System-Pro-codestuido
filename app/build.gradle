android {
    ...
    defaultConfig {
        applicationId "com.faisal.systempro" // یہ آپ کا مین پیکج نیم ہے
        ...
    }

    // یہ حصہ شامل کریں
    flavorDimensions "version"
    productFlavors {
        app1 {
            dimension "version"
            applicationIdSuffix ".one"
            resValue "string", "app_name", "System Pro 1"
        }
        app2 {
            dimension "version"
            applicationIdSuffix ".two"
            resValue "string", "app_name", "System Pro 2"
        }
        app3 {
            dimension "version"
            applicationIdSuffix ".three"
            resValue "string", "app_name", "System Pro 3"
        }
    }
}
