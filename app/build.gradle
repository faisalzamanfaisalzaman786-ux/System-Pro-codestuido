plugins {
    id 'com.android.application'
}

android {
    // اگر آپ کی ایپ سے پیکیج نیم آئے گا تو وہ لگے گا، ورنہ ڈیفالٹ والا
    namespace project.hasProperty('targetPackage') ? project.property('targetPackage') : "com.systempro.default"
    compileSdk 34

    defaultConfig {
        applicationId project.hasProperty('targetPackage') ? project.property('targetPackage') : "com.systempro.default"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
