apply plugin: 'com.android.application'

// یہ لائن خود بخود موجودہ وقت (سیکنڈز تک) نکال لے گی
def timestamp = new Date().format("MMddHHmm") 

android {
    namespace 'com.systempro.appyz48c4s'
    compileSdk 34

    defaultConfig {
        // پیکیج نیم خود بخود بدلے گا، جیسے: com.systempro.app03191945
        applicationId "com.systempro.faisal.app${timestamp}"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
        
        // ایپ کا نام بھی وقت کے ساتھ بدلے گا تاکہ آپ کو پہچان رہے
        resValue "string", "app_name", "System Pro ${timestamp}"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
