plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android' // اگر Kotlin استعمال کر رہے ہیں
    id 'kotlin-kapt' // اگر Room یا Dagger استعمال کریں
}

android {
    compileSdk 34

    defaultConfig {
        applicationId "com.yourpackage.name"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        // ملٹی ڈیکس سپورٹ
        multiDexEnabled true
        
        // بلڈ کنفیگریشنز (مثلاً بیس یو آر ایل)
        buildConfigField "String", "BASE_URL", "\"https://api.example.com/\""
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.debug // سائننگ بعد میں سیٹ کریں
        }
        debug {
            minifyEnabled false
            debuggable true
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    kotlinOptions {
        jvmTarget = '17'
    }
    
    buildFeatures {
        viewBinding true
        dataBinding true
        buildConfig true
    }
    
    // اگر ایک سے زیادہ فلاور (productFlavors) چاہیں تو یہاں شامل کریں
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.lifecycle:lifecycle-livedata-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
    implementation 'androidx.navigation:navigation-fragment-ktx:2.7.7'
    implementation 'androidx.navigation:navigation-ui-ktx:2.7.7'
    
    // ملٹی ڈیکس
    implementation 'androidx.multidex:multidex:2.0.1'
    
    // کیمرہ ایکس (CameraX)
    def camerax_version = "1.3.4"
    implementation "androidx.camera:camera-core:${camerax_version}"
    implementation "androidx.camera:camera-camera2:${camerax_version}"
    implementation "androidx.camera:camera-lifecycle:${camerax_version}"
    implementation "androidx.camera:camera-view:${camerax_version}"
    
    // امیج لوڈنگ
    implementation 'com.github.bumptech.glide:glide:4.16.0'
    kapt 'com.github.bumptech.glide:compiler:4.16.0'
    
    // نیٹ ورک (Retrofit + OkHttp)
    implementation 'com.squareup.retrofit2:retrofit:2.9.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.9.0'
    implementation 'com.squareup.okhttp3:logging-interceptor:4.12.0'
    
    // لوکل ڈیٹا بیس (Room)
    def room_version = "2.6.1"
    implementation "androidx.room:room-runtime:$room_version"
    kapt "androidx.room:room-compiler:$room_version"
    implementation "androidx.room:room-ktx:$room_version"
    
    // ورک مینیجر (بیگ گراؤنڈ ٹاسکس)
    implementation 'androidx.work:work-runtime-ktx:2.9.0'
    
    // پرمیشن ہینڈلنگ (EasyPermissions)
    implementation 'pub.devrel:easypermissions:3.0.0'
    
    // لوکل نوٹیفکیشنز
    implementation 'androidx.core:core:1.12.0'
    
    // ٹیسٹنگ
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
