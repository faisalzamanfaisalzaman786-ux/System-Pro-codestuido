plugins {
    id 'com.android.application'
}

android {
    namespace 'com.systempro.nativeapp'
    compileSdk 34

    defaultConfig {
        applicationId "com.systempro.nativeapp"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    
    // یہ لائن نئے گریڈل ورژن کے لیے ضروری ہے
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // صرف بنیادی اینڈرائیڈ لائبریری
    implementation 'androidx.appcompat:appcompat:1.6.1'
}