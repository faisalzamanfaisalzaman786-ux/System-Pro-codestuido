apply plugin: 'com.android.application'

def timestamp = new Date().format("MMddHHmm") 

android {
    namespace 'com.systempro.appyz48c4s'
    compileSdk 34

    defaultConfig {
        applicationId "com.systempro.faisal.app${timestamp}"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
        
        resValue "string", "app_name", "System Pro ${timestamp}"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    // یہ لائبریریز ہونا لازمی ہیں تاکہ تھیم مل سکے
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
}
