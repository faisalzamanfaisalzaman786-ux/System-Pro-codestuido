plugins {
    id 'com.android.application'
}

android {
    namespace 'com.systempro.faisal'
    compileSdk 34

    defaultConfig {
        applicationId "com.systempro.faisal"
        // Redmi Note 14 اور پرانے فونز دونوں کے لیے بہترین سیٹنگ
        minSdk 21
        targetSdk 34
        versionCode 2
        versionName "1.1"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    signingConfigs {
        debug {
            // یہ لائنز پرانے اور نئے فونز پر انسٹالیشن یقینی بناتی ہیں
            v1SigningEnabled true
            v2SigningEnabled true
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    // اگر آپ Firebase استعمال کر رہے ہیں تو اس کی لائنز یہاں آئیں گی
}
