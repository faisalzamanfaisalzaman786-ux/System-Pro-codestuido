apply plugin: 'com.android.application'

android {
    namespace 'com.systempro.appyz48c4s'
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    // یہ وہ جادوئی حصہ ہے جو ملٹیپل ایپس بنائے گا
    flavorDimensions "version"
    productFlavors {
        app1 {
            dimension "version"
            applicationId "com.systempro.app1"
            resValue "string", "app_name", "System Pro One"
        }
        app2 {
            dimension "version"
            applicationId "com.systempro.app2"
            resValue "string", "app_name", "System Pro Two"
        }
        app3 {
            dimension "version"
            applicationId "com.systempro.app3"
            resValue "string", "app_name", "System Pro Three"
        }
        // آپ یہاں app20 تک اسی طرح لائنیں بڑھا سکتے ہیں
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
