android {
    // ... باقی کوڈ
    buildTypes {
        release {
            minifyEnabled true      // فالتو کوڈ ہٹاتا ہے
            shrinkResources true    // غیر استعمال شدہ تصاویر نکالتا ہے
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
