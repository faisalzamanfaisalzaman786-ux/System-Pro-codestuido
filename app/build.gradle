plugins {
    id 'com.android.application'
}

android {
    // یہ مینیفیسٹ کے پیکیج نیم سے میچ کرتا ہے
    namespace "com.systempro.counter" 
    compileSdk 34

    defaultConfig {
        // یہ بنیادی آئی ڈی ہے، لیکن فلیورز اسے اوور رائڈ کریں گے
        applicationId "com.systempro.counter"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    // ملٹیپل ایپس بنانے کے لیے فلیورز کی سیٹنگ
    flavorDimensions "version"
    productFlavors {
        // پہلی ایپلی کیشن (مثلاً بیسک ورژن)
        appOne {
            dimension "version"
            applicationId "com.systempro.counter.one"
            versionNameSuffix "-v1"
        }
        
        // دوسری ایپلی کیشن (مثلاً پرو ورژن)
        appTwo {
            dimension "version"
            applicationId "com.systempro.counter.two"
            versionNameSuffix "-v2"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
