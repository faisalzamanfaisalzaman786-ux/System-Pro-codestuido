<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>System Pro • کیلکولیٹر پری ویو</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; }
        body { background: #0c111b; color: #eef3fc; padding: 8px 10px; min-height: 100vh; display: flex; flex-direction: column; gap: 10px; }
        .card { background: #1e2636; border-radius: 24px; padding: 14px 16px; box-shadow: 0 6px 14px #00000055; border: 1px solid #3f4b66; }
        .header-row { display: flex; gap: 10px; justify-content: space-between; align-items: center; }
        .header-btn { flex: 1; background: #2f3b54; border: 1px solid #5e7a9c; border-radius: 40px; padding: 12px 8px; font-size: 0.85rem; font-weight: 600; color: #ffffff; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px; box-shadow: 0 2px 6px #00000066; cursor: pointer; transition: 0.1s; }
        .header-btn:active { background: #3f5170; transform: scale(0.97); }
        .make-apk { background: #4f3b7c; border-color: #b38cff; }
        .connection-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1e2a3a;
            border-radius: 40px;
            padding: 6px 14px;
            border: 1px solid #4a607a;
        }
        .led {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #6b6b6b;
            box-shadow: 0 0 8px currentColor;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .led.green { background: #2ecc71; box-shadow: 0 0 12px #2ecc71; }
        .led.yellow { background: #f1c40f; box-shadow: 0 0 12px #f1c40f; }
        .led.red { background: #e74c3c; box-shadow: 0 0 12px #e74c3c; }
        .led.gray { background: #7f8c8d; box-shadow: none; }
        .status-text { font-size: 0.75rem; color: #b0c9e0; }
        .tabs-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin: 4px 0 2px; }
        .tab { background: #1f2a3f; border: 1px solid #40597a; border-radius: 30px; padding: 10px 2px; font-size: 0.75rem; font-weight: 600; text-align: center; color: #bdd3ff; cursor: pointer; transition: 0.1s; white-space: nowrap; }
        .tab.active { background: #2c405f; border-color: #ffb86b; color: #ffeda6; box-shadow: 0 0 10px #ffae42; }
        .tab:active { background: #324e72; }
        .editor-card { background: #101826; border-radius: 32px; padding: 16px; border: 2px solid #3b5170; box-shadow: inset 0 0 20px #00000088; min-height: 160px; display: flex; flex-direction: column; position: relative; }
        .editor { display: none; width: 100%; height: 100%; background: transparent; color: #e0efff; font-family: 'Consolas', monospace; font-size: 0.85rem; border: none; outline: none; resize: none; line-height: 1.5; }
        .editor.active { display: block; }
        .preview-btn { position: absolute; bottom: 10px; right: 10px; background: #3a2e4f; border: 1px solid #b38cff; border-radius: 30px; padding: 6px 12px; font-size: 0.75rem; color: white; cursor: pointer; display: flex; align-items: center; gap: 4px; z-index: 10; }
        .preview-btn:hover { background: #4f3b7c; }
        .image-panel { display: flex; flex-direction: column; gap: 18px; }
        .image-panel h4 { font-size: 1rem; color: #ffcf8b; margin-bottom: 5px; }
        .icon-selector { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .preview-box { width: 70px; height: 70px; background: #1e2f47; border-radius: 24px; display: flex; align-items: center; justify-content: center; border: 2px solid #5e8bbf; font-size: 2.2rem; }
        .preset-icons { display: flex; gap: 12px; flex-wrap: wrap; }
        .preset-icon { width: 48px; height: 48px; background: #263c58; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; border: 1px solid #6f96cf; cursor: pointer; }
        .preset-icon:active { background: #3e5e88; }
        .file-upload { margin-top: 10px; }
        .file-label { background: #1f3a5a; padding: 10px 20px; border-radius: 40px; font-size: 0.85rem; display: inline-block; border: 1px solid #7fa4d1; cursor: pointer; }
        #iconInput { display: none; }
        .progress-card { background: #1a2335; border-radius: 30px; padding: 16px; border: 1px solid #4d6085; }
        .progress-label { font-size: 0.9rem; font-weight: 600; color: #c5e0ff; margin-bottom: 12px; }
        .bar-container { width: 100%; height: 24px; background: #0f1a28; border-radius: 40px; overflow: hidden; border: 1px solid #3c5270; margin-bottom: 14px; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #72b2ff, #b78aff); border-radius: 40px; transition: width 0.2s; }
        .percent-buttons { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .pbtn { background: #25364f; border: 1px solid #5a74a2; border-radius: 40px; padding: 10px 0; font-size: 0.85rem; font-weight: 600; color: #e8f0ff; text-align: center; flex: 1 0 60px; max-width: 70px; cursor: pointer; }
        .pbtn.zero-special { border-color: #ff7b7b; background: #3f2e4c; }
        .error-card { background: #1b1f32; border-radius: 28px; padding: 16px; border: 2px solid #ff6f6f; }
        .error-header { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; font-weight: 600; color: #ffa8a8; margin-bottom: 10px; }
        .error-header span { background: #471f1f; padding: 4px 16px; border-radius: 40px; font-size: 0.7rem; border: 1px solid #ff7b7b; }
        .error-box { background: #0e1120; border: none; border-radius: 24px; padding: 18px; color: #ffcaca; font-family: 'Consolas', monospace; font-size: 0.85rem; width: 100%; min-height: 250px; resize: vertical; outline: none; box-shadow: inset 0 4px 10px #000000; border: 1px solid #a54f4f; overflow-y: auto; white-space: pre-wrap; word-wrap: break-word; }
        .github-bar { display: flex; gap: 8px; flex-wrap: wrap; margin: 5px 0; }
        .github-btn { background: #1e3a5f; border: 1px solid #5e8ab9; border-radius: 40px; padding: 12px 16px; font-size: 0.85rem; font-weight: 600; color: white; cursor: pointer; flex: 1 0 120px; text-align: center; }
        .github-btn:active { background: #2b4d7a; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000dd; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: #e8f0fe; border-radius: 48px; width: 90%; max-width: 380px; padding: 28px 24px; color: #1f3a5f; }
        .modal-content h2 { font-size: 1.8rem; text-align: center; margin-bottom: 22px; }
        .setting-field { margin-bottom: 20px; }
        .setting-field label { font-size: 0.7rem; font-weight: 800; color: #1e4762; display: block; margin-bottom: 6px; }
        .round-input { width: 100%; padding: 16px 20px; border-radius: 60px; border: 2px solid #b3ceff; font-size: 0.9rem; background: white; }
        .btn-row { display: flex; gap: 12px; margin-top: 22px; }
        .modal-btn { flex: 1; padding: 16px 12px; border-radius: 60px; border: none; font-weight: 700; font-size: 1rem; }
        .save-btn { background: #1e3a5f; color: white; }
        .close-btn { background: #dbe4ee; }
        .preview-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000dd; align-items: center; justify-content: center; z-index: 3000; }
        .preview-modal-content { background: #1a2639; border-radius: 48px; width: 90%; max-width: 380px; padding: 28px 24px; color: #eef3fc; border: 2px solid #7f9fd5; position: relative; }
        .preview-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .preview-modal-header h2 { font-size: 1.5rem; color: #ffcf8b; }
        .exit-preview-btn { background: #a13d3d; border: 1px solid #ff7b7b; border-radius: 40px; padding: 8px 20px; font-size: 1rem; color: white; cursor: pointer; }
        .exit-preview-btn:hover { background: #c44b4b; }
        .preview-modal-body { background: #0d1a2b; border-radius: 24px; padding: 20px; min-height: 150px; border: 1px solid #3e618a; }
        /* Phone mockup with calculator */
        .phone-mockup {
            background: #111;
            border-radius: 36px;
            padding: 15px 8px;
            border: 2px solid #444;
            max-width: 280px;
            margin: 0 auto;
        }
        .phone-screen {
            background: #f0f0f0;
            border-radius: 24px;
            padding: 15px;
            color: #000;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #333;
            margin-bottom: 10px;
        }
        .app-header {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #6200ee;
            color: white;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .app-icon-small {
            width: 32px;
            height: 32px;
            background: #fff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .app-name {
            font-weight: bold;
        }
        .calculator {
            background: #333;
            border-radius: 16px;
            padding: 10px;
        }
        .calc-display {
            background: #000;
            color: #0f0;
            font-size: 2rem;
            text-align: right;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-family: monospace;
        }
        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }
        .calc-btn {
            background: #555;
            color: white;
            font-size: 1.2rem;
            padding: 15px 0;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
        }
        .calc-btn.operator {
            background: #ff9500;
        }
        .calc-btn.equals {
            background: #ff9500;
            grid-column: span 2;
        }
        .calc-btn.zero {
            grid-column: span 2;
        }
        .github-btn { font-size: 0.75rem !important; padding: 8px 12px !important; }
        .percent-buttons .pbtn { font-size: 0.7rem; padding: 6px 0; max-width: 50px; }
        @media (max-width: 400px) {
            .tab { font-size: 0.7rem; padding: 8px 2px; }
            .pbtn { font-size: 0.75rem; padding: 8px 0; }
            .header-btn { font-size: 0.8rem; padding: 10px 4px; }
        }
    </style>
</head>
<body>

<!-- ہیڈر -->
<div class="header-row">
    <div class="header-btn" onclick="toggleSettings()">⚙️ Settings</div>
    <div class="header-btn make-apk" onclick="buildApkIcon()">📱 Make apk icon</div>
    <div class="connection-indicator" id="connectionIndicator">
        <div class="led gray" id="connectionLed"></div>
        <span class="status-text" id="connectionStatus">منقطع</span>
    </div>
</div>

<!-- ٹیبز -->
<div class="tabs-row">
    <div class="tab active" onclick="openTab(event, 'javaEditor')">JAVA</div>
    <div class="tab" onclick="openTab(event, 'ktEditor')">KT (KOTLIN)</div>
    <div class="tab" onclick="openTab(event, 'manifestEditor')">MANIF</div>
    <div class="tab" onclick="openTab(event, 'imageTab')">APP IMAGE</div>
</div>

<!-- ایڈیٹر کارڈ -->
<div class="editor-card">
    <div class="preview-btn" onclick="openAppPreview()">👁️ ایپ پری ویو</div>
    
    <textarea id="javaEditor" class="editor active" placeholder="// Java code ...">package com.systempro;

public class MainActivity {
    public static void main(String[] args) {
        System.out.println("System Pro Calculator");
    }
}</textarea>
    <textarea id="ktEditor" class="editor" placeholder="// Kotlin code ...">package com.systempro

fun main() {
    println("System Pro Calculator")
}</textarea>
    <textarea id="manifestEditor" class="editor" placeholder="<!-- AndroidManifest.xml -->">&lt;?xml version="1.0" encoding="utf-8"?&gt;
&lt;manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="com.systempro"&gt;
    &lt;application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:label="System Pro"
        android:theme="@style/AppTheme"&gt;
        &lt;activity android:name=".MainActivity"&gt;
            &lt;intent-filter&gt;
                &lt;action android:name="android.intent.action.MAIN" /&gt;
                &lt;category android:name="android.intent.category.LAUNCHER" /&gt;
            &lt;/intent-filter&gt;
        &lt;/activity&gt;
    &lt;/application&gt;
&lt;/manifest&gt;</textarea>
    <div id="imageTab" class="editor">
        <div class="image-panel">
            <h4>📱 Select App Icon</h4>
            <div class="icon-selector">
                <div class="preview-box" id="iconPreview"><span>🖼️</span></div>
                <div class="preset-icons">
                    <div class="preset-icon" onclick="setPresetIcon('🌟')">🌟</div>
                    <div class="preset-icon" onclick="setPresetIcon('🎮')">🎮</div>
                    <div class="preset-icon" onclick="setPresetIcon('⚙️')">⚙️</div>
                    <div class="preset-icon" onclick="setPresetIcon('📱')">📱</div>
                    <div class="preset-icon" onclick="setPresetIcon('🚀')">🚀</div>
                </div>
            </div>
            <div class="file-upload">
                <label for="iconInput" class="file-label">📂 اپ لوڈ تصویر</label>
                <input type="file" id="iconInput" accept="image/*" onchange="previewIcon(event)">
            </div>
            <div style="font-size:0.8rem; margin-top:8px;" id="iconName">کوئی تصویر منتخب نہیں</div>
        </div>
    </div>
</div>

<!-- پروگریس بار -->
<div class="progress-card">
    <div class="progress-label">📊 Process Bar:</div>
    <div class="bar-container"><div id="progressFill" class="progress-fill" style="width: 0%;"></div></div>
    <div class="percent-buttons">
        <div class="pbtn" onclick="setProgress(0)">0%</div>
        <div class="pbtn zero-special" onclick="setProgress(0, 'duplicate')">0%</div>
        <div class="pbtn" onclick="setProgress(25)">25%</div>
        <div class="pbtn" onclick="setProgress(70)">70%</div>
        <div class="pbtn" onclick="setProgress(100)">100%</div>
    </div>
</div>

<!-- بڑا ایرر باکس (اب تفصیلی لاگ دکھائے گا) -->
<div class="error-card">
    <div class="error-header"><span>❌ Error Display Box:</span><span>real-time</span></div>
    <textarea id="errorBox" class="error-box" readonly>✅ System ready. Enter your code and push.</textarea>
</div>

<!-- گٹ ہب بٹن -->
<div class="github-bar">
    <div class="github-btn" onclick="pushToGitHub()">📤 Push to GitHub</div>
    <div class="github-btn" onclick="triggerWorkflow()">⚙️ Trigger Build</div>
    <div class="github-btn" onclick="downloadApk()">📥 Download APK</div>
</div>

<!-- سیٹنگز موڈل -->
<div id="settingsModal" class="modal" onclick="if(event.target===this) toggleSettings()">
    <div class="modal-content">
        <h2>⚙️ GitHub Settings</h2>
        <div class="setting-field"><label>👤 OWNER (صارف نام)</label><input type="text" id="owner" class="round-input" placeholder="github_username"></div>
        <div class="setting-field"><label>📦 REPOSITORY</label><input type="text" id="repo" class="round-input" placeholder="android-builder"></div>
        <div class="setting-field"><label>🔑 PERSONAL TOKEN</label><input type="password" id="token" class="round-input" placeholder="ghp_..."></div>
        <div class="setting-field"><label>🌿 BRANCH</label><input type="text" id="branch" class="round-input" value="main"></div>
        <div class="btn-row">
            <button class="modal-btn save-btn" onclick="saveSettings()">Save ✅</button>
            <button class="modal-btn close-btn" onclick="toggleSettings()">Close ❌</button>
        </div>
    </div>
</div>

<!-- ایپ پری ویو موڈل (کیلکولیٹر) -->
<div id="appPreviewModal" class="preview-modal" onclick="if(event.target===this) closeAppPreview()">
    <div class="preview-modal-content">
        <div class="preview-modal-header">
            <h2>📱 App Preview</h2>
            <div class="exit-preview-btn" onclick="closeAppPreview()">✖ Exit</div>
        </div>
        <div id="appPreviewBody" class="preview-modal-body">
            <!-- کیلکولیٹر یہاں بنے گا -->
        </div>
    </div>
</div>

<script>
    // متغیرات
    let currentIconBase64 = null;
    let currentIconType = 'emoji';
    let currentIconHtml = '<span>🖼️</span>';
    let workflowPollInterval = null;
    let currentWorkflowRunId = null;

    // === لاگنگ فنکشن (تاریخ اور وقت کے ساتھ) ===
    function logToErrorBox(message, isError = false) {
        const errorBox = document.getElementById('errorBox');
        const timestamp = new Date().toLocaleTimeString('ur-PK', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const prefix = isError ? '❌' : '⏺️';
        const logLine = `[${timestamp}] ${prefix} ${message}`;
        // پرانی ویلیو کے آخر میں شامل کریں
        errorBox.value += logLine + '\n';
        // اسکرول کو نیچے کریں
        errorBox.scrollTop = errorBox.scrollHeight;
    }

    // کنکشن چیک
    async function checkConnection() {
        const owner = document.getElementById('owner').value;
        const repo = document.getElementById('repo').value;
        const token = document.getElementById('token').value;
        const led = document.getElementById('connectionLed');
        const statusText = document.getElementById('connectionStatus');

        if (!owner || !repo || !token) {
            led.className = 'led gray';
            statusText.innerText = 'نامکمل';
            logToErrorBox('GitHub connection incomplete: missing owner/repo/token');
            return;
        }

        try {
            const response = await fetch(`https://api.github.com/repos/${owner}/${repo}`, {
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });
            if (response.ok) {
                led.className = 'led green';
                statusText.innerText = 'منسلک';
                logToErrorBox('GitHub connection successful');
            } else if (response.status === 401 || response.status === 403) {
                led.className = 'led red';
                statusText.innerText = 'ٹوکن نا درست';
                logToErrorBox('GitHub token invalid or expired', true);
            } else if (response.status === 404) {
                led.className = 'led red';
                statusText.innerText = 'ریپوزٹری نہیں ملی';
                logToErrorBox(`Repository ${owner}/${repo} not found`, true);
            } else {
                led.className = 'led yellow';
                statusText.innerText = 'خرابی ' + response.status;
                logToErrorBox(`GitHub API error: ${response.status}`, true);
            }
        } catch (error) {
            led.className = 'led red';
            statusText.innerText = 'نیٹ ورک خرابی';
            logToErrorBox('Network error: ' + error.message, true);
        }
    }

    // ٹیب کھولنا
    function openTab(event, tabId) {
        document.querySelectorAll('.editor').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        logToErrorBox(`Switched to tab: ${tabId}`);
    }

    // کیلکولیٹر موک اپ بنانا
    function buildCalculatorMockup() {
        let iconHtml = currentIconHtml;
        let appName = "System Pro";
        const manifest = document.getElementById('manifestEditor').value;
        const nameMatch = manifest.match(/android:label="([^"]+)"/);
        if (nameMatch && nameMatch[1]) {
            appName = nameMatch[1];
        }

        return `
            <div class="phone-mockup">
                <div class="phone-screen">
                    <div class="status-bar">
                        <span>📶</span>
                        <span>12:45</span>
                        <span>🔋</span>
                    </div>
                    <div class="app-header">
                        <div class="app-icon-small">${iconHtml}</div>
                        <div class="app-name">${appName}</div>
                    </div>
                    <div class="calculator">
                        <div class="calc-display">0</div>
                        <div class="calc-buttons">
                            <div class="calc-btn">C</div>
                            <div class="calc-btn">±</div>
                            <div class="calc-btn">%</div>
                            <div class="calc-btn operator">÷</div>
                            <div class="calc-btn">7</div>
                            <div class="calc-btn">8</div>
                            <div class="calc-btn">9</div>
                            <div class="calc-btn operator">×</div>
                            <div class="calc-btn">4</div>
                            <div class="calc-btn">5</div>
                            <div class="calc-btn">6</div>
                            <div class="calc-btn operator">−</div>
                            <div class="calc-btn">1</div>
                            <div class="calc-btn">2</div>
                            <div class="calc-btn">3</div>
                            <div class="calc-btn operator">+</div>
                            <div class="calc-btn zero">0</div>
                            <div class="calc-btn">.</div>
                            <div class="calc-btn equals">=</div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    function openAppPreview() {
        const modal = document.getElementById('appPreviewModal');
        const body = document.getElementById('appPreviewBody');
        body.innerHTML = buildCalculatorMockup();
        modal.style.display = 'flex';
        logToErrorBox('App preview opened');
    }

    function closeAppPreview() {
        document.getElementById('appPreviewModal').style.display = 'none';
        logToErrorBox('App preview closed');
    }

    // سیٹنگز موڈل
    function toggleSettings() {
        const modal = document.getElementById('settingsModal');
        modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        if (modal.style.display === 'flex') logToErrorBox('Settings modal opened');
        else logToErrorBox('Settings modal closed');
    }

    function saveSettings() {
        localStorage.setItem('gh_owner', document.getElementById('owner').value);
        localStorage.setItem('gh_repo', document.getElementById('repo').value);
        localStorage.setItem('gh_token', document.getElementById('token').value);
        localStorage.setItem('gh_branch', document.getElementById('branch').value);
        logToErrorBox('GitHub settings saved. Checking connection...');
        toggleSettings();
        checkConnection();
    }

    // پروگریس بار (اب صرف بصری ہے، مگر لاگ میں تفصیل آئے گی)
    function setProgress(percent, variant = '') {
        document.getElementById('progressFill').style.width = percent + '%';
        const messages = {
            0: variant ? '⚡ Cache cleared. Ready.' : '⏻ Reset. Ready.',
            25: '⏳ Decompiling...',
            70: '⚙️ Compiling...',
            100: '✅ Build successful. APK generated.'
        };
        if (messages[percent]) {
            logToErrorBox(messages[percent]);
        }
    }

    // Make apk icon
    function buildApkIcon() {
        const owner = document.getElementById('owner').value;
        const repo = document.getElementById('repo').value;
        const token = document.getElementById('token').value;

        if (!owner || !repo || !token) {
            logToErrorBox('Please enter GitHub settings first.', true);
            return;
        }
        if (currentIconHtml.includes('🖼️') && !currentIconBase64 && currentIconType === 'emoji') {
            logToErrorBox('Please select an icon.', true);
            return;
        }

        setProgress(70);
        logToErrorBox('🖼️ Icon generated. Ready for push.');
    }

    // آئیکن فنکشنز
    function previewIcon(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('iconPreview');
                const imgHtml = `<img src="${e.target.result}" style="max-width:65px; max-height:65px; border-radius:16px;">`;
                preview.innerHTML = imgHtml;
                document.getElementById('iconName').innerText = file.name;
                const base64 = e.target.result.split(',')[1];
                currentIconBase64 = base64;
                currentIconType = 'image';
                currentIconHtml = imgHtml;
                logToErrorBox(`Icon uploaded: ${file.name}`);
            };
            reader.readAsDataURL(file);
        }
    }

    function setPresetIcon(emoji) {
        document.getElementById('iconPreview').innerHTML = `<span style="font-size:3rem;">${emoji}</span>`;
        document.getElementById('iconName').innerText = 'پری سیٹ: ' + emoji;
        currentIconBase64 = null;
        currentIconType = 'emoji';
        currentIconHtml = `<span style="font-size:3rem;">${emoji}</span>`;
        logToErrorBox(`Preset icon selected: ${emoji}`);
    }

    // GitHub API functions
    async function githubFetch(url, options = {}) {
        const token = document.getElementById('token').value;
        const headers = { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', ...options.headers };
        const response = await fetch(url, { ...options, headers });
        if (!response.ok && response.status !== 404) {
            const err = await response.text();
            throw new Error(`GitHub API error: ${response.status} ${err}`);
        }
        return response;
    }

    async function uploadFile(path, content, message) {
        const owner = document.getElementById('owner').value;
        const repo = document.getElementById('repo').value;
        const branch = document.getElementById('branch').value;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        let sha = null;
        try {
            const meta = await githubFetch(url);
            if (meta.ok) {
                const data = await meta.json();
                sha = data.sha;
            }
        } catch (e) {}
        const body = { message, content: btoa(unescape(encodeURIComponent(content))), branch };
        if (sha) body.sha = sha;
        const response = await githubFetch(url, { method: 'PUT', body: JSON.stringify(body) });
        return await response.json();
    }

    async function uploadIcon(path, base64Content, message) {
        const owner = document.getElementById('owner').value;
        const repo = document.getElementById('repo').value;
        const branch = document.getElementById('branch').value;
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
        let sha = null;
        try {
            const meta = await githubFetch(url);
            if (meta.ok) {
                const data = await meta.json();
                sha = data.sha;
            }
        } catch (e) {}
        const body = { message, content: base64Content, branch };
        if (sha) body.sha = sha;
        const response = await githubFetch(url, { method: 'PUT', body: JSON.stringify(body) });
        return await response.json();
    }

    async function pushToGitHub() {
        const owner = document.getElementById('owner').value;
        const repo = document.getElementById('repo').value;
        const token = document.getElementById('token').value;
        if (!owner || !repo || !token) {
            logToErrorBox('Settings میں owner, repo اور token درج کریں', true);
            return;
        }
        setProgress(25);
        logToErrorBox('Starting push to GitHub...');
        try {
            const ktCode = document.getElementById('ktEditor').value;
            await uploadFile('app/src/main/java/com/systempro/MainActivity.kt', ktCode, 'Update MainActivity.kt');
            logToErrorBox('✅ MainActivity.kt uploaded');
            const manifest = document.getElementById('manifestEditor').value;
            await uploadFile('app/src/main/AndroidManifest.xml', manifest, 'Update AndroidManifest.xml');
            logToErrorBox('✅ AndroidManifest.xml uploaded');
            const javaCode = document.getElementById('javaEditor').value;
            await uploadFile('app/src/main/java/com/systempro/MainActivity.java', javaCode, 'Update MainActivity.java').catch(()=>{});
            if (currentIconType === 'image' && currentIconBase64) {
                await uploadIcon('app/src/main/res/mipmap/ic_launcher.png', currentIconBase64, 'Update app icon');
                logToErrorBox('✅ App icon uploaded');
            }
            setProgress(70);
            logToErrorBox('✅ Files uploaded to GitHub. You can now trigger build.');
        } catch (err) {
            logToErrorBox('Error during push: ' + err.message, true);
            setProgress(0);
        }
    }

    // === Workflow tracking functions ===
    async function fetchLatestWorkflowRun() {
        const owner = document.getElementById('owner').value;
        const repo = document.getElementById('repo').value;
        const token = document.getElementById('token').value;
        if (!owner || !repo || !token) return null;

        try {
            const url = `https://api.github.com/repos/${owner}/${repo}/actions/runs?per_page=5&event=workflow_dispatch`;
            const resp = await githubFetch(url);
            const data = await resp.json();
            if (data.workflow_runs && data.workflow_runs.length > 0) {
                // return the most recent one (already sorted)
                return data.workflow_runs[0];
            }
        } catch (e) {
            logToErrorBox('Error fetching workflow runs: ' + e.message, true);
        }
        return null;
    }

    async function pollWorkflowRun(runId) {
        if (!runId) return;
        const owner = document.getElementById('owner').value;
        const repo = document.getElementById('repo').value;
        const url = `https://api.github.com/repos/${owner}/${repo}/actions/runs/${runId}`;
        try {
            const resp = await githubFetch(url);
            const run = await resp.json();
            const status = run.status; // queued, in_progress, completed
            const conclusion = run.conclusion; // success, failure, neutral, cancelled, etc.
            logToErrorBox(`Workflow run #${runId}: status = ${status}` + (conclusion ? `, conclusion = ${conclusion}` : ''));
            if (status === 'completed') {
                logToErrorBox(`🏁 Workflow completed. Conclusion: ${conclusion}`);
                if (conclusion === 'success') {
                    setProgress(100);
                } else {
                    setProgress(0);
                }
                // stop polling
                if (workflowPollInterval) {
                    clearInterval(workflowPollInterval);
                    workflowPollInterval = null;
                    currentWorkflowRunId = null;
                }
                // optionally fetch logs? not implemented
            } else {
                // still running, show progress 70% maybe
                setProgress(70);
            }
        } catch (e) {
            logToErrorBox('Error polling workflow: ' + e.message, true);
        }
    }

    async function triggerWorkflow() {
        const owner = document.getElementById('owner').value;
        const repo = document.getElementById('repo').value;
        const token = document.getElementById('token').value;
        if (!owner || !repo || !token) {
            logToErrorBox('Settings مکمل کریں', true);
            return;
        }
        setProgress(70);
        logToErrorBox('⚙️ Starting workflow...');
        try {
            // Use main.yml as seen in the screenshot
            const url = `https://api.github.com/repos/${owner}/${repo}/actions/workflows/main.yml/dispatches`;
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ ref: document.getElementById('branch').value })
            });
            if (!response.ok) throw new Error('Workflow trigger failed');
            logToErrorBox('✅ Workflow triggered successfully. Waiting for run to appear...');
            
            // Stop any previous polling
            if (workflowPollInterval) {
                clearInterval(workflowPollInterval);
                workflowPollInterval = null;
            }

            // Wait a few seconds then fetch the latest run
            setTimeout(async () => {
                const latestRun = await fetchLatestWorkflowRun();
                if (latestRun) {
                    currentWorkflowRunId = latestRun.id;
                    logToErrorBox(`Found workflow run #${currentWorkflowRunId} - ${latestRun.status}`);
                    // Start polling every 5 seconds
                    workflowPollInterval = setInterval(() => {
                        if (currentWorkflowRunId) {
                            pollWorkflowRun(currentWorkflowRunId);
                        }
                    }, 5000);
                } else {
                    logToErrorBox('Could not find the triggered workflow run yet. Check Actions tab.', true);
                }
            }, 5000); // 5 sec delay
        } catch (err) {
            logToErrorBox('❌ ' + err.message, true);
            setProgress(0);
        }
    }

    async function downloadApk() {
        const owner = document.getElementById('owner').value;
        const repo = document.getElementById('repo').value;
        const token = document.getElementById('token').value;
        if (!owner || !repo || !token) {
            logToErrorBox('Settings مکمل کریں', true);
            return;
        }
        try {
            const runsUrl = `https://api.github.com/repos/${owner}/${repo}/actions/runs?per_page=1`;
            const runsResp = await githubFetch(runsUrl);
            const runsData = await runsResp.json();
            if (!runsData.workflow_runs || runsData.workflow_runs.length === 0) throw new Error('کوئی workflow run نہیں ملا');
            const latestRun = runsData.workflow_runs[0];
            logToErrorBox(`Latest workflow run: #${latestRun.id} (${latestRun.status})`);
            const artUrl = latestRun.artifacts_url;
            const artResp = await githubFetch(artUrl);
            const artData = await artResp.json();
            const apkArtifact = artData.artifacts.find(a => a.name === 'app-debug');
            if (!apkArtifact) throw new Error('APK آرٹیفیکٹ نہیں ملا');
            window.open(apkArtifact.archive_download_url, '_blank');
            logToErrorBox('📥 Download started. (Note: link is temporary)');
        } catch (err) {
            logToErrorBox('❌ ' + err.message, true);
        }
    }

    // لوڈ اور آٹو سیو — ڈیفالٹ ویلیوز faisalzar/System-Pro-codestudio
    window.onload = function() {
        // ڈیفالٹ owner اور repo سیٹ کریں اگر خالی ہوں
        if (!localStorage.getItem('gh_owner')) {
            document.getElementById('owner').value = 'faisalzar';
        } else {
            document.getElementById('owner').value = localStorage.getItem('gh_owner');
        }
        if (!localStorage.getItem('gh_repo')) {
            document.getElementById('repo').value = 'System-Pro-codestudio';
        } else {
            document.getElementById('repo').value = localStorage.getItem('gh_repo');
        }
        document.getElementById('token').value = localStorage.getItem('gh_token') || '';
        document.getElementById('branch').value = localStorage.getItem('gh_branch') || 'main';
        
        if (localStorage.getItem('sp_java')) document.getElementById('javaEditor').value = localStorage.getItem('sp_java');
        if (localStorage.getItem('sp_kt')) document.getElementById('ktEditor').value = localStorage.getItem('sp_kt');
        if (localStorage.getItem('sp_manifest')) document.getElementById('manifestEditor').value = localStorage.getItem('sp_manifest');
        checkConnection();
        logToErrorBox('System Pro initialized. Ready.');
    };

    setInterval(() => {
        localStorage.setItem('sp_java', document.getElementById('javaEditor').value);
        localStorage.setItem('sp_kt', document.getElementById('ktEditor').value);
        localStorage.setItem('sp_manifest', document.getElementById('manifestEditor').value);
    }, 2000);
</script>
