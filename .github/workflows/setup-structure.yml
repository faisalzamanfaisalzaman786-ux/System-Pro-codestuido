name: System Pro Dispatch Fixer
on:
  workflow_dispatch: 
  push:
    branches: [ main ]

jobs:
  fix-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Fiscal Structure
        run: |
          # درست فولڈرز بنانا
          mkdir -p backend public uploads www
          # اگر config.xml موجود نہیں تو بنیادی فائل بنانا
          if [ ! -f "config.xml" ]; then
            echo "<?xml version='1.0' encoding='utf-8'?><widget id='com.system.pro' version='1.0.0'><name>SystemPro</name><content src='index.html' /></widget>" > config.xml
          fi

      - name: Push Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "System-Pro-Bot"
          git add .
          git commit -m "Corrected folder path and created fiscal structure" || echo "No changes"
          git push origin main
