name: System Pro Native Builder
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'App Package Name'
        required: true
        default: 'com.systempro.app'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🏗️ Setup Project Structure
        run: |
          # پرانے کچرے کی صفائی
          rm -rf app build.gradle settings.gradle
          
          PKG="${{ github.event.inputs.package_name }}"
          PKG_PATH=$(echo $PKG | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout

          # سادہ اور درست فائلیں بنانا
          echo "include ':app'" > settings.gradle
          
          # Project Level build.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }" > build.gradle
          
          # App Level build.gradle
          echo "apply plugin: 'com.android.application'
          android {
              namespace '$PKG'
              compileSdk 34
              defaultConfig { applicationId '$PKG'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }" > app/build.gradle

          # Manifest
          echo "<manifest xmlns:android='http://schemas.android.com/apk/res/android'>
              <application android:label='System Pro' android:theme='@style/Theme.AppCompat.Light.NoActionBar'>
                  <activity android:name='.MainActivity' android:exported='true'>
                      <intent-filter><action android:name='android.intent.action.MAIN' /><category android:name='android.intent.category.LAUNCHER' /></intent-filter>
                  </activity>
              </application></manifest>" > app/src/main/AndroidManifest.xml

          # MainActivity.java
          echo "package $PKG;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle s) { super.onCreate(s); setContentView(new android.view.View(this)); }
          }" > app/src/main/java/$PKG_PATH/MainActivity.java

      - name: 🔨 Compile APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: 📦 Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.package_name }}-APK
          path: app/build/outputs/apk/debug/*.apk
