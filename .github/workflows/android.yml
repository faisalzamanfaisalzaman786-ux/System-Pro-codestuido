name: System Pro Official Build (ZIP Ingest)
on:
  workflow_dispatch:                               # manual trigger for testing
  repository_dispatch:
    types: [build-from-zip]                        # triggered by HTML builder after ZIP upload

jobs:
  assemble-official-apk:
    name: "System Pro: Build from ZIP asset"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Download project ZIP from release asset
        run: |
          ZIP_URL="${{ github.event.client_payload.zip_asset_url }}"
          if [ -z "$ZIP_URL" ]; then
            echo "❌ No ZIP url provided in client_payload.zip_asset_url"
            exit 1
          fi
          echo "📦 Downloading source bundle from: $ZIP_URL"
          curl -L -o source_bundle.zip "$ZIP_URL"
          unzip -q source_bundle.zip -d workspace/
          echo "✅ Extracted files:"
          ls -la workspace/

      - name: Read build metadata
        id: metadata
        run: |
          if [ -f workspace/build_metadata.json ]; then
            APP_NAME=$(jq -r '.app_name' workspace/build_metadata.json)
            PKG_NAME=$(jq -r '.package_name' workspace/build_metadata.json)
            echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
            echo "pkg_name=$PKG_NAME" >> $GITHUB_OUTPUT
            echo "📋 App name: $APP_NAME"
            echo "📦 Package: $PKG_NAME"
          else
            # fallback to client_payload values
            echo "app_name=${{ github.event.client_payload.app_name }}" >> $GITHUB_OUTPUT
            echo "pkg_name=${{ github.event.client_payload.package_name }}" >> $GITHUB_OUTPUT
            echo "⚠️ No build_metadata.json, using client_payload values"
          fi

      - name: Inject source files into Android project
        run: |
          # Define paths (assumes standard Android structure)
          APP_JAVA_DIR="app/src/main/java/$(echo "${{ steps.metadata.outputs.pkg_name }}" | tr '.' '/')"
          mkdir -p "$APP_JAVA_DIR"
          
          # 1. MainActivity.java
          if [ -f workspace/MainActivity.java ]; then
            cp workspace/MainActivity.java "$APP_JAVA_DIR/MainActivity.java"
            echo "✅ MainActivity.java placed"
          else
            echo "⚠️ MainActivity.java not found in ZIP"
          fi

          # 2. Layout file
          mkdir -p app/src/main/res/layout
          if [ -f workspace/res/layout/activity_main.xml ]; then
            cp workspace/res/layout/activity_main.xml app/src/main/res/layout/activity_main.xml
          elif [ -f workspace/activity_main.xml ]; then
            cp workspace/activity_main.xml app/src/main/res/layout/activity_main.xml
          else
            echo "⚠️ activity_main.xml missing"
          fi

          # 3. AndroidManifest.xml
          if [ -f workspace/AndroidManifest.xml ]; then
            cp workspace/AndroidManifest.xml app/src/main/AndroidManifest.xml
            echo "✅ AndroidManifest.xml replaced"
          else
            echo "⚠️ Manifest not found, keeping existing"
          fi

          # 4. App icon (PNG)
          mkdir -p app/src/main/res/drawable
          if [ -f workspace/res/drawable/ic_launcher.png ]; then
            cp workspace/res/drawable/ic_launcher.png app/src/main/res/drawable/ic_launcher.png
            echo "✅ Icon placed in drawable/"
          elif [ -f workspace/ic_launcher.png ]; then
            cp workspace/ic_launcher.png app/src/main/res/drawable/ic_launcher.png
          else
            echo "ℹ️ No custom icon provided, using default"
          fi

          # 5. Update app name & package in build.gradle (optional)
          if [ -f app/build.gradle ]; then
            sed -i "s/applicationId \".*\"/applicationId \"${{ steps.metadata.outputs.pkg_name }}\"/" app/build.gradle
            echo "🔧 Updated applicationId in build.gradle"
          fi

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload final APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.app_name || 'SystemPro' }}-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 5

      - name: Build success summary
        if: success()
        run: |
          echo "## ✅ Build succeeded (ZIP ingestion mode)" >> $GITHUB_STEP_SUMMARY
          echo "App: **${{ steps.metadata.outputs.app_name }}**" >> $GITHUB_STEP_SUMMARY
          echo "Package: `${{ steps.metadata.outputs.pkg_name }}`" >> $GITHUB_STEP_SUMMARY
          echo "APK is attached as a workflow artifact." >> $GITHUB_STEP_SUMMARY
