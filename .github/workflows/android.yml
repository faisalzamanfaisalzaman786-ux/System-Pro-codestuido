name: GitHub-Decompiler-Build-Final-Fix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # کیشے کو عارضی طور پر ہٹا رہے ہیں تاکہ پرانا ڈیٹا تنگ نہ کرے
          # cache: 'gradle' 

      # سٹیپ 1: مکمل صفائی (Force Clean)
      - name: Hard Clean Folders
        run: |
          mkdir -p app/src/main/java/com/systempro/faisal/
          mkdir -p app/src/main/res/layout/
          # صرف جاوا اور لے آؤٹ فائلز اڑائیں
          find app/src/main/java/ -name "*.java" -delete || true
          find app/src/main/res/layout/ -name "*.xml" -delete || true

      # سٹیپ 2: نئی فائلیں لانا
      - name: Sync Uploaded Files
        run: |
          if [ -d "uploads" ] && [ "$(ls -A uploads)" ]; then
            cp -rf uploads/*.java app/src/main/java/com/systempro/faisal/ 2>/dev/null || true
            cp -rf uploads/*.xml app/src/main/res/layout/ 2>/dev/null || true
          fi

      # سٹیپ 3: مینی فیسٹ کو اٹو پیچ کرنا (Very Important)
      - name: Auto-Repair Manifest
        run: |
          MANIFEST="app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            # تمام تھیمز اور آئیکونز کو ڈیفالٹ پر سیٹ کریں تاکہ ایرر نہ آئے
            sed -i 's/android:theme="[^"]*"/android:theme="@android:style\/Theme.DeviceDefault"/g' $MANIFEST
            sed -i 's/android:icon="[^"]*"/android:icon="@android:drawable\/sym_def_app_icon"/g' $MANIFEST
          fi

      - name: Grant Execute Permission
        run: chmod +x gradlew

      # سٹیپ 4: زبردستی بلڈ بنانا (No Daemon Mode)
      - name: Build APK (Force Mode)
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Final-System-Pro-Build
          path: app/build/outputs/apk/debug/*.apk
