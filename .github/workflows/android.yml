name: System Pro APK Builder
on:
  workflow_dispatch:
    inputs:
      file_content: { required: true }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Auto-Inject Package
        run: |
          # رینڈم پیکیج نیم بنانا
          ID=$(head /dev/urandom | tr -dc a-z0-9 | head -c 6)
          PKG="com.systempro.app$ID"
          echo "PKG=$PKG" >> $GITHUB_ENV
          
          echo "${{ github.event.inputs.file_content }}" | base64 -d > data.json
          python3 -c "
          import json, os, re
          pkg = '$PKG'
          with open('data.json', 'r') as f:
              files = json.load(f).get('files', {})
              for name, content in files.items():
                  if name.endswith('.java'):
                      # جاوا فائل کی پہلی 2 لائنیں مٹا کر نئی لائنیں ڈالنا
                      lines = content.split('\n')
                      clean_lines = [l for l in lines if 'package ' not in l and 'import ' not in l or '.R;' not in l]
                      final_content = f'package {pkg};\nimport {pkg}.R;\n' + '\n'.join(clean_lines)
                      path = f'app/src/main/java/{pkg.replace(\".\", \"/\")}/{name}'
                  elif name == 'AndroidManifest.xml':
                      content = re.sub(r'package=\"[\w\.]+\"', '', content).replace('.MainActivity', f'{pkg}.MainActivity')
                      path = 'app/src/main/AndroidManifest.xml'
                  elif 'layout' in name: path = f'app/src/main/res/layout/{name}'
                  else: continue
                  os.makedirs(os.path.dirname(path), exist_ok=True)
                  with open(path, 'w') as out: out.write(final_content if name.endswith('.java') else content)
          "
      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Generated-APK
          path: app/build/outputs/apk/debug/*.apk
