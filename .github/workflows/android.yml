name: System Pro Ultimate Builder
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Target Package Name'
        required: true
        default: 'com.systempro.app'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🏗️ Setup Native Android Project
        run: |
          PKG="${{ github.event.inputs.package_name }}"
          PKG_PATH=$(echo $PKG | tr '.' '/')
          
          # اینڈرائیڈ اسٹرکچر کی مکمل صفائی اور دوبارہ تیاری
          rm -rf app
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # settings.gradle
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }" > settings.gradle
          echo "dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }" >> settings.gradle
          echo "rootProject.name = 'SystemProProject'" >> settings.gradle
          echo "include ':app'" >> settings.gradle

          # build.gradle (Project Level)
          echo "plugins { id 'com.android.application' version '8.2.2' apply false }" > build.gradle

          # app/build.gradle (Module Level - Native Config)
          echo "plugins { id 'com.android.application' }
          android {
              namespace '$PKG'
              compileSdk 34
              defaultConfig {
                  applicationId '$PKG'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes { release { minifyEnabled false } }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }" > app/build.gradle

          # MainActivity.java (Standard Native Code)
          echo "package $PKG;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
              }
          }" > app/src/main/java/$PKG_PATH/MainActivity.java

          # activity_main.xml
          echo "<?xml version='1.0' encoding='utf-8'?>
          <RelativeLayout xmlns:android='http://schemas.android.com/apk/res/android'
              android:layout_width='match_parent'
              android:layout_height='match_parent'>
              <TextView android:layout_width='wrap_content' android:layout_height='wrap_content'
                  android:text='System Pro Ready' android:layout_centerInParent='true'/>
          </RelativeLayout>" > app/src/main/res/layout/activity_main.xml

          # AndroidManifest.xml
          echo "<manifest xmlns:android='http://schemas.android.com/apk/res/android'>
              <application android:label='System Pro' android:theme='@style/Theme.Material3.DayNight.NoActionBar'>
                  <activity android:name='.MainActivity' android:exported='true'>
                      <intent-filter>
                          <action android:name='android.intent.action.MAIN' />
                          <category android:name='android.intent.category.LAUNCHer' />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>" > app/src/main/AndroidManifest.xml

      - name: 🔨 Compile Native APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📦 Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.package_name }}-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
