name: System Pro APK Builder

on:
  workflow_dispatch:
    inputs:
      file_content:
        description: 'Code from App'
        required: true
        default: ''
      app_index:
        description: 'Unique ID'
        required: true
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧹 Deep Clean & Reset
        run: |
          # پرانی تمام فائلیں اور کیشے ختم کرنا
          rm -rf .gradle build app/build
          rm -rf app/src/main/java/*
          chmod +x gradlew || true
          ./gradlew clean

      - name: 🛠️ Auto-Update Package & Paths
        run: |
          # پائیتھون اسکرپٹ جو کوڈ سے پیکیج نکال کر ہر جگہ اپڈیٹ کرے گی
          cat <<EOF > update_app.py
          import os
          import re

          code = """${{ github.event.inputs.file_content }}"""
          # کوڈ سے پیکیج نیم نکالنا
          match = re.search(r'package\s+([\w\.]+);', code)
          
          if match:
              new_package = match.group(1)
              print(f"New Package Found: {new_package}")
              
              # 1. فولڈر بنانا اور فائل سیو کرنا
              path = "app/src/main/java/" + new_package.replace('.', '/')
              os.makedirs(path, exist_ok=True)
              with open(os.path.join(path, "MainActivity.java"), "w") as f:
                  f.write(code)
              
              # 2. AndroidManifest.xml میں پیکیج اپڈیٹ کرنا
              manifest_path = "app/src/main/AndroidManifest.xml"
              if os.path.exists(manifest_path):
                  with open(manifest_path, 'r') as f:
                      content = f.read()
                  # package="..." اور android:name=".MainActivity" کو ہینڈل کرنا
                  content = re.sub(r'package="[\w\.]+"', f'package="{new_package}"', content)
                  with open(manifest_path, 'w') as f:
                      f.write(content)

              # 3. build.gradle میں applicationId اپڈیٹ کرنا
              gradle_path = "app/build.gradle"
              if os.path.exists(gradle_path):
                  with open(gradle_path, 'r') as f:
                      content = f.read()
                  content = re.sub(r'applicationId\s+"[\w\.]+"', f'applicationId "{new_package}"', content)
                  with open(gradle_path, 'w') as f:
                      f.write(content)
              
              print("Successfully updated Folders, Manifest, and Gradle.")
          else:
              print("Error: No package name found in provided code!")
          EOF
          
          python3 update_app.py

      - name: 🚀 Build Unique APK
        run: ./gradlew assembleDebug --no-daemon

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Build-${{ github.event.inputs.app_index }}
          path: app/build/outputs/apk/debug/*.apk
