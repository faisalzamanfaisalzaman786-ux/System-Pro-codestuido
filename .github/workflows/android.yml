name: System Pro Smart Builder
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Full Project Structure (Gradle 9.4.1)
        run: |
          # 1. پرانی کسی بھی فائل کو صاف کرنا (تاکہ صرف نیا سٹرکچر رہے)
          rm -rf .gradle gradle build.gradle settings.gradle gradlew gradlew.bat app src
          
          # 2. اینڈرائیڈ کے معیاری فولڈرز بنانا
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

          # 3. settings.gradle (جدید ترین فارمیٹ)
          echo "pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'System-Pro'
          include ':app'" > settings.gradle

          # 4. روٹ build.gradle (پلگ ان ورژن 8.4.0)
          echo "plugins {
              id 'com.android.application' version '8.4.0' apply false
              id 'com.android.library' version '8.4.0' apply false
          }" > build.gradle

          # 5. ایپ لیول build.gradle
          echo "plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.system.pro'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  release {
                      isMinifyEnabled = false
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }" > app/build.gradle

          # 6. MainActivity.java (خالی کوڈ تاکہ بلڈ پاس ہو)
          echo "package com.system.pro;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
              }
          }" > app/src/main/java/com/system/pro/MainActivity.java

          # 7. Layout اور Themes
          echo '<?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
          </RelativeLayout>' > app/src/main/res/layout/activity_main.xml

          echo '<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.SystemPro" parent="Theme.Material3.DayNight.NoActionBar" />
          </resources>' > app/src/main/res/values/themes.xml

          # 8. Android Manifest
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.SystemPro">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          # 9. Gradle 9.4.1 Wrapper
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.1-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          curl -L https://github.com/gradle/gradle/raw/v9.4.1/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

      - name: Build with Gradle 9.4.1
        run: |
          gradle wrapper --gradle-version 9.4.1
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V125-Latest
          path: "app/build/outputs/apk/debug/*.apk"
