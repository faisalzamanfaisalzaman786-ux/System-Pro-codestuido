name: System Pro Ultimate Repair & Build

on:
  workflow_dispatch: # آپ اسے مینوئلی رن کر سکتے ہیں

jobs:
  repair-and-rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/set-up-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🛠️ Repair & Clean Files
        run: |
          echo "Cleaning old build artifacts..."
          chmod +x gradlew
          ./gradlew clean
          
          echo "Repairing file permissions and line endings..."
          find . -type f -name "*.xml" -exec sed -i 's/\r$//' {} +
          find . -type f -name "*.java" -exec sed -i 's/\r$//' {} +
          find . -type f -name "*.gradle" -exec sed -i 's/\r$//' {} +
          
          echo "Removing potential cache conflicts..."
          rm -rf .gradle/
          rm -rf build/
          rm -rf app/build/

      - name: 🛡️ Verify Manifest & Assets
        run: |
          # یہ سٹیپ چیک کرے گا کہ Manifest فائل موجود ہے یا نہیں
          if [ ! -f app/src/main/AndroidManifest.xml ]; then
            echo "ERROR: AndroidManifest.xml missing!"
            exit 1
          fi

      - name: 🚀 Powerful Build (Debug APK)
        run: ./gradlew assembleDebug --stacktrace --info

      - name: Upload Repaired APK
        uses: actions/upload-artifact@v4
        with:
          name: Repaired-SystemPro-App
          path: app/build/outputs/apk/debug/*.apk
