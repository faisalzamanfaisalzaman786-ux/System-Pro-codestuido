name: System Pro Build System

on:
  workflow_dispatch:
    inputs:
      serial:
        description: 'Build Serial Number'
        required: true
        default: '001'
      base_package:
        description: 'Target Package Name'
        required: true
        default: 'com.systempro.master'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug
        env:
          BUILD_SERIAL: ${{ github.event.inputs.serial }}
          PACKAGE_NAME: ${{ github.event.inputs.base_package }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Build-${{ github.event.inputs.serial }}
          path: app/build/outputs/apk/debug/*.apk
