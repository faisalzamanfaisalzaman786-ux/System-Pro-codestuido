name: System Pro APK Builder

on:
  workflow_dispatch:
    inputs:
      file_content:
        description: 'Base64 encoded project files'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Auto-Generate Package and Inject
        run: |
          # ایک رینڈم آئی ڈی بنانا تاکہ پیکیج ہر بار منفرد ہو
          RANDOM_ID=$(head /dev/urandom | tr -dc a-z0-9 | head -c 6)
          NEW_PACKAGE="com.systempro.app$RANDOM_ID"
          echo "NEW_PACKAGE=$NEW_PACKAGE" >> $GITHUB_ENV
          echo "🚀 Unique Package: $NEW_PACKAGE"

      - name: Force Fix All Files
        run: |
          echo "${{ github.event.inputs.file_content }}" | base64 -d > project_data.json
          python3 -c "
          import json, os, re
          new_pkg = '${{ env.NEW_PACKAGE }}'
          pkg_path = new_pkg.replace('.', '/')
          
          with open('project_data.json', 'r') as f:
              data = json.load(f)
              files = data.get('files', {})
              for name, content in files.items():
                  # جاوا فائلوں میں پیکیج لائن اور R امپورٹ کو زبردستی بدلنا
                  if name.endswith('.java'):
                      content = re.sub(r'package\s+[\w\.]+;', f'package {new_pkg};', content)
                      content = re.sub(r'import\s+[\w\.]+\.R;', f'import {new_pkg}.R;', content)
                      full_path = f'app/src/main/java/{pkg_path}/{name}'
                  
                  # مینی فیسٹ میں ایکٹیویٹی کا راستہ درست کرنا
                  elif name == 'AndroidManifest.xml':
                      full_path = 'app/src/main/AndroidManifest.xml'
                      content = re.sub(r'package=\"[\w\.]+\"', '', content)
                      content = content.replace('.MainActivity', f'{new_pkg}.MainActivity')
                  
                  elif name.endswith('.xml') and 'layout' in name:
                      full_path = f'app/src/main/res/layout/{name}'
                  else:
                      continue

                  os.makedirs(os.path.dirname(full_path), exist_ok=True)
                  with open(full_path, 'w') as out: out.write(content)
          "

      - name: Build Final APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Success APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.NEW_PACKAGE }}-APK
          path: app/build/outputs/apk/debug/*.apk
