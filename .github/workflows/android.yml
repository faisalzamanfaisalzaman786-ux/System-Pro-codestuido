name: System Pro Ultimate
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Initialize Android Project
        run: |
          mkdir -p app/src/main/java/com/systempro
          mkdir -p app/src/main/res/layout
          # Generate basic wrapper files to avoid slow apt-get install
          gradle wrapper
          echo "include ':app'" > settings.gradle
          printf "apply plugin: 'com.android.application'\nandroid { compileSdk 33; namespace 'com.systempro'; default { applicationId 'com.systempro'; minSdk 21; targetSdk 33 } }" > app/build.gradle

      - name: 4. Compile APK
        # اب ہم Wrapper استعمال کر رہے ہیں جو کہ محفوظ اور تیز ہے
        run: ./gradlew assembleDebug

      - name: 5. Done
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Calculated
          path: app/build/outputs/apk/debug/*.apk
