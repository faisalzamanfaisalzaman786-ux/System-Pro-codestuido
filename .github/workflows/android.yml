name: UI APK Builder (Fixed)
on:
  repository_dispatch:
    types: [build-app]

jobs:
  build-from-ui:
    name: 📦 Build APK from UI Payload
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 📥 Extract and Fix UI Payload
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          # Parse JSON payload
          JAVA_CODE=$(echo "$PAYLOAD" | jq -r '.java // ""')
          XML_LAYOUT=$(echo "$PAYLOAD" | jq -r '.xml // ""')
          MANIFEST_XML=$(echo "$PAYLOAD" | jq -r '.manifest // ""')
          APP_NAME=$(echo "$PAYLOAD" | jq -r '.app_name // "SystemPro"')
          PACKAGE_NAME=$(echo "$PAYLOAD" | jq -r '.package_name // "com.system.pro"')
          ICON_B64=$(echo "$PAYLOAD" | jq -r '.icon_data // ""')

          # Validate required fields
          if [ -z "$JAVA_CODE" ] || [ -z "$XML_LAYOUT" ] || [ -z "$MANIFEST_XML" ]; then
            echo "❌ Missing java, xml, or manifest in payload"
            exit 1
          fi

          # Create directory structure
          PKG_PATH=$(echo "$PACKAGE_NAME" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          # Write the Java file first
          echo "$JAVA_CODE" > app/src/main/java/$PKG_PATH/MainActivity.java
          
          # ✅ Fix package line in Java file to match PACKAGE_NAME
          sed -i "s/^package .*;/package $PACKAGE_NAME;/" app/src/main/java/$PKG_PATH/MainActivity.java

          # Write layout
          echo "$XML_LAYOUT" > app/src/main/res/layout/activity_main.xml

          # Fix manifest: replace package attribute and add missing namespace
          echo "$MANIFEST_XML" | sed "s/package=\"[^\"]*\"/package=\"$PACKAGE_NAME\"/" > app/src/main/AndroidManifest.xml

          # Decode icon if provided
          if [ -n "$ICON_B64" ]; then
            echo "$ICON_B64" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
            echo "✅ Icon decoded"
          fi

          # Save metadata for later steps
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "✅ UI payload extracted and fixed"

      - name: 🛡️ Inject Missing Resources (Crash Prevention)
        run: |
          cat <<EOF > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg_dark">#0F0F0F</color>
              <color name="neon_blue">#00BFFF</color>
              <color name="neon_purple">#9D00FF</color>
              <color name="neon_green">#39FF14</color>
              <color name="black">#000000</color>
              <color name="white">#FFFFFF</color>
              <color name="primary_color">#6200EE</color>
              <color name="error_red">#FF0000</color>
              <color name="warning_orange">#FFA500</color>
              <color name="colorPrimaryDark">#0F0F0F</color>
              <color name="colorAccent">#00BFFF</color>
              <color name="glass_white_10">#1AFFFFFF</color>
              <color name="glass_white_30">#4DFFFFFF</color>
          </resources>
          EOF

          # Theme (safe default)
          SAFE_THEME_NAME="Theme_${APP_NAME// /_}"
          cat <<EOF > app/src/main/res/values/themes.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.$SAFE_THEME_NAME" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">@color/primary_color</item>
                  <item name="colorPrimaryDark">@color/bg_dark</item>
                  <item name="colorAccent">@color/neon_green</item>
              </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">$APP_NAME</string>
          </resources>
          EOF

          # Inject theme into manifest if missing
          MANIFEST_FILE="app/src/main/AndroidManifest.xml"
          if ! grep -q "android:theme" "$MANIFEST_FILE"; then
            sed -i "s|<application |<application android:theme=\"@style/Theme.$SAFE_THEME_NAME\" |" "$MANIFEST_FILE"
          fi

      - name: ⚙️ Generate Gradle Wrapper (9.4.1) & Build Scripts
        run: |
          # ✅ Correct gradlew script (no backslashes)
          cat <<'EOF' > gradlew
          #!/bin/sh
          exec java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          chmod +x gradlew

          # Wrapper properties
          cat <<EOF > gradle/wrapper/gradle-wrapper.properties
          distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.1-bin.zip
          EOF
          # Download wrapper jar (use local copy if available, else download)
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v9.4.1/gradle/wrapper/gradle-wrapper.jar
          fi

          # settings.gradle
          cat <<EOF > settings.gradle
          rootProject.name = "$APP_NAME"
          include ':app'
          EOF

          # root build.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.5.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          task clean(type: Delete) { delete rootProject.buildDir }
          EOF

          # app/build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace '$PACKAGE_NAME'
              compileSdk 34
              defaultConfig {
                  applicationId '$PACKAGE_NAME'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              buildFeatures { viewBinding true }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: 🔍 Validate Project Files
        run: |
          echo "=== MainActivity package line ==="
          head -1 app/src/main/java/$(echo $PACKAGE_NAME | tr '.' '/')/MainActivity.java
          echo "=== Manifest package ==="
          grep 'package=' app/src/main/AndroidManifest.xml
          echo "=== build.gradle namespace ==="
          grep 'namespace' app/build.gradle

      - name: 📦 Build Debug APK
        run: |
          ./gradlew clean assembleDebug --stacktrace

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-Build
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
