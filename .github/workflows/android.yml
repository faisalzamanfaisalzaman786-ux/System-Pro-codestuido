      - name: Create Missing Project Files
        run: |
          # 1. ضروری فولڈرز کی موجودگی یقینی بنانا
          mkdir -p app
          mkdir -p gradle/wrapper

          # 2. gradle-wrapper.properties (اگر غائب ہے)
          if [ ! -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          fi

          # 3. JAR فائل ڈاؤن لوڈ کرنا (اگر غائب ہو)
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            curl -L https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          fi

          # 4. Settings File (تاکہ پاتھ صحیح رہے)
          echo "include ':app'" > settings.gradle

          # 5. ایپ لیول build.gradle کو فکس کرنا (یہ سب سے اہم ہے)
          # ہم ایک نیا build.gradle بنائیں گے جو آپ کے پرانے ایررز (Realm اور SDK) کو ختم کر دے گا
          echo "plugins {
              id 'com.android.application' version '8.2.2'
          }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.system.pro'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              sourceSets {
                  main {
                      manifest.srcFile '../src/main/AndroidManifest.xml'
                      java.srcDirs = ['../src/main/java']
                      res.srcDirs = ['../src/main/res']
                      assets.srcDirs = ['../src/main/assets']
                  }
              }
          }" > app/build.gradle
