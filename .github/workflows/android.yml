name: System Pro HTML Interface

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Initialize Project Structure
        run: |
          # مکمل صفائی تاکہ پرانے بلڈز کا اثر نہ رہے
          rm -rf app build settings.gradle build.gradle gradlew
          
          # ضروری فولڈرز بنانا
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets

          # 1. Base64 سے ایپ کا آئیکن بنانا (یہاں اپنا Base64 کوڈ ڈالیں)
          # میں نے ایک نمونہ ڈالا ہے، اسے اپنے اصل Base64 سے بدل دیں
          echo "iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAAAAACPAi4CAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAB3RJTUUH6AMXFRow7pZ9VwAAADJJREFUeNpjYBgFo2AUjIJRMApGwSgYBaNgFAy8AAYG6gE9oIDhP8IDBoYRDAYpGAV0AQC9OQH/p4at7wAAAABJRU5ErkJggg==" | base64 -d > app/src/main/res/mipmap-mdpi/ic_launcher.png

          # 2. آپ کا HTML کوڈ (ایپ کا انٹرفیس)
          echo "<!DOCTYPE html><html><body style='background-color:#000;color:#ff1493;text-align:center;font-family:sans-serif;'>
                <h1 style='color:#39ff14;'>System Pro Master</h1>
                <p>HTML Interface is Live!</p>
                <div style='border:2px solid #39ff14;padding:20px;margin:20px;border-radius:15px;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);'>
                Glassmorphism Effect Active
                </div>
                </body></html>" > app/src/main/assets/index.html

          # 3. MainActivity.java (WebView سیٹنگز)
          echo "package com.system.pro;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = new WebView(this);
                  setContentView(webView);
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl(\"file:///android_asset/index.html\");
              }
          }" > app/src/main/java/com/system/pro/MainActivity.java

          # 4. AndroidManifest.xml (LAUNCHER اور پرمیشنز)
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.system.pro">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="System Pro Master"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          # 5. Gradle اور Settings (درست ترتیب کے ساتھ)
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = 'System Pro Master'
          include ':app'" > settings.gradle

          echo "plugins { id 'com.android.application' version '8.2.2' apply false }" > build.gradle
          
          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.system.pro.master'
                  minSdk 24
                  targetSdk 34
                  versionCode 765
                  versionName '1.0.765'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }" > app/build.gradle

          gradle wrapper --gradle-version 8.2

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Final-Interface
          path: app/build/outputs/apk/debug/*.apk
