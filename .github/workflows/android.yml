name: System Pro Ultimate Auto-Downloader
on:
  workflow_dispatch:
    inputs:
      firebase_url:
        description: 'Firebase Realtime DB URL'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Start Notification
        run: |
          curl -X PATCH "${{ github.event.inputs.firebase_url }}" \
          -d '{"msg": "🚀 Build Started: Preparing Environment...", "progress": 10, "is_error": false}'

      - name: 2. Checkout Code
        uses: actions/checkout@v4

      - name: 3. Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 4. Build APK with Gradle
        run: |
          curl -X PATCH "${{ github.event.inputs.firebase_url }}" -d '{"msg": "⚙️ Compiling Resources & Java...", "progress": 50}'
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 5. Generate Download Link & Notify
        if: success()
        run: |
          # یہاں ہم GitHub Artifact کا لنک یا عارضی ٹرانسفر لنک بنا رہے ہیں
          APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          
          # آپ کی ایپ کو فائنل سگنل اور ڈاؤن لوڈ لنک بھیجنا
          curl -X PATCH "${{ github.event.inputs.firebase_url }}" \
          -d '{"msg": "✅ Success! APK Generated.", "progress": 100, "is_error": false, "download_ready": true}'

      - name: 6. Upload Artifact to GitHub
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Release-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: 7. Handle Failure
        if: failure()
        run: |
          curl -X PATCH "${{ github.event.inputs.firebase_url }}" \
          -d '{"msg": "❌ Build Failed! Check your code syntax.", "progress": 0, "is_error": true}'
