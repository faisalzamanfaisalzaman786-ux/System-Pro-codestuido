name: System Pro Official Build
on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  official-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gemini Search & Supply Engine (Gradle 9.4.1 Optimization)
        run: |
          # 1. ڈائنامک پاتھ اور پیکج کی تیاری
          RAW_PKG="${{ github.event.client_payload.package_name }}"
          PKG=${RAW_PKG:-"com.system.pro"}
          PKG_PATH=$(echo $PKG | tr '.' '/')
          
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 2. جیمنائی ڈیوٹی: جدید ترین گریڈل ریسورسز کی سپلائی
          # 9.4.1 کے لیے ضروری Namespace اور Build Features کو انٹیگریٹ کرنا
          echo "android.namespace = '$PKG'" > gradle.properties
          echo "android.useAndroidX = true" >> gradle.properties
          echo "android.enableJetifier = true" >> gradle.properties

          # 3. جاوا فائل کی درستگی (پیکج اور R امپورٹ کا تحفظ)
          echo "${{ github.event.client_payload.java_b64 }}" | base64 -d > raw_java.java
          echo "package $PKG;" > app/src/main/java/$PKG_PATH/MainActivity.java
          echo "import $PKG.R;" >> app/src/main/java/$PKG_PATH/MainActivity.java
          grep -v "package " raw_java.java >> app/src/main/java/$PKG_PATH/MainActivity.java

          # 4. ریسورسز کی درست میپنگ
          echo "${{ github.event.client_payload.xml_b64 }}" | base64 -d > app/src/main/res/layout/activity_main.xml
          echo "${{ github.event.client_payload.manifest_b64 }}" | base64 -d > app/src/main/AndroidManifest.xml
          
          # 5. آفیشل تھیم سپلائی (کریش پروٹیکشن)
          echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.AppCompat.Light.DarkActionBar" parent="Theme.AppCompat.Light"/></resources>' > app/src/main/res/values/styles.xml

      - name: Build Official APK
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # فورسڈ 9.4.1 انجن ایکٹیویشن
          gradle wrapper --gradle-version 9.4.1 --distribution-type bin
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload System Pro APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name || 'System-Pro-9.4.1-Build' }}
          path: "app/build/outputs/apk/debug/*.apk"
