name: System Pro Ultimate Repair

on:
  workflow_dispatch:

jobs:
  repair-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Total Project Reconstruct
        run: |
          # تمام پرانے کنفگریشنز کو ختم کرنا
          rm -rf app/src/main/res app/src/main/java build.gradle settings.gradle app/build.gradle
          
          # نیا اسٹرکچر بنانا
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/java/com/systempro/master

          # 1. settings.gradle (ایرر کو حل کرنے کے لیے سب سے اہم)
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "System Pro Master"
          include ':app'
          EOF

          # 2. Root build.gradle (خالی رکھنا ضروری ہے نئے گریڈل میں)
          cat <<EOF > build.gradle
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          # 3. app/build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.systempro.master'
              compileSdk 34
              defaultConfig {
                  applicationId "com.systempro.master"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

          # 4. AndroidManifest.xml
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher_repair"
                  android:label="System Pro"
                  android:theme="@android:style/Theme.Material.Light.NoActionBar">
                  <activity android:name="com.systempro.master.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. MainActivity.java & Layout
          cat <<EOF > app/src/main/java/com/systempro/master/MainActivity.java
          package com.systempro.master;
          import android.app.Activity;
          import android.os.Bundle;
          public class MainActivity extends Activity {
              protected void onCreate(Bundle s) { super.onCreate(s); setContentView(new android.view.View(this)); }
          }
          EOF

          cat <<EOF > app/src/main/res/drawable/ic_launcher_repair.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#008577" android:pathData="M0,0h108v108h-108z" />
          </vector>
          EOF

      - name: Build Repaired APK
        run: |
          chmod +x gradlew || gradle wrapper --gradle-version 8.2
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Master-APK
          path: app/build/outputs/apk/debug/app-debug.apk
