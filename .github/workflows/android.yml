name: System Pro Smart Builder
on:
  push:
  workflow_dispatch:

jobs:
  arrange-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Auto-Repair Project Structure
        run: |
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          # Move files if they exist in root
          find . -maxdepth 1 -name "*.java" -exec mv {} app/src/main/java/com/system/pro/ \;
          find . -maxdepth 1 -name "*.xml" -not -name "AndroidManifest.xml" -exec mv {} app/src/main/res/layout/ \;

          # Create settings.gradle
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = 'System-Pro'" > settings.gradle

          # Create build.gradle
          echo "plugins { id 'com.android.application' version '8.2.2' }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig { applicationId 'com.system.pro'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' }
          }" > build.gradle

          # Create basic Manifest if missing
          if [ ! -f "app/src/main/AndroidManifest.xml" ]; then
            echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.system.pro"><application android:label="System Pro"></application></manifest>' > app/src/main/AndroidManifest.xml
          fi

      - name: Setup Gradle
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon
