name: System Pro Ultimate Builder

on:
  # 1. بیرونی ایپ (App) سے ٹرگر کرنے کے لیے
  repository_dispatch:
    types: [build_apk]

  # 2. گٹ ہب سے مینوئل (Manual) چیک کرنے کے لیے
  workflow_dispatch:

# 🔐 ٹرگر کو فعال کرنے کے لیے ضروری پرمیشنز
permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🔄 PROCESS TRIGGER
        id: trigger
        run: |
          # پے لوڈ سے ڈیٹا حاصل کرنا
          PKG="${{ github.event.client_payload.package_name }}"
          APP="${{ github.event.client_payload.app_name }}"
          
          # اگر ڈیٹا نہ ملے تو ڈیفالٹ سیٹ کرنا
          [[ -z "$PKG" ]] && PKG="com.systempro.app"
          [[ -z "$APP" ]] && APP="SystemPro"
          
          # رینڈم پیکج بنانا تاکہ اینڈرائیڈ اسے نئی ایپ مانے
          RAND=$((RANDOM % 10000))
          FINAL_PKG="${PKG}.v${RAND}"
          
          echo "pkg=$FINAL_PKG" >> $GITHUB_OUTPUT
          echo "app=$APP" >> $GITHUB_OUTPUT
          echo "path=$(echo $FINAL_PKG | tr '.' '/')" >> $GITHUB_OUTPUT
          
          echo "✅ Trigger Received for: $FINAL_PKG"

      # --- باقی تمام سٹیپس (CLEAN, DIRS, MANIFEST, BUILD) جو آپ نے دیے تھے ویسے ہی رہیں گے ---

      - name: 🧹 CLEAN
        run: rm -rf app/src/main/java/* app/src/main/res/* app/build

      - name: 📁 DIRS
        run: mkdir -p "app/src/main/java/${{ steps.trigger.outputs.path }}" app/src/main/res/layout app/src/main/res/values

      - name: 🔨 BUILD
        run: |
          # اگر گریڈل فائل موجود نہیں تو بنانا (Safe Step)
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-build-cache

      - name: 📤 UPLOAD
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ steps.trigger.outputs.pkg }}
          path: app/build/outputs/apk/debug/*.apk
