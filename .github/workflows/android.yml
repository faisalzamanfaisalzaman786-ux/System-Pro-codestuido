name: System Pro Official Build
on:
  push:
  workflow_dispatch:

jobs:
  # جاب 1: فزیکل ڈیلیشن اور آفیشل لاکنگ
  clean-and-setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force Clean (جڑ سے صفائی)
        run: |
          # 1. تمام فائلیں اور فولڈرز (سوائے .git اور .github) کو زبردستی ڈیلیٹ کرنا
          rm -rf app src build gradle .gradle settings.gradle build.gradle gradlew gradlew.bat
          
          # 2. گٹ کی تمام غیر ٹریک شدہ فائلوں کو صاف کرنا
          git clean -fdx
          
          # 3. آفیشل ڈائریکٹریز بنانا
          mkdir -p gradle/wrapper app/src/main/java/com/system/pro app/src/main/res/values app/src/main/res/layout

      - name: Create Official Structure
        run: |
          # settings.gradle
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { 
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() } 
          }
          rootProject.name = 'System-Pro'
          include ':app'" > settings.gradle

          # build.gradle (Root)
          echo "plugins { id 'com.android.application' version '8.4.0' apply false }" > build.gradle

          # app/build.gradle
          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.system.pro'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }" > app/build.gradle

          # Manifest & Java
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          echo "package com.system.pro;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }" > app/src/main/java/com/system/pro/MainActivity.java

      - name: Force Push Clean Repository
        run: |
          git config --global user.name "Faisal Zaman"
          git config --global user.email "faisal@example.com"
          git add -A
          git commit -m "CLEAN: Physical removal of all legacy build files" || echo "No changes"
          git push --force

  # جاب 2: آفیشل کلین بلڈ
  official-build:
    needs: clean-and-setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Fresh
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Official Build
        run: |
          # گریڈل ریپر بنانا اور بلڈ چلانا
          gradle wrapper --gradle-version 9.4.1
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V141-Clean
          path: "app/build/outputs/apk/debug/*.apk"
