name: System Pro AI Build Engine

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-app, build-from-zip]

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: "System Pro Build Engine (Locked 8.5)"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Workspace & Payload Setup
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.system.pro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout

          # پے لوڈ نکالنا
          echo "${{ github.event.client_payload.java_b64 }}" | base64 -d > temp_main.java || touch temp_main.java
          echo "${{ github.event.client_payload.xml_b64 }}" | base64 -d > temp_layout.xml || touch temp_layout.xml
          echo "${{ github.event.client_payload.manifest_b64 }}" | base64 -d > temp_manifest.xml || touch temp_manifest.xml

          # پائتھون سے خودکار صفائی
          python3 -c "
          import os, re
          def clean_xml(f_in, f_out):
              if not os.path.exists(f_in) or os.stat(f_in).st_size == 0: return
              with open(f_in, 'r', encoding='utf-8', errors='ignore') as f:
                  c = f.read().strip()
              if '<?xml' in c: c = c[c.find('<?xml'):]
              c = re.sub(r'<style.*?>.*?</style>', '', c, flags=re.DOTALL)
              with open(f_out, 'w', encoding='utf-8') as f: f.write(c)

          clean_xml('temp_layout.xml', 'app/src/main/res/layout/activity_main.xml')
          clean_xml('temp_manifest.xml', 'app/src/main/AndroidManifest.xml')
          "

          # جاوا انجکشن
          if [ -s temp_main.java ]; then
            {
              echo "package $PKG_NAME;"
              echo "import $PKG_NAME.R;"
              sed '/package /d' temp_main.java | sed '/import .*R;/d'
            } > app/src/main/java/$PKG_PATH/MainActivity.java
          fi

      - name: Force Lock Gradle 8.5
        run: |
          # گریڈل ریپر کو زبردستی 8.5 پر لاک کرنا
          mkdir -p gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          
          chmod +x gradlew

      - name: Execute Build (8.5)
        run: |
          ./gradlew clean assembleDebug \
            -PdynamicPackage="${{ github.event.client_payload.package_name || 'com.system.pro' }}" \
            --no-daemon --stacktrace

      - name: Upload Success APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-V1400-Final
          path: app/build/outputs/apk/debug/*.apk
