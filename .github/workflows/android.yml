name: Build System Pro APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # اس سے آپ مینوئل TRIGGER بٹن استعمال کر سکیں گے

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5 # مستحکم ورژن جو ایرر کو روکتا ہے

    - name: Grant execute permission for gradlew
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        fi

    - name: Build APK with Gradle
      run: |
        if [ -f gradlew ]; then
          ./gradlew assembleDebug
        else
          gradle assembleDebug
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SystemPro-Calculator-APK
        path: app/build/outputs/apk/debug/app-debug.apk
