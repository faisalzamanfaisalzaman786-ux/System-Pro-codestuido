name: System Pro APK Builder

on:
  workflow_dispatch:
    inputs:
      file_content:
        description: 'Base64 JSON with package and files'
        required: true
        type: string

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode input
        run: |
          echo '${{ github.event.inputs.file_content }}' | base64 --decode > request.json
          PACKAGE=$(jq -r '.package' request.json)
          echo "PACKAGE=$PACKAGE" >> $GITHUB_ENV
          echo "Package: $PACKAGE"

      - name: Create Android project
        run: |
          # Gradle wrapper
          mkdir -p gradle/wrapper
          curl -s -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.10.2/gradle/wrapper/gradle-wrapper.jar
          curl -s -o gradle/wrapper/gradle-wrapper.properties https://raw.githubusercontent.com/gradle/gradle/v8.10.2/gradle/wrapper/gradle-wrapper.properties
          curl -s -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.10.2/gradlew
          chmod +x gradlew

          # Java directory
          JAVA_DIR="app/src/main/java/$(echo $PACKAGE | tr '.' '/')"
          mkdir -p $JAVA_DIR
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values

          # settings.gradle
          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "MyApp"
          include ':app'
          EOF

          # app/build.gradle (درست شدہ)
          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace System.getenv('PACKAGE')
              compileSdk 34

              defaultConfig {
                  applicationId System.getenv('PACKAGE')
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
          }
          EOF

          # strings.xml
          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">System Pro</string>
          </resources>
          EOF

          # themes.xml
          cat > app/src/main/res/values/themes.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">#f97316</item>
                  <item name="colorPrimaryDark">#c2410c</item>
                  <item name="colorAccent">#f97316</item>
              </style>
          </resources>
          EOF

          # proguard
          touch app/proguard-rules.pro

      - name: Place user files
        run: |
          JAVA_DIR="app/src/main/java/$(echo $PACKAGE | tr '.' '/')"
          
          # Java file - پیکیج خودکار تبدیل
          echo "$(jq -r '.files["MainActivity.java"]' request.json)" | sed "s/package .*;/package $PACKAGE;/" > $JAVA_DIR/MainActivity.java
          
          # Layout file
          echo "$(jq -r '.files["activity_main.xml"]' request.json)" > app/src/main/res/layout/activity_main.xml
          
          # Manifest file - پیکیج تبدیل
          MANIFEST="$(jq -r '.files["AndroidManifest.xml"]' request.json)"
          MANIFEST=$(echo "$MANIFEST" | sed "s/package=\".*\"/package=\"$PACKAGE\"/")
          echo "$MANIFEST" > app/src/main/AndroidManifest.xml
          
          # Icon if present
          if jq -e '.files["icon.png"]' request.json >/dev/null; then
            echo "$(jq -r '.files["icon.png"]' request.json)" | base64 --decode > app/src/main/res/drawable/icon.png
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        id: build
        continue-on-error: true
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "❌ Build failed. Last 50 lines:"
            tail -50 build.log
            exit 1
          fi

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log

      - name: Upload APK (if exists)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
