name: Android APK Builder

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Process Base64 Payload and Build
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          PACKAGE_NAME=$(echo "$PAYLOAD" | jq -r '.package_name // "com.system.pro"')
          PKG_PATH=$(echo "$PACKAGE_NAME" | tr '.' '/')
          
          # تمام ضروری فولڈرز بنانا
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p gradle/wrapper

          # 1. Java Reconstruction (With Forced Imports)
          echo "$PAYLOAD" | jq -r '.java_b64' | base64 -d > raw_java.txt
          sed -i '/package /d' raw_java.txt
          sed -i '/import .*R;/d' raw_java.txt
          {
            echo "package $PACKAGE_NAME;"
            echo "import $PACKAGE_NAME.R;"
            echo "import androidx.core.content.ContextCompat;"
            cat raw_java.txt
          } > app/src/main/java/$PKG_PATH/MainActivity.java

          # 2. XML Layout
          echo "$PAYLOAD" | jq -r '.xml_b64' | base64 -d > app/src/main/res/layout/activity_main.xml

          # 3. Colors.xml (تمام لاپتہ رنگوں کا اضافہ)
          cat <<EOF > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg_dark">#0F0F0F</color>
              <color name="neon_blue">#00BFFF</color>
              <color name="neon_green">#00FF00</color>
              <color name="glass_white_10">#1AFFFFFF</color>
              <color name="glass_white_30">#4DFFFFFF</color>
              <color name="error_red">#FF4444</color>
              <color name="colorAccent">#FF9800</color>
              <color name="warning_orange">#FFA500</color>
              <color name="colorPrimaryDark">#000000</color>
              <color name="colorPrimary">#00BFFF</color>
          </resources>
          EOF

          # 4. Manifest Fix (Removing old package tags)
          echo "$PAYLOAD" | jq -r '.manifest_b64' | base64 -d > app/src/main/AndroidManifest.xml
          sed -i 's/package="[^"]*"//g' app/src/main/AndroidManifest.xml

          # 5. Build Logic & Clean Cache
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.1-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-build-cache --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V840
          path: app/build/outputs/apk/debug/*.apk
