name: System Pro APK Builder

on:
  workflow_dispatch:
    inputs:
      file_content:
        description: 'Code from App'
        required: false
        default: ''
      app_index:
        description: 'Unique ID'
        required: false
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ Auto-Fix & Clean
        run: |
          chmod +x gradlew || true
          # تمام فائلوں سے ونڈوز کریکٹرز صاف کریں
          find . -type f \( -name "*.java" -o -name "*.xml" -o -name "*.gradle" \) -exec sed -i 's/\r$//' {} +
          ./gradlew clean

      - name: 🚀 Build Unique APK
        run: ./gradlew assembleDebug --no-daemon

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Build
          path: app/build/outputs/apk/debug/*.apk
