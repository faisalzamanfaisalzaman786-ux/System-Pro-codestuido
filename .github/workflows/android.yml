name: System Pro Single Build

on:
  workflow_dispatch: # آپ اسے دستی طور پر رن کر سکیں گے

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Permission and Sync
        run: |
          # اگر فائل موجود ہے تو پرمیشن دیں، ورنہ ایرر بتائے
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          else
            echo "Error: gradlew file not found in root directory!"
            exit 1
          fi

      - name: Build Main APK
        # یہ کمانڈ صرف ایک مین ڈیبگ APK بنائے گی
        run: ./gradlew assembleDebug

      - name: Upload Single Artifact
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Master-Build
          path: app/build/outputs/apk/debug/*.apk
