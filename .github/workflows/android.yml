name: System Pro Official Build
on:
  push:
  workflow_dispatch:

jobs:
  # جاب 1: مکمل صفائی اور آفیشل اسٹرکچر لاک کرنا
  clean-and-setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Physical Purge (فزیکلی ہر پرانی چیز ختم)
        run: |
          # 1. ہر وہ فائل مٹائیں جو آفیشل نہیں ہے
          rm -rf app src build gradle .gradle settings.gradle build.gradle gradlew gradlew.bat
          git clean -fdx
          
          # 2. آفیشل ڈائریکٹریز دوبارہ بنانا
          mkdir -p gradle/wrapper app/src/main/java/com/system/pro app/src/main/res/values app/src/main/res/layout

      - name: Create Clean Official Files
        run: |
          # settings.gradle
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { 
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() } 
          }
          rootProject.name = 'System-Pro'
          include ':app'" > settings.gradle

          # build.gradle (Root)
          echo "plugins { id 'com.android.application' version '8.4.0' apply false }" > build.gradle

          # app/build.gradle (صرف جدید فائلیں، پرانی فائلوں کا مکمل خاتمہ)
          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.system.pro'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              
              # گریڈل کو حکم دینا کہ وہ کسی پرانی (Legacy) فائل کو بلڈ میں شامل نہ کرے
              configurations.all {
                  exclude group: 'androidx.legacy'
                  exclude group: 'androidx.lifecycle', module: 'lifecycle-extensions'
              }
          }
          dependencies {
              // صرف وہ ورژنز جو آپس میں ٹکراتے نہیں ہیں
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }" > app/build.gradle

          # Manifest & Java
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          echo "package com.system.pro;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }" > app/src/main/java/com/system/pro/MainActivity.java

      - name: Force Push Official Cleanup
        run: |
          git config --global user.name "Faisal Zaman"
          git config --global user.email "faisal@example.com"
          git add -A
          git commit -m "TOTAL CLEAN: Removed all legacy artifacts and locked structure" || echo "No changes"
          git push --force

  # جاب 2: آفیشل بلڈ
  official-build:
    needs: clean-and-setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Clean
        uses: actions/checkout@v4
        with:
          ref: main

      - name: JDK 17 Setup
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Official APK
        run: |
          # سسٹم کے پرانے گریڈل کو مکمل نظر انداز کر کے نیا بنانا
          gradle wrapper --gradle-version 9.4.1
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V142-Pure
          path: "app/build/outputs/apk/debug/*.apk"
