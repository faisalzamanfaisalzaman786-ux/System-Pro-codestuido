name: System Pro Dynamic Build
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package Name'
        required: true
        default: 'com.systempro.test'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Initialize Dynamic Structure
        run: |
          # پیکیج نیم کو فولڈر پاتھ میں تبدیل کرنا (مثال: com.a.b -> com/a/b)
          PKG_NAME="${{ github.event.inputs.package_name }}"
          PKG_PATH=$(echo $PKG_NAME | tr '.' '/')
          
          mkdir -p app/src/main/java/$PKG_PATH/
          mkdir -p app/src/main/res/layout/

          # Settings.gradle
          echo "rootProject.name = 'SystemProDynamic'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          # App Build.gradle (Dynamic Namespace)
          echo "plugins { id 'com.android.application' }
          android {
              namespace '$PKG_NAME'
              compileSdk 34
              defaultConfig {
                  applicationId '$PKG_NAME'
                  minSdk 24
                  targetSdk 34
              }
          }" > app/build.gradle

          # MainActivity.java (Dynamic Package Line)
          echo "package $PKG_NAME;
          import android.app.Activity;
          import android.os.Bundle;
          public class MainActivity extends Activity {
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
              }
          }" > app/src/main/java/$PKG_PATH/MainActivity.java

          # AndroidManifest.xml
          echo "<manifest xmlns:android='http://schemas.android.com/apk/res/android'>
              <application android:label='System Pro'>
                  <activity android:name='.MainActivity' android:exported='true'>
                      <intent-filter>
                          <action android:name='android.intent.action.MAIN' />
                          <category android:name='android.intent.category.LAUNCHER' />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>" > app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.package_name }}-APK
          path: app/build/outputs/apk/debug/*.apk
