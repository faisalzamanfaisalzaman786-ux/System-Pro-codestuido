name: System Pro APK Builder

on:
  workflow_dispatch:
    inputs:
      file_content:
        description: 'Encoded JSON payload'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Decode and Prepare Project
        run: |
          # Payload decode
          echo "${{ github.event.inputs.file_content }}" | base64 -d > payload.json
          
          # Extract Base Package
          BASE_PKG=$(jq -r '.package' payload.json)
          # Create unique package for multi-install (timestamp based)
          UNIQUE_PKG="${BASE_PKG}.v$(date +%s)"
          echo "UNIQUE_PKG=$UNIQUE_PKG" >> $GITHUB_ENV
          
          # Create Directories
          PKG_PATH=$(echo $UNIQUE_PKG | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          
          # Extract Files
          jq -r '.files["MainActivity.java"]' payload.json > app/src/main/java/$PKG_PATH/MainActivity.java
          jq -r '.files["activity_main.xml"]' payload.json > app/src/main/res/layout/activity_main.xml
          jq -r '.files["AndroidManifest.xml"]' payload.json > app/src/main/AndroidManifest.xml
          
          # Inject Unique Package Name
          sed -i "s/$BASE_PKG/$UNIQUE_PKG/g" app/src/main/AndroidManifest.xml
          sed -i "s/package $BASE_PKG/package $UNIQUE_PKG/g" app/src/main/java/$PKG_PATH/MainActivity.java

      - name: Setup Gradle Environment
        run: |
          # Create settings.gradle
          echo "include ':app'" > settings.gradle
          
          # Project build.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.1' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # App build.gradle (API 34 Support)
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace '${{ env.UNIQUE_PKG }}'
              compileSdk 34
              defaultConfig {
                  applicationId "${{ env.UNIQUE_PKG }}"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0-Pro"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: Build with Gradle 8.2
        run: |
          gradle wrapper --gradle-version 8.2
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.UNIQUE_PKG }}-release
          path: app/build/outputs/apk/release/*.apk

      - name: Log Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-report
          path: app/build/reports/
