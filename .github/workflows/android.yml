name: System Pro Triple-Clean Builder

on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🔄 PROCESS PAYLOAD FROM APP
        id: payload
        run: |
          # App سے آنے والا ڈیٹا حاصل کریں
          PKG_NAME="${{ github.event.client_payload.package_name }}"
          APP_NAME="${{ github.event.client_payload.app_name }}"
          JAVA_CODE="${{ github.event.client_payload.java_code }}"
          LAYOUT_CODE="${{ github.event.client_payload.layout_code }}"
          
          # ڈیٹا چیک کریں
          if [[ -z "$PKG_NAME" ]]; then
            PKG_NAME="com.systempro.app"
          fi
          
          if [[ -z "$APP_NAME" ]]; then
            APP_NAME="SystemPro"
          fi
          
          # پیکج پاتھ بنائیں
          PKG_PATH=$(echo $PKG_NAME | sed 's/\./\//g')
          
          # ایک منفرد بلڈ آئی ڈی بنائیں
          RANDOM_DIGITS=$((100000 + RANDOM % 900000))
          FINAL_PKG="${PKG_NAME}.build${RANDOM_DIGITS}"
          FINAL_APP="${APP_NAME} (Build ${RANDOM_DIGITS})"
          FINAL_PATH=$(echo $FINAL_PKG | sed 's/\./\//g')
          
          # آؤٹ پٹ میں سیو کریں
          echo "original_pkg=$PKG_NAME" >> $GITHUB_OUTPUT
          echo "original_app=$APP_NAME" >> $GITHUB_OUTPUT
          echo "final_pkg=$FINAL_PKG" >> $GITHUB_OUTPUT
          echo "final_app=$FINAL_APP" >> $GITHUB_OUTPUT
          echo "pkg_path=$PKG_PATH" >> $GITHUB_OUTPUT
          echo "final_path=$FINAL_PATH" >> $GITHUB_OUTPUT
          echo "random_digits=$RANDOM_DIGITS" >> $GITHUB_OUTPUT
          echo "java_code=$JAVA_CODE" >> $GITHUB_OUTPUT
          echo "layout_code=$LAYOUT_CODE" >> $GITHUB_OUTPUT
          
          # ڈیبگ معلومات
          echo "════════════════════════════════════════════"
          echo "📱 APP TRIGGER RECEIVED"
          echo "════════════════════════════════════════════"
          echo "Original Package: $PKG_NAME"
          echo "Original App Name: $APP_NAME"
          echo "Final Package: $FINAL_PKG"
          echo "Final App Name: $FINAL_APP"
          echo "Random Digits: $RANDOM_DIGITS"
          echo "Java Code Provided: $([[ -n "$JAVA_CODE" ]] && echo "YES" || echo "NO")"
          echo "Layout Code Provided: $([[ -n "$LAYOUT_CODE" ]] && echo "YES" || echo "NO")"
          echo "════════════════════════════════════════════"

      - name: 🧹 TRIPLE-CLEAN & RESET
        run: |
          echo "📁 Step 1: Triple-Clean starting..."
          
          # پہلا کلین: جاوا فولڈرز
          echo "  → Cleaning Java directories"
          rm -rf app/src/main/java/*
          
          # دوسرا کلین: ریزورسز
          echo "  → Cleaning Resources"
          rm -rf app/src/main/res/layout/*
          rm -rf app/src/main/res/values/*
          rm -rf app/src/main/res/drawable/*
          rm -rf app/src/main/res/mipmap*
          
          # تیسرا کلین: بلڈ فائلز
          echo "  → Cleaning Build files"
          rm -rf app/build
          rm -rf .gradle
          
          # نیا سٹرکچر بنائیں
          echo "📁 Creating new structure"
          mkdir -p "app/src/main/java/${{ steps.payload.outputs.final_path }}"
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/xml
          
          echo "✅ Triple-Clean complete"

      - name: 📝 CREATE BASE FILES
        run: |
          APP_NAME="${{ steps.payload.outputs.final_app }}"
          BUILD_ID="${{ steps.payload.outputs.random_digits }}"
          
          # strings.xml
          cat > app/src/main/res/values/strings.xml << EOF
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="app_name">$APP_NAME</string>
    <string name="build_id">$BUILD_ID</string>
</resources>
EOF
          
          # colors.xml
          cat > app/src/main/res/values/colors.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <color name="purple_500">#FF6200EE</color>
    <color name="purple_700">#FF3700B3</color>
    <color name="teal_200">#FF03DAC5</color>
    <color name="white">#FFFFFFFF</color>
    <color name="black">#FF000000</color>
</resources>
EOF
          
          # themes.xml
          cat > app/src/main/res/values/themes.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
        <item name="colorPrimary">@color/purple_500</item>
        <item name="colorPrimaryDark">@color/purple_700</item>
        <item name="colorAccent">@color/teal_200</item>
    </style>
</resources>
EOF
          
          # XML files
          echo '<?xml version="1.0" encoding="utf-8"?><full-backup-content/>' > app/src/main/res/xml/backup_rules.xml
          echo '<?xml version="1.0" encoding="utf-8"?><data-extraction-rules><cloud-backup/></data-extraction-rules>' > app/src/main/res/xml/data_extraction_rules.xml
          
          echo "✅ Base files created"

      - name: 📄 CREATE ANDROID MANIFEST
        run: |
          PKG_NAME="${{ steps.payload.outputs.final_pkg }}"
          
          cat > app/src/main/AndroidManifest.xml << EOF
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="$PKG_NAME">
    
    <uses-permission android:name="android.permission.INTERNET" />
    
    <application
        android:allowBackup="true"
        android:dataExtractionRules="@xml/data_extraction_rules"
        android:fullBackupContent="@xml/backup_rules"
        android:icon="@mipmap/ic_launcher"
        android:label="@string/app_name"
        android:roundIcon="@mipmap/ic_launcher_round"
        android:supportsRtl="true"
        android:theme="@style/AppTheme">
        
        <activity
            android:name=".MainActivity"
            android:exported="true"
            android:label="@string/app_name">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
    </application>
</manifest>
EOF
          echo "✅ AndroidManifest.xml created"

      - name: ☕ CREATE MAIN ACTIVITY
        run: |
          PKG_NAME="${{ steps.payload.outputs.final_pkg }}"
          FINAL_PATH="${{ steps.payload.outputs.final_path }}"
          JAVA_CODE="${{ steps.payload.outputs.java_code }}"
          
          JAVA_FILE="app/src/main/java/$FINAL_PATH/MainActivity.java"
          
          # اگر app نے کوڈ بھیجا ہے تو استعمال کریں
          if [[ -n "$JAVA_CODE" && "$JAVA_CODE" != "" ]]; then
            echo "📝 Using Java code from app"
            echo "$JAVA_CODE" | base64 --decode > "$JAVA_FILE" 2>/dev/null || {
              echo "⚠️ Base64 decode failed, using default"
              JAVA_CODE=""
            }
          fi
          
          # ڈیفالٹ کوڈ
          if [[ -z "$JAVA_CODE" || ! -f "$JAVA_FILE" ]]; then
            echo "📝 Creating default MainActivity"
            cat > "$JAVA_FILE" << 'EOF'
package PKG_NAME_PLACEHOLDER;

import android.os.Bundle;
import android.widget.TextView;
import androidx.appcompat.app.AppCompatActivity;

public class MainActivity extends AppCompatActivity {
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);
        
        TextView textView = findViewById(R.id.textView);
        textView.setText(getString(R.string.app_name) + 
                        "\nBuild ID: " + getString(R.string.build_id));
    }
}
EOF
          fi
          
          # پیکج نام درست کریں
          sed -i "s/PKG_NAME_PLACEHOLDER/$PKG_NAME/g" "$JAVA_FILE"
          
          # R import شامل کریں
          if ! grep -q "import $PKG_NAME.R;" "$JAVA_FILE"; then
            sed -i "/package $PKG_NAME;/a import $PKG_NAME.R;" "$JAVA_FILE"
          fi
          
          echo "✅ MainActivity.java created"

      - name: 🎨 CREATE LAYOUT
        run: |
          LAYOUT_CODE="${{ steps.payload.outputs.layout_code }}"
          LAYOUT_FILE="app/src/main/res/layout/activity_main.xml"
          
          # اگر app نے لے آؤٹ بھیجا ہے تو استعمال کریں
          if [[ -n "$LAYOUT_CODE" && "$LAYOUT_CODE" != "" ]]; then
            echo "📝 Using Layout code from app"
            echo "$LAYOUT_CODE" | base64 --decode > "$LAYOUT_FILE" 2>/dev/null || {
              echo "⚠️ Base64 decode failed, using default"
              LAYOUT_CODE=""
            }
          fi
          
          # ڈیفالٹ لے آؤٹ
          if [[ -z "$LAYOUT_CODE" || ! -f "$LAYOUT_FILE" ]]; then
            echo "📝 Creating default layout"
            cat > "$LAYOUT_FILE" << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent"
    android:layout_height="match_parent"
    android:orientation="vertical"
    android:gravity="center"
    android:padding="20dp">
    
    <TextView
        android:id="@+id/textView"
        android:layout_width="wrap_content"
        android:layout_height="wrap_content"
        android:textSize="24sp"
        android:textColor="#6200EE"
        android:textStyle="bold"
        android:gravity="center" />
    
</LinearLayout>
EOF
          fi
          
          echo "✅ activity_main.xml created"

      - name: ⚙️ CREATE GRADLE FILES
        run: |
          PKG_NAME="${{ steps.payload.outputs.final_pkg }}"
          
          # settings.gradle
          cat > settings.gradle << 'EOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}
rootProject.name = "SystemPro"
include ':app'
EOF
          
          # build.gradle (project)
          cat > build.gradle << 'EOF'
plugins {
    id 'com.android.application' version '8.1.0' apply false
}
EOF
          
          # app/build.gradle
          cat > app/build.gradle << EOF
plugins {
    id 'com.android.application'
}

android {
    namespace '$PKG_NAME'
    compileSdk 34
    
    defaultConfig {
        applicationId '$PKG_NAME'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
}
EOF
          
          # gradle.properties
          cat > gradle.properties << 'EOF'
org.gradle.jvmargs=-Xmx2048m
android.useAndroidX=true
android.enableJetifier=true
EOF
          
          # gradle-wrapper.properties
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
          
          echo "✅ Gradle files created"

      - name: 🏗️ SETUP GRADLE WRAPPER
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.4
          fi
          chmod +x gradlew

      - name: 🔨 BUILD APK
        run: |
          echo "🏗️ Building APK..."
          ./gradlew clean
          ./gradlew assembleDebug
          
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ Build successful!"
          else
            echo "❌ Build failed"
            exit 1
          fi

      - name: 📤 UPLOAD APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-${{ steps.payload.outputs.random_digits }}
          path: app/build/outputs/apk/debug/*.apk

      - name: ✅ SUCCESS
        if: success()
        run: |
          echo "════════════════════════════════════════════"
          echo "✅✅✅ BUILD SUCCESSFUL ✅✅✅"
          echo "════════════════════════════════════════════"
          echo "📱 App: ${{ steps.payload.outputs.final_app }}"
          echo "📦 Package: ${{ steps.payload.outputs.final_pkg }}"
          echo "🆔 Build ID: ${{ steps.payload.outputs.random_digits }}"
          echo "════════════════════════════════════════════"
