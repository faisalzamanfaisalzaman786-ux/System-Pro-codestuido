name: System Pro Official Build
on:
  push:
  workflow_dispatch:

jobs:
  # جاب 1: پرانا کچرا صاف کرنا اور آفیشل پاتھ لاک کرنا
  lock-and-clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deep Clean & Force Path Setup
        run: |
          # مکمل صفائی
          rm -rf .gradle gradle build.gradle settings.gradle gradlew gradlew.bat app src
          
          # آفیشل ڈائریکٹریز کی تیاری
          mkdir -p gradle/wrapper app/src/main/java/com/system/pro app/src/main/res/values app/src/main/res/layout

          # 1. settings.gradle (Centralized Repositories)
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { 
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() } 
          }
          rootProject.name = 'System-Pro'
          include ':app'" > settings.gradle

          # 2. build.gradle (Root Locked to 8.4.0)
          echo "plugins { id 'com.android.application' version '8.4.0' apply false }" > build.gradle

          # 3. app/build.gradle (Standard Stable Config)
          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.system.pro'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.8.0'
          }" > app/build.gradle

          # 4. Official Manifest & Java
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          echo "package com.system.pro;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }" > app/src/main/java/com/system/pro/MainActivity.java

          # 5. Wrapper Properties 9.4.1
          echo "distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.1-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists" > gradle/wrapper/gradle-wrapper.properties

      - name: Hard Push Official Structure
        run: |
          git config --global user.name "Faisal Zaman"
          git config --global user.email "faisal@example.com"
          git add -A
          git commit -m "LOCK: Official Physical Path Setup for 9.4.1" || echo "No changes"
          git push

  # جاب 2: لاکڈ فائلوں سے بلڈ نکالنا
  build-verified:
    needs: lock-and-clean
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Fresh Code
        uses: actions/checkout@v4
        with:
          ref: main  # یا جو بھی آپ کی برانچ ہے

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Build
        run: |
          # اب یہاں کوئی ری-رائٹنگ نہیں ہوگی، صرف انجن چلے گا
          gradle wrapper --gradle-version 9.4.1
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V138-Official
          path: "app/build/outputs/apk/debug/*.apk"
