name: System Pro Master Deployment

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Master IDE Deployment
        run: |
          rm -rf ./*
          mkdir -p app/src/main/java/com/systempro/master
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 1. Gradle Core (Fixed)
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "System Pro Master"
          include ':app'
          EOF

          cat <<EOF > build.gradle
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.systempro.master'
              compileSdk 34
              defaultConfig {
                  applicationId "com.systempro.master"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

          # 2. Advanced IDE Layout (With Editor Interface)
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="#121212"
              android:padding="16dp">

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="SYSTEM PRO: EDITOR"
                  android:textColor="#00FF00"
                  android:textSize="22sp"
                  android:textStyle="bold"
                  android:layout_gravity="center"
                  android:layout_marginBottom="20dp"/>

              <EditText
                  android:id="@+id/codeEditor"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1"
                  android:hint="// Write your code here..."
                  android:textColorHint="#555555"
                  android:textColor="#FFFFFF"
                  android:background="#1E1E1E"
                  android:gravity="top"
                  android:padding="10dp"
                  android:typeface="monospace"
                  android:textSize="14sp"/>

              <Button
                  android:id="@+id/btnSave"
                  android:layout_width="match_parent"
                  android:layout_height="60dp"
                  android:text="💾 CREATE &amp; SAVE FILE"
                  android:backgroundTint="#008577"
                  android:textColor="#FFFFFF"
                  android:layout_marginTop="10dp"/>
          </LinearLayout>
          EOF

          # 3. MainActivity (Logic to Handle File Creation)
          cat <<EOF > app/src/main/java/com/systempro/master/MainActivity.java
          package com.systempro.master;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.Toast;
          import java.io.File;
          import java.io.FileOutputStream;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  EditText editor = findViewById(R.id.codeEditor);
                  Button btnSave = findViewById(R.id.btnSave);

                  btnSave.setOnClickListener(v -> {
                      String code = editor.getText().toString();
                      if (code.isEmpty()) {
                          Toast.makeText(this, "Editor is empty!", Toast.LENGTH_SHORT).show();
                      } else {
                          saveCodeToFile(code);
                      }
                  });
              }

              private void saveCodeToFile(String content) {
                  try {
                      File path = getExternalFilesDir(null);
                      File file = new File(path, "MyNewProject.java");
                      FileOutputStream stream = new FileOutputStream(file);
                      stream.write(content.getBytes());
                      stream.close();
                      Toast.makeText(this, "File Created: " + file.getAbsolutePath(), Toast.LENGTH_LONG).show();
                  } catch (Exception e) {
                      Toast.makeText(this, "Error: " + e.getMessage(), Toast.LENGTH_SHORT).show();
                  }
              }
          }
          EOF

          # 4. Android Manifest (Added Storage Permission)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <application
                  android:allowBackup="true"
                  android:label="System Pro"
                  android:theme="@android:style/Theme.Material.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 🚀 Final Master Build
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📦 Delivery
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Pro-IDE
          path: app/build/outputs/apk/debug/app-debug.apk
