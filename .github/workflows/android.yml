name: System Pro Final
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          mkdir -p app/src/main/java/com/systempro
          mkdir -p app/src/main/res/layout
          echo "include ':app'" > settings.gradle
          printf "apply plugin: 'com.android.application'\nandroid { compileSdk 33; namespace 'com.systempro'; default { applicationId 'com.systempro'; minSdk 21; targetSdk 33 } }" > app/build.gradle
          sudo apt-get update && sudo apt-get install -y gradle
          gradle assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-App
          path: app/build/outputs/apk/debug/*.apk
