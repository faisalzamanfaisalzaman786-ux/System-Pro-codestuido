name: System Pro Triple-Clean Builder

on:
  repository_dispatch:
    types: [build_apk] # ایپ سے یہی ٹائپ جانی چاہیے

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🔄 PROCESS PAYLOAD FROM APP
        id: payload
        run: |
          # App سے آنے والا ڈیٹا حاصل کریں
          # ہم 'github.event.client_payload' کو براہ راست استعمال کر رہے ہیں
          PKG_NAME="${{ github.event.client_payload.package_name }}"
          APP_NAME="${{ github.event.client_payload.app_name }}"
          
          # ڈیفالٹ ویلیوز اگر ایپ سے ڈیٹا نہ آئے
          if [ -z "$PKG_NAME" ]; then PKG_NAME="com.systempro.app"; fi
          if [ -z "$APP_NAME" ]; then APP_NAME="SystemPro"; fi
          
          # ایک منفرد بلڈ آئی ڈی بنانا تاکہ پرانا ڈیٹا مکس نہ ہو
          RANDOM_DIGITS=$((100000 + RANDOM % 900000))
          FINAL_PKG="${PKG_NAME}" # آپ چاہیں تو اس کے ساتھ .build${RANDOM_DIGITS} جوڑ سکتے ہیں
          FINAL_APP="${APP_NAME}"
          FINAL_PATH=$(echo $FINAL_PKG | sed 's/\./\//g')
          
          # آؤٹ پٹ سیٹ کریں تاکہ اگلے اسٹیپس اسے استعمال کر سکیں
          echo "final_pkg=$FINAL_PKG" >> $GITHUB_OUTPUT
          echo "final_app=$FINAL_APP" >> $GITHUB_OUTPUT
          echo "final_path=$FINAL_PATH" >> $GITHUB_OUTPUT
          echo "random_digits=$RANDOM_DIGITS" >> $GITHUB_OUTPUT
          
          # کوڈ کو محفوظ طریقے سے عارضی فائلوں میں رکھیں (تاکہ بڑی فائلیں ایرر نہ دیں)
          echo "${{ github.event.client_payload.java_code }}" > java_b64.txt
          echo "${{ github.event.client_payload.layout_code }}" > layout_b64.txt
          echo "${{ github.event.client_payload.manifest_code }}" > manifest_b64.txt

          echo "✅ Trigger received for $FINAL_PKG"

      - name: 🧹 TRIPLE-CLEAN & RESET
        run: |
          echo "📁 Cleaning everything..."
          rm -rf app/src/main/java/*
          rm -rf app/src/main/res/layout/*
          rm -rf app/src/main/res/values/*
          rm -rf app/build
          
          # نیا راستہ بنائیں
          mkdir -p "app/src/main/java/${{ steps.payload.outputs.final_path }}"
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          echo "✅ Clean and Path ready"

      - name: 📝 INJECT CODE FROM APP
        run: |
          FINAL_PATH="${{ steps.payload.outputs.final_path }}"
          FINAL_PKG="${{ steps.payload.outputs.final_pkg }}"
          
          # Java Code Decode
          if [ -s java_b64.txt ]; then
             cat java_b64.txt | base64 --decode > "app/src/main/java/$FINAL_PATH/MainActivity.java"
          fi
          
          # Layout Code Decode
          if [ -s layout_b64.txt ]; then
             cat layout_b64.txt | base64 --decode > "app/src/main/res/layout/activity_main.xml"
          fi

          # Manifest Code Decode
          if [ -s manifest_b64.txt ]; then
             cat manifest_b64.txt | base64 --decode > "app/src/main/AndroidManifest.xml"
          fi

          # اہم اصلاح: جاوا فائل میں پیکج نیم اور R import خودکار درست کرنا
          # یہ کریش ہونے سے بچاتا ہے
          sed -i "s/^package .*;/package $FINAL_PKG;\nimport $FINAL_PKG.R;/g" "app/src/main/java/$FINAL_PATH/MainActivity.java"
          
          echo "✅ Code injected and fixed"

      # باقی گریڈل فائلز اور بلڈ والے اسٹیپس وہی رہیں گے جو آپ کی فائل میں تھے
      - name: ⚙️ CREATE GRADLE FILES
        run: |
          PKG_NAME="${{ steps.payload.outputs.final_pkg }}"
          # (یہاں آپ کا وہی گریڈل والا کوڈ آئے گا)
          cat > app/build.gradle << EOF
          plugins { id 'com.android.application' }
          android {
              namespace '$PKG_NAME'
              compileSdk 34
              defaultConfig {
                  applicationId '$PKG_NAME'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: 🔨 BUILD APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-build-cache

      - name: 📤 UPLOAD APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.payload.outputs.final_pkg }}-${{ steps.payload.outputs.random_digits }}
          path: app/build/outputs/apk/debug/*.apk
