name: GitHub-Decompiler-YAML-Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 1. پرانی فائلوں کی صفائی (تاکہ کاؤنٹر والی فائل دوبارہ نہ آئے)
      - name: Clean Old Source Files
        run: |
          echo "Cleaning up old build artifacts..."
          rm -rf app/src/main/java/*
          rm -rf app/src/main/res/*
          rm -rf app/src/main/assets/*

      # 2. نئی فائلیں اپلوڈ کر کے ریپلیس کرنا
      # نوٹ: یہاں 'path/to/your/upload' کو اپنے فولڈر کے نام سے بدلیں جہاں فائلیں آتی ہیں
      - name: Sync New Files
        run: |
          echo "Syncing new source files into the project..."
          if [ -d "uploads" ]; then
            cp -Rf uploads/* app/src/main/
          else
            echo "No upload folder found, skipping sync."
          fi

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 3. مکمل کلین بلڈ (تاکہ کیشے سے پرانا ڈیٹا نہ اٹھے)
      - name: Build APK with Clean
        run: ./gradlew clean assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Release
          path: app/build/outputs/apk/debug/*.apk
