name: System Pro Native Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # بلڈ کو تیز کرنے کے لیے

      - name: Initialize Android Project
        run: |
          mkdir -p app/src/main/java/com/systempro/app/
          mkdir -p app/src/main/res/layout/
          mkdir -p app/src/main/res/values/

          # Settings File
          echo "rootProject.name = 'SystemProApp'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          # Root Build File
          echo "buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }" > build.gradle

          # App Build File
          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.systempro.app'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.systempro.app'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }" > app/build.gradle

          # MainActivity Java
          echo "package com.systempro.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.TextView;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  TextView tv = new TextView(this);
                  tv.setText('Welcome to System Pro Native!');
                  setContentView(tv);
              }
          }" > app/src/main/java/com/systempro/app/MainActivity.java

          # Android Manifest
          echo "<manifest xmlns:android='http://schemas.android.com/apk/res/android'>
              <application android:label='System Pro' android:theme='@android:style/Theme.DeviceDefault'>
                  <activity android:name='.MainActivity' android:exported='true'>
                      <intent-filter>
                          <action android:name='android.intent.action.MAIN' />
                          <category android:name='android.intent.category.LAUNCHER' />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>" > app/src/main/AndroidManifest.xml

      - name: Setup Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5 # ورژن فکس کر دیا تاکہ ایرر نہ آئے

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace # تاکہ ایرر کی تفصیل مل سکے

      - name: Upload Native APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Native-App
          path: app/build/outputs/apk/debug/*.apk
