name: System Pro Master Setup
on:
  workflow_dispatch:

jobs:
  build-and-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android Structure and Fill Files
        run: |
          # Creating Folders
          mkdir -p app/src/main/java/com/systempro/app/
          mkdir -p app/src/main/res/layout/

          # Injecting Data into Files
          echo "rootProject.name = 'SystemProApp'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          echo "plugins { id 'com.android.application' }
          android { 
              namespace 'com.systempro.app'
              compileSdk 34
              defaultConfig { applicationId 'com.systempro.app'; minSdk 24; targetSdk 34 }
          }" > app/build.gradle

          echo "package com.systempro.app;
          import android.app.Activity;
          import android.os.Bundle;
          public class MainActivity extends Activity {
              @Override protected void onCreate(Bundle savedInstanceState) { 
                  super.onCreate(savedInstanceState); 
              }
          }" > app/src/main/java/com/systempro/app/MainActivity.java

          echo "<manifest xmlns:android='http://schemas.android.com/apk/res/android'>
              <application android:label='System Pro'>
                  <activity android:name='.MainActivity' android:exported='true'>
                      <intent-filter>
                          <action android:name='android.intent.action.MAIN' />
                          <category android:name='android.intent.category.LAUNCHer' />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>" > app/src/main/AndroidManifest.xml

      - name: Build Debug APK
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper
          fi
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Release-APK
          path: app/build/outputs/apk/debug/*.apk
