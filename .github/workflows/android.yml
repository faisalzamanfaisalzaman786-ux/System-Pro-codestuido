name: Android Universal Builder (Auto-Heal & Zero Crash)
on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Extract & Heal All Files from Payload (or use defaults)
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          # if no payload (manual run), use example files
          if [ "${{ github.event_name }}" != "repository_dispatch" ] || [ -z "$PAYLOAD" ]; then
            echo "No payload, using default demo files"
            JAVA_CODE='package com.example.demo;\nimport android.os.Bundle;\nimport android.widget.TextView;\nimport androidx.appcompat.app.AppCompatActivity;\npublic class MainActivity extends AppCompatActivity {\n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_main);\n        TextView tv = findViewById(R.id.text);\n        tv.setText("Hello World");\n    }\n}'
            XML_LAYOUT='<?xml version="1.0" encoding="utf-8"?>\n<RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"\n    android:layout_width="match_parent"\n    android:layout_height="match_parent">\n    <TextView android:id="@+id/text"\n        android:layout_width="wrap_content"\n        android:layout_height="wrap_content"\n        android:text="Hello"/>\n</RelativeLayout>'
            MANIFEST_XML='<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <application android:label="DemoApp">\n        <activity android:name=".MainActivity" android:exported="true">\n            <intent-filter>\n                <action android:name="android.intent.action.MAIN"/>\n                <category android:name="android.intent.category.LAUNCHER"/>\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>'
            APP_NAME="DemoApp"
            PACKAGE_NAME="com.example.demo"
            ICON_B64=""
          else
            JAVA_CODE=$(echo "$PAYLOAD" | jq -r '.java // ""')
            XML_LAYOUT=$(echo "$PAYLOAD" | jq -r '.xml // ""')
            MANIFEST_XML=$(echo "$PAYLOAD" | jq -r '.manifest // ""')
            APP_NAME=$(echo "$PAYLOAD" | jq -r '.app_name // "SmartApp"')
            PACKAGE_NAME=$(echo "$PAYLOAD" | jq -r '.package_name // ""')
            ICON_B64=$(echo "$PAYLOAD" | jq -r '.icon_data // ""')
            if [ -z "$JAVA_CODE" ] || [ -z "$XML_LAYOUT" ] || [ -z "$MANIFEST_XML" ] || [ -z "$PACKAGE_NAME" ]; then
              echo "❌ Missing required fields" && exit 1
            fi
          fi

          # create directories
          PKG_PATH=$(echo "$PACKAGE_NAME" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p gradle/wrapper

          # Write files
          echo "$JAVA_CODE" > app/src/main/java/$PKG_PATH/MainActivity.java
          sed -i "s/^package .*;/package $PACKAGE_NAME;/" app/src/main/java/$PKG_PATH/MainActivity.java
          echo "$XML_LAYOUT" > app/src/main/res/layout/activity_main.xml
          echo "$MANIFEST_XML" | sed 's/ package="[^"]*"//' > app/src/main/AndroidManifest.xml
          if [ -n "$ICON_B64" ]; then
            echo "$ICON_B64" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          fi

          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV

      - name: 🔧 Auto-Heal Missing Colors & Theme
        run: |
          # colors.xml
          COLORS="app/src/main/res/values/colors.xml"
          mkdir -p app/src/main/res/values
          cat <<'EOF' > "$COLORS"
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg_dark">#0F0F0F</color>
              <color name="neon_blue">#00BFFF</color>
              <color name="neon_purple">#9D00FF</color>
              <color name="neon_green">#39FF14</color>
              <color name="black">#000000</color>
              <color name="white">#FFFFFF</color>
              <color name="primary_color">#6200EE</color>
              <color name="error_red">#FF0000</color>
              <color name="warning_orange">#FFA500</color>
              <color name="colorPrimaryDark">#0F0F0F</color>
              <color name="colorAccent">#00BFFF</color>
              <color name="glass_white_10">#1AFFFFFF</color>
              <color name="glass_white_30">#4DFFFFFF</color>
          </resources>
          EOF
          
          # theme: extract from manifest or create default
          THEME_NAME=$(grep -oP 'android:theme="\K@style/[^"]+' app/src/main/AndroidManifest.xml | head -1 | sed 's/@style\///')
          if [ -z "$THEME_NAME" ]; then
            THEME_NAME="Theme_${APP_NAME// /_}"
            sed -i "s|<application |<application android:theme=\"@style/$THEME_NAME\" |" app/src/main/AndroidManifest.xml
          fi
          cat <<EOF > app/src/main/res/values/themes.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="$THEME_NAME" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">@color/primary_color</item>
                  <item name="colorPrimaryDark">@color/bg_dark</item>
                  <item name="colorAccent">@color/neon_green</item>
              </style>
          </resources>
          EOF

          # strings.xml
          cat <<EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">$APP_NAME</string>
          </resources>
          EOF

      - name: 🔧 Auto-Heal Missing IDs (add invisible views)
        run: |
          LAYOUT="app/src/main/res/layout/activity_main.xml"
          JAVA_FILE="app/src/main/java/$(echo $PACKAGE_NAME | tr '.' '/')/MainActivity.java"
          # extract findViewById IDs from Java
          IDS=$(grep -oE 'findViewById\(R\.id\.([a-zA-Z0-9_]+)\)' "$JAVA_FILE" | sed 's/.*R\.id\.//' | sed 's/)//' | sort -u)
          for id in $IDS; do
            if ! grep -q "android:id=\"@+id/$id\"" "$LAYOUT" && ! grep -q "android:id=\"@id/$id\"" "$LAYOUT"; then
              # inject invisible view before closing tag
              sed -i "s|</RelativeLayout>|    <View android:id=\"@+id/$id\" android:layout_width=\"0dp\" android:layout_height=\"0dp\" visibility=\"gone\" />\n</RelativeLayout>|" "$LAYOUT"
              sed -i "s|</LinearLayout>|    <View android:id=\"@+id/$id\" android:layout_width=\"0dp\" android:layout_height=\"0dp\" visibility=\"gone\" />\n</LinearLayout>|" "$LAYOUT"
              sed -i "s|</androidx.constraintlayout.widget.ConstraintLayout>|    <View android:id=\"@+id/$id\" android:layout_width=\"0dp\" android:layout_height=\"0dp\" visibility=\"gone\" />\n</androidx.constraintlayout.widget.ConstraintLayout>|" "$LAYOUT"
              echo "➕ Added missing ID: $id"
            fi
          done

      - name: 🔧 Auto-Heal Click Handlers (prevent NPE)
        run: |
          JAVA_FILE="app/src/main/java/$(echo $PACKAGE_NAME | tr '.' '/')/MainActivity.java"
          if ! grep -q "setOnClickListener" "$JAVA_FILE"; then
            # Inject safe click handler at end of onCreate
            sed -i '/protected void onCreate/,/^    }/ {
              /super.onCreate/ a\
                    // Auto-safe click handler\
                    View root = getWindow().getDecorView().findViewById(android.R.id.content);\
                    if (root instanceof ViewGroup) addSafeClickListeners((ViewGroup) root);
            }' "$JAVA_FILE"
            cat <<'EOF' >> "$JAVA_FILE"
            private void addSafeClickListeners(ViewGroup group) {
                for (int i = 0; i < group.getChildCount(); i++) {
                    View child = group.getChildAt(i);
                    if (child instanceof android.widget.Button && !child.hasOnClickListeners()) {
                        child.setOnClickListener(v -> 
                            android.widget.Toast.makeText(this, "Button: " + ((android.widget.Button)v).getText(), android.widget.Toast.LENGTH_SHORT).show()
                        );
                    } else if (child instanceof ViewGroup) {
                        addSafeClickListeners((ViewGroup) child);
                    }
                }
            }
            import android.view.View;
            import android.view.ViewGroup;
            EOF
          fi

      - name: Setup Gradle 9.4.1
        run: |
          cat <<'EOF' > gradlew
          #!/bin/sh
          exec java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          chmod +x gradlew
          cat <<EOF > gradle/wrapper/gradle-wrapper.properties
          distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.1-bin.zip
          EOF
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v9.4.1/gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
          cat <<EOF > settings.gradle
          rootProject.name = "$APP_NAME"
          include ':app'
          EOF
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.5.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          task clean(type: Delete) { delete rootProject.buildDir }
          EOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace '$PACKAGE_NAME'
              compileSdk 34
              defaultConfig {
                  applicationId '$PACKAGE_NAME'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              buildFeatures { viewBinding true }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Build
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
