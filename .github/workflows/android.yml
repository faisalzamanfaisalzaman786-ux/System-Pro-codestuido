name: System Pro Dynamic Build
on:
  workflow_dispatch:
  repository_dispatch:name: System Pro ZIP Builder
on:
  repository_dispatch:
    types: [build-from-zip]

jobs:
  build:
    name: "ZIP to APK Generation"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Process ZIP Asset
        run: |
          # 1. زپ فائل ڈاؤن لوڈ کرنا
          ZIP_URL="${{ github.event.client_payload.zip_asset_url }}"
          curl -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -o project.zip "$ZIP_URL"
          
          # 2. پیکیج نیم اور ڈائریکٹری سیٹ اپ
          PACKAGE_NAME="${{ github.event.client_payload.package_name || 'com.system.pro' }}"
          PKG_PATH=$(echo "$PACKAGE_NAME" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values

          # 3. زپ فائل کو نکالنا (Unzip)
          unzip -o project.zip -d temp_src/
          
          # 4. فائلوں کو ان کی صحیح جگہ منتقل کرنا
          # MainActivity.java کو پیکیج اسٹرکچر میں بھیجنا
          if [ -f temp_src/MainActivity.java ]; then
            # جاوا فائل میں پیکیج نیم درست کرنا
            echo "package $PACKAGE_NAME;" > app/src/main/java/$PKG_PATH/MainActivity.java
            echo "import $PACKAGE_NAME.R;" >> app/src/main/java/$PKG_PATH/MainActivity.java
            cat temp_src/MainActivity.java | sed '/package /d' | sed '/import .*R;/d' >> app/src/main/java/$PKG_PATH/MainActivity.java
          fi
          
          # لے آؤٹ اور مینی فیسٹ
          [ -f temp_src/res/layout/activity_main.xml ] && mv temp_src/res/layout/activity_main.xml app/src/main/res/layout/
          [ -f temp_src/AndroidManifest.xml ] && mv temp_src/AndroidManifest.xml app/src/main/
          [ -f temp_src/res/drawable/ic_launcher.png ] && mv temp_src/res/drawable/ic_launcher.png app/src/main/res/drawable/

          # 5. لازمی کلرز انجکشن (AAPT2 ایرر سے بچنے کے لیے)
          cat <<EOF > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg_dark">#0F0F0F</color>
              <color name="neon_green">#00FF00</color>
              <color name="glass_white_10">#1AFFFFFF</color>
              <color name="error_red">#FF4444</color>
              <color name="colorAccent">#FF9800</color>
          </resources>
          EOF

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug \
            -PdynamicPackage="${{ github.event.client_payload.package_name }}" \
            --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name || 'SystemPro-ZIP-Build' }}
          path: app/build/outputs/apk/debug/*.apk

    types: [build-app]

jobs:
  assemble-dynamic-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Process Dynamic Payload
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          # پے لوڈ سے پیکیج نیم نکالنا (ڈیفالٹ: com.system.pro)
          PACKAGE_NAME=$(echo "$PAYLOAD" | jq -r '.package_name // "com.system.pro"')
          PKG_PATH=$(echo "$PACKAGE_NAME" | tr '.' '/')
          
          echo "Building for Package: $PACKAGE_NAME"
          
          # 1. فولڈر اسٹرکچر بنانا
          mkdir -p app/src/main/java/$PKG_PATH
          
          # 2. جاوا فائل کو نئے پیکیج کے ساتھ سیٹ کرنا
          echo "$PAYLOAD" | jq -r '.java_b64' | base64 -d > raw_java.txt
          sed -i '/package /d' raw_java.txt
          sed -i '/import .*R;/d' raw_java.txt
          {
            echo "package $PACKAGE_NAME;"
            echo "import $PACKAGE_NAME.R;"
            echo "import androidx.core.content.ContextCompat;"
            cat raw_java.txt
          } > app/src/main/java/$PKG_PATH/MainActivity.java

          # 3. مینی فیسٹ کو کلین کرنا (پیکیج ٹیگ ہٹانا تاکہ گریڈل ہینڈل کرے)
          echo "$PAYLOAD" | jq -r '.manifest_b64' | base64 -d > app/src/main/AndroidManifest.xml
          sed -i 's/package="[^"]*"//g' app/src/main/AndroidManifest.xml

      - name: Build APK with Dynamic Property
        run: |
          # گریڈل کو ڈائنامک پیکیج پراپرٹی پاس کرنا
          ./gradlew :app:assembleDebug \
            -PdynamicPackage="${{ github.event.client_payload.package_name || 'com.system.pro' }}" \
            --no-daemon --stacktrace

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.package_name || 'Dynamic-Build' }}
          path: app/build/outputs/apk/debug/*.apk
