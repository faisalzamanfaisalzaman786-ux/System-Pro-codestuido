import os
from pathlib import Path

def show_folder_structure(path, prefix="", is_last=True, max_depth=None, current_depth=0):
    """
    فولڈر سٹرکچر دکھانے کا فنکشن
    
    Args:
        path: فولڈر کا راستہ
        prefix: پرنٹنگ کے لیے پریفکس
        is_last: آخری آئٹم ہے یا نہیں
        max_depth: زیادہ سے زیادہ ڈیپتھ (None = تمام)
        current_depth: موجودہ ڈیپتھ
    """
    if max_depth is not None and current_depth > max_depth:
        return
    
    # موجودہ فولڈر کا نام
    folder_name = os.path.basename(path)
    
    # پہلی بار کے لیے
    if current_depth == 0:
        print(f"📁 {folder_name}/")
        prefix = ""
    
    try:
        # فولڈر کی تمام آئٹمز حاصل کریں
        items = sorted(os.listdir(path))
        
        for i, item in enumerate(items):
            item_path = os.path.join(path, item)
            is_last_item = (i == len(items) - 1)
            
            # فولڈر ہے تو
            if os.path.isdir(item_path):
                if is_last_item:
                    print(f"{prefix}    └── 📁 {item}/")
                    show_folder_structure(item_path, prefix + "        ", True, max_depth, current_depth + 1)
                else:
                    print(f"{prefix}    ├── 📁 {item}/")
                    show_folder_structure(item_path, prefix + "    │   ", False, max_depth, current_depth + 1)
            
            # فائل ہے تو
            else:
                if is_last_item:
                    print(f"{prefix}    └── 📄 {item}")
                else:
                    print(f"{prefix}    ├── 📄 {item}")
                    
    except PermissionError:
        print(f"{prefix}    └── [Permission Denied]")
    except Exception as e:
        print(f"{prefix}    └── [Error: {str(e)}]")

def main():
    """
    مین فنکشن
    """
    # ریپانسری کا راستہ (موجودہ ڈائریکٹری)
    repo_path = input("ریپانسری کا راستہ درج کریں (Enter دبائیں موجودہ ڈائریکٹری کے لیے): ").strip()
    
    if not repo_path:
        repo_path = "."
    
    # زیادہ سے زیادہ ڈیپتھ (اختیاری)
    depth_input = input("زیادہ سے زیادہ ڈیپتھ درج کریں (Enter دبائیں تمام کے لیے): ").strip()
    
    if depth_input:
        try:
            max_depth = int(depth_input)
        except:
            max_depth = None
    else:
        max_depth = None
    
    # فولڈر موجود ہے چیک کریں
    if not os.path.exists(repo_path):
        print("❌ یہ راستہ موجود نہیں ہے!")
        return
    
    if not os.path.isdir(repo_path):
        print("❌ یہ کوئی فولڈر نہیں ہے!")
        return
    
    print("\n" + "="*50)
    print("📂 ریپانسری فولڈر سٹرکچر")
    print("="*50 + "\n")
    
    # فولڈر سٹرکچر دکھائیں
    show_folder_structure(repo_path, max_depth=max_depth)
    
    print("\n" + "="*50)
    print("✅ مکمل")

if __name__ == "__main__":
    main()
