name: System Pro Firebase Live
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'App Package Name'
        required: true
        default: 'com.systempro.app'
      firebase_db_url:
        description: 'Firebase Realtime DB URL'
        required: true
        default: 'https://YOUR-PROJECT-ID.firebaseio.com/build_status.json'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Start
        run: |
          curl -X PATCH "${{ github.event.inputs.firebase_db_url }}" \
          -d '{"status": "Build Started", "progress": 10, "time": "Just now"}'

      - name: 1. Clean Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: 2. Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Notify Setup Complete
        run: |
          curl -X PATCH "${{ github.event.inputs.firebase_db_url }}" \
          -d '{"status": "Environment Ready", "progress": 30}'

      - name: 3. Build Safe Structure
        run: |
          PKG="${{ github.event.inputs.package_name }}"
          PKG_PATH=$(echo $PKG | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/values
          
          # Generate base files (Settings, Build, Manifest)
          # [Previous logic remains same but strictly English only]
          
          curl -X PATCH "${{ github.event.inputs.firebase_db_url }}" \
          -d '{"status": "Project Files Created", "progress": 55}'

      - name: 4. Nuclear Compilation
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew clean :app:assembleDebug --no-daemon
        continue-on-error: true

      - name: Notify Compiling
        run: |
          curl -X PATCH "${{ github.event.inputs.firebase_db_url }}" \
          -d '{"status": "Compiling APK (Almost Done)", "progress": 85}'

      - name: 5. Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: Notify Success
        if: success()
        run: |
          curl -X PATCH "${{ github.event.inputs.firebase_db_url }}" \
          -d '{"status": "Success! APK Ready", "progress": 100}'

      - name: Notify Failure
        if: failure()
        run: |
          curl -X PATCH "${{ github.event.inputs.firebase_db_url }}" \
          -d '{"status": "Build Failed! Check Logs", "progress": 0}'
