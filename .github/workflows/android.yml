name: System Pro Ultimate Builder
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'App Package Name'
        required: true
        default: 'com.systempro.app'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout (Force Clean)
        uses: actions/checkout@v4
        with:
          clean: true

      - name: 🛡️ Fix Git & Deep Clean
        run: |
          # گٹ سیکیورٹی اور پرانی فائلوں کی مکمل صفائی
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          rm -rf * .gradle .github/workflows/android.yml
          echo "سرور اب بالکل صاف ہے اور کوئی ایرر نہیں دے گا۔"

      - name: ☕ Setup Java 17 (No Cache)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # کیشے کو ہٹا دیا گیا ہے تاکہ 'File Not Found' ایرر نہ آئے

      - name: 🏗️ Re-Build Structure
        run: |
          PKG="${{ github.event.inputs.package_name }}"
          PKG_PATH=$(echo $PKG | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          
          # settings.gradle
          cat <<EOF > settings.gradle
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "SystemProApp"
          include ':app'
          EOF

          # build.gradle (Project)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          EOF

          # app/build.gradle
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace '$PKG'
              compileSdk 34
              defaultConfig { applicationId '$PKG'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

      - name: 🔨 Final Compilation (Fixed Version)
        run: |
          # گریڈل ورژن 8.2 پر فکس کریں
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon

      - name: 📦 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-APK
          path: app/build/outputs/apk/debug/*.apk
