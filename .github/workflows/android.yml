# نام واپس پرانا کر دیا تاکہ موبائل ایپ اسے تلاش کر سکے
name: System Pro APK Builder

on:
  workflow_dispatch:
    inputs:
      file_content:
        description: 'Base64 encoded project files'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Random Package Name
        run: |
          # ہر بار ایک نیا رینڈم آئی ڈی بنانا
          RANDOM_ID=$(head /dev/urandom | tr -dc a-z0-9 | head -c 6)
          NEW_PACKAGE="com.systempro.$RANDOM_ID"
          echo "NEW_PACKAGE=$NEW_PACKAGE" >> $GITHUB_ENV
          echo "🚀 New Package Name: $NEW_PACKAGE"

      - name: Clean and Setup Environment
        run: |
          rm -rf app/src/main/java/*
          rm -rf app/src/main/res/layout/*
          echo "🧹 Cleanup done!"

      - name: Decode and Inject Dynamic Package
        run: |
          echo "${{ github.event.inputs.file_content }}" | base64 -d > project_data.json
          python3 -c "
          import json, os, re
          new_pkg = '${{ env.NEW_PACKAGE }}'
          pkg_path = new_pkg.replace('.', '/')
          
          with open('project_data.json', 'r') as f:
              data = json.load(f)
              files = data.get('files', {})
              for name, content in files.items():
                  # پیکیج نیم کو تمام فائلوں میں بدلنا
                  content = re.sub(r'package\s+[\w\.]+;', f'package {new_pkg};', content)
                  content = re.sub(r'import\s+[\w\.]+\.R;', f'import {new_pkg}.R;', content)
                  
                  path = ''
                  if name.endswith('.java'):
                      path = f'app/src/main/java/{pkg_path}/{name}'
                  elif name.endswith('.xml') and 'layout' in name:
                      path = f'app/src/main/res/layout/{name}'
                  elif name == 'AndroidManifest.xml':
                      path = 'app/src/main/AndroidManifest.xml'
                      content = content.replace('.MainActivity', f'{new_pkg}.MainActivity')
                  
                  if path:
                      os.makedirs(os.path.dirname(path), exist_ok=True)
                      with open(path, 'w') as out: out.write(content)
          "

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Dynamic APK
        uses: actions/upload-artifact@v4
        with:
          name: Faisal-Dynamic-APK
          path: app/build/outputs/apk/debug/*.apk
