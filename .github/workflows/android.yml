name: GitHub-Decompiler-Build-Final-Fix

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 1. صرف کوڈ فائلز صاف کرنا، ریسورسز کو ہاتھ نہیں لگانا
      - name: Clean Specific Folders
        run: |
          mkdir -p app/src/main/java/com/systempro/faisal/
          mkdir -p app/src/main/res/layout/
          find app/src/main/java/com/systempro/faisal/ -name "*.java" -delete || true
          find app/src/main/res/layout/ -name "*.xml" -delete || true

      # 2. نئی فائلیں اپلوڈ فولڈر سے منتقل کرنا
      - name: Sync Uploaded Files
        run: |
          if [ -d "uploads" ] && [ "$(ls -A uploads)" ]; then
            cp -rf uploads/*.java app/src/main/java/com/systempro/faisal/ 2>/dev/null || true
            cp -rf uploads/*.xml app/src/main/res/layout/ 2>/dev/null || true
          fi

      # 3. مینی فیسٹ کو آٹو ٹھیک کرنا (تاکہ آئیکن یا تھیم کا ایرر نہ آئے)
      - name: Fix Manifest Resources
        run: |
          MANIFEST="app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            # اگر آئیکن نہیں مل رہا تو اینڈروئیڈ کا ڈیفالٹ آئیکن لگا دو
            sed -i 's/android:icon="@drawable\/[^"]*"/android:icon="@android:drawable\/sym_def_app_icon"/g' $MANIFEST
            # اگر تھیم نہیں مل رہا تو ڈیفالٹ تھیم لگا دو
            sed -i 's/android:theme="@style\/[^"]*"/android:theme="@android:style\/Theme.DeviceDefault"/g' $MANIFEST
          fi

      - name: Grant Execute Permission
        run: chmod +x gradlew

      # 4. کلین بلڈ چلانا
      - name: Build APK
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Success-Build
          path: app/build/outputs/apk/debug/*.apk
        
