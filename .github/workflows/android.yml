name: System Pro Master Net Final

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Modern Reconstruction (Gradle 9.4 Compatible)
      run: |
        # فولڈرز کی تیاری
        mkdir -p app/src/main/java/com/systempro/master
        mkdir -p app/src/main/res/layout

        # 1. جدید build.gradle (Root)
        cat <<EOF > build.gradle
        plugins {
            id 'com.android.application' version '8.1.1' apply false
        }
        EOF

        # 2. جدید app/build.gradle (Plugins DSL Style)
        cat <<EOF > app/build.gradle
        plugins {
            id 'com.android.application'
        }

        android {
            namespace 'com.systempro.master'
            compileSdk 34
            defaultConfig {
                applicationId "com.systempro.master"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        EOF

        # 3. مینی فیسٹ اور جاوا فائلز
        cat <<EOF > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:label="System Pro Net">
                <activity android:name="com.systempro.master.MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHer" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        cat <<EOF > app/src/main/java/com/systempro/master/MainActivity.java
        package com.systempro.master;
        import android.app.Activity;
        import android.os.Bundle;
        import android.widget.TextView;
        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                TextView tv = new TextView(this);
                tv.setText("Net Build Success: Modern Gradle Style!");
                setContentView(tv);
            }
        }
        EOF

        # 4. ضروری سیٹنگز
        echo "include ':app'" > settings.gradle
        echo "android.suppressUnsupportedCompileSdk=34" > gradle.properties

    - name: Setup Gradle
      run: gradle wrapper --gradle-version 8.1.1 # مخصوص ورژن پر لاک کرنا

    - name: Final Build Execution
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace
