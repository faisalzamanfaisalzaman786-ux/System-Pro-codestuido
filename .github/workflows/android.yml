          
          # مین برانچ پر فورس پش کرنا تاکہ پرانا ڈیٹا مکمل ریپلیس ہو جائے
          git push origin main --force
name: Ultimate Deep Clean & Push

on:
  workflow_dispatch:

jobs:
  deep-clean:
    runs-on: ubuntu-latest
    permissions:
      contents: write # یہ لکھنا ضروری ہے تاکہ فائلیں اپ ڈیٹ ہوں
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git Config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Force Clean and Overwrite
        run: |
          # تمام ان ٹریکڈ فائلز کو صاف کرنا
          git clean -fdx 
          
          # اگر آپ چاہتے ہیں کہ تمام فائلیں 'now' دکھائیں، تو ہم 'touch' استعمال کریں گے
          find . -maxdepth 2 -not -path '*/.*' -exec touch {} +
          
          # خالی تبدیلی پیدا کرنا تاکہ گٹ ہب اسے نیا سمجھے
          date > last_sync.txt

      - name: Push Changes Back to GitHub
        run: |
          git add .
          git commit -m "System Pro: Deep Clean & Data Replaced $(date)" || echo "No changes"
          git push origin main --force
