name: Android Universal Builder (Zero-Crash Guarantee)
on:
  workflow_dispatch:name: Android APK Builder (Complete & Reliable)
on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: ✅ Extract UI Data
        id: extract
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          # --- Get data from UI ---
          APP_NAME=$(echo "$PAYLOAD" | jq -r '.app_name // "SystemPro"')
          PACKAGE_NAME=$(echo "$PAYLOAD" | jq -r '.package_name // "com.system.pro"')
          JAVA_CODE=$(echo "$PAYLOAD" | jq -r '.java // ""')
          XML_LAYOUT=$(echo "$PAYLOAD" | jq -r '.xml // ""')
          MANIFEST_XML=$(echo "$PAYLOAD" | jq -r '.manifest // ""')
          ICON_B64=$(echo "$PAYLOAD" | jq -r '.icon_data // ""')

          # --- Fallbacks ---
          if [ -z "$JAVA_CODE" ]; then
            JAVA_CODE='package com.system.pro;\nimport android.os.Bundle;\nimport android.widget.TextView;\nimport androidx.appcompat.app.AppCompatActivity;\npublic class MainActivity extends AppCompatActivity {\n    @Override\n    protected void onCreate(Bundle savedInstanceState) { super.onCreate(savedInstanceState); setContentView(R.layout.activity_main); TextView tv = findViewById(R.id.text); tv.setText("Welcome to System Pro");\n    }\n}'
          fi
          if [ -z "$XML_LAYOUT" ]; then
            XML_LAYOUT='<?xml version="1.0" encoding="utf-8"?>\n<RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"\n    android:layout_width="match_parent"\n    android:layout_height="match_parent">\n    <TextView android:id="@+id/text"\n        android:layout_width="wrap_content"\n        android:layout_height="wrap_content"\n        android:layout_centerInParent="true"\n        android:text="System Pro"/>\n</RelativeLayout>'
          fi

          # --- Setup Directories ---
          PKG_PATH=$(echo "$PACKAGE_NAME" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH app/src/main/res/layout app/src/main/res/values app/src/main/res/mipmap-hdpi gradle/wrapper

          # --- Write Core Files ---
          echo "$JAVA_CODE" > app/src/main/java/$PKG_PATH/MainActivity.java
          echo "$XML_LAYOUT" > app/src/main/res/layout/activity_main.xml
          echo "$MANIFEST_XML" > app/src/main/AndroidManifest.xml
          if [ -n "$ICON_B64" ]; then
            echo "$ICON_B64" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          fi

          # --- Core Fixes ---
          # 1. Fix Java package line and import the correct R class
          sed -i "s/^package .*;/package $PACKAGE_NAME;/" app/src/main/java/$PKG_PATH/MainActivity.java
          if ! grep -q "import $PACKAGE_NAME.R;" app/src/main/java/$PKG_PATH/MainActivity.java; then
            sed -i "/^package $PACKAGE_NAME;/a import $PACKAGE_NAME.R;" app/src/main/java/$PKG_PATH/MainActivity.java
          fi

          # 2. Remove deprecated 'package' attribute from manifest and clean it up
          sed -i 's/ package="[^"]*"//' app/src/main/AndroidManifest.xml
          sed -i '/<manifest\>/ s/>/ >/' app/src/main/AndroidManifest.xml

          # 3. Save all metadata for other steps
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV

      - name: 🛡️ Guarantee All Resources Exist (The Key Fix)
        run: |
          # --- Create a PERFECT and SIMPLE default theme fallback ---
          # If user's Manifest doesn't have a theme, create one
          THEME_NAME=$(grep -oP 'android:theme="\K@style/[^"]+' app/src/main/AndroidManifest.xml | head -1 | sed 's/@style\///')
          if [ -z "$THEME_NAME" ]; then
            THEME_NAME="Theme_${APP_NAME// /_}"
            sed -i "s|<application |<application android:theme=\"@style/$THEME_NAME\" |" app/src/main/AndroidManifest.xml
          fi

          # --- Add comprehensive colors and theme definition ---
          cat <<EOF > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg_dark">#0F0F0F</color>
              <color name="neon_blue">#00BFFF</color>
              <color name="neon_purple">#9D00FF</color>
              <color name="neon_green">#39FF14</color>
              <color name="black">#000000</color>
              <color name="white">#FFFFFF</color>
              <color name="primary_color">#6200EE</color>
              <color name="error_red">#FF0000</color>
              <color name="warning_orange">#FFA500</color>
              <color name="colorPrimaryDark">#0F0F0F</color>
              <color name="colorAccent">#00BFFF</color>
              <color name="glass_white_10">#1AFFFFFF</color>
              <color name="glass_white_30">#4DFFFFFF</color>
          </resources>
          EOF

          # --- This 'themes.xml' definition is what SOLVES the '@style/' error ---
          cat <<EOF > app/src/main/res/values/themes.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="$THEME_NAME" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">@color/primary_color</item>
                  <item name="colorPrimaryDark">@color/bg_dark</item>
                  <item name="colorAccent">@color/neon_green</item>
              </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">$APP_NAME</string>
          </resources>
          EOF

          # --- Auto-fix Missing IDs to prevent NullPointerException---
          LAYOUT_FILE="app/src/main/res/layout/activity_main.xml"
          JAVA_FILE="app/src/main/java/$(echo $PACKAGE_NAME | tr '.' '/')/MainActivity.java"
          grep -oE 'findViewById\(R\.id\.([a-zA-Z0-9_]+)\)' "$JAVA_FILE" | sed 's/.*R\.id\.//' | sed 's/)//' | sort -u | while read id; do
            if ! grep -q "android:id=\"@+id/$id\"" "$LAYOUT_FILE"; then
              sed -i "s|</RelativeLayout>|    <View android:id=\"@+id/$id\" android:layout_width=\"0dp\" android:layout_height=\"0dp\" visibility=\"gone\" />\n</RelativeLayout>|" "$LAYOUT_FILE"
              echo "➕ Added missing ID: $id"
            fi
          done

      - name: ⚙️ Generate Gradle & Finalize Build
        run: |
          # --- Gradle Wrapper Setup ---
          cat <<'EOF' > gradlew
          #!/bin/sh
          exec java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          chmod +x gradlew

          cat <<EOF > gradle/wrapper/gradle-wrapper.properties
          distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.1-bin.zip
          EOF
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v9.4.1/gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true

          # --- Root build files ---
          cat <<EOF > settings.gradle
          rootProject.name = "$APP_NAME"
          include ':app'
          EOF
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.5.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          task clean(type: Delete) { delete rootProject.buildDir }
          EOF

          # --- App build file with dynamic namespace and applicationId ---
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace '$PACKAGE_NAME'
              compileSdk 34
              defaultConfig {
                  applicationId '$PACKAGE_NAME'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              buildFeatures { viewBinding true }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: 📦 Build and Upload APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Build
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # --- 1. Extract User Data & Create Core Files ---
      - name: Extract User Data & Build Core
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          # 1.1 Extract / Set Defaults
          APP_NAME=$(echo "$PAYLOAD" | jq -r '.app_name // "SystemPro"')
          PACKAGE_NAME=$(echo "$PAYLOAD" | jq -r '.package_name // "com.system.pro"')
          JAVA_CODE=$(echo "$PAYLOAD" | jq -r '.java // ""')
          XML_LAYOUT=$(echo "$PAYLOAD" | jq -r '.xml // ""')
          MANIFEST_XML=$(echo "$PAYLOAD" | jq -r '.manifest // ""')
          ICON_B64=$(echo "$PAYLOAD" | jq -r '.icon_data // ""')

          # 1.2 Validation & Fallback (Guarantee: Build NEVER fails)
          if [ -z "$JAVA_CODE" ]; then
            JAVA_CODE='package com.system.pro;\nimport android.os.Bundle;\nimport android.widget.TextView;\nimport androidx.appcompat.app.AppCompatActivity;\npublic class MainActivity extends AppCompatActivity {\n    @Override\n    protected void onCreate(Bundle savedInstanceState) { super.onCreate(savedInstanceState); setContentView(R.layout.activity_main); TextView tv = findViewById(R.id.text); tv.setText("Welcome to System Pro");\n    }\n}'
          fi
          if [ -z "$XML_LAYOUT" ]; then
            XML_LAYOUT='<?xml version="1.0" encoding="utf-8"?>\n<RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"\n    android:layout_width="match_parent"\n    android:layout_height="match_parent">\n    <TextView android:id="@+id/text"\n        android:layout_width="wrap_content"\n        android:layout_height="wrap_content"\n        android:layout_centerInParent="true"\n        android:text="System Pro"/>\n</RelativeLayout>'
          fi

          # 1.3 Create Directories
          PKG_PATH=$(echo "$PACKAGE_NAME" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p gradle/wrapper

          # 1.4 Create Core Files
          echo "$JAVA_CODE" > app/src/main/java/$PKG_PATH/MainActivity.java
          echo "$XML_LAYOUT" > app/src/main/res/layout/activity_main.xml
          echo "$MANIFEST_XML" > app/src/main/AndroidManifest.xml
          
          # 1.5 Fix the package line in Java file
          sed -i "s/^package .*;/package $PACKAGE_NAME;/" app/src/main/java/$PKG_PATH/MainActivity.java
          
          # 1.6 ✅ CRITICAL FIX: Auto-import R for the correct package
          if ! grep -q "import $PACKAGE_NAME.R;" app/src/main/java/$PKG_PATH/MainActivity.java; then
            sed -i "/^package $PACKAGE_NAME;/a import $PACKAGE_NAME.R;" app/src/main/java/$PKG_PATH/MainActivity.java
            echo "✅ Added auto-import of R class for package: $PACKAGE_NAME"
          fi
          
          if [ -n "$ICON_B64" ]; then
            echo "$ICON_B64" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          fi

          # 1.7 Save Meta Data
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV

      # --- 2. Guarantee Resources (AUTO-FIX) ---
      - name: Inject ALL Missing Resources
        run: |
          # Extract theme from manifest, or create a default one
          THEME_NAME=$(grep -oP 'android:theme="\K@style/[^"]+' app/src/main/AndroidManifest.xml | head -1 | sed 's/@style\///')
          if [ -z "$THEME_NAME" ]; then
            THEME_NAME="Theme_${APP_NAME// /_}"
            sed -i "s|<application |<application android:theme=\"@style/$THEME_NAME\" |" app/src/main/AndroidManifest.xml
          fi

          # 2.1 Comprehensive colors.xml
          cat <<EOF > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg_dark">#0F0F0F</color>
              <color name="neon_blue">#00BFFF</color>
              <color name="neon_purple">#9D00FF</color>
              <color name="neon_green">#39FF14</color>
              <color name="black">#000000</color>
              <color name="white">#FFFFFF</color>
              <color name="primary_color">#6200EE</color>
              <color name="error_red">#FF0000</color>
              <color name="warning_orange">#FFA500</color>
              <color name="colorPrimaryDark">#0F0F0F</color>
              <color name="colorAccent">#00BFFF</color>
              <color name="glass_white_10">#1AFFFFFF</color>
              <color name="glass_white_30">#4DFFFFFF</color>
          </resources>
          EOF

          # 2.2 Dynamic themes.xml
          cat <<EOF > app/src/main/res/values/themes.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="$THEME_NAME" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">@color/primary_color</item>
                  <item name="colorPrimaryDark">@color/bg_dark</item>
                  <item name="colorAccent">@color/neon_green</item>
              </style>
          </resources>
          EOF

          # 2.3 strings.xml
          cat <<EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">$APP_NAME</string>
          </resources>
          EOF

          # 2.4 Auto-fix missing IDs in layout
          LAYOUT_FILE="app/src/main/res/layout/activity_main.xml"
          JAVA_FILE="app/src/main/java/$(echo $PACKAGE_NAME | tr '.' '/')/MainActivity.java"
          grep -oE 'findViewById\(R\.id\.([a-zA-Z0-9_]+)\)' "$JAVA_FILE" | sed 's/.*R\.id\.//' | sed 's/)//' | sort -u | while read id; do
            if ! grep -q "android:id=\"@+id/$id\"" "$LAYOUT_FILE"; then
              sed -i "s|</RelativeLayout>|    <View android:id=\"@+id/$id\" android:layout_width=\"0dp\" android:layout_height=\"0dp\" visibility=\"gone\" />\n</RelativeLayout>|" "$LAYOUT_FILE"
              sed -i "s|</LinearLayout>|    <View android:id=\"@+id/$id\" android:layout_width=\"0dp\" android:layout_height=\"0dp\" visibility=\"gone\" />\n</LinearLayout>|" "$LAYOUT_FILE"
              echo "➕ Added missing ID: $id as invisible view"
            fi
          done

      # --- 3. Generate Gradle & Build Environment ---
      - name: Setup Gradle 9.4.1 and Build Scripts
        run: |
          # Gradle wrapper script
          cat <<'EOF' > gradlew
          #!/bin/sh
          exec java -cp gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          chmod +x gradlew

          # wrapper properties
          cat <<EOF > gradle/wrapper/gradle-wrapper.properties
          distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.1-bin.zip
          EOF
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v9.4.1/gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true

          # settings.gradle
          cat <<EOF > settings.gradle
          rootProject.name = "$APP_NAME"
          include ':app'
          EOF

          # root build.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.5.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          task clean(type: Delete) { delete rootProject.buildDir }
          EOF

          # app/build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace '$PACKAGE_NAME'
              compileSdk 34
              defaultConfig {
                  applicationId '$PACKAGE_NAME'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              buildFeatures {
                  viewBinding true
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

          # Remove deprecated 'package' attribute from manifest
          sed -i 's/ package="[^"]*"//' app/src/main/AndroidManifest.xml

          # ✅ Ensure the manifest uses the dynamic theme correctly
          sed -i "s|Theme.SystemPro|$THEME_NAME|g" app/src/main/AndroidManifest.xml

      # --- 4. Build & Upload ---
      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Build
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
