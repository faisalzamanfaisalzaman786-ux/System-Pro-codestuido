name: System Pro Ultimate Builder
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'App Package Name'
        required: true
        default: 'com.systempro.app'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🏗️ Create Perfect Structure
        run: |
          # پرانی تمام ناکام فائلوں کی صفائی
          rm -rf *
          
          PKG="${{ github.event.inputs.package_name }}"
          PKG_PATH=$(echo $PKG | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 1. settings.gradle (ریپوزٹری کا حتمی حل)
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "SystemProApp"
          include ':app'
          EOF

          # 2. build.gradle (Project Level)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # 3. app/build.gradle
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace '$PKG'
              compileSdk 34
              defaultConfig { 
                  applicationId '$PKG'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          # 4. AndroidManifest.xml
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. MainActivity.java
          cat <<EOF > app/src/main/java/$PKG_PATH/MainActivity.java
          package $PKG;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle s) { 
                  super.onCreate(s); 
              }
          }
          EOF

      - name: 🔨 Final Compilation
        run: |
          # گریڈل ریپر بنانا اور بلڈ شروع کرنا
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Success-APK
          path: app/build/outputs/apk/debug/*.apk
