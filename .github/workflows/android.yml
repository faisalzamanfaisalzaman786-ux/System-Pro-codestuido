name: System Pro ZIP Builder

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    name: "System Pro Build Engine"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Extract and Sanitize Payload
        run: |
          # 1. Download Payload from Dispatch
          echo "${{ github.event.client_payload.java_b64 }}" | base64 -d > temp_main.java || echo "" > temp_main.java
          echo "${{ github.event.client_payload.xml_b64 }}" | base64 -d > temp_layout.xml || echo "" > temp_layout.xml
          echo "${{ github.event.client_payload.manifest_b64 }}" | base64 -d > temp_manifest.xml || echo "" > temp_manifest.xml
          
          # 2. Setup Directory Structure
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.system.pro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable-xxxhdpi

          # 3. PYTHON NUCLEAR CLEANER (Fixes Prolog & Hidden Styles)
          python3 -c "
          import os
          def clean_xml(content):
              content = content.strip()
              # XML Prolog Fix: Find first <?xml and cut everything before it
              if '<?xml' in content:
                  content = content[content.find('<?xml'):]
              # Remove illegal styles injected in layout
              if '<style' in content:
                  import re
                  content = re.sub(r'<style.*?>.*?</style>', '', content, flags=re.DOTALL)
              return content

          # Clean Layout
          with open('temp_layout.xml', 'r', encoding='utf-8', errors='ignore') as f:
              clean_l = clean_xml(f.read())
          with open('app/src/main/res/layout/activity_main.xml', 'w') as f:
              f.write(clean_l)

          # Clean Manifest
          with open('temp_manifest.xml', 'r', encoding='utf-8', errors='ignore') as f:
              clean_m = clean_xml(f.read())
          with open('app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(clean_m)
          "

          # 4. Java Package Injection
          {
            echo "package $PKG_NAME;"
            echo "import $PKG_NAME.R;"
            sed '/package /d' temp_main.java | sed '/import .*R;/d'
          } > app/src/main/java/$PKG_PATH/MainActivity.java

          # 5. Icon Processing
          if [ ! -z "${{ github.event.client_payload.icon_data_b64 }}" ]; then
            echo "${{ github.event.client_payload.icon_data_b64 }}" | base64 -d > app/src/main/res/drawable-xxxhdpi/ic_launcher.png
          fi

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app:clean :app:assembleDebug \
            -PdynamicPackage="${{ github.event.client_payload.package_name || 'com.system.pro' }}" \
            -PappName="${{ github.event.client_payload.app_name || 'SystemPro' }}" \
            --no-daemon --stacktrace

      - name: Upload System Pro APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name || 'SystemPro-Build' }}
          path: app/build/outputs/apk/debug/*.apk
