name: System Pro Infinite App Builder

on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: ♾️ GENERATE INFINITE UNIQUE DATA
        id: random
        run: |
          # 1. ایپ سے آنے والا ڈیٹا ریڈ کرنا (Safe Method)
          PKG_FROM_APP="${{ github.event.client_payload.package_name }}"
          APP_NAME_FROM_APP="${{ github.event.client_payload.app_name }}"
          
          # ڈیفالٹ ویلیوز
          if [[ -z "$PKG_FROM_APP" ]]; then PKG_FROM_APP="com.systempro.app"; fi
          if [[ -z "$APP_NAME_FROM_APP" ]]; then APP_NAME_FROM_APP="SystemPro"; fi

          # 2. انفینٹ کومبینیشن جنریٹر
          TIMESTAMP=$(date +%s%N)
          R1=$RANDOM; R2=$RANDOM; R3=$RANDOM; R4=$RANDOM; R5=$RANDOM
          RUN_ID=${{ github.run_id }}
          
          # بیس پیکج نکالنا (پہلے دو حصے، جیسے com.example)
          BASE_PKG=$(echo "$PKG_FROM_APP" | cut -d. -f1-2)
          
          # 3. فائنل یونیک ویلیوز
          # فارمیٹ: base.pkg.timestamp_randoms_runid
          UNIQUE_PKG="${BASE_PKG}.${TIMESTAMP}_${R1}_${R2}_${RUN_ID}"
          UNIQUE_APP="${APP_NAME_FROM_APP} (${TIMESTAMP: -4})"
          
          # ڈیٹا کو اگلے سٹیپس کے لیے سیو کرنا
          echo "unique_pkg=$UNIQUE_PKG" >> $GITHUB_OUTPUT
          echo "unique_app=$UNIQUE_APP" >> $GITHUB_OUTPUT
          echo "pkg_path=$(echo $UNIQUE_PKG | sed 's/\./\//g')" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

          # 4. کوڈ کو عارضی فائلوں میں محفوظ کرنا (Base64 Safe Handling)
          echo "${{ github.event.client_payload.java_code }}" > java_b64.txt
          echo "${{ github.event.client_payload.layout_code }}" > layout_b64.txt
          
          echo "✅ Infinite Data Generated: $UNIQUE_PKG"

      - name: 🧹 DEEP CLEANUP
        run: |
          rm -rf app/src/main/java/*
          rm -rf app/src/main/res/layout/*
          rm -rf app/src/main/res/values/*
          rm -rf app/build
          
          mkdir -p "app/src/main/java/${{ steps.random.outputs.pkg_path }}"
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          echo "✅ Cleanup complete"

      - name: 📝 INJECT INFINITE CODE
        run: |
          PKG_NAME="${{ steps.random.outputs.unique_pkg }}"
          PKG_PATH="${{ steps.random.outputs.pkg_path }}"
          JAVA_FILE="app/src/main/java/$PKG_PATH/MainActivity.java"
          LAYOUT_FILE="app/src/main/res/layout/activity_main.xml"
          
          # Java Decode
          if [ -s java_b64.txt ]; then
             cat java_b64.txt | base64 --decode > "$JAVA_FILE"
          else
             echo "package $PKG_NAME; import androidx.appcompat.app.AppCompatActivity; import android.os.Bundle; public class MainActivity extends AppCompatActivity { protected void onCreate(Bundle s) { super.onCreate(s); setContentView(R.layout.activity_main); } }" > "$JAVA_FILE"
          fi
          
          # Layout Decode
          if [ -s layout_b64.txt ]; then
             cat layout_b64.txt | base64 --decode > "$LAYOUT_FILE"
          else
             echo "<?xml version='1.0' encoding='utf-8'?><LinearLayout xmlns:android='http://schemas.android.com/apk/res/android' android:layout_width='match_parent' android:layout_height='match_parent' android:gravity='center'><TextView android:layout_width='wrap_content' android:layout_height='wrap_content' android:text='Infinite App Build' /></LinearLayout>" > "$LAYOUT_FILE"
          fi

          # اہم: پیکج اور R import کی زبردستی درستگی
          sed -i "1s|^package .*|package $PKG_NAME;|" "$JAVA_FILE"
          if ! grep -q "import $PKG_NAME.R;" "$JAVA_FILE"; then
            sed -i "/package $PKG_NAME;/a import $PKG_NAME.R;" "$JAVA_FILE"
          fi

      - name: 📄 CREATE MANIFEST & RESOURCES
        run: |
          PKG_NAME="${{ steps.random.outputs.unique_pkg }}"
          APP_NAME="${{ steps.random.outputs.unique_app }}"
          
          # Manifest
          echo "<?xml version='1.0' encoding='utf-8'?>
          <manifest xmlns:android='http://schemas.android.com/apk/res/android' package='$PKG_NAME'>
              <application android:label='$APP_NAME' android:theme='@style/Theme.AppCompat.Light.DarkActionBar'>
                  <activity android:name='$PKG_NAME.MainActivity' android:exported='true'>
                      <intent-filter>
                          <action android:name='android.intent.action.MAIN'/>
                          <category android:name='android.intent.category.LAUNCHER'/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>" > app/src/main/AndroidManifest.xml
          
          # Strings
          echo "<?xml version='1.0' encoding='utf-8'?><resources><string name='app_name'>$APP_NAME</string></resources>" > app/src/main/res/values/strings.xml
          # Themes (Basic)
          echo "<?xml version='1.0' encoding='utf-8'?><resources><style name='AppTheme' parent='Theme.AppCompat.Light.DarkActionBar' /></resources>" > app/src/main/res/values/themes.xml

      - name: ⚙️ SYNC GRADLE
        run: |
          PKG_NAME="${{ steps.random.outputs.unique_pkg }}"
          cat > app/build.gradle << EOF
          plugins { id 'com.android.application' }
          android {
              namespace '$PKG_NAME'
              compileSdk 34
              defaultConfig {
                  applicationId '$PKG_NAME'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: 🔨 BUILD INFINITE APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-build-cache

      - name: 📤 UPLOAD ARTIFACT
        uses: actions/upload-artifact@v4
        with:
          name: Infinite-APK-${{ steps.random.outputs.timestamp }}
          path: app/build/outputs/apk/debug/*.apk
