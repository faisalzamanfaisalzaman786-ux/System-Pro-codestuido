name: System Pro Native Build

on:
  workflow_dispatch: # مینول ٹرگر کے لیے

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # یہاں اصل تبدیلی ہے: صحیح پاتھ سے APK اٹھانا
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: System-Pro-Full-V1
          path: app/build/outputs/apk/debug/*.apk # یہ اصل APK اٹھائے گا
          retention-days: 5
