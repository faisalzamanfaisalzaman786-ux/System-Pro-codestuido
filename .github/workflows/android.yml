name: System Pro Final Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Force Clean and Repair Structure
        run: |
          # پرانی فائلوں کو صاف کرنا تاکہ ریسورس ایرر نہ آئے
          rm -rf app/src/main/res/layout/*
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # ایک بنیادی درست XML فائل بنانا تاکہ ریسورس پارسنگ ایرر ختم ہو
          echo '<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">System Pro Master</string>
          </resources>' > app/src/main/res/values/strings.xml

          # settings.gradle کی درست کنفیگریشن
          echo "pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'System Pro Master'
          include ':app'" > settings.gradle

          # app/build.gradle - پیکیج نیم تبدیل کر دیا گیا ہے تاکہ کنفلکٹ نہ آئے
          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.system.pro.new.build'
                  minSdk 24
                  targetSdk 34
                  versionCode ${{ github.run_number }}
                  versionName '1.0.${{ github.run_number }}'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }" > app/build.gradle

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
