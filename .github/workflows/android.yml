name: System Pro APK Builder

on:
  workflow_dispatch:
    inputs:
      file_content:
        description: 'Base64 encoded project files'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Force Clean Old Files
        run: |
          # پرانے کوڈ کو مکمل صاف کرنا تاکہ نیا پیکیج لاگو ہو سکے
          rm -rf app/src/main/java/com/*
          rm -rf app/src/main/res/layout/*
          echo "🧹 Cleanup complete!"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode and Setup New Project
        run: |
          echo "${{ github.event.inputs.file_content }}" | base64 -d > project_data.json
          python3 -c "
          import json, os
          with open('project_data.json', 'r') as f:
              data = json.load(f)
              files = data.get('files', {})
              for name, content in files.items():
                  path = ''
                  if name.endswith('.java'): path = f'app/src/main/java/com/systempro/faisal/{name}'
                  elif name.endswith('.xml') and 'layout' in name: path = f'app/src/main/res/layout/{name}'
                  elif name == 'AndroidManifest.xml': path = 'app/src/main/AndroidManifest.xml'
                  if path:
                      os.makedirs(os.path.dirname(path), exist_ok=True)
                      with open(path, 'w') as out: out.write(content)
          "

      - name: Build New APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Unique APK
        uses: actions/upload-artifact@v4
        with:
          name: Faisal-Torch-APK
          path: app/build/outputs/apk/debug/*.apk
