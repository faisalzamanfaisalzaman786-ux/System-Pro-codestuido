name: Android CI Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # آپ اسے اپنے ٹول سے بھی چلا سکتے ہیں

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          # اب سسٹم خود بخود فائل ڈھونڈ لے گا کیونکہ وہ پچھلے اسٹیپ میں ایڈ ہو چکی ہے
          FILE=$(find . -name gradlew | head -n 1)
          chmod +x "$FILE"
          ./$FILE assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
