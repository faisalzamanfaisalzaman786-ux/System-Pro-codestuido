<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Pro • APK Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: #0a0f1c; 
            color: #ffffff; 
            padding: 8px; 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            height: 100vh; 
            overflow: hidden; 
            font-size: 13px; 
        }
        body.fullscreen > *:not(.editor-box) { display: none !important; }
        body.fullscreen .editor-box {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10000;
            background: #0f1a2f;
            border-radius: 0;
            border: none;
            padding: 16px;
            margin: 0;
        }
        body.fullscreen .editor-box .editor-body {
            height: calc(100vh - 60px);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a2639;
            padding: 6px 16px;
            border-radius: 30px;
        }
        .settings-btn {
            background: #2d3f5e;
            border: none;
            border-radius: 25px;
            padding: 6px 18px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .settings-btn:hover { background: #3e5a82; }
        .repo-badge {
            background: #f97316;
            color: white;
            padding: 4px 14px;
            border-radius: 25px;
            font-size: 11px;
            font-weight: bold;
        }
        .led-group { display: flex; gap: 8px; }
        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            display: inline-block;
            transition: all 0.3s;
        }
        .led.green {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
        }
        .led.yellow {
            background: #eab308;
            box-shadow: 0 0 8px #eab308;
        }

        .gh-status {
            background: #1a2639;
            border-radius: 25px;
            padding: 4px 16px;
            color: #b0c4de;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
        }

        .package-row {
            background: #1a2639;
            border-radius: 25px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .package-input {
            background: #0f1a2f;
            border: 1px solid #3e5570;
            border-radius: 25px;
            padding: 6px 14px;
            color: white;
            width: 200px;
            font-size: 12px;
        }
        .serial-control {
            display: flex;
            align-items: center;
            background: #0f1a2f;
            border: 1px solid #3e5570;
            border-radius: 25px;
            overflow: hidden;
        }
        .serial-btn {
            background: #2d405b;
            border: none;
            color: white;
            width: 34px;
            height: 34px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .serial-btn:hover { background: #3e5a82; }
        .serial-btn.minus { background: #992222; }
        .serial-btn.minus:hover { background: #cc3333; }
        .serial-btn.plus { background: #226622; }
        .serial-btn.plus:hover { background: #33aa33; }
        .serial-box {
            background: #0f1a2f;
            border: none;
            color: white;
            width: 50px;
            height: 34px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }
        .quick-btn.small {
            background: #2d405b;
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            color: white;
            font-size: 11px;
            cursor: pointer;
        }
        .quick-btn.small:hover { background: #3e5a82; }

        .yaml-info {
            background: #1a4d1a;
            border-left: 4px solid #22c55e;
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 12px;
            color: #bbf7d0;
            margin: 2px 0;
        }

        .tabs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            margin: 2px 0;
        }
        .tab {
            padding: 8px 0;
            text-align: center;
            border-radius: 25px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .tab.java { background: linear-gradient(145deg, #f97316, #c2410c); }
        .tab.layout { background: linear-gradient(145deg, #3b82f6, #1e40af); }
        .tab.manifest { background: linear-gradient(145deg, #a855f7, #6b21a5); }
        .tab.image { background: linear-gradient(145deg, #22c55e, #166534); }
        .tab.active { border: 2px solid #ffdd99; box-shadow: 0 0 15px #f97316; }

        .editor-box {
            background: #0f1a2f;
            border: 1px solid #2e4a6a;
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            min-height: 180px;
            margin: 2px 0;
        }
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            color: #f97316;
            font-weight: bold;
            font-size: 12px;
        }
        .fullscreen-btn {
            background: #2d405b;
            border: none;
            border-radius: 15px;
            padding: 4px 10px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .fullscreen-btn:hover { background: #3e5a82; }
        .editor-body {
            flex: 1;
            min-height: 0;
            position: relative;
        }
        .code-area {
            width: 100%;
            height: 100%;
            background: #0f1a2f;
            border: none;
            color: #fff;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            resize: none;
            outline: none;
        }
        #imagePanel {
            width: 100%;
            height: 100%;
            color: white;
            padding: 15px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #imagePanel > div {
            width: 100%;
            border: 2px dashed #3b82f6;
            border-radius: 15px;
            padding: 20px;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            margin: 2px 0;
        }
        .quick-btn {
            background: #1f3147;
            border: 1px solid #3e5a7a;
            border-radius: 20px;
            padding: 6px 0;
            color: #d0e0ff;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover {
            background: #2c4460;
            color: white;
        }

        .artifacts-section {
            background: #1a2639;
            border-radius: 20px;
            padding: 10px 16px;
            margin: 2px 0;
        }
        .artifacts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .artifacts-title {
            color: #f97316;
            font-size: 12px;
            font-weight: bold;
        }
        .artifacts-refresh {
            background: #2d405b;
            border: none;
            border-radius: 15px;
            padding: 3px 12px;
            color: white;
            font-size: 10px;
            cursor: pointer;
        }
        .artifacts-list {
            max-height: 80px;
            overflow-y: auto;
        }
        .artifact-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #2e4a6a;
        }
        .artifact-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .artifact-name {
            color: #a5f3fc;
            font-size: 11px;
        }
        .artifact-size {
            color: #6b7280;
            font-size: 10px;
        }
        .download-btn {
            background: #226622;
            border: none;
            border-radius: 15px;
            padding: 4px 12px;
            color: white;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .download-btn:hover { background: #33aa33; }
        .download-btn:disabled {
            background: #2d405b;
            cursor: not-allowed;
        }

        .status-bar-mini {
            background: #1a2639;
            border-radius: 20px;
            padding: 8px 16px;
            margin: 2px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
        }
        .status-items { display: flex; gap: 20px; color: #b0c4de; }
        .status-item { display: flex; align-items: center; gap: 5px; }
        .status-label { color: #6b7280; }
        .status-value { color: #f97316; font-weight: bold; }
        .progress-mini { display: flex; align-items: center; gap: 8px; }
        .bar-container-mini {
            width: 80px;
            height: 4px;
            background: #0f1a2f;
            border-radius: 2px;
            overflow: hidden;
        }
        .bar-fill-mini {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #22c55e, #eab308);
            transition: width 0.3s;
        }

        .log-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a2639;
            border-radius: 20px;
            padding: 12px;
            margin-top: 4px;
            min-height: 0;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .log-title {
            color: #f97316;
            font-size: 13px;
            font-weight: bold;
        }
        .log-actions { display: flex; gap: 8px; }
        .log-action-btn {
            background: #2d405b;
            border: none;
            border-radius: 15px;
            padding: 4px 12px;
            color: white;
            font-size: 10px;
            cursor: pointer;
        }
        .log-action-btn:hover { background: #3e5a82; }
        .log-container {
            background: #0f1a2f;
            border: 1px solid #2e4a6a;
            border-radius: 15px;
            padding: 15px;
            flex: 1;
            overflow-y: auto;
            color: #a5f3fc;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.8;
        }
        .log-entry {
            padding: 6px 0;
            border-bottom: 1px solid #1e2f45;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-entry:last-child { border-bottom: none; }
        .log-entry.error {
            color: #ff8888;
            background: rgba(255, 0, 0, 0.1);
            padding: 8px;
            border-radius: 8px;
            margin: 4px 0;
        }
        .log-entry.warning {
            color: #ffaa00;
            background: rgba(255, 170, 0, 0.1);
            padding: 8px;
            border-radius: 8px;
        }
        .log-entry.success { color: #88ff88; }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 8px;
        }
        .action-btn {
            background: linear-gradient(145deg, #1e3a5f, #0f2a4a);
            border: 1px solid #3b82f6;
            border-radius: 30px;
            padding: 10px 0;
            color: white;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .action-btn:hover {
            background: linear-gradient(145deg, #2b4a7a, #1a3a60);
            transform: translateY(-1px);
        }
        .action-btn.download-btn {
            background: linear-gradient(145deg, #22c55e, #166534);
            border-color: #22c55e;
        }
        .action-btn.download-btn:hover {
            background: linear-gradient(145deg, #33dd77, #1a7a3a);
        }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1a2639;
            border: 2px solid #3b82f6;
            border-radius: 25px;
            padding: 25px;
            width: 90%;
            max-width: 350px;
        }
        .modal-content h3 {
            color: #f97316;
            margin-bottom: 20px;
            text-align: center;
        }
        .modal-input {
            width: 100%;
            background: #0f1a2f;
            border: 1px solid #3e5570;
            border-radius: 15px;
            padding: 12px 15px;
            color: white;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }
        .modal-input:focus {
            border-color: #f97316;
            box-shadow: 0 0 10px rgba(249,115,22,0.3);
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-btn {
            flex: 1;
            background: #2d405b;
            border: none;
            border-radius: 20px;
            padding: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .modal-btn.save { background: #226622; }
        .modal-btn.save:hover { background: #33aa33; }
        .modal-btn.close { background: #992222; }
        .modal-btn.close:hover { background: #cc3333; }
        .modal-status {
            color: #a5f3fc;
            font-size: 11px;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<!-- Top Bar -->
<div class="top-bar">
    <button class="settings-btn" onclick="openSettings()">⚙️ Settings</button>
    <span class="repo-badge" id="repoBadge">Not Connected</span>
    <div class="led-group">
        <span class="led" id="connLed"></span>
        <span class="led" id="workLed"></span>
    </div>
</div>

<!-- GitHub Status -->
<div class="gh-status">
    <span>GitHub: <span id="ghStatus">Disconnected</span></span>
    <span>API: <span id="apiRemaining">?</span>/<span id="apiLimit">?</span></span>
</div>

<!-- Package Row (Multi Package Support) -->
<div class="package-row">
    <input type="text" class="package-input" id="pkgBase" value="com.systempro.faisal" placeholder="base package">
    <span style="color:#f97316; font-weight:bold;">.</span>
    <input type="text" class="serial-box" id="serialNum" value="001" style="width:60px;" readonly>
    <div class="serial-control" style="margin-left:0;">
        <button class="serial-btn minus" onclick="changeSerial(-1)">−</button>
        <button class="serial-btn plus" onclick="changeSerial(1)">+</button>
    </div>
    <button class="quick-btn small" onclick="combinePackage()" style="margin-left:4px;">➡️ Combine</button>
    <input type="text" class="package-input" id="pkgFinal" value="com.systempro.faisal.001" readonly style="width:220px;">
</div>

<!-- Success Message -->
<div class="yaml-info" id="yamlInfo">
    ✅ Ready. Set GitHub settings and trigger a build.
</div>

<!-- Tabs -->
<div class="tabs">
    <div class="tab java active" onclick="switchTab('java', this)">JAVA</div>
    <div class="tab layout" onclick="switchTab('layout', this)">LAYOUT</div>
    <div class="tab manifest" onclick="switchTab('manifest', this)">MANIFEST</div>
    <div class="tab image" onclick="switchTab('image', this)">IMAGE</div>
</div>

<!-- Editor Box -->
<div class="editor-box">
    <div class="editor-header">
        <span>EDITOR</span>
        <button class="fullscreen-btn" id="fullscreenBtn" onclick="toggleFullScreen()">⛶</button>
    </div>
    <div class="editor-body">
        <textarea id="javaEditor" class="code-area" placeholder="// Java code here..."></textarea>
        <textarea id="layoutEditor" class="code-area" style="display:none;" placeholder="<!-- XML layout here -->"></textarea>
        <textarea id="manifestEditor" class="code-area" style="display:none;" placeholder="<!-- AndroidManifest.xml here -->"></textarea>
        <div id="imagePanel" style="display:none;">
            <div>
                <span style="font-size: 40px;">📸</span><br>
                <input type="file" id="imageUpload" accept="image/*" style="display:none;" onchange="handleImageUpload(this)">
                <button onclick="document.getElementById('imageUpload').click()" style="background:#2d405b; border:none; border-radius:15px; padding:8px 20px; color:white; margin-top:10px; cursor:pointer;">Click to upload icon</button>
            </div>
        </div>
    </div>
</div>

<!-- Quick Actions -->
<div class="quick-actions">
    <button class="quick-btn" onclick="insertCounter()">📱 Counter</button>
    <button class="quick-btn" onclick="fixManifest()">🔧 Manifest</button>
    <button class="quick-btn" onclick="validateAll()">✓ Validate</button>
    <button class="quick-btn" onclick="clearLogs()">🗑️ Clear</button>
</div>

<!-- Artifacts Section -->
<div class="artifacts-section">
    <div class="artifacts-header">
        <span class="artifacts-title">📦 Available APKs</span>
        <button class="artifacts-refresh" onclick="fetchArtifacts()">🔄 Refresh</button>
    </div>
    <div class="artifacts-list" id="artifactsList">
        <div style="color: #6b7280; text-align: center; padding: 10px;">No artifacts found. Trigger a build first.</div>
    </div>
</div>

<!-- Minimal Status Bar -->
<div class="status-bar-mini">
    <div class="status-items">
        <div class="status-item">
            <span class="status-label">Total:</span>
            <span class="status-value" id="totalRuns">0</span>
        </div>
        <div class="status-item">
            <span class="status-label">Success:</span>
            <span class="status-value" id="successRuns" style="color: #22c55e;">0</span>
        </div>
        <div class="status-item">
            <span class="status-label">Failed:</span>
            <span class="status-value" id="failedRuns" style="color: #ff4444;">0</span>
        </div>
    </div>
    <div class="progress-mini">
        <span id="buildStatus" style="color: #b0c4de;">Idle</span>
        <div class="bar-container-mini">
            <div class="bar-fill-mini" id="progressFill"></div>
        </div>
        <span id="buildPercent" style="color: #f97316;">0%</span>
    </div>
</div>

<!-- Main Log Section -->
<div class="log-section">
    <div class="log-header">
        <span class="log-title">📋 SYSTEM LOGS</span>
        <div class="log-actions">
            <button class="log-action-btn" onclick="copyLogs()">📋 Copy</button>
            <button class="log-action-btn" onclick="clearLogs()">🗑️ Clear</button>
        </div>
    </div>
    <div class="log-container" id="logDisplay">
        <!-- Logs will appear here -->
    </div>
</div>

<!-- Action Buttons -->
<div class="action-buttons">
    <button class="action-btn download-btn" id="downloadBtn" onclick="downloadLatestApk()">
        ⬇️ DOWNLOAD APK
    </button>
    <button class="action-btn" id="fixBtn" onclick="fixManifest()">🔧 FIX</button>
    <button class="action-btn" id="buildBtn" onclick="triggerWorkflow()">🚀 TRIGGER BUILD</button>
    <button class="action-btn" id="refreshBtn" onclick="refreshStatus()">🔄 REFRESH</button>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3>⚙️ GitHub Settings</h3>
        <input type="text" class="modal-input" id="githubUser" placeholder="GitHub Username (e.g., faisalzar)">
        <input type="text" class="modal-input" id="githubRepo" placeholder="Repository Name">
        <input type="password" class="modal-input" id="githubToken" placeholder="Personal Access Token (with workflow scope)">
        <div class="modal-buttons">
            <button class="modal-btn save" onclick="saveSettings()">💾 Save</button>
            <button class="modal-btn close" onclick="closeSettings()">✖ Close</button>
        </div>
        <div class="modal-status" id="modalStatus"></div>
    </div>
</div>

<script>
    // ==================== GLOBAL VARIABLES ====================
    const githubSettings = {
        username: '',
        repo: '',
        token: ''
    };
    
    let buildInProgress = false;
    let currentSerial = 1;
    let selectedImageBase64 = null;
    let refreshInterval = null;
    let abortController = null;
    let defaultBranch = 'main';
    let artifacts = [];
    let latestRunId = null;

    // ==================== INITIALIZATION ====================
    window.onload = function() {
        loadSettings();
        loadDefaultCode();
        combinePackage(); // پہلی بار فائنل پیکیج بنا دیں
        addLog('🚀 System initialized - APK Builder', 'success');
        addLog('✅ Multi-package support enabled', 'success');
        
        if (!githubSettings.token) {
            addLog('⚙️ Please configure GitHub settings to connect', 'warning');
        } else {
            checkGitHubConnection();
        }
    };

    // ==================== FULL SCREEN ====================
    function toggleFullScreen() {
        document.body.classList.toggle('fullscreen');
        const btn = document.getElementById('fullscreenBtn');
        btn.textContent = document.body.classList.contains('fullscreen') ? '✕' : '⛶';
        addLog('🔍 Editor full-screen ' + (document.body.classList.contains('fullscreen') ? 'enabled' : 'disabled'), 'info');
    }

    // ==================== PACKAGE COMBINE ====================
    function combinePackage() {
        const base = document.getElementById('pkgBase').value.trim();
        const serial = document.getElementById('serialNum').value;
        const final = base + '.' + serial;
        document.getElementById('pkgFinal').value = final;
        addLog(`📦 Final package: ${final}`, 'info');
    }

    function changeSerial(delta) {
        const serialInput = document.getElementById('serialNum');
        let value = parseInt(serialInput.value, 10);
        if (isNaN(value)) value = 1;
        value += delta;
        if (value < 1) value = 1;
        if (value > 999) value = 999;
        currentSerial = value;
        serialInput.value = value.toString().padStart(3, '0');
        combinePackage(); // خودکار طور پر پیکیج اپ ڈیٹ کریں
    }

    // ==================== ARTIFACTS ====================
    async function fetchArtifacts() {
        if (!githubSettings.token || !githubSettings.username || !githubSettings.repo) {
            addLog('⚠️ Please configure GitHub settings first', 'warning');
            return;
        }

        try {
            addLog('🔍 Fetching available artifacts...', 'info');
            
            const runsResponse = await fetch(`https://api.github.com/repos/${githubSettings.username}/${githubSettings.repo}/actions/runs?per_page=5&status=success`, {
                headers: { 'Authorization': `Bearer ${githubSettings.token}` }
            });

            if (!runsResponse.ok) throw new Error('Failed to fetch runs');

            const runsData = await runsResponse.json();
            const successfulRuns = runsData.workflow_runs || [];
            
            if (successfulRuns.length === 0) {
                document.getElementById('artifactsList').innerHTML = '<div style="color: #6b7280; text-align: center; padding: 10px;">No successful builds found</div>';
                return;
            }

            latestRunId = successfulRuns[0].id;
            
            const artifactsResponse = await fetch(`https://api.github.com/repos/${githubSettings.username}/${githubSettings.repo}/actions/runs/${latestRunId}/artifacts`, {
                headers: { 'Authorization': `Bearer ${githubSettings.token}` }
            });

            if (!artifactsResponse.ok) throw new Error('Failed to fetch artifacts');

            const artifactsData = await artifactsResponse.json();
            artifacts = artifactsData.artifacts || [];
            
            displayArtifacts();
            
            if (artifacts.length > 0) {
                addLog(`📦 Found ${artifacts.length} artifact(s)`, 'success');
            } else {
                addLog('📦 No artifacts found in latest build', 'warning');
            }
        } catch (error) {
            addLog(`❌ Error fetching artifacts: ${error.message}`, 'error');
        }
    }

    function displayArtifacts() {
        const container = document.getElementById('artifactsList');
        
        if (artifacts.length === 0) {
            container.innerHTML = '<div style="color: #6b7280; text-align: center; padding: 10px;">No artifacts available</div>';
            return;
        }

        let html = '';
        artifacts.forEach(artifact => {
            const size = (artifact.size_in_bytes / 1024).toFixed(0) + ' KB';
            const createdAt = new Date(artifact.created_at).toLocaleString();
            
            html += `
                <div class="artifact-item">
                    <div class="artifact-info">
                        <span class="artifact-name">${artifact.name}</span>
                        <span class="artifact-size">${size}</span>
                    </div>
                    <button class="download-btn" onclick="downloadArtifact(${artifact.id}, '${artifact.name}')">
                        ⬇️ Download
                    </button>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }

    async function downloadArtifact(artifactId, artifactName) {
        if (!githubSettings.token) {
            addLog('❌ Please configure GitHub settings first', 'error');
            return;
        }

        try {
            addLog(`⬇️ Downloading ${artifactName}...`, 'info');
            
            const response = await fetch(`https://api.github.com/repos/${githubSettings.username}/${githubSettings.repo}/actions/artifacts/${artifactId}/zip`, {
                headers: { 'Authorization': `Bearer ${githubSettings.token}` }
            });

            if (!response.ok) throw new Error('Download failed');

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${artifactName}.zip`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
            
            addLog(`✅ Download complete: ${artifactName}.zip`, 'success');
        } catch (error) {
            addLog(`❌ Download failed: ${error.message}`, 'error');
        }
    }

    async function downloadLatestApk() {
        if (!githubSettings.token) {
            addLog('❌ Please configure GitHub settings first', 'error');
            openSettings();
            return;
        }

        try {
            await fetchArtifacts();
            
            if (artifacts.length === 0) {
                addLog('⚠️ No APK found. Trigger a build first.', 'warning');
                return;
            }

            const artifact = artifacts[0]; // پہلا آرٹیفیکٹ ڈاؤن لوڈ کریں
            await downloadArtifact(artifact.id, artifact.name);
        } catch (error) {
            addLog(`❌ Failed to download APK: ${error.message}`, 'error');
        }
    }

    // ==================== TRIGGER WORKFLOW ====================
    async function triggerWorkflow() {
        if (!githubSettings.token) {
            addLog('❌ Please configure GitHub settings first', 'error');
            openSettings();
            return;
        }

        if (buildInProgress) {
            addLog('⚠️ Build already in progress', 'warning');
            return;
        }

        buildInProgress = true;
        document.getElementById('buildBtn').disabled = true;
        updateProgress(10);
        
        // تمام ایڈیٹرز کا مواد جمع کریں
        const javaCode = document.getElementById('javaEditor').value;
        const layoutXml = document.getElementById('layoutEditor').value;
        const manifestXml = document.getElementById('manifestEditor').value;
        const finalPackage = document.getElementById('pkgFinal').value;

        let imageBase64 = '';
        if (selectedImageBase64) {
            // ڈیٹا URL سے اصل بیس 64 حصہ الگ کریں
            imageBase64 = selectedImageBase64.split(',')[1];
        }

        // تمام فائلوں کو ایک آبجیکٹ میں پیک کریں
        const payload = {
            package: finalPackage,
            files: {
                'MainActivity.java': javaCode,
                'activity_main.xml': layoutXml,
                'AndroidManifest.xml': manifestXml,
                ...(imageBase64 && { 'icon.png': imageBase64 })
            }
        };

        // JSON کو بیس 64 میں تبدیل کریں (یونیکوڈ سے محفوظ)
        const jsonString = JSON.stringify(payload);
        const base64Content = btoa(unescape(encodeURIComponent(jsonString)));

        addLog(`📦 Preparing build for package: ${finalPackage}`, 'info');
        updateProgress(30);

        try {
            // ورک فلو تلاش کریں
            const workflowsRes = await fetch(`https://api.github.com/repos/${githubSettings.username}/${githubSettings.repo}/actions/workflows`, {
                headers: { 'Authorization': `Bearer ${githubSettings.token}` }
            });
            const workflowsData = await workflowsRes.json();
            const workflow = workflowsData.workflows.find(w => w.name === 'System Pro APK Builder'); // نام بالکل درست ہونا چاہیے

            if (!workflow) {
                throw new Error('Workflow "System Pro APK Builder" not found. Please create it first.');
            }

            addLog(`📝 Using workflow: ${workflow.name}`, 'success');
            updateProgress(50);

            // ڈسپیچ کریں
            const dispatchRes = await fetch(`https://api.github.com/repos/${githubSettings.username}/${githubSettings.repo}/actions/workflows/${workflow.id}/dispatches`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${githubSettings.token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    ref: defaultBranch,
                    inputs: {
                        file_content: base64Content
                    }
                })
            });

            if (dispatchRes.ok) {
                addLog('✅ Workflow triggered successfully!', 'success');
                document.getElementById('yamlInfo').innerHTML = '✅ Build triggered! APK will be ready soon.';
                updateProgress(100);
                setTimeout(() => updateProgress(0), 3000);
                
                // 10 سیکنڈ بعد آرٹیفیکٹ چیک کریں
                setTimeout(() => {
                    fetchArtifacts();
                    buildInProgress = false;
                    document.getElementById('buildBtn').disabled = false;
                }, 10000);
            } else {
                const err = await dispatchRes.json();
                throw new Error(err.message || 'Dispatch failed');
            }
        } catch (error) {
            addLog(`❌ Trigger error: ${error.message}`, 'error');
            buildInProgress = false;
            document.getElementById('buildBtn').disabled = false;
            updateProgress(0);
        }
    }

    // ==================== GITHUB CONNECTION ====================
    async function checkGitHubConnection() {
        if (!githubSettings.token) {
            updateConnectionStatus(false);
            return;
        }

        if (abortController) abortController.abort();
        abortController = new AbortController();

        try {
            addLog('🔄 Checking GitHub connection...', 'info');
            
            const response = await fetch('https://api.github.com/user', {
                signal: abortController.signal,
                headers: {
                    'Authorization': `Bearer ${githubSettings.token}`,
                    'Accept': 'application/vnd.github.v3+json'
                }
            });

            if (response.ok) {
                const data = await response.json();
                updateConnectionStatus(true);
                addLog(`✅ GitHub connected as @${data.login}`, 'success');
                
                if (githubSettings.username && githubSettings.repo) {
                    document.getElementById('repoBadge').textContent = `${githubSettings.username}/${githubSettings.repo}`;
                    await detectDefaultBranch();
                    await fetchWorkflowRuns();
                    await fetchArtifacts();
                }
            } else {
                const error = await response.json();
                updateConnectionStatus(false);
                addLog(`❌ GitHub connection failed: ${error.message}`, 'error');
            }
        } catch (error) {
            if (error.name !== 'AbortError') {
                updateConnectionStatus(false);
                addLog(`❌ GitHub connection error: ${error.message}`, 'error');
            }
        } finally {
            abortController = null;
        }
    }

    async function detectDefaultBranch() {
        try {
            const response = await fetch(`https://api.github.com/repos/${githubSettings.username}/${githubSettings.repo}`, {
                headers: { 'Authorization': `Bearer ${githubSettings.token}` }
            });
            
            if (response.ok) {
                const data = await response.json();
                defaultBranch = data.default_branch || 'main';
                addLog(`🌿 Default branch: ${defaultBranch}`, 'success');
            }
        } catch (error) {
            addLog(`⚠️ Could not detect default branch: ${error.message}`, 'warning');
        }
    }

    async function fetchWorkflowRuns() {
        try {
            const response = await fetch(`https://api.github.com/repos/${githubSettings.username}/${githubSettings.repo}/actions/runs?per_page=5`, {
                headers: { 'Authorization': `Bearer ${githubSettings.token}` }
            });

            if (response.ok) {
                const data = await response.json();
                const runs = data.workflow_runs || [];
                
                const total = runs.length;
                const success = runs.filter(r => r.conclusion === 'success').length;
                const failed = runs.filter(r => r.conclusion === 'failure').length;
                
                document.getElementById('totalRuns').textContent = total;
                document.getElementById('successRuns').textContent = success;
                document.getElementById('failedRuns').textContent = failed;
                
                if (runs.length > 0) {
                    const latest = runs[0];
                    if (latest.status === 'completed' && latest.conclusion === 'success') {
                        document.getElementById('buildStatus').textContent = 'Success';
                        document.getElementById('workLed').classList.add('green');
                        document.getElementById('yamlInfo').innerHTML = '✅ Build successful! APK is ready.';
                    } else if (latest.status === 'completed' && latest.conclusion === 'failure') {
                        document.getElementById('buildStatus').textContent = 'Failed';
                        document.getElementById('workLed').classList.remove('green', 'yellow');
                        document.getElementById('yamlInfo').innerHTML = '❌ Build failed. Check logs.';
                    } else if (latest.status === 'in_progress') {
                        document.getElementById('buildStatus').textContent = 'Running';
                        document.getElementById('workLed').classList.add('yellow');
                        document.getElementById('yamlInfo').innerHTML = '⏳ Build in progress...';
                    }
                }
            }
        } catch (error) {
            addLog(`❌ Error fetching workflow runs: ${error.message}`, 'error');
        }
    }

    function updateConnectionStatus(connected) {
        const led = document.getElementById('connLed');
        const status = document.getElementById('ghStatus');
        
        if (led && status) {
            if (connected) {
                led.classList.add('green');
                status.textContent = 'Connected';
                status.style.color = '#22c55e';
            } else {
                led.classList.remove('green');
                status.textContent = 'Disconnected';
                status.style.color = '#ff4444';
            }
        }
    }

    // ==================== UI FUNCTIONS ====================
    function switchTab(tab, element) {
        document.getElementById('javaEditor').style.display = 'none';
        document.getElementById('layoutEditor').style.display = 'none';
        document.getElementById('manifestEditor').style.display = 'none';
        document.getElementById('imagePanel').style.display = 'none';
        
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        element.classList.add('active');
        
        if (tab === 'java') {
            document.getElementById('javaEditor').style.display = 'block';
            addLog('📋 Switched to JAVA editor', 'info');
        } else if (tab === 'layout') {
            document.getElementById('layoutEditor').style.display = 'block';
            addLog('📋 Switched to LAYOUT editor', 'info');
        } else if (tab === 'manifest') {
            document.getElementById('manifestEditor').style.display = 'block';
            addLog('📋 Switched to MANIFEST editor', 'info');
        } else if (tab === 'image') {
            document.getElementById('imagePanel').style.display = 'flex';
            addLog('📋 Switched to IMAGE upload', 'info');
        }
    }

    function loadDefaultCode() {
        document.getElementById('javaEditor').value = `package com.systempro.faisal;

import android.os.Bundle;
import android.view.View;
import android.widget.Button;
import android.widget.TextView;
import androidx.appcompat.app.AppCompatActivity;

public class MainActivity extends AppCompatActivity {
    private TextView tvCounter;
    private Button btnIncrement;
    private int count = 0;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);
        
        tvCounter = findViewById(R.id.tvCounter);
        btnIncrement = findViewById(R.id.btnIncrement);
        
        btnIncrement.setOnClickListener(new View.OnClickListener() {
            @Override
            public void onClick(View v) {
                count++;
                tvCounter.setText(String.valueOf(count));
            }
        });
    }
}`;

        document.getElementById('layoutEditor').value = `<?xml version="1.0" encoding="utf-8"?>
<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent"
    android:layout_height="match_parent"
    android:orientation="vertical"
    android:gravity="center"
    android:background="#1e1e2f">

    <TextView
        android:id="@+id/tvCounter"
        android:layout_width="wrap_content"
        android:layout_height="wrap_content"
        android:text="0"
        android:textSize="60sp"
        android:textColor="#ffffff"
        android:padding="20dp"/>

    <Button
        android:id="@+id/btnIncrement"
        android:layout_width="200dp"
        android:layout_height="80dp"
        android:text="Increment"
        android:textSize="24sp"
        android:backgroundTint="#f97316"/>
</LinearLayout>`;

        document.getElementById('manifestEditor').value = `<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="com.systempro.faisal">

    <application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:label="System Pro"
        android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
        
        <activity
            android:name=".MainActivity"
            android:exported="true">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
    </application>
</manifest>`;
    }

    function insertCounter() {
        loadDefaultCode();
        addLog('📱 Counter app code inserted', 'success');
    }

    function fixManifest() {
        const finalPkg = document.getElementById('pkgFinal').value.trim();
        const manifest = `<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="${finalPkg}">

    <application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:label="System Pro"
        android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
        
        <activity
            android:name=".MainActivity"
            android:exported="true">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
    </application>
</manifest>`;
        document.getElementById('manifestEditor').value = manifest;
        addLog(`🔧 Manifest fixed with package: ${finalPkg}`, 'success');
    }

    function validateAll() {
        const java = document.getElementById('javaEditor').value;
        const layout = document.getElementById('layoutEditor').value;
        const manifest = document.getElementById('manifestEditor').value;
        const finalPkg = document.getElementById('pkgFinal').value;
        
        let issues = [];
        
        if (!java.includes('package ' + finalPkg)) {
            issues.push(`Java: package should be ${finalPkg}`);
        }
        if (!layout.includes('LinearLayout')) issues.push('Layout: Invalid XML');
        if (!manifest.includes('package="' + finalPkg + '"')) {
            issues.push(`Manifest: package should be ${finalPkg}`);
        }
        
        if (issues.length === 0) {
            addLog('✅ Validation passed - All files OK', 'success');
        } else {
            addLog('⚠️ Validation found ' + issues.length + ' issues', 'warning');
            issues.forEach(issue => addLog('   • ' + issue, 'warning'));
        }
    }

    function refreshStatus() {
        addLog('🔄 Refreshing status...', 'info');
        checkGitHubConnection();
    }

    function updateProgress(percent) {
        document.getElementById('progressFill').style.width = percent + '%';
        document.getElementById('buildPercent').textContent = percent + '%';
    }

    function handleImageUpload(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                selectedImageBase64 = e.target.result;
                addLog('✅ Icon uploaded successfully', 'success');
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // ==================== LOGS ====================
    function addLog(message, type = 'info') {
        const logDiv = document.getElementById('logDisplay');
        if (!logDiv) return;
        
        const timestamp = new Date().toLocaleTimeString('en-US', { 
            hour: '2-digit', 
            minute: '2-digit', 
            second: '2-digit',
            hour12: true 
        });
        
        const newLog = document.createElement('div');
        newLog.className = 'log-entry';
        if (type === 'error') newLog.classList.add('error');
        if (type === 'warning') newLog.classList.add('warning');
        if (type === 'success') newLog.classList.add('success');
        
        newLog.textContent = `[${timestamp}] ${message}`;
        logDiv.appendChild(newLog);
        
        logDiv.scrollTop = logDiv.scrollHeight;
        
        while (logDiv.children.length > 50) {
            logDiv.removeChild(logDiv.firstChild);
        }
    }

    function clearLogs() {
        const logDiv = document.getElementById('logDisplay');
        if (logDiv) {
            logDiv.innerHTML = '';
            addLog('🧹 Logs cleared', 'success');
        }
    }

    function copyLogs() {
        const logDiv = document.getElementById('logDisplay');
        if (!logDiv) return;
        
        const logs = Array.from(logDiv.children)
            .map(el => el.textContent)
            .join('\n');
            
        navigator.clipboard.writeText(logs).then(() => {
            addLog('📋 Logs copied to clipboard', 'success');
        }).catch(() => {
            addLog('❌ Failed to copy logs', 'error');
        });
    }

    // ==================== SETTINGS ====================
    function openSettings() {
        document.getElementById('settingsModal').style.display = 'flex';
        document.getElementById('githubUser').value = githubSettings.username;
        document.getElementById('githubRepo').value = githubSettings.repo;
        document.getElementById('githubToken').value = githubSettings.token;
    }

    function closeSettings() {
        document.getElementById('settingsModal').style.display = 'none';
        document.getElementById('modalStatus').innerHTML = '';
    }

    function saveSettings() {
        const username = document.getElementById('githubUser').value.trim();
        const repo = document.getElementById('githubRepo').value.trim();
        const token = document.getElementById('githubToken').value.trim();

        if (!username || !repo || !token) {
            document.getElementById('modalStatus').innerHTML = '❌ All fields are required';
            return;
        }

        githubSettings.username = username;
        githubSettings.repo = repo;
        githubSettings.token = token;
        
        localStorage.setItem('github_settings', JSON.stringify(githubSettings));
        
        document.getElementById('modalStatus').innerHTML = '✅ Settings saved!';
        
        setTimeout(() => {
            closeSettings();
            checkGitHubConnection();
        }, 1000);
    }

    function loadSettings() {
        const saved = localStorage.getItem('github_settings');
        if (saved) {
            Object.assign(githubSettings, JSON.parse(saved));
        }
    }

    // Cleanup
    window.onunload = function() {
        if (refreshInterval) clearInterval(refreshInterval);
        if (abortController) abortController.abort();
    };
</script>

</body>
</html>
