name: System Pro Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: 4. Create Project Structure
        run: |
          # بنیادی فولڈرز بنانا
          mkdir -p app/src/main/java/com/systempro/test
          mkdir -p app/src/main/res/layout
          
          # build.gradle فائل بنانا (اگر موجود نہ ہو)
          if [ ! -f "build.gradle" ]; then
            echo "buildscript { repositories { google(); mavenCentral() } }" > build.gradle
          fi
          
          # ایپ لیول کی build.gradle
          echo "plugins { id 'com.android.application' }" > app/build.gradle
          echo "android { namespace 'com.systempro.test'; compileSdk 34; defaultconfig { applicationId 'com.systempro.test'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' } }" >> app/build.gradle

          # گریڈل ریپر تیار کرنا
          gradle wrapper
          chmod +x gradlew

      - name: 5. Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 6. Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-APK
          path: app/build/outputs/apk/debug/*.apk
