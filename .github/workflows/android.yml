<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Pro Ultimate • Faisal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0c111b; color: #eef3fc; padding: 12px; display: flex; flex-direction: column; gap: 10px; height: 100vh; overflow: hidden; }

        /* Top Bar */
        .top-bar { display: flex; align-items: center; gap: 12px; background: rgba(26, 42, 58, 0.5); padding: 10px; border-radius: 50px; border: 1px solid #1e3a5f; }
        .set-btn { background: #2f3b54; border: 1px solid #4d6085; border-radius: 20px; padding: 8px 15px; color: white; cursor: pointer; font-size: 0.8rem; }
        .pkg-name { flex: 1; text-align: center; color: #b78aff; font-family: monospace; font-weight: bold; font-size: 0.8rem; }
        
        /* Status LED */
        .led { width: 18px; height: 18px; border-radius: 50%; background: #ff4444; box-shadow: 0 0 10px #ff4444; transition: 0.3s; }
        @keyframes blinker { 50% { opacity: 0.3; box-shadow: 0 0 0px #00ff88; } }

        /* Navigation Tabs */
        .tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .tab { background: #1f2a3f; border: 1px solid #40597a; border-radius: 12px; padding: 10px 2px; text-align: center; font-size: 0.7rem; cursor: pointer; color: #bdd3ff; }
        .tab.active { background: #2c405f; border-color: #ffb86b; color: #ffeda6; }

        /* Editor */
        .editor-box { background: #101826; border-radius: 15px; border: 1px solid #3b5170; flex: 1; padding: 12px; position: relative; overflow: hidden; }
        .code-area { width: 100%; height: 100%; background: transparent; border: none; outline: none; color: #00ff88; font-family: 'Consolas', monospace; font-size: 13px; display: none; }
        .code-area.active { display: block; }

        /* Progress Display */
        .panel { background: #1a2335; border-radius: 15px; padding: 10px; border: 1px solid #3b5170; }
        .bar-container { height: 6px; background: #080c14; border-radius: 10px; margin: 8px 0; overflow: hidden; }
        #bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #3a7bd5, #00d2ff); transition: 0.4s; }
        .logs { height: 65px; background: #080c14; border-radius: 10px; padding: 8px; font-size: 10px; color: #00ff88; overflow-y: auto; font-family: monospace; border: 1px solid #253850; }

        /* Action Button */
        .run-btn { background: linear-gradient(135deg, #1e3a5f, #2c405f); border: 1px solid #5e8ab9; border-radius: 35px; padding: 15px; color: white; font-weight: bold; cursor: pointer; width: 100%; font-size: 0.9rem; }
        .download-mode { background: linear-gradient(135deg, #00b09b, #96c93d) !important; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .modal-ui { background: #f0f4f8; padding: 20px; border-radius: 20px; width: 100%; max-width: 320px; color: #333; }
        input { width: 100%; padding: 12px; margin: 6px 0; border-radius: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="top-bar">
    <button class="set-btn" onclick="openModal(true)">Settings</button>
    <div class="pkg-name">com.systempro.faisal</div>
    <div id="led-indicator" class="led"></div>
</div>

<div class="tabs">
    <div class="tab active" onclick="tabMap(event, 'java-ed')">JAVA</div>
    <div class="tab" onclick="tabMap(event, 'xml-ed')">LAYOUT</div>
    <div class="tab" onclick="tabMap(event, 'manifest-ed')">MANIFEST</div>
    <div class="tab" onclick="tabMap(event, 'img-panel')">IMAGE</div>
</div>

<div class="editor-box">
    <textarea id="java-ed" class="code-area active" placeholder="// JAVA Code here..."></textarea>
    <textarea id="xml-ed" class="code-area" placeholder=""></textarea>
    <textarea id="manifest-ed" class="code-area" placeholder=""></textarea>
    <div id="img-panel" style="display:none; text-align:center; padding-top:20%;">
        <button onclick="document.getElementById('pick').click()" style="padding:10px; border-radius:10px;">Select Icon</button>
        <input type="file" id="pick" hidden>
    </div>
</div>

<div class="panel">
    <div style="display:flex; justify-content:space-between; font-size:10px; font-weight:bold;">
        <span id="status-text">System Idle</span>
        <span id="perc-text">0%</span>
    </div>
    <div class="bar-container"><div id="bar-fill"></div></div>
    <div class="logs" id="log-box">!سسٹم ری اسٹور کر دیا گیا ہے۔ تیار</div>
</div>

<button class="run-btn" id="main-btn" onclick="startBuild()">🚀 RUN SYSTEM BUILD</button>

<div id="set-modal" class="modal">
    <div class="modal-ui">
        <h3>GitHub Config</h3>
        <input type="text" id="u" placeholder="Username">
        <input type="text" id="r" placeholder="Repo Name">
        <input type="password" id="t" placeholder="Personal Token">
        <button onclick="save()" style="width:100%; padding:14px; background:#1e3a5f; color:white; border-radius:15px; border:none; margin-top:10px;">SAVE</button>
    </div>
</div>

<script>
    function tabMap(e, id) {
        document.querySelectorAll('.code-area, #img-panel').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).style.display = (id === 'img-panel') ? 'block' : 'block';
        e.currentTarget.classList.add('active');
    }

    function openModal(s) { document.getElementById('set-modal').style.display = s ? 'flex' : 'none'; }
    function save() {
        localStorage.setItem('gh_u', document.getElementById('u').value);
        localStorage.setItem('gh_r', document.getElementById('r').value);
        localStorage.setItem('gh_t', document.getElementById('t').value);
        openModal(false);
        addLog("سیٹنگز اپڈیٹ ہو گئیں۔");
    }

    function addLog(m) {
        const b = document.getElementById('log-box');
        b.innerHTML = `[${new Date().toLocaleTimeString()}] ${m}<br>${b.innerHTML}`;
    }

    async function startBuild() {
        const u = localStorage.getItem('gh_u'), r = localStorage.getItem('gh_r'), t = localStorage.getItem('gh_t');
        if(!t) return openModal(true);

        const led = document.getElementById('led-indicator');
        const btn = document.getElementById('main-btn');
        const bar = document.getElementById('bar-fill');
        
        btn.disabled = true;
        addLog("Connecting to GitHub Server...");

        try {
            const res = await fetch(`https://api.github.com/repos/${u}/${r}/actions/workflows/android.yml/dispatches`, {
                method: 'POST',
                headers: { 'Authorization': `token ${t}` },
                body: JSON.stringify({ ref: 'main' })
            });

            if(res.ok || res.status === 204) {
                led.style.background = "#00ff88"; // ریئل ٹائم گرین
                led.style.animation = "blinker 1s linear infinite"; 
                addLog("✅ Request Accepted. Build Started...");

                for(let i=1; i<=20; i++) {
                    let p = i * 5;
                    bar.style.width = p + "%";
                    document.getElementById('perc-text').innerText = p + "%";
                    document.getElementById('status-text').innerText = "Syncing Artifacts...";
                    await new Promise(res => setTimeout(res, 4000));
                    
                    if(p >= 100) {
                        // آرٹفیکٹ چیک
                        const check = await fetch(`https://api.github.com/repos/${u}/${r}/actions/runs?per_page=1`, {
                            headers: { 'Authorization': `token ${t}` }
                        });
                        const data = await check.json();
                        const run = data.workflow_runs[0];

                        if(run.status === "completed" && run.conclusion === "success") {
                            led.style.animation = "none";
                            btn.disabled = false;
                            btn.innerHTML = "📥 DOWNLOAD APK";
                            btn.classList.add('download-mode');
                            btn.onclick = () => window.location.href = `https://github.com/${u}/${r}/actions`;
                            addLog("Build Successful! Artifact Ready.");
                        } else {
                            throw new Error("Build Failed on GitHub. Check android.yml");
                        }
                        break;
                    }
                }
            } else { throw new Error("Connection Timeout or Token Invalid"); }
        } catch (e) {
            led.style.background = "#ff4444";
            led.style.animation = "none";
            addLog("Error: " + e.message);
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
