name: System Pro Official Build
on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-app]

jobs:
  assemble-official-apk:
    name: "System Pro: Official APK Generation"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Process Payload and Force Linker
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          APP_NAME=$(echo "$PAYLOAD" | jq -r '.app_name // "SystemPro"')
          PACKAGE_NAME=$(echo "$PAYLOAD" | jq -r '.package_name // "com.system.pro"')
          PKG_PATH=$(echo "$PACKAGE_NAME" | tr '.' '/')
          
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/drawable

          # 1. Java Reconstruction
          if [ -n "$(echo "$PAYLOAD" | jq -r '.java_b64')" ]; then
            echo "$PAYLOAD" | jq -r '.java_b64' | base64 -d > raw_java.txt
            sed -i '/package /d' raw_java.txt
            sed -i '/import .*R;/d' raw_java.txt
            {
              echo "package $PACKAGE_NAME;"
              echo "import $PACKAGE_NAME.R;"
              echo "import androidx.core.content.ContextCompat;"
              cat raw_java.txt
            } > app/src/main/java/$PKG_PATH/MainActivity.java
          fi

          # 2. Manifest Sanitizer (Fix for 'Content not allowed in prolog')
          if [ -n "$(echo "$PAYLOAD" | jq -r '.manifest_b64')" ]; then
            # فائل کو ڈی کوڈ کرنا اور تمام پوشیدہ کریکٹرز (BOM) کو صاف کرنا
            echo "$PAYLOAD" | jq -r '.manifest_b64' | base64 -d | tr -d '\357\273\277' > app/src/main/AndroidManifest.xml
            # یقینی بنانا کہ فائل کا آغاز صرف مینی فیسٹ ٹیگ یا XML ڈیکلریشن سے ہو
            sed -i 's/package="[^"]*"//g' app/src/main/AndroidManifest.xml
          else
            echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"><application android:label=\"$APP_NAME\" android:icon=\"@mipmap/ic_launcher\" android:theme=\"@style/Theme.SystemPro\"><activity android:name=\".MainActivity\" android:exported=\"true\"><intent-filter><action android:name=\"android.intent.action.MAIN\" /><category android:name=\"android.intent.category.LAUNCHER\" /></intent-filter></activity></application></manifest>" > app/src/main/AndroidManifest.xml
          fi

          # 3. Comprehensive Colors Injection
          cat <<EOF > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg_dark">#0F0F0F</color>
              <color name="neon_blue">#00BFFF</color>
              <color name="neon_green">#00FF00</color>
              <color name="glass_white_10">#1AFFFFFF</color>
              <color name="glass_white_30">#4DFFFFFF</color>
              <color name="error_red">#FF4444</color>
              <color name="colorAccent">#FF9800</color>
              <color name="warning_orange">#FFA500</color>
              <color name="colorPrimaryDark">#000000</color>
              <color name="colorPrimary">#00BFFF</color>
          </resources>
          EOF

      - name: Build Official Debug APK
        run: ./gradlew :app:clean :app:assembleDebug --no-daemon --no-build-cache --stacktrace

      - name: Upload System Pro Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name || 'System-Pro-Official' }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 5
