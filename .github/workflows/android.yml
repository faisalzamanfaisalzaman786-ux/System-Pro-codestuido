name: System Pro Repair Tool

on:
  workflow_dispatch: # اسے آپ بٹن دبا کر خود چلائیں گے

jobs:
  repair:
    runs-on: ubuntu-latest
    permissions:
      contents: write # یہ لائن گٹ ہب کو فائلیں لکھنے کی اجازت دے گی
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Missing Gradle Wrapper
        run: |
          # یہ کمانڈ تمام ضروری فائلیں (gradlew, wrapper folder) خود بنا دے گی
          gradle wrapper 

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add gradlew gradle/
          # اگر فائلیں پہلے سے ہوں گی تو یہ ایرر نہیں دے گا
          git commit -m "System Pro: Fixed missing gradle files and folders" || echo "No changes to commit"
          git push origin main
