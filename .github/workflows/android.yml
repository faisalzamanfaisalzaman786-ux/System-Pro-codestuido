name: System Pro Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Auto-Fix and Build
        run: |
          # اگر گریڈل موجود نہیں ہے تو اسے زبردستی بنائیں
          if [ ! -f gradlew ]; then
            echo "Gradlew missing! Creating generic wrapper..."
            gradle wrapper --gradle-version 8.0
          fi
          
          chmod +x gradlew
          
          # اینڈرائیڈ کی بنیادی سیٹنگز چیک کریں
          if [ ! -f settings.gradle ]; then
            echo "include ':app'" > settings.gradle
          fi

          # بلڈ شروع کریں
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
