name: GitHub-Decompiler-YAML-Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # مکمل ہسٹری لیں تاکہ کوئی فائل مس نہ ہو

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # سٹیپ ۱: ہر چیز کو زیرو کر دینا (تاکہ پرانا کاؤنٹر ڈیلیٹ ہو جائے)
      - name: Nuclear Clean
        run: |
          echo "Cleaning all previous build data..."
          rm -rf app/src/main/java/com/systempro/faisal/*
          rm -rf app/src/main/res/layout/*
          mkdir -p app/src/main/java/com/systempro/faisal/
          mkdir -p app/src/main/res/layout/

      # سٹیپ ۲: نئی فائلیں جو اپلوڈ ہوئی ہیں، انہیں صحیح جگہ پر لانا
      - name: Force Sync New Files
        run: |
          echo "Moving new files to source directory..."
          # یہاں ہم چیک کر رہے ہیں کہ کیا 'uploads' فولڈر میں کوئی فائل ہے؟
          if [ -d "uploads" ] && [ "$(ls -A uploads)" ]; then
            cp -rf uploads/*.java app/src/main/java/com/systempro/faisal/ || echo "No Java files found"
            cp -rf uploads/*.xml app/src/main/res/layout/ || echo "No XML files found"
          else
            echo "Warning: No new files found in uploads folder!"
          fi

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # سٹیپ ۳: زبردستی نیا بلڈ بنانا (No Cache)
      - name: Build New APK
        run: ./gradlew clean assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Updated-System-Pro-Build
          path: app/build/outputs/apk/debug/*.apk
