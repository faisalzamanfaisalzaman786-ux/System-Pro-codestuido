name: System Pro APK Builder

on:
  workflow_dispatch:
    inputs:
      file_content:
        description: 'Base64 encoded project files'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Random Package Name
        run: |
          # ہر بار نیا رینڈم پیکیج بنانا
          RANDOM_ID=$(head /dev/urandom | tr -dc a-z0-9 | head -c 6)
          NEW_PACKAGE="com.systempro.$RANDOM_ID"
          echo "NEW_PACKAGE=$NEW_PACKAGE" >> $GITHUB_ENV
          echo "🚀 Running with: $NEW_PACKAGE"

      - name: Clean Old Files
        run: rm -rf app/src/main/java/* app/src/main/res/layout/*

      - name: Decode and Setup Project
        run: |
          echo "${{ github.event.inputs.file_content }}" | base64 -d > project_data.json
          python3 -c "
          import json, os, re
          new_pkg = '${{ env.NEW_PACKAGE }}'
          pkg_path = new_pkg.replace('.', '/')
          
          with open('project_data.json', 'r') as f:
              data = json.load(f)
              files = data.get('files', {})
              for name, content in files.items():
                  if name.endswith('.java'):
                      # پہلی لائن (package ...) کو مکمل بدلنا
                      lines = content.split('\n')
                      if lines and 'package' in lines[0]:
                          lines[0] = f'package {new_pkg};'
                      
                      # R فائل کے امپورٹ کو درست کرنا
                      new_lines = []
                      for line in lines:
                          if 'import' in line and '.R;' in line:
                              new_lines.append(f'import {new_pkg}.R;')
                          else:
                              new_lines.append(line)
                      
                      content = '\n'.join(new_lines)
                      path = f'app/src/main/java/{pkg_path}/{name}'
                  elif name.endswith('.xml') and 'layout' in name:
                      path = f'app/src/main/res/layout/{name}'
                  elif name == 'AndroidManifest.xml':
                      path = 'app/src/main/AndroidManifest.xml'
                      # مینی فیسٹ سے پیکیج ہٹا کر ایکٹیویٹی کا پورا نام لکھنا
                      content = re.sub(r'package=\"[\w\.]+\"', '', content)
                      content = content.replace('.MainActivity', f'{new_pkg}.MainActivity')
                  
                  if path:
                      os.makedirs(os.path.dirname(path), exist_ok=True)
                      with open(path, 'w') as out: out.write(content)
          "

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.NEW_PACKAGE }}-APK
          path: app/build/outputs/apk/debug/*.apk
