name: System Pro Compiler

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 1. Purana data clear karne ke liye 'clean' zaroori hai
      - name: Clean and Build Debug APK
        run: ./gradlew clean assembleDebug

      # 2. Multiple copies aur confusion se bachne ke liye unique name
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          # Run number add karne se har build ki copy alag pehchani jayegi
          name: System-Pro-Build-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          overwrite: true
