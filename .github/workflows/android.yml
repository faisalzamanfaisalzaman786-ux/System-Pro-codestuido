name: Build and Clean System Pro

on:
  workflow_dispatch:

jobs:
  build-and-replace:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build APK (Java and XML)
        run: ./gradlew assembleDebug

      - name: Deep Clean and Force Sync
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # تمام فائلوں کا ٹائم اسٹیمپ تازہ کرنا تاکہ "last week" ختم ہو جائے
          find . -maxdepth 2 -not -path '*/.*' -exec touch {} +
          
          git add .
          git commit -m "APK Built & Data Deep Cleaned" || echo "No changes"
          git push origin main --force

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-App
          path: app/build/outputs/apk/debug/*.apk
