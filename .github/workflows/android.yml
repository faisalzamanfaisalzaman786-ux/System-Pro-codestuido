name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    - name: Update package name and fix repositories
      run: |
        PKG="com.example.cameraapp"
        echo "Using package name: $PKG"
        find . -name "AndroidManifest.xml" -type f | while read f; do
          sed -i "s/package=\".*\"/package=\"$PKG\"/" "$f"
          sed -i "s/authorities=\".*\.fileprovider\"/authorities=\"$PKG.fileprovider\"/" "$f"
        done
        if grep -q "applicationId" app/build.gradle; then
          sed -i "s/applicationId \".*\"/applicationId \"$PKG\"/" app/build.gradle
        fi
        sed -i '/^repositories {/,/^}/d' app/build.gradle
        sed -i '/^allprojects {/,/^}/d' app/build.gradle
        find . -name "*.java" -type f | while read f; do
          if grep -q "^package .*;" "$f"; then
            sed -i "s/^package .*;/package $PKG;/" "$f"
          fi
        done
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    - name: Make gradlew executable
      run: chmod +x gradlew
    - name: Build Debug APK
      run: ./gradlew assembleDebug
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/
