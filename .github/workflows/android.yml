name: Auto Repair and Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      - name: Create missing Gradle files
        run: |
          # settings.gradle
          if [ ! -f settings.gradle ]; then
            echo "rootProject.name = 'SystemPro'" > settings.gradle
            echo "include ':app'" >> settings.gradle
          fi

          # project-level build.gradle
          if [ ! -f build.gradle ]; then
            echo "buildscript {" > build.gradle
            echo "    repositories {" >> build.gradle
            echo "        google()" >> build.gradle
            echo "        mavenCentral()" >> build.gradle
            echo "    }" >> build.gradle
            echo "    dependencies {" >> build.gradle
            echo "        classpath 'com.android.tools.build:gradle:7.4.2'" >> build.gradle
            echo "    }" >> build.gradle
            echo "}" >> build.gradle
            echo "allprojects {" >> build.gradle
            echo "    repositories {" >> build.gradle
            echo "        google()" >> build.gradle
            echo "        mavenCentral()" >> build.gradle
            echo "    }" >> build.gradle
            echo "}" >> build.gradle
          fi

          # gradle-wrapper.properties
          if [ ! -f gradle/wrapper/gradle-wrapper.properties ]; then
            mkdir -p gradle/wrapper
            echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
            echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
            echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-7.5-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
            echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
            echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          fi

      - name: Create Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 7.5
          fi
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-App
          path: app/build/outputs/apk/debug/*.apk
