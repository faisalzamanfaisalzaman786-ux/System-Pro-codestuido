name: Deep Clean and Replace Data

on:
  workflow_dispatch: # آپ اسے دستی طور پر رن کر سکتے ہیں

jobs:
  clean-and-replace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environment
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deep Clean Action
        run: |
          # تمام لوکل تبدیلیوں کو زبردستی ختم کرنا
          git reset --hard HEAD
          git clean -fdx 

          # یہاں آپ اپنی نئی فائلوں کو جنریٹ یا کاپی کرنے کا کمانڈ لکھ سکتے ہیں
          # مثال کے طور پر اگر آپ کسی فولڈر سے ڈیٹا ریپلیس کرنا چاہتے ہیں:
          # cp -rf ./source_folder/* ./dest_folder/

          echo "Cleaning and replacing process started..."

      - name: Force Update Files
        run: |
          git add .
          # اگر کوئی تبدیلی نہ ہو تو ایرر سے بچنے کے لیے
          git commit -m "Deep Clean: All files replaced and updated" || echo "No changes to commit"
          
          # مین برانچ پر فورس پش کرنا تاکہ پرانا ڈیٹا مکمل ریپلیس ہو جائے
          git push origin main --force
