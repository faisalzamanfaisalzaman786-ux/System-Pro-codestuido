name: System Pro APK Builder

on:
  workflow_dispatch:
    inputs:
      file_content:
        description: 'Base64 JSON with package and files'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode input
        run: |
          echo '${{ github.event.inputs.file_content }}' | base64 --decode > request.json
          PACKAGE=$(jq -r '.package' request.json)
          echo "PACKAGE=$PACKAGE" >> $GITHUB_ENV

      - name: Create Android project
        run: |
          mkdir -p gradle/wrapper
          curl -s -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.0.2/gradle/wrapper/gradle-wrapper.jar
          curl -s -o gradle/wrapper/gradle-wrapper.properties https://raw.githubusercontent.com/gradle/gradle/v8.0.2/gradle/wrapper/gradle-wrapper.properties
          curl -s -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.0.2/gradlew
          curl -s -o gradlew.bat https://raw.githubusercontent.com/gradle/gradle/v8.0.2/gradlew.bat
          chmod +x gradlew

          mkdir -p app/src/main/java/$(echo $PACKAGE | tr '.' '/')
          mkdir -p app/src/main/res/layout app/src/main/res/drawable app/src/main/res/values

          cat > settings.gradle << 'EOF'
          pluginManagement { repositories { google() mavenCentral() gradlePluginPortal() } }
          dependencyResolutionManagement { repositories { google() mavenCentral() } }
          rootProject.name = "MyApp"
          include ':app'
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace '$PACKAGE'
              compileSdk 34
              defaultConfig {
                  applicationId "$PACKAGE"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
          }
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources><string name="app_name">System Pro</string></resources>
          EOF

      - name: Place user files
        run: |
          JAVA_DIR="app/src/main/java/$(echo $PACKAGE | tr '.' '/')"
          jq -r '.files["MainActivity.java"]' request.json | sed "s/package .*/package $PACKAGE;/" > $JAVA_DIR/MainActivity.java
          jq -r '.files["activity_main.xml"]' request.json > app/src/main/res/layout/activity_main.xml
          jq -r '.files["AndroidManifest.xml"]' request.json | sed 's/package=".*"/package="'$PACKAGE'"/' > app/src/main/AndroidManifest.xml
          if jq -e '.files["icon.png"]' request.json >/dev/null; then
            jq -r '.files["icon.png"]' request.json | base64 --decode > app/src/main/res/drawable/icon.png
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        id: build
        continue-on-error: true
        run: |
          ./gradlew assembleDebug --stacktrace > build.log 2>&1
          echo "status=$?" >> $GITHUB_OUTPUT

      - name: Upload logs on failure
        if: steps.build.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: build-error-logs
          path: build.log

      - name: Upload APK on success
        if: steps.build.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
