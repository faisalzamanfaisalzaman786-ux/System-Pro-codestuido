name: System Pro Official Build (ZIP Ingest)
on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-from-zip]

jobs:
  assemble-official-apk:
    name: "System Pro: Build from ZIP asset"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Download project ZIP from release asset
        run: |
          ZIP_URL="${{ github.event.client_payload.zip_asset_url }}"
          if [ -z "$ZIP_URL" ]; then
            echo "❌ No ZIP url provided"
            exit 1
          fi
          curl -L -o source_bundle.zip "$ZIP_URL"
          unzip -q source_bundle.zip -d workspace/

      - name: Read build metadata
        id: metadata
        run: |
          if [ -f workspace/build_metadata.json ]; then
            APP_NAME=$(jq -r '.app_name' workspace/build_metadata.json)
            PKG_NAME=$(jq -r '.package_name' workspace/build_metadata.json)
            echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
            echo "pkg_name=$PKG_NAME" >> $GITHUB_OUTPUT
          else
            echo "app_name=${{ github.event.client_payload.app_name }}" >> $GITHUB_OUTPUT
            echo "pkg_name=${{ github.event.client_payload.package_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Inject source files into Android project
        run: |
          PKG="${{ steps.metadata.outputs.pkg_name }}"
          APP_JAVA_DIR="app/src/main/java/$(echo "$PKG" | tr '.' '/')"
          mkdir -p "$APP_JAVA_DIR"
          
          [ -f workspace/MainActivity.java ] && cp workspace/MainActivity.java "$APP_JAVA_DIR/MainActivity.java"
          
          mkdir -p app/src/main/res/layout
          [ -f workspace/res/layout/activity_main.xml ] && cp workspace/res/layout/activity_main.xml app/src/main/res/layout/activity_main.xml
          [ -f workspace/activity_main.xml ] && cp workspace/activity_main.xml app/src/main/res/layout/activity_main.xml

          if [ -f workspace/AndroidManifest.xml ]; then
            # Remove BOM and leading whitespace
            sed -i '1s/^\xEF\xBB\xBF//' workspace/AndroidManifest.xml
            sed -i '1s/^[[:space:]]*<?xml/<?xml/' workspace/AndroidManifest.xml
            cp workspace/AndroidManifest.xml app/src/main/AndroidManifest.xml
          fi

          mkdir -p app/src/main/res/drawable
          [ -f workspace/res/drawable/ic_launcher.png ] && cp workspace/res/drawable/ic_launcher.png app/src/main/res/drawable/ic_launcher.png
          [ -f workspace/ic_launcher.png ] && cp workspace/ic_launcher.png app/src/main/res/drawable/ic_launcher.png

          if [ -f app/build.gradle ]; then
            sed -i "s/applicationId \".*\"/applicationId \"$PKG\"/" app/build.gradle
          fi

      - name: Validate and fix AndroidManifest.xml (no heredoc issues)
        run: |
          MANIFEST="app/src/main/AndroidManifest.xml"
          PKG="${{ steps.metadata.outputs.pkg_name }}"
          APPNAME="${{ steps.metadata.outputs.app_name }}"
          
          # اگر manifest موجود نہ ہو یا خراب ہو تو نیا بنا دیں
          if [ ! -f "$MANIFEST" ]; then
            echo -e '<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android"\n    package="'"$PKG"'">\n    <application android:label="'"$APPNAME"'">\n        <activity android:name=".MainActivity">\n            <intent-filter>\n                <action android:name="android.intent.action.MAIN"/>\n                <category android:name="android.intent.category.LAUNCHER"/>\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>' > "$MANIFEST"
          else
            # اگر manifest موجود ہے تو چیک کریں valid ہے یا نہیں
            if ! xmllint --noout "$MANIFEST" 2>/dev/null; then
              echo "⚠️ Manifest corrupt, replacing with default valid manifest"
              echo -e '<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android"\n    package="'"$PKG"'">\n    <application android:label="'"$APPNAME"'">\n        <activity android:name=".MainActivity">\n            <intent-filter>\n                <action android:name="android.intent.action.MAIN"/>\n                <category android:name="android.intent.category.LAUNCHER"/>\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>' > "$MANIFEST"
            fi
          fi
          echo "✅ Manifest is ready:"
          head -n 5 "$MANIFEST"

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload final APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.app_name || 'SystemPro' }}-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 5

      - name: Build success summary
        if: success()
        run: |
          echo "## ✅ Build succeeded" >> $GITHUB_STEP_SUMMARY
          echo "App: **${{ steps.metadata.outputs.app_name }}**" >> $GITHUB_STEP_SUMMARY
          echo "Package: \`${{ steps.metadata.outputs.pkg_name }}\`" >> $GITHUB_STEP_SUMMARY
