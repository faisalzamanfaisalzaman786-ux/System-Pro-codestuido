name: System Pro APK Builder
on:
  workflow_dispatch:
    inputs:
      file_content: { required: true }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Force Build System
        run: |
          ID=$(head /dev/urandom | tr -dc a-z0-9 | head -c 6)
          PKG="com.systempro.app$ID"
          echo "PKG=$PKG" >> $GITHUB_ENV
          
          echo "${{ github.event.inputs.file_content }}" | base64 -d > data.json
          python3 -c "
          import json, os, re
          pkg = '$PKG'
          with open('data.json', 'r') as f:
              files = json.load(f).get('files', {})
              for name, content in files.items():
                  if name.endswith('.java'):
                      # تمام پرانے پیکیج اور امپورٹ ہٹانا
                      lines = content.split('\n')
                      clean_lines = [l for l in lines if not l.strip().startswith('package ') and not l.strip().startswith('import ')]
                      # نئی پیکیج لائن اور ضروری اینڈرائیڈ امپورٹس زبردستی ڈالنا
                      header = f'package {pkg};\n'
                      # کوڈ کے اندر جہاں بھی R. لکھا ہے اسے مکمل پیکیج نیم سے بدلنا (e.g. com.systempro.app123.R)
                      body = '\n'.join(clean_lines)
                      body = body.replace('R.layout.', f'{pkg}.R.layout.')
                      body = body.replace('R.id.', f'{pkg}.R.id.')
                      body = body.replace('R.string.', f'{pkg}.R.string.')
                      body = body.replace('R.drawable.', f'{pkg}.R.drawable.')
                      
                      final_content = header + body
                      path = f'app/src/main/java/{pkg.replace(\".\", \"/\")}/{name}'
                  elif name == 'AndroidManifest.xml':
                      content = re.sub(r'package=\"[\w\.]+\"', '', content).replace('.MainActivity', f'{pkg}.MainActivity')
                      path = 'app/src/main/AndroidManifest.xml'
                  elif 'layout' in name: path = f'app/src/main/res/layout/{name}'
                  else: continue
                  os.makedirs(os.path.dirname(path), exist_ok=True)
                  with open(path, 'w') as out: out.write(final_content if name.endswith('.java') else content)
          "
      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Generated-APK
          path: app/build/outputs/apk/debug/*.apk
