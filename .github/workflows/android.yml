name: System Pro Official Build
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Deep Clean and Force Structure
        run: |
          # 1. ہر پرانی فائل اور پوشیدہ فولڈر کو ڈیلیٹ کرنا (تاکہ کنفلکٹ کا نام و نشان نہ رہے)
          rm -rf .gradle gradle build.gradle settings.gradle gradlew gradlew.bat app src .github/workflows/old_*
          
          # 2. بالکل تازہ اور آفیشل ڈائریکٹریز بنانا
          mkdir -p gradle/wrapper app/src/main/java/com/system/pro app/src/main/res/values app/src/main/res/layout

          # 3. settings.gradle (Locking Repositories)
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { 
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() } 
          }
          rootProject.name = 'System-Pro'
          include ':app'" > settings.gradle

          # 4. root build.gradle
          echo "plugins { id 'com.android.application' version '8.4.0' apply false }" > build.gradle

          # 5. app/build.gradle (Strict Version Management)
          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.system.pro'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes { release { minifyEnabled false } }
              
              // ورژن کنفلکٹ ختم کرنے کے لیے فورس ریزولوشن
              configurations.all {
                  resolutionStrategy {
                      force 'androidx.core:core:1.12.0'
                      force 'androidx.appcompat:appcompat:1.6.1'
                      force 'com.google.android.material:material:1.11.0'
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }" > app/build.gradle

          # 6. Android Manifest (Clean)
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          # 7. MainActivity.java
          echo "package com.system.pro;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }" > app/src/main/java/com/system/pro/MainActivity.java

      - name: Setup Official Gradle Wrapper 9.4.1
        run: |
          # سسٹم کے پرانے گریڈل کو بائی پاس کر کے نیا ریپر بنانا
          gradle wrapper --gradle-version 9.4.1
          chmod +x gradlew

      - name: Hard Push Clean Structure
        run: |
          git config --global user.name "Faisal Zaman"
          git config --global user.email "faisal@example.com"
          # پرانی فائلوں کو گٹ سے بھی ہٹانا
          git add -A
          git commit -m "CLEAN: Removed all old versions and locked to 9.4.1" || echo "No changes"
          git push

      - name: Run Official Build
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V136-Clean
          path: "app/build/outputs/apk/debug/*.apk"
