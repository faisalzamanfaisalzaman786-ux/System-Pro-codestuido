name: System Pro Master Build

on:
  workflow_dispatch: # آپ کی ایپ سے ٹرگر کرنے کے لیے

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # --stacktrace ایرر کی تفصیل دکھائے گا اگر بلڈ فیل ہوئی
        run: ./gradlew assembleDebug --stacktrace --info

      - name: Upload Master APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Final-Build
          # یہ پاتھ ہر جگہ سے APK تلاش کر کے اپلوڈ کرے گا
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
