name: System Pro Ultimate Build

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'App Package Name'
        required: true
        default: 'com.systempro.app'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. Gradlew Check & Fix
        run: |
          if [ ! -f "gradlew" ]; then
            echo "⚠️ gradlew missing, trying to generate..."
            gradle wrapper || (echo "❌ Please run 'gradle wrapper' locally first" && exit 1)
          fi
          chmod +x gradlew

      - name: 4. Build APK
        run: ./gradlew assembleDebug

      - name: 5. Diagnosis on Failure
        if: failure()
        run: |
          echo "🔍 Error Detected in Code or Configuration"
          # فائلوں کی بنیادی چیکنگ
          ls -R app/src/main/

      - name: 6. Upload Final APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Release
          path: app/build/outputs/apk/debug/*.apk
