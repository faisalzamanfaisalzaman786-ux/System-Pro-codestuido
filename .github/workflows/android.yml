name: System Pro Official Build
on:
  push:
  workflow_dispatch:

jobs:
  # جاب 1: مکمل صفائی اور نئے سرے سے آفیشل فائلیں بنانا
  clean-and-setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Total Purge (ہر پرانی چیز کا خاتمہ)
        run: |
          # 1. تمام پرانے فولڈرز، فائلیں اور پوشیدہ کیشے کو جڑ سے ختم کرنا
          rm -rf .gradle gradle build.gradle settings.gradle gradlew gradlew.bat app src
          find . -maxdepth 1 -not -path '*/.*' -not -name '.git' -not -name '.github' -delete
          
          # 2. بالکل نئی اور صاف ستھری آفیشل ڈائریکٹریز بنانا
          mkdir -p gradle/wrapper app/src/main/java/com/system/pro app/src/main/res/values app/src/main/res/layout

      - name: Create Official Material (صرف وہی جو ضروری ہے)
        run: |
          # settings.gradle (Locking)
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { 
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() } 
          }
          rootProject.name = 'System-Pro'
          include ':app'" > settings.gradle

          # root build.gradle
          echo "plugins { id 'com.android.application' version '8.4.0' apply false }" > build.gradle

          # app/build.gradle (آفیشل لائبریریز کے ساتھ)
          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.system.pro'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes { release { minifyEnabled false } }
          }
          dependencies {
              // صرف وہ لائبریریز جو اینڈرائیڈ 14 (API 34) کے لیے لازمی ہیں
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }" > app/build.gradle

          # Manifest & Java (Fresh)
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          echo "package com.system.pro;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }" > app/src/main/java/com/system/pro/MainActivity.java

      - name: Force Push Clean Repository
        run: |
          git config --global user.name "Faisal Zaman"
          git config --global user.email "faisal@example.com"
          git add -A
          git commit -m "TOTAL PURGE: All legacy files removed, official structure only" || echo "No changes"
          git push

  # جاب 2: آفیشل بلڈ رن کرنا
  official-build:
    needs: clean-and-setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Fresh
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Build
        run: |
          gradle wrapper --gradle-version 9.4.1
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload System Pro APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V140-Official
          path: "app/build/outputs/apk/debug/*.apk"
