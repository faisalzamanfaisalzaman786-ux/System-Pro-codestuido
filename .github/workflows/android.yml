      - name: Initialize Project Structure
        run: |
          # پرانی فائلوں کی مکمل صفائی
          rm -rf app settings.gradle build.gradle gradlew
          
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 1. Settings File
          echo "rootProject.name = 'System Pro Master'
          include ':app'" > settings.gradle

          # 2. MainActivity.java (یہ فائل اب ایپ کو چلانے کے قابل بنائے گی)
          echo "package com.system.pro;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
              }
          }" > app/src/main/java/com/system/pro/MainActivity.java

          # 3. layout/activity_main.xml (ایپ کا پہلا ڈیزائن)
          echo '<?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Welcome to System Pro Master!"
                  android:layout_centerInParent="true" />
          </RelativeLayout>' > app/src/main/res/layout/activity_main.xml

          # 4. AndroidManifest.xml (سب سے اہم حصہ: LAUNCHER شامل کیا گیا)
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.system.pro">
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="System Pro Master"
                  android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                  
                  <activity 
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          # باقی بلڈ پروسیس (Build.gradle وغیرہ) ویسے ہی رہیں گے
