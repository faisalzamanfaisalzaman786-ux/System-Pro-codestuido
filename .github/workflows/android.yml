name: System Pro Native Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Native Java & XML Structure
        run: |
          # پرانے ویب ویو کوڈ کی صفائی
          rm -rf app/src/main/assets
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 1. XML Layout (ڈیزائن فائل)
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="#121212">
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="System Pro: Native Mode"
                  android:textColor="#00FF00"
                  android:layout_centerInParent="true"
                  android:textSize="24sp" />
          </RelativeLayout>
          EOF

          # 2. Java Code (لاجک فائل)
          cat <<EOF > app/src/main/java/com/system/pro/MainActivity.java
          package com.system.pro;
          import android.app.Activity;
          import android.os.Bundle;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main); // یہاں XML لوڈ ہو رہی ہے
              }
          }
          EOF

          # 3. Colors & Styles
          echo '<resources><color name="colorPrimary">#6200EE</color></resources>' > app/src/main/res/values/colors.xml

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Native APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Native APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Native-V1
          path: app/build/outputs/apk/debug/app-debug.apk
