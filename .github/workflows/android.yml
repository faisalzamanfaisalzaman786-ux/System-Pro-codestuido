name: System Pro RealTime Builder
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'App Package Name'
        required: true
        default: 'com.systempro.app'
      webhook_url:
        description: 'Firebase/App Webhook URL'
        required: false
        default: 'https://your-app-api.com/logs'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Send Start Signal
        run: |
          curl -X POST ${{ github.event.inputs.webhook_url }} -d '{"status": "Starting Build...", "progress": 10}'

      - name: 1. Clean Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: 2. Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Send Progress (Setup Done)
        run: |
          curl -X POST ${{ github.event.inputs.webhook_url }} -d '{"status": "Java Setup Complete", "progress": 30}'

      - name: 3. Build Safe Structure
        run: |
          PKG="${{ github.event.inputs.package_name }}"
          PKG_PATH=$(echo $PKG | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          # (Your existing file generation logic here...)
          curl -X POST ${{ github.event.inputs.webhook_url }} -d '{"status": "Files Generated", "progress": 50}'

      - name: 4. Final Compilation
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew clean :app:assembleDebug --no-daemon
        continue-on-error: true

      - name: Send Progress (Compiling)
        run: |
          curl -X POST ${{ github.event.inputs.webhook_url }} -d '{"status": "Compiling APK...", "progress": 80}'

      - name: 5. Upload & Notify Success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: Send Final Signal
        if: always()
        run: |
          curl -X POST ${{ github.event.inputs.webhook_url }} -d '{"status": "Build Finished!", "progress": 100}'
