name: System Pro ZIP Builder

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-app, build-from-zip]

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: "System Pro Build Engine"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Workspace Setup & Clean
        run: |
          # ورک اسپیس ڈائریکٹری سیٹ کرنا
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.system.pro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          mkdir -p $GITHUB_WORKSPACE/app/src/main/java/$PKG_PATH
          mkdir -p $GITHUB_WORKSPACE/app/src/main/res/layout

          # پے لوڈ کو ڈی کوڈ کرنا
          echo "${{ github.event.client_payload.java_b64 }}" | base64 -d > temp_main.java || touch temp_main.java
          echo "${{ github.event.client_payload.xml_b64 }}" | base64 -d > temp_layout.xml || touch temp_layout.xml
          echo "${{ github.event.client_payload.manifest_b64 }}" | base64 -d > temp_manifest.xml || touch temp_manifest.xml

          # پائتھون سے خودکار صفائی
          python3 -c "
          import os, re
          def clean(f_in, f_out):
              if not os.path.exists(f_in): return
              with open(f_in, 'r', encoding='utf-8') as f: content = f.read().strip()
              if '<?xml' in content: content = content[content.find('<?xml'):]
              content = re.sub(r'<style.*?>.*?</style>', '', content, flags=re.DOTALL)
              with open(f_out, 'w') as f: f.write(content)

          clean('temp_layout.xml', 'app/src/main/res/layout/activity_main.xml')
          clean('temp_manifest.xml', 'app/src/main/AndroidManifest.xml')
          "

          # جاوا فائل انجکشن
          if [ -s temp_main.java ]; then
            {
              echo "package $PKG_NAME;"
              echo "import $PKG_NAME.R;"
              sed '/package /d' temp_main.java | sed '/import .*R;/d'
            } > app/src/main/java/$PKG_PATH/MainActivity.java
          fi

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug -PappName="${{ github.event.client_payload.app_name || 'SystemPro' }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name || 'SystemPro' }}
          path: app/build/outputs/apk/debug/*.apk
