name: Android CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set package name
        id: pkg
        run: |
          if [ -n "${{ secrets.PACKAGE_NAME }}" ]; then
            echo "name=${{ secrets.PACKAGE_NAME }}" >> $GITHUB_OUTPUT
          else
            echo "name=com.example.cameraapp" >> $GITHUB_OUTPUT
          fi

      - name: Update package name in all required files
        run: |
          PKG="${{ steps.pkg.outputs.name }}"
          echo "Using package name: $PKG"

          # 1. تمام AndroidManifest.xml
          find . -name "AndroidManifest.xml" -type f | while read f; do
            echo "Updating $f"
            sed -i "s/package=\".*\"/package=\"$PKG\"/" "$f"
            sed -i "s/authorities=\".*\.fileprovider\"/authorities=\"$PKG.fileprovider\"/" "$f"
          done

          # 2. تمام build.gradle جن میں applicationId ہو
          find . -name "build.gradle" -type f | while read f; do
            if grep -q "applicationId" "$f"; then
              echo "Updating $f"
              sed -i "s/applicationId \".*\"/applicationId \"$PKG\"/" "$f"
            fi
          done

          # 3. تمام Java فائلوں میں package لائن
          find . -name "*.java" -type f | while read f; do
            if grep -q "^package .*;" "$f"; then
              echo "Updating $f"
              sed -i "s/^package .*;/package $PKG;/" "$f"
            fi
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Run Tests
        run: ./gradlew test

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Decode Keystore (optional)
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          fi

      - name: Build Release APK (optional)
        if: github.ref == 'refs/heads/main'
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK (optional)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
