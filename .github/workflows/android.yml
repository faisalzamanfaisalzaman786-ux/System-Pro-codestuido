name: System Pro APK Builder

on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🔄 Process Data
        id: data
        run: |
          PKG="${{ github.event.client_payload.package_name }}"
          APP="${{ github.event.client_payload.app_name }}"
          
          [[ -z "$PKG" ]] && PKG="com.systempro.app"
          [[ -z "$APP" ]] && APP="SystemPro"
          
          RANDOM=$((RANDOM % 9000 + 1000))
          FINAL_PKG="${PKG}.v${RANDOM}"
          echo "pkg=$FINAL_PKG" >> $GITHUB_OUTPUT
          echo "app=$APP" >> $GITHUB_OUTPUT
          echo "path=$(echo $FINAL_PKG | tr '.' '/')" >> $GITHUB_OUTPUT

      - name: 🧹 Clean
        run: rm -rf app/src/main/*

      - name: 📁 Dirs
        run: mkdir -p app/src/main/java/${{ steps.data.outputs.path }}/ app/src/main/res/layout app/src/main/res/values

      - name: 📝 Resources
        run: |
          echo '<resources><string name="app_name">${{ steps.data.outputs.app }}</string></resources>' > app/src/main/res/values/strings.xml
          echo '<resources><style name="AppTheme" parent="android:Theme.Light"></style></resources>' > app/src/main/res/values/themes.xml

      - name: 📄 Manifest
        run: |
          cat > app/src/main/AndroidManifest.xml << EOF
<?xml version="1.0"?>
<manifest package="${{ steps.data.outputs.pkg }}">
    <application android:label="@string/app_name" android:theme="@style/AppTheme">
        <activity android:name=".MainActivity" android:exported="true">
            <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
        </activity>
    </application>
</manifest>
EOF

      - name: ☕ Activity
        run: |
          cat > app/src/main/java/${{ steps.data.outputs.path }}/MainActivity.java << EOF
package ${{ steps.data.outputs.pkg }};
import android.app.Activity;
import android.os.Bundle;
import android.widget.TextView;
public class MainActivity extends Activity {
    @Override protected void onCreate(Bundle b) {
        super.onCreate(b);
        TextView tv = new TextView(this);
        tv.setText("${{ steps.data.outputs.app }}");
        setContentView(tv);
    }
}
EOF

      - name: ⚙️ Gradle
        run: |
          cat > app/build.gradle << EOF
plugins { id 'com.android.application' }
android {
    namespace '${{ steps.data.outputs.pkg }}'
    compileSdk 33
    defaultConfig { applicationId '${{ steps.data.outputs.pkg }}'; minSdk 21 }
}
EOF

      - name: 🔨 Build
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ steps.data.outputs.pkg }}
          path: app/build/outputs/apk/debug/*.apk
