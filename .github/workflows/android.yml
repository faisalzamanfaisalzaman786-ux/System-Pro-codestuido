name: System Pro Final Processor
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Smart Cleaning
        run: |
          rm -rf app build settings.gradle build.gradle gradlew* gradle
          mkdir -p app/src/main/java/com/systempro
          mkdir -p app/src/main/res/layout

      - name: 3. Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 4. Automatic Project Processing
        run: |
          # ضروری اینڈرائیڈ فائلیں بنانا تاکہ ایرر نہ آئے
          echo "include ':app'" > settings.gradle
          
          # Root build.gradle
          printf "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.0.2' } }\nallprojects { repositories { google(); mavenCentral() } }" > build.gradle
          
          # App build.gradle
          printf "apply plugin: 'com.android.application'\nandroid { compileSdk 33; namespace 'com.systempro'; default { applicationId 'com.systempro'; minSdk 21; targetSdk 33; versionCode 1; versionName '1.0' } }" > app/build.gradle
          
          # Manifest File (سب سے ضروری)
          printf "<?xml version='1.0' encoding='utf-8'?>\n<manifest xmlns:android='http://schemas.android.com/apk/res/android'>\n<application android:label='SystemPro'>\n<activity android:name='.MainActivity' android:exported='true'>\n<intent-filter>\n<action android:name='android.intent.action.MAIN'/>\n<category android:name='android.intent.category.LAUNCHER'/>\n</intent-filter>\n</activity>\n</application>\n</manifest>" > app/src/main/AndroidManifest.xml
          
          sudo apt-get update && sudo apt-get install -y gradle
          gradle assembleDebug

      - name: 5. Save Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Final-SystemPro-App
          path: app/build/outputs/apk/debug/*.apk
