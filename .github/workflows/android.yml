name: Android CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # پیکیج نام کو تمام فائلوں میں تبدیل کریں
      - name: Replace package name in all files
        run: |
          # اگر سیکرٹ سیٹ ہے تو استعمال کریں، ورنہ ڈیفالٹ
          if [ -n "${{ secrets.PACKAGE_NAME }}" ]; then
            PKG="${{ secrets.PACKAGE_NAME }}"
          else
            PKG="com.example.cameraapp"
          fi
          echo "Using package name: $PKG"

          # AndroidManifest.xml میں تبدیل
          sed -i "s/package=\".*\"/package=\"$PKG\"/" app/src/main/AndroidManifest.xml

          # MainActivity.java میں پیکیج لائن تبدیل کریں
          sed -i "s/^package .*;/package $PKG;/" app/src/main/java/com/yourpackage/name/MainActivity.java

          # app/build.gradle میں applicationId تبدیل کریں
          sed -i "s/applicationId \".*\"/applicationId \"$PKG\"/" app/build.gradle

          # FileProvider کی authorities بھی تبدیل کریں (اگر موجود ہو)
          sed -i "s/authorities=\".*\.fileprovider\"/authorities=\"$PKG.fileprovider\"/" app/src/main/AndroidManifest.xml

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Run Tests
        run: ./gradlew test

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Decode Keystore (optional)
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          fi

      - name: Build Release APK (optional)
        if: github.ref == 'refs/heads/main'
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK (optional)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
