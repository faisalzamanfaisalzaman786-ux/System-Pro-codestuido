name: System Pro ZIP Builder

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-from-zip]

jobs:
  build:
    name: "ZIP to APK Generation"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Process ZIP and Advanced Python Sanitize
        run: |
          # 1. Download ZIP
          ZIP_URL="${{ github.event.client_payload.zip_asset_url }}"
          curl -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -o project.zip "$ZIP_URL"
          
          # 2. Setup Directories
          PACKAGE_NAME="${{ github.event.client_payload.package_name || 'com.system.pro' }}"
          PKG_PATH=$(echo "$PACKAGE_NAME" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values

          # 3. Unzip
          unzip -o project.zip -d temp_src/

          # 4. PYTHON NUCLEAR SANITIZER (Prolog/Invisible Byte Fix)
          # یہ اسکرپٹ ہر XML فائل کو پڑھے گا اور اسے دوبارہ بالکل صاف حالت میں لکھے گا
          python3 -c "
          import os, xml.etree.ElementTree as ET
          def sanitize_xml(file_path):
              try:
                  with open(file_path, 'rb') as f:
                      content = f.read()
                  # پہلا '<' تلاش کرنا تاکہ شروع کا کچرا ختم ہو
                  start_idx = content.find(b'<')
                  if start_idx != -1:
                      clean_content = content[start_idx:]
                      # فائل کو کلین اسٹرکچر کے ساتھ دوبارہ لکھنا
                      root = ET.fromstring(clean_content)
                      tree = ET.ElementTree(root)
                      tree.write(file_path, encoding='utf-8', xml_declaration=True)
                      print(f'Sanitized: {file_path}')
              except Exception as e:
                  print(f'Warning skipping {file_path}: {e}')

          for root_dir, dirs, files in os.walk('temp_src/'):
              for file in files:
                  if file.endswith('.xml'):
                      sanitize_xml(os.path.join(root_dir, file))
          "

          # 5. Move Files
          if [ -f temp_src/MainActivity.java ]; then
            echo "package $PACKAGE_NAME;" > app/src/main/java/$PKG_PATH/MainActivity.java
            echo "import $PACKAGE_NAME.R;" >> app/src/main/java/$PKG_PATH/MainActivity.java
            cat temp_src/MainActivity.java | sed '/package /d' | sed '/import .*R;/d' >> app/src/main/java/$PKG_PATH/MainActivity.java
          fi
          
          [ -f temp_src/res/layout/activity_main.xml ] && mv temp_src/res/layout/activity_main.xml app/src/main/res/layout/
          [ -f temp_src/AndroidManifest.xml ] && mv temp_src/AndroidManifest.xml app/src/main/
          [ -f temp_src/res/drawable/ic_launcher.png ] && mv temp_src/res/drawable/ic_launcher.png app/src/main/res/drawable/

          # 6. Inject Mandatory Colors
          cat <<EOF > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="bg_dark">#0F0F0F</color>
              <color name="neon_green">#00FF00</color>
              <color name="glass_white_10">#1AFFFFFF</color>
              <color name="error_red">#FF4444</color>
              <color name="colorAccent">#FF9800</color>
          </resources>
          EOF

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug \
            -PdynamicPackage="${{ github.event.client_payload.package_name || 'com.system.pro' }}" \
            --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name || 'SystemPro-ZIP-Build' }}
          path: app/build/outputs/apk/debug/*.apk
