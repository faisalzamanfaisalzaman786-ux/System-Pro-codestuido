name: System Pro Unique Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # یہاں سے آپ خود بھی بٹن دبا کر چلا سکتے ہیں

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Random Identity
      run: |
        # ایک رینڈم نمبر بنانا
        RAND_NUM=$(date +%s | tail -c 4)
        
        # 1. پیکیج نیم بدلنا (مثال: com.system.pro.v1234)
        NEW_PACKAGE="com.system.pro.v$RAND_NUM"
        
        # 2. ایپ کا نام بدلنا (مثال: System Pro 1234)
        NEW_APP_NAME="System Pro $RAND_NUM"
        
        echo "نیا پیکیج: $NEW_PACKAGE"
        echo "نیا نام: $NEW_APP_NAME"

        # build.gradle میں پیکیج نیم اپ ڈیٹ کرنا
        sed -i "s/namespace .*/namespace '$NEW_PACKAGE'/g" app/build.gradle
        sed -i "s/applicationId .*/applicationId '$NEW_PACKAGE'/g" app/build.gradle
        
        # Java فائلوں کے اندر پیکیج کی لائن بدلنا
        find app/src/main/java -name "*.java" -exec sed -i "s/package .*/package $NEW_PACKAGE;/g" {} +
        
        # strings.xml میں ایپ کا نام بدلنا (تاکہ فون پر نام بھی الگ نظر آئے)
        sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">$NEW_APP_NAME</string>|g" app/src/main/res/values/strings.xml

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Build Unique APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Unique-System-Pro-APK
        path: app/build/outputs/apk/debug/*.apk
