name: System Pro Ultimate Repair

on:
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Create Project Structure
        run: |
          # اگر پروجیکٹ فولڈر نہیں ہے تو بنائیں
          mkdir -p app/src/main/java/com/faisal/systempro
          mkdir -p gradle/wrapper
          
          # بنیادی گریڈل فائلیں تیار کریں
          if [ ! -f "build.gradle" ]; then
            echo "plugins { id 'com.android.application' version '8.2.0' apply false }" > build.gradle
          fi
          
          if [ ! -f "settings.gradle" ]; then
            echo "rootProject.name = 'System Pro'" > settings.gradle
            echo "include ':app'" >> settings.gradle
          fi

          # گریڈل ریپر (gradlew) جنریٹ کریں
          gradle wrapper --gradle-version 8.5

      - name: Commit and Push Fixed Files
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "System Pro: Full Project Structure Restored" || echo "No changes"
          git push origin main
