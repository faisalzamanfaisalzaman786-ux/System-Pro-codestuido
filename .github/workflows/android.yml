name: System Pro Final Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Initialize Gradle and Build Folders
        run: |
          # 1. پرانی فائلوں کی مکمل صفائی (ہر کمانڈ الگ لائن پر)
          rm -rf app build settings.gradle build.gradle gradlew gradle .gradle
          
          # 2. ضروری فولڈرز بنانا
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # 3. گریڈل ریپر جنریٹ کرنا
          gradle wrapper --gradle-version 8.2

          # 4. Strings فائل بنانا
          echo '<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">System Pro Master</string>
          </resources>' > app/src/main/res/values/strings.xml

          # 5. Vector Drawable Fix
          echo '<?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#3DDC84"
                  android:pathData="M0,0h108v108h-108z" />
          </vector>' > app/src/main/res/drawable/ic_launcher_foreground.xml

          # 6. Settings Gradle
          echo "pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'System Pro Master'
          include ':app'" > settings.gradle

          # 7. Root build.gradle
          echo "plugins {
              id 'com.android.application' version '8.2.2' apply false
          }" > build.gradle

          # 8. App build.gradle
          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.system.pro.master'
                  minSdk 24
                  targetSdk 34
                  versionCode 755
                  versionName '1.0.755'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }" > app/build.gradle

          # 9. Android Manifest
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
