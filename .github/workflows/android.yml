name: System Pro Native Builder
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'App Package Name'
        required: true
        default: 'com.systempro.app'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Setup Project
        run: |
          PKG="${{ github.event.inputs.package_name }}"
          PKG_PATH=$(echo $PKG | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          
          # Settings & Project Files
          echo "include ':app'" > settings.gradle
          
          # build.gradle
          echo "plugins { id 'com.android.application' version '8.2.2' apply false }" > build.gradle
          echo "plugins { id 'com.android.application' }
          android {
              namespace '$PKG'
              compileSdk 34
              defaultConfig { applicationId '$PKG'; minSdk 24; targetSdk 34 }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }" > app/build.gradle

          # Manifest & Java
          echo "<manifest xmlns:android='http://schemas.android.com/apk/res/android'>
              <application android:label='System Pro'>
                  <activity android:name='.MainActivity' android:exported='true'>
                      <intent-filter><action android:name='android.intent.action.MAIN' /><category android:name='android.intent.category.LAUNCHER' /></intent-filter>
                  </activity>
              </application></manifest>" > app/src/main/AndroidManifest.xml

          echo "package $PKG;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle s) { super.onCreate(s); }
          }" > app/src/main/java/$PKG_PATH/MainActivity.java

      - name: 🔨 Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.package_name }}-APK
          path: app/build/outputs/apk/debug/*.apk
