name: System Pro Super Clean Build
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'App Package Name'
        required: true
        default: 'com.systempro.app'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout (Force Clean)
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: 🧹 Deep Clean Server
        run: |
          # پرانی تمام کنفیگریشنز اور فائلوں کو جڑ سے ختم کرنا
          git config --global --unset-all core.sshCommand || true
          git config --global --unset-all http.https://github.com/.extraheader || true
          rm -rf * .gradle .github/workflows/android.yml
          echo "سرور مکمل صاف ہو چکا ہے۔"

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Re-Build Structure
        run: |
          PKG="${{ github.event.inputs.package_name }}"
          PKG_PATH=$(echo $PKG | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          
          # settings.gradle - ریپوزٹریز کا حتمی لاک
          cat <<EOF > settings.gradle
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "SystemProApp"
          include ':app'
          EOF

          # build.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          EOF

          # app/build.gradle
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace '$PKG'
              compileSdk 34
              defaultConfig { applicationId '$PKG'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

      - name: 🔨 Final Compilation
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Final-Success-APK
          path: app/build/outputs/apk/debug/*.apk
