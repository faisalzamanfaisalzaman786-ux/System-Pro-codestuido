name: System Pro Ultimate Builder

on:
  # 1. بیرونی ایپ سے ٹرگر کے لیے (Main Trigger)
  repository_dispatch:
    types: [build_apk]

  # 2. مینوئل چیکنگ کے لیے (تاکہ آپ گٹ ہب ویب سائٹ سے بھی رن کر سکیں)
  workflow_dispatch:

# 🔐 ٹرگر کو فعال کرنے کے لیے ضروری پرمیشنز (اس کے بغیر ٹرگر کام نہیں کرے گا)
permissions:
  contents: write
  actions: write
  statuses: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🔄 PROCESS TRIGGER
        id: trigger
        run: |
          # پے لوڈ سے ڈیٹا حاصل کرنا (چاہے وہ کسی بھی فارمیٹ میں ہو)
          PKG="${{ github.event.client_payload.package_name }}"
          APP="${{ github.event.client_payload.app_name }}"
          JAVA="${{ github.event.client_payload.java_code }}"
          LAYOUT="${{ github.event.client_payload.layout_code }}"
          
          # اگر ڈیٹا نہ ملے تو ڈیفالٹ سیٹ کرنا
          [[ -z "$PKG" ]] && PKG="com.systempro.app"
          [[ -z "$APP" ]] && APP="SystemPro"
          
          RANDOM1=$((RANDOM % 9000 + 1000))
          RANDOM2=$((RANDOM % 9000 + 1000))
          TIMESTAMP=$(date +%s)
          
          FINAL_PKG="${PKG}.v${TIMESTAMP: -4}.r${RANDOM1}"
          FINAL_APP="${APP} (${RANDOM2})"
          
          echo "final_pkg=$FINAL_PKG" >> $GITHUB_OUTPUT
          echo "final_app=$FINAL_APP" >> $GITHUB_OUTPUT
          echo "java_code=$JAVA" >> $GITHUB_OUTPUT
          echo "layout_code=$LAYOUT" >> $GITHUB_OUTPUT
          echo "pkg_path=$(echo $FINAL_PKG | tr '.' '/')" >> $GITHUB_OUTPUT
          echo "random1=$RANDOM1" >> $GITHUB_OUTPUT
          echo "random2=$RANDOM2" >> $GITHUB_OUTPUT
          
          echo "✅ Trigger Successfully Processed for $FINAL_PKG"

      # --- آپ کے باقی تمام اسٹیپس یہاں سے شروع ہوتے ہیں (بغیر کسی تبدیلی کے) ---

      - name: 🧹 CLEAN ALL
        run: |
          rm -rf app/src/main/java/*
          rm -rf app/src/main/res/*
          rm -rf app/build
          rm -rf .gradle

      # ... (باقی تمام مراحل: CREATE STRUCTURE, MANIFEST, JAVA, LAYOUT, BUILD وغیرہ بالکل وہی رہیں گے) ...
