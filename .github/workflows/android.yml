name: System Pro - Upload Tracker

# یہ ورک فلو صرف تب چلے گا جب 'uploads' فولڈر میں کوئی تبدیلی ہوگی
on:
  push:
    branches:
      - main
    paths:
      - 'uploads/**'
  workflow_dispatch: # اس سے آپ مینوئل بھی چیک کر سکتے ہیں

jobs:
  verify_files:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Display Status Message
      run: |
        echo "✅ Trigger Successful: New activity detected in uploads folder!"
        echo "Time of action: $(date)"

    - name: List Received Files
      run: |
        echo "موصول ہونے والی فائلوں کی فہرست:"
        ls -R uploads/
        
    - name: Check File Types
      run: |
        # یہ چیک کرے گا کہ کیا جاوا یا مینی فیسٹ فائلیں موجود ہیں
        COUNT=$(ls uploads/*.java uploads/*.xml 2>/dev/null | wc -l)
        echo "کل اہم فائلیں (Java/XML): $COUNT"
        if [ $COUNT -gt 0 ]; then
          echo "🚀 Verification Result: App is pushing files correctly!"
        else
          echo "⚠️ Note: Folder updated but no Java/XML files found yet."
        fi
