name: System Pro Master Net

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build Native Structure From Scratch
      run: |
        # 1. بنیادی فولڈرز بنانا
        mkdir -p app/src/main/java/com/systempro/master
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values

        # 2. مینی فیسٹ فائل (Manifest)
        cat <<EOF > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.systempro.master">
            <application android:label="System Pro Net">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 3. جاوا فائل (MainActivity.java)
        cat <<EOF > app/src/main/java/com/systempro/master/MainActivity.java
        package com.systempro.master;
        import android.app.Activity;
        import android.os.Bundle;
        import android.widget.TextView;

        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                TextView tv = new TextView(this);
                tv.setText("Net Native Build Successful!");
                setContentView(tv);
            }
        }
        EOF

        # 4. ضروری گریڈل فائلیں بنانا (چونکہ آپ نے ڈیلیٹ کر دی تھیں)
        cat <<EOF > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        cat <<EOF > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.systempro.master'
            compileSdk 34
            defaultConfig {
                applicationId "com.systempro.master"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        EOF

        echo "include ':app'" > settings.gradle
        echo "android.suppressUnsupportedCompileSdk=34" > gradle.properties

    - name: Setup Gradle Wrapper
      run: gradle wrapper

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Upload Output
      uses: actions/upload-artifact@v4
      with:
        name: System-Pro-Master-APK
        path: app/build/outputs/apk/debug/*.apk
