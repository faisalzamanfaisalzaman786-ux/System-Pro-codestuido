name: System Pro Multi-App Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # یہاں ہم دونوں ایپس (appOne اور appTwo) کو ایک ساتھ بلڈ کر رہے ہیں
    - name: Build Multiple APKs
      run: ./gradlew assembleAppOneDebug assembleAppTwoDebug

    # پہلی ایپ (appOne) کو اپ لوڈ کرنا
    - name: Upload APK One (Counter Basic)
      uses: actions/upload-artifact@v4
      with:
        name: System-Pro-App-One
        path: app/build/outputs/apk/appOne/debug/app-appOne-debug.apk

    # دوسری ایپ (appTwo) کو اپ لوڈ کرنا
    - name: Upload APK Two (Counter Pro)
      uses: actions/upload-artifact@v4
      with:
        name: System-Pro-App-Two
        path: app/build/outputs/apk/appTwo/debug/app-appTwo-debug.apk
