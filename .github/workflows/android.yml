name: System Pro Complete APK Builder

on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🔄 PROCESS TRIGGER DATA
        id: trigger
        run: |
          # Get data from app
          PKG_FROM_APP="${{ github.event.client_payload.package_name }}"
          APP_NAME="${{ github.event.client_payload.app_name }}"
          JAVA_CODE="${{ github.event.client_payload.java_code }}"
          LAYOUT_CODE="${{ github.event.client_payload.layout_code }}"
          
          # Default values
          [[ -z "$PKG_FROM_APP" ]] && PKG_FROM_APP="com.systempro.app"
          [[ -z "$APP_NAME" ]] && APP_NAME="SystemPro"
          
          # Generate random components
          RANDOM_LETTERS=$(tr -dc 'a-z' < /dev/urandom | head -c 4)
          RANDOM_NUM1=$((1000 + RANDOM % 9000))
          RANDOM_NUM2=$((1000 + RANDOM % 9000))
          TIMESTAMP=$(date +%s)
          
          # Base package
          BASE_PKG=$(echo "$PKG_FROM_APP" | cut -d. -f1-2)
          [[ -z "$BASE_PKG" ]] && BASE_PKG="com.systempro"
          
          # Final package (valid Android format)
          FINAL_PKG="${BASE_PKG}.${RANDOM_LETTERS}${RANDOM_NUM1:0:3}.v${TIMESTAMP: -4}"
          FINAL_APP="${APP_NAME} (${RANDOM_LETTERS}${RANDOM_NUM2:0:3})"
          PKG_PATH=$(echo $FINAL_PKG | tr '.' '/')
          
          # Save outputs
          echo "final_pkg=$FINAL_PKG" >> $GITHUB_OUTPUT
          echo "final_app=$FINAL_APP" >> $GITHUB_OUTPUT
          echo "pkg_path=$PKG_PATH" >> $GITHUB_OUTPUT
          echo "java_code=$JAVA_CODE" >> $GITHUB_OUTPUT
          echo "layout_code=$LAYOUT_CODE" >> $GITHUB_OUTPUT
          echo "letters=$RANDOM_LETTERS" >> $GITHUB_OUTPUT
          echo "num1=$RANDOM_NUM1" >> $GITHUB_OUTPUT
          echo "num2=$RANDOM_NUM2" >> $GITHUB_OUTPUT
          
          echo "════════════════════════════════════════════"
          echo "✅ TRIGGER PROCESSED"
          echo "════════════════════════════════════════════"
          echo "📦 Package: $FINAL_PKG"
          echo "📱 App Name: $FINAL_APP"
          echo "════════════════════════════════════════════"

      - name: 🧹 COMPLETE CLEANUP
        run: |
          rm -rf app/src/main/java/*
          rm -rf app/src/main/res/*
          rm -rf app/build
          rm -rf .gradle

      - name: 📁 CREATE DIRECTORY STRUCTURE
        run: |
          mkdir -p app/src/main/java/${{ steps.trigger.outputs.pkg_path }}
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/xml

      - name: 📝 CREATE STRINGS.XML
        run: |
          cat > app/src/main/res/values/strings.xml << EOF
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="app_name">${{ steps.trigger.outputs.final_app }}</string>
    <string name="build_id">${{ steps.trigger.outputs.letters }}-${{ steps.trigger.outputs.num1 }}</string>
</resources>
EOF

      - name: 🎨 CREATE COLORS.XML
        run: |
          cat > app/src/main/res/values/colors.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <color name="purple_500">#FF6200EE</color>
    <color name="purple_700">#FF3700B3</color>
    <color name="teal_200">#FF03DAC5</color>
    <color name="white">#FFFFFFFF</color>
    <color name="black">#FF000000</color>
</resources>
EOF

      - name: 🎭 CREATE THEMES.XML
        run: |
          cat > app/src/main/res/values/themes.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
        <item name="colorPrimary">@color/purple_500</item>
        <item name="colorPrimaryDark">@color/purple_700</item>
        <item name="colorAccent">@color/teal_200</item>
    </style>
</resources>
EOF

      - name: 📄 CREATE BACKUP RULES
        run: |
          cat > app/src/main/res/xml/backup_rules.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<full-backup-content>
    <include domain="sharedpref" path="."/>
</full-backup-content>
EOF

      - name: 📄 CREATE DATA EXTRACTION RULES
        run: |
          cat > app/src/main/res/xml/data_extraction_rules.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<data-extraction-rules>
    <cloud-backup>
        <include domain="sharedpref" path="."/>
    </cloud-backup>
</data-extraction-rules>
EOF

      - name: 📄 CREATE ANDROID MANIFEST
        run: |
          cat > app/src/main/AndroidManifest.xml << EOF
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="${{ steps.trigger.outputs.final_pkg }}">
    
    <uses-permission android:name="android.permission.INTERNET" />
    
    <application
        android:allowBackup="true"
        android:dataExtractionRules="@xml/data_extraction_rules"
        android:fullBackupContent="@xml/backup_rules"
        android:icon="@mipmap/ic_launcher"
        android:label="@string/app_name"
        android:roundIcon="@mipmap/ic_launcher_round"
        android:supportsRtl="true"
        android:theme="@style/AppTheme">
        
        <activity
            android:name=".MainActivity"
            android:exported="true"
            android:label="@string/app_name">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
    </application>
</manifest>
EOF

      - name: ☕ CREATE MAIN ACTIVITY
        run: |
          JAVA_FILE="app/src/main/java/${{ steps.trigger.outputs.pkg_path }}/MainActivity.java"
          
          # Use provided Java code if available
          if [[ -n "${{ steps.trigger.outputs.java_code }}" && "${{ steps.trigger.outputs.java_code }}" != "null" ]]; then
            echo "${{ steps.trigger.outputs.java_code }}" | base64 -d > "$JAVA_FILE" 2>/dev/null || true
          fi
          
          # Create default if not exists
          if [[ ! -s "$JAVA_FILE" ]]; then
            cat > "$JAVA_FILE" << 'EOF'
package PKG_PLACEHOLDER;

import android.os.Bundle;
import android.widget.TextView;
import androidx.appcompat.app.AppCompatActivity;

public class MainActivity extends AppCompatActivity {
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);
        
        TextView tv = findViewById(R.id.textView);
        tv.setText(getString(R.string.app_name) + "\nBuild: " + getString(R.string.build_id));
    }
}
EOF
            sed -i "s/PKG_PLACEHOLDER/${{ steps.trigger.outputs.final_pkg }}/g" "$JAVA_FILE"
          fi

      - name: 🎨 CREATE LAYOUT
        run: |
          LAYOUT_FILE="app/src/main/res/layout/activity_main.xml"
          
          # Use provided layout if available
          if [[ -n "${{ steps.trigger.outputs.layout_code }}" && "${{ steps.trigger.outputs.layout_code }}" != "null" ]]; then
            echo "${{ steps.trigger.outputs.layout_code }}" | base64 -d > "$LAYOUT_FILE" 2>/dev/null || true
          fi
          
          # Create default if not exists
          if [[ ! -s "$LAYOUT_FILE" ]]; then
            cat > "$LAYOUT_FILE" << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent"
    android:layout_height="match_parent"
    android:orientation="vertical"
    android:gravity="center"
    android:padding="20dp">
    
    <TextView
        android:id="@+id/textView"
        android:layout_width="wrap_content"
        android:layout_height="wrap_content"
        android:textSize="24sp"
        android:textColor="#6200EE"
        android:gravity="center" />
    
</LinearLayout>
EOF
          fi

      - name: ⚙️ CREATE SETTINGS.GRADLE
        run: |
          cat > settings.gradle << 'EOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}
rootProject.name = "SystemPro"
include ':app'
EOF

      - name: ⚙️ CREATE PROJECT BUILD.GRADLE
        run: |
          cat > build.gradle << 'EOF'
plugins {
    id 'com.android.application' version '8.1.0' apply false
}
EOF

      - name: ⚙️ CREATE APP BUILD.GRADLE
        run: |
          cat > app/build.gradle << EOF
plugins {
    id 'com.android.application'
}

android {
    namespace '${{ steps.trigger.outputs.final_pkg }}'
    compileSdk 34
    
    defaultConfig {
        applicationId '${{ steps.trigger.outputs.final_pkg }}'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
}
EOF

      - name: ⚙️ CREATE GRADLE WRAPPER
        run: |
          mkdir -p gradle/wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF

      - name: ⚙️ CREATE GRADLE PROPERTIES
        run: |
          cat > gradle.properties << 'EOF'
org.gradle.jvmargs=-Xmx2048m
android.useAndroidX=true
android.enableJetifier=true
EOF

      - name: 🏗️ SETUP GRADLE WRAPPER
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew

      - name: 🔨 BUILD APK
        run: |
          ./gradlew clean
          ./gradlew assembleDebug

      - name: 📤 UPLOAD APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-${{ steps.trigger.outputs.letters }}${{ steps.trigger.outputs.num1 }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: ✅ SUCCESS MESSAGE
        if: success()
        run: |
          echo "════════════════════════════════════════════"
          echo "✅ BUILD SUCCESSFUL"
          echo "════════════════════════════════════════════"
          echo "📦 Package: ${{ steps.trigger.outputs.final_pkg }}"
          echo "📱 App Name: ${{ steps.trigger.outputs.final_app }}"
          echo "📥 Download from Actions tab"
          echo "════════════════════════════════════════════"
