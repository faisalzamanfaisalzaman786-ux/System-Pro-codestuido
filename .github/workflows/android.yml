name: System Pro APK Builder

on:
  workflow_dispatch:
    inputs:
      file_content:
        description: 'Base64 JSON with package and files'
        required: true
        type: string

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode input
        run: |
          echo '${{ github.event.inputs.file_content }}' | base64 --decode > request.json
          echo "PACKAGE=$(jq -r '.package' request.json)" >> $GITHUB_ENV

      - name: Create Android project with Gradle 8.10.2
        run: |
          # Gradle wrapper (stable 8.10.2)
          mkdir -p gradle/wrapper
          curl -s -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.10.2/gradle/wrapper/gradle-wrapper.jar
          curl -s -o gradle/wrapper/gradle-wrapper.properties https://raw.githubusercontent.com/gradle/gradle/v8.10.2/gradle/wrapper/gradle-wrapper.properties
          curl -s -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.10.2/gradlew
          chmod +x gradlew

          mkdir -p app/src/main/java/$(echo $PACKAGE | tr '.' '/')
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values

          # settings.gradle
          cat > settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "MyApp"
          include ':app'
          EOF

          # app/build.gradle
          cat > app/build.gradle <<'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace System.getenv('PACKAGE')
              compileSdk 34

              defaultConfig {
                  applicationId System.getenv('PACKAGE')
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          touch app/proguard-rules.pro

          cat > app/src/main/res/values/strings.xml <<'EOF'
          <resources>
              <string name="app_name">System Pro</string>
          </resources>
          EOF

      - name: Place user files
        run: |
          JAVA_DIR="app/src/main/java/$(echo $PACKAGE | tr '.' '/')"
          
          # Java file
          jq -r '.files["MainActivity.java"]' request.json | sed "s/package .*/package $PACKAGE;/" > $JAVA_DIR/MainActivity.java
          
          # Layout file
          jq -r '.files["activity_main.xml"]' request.json > app/src/main/res/layout/activity_main.xml
          
          # Manifest file: first replace package, then add namespace if missing
          jq -r '.files["AndroidManifest.xml"]' request.json | sed 's/package=".*"/package="'$PACKAGE'"/' > temp_manifest.xml
          if ! grep -q 'xmlns:android=' temp_manifest.xml; then
              sed -i 's/<manifest /<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android" /' temp_manifest.xml
          fi
          mv temp_manifest.xml app/src/main/AndroidManifest.xml
          
          # Icon if present
          if jq -e '.files["icon.png"]' request.json >/dev/null; then
            jq -r '.files["icon.png"]' request.json | base64 --decode > app/src/main/res/drawable/icon.png
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK (with log capture)
        id: build
        continue-on-error: true
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "❌ Build failed. Last 50 lines of log:"
            tail -50 build.log
            exit 1
          fi

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-logs
          path: build.log
          if-no-files-found: warn

      - name: Upload APK (if exists)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
