name: System Pro Unique Builder

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # تمام فائلز اور ہسٹری حاصل کرنے کے لیے

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # کیش کو ہٹا دیا گیا ہے تاکہ ہر بار فریش بلڈ بنے
        
    - name: Generate Unique Identity
      run: |
        # ایک یونیک ٹائم اسٹیمپ بنانا
        UNIQUE_ID=$(date +%s)
        NEW_PACKAGE="com.system.pro.id$UNIQUE_ID"
        NEW_APP_NAME="System Pro $UNIQUE_ID"
        
        echo "Updating Package to: $NEW_PACKAGE"
        
        # 1. Build.gradle میں تبدیلیاں
        sed -i "s/namespace .*/namespace '$NEW_PACKAGE'/g" app/build.gradle
        sed -i "s/applicationId .*/applicationId '$NEW_PACKAGE'/g" app/build.gradle
        
        # 2. Java Files میں پیکیج اپ ڈیٹ کرنا
        find app/src/main/java -name "*.java" -exec sed -i "s/package .*/package $NEW_PACKAGE;/g" {} +
        
        # 3. Strings.xml میں ایپ کا نام بدلنا
        if [ -f app/src/main/res/values/strings.xml ]; then
          sed -i "s|<string name=\"app_name\">.*</string>|<string name=\"app_name\">$NEW_APP_NAME</string>|g" app/src/main/res/values/strings.xml
        fi

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Clean and Build Unique APK
      # ./gradlew clean لازمی ہے تاکہ پرانی تصاویر یا فائلز ڈیلیٹ ہو جائیں
      run: ./gradlew clean assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        # نام کو بھی یونیک کر دیا تاکہ پرانے کے ساتھ مکس نہ ہو
        name: System-Pro-Build-${{ github.run_number }}
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: error
