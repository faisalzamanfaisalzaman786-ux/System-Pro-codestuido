name: System Pro Build System

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Dynamic Package Name
        run: |
          # یونیک نمبر کے لیے ٹائم اسٹیمپ (سیکنڈز میں)
          TIMESTAMP=$(date +%s)
          NEW_PACKAGE="com.systempro.faisal.v$TIMESTAMP"
          echo "NEW_PACKAGE_NAME=$NEW_PACKAGE" >> $GITHUB_ENV
          
          echo "Setting Package Name to: $NEW_PACKAGE"
          
          # app/build.gradle میں namespace اور applicationId کو اپ ڈیٹ کرنا
          # یہ سنگل اور ڈبل کوٹس دونوں کو ہینڈل کرے گا
          sed -i "s/namespace .*/namespace \"$NEW_PACKAGE\"/g" app/build.gradle
          sed -i "s/applicationId .*/applicationId \"$NEW_PACKAGE\"/g" app/build.gradle
          
          # تمام جاوا فائلز میں پیکیج لائن کو بدلنا
          # یہ لائن کے شروع میں 'package' کو ڈھونڈ کر اسے نئے نام سے بدل دے گا
          find app/src/main/java -name "*.java" -exec sed -i "s/^package .*/package $NEW_PACKAGE;/g" {} +

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # --stacktrace اور --info سے ہمیں مکمل تفصیل ملے گی اگر بلڈ فیل ہوا
        run: ./gradlew assembleDebug --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-${{ env.NEW_PACKAGE_NAME }}
          path: app/build/outputs/apk/debug/app-debug.apk
