name: Auto Repair and Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create missing Gradle project files
        run: |
          # settings.gradle بنائیں اگر نہ ہو
          if [ ! -f settings.gradle ]; then
            echo "Creating settings.gradle"
            cat > settings.gradle << 'EOF'
rootProject.name = "SystemPro"
include ':app'
EOF
          fi

          # پروجیکٹ لیول build.gradle بنائیں اگر نہ ہو
          if [ ! -f build.gradle ]; then
            echo "Creating project-level build.gradle"
            cat > build.gradle << 'EOF'
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:7.4.2'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
EOF
          fi

          # gradle-wrapper.properties بنائیں اگر نہ ہو
          if [ ! -f gradle/wrapper/gradle-wrapper.properties ]; then
            echo "Creating gradle-wrapper.properties"
            mkdir -p gradle/wrapper
            cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-7.5-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF
          fi

      - name: Create Gradle Wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            echo "gradlew not found, creating wrapper..."
            gradle wrapper --gradle-version 7.5
          fi
          chmod +x gradlew

      - name: Build APK with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-App
          path: app/build/outputs/apk/debug/*.apk
