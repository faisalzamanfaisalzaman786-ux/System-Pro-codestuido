name: System Pro Final Rebuild

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  create-structure:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build All Folders and Files
        run: |
          # پرانے کچرے کی صفائی
          rm -rf app gradle build.gradle settings.gradle gradlew
          
          mkdir -p gradle/wrapper
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 1. Root build.gradle (Updated Version)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 2. settings.gradle
          echo "include ':app'" > settings.gradle

          # 3. app/build.gradle
          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId "com.system.pro"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

          # 4. Android Manifest
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:allowBackup="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. MainActivity.java
          cat <<EOF > app/src/main/java/com/system/pro/MainActivity.java
          package com.system.pro;
          import android.app.Activity;
          import android.os.Bundle;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }
          EOF

          # 6. Generate Proper Gradle Wrapper
          gradle wrapper --gradle-version 8.5

          # 7. Push Changes
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Fix: Updated Gradle versions to resolve dependency error" || echo "No changes"
          git push origin main --force
