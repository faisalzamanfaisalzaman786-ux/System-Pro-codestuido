name: Fix Missing Gradle Wrapper

on:
  workflow_dispatch: # یہ بٹن آپ کے ٹول سے ٹرگر (trigger) ہو سکے گا

jobs:
  setup-wrapper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # فائلز پش کرنے کے لیے اجازت

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate and Push Gradle Wrapper
        run: |
          # گریڈل ریپر فائلز بنانا
          gradle wrapper
          
          # گٹ کی کنفیگریشن
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # فائلز کو زبردستی ایڈ کرنا (تاکہ .gitignore کا مسئلہ نہ ہو)
          git add -f gradlew
          git add -f gradle/wrapper/gradle-wrapper.jar
          git add -f gradle/wrapper/gradle-wrapper.properties
          
          # اگر کوئی تبدیلی ہے تو پش کریں
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix: Added missing Gradle Wrapper files via Tool"
            git push
          fi
