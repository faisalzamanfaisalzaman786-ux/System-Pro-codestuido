name: System Pro APK Builder
on:
  workflow_dispatch:
    inputs:
      file_content: { required: true }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Icon & Package Injector
        run: |
          ID=$(head /dev/urandom | tr -dc a-z0-9 | head -c 6)
          PKG="com.systempro.app$ID"
          echo "PKG=$PKG" >> $GITHUB_ENV
          
          sed -i "s/namespace .*/namespace '$PKG'/g" app/build.gradle
          sed -i "s/applicationId .*/applicationId '$PKG'/g" app/build.gradle
          
          echo "${{ github.event.inputs.file_content }}" | base64 -d > data.json
          python3 -c "
          import json, os, re, base64
          pkg = '$PKG'
          with open('data.json', 'r') as f:
              files = json.load(f).get('files', {})
              for name, content in files.items():
                  # 1. جاوا فائلز
                  if name.endswith('.java'):
                      lines = content.split('\n')
                      clean = [l for l in lines if not l.strip().startswith('package ') and '.R;' not in l.strip()]
                      final_content = f'package {pkg};\nimport {pkg}.R;\n' + '\n'.join(clean)
                      path = f'app/src/main/java/{pkg.replace(\".\", \"/\")}/{name}'
                  # 2. مینی فیسٹ (آئیکن لنک کے ساتھ)
                  elif name == 'AndroidManifest.xml':
                      content = re.sub(r'android:label=\"[^\"]*\"', 'android:label=\"System Pro Calc\"', content)
                      content = re.sub(r'package=\"[\w\.]+\"', '', content).replace('.MainActivity', f'{pkg}.MainActivity')
                      # آئیکن سیٹ کرنا
                      if not 'android:icon' in content:
                          content = content.replace('<application', '<application android:icon=\"@mipmap/ic_launcher\"')
                      path = 'app/src/main/AndroidManifest.xml'
                  # 3. یوزر کا کسٹم آئیکن (IMAGE ٹیب سے)
                  elif name.lower().endswith(('.png', '.jpg', '.jpeg')):
                      # تمام امیجز کو ایپ آئیکن کے طور پر سیٹ کرنا
                      for folder in ['mipmap-hdpi', 'mipmap-mdpi', 'mipmap-xhdpi', 'mipmap-xxhdpi']:
                          img_path = f'app/src/main/res/{folder}/ic_launcher.png'
                          os.makedirs(os.path.dirname(img_path), exist_ok=True)
                          with open(img_path, 'wb') as img_file:
                              img_file.write(base64.b64decode(content))
                      continue
                  # 4. لے آؤٹ
                  elif name.endswith('.xml'):
                      path = 'app/src/main/res/layout/activity_main.xml'
                  else: continue
                  
                  os.makedirs(os.path.dirname(path), exist_ok=True)
                  with open(path, 'w') as out: out.write(final_content if name.endswith('.java') else content)
          "
      - name: Final Build
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Custom-Icon-APK
          path: app/build/outputs/apk/debug/*.apk
