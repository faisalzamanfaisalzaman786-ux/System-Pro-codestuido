name: System Pro APK Builder
on:
  workflow_dispatch:
    inputs:
      file_content: { required: true }

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Icon & Package Injector
        run: |
          # محفوظ پیکیج آئی ڈی بنانا
          ID=$(head /dev/urandom | tr -dc a-z0-9 | head -c 6)
          PKG="com.systempro.appy$ID"
          echo "PKG=$PKG" >> $GITHUB_ENV
          
          # Gradle فائلز میں پیکیج اور نیم اسپیس اپڈیٹ کرنا
          sed -i "s/namespace .*/namespace '$PKG'/g" app/build.gradle
          sed -i "s/applicationId .*/applicationId '$PKG'/g" app/build.gradle
          
          # ڈیٹا ڈی کوڈ کرنا
          echo "${{ github.event.inputs.file_content }}" | base64 -d > data.json
          
          python3 -c "
          import json, os, re, base64
          pkg = '$PKG'
          
          with open('data.json', 'r') as f:
              data = json.load(f)
              files = data.get('files', {})
              
              for name, content in files.items():
                  file_data = content
                  # 1. جاوا فائلز کی ہینڈلنگ (Import R فکس)
                  if name.endswith('.java'):
                      lines = content.split('\n')
                      # پرانے پیکیج اور غلط امپورٹس نکالنا
                      clean = [l for l in lines if not (l.strip().startswith('package ') or l.strip().startswith('import ')) or '.R;' in l]
                      # نیا پیکیج اور درست R امپورٹ شامل کرنا
                      final_lines = [f'package {pkg};', f'import {pkg}.R;']
                      final_lines.extend(clean)
                      file_data = '\n'.join(final_lines)
                      path = f'app/src/main/java/{pkg.replace(\".\", \"/\")}/{name}'
                  
                  # 2. مینی فیسٹ کلین اپ
                  elif name == 'AndroidManifest.xml':
                      content = re.sub(r'android:roundIcon=\"[^\"]*\"', '', content)
                      content = re.sub(r'package=\"[^\"]*\"', '', content)
                      file_data = content.replace('.MainActivity', f'{pkg}.MainActivity')
                      path = 'app/src/main/AndroidManifest.xml'
                  
                  # 3. آئیکنز
                  elif name.lower().endswith(('.png', '.jpg', '.jpeg')):
                      for folder in ['mipmap-hdpi', 'mipmap-mdpi', 'mipmap-xhdpi', 'mipmap-xxhdpi', 'mipmap-xxxhdpi']:
                          img_dir = f'app/src/main/res/{folder}'
                          os.makedirs(img_dir, exist_ok=True)
                          with open(f'{img_dir}/ic_launcher.png', 'wb') as img_file:
                              img_file.write(base64.b64decode(content))
                      continue
                  
                  # 4. ریسورس فائلز
                  elif name.endswith('.xml'):
                      if 'layout' in name or 'activity_main' in name:
                          path = 'app/src/main/res/layout/activity_main.xml'
                      elif 'strings' in name:
                          path = 'app/src/main/res/values/strings.xml'
                      elif 'colors' in name:
                          path = 'app/src/main/res/values/colors.xml'
                      elif 'themes' in name or 'styles' in name:
                          path = 'app/src/main/res/values/themes.xml'
                      else:
                          path = f'app/src/main/res/values/{name}'
                  else: continue
                  
                  os.makedirs(os.path.dirname(path), exist_ok=True)
                  with open(path, 'w') as f_out:
                      f_out.write(file_data)
          "

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean assembleDebug --no-build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-App
          path: app/build/outputs/apk/debug/*.apk
