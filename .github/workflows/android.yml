name: System Pro APK Builder

on:
  workflow_dispatch:
    inputs:
      file_content:
        description: 'Encoded JSON payload from System Pro'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Decode and Auto-Refactor Project
        run: |
          # 1. Payload Decode
          echo "${{ github.event.inputs.file_content }}" | base64 -d > payload.json
          
          # 2. Extract Base Package & Create Unique Version (For Multi-Install)
          BASE_PKG=$(jq -r '.package' payload.json)
          UNIQUE_PKG="${BASE_PKG}.v$(date +%s)"
          echo "UNIQUE_PKG=$UNIQUE_PKG" >> $GITHUB_ENV
          
          # 3. Create Modern Directory Structure
          PKG_PATH=$(echo $UNIQUE_PKG | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          
          # 4. Extract Source Files
          jq -r '.files["MainActivity.java"]' payload.json > app/src/main/java/$PKG_PATH/MainActivity.java
          jq -r '.files["activity_main.xml"]' payload.json > app/src/main/res/layout/activity_main.xml
          jq -r '.files["AndroidManifest.xml"]' payload.json > app/src/main/AndroidManifest.xml
          
          # 5. Fix Package Name in AndroidManifest
          sed -i "s/package=\"$BASE_PKG\"/package=\"$UNIQUE_PKG\"/g" app/src/main/AndroidManifest.xml
          
          # 6. Refactor Java Code (Fix R Class & Package)
          # پیکیج لائن کو اپ ڈیٹ کرنا
          sed -i "s/package $BASE_PKG/package $UNIQUE_PKG/g" app/src/main/java/$PKG_PATH/MainActivity.java
          # تمام پرانی R imports کو ختم کرنا تاکہ 'symbol not found' ایرر نہ آئے
          sed -i "/import .* \.R;/d" app/src/main/java/$PKG_PATH/MainActivity.java
          sed -i "/import .*\.R;/d" app/src/main/java/$PKG_PATH/MainActivity.java

      - name: Generate Upgraded Gradle Files (API 34)
        run: |
          # settings.gradle
          echo "include ':app'" > settings.gradle
          
          # Project Level build.gradle (Locked to Stable 8.2.1)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.1' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # Module Level build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace '${{ env.UNIQUE_PKG }}'
              compileSdk 34
              defaultConfig {
                  applicationId "${{ env.UNIQUE_PKG }}"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0-SystemPro"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: Build APK with Wrapper Lockdown
        run: |
          # Gradle 9.x سے بچنے کے لیے 8.2 ورژن لاک کرنا
          gradle wrapper --gradle-version 8.2
          ./gradlew assembleRelease

      - name: Upload Success Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ env.UNIQUE_PKG }}
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Error Logs (Only on Failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Errors-${{ env.UNIQUE_PKG }}
          path: |
            app/build/reports/
            app/src/main/java/
