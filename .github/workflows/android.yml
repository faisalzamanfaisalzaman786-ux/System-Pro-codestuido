name: System Pro Build System

on:
  workflow_dispatch: # آپ بس ایک کلک سے بلڈ رن کریں گے
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Auto-Generate Package Name and Serial
        run: |
          # موجودہ وقت کے مطابق ایک یونیک نمبر بنانا (مثلاً 20240312)
          TIMESTAMP=$(date +%Y%m%d%H%M)
          # آپ کا بنیادی پیکیج نیم
          BASE_PKG="com.systempro.master"
          # نیا پیکیج نیم جس میں نمبر خود بخود جڑ جائے گا
          NEW_PACKAGE="${BASE_PKG}.v${TIMESTAMP}"
          
          echo "Generated Package Name: $NEW_PACKAGE"
          
          # build.gradle میں خودکار تبدیلی
          sed -i "s/applicationId \".*\"/applicationId \"$NEW_PACKAGE\"/g" app/build.gradle
          sed -i "s/namespace \".*\"/namespace \"$NEW_PACKAGE\"/g" app/build.gradle
          
          # نمبر کو اگلے سٹیپ کے لیے محفوظ کرنا
          echo "FINAL_PKG=$NEW_PACKAGE" >> $GITHUB_ENV
          echo "SERIAL=$TIMESTAMP" >> $GITHUB_ENV

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          # اب فائل کا نام بھی خود بخود بدلے گا
          name: SystemPro-Build-${{ env.SERIAL }}
          path: app/build/outputs/apk/debug/*.apk
