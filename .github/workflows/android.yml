name: System Pro - Auto File Router

on:
  workflow_dispatch:
    inputs:
      file_name:
        description: 'فائل کا نام'
        required: true
      file_content:
        description: 'فائل کا مواد'
        required: true
      file_type:
        description: 'فائل کی قسم (java/xml/manifest)'
        required: true

jobs:
  route_and_save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create and Route File
        run: |
          # فائل کا صحیح راستہ (Path) متعین کرنا
          DEST_DIR="uploads"
          mkdir -p $DEST_DIR
          
          # فائل بنانا
          echo "${{ github.event.inputs.file_content }}" > "$DEST_DIR/${{ github.event.inputs.file_name }}"
          
          echo "✅ فائل $DEST_DIR میں تیار کر دی گئی ہے۔"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "System Pro Builder"
          git config --global user.email "action@github.com"
          git add uploads/
          git commit -m "Auto-upload: ${{ github.event.inputs.file_name }} via System Pro"
          git push origin main
