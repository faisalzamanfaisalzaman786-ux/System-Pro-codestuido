name: Final Master Repair & Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Fix Structure
        run: |
          # پرانے کچرے کو صاف کرنا اور نیا اسٹرکچر بنانا
          rm -rf app/src/main/res app/src/main/java app/src/main/AndroidManifest.xml
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/java/com/systempro/master

          # 1. مینی فیسٹ (Direct Fix)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher_repair"
                  android:label="System Pro"
                  android:theme="@android:style/Theme.Material.Light.NoActionBar">
                  <activity android:name="com.systempro.master.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 2. ویکٹر آئیکن
          cat <<EOF > app/src/main/res/drawable/ic_launcher_repair.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#000000" android:pathData="M0,0h108v108h-108z" />
          </vector>
          EOF

          # 3. لی آؤٹ
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="System Pro Master Fixed!" android:layout_centerInParent="true" />
          </RelativeLayout>
          EOF

          # 4. جاوا فائل
          cat <<EOF > app/src/main/java/com/systempro/master/MainActivity.java
          package com.systempro.master;
          import android.app.Activity;
          import android.os.Bundle;
          public class MainActivity extends Activity {
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
              }
          }
          EOF

          # 5. بلڈ فائلز (Gradle Fix)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.systempro.master'
              compileSdk 34
              defaultConfig {
                  applicationId "com.systempro.master"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Master-APK
          path: app/build/outputs/apk/debug/app-debug.apk
