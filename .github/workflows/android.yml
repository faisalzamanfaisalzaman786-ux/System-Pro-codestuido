      - name: Initialize Project Structure
        run: |
          rm -rf app build settings.gradle build.gradle gradlew
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/assets

          # 1. Base64 Icon (آپ کا لوگو)
          echo "iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAAAAACPAi4CAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAB3RJTUUH6AMXFRow7pZ9VwAAADJJREFUeNpjYBgFo2AUjIJRMApGwSgYBaNgFAy8AAYG6gE9oIDhP8IDBoYRDAYpGAV0AQC9OQH/p4at7wAAAABJRU5ErkJggg==" | base64 -d > app/src/main/res/mipmap-mdpi/ic_launcher.png

          # 2. AndroidManifest.xml (تمام ضروری پرمیشنز یہاں شامل ہیں)
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.system.pro">
              
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="System Pro Master"
                  android:requestLegacyExternalStorage="true"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          # 3. MainActivity.java (رن ٹائم پرمیشن اور ویب ویو ہینڈلنگ)
          echo "package com.system.pro;
          import android.Manifest;
          import android.os.Bundle;
          import android.webkit.PermissionRequest;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  // رن ٹائم پرمیشن مانگنا
                  ActivityCompat.requestPermissions(this, new String[]{
                      Manifest.permission.CAMERA, 
                      Manifest.permission.RECORD_AUDIO,
                      Manifest.permission.WRITE_EXTERNAL_STORAGE
                  }, 1);

                  WebView webView = new WebView(this);
                  setContentView(webView);
                  WebSettings webSettings = webView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webSettings.setMediaPlaybackRequiresUserGesture(false);

                  // ویب ویو کو کیمرہ اور مائیک استعمال کرنے کی اجازت دینا
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onPermissionRequest(final PermissionRequest request) {
                          request.grant(request.getResources());
                      }
                  });

                  webView.loadUrl(\"file:///android_asset/index.html\");
              }
          }" > app/src/main/java/com/system/pro/MainActivity.java

          # باقی گریڈل سیٹنگز (ویسے ہی رہیں گی)
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = 'System Pro Master'
          include ':app'" > settings.gradle

          echo "plugins { id 'com.android.application' version '8.2.2' apply false }" > build.gradle
          
          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.system.pro.master'
                  minSdk 24
                  targetSdk 34
                  versionCode 766
                  versionName '1.0.766'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }" > app/build.gradle

          gradle wrapper --gradle-version 8.2
