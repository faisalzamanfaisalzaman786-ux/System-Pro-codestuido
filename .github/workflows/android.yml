name: System Pro Production APK Builder

on:
  repository_dispatch:
    types: [build_apk]
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package Name (e.g., com.example.app)'
        required: true
        default: 'com.example.app'
      app_name:
        description: 'App Name'
        required: true
        default: 'MyDynamicApp'
      java_code:
        description: 'Base64 encoded Java code'
        required: true
      layout_code:
        description: 'Base64 encoded Layout code'
        required: true
      icon_base64:
        description: 'Base64 encoded app icon (PNG)'
        required: false
        default: ''

permissions:
  contents: write
  actions: write
  statuses: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ---------- Android SDK Installation (Stable & Complete) ----------
      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          mkdir -p $ANDROID_SDK_ROOT
          cd $ANDROID_SDK_ROOT
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mkdir -p cmdline-tools
          mv cmdline-tools_temp/* cmdline-tools/ 2>/dev/null || true
          rm -rf cmdline-tools_temp
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/bin" >> $GITHUB_PATH

      - name: Install Android SDK Components
        run: |
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/bin
          yes | $ANDROID_HOME/cmdline-tools/bin/sdkmanager "cmdline-tools;latest" --sdk_root=$ANDROID_HOME
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin

      - name: Accept Android Licenses
        run: |
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses || true

      - name: Install Platform Tools & Build Tools
        run: |
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # ---------- Decode User Input ----------
      - name: Decode Package Info
        id: decode
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            PACKAGE_NAME='${{ github.event.client_payload.package_name }}'
            APP_NAME='${{ github.event.client_payload.app_name }}'
            JAVA_BASE64='${{ github.event.client_payload.java_code }}'
            LAYOUT_BASE64='${{ github.event.client_payload.layout_code }}'
            ICON_BASE64='${{ github.event.client_payload.icon_base64 }}'
          else
            PACKAGE_NAME='${{ github.event.inputs.package_name }}'
            APP_NAME='${{ github.event.inputs.app_name }}'
            JAVA_BASE64='${{ github.event.inputs.java_code }}'
            LAYOUT_BASE64='${{ github.event.inputs.layout_code }}'
            ICON_BASE64='${{ github.event.inputs.icon_base64 }}'
          fi
          PACKAGE_NAME_CLEAN=$(echo "$PACKAGE_NAME" | tr '-' '_')
          echo "package_name=$PACKAGE_NAME_CLEAN" >> $GITHUB_OUTPUT
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          if [ -n "$JAVA_BASE64" ]; then
            echo "$JAVA_BASE64" | base64 -d > MainActivity.java 2>/dev/null || true
          fi
          if [ -n "$LAYOUT_BASE64" ]; then
            echo "$LAYOUT_BASE64" | base64 -d > activity_main.xml 2>/dev/null || true
          fi
          # Decode icon if provided
          if [ -n "$ICON_BASE64" ]; then
            echo "$ICON_BASE64" | base64 -d > app_icon.png 2>/dev/null || true
            if [ -s app_icon.png ]; then
              echo "icon_provided=true" >> $GITHUB_OUTPUT
            fi
          fi

      # ---------- Create Project Structure ----------
      - name: Create Android Project
        run: |
          set -e
          PACKAGE_NAME="${{ steps.decode.outputs.package_name }}"
          APP_NAME="${{ steps.decode.outputs.app_name }}"
          PACKAGE_PATH=$(echo $PACKAGE_NAME | tr '.' '/')
          rm -rf app/src/main/java/*
          mkdir -p app/src/main/java/$PACKAGE_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # Use user-provided Java if present and valid
          if [ -s MainActivity.java ] && grep -q "package" MainActivity.java; then
            echo "✅ Using user-provided Java file."
            cp MainActivity.java app/src/main/java/$PACKAGE_PATH/
            # Ensure package name is exactly as provided
            sed -i "s/package .*;/package $PACKAGE_NAME;/" app/src/main/java/$PACKAGE_PATH/MainActivity.java
          else
            # Fallback: a complete calculator app (large code ready)
            cat > app/src/main/java/$PACKAGE_PATH/MainActivity.java << 'JAVA_FALLBACK'
          package PACKAGE_PLACEHOLDER;

          import android.os.Bundle;
          import android.view.View;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private EditText etFirst, etSecond;
              private TextView tvResult;
              private Button btnAdd, btnSubtract, btnMultiply, btnDivide, btnClear;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  etFirst = findViewById(R.id.etFirst);
                  etSecond = findViewById(R.id.etSecond);
                  tvResult = findViewById(R.id.tvResult);
                  btnAdd = findViewById(R.id.btnAdd);
                  btnSubtract = findViewById(R.id.btnSubtract);
                  btnMultiply = findViewById(R.id.btnMultiply);
                  btnDivide = findViewById(R.id.btnDivide);
                  btnClear = findViewById(R.id.btnClear);

                  btnAdd.setOnClickListener(v -> calculate('+'));
                  btnSubtract.setOnClickListener(v -> calculate('-'));
                  btnMultiply.setOnClickListener(v -> calculate('*'));
                  btnDivide.setOnClickListener(v -> calculate('/'));
                  btnClear.setOnClickListener(v -> {
                      etFirst.setText("");
                      etSecond.setText("");
                      tvResult.setText("Result: ");
                  });
              }

              private void calculate(char op) {
                  String a = etFirst.getText().toString().trim();
                  String b = etSecond.getText().toString().trim();
                  if (a.isEmpty() || b.isEmpty()) {
                      tvResult.setText("Result: Enter both numbers");
                      return;
                  }
                  double x, y, r = 0;
                  try {
                      x = Double.parseDouble(a);
                      y = Double.parseDouble(b);
                  } catch (NumberFormatException e) {
                      tvResult.setText("Result: Invalid number");
                      return;
                  }
                  switch (op) {
                      case '+': r = x + y; break;
                      case '-': r = x - y; break;
                      case '*': r = x * y; break;
                      case '/':
                          if (y == 0) {
                              tvResult.setText("Result: Cannot divide by zero");
                              return;
                          }
                          r = x / y;
                          break;
                  }
                  tvResult.setText("Result: " + r);
              }
          }
          JAVA_FALLBACK
            sed -i "s/PACKAGE_PLACEHOLDER/$PACKAGE_NAME/g" app/src/main/java/$PACKAGE_PATH/MainActivity.java
          fi

          # Layout
          if [ -s activity_main.xml ] && grep -q "LinearLayout" activity_main.xml; then
            echo "✅ Using user-provided layout."
            cp activity_main.xml app/src/main/res/layout/
          else
            cat > app/src/main/res/layout/activity_main.xml << 'LAYOUT_FALLBACK'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="20dp"
              android:gravity="center">
              <EditText android:id="@+id/etFirst"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:hint="First number"
                  android:inputType="numberDecimal"
                  android:padding="12dp"
                  android:layout_marginBottom="10dp"/>
              <EditText android:id="@+id/etSecond"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:hint="Second number"
                  android:inputType="numberDecimal"
                  android:padding="12dp"
                  android:layout_marginBottom="20dp"/>
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:gravity="center"
                  android:layout_marginBottom="20dp">
                  <Button android:id="@+id/btnAdd"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="+"
                      android:textSize="24sp"
                      android:layout_marginEnd="5dp"/>
                  <Button android:id="@+id/btnSubtract"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="-"
                      android:textSize="24sp"
                      android:layout_marginStart="5dp"
                      android:layout_marginEnd="5dp"/>
                  <Button android:id="@+id/btnMultiply"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="×"
                      android:textSize="24sp"
                      android:layout_marginStart="5dp"
                      android:layout_marginEnd="5dp"/>
                  <Button android:id="@+id/btnDivide"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="÷"
                      android:textSize="24sp"
                      android:layout_marginStart="5dp"/>
              </LinearLayout>
              <Button android:id="@+id/btnClear"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Clear"
                  android:textSize="18sp"
                  android:layout_marginBottom="20dp"/>
              <TextView android:id="@+id/tvResult"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Result: "
                  android:textSize="20sp"
                  android:textStyle="bold"
                  android:gravity="center"
                  android:padding="12dp"/>
          </LinearLayout>
          LAYOUT_FALLBACK
          fi

      # ---------- AndroidManifest.xml (no package attribute) ----------
      - name: Create AndroidManifest.xml
        run: |
          APP_NAME="${{ steps.decode.outputs.app_name }}"
          cat > app/src/main/AndroidManifest.xml << 'MANIFEST_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher"
                  android:label="APP_NAME_PLACEHOLDER"
                  android:theme="@style/AppTheme"
                  android:supportsRtl="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST_EOF
          sed -i "s/APP_NAME_PLACEHOLDER/$APP_NAME/g" app/src/main/AndroidManifest.xml

      # ---------- Gradle Files (Complete & Production-Ready) ----------
      - name: Create Gradle Build Files
        run: |
          PACKAGE_NAME="${{ steps.decode.outputs.package_name }}"
          APP_NAME="${{ steps.decode.outputs.app_name }}"

          cat > settings.gradle << EOF
          rootProject.name = "$APP_NAME"
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          cat > app/build.gradle << EOF
          apply plugin: 'com.android.application'

          android {
              namespace '$PACKAGE_NAME'
              compileSdk 34

              defaultConfig {
                  applicationId "$PACKAGE_NAME"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      debuggable true
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      # ---------- Resource Files ----------
      - name: Create Resource Files
        run: |
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">#6200EE</item>
                  <item name="colorPrimaryDark">#3700B3</item>
                  <item name="colorAccent">#03DAC5</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">SystemPro</string>
          </resources>
          EOF

          # Custom icon handling
          if [ -f app_icon.png ] && [ -s app_icon.png ]; then
            echo "✅ Using custom icon from base64"
            cp app_icon.png app/src/main/res/drawable/ic_launcher.png
            # No need to create fallback vector icon
          else
            echo "ℹ️ No custom icon provided; using default vector icon."
            cat > app/src/main/res/drawable/ic_launcher.xml << 'EOF'
            <?xml version="1.0" encoding="utf-8"?>
            <vector xmlns:android="http://schemas.android.com/apk/res/android"
                android:width="24dp"
                android:height="24dp"
                android:viewportWidth="24"
                android:viewportHeight="24">
                <path
                    android:fillColor="#FF6200EE"
                    android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10,-4.48 10,-10S17.52,2 12,2zM12,5c1.66,0 3,1.34 3,3s-1.34,3 -3,3 -3,-1.34 -3,-3 1.34,-3 3,-3zM12,19.2c-2.5,0 -4.71,-1.28 -6,-3.22 0.03,-1.99 4,-3.08 6,-3.08 1.99,0 5.97,1.09 6,3.08 -1.29,1.94 -3.5,3.22 -6,3.22z"/>
            </vector>
            EOF
          fi

      - name: Create gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          android.suppressUnsupportedCompileSdk=34
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
          EOF

      # ---------- Install Gradle ----------
      - name: Install Gradle
        run: |
          GRADLE_VERSION=8.1.1
          wget -q https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
          unzip -q gradle-${GRADLE_VERSION}-bin.zip
          sudo mv gradle-${GRADLE_VERSION} /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH
          export PATH=$PATH:/opt/gradle/bin
          gradle --version

      # ---------- Build APK ----------
      - name: Build APK
        run: |
          gradle clean assembleDebug --stacktrace --no-daemon

      # ---------- Locate and Upload APK ----------
      - name: Locate APK
        id: find-apk
        run: |
          APK_PATH=$(find app/build/outputs -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found!"
            exit 1
          fi
          echo "APK found at: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.decode.outputs.app_name }}-debug
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 7

      # ---------- Completion Signal ----------
      - name: Send Repository Dispatch (Completion Signal)
        if: always()
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          STATUS="${{ job.status }}"
          APP_NAME="${{ steps.decode.outputs.app_name }}"
          PACKAGE_NAME="${{ steps.decode.outputs.package_name }}"
          if [ -n "$PAT_TOKEN" ]; then
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: Bearer $PAT_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/dispatches \
              -d '{
                "event_type": "build_complete",
                "client_payload": {
                  "status": "'"$STATUS"'",
                  "app_name": "'"$APP_NAME"'",
                  "package_name": "'"$PACKAGE_NAME"'",
                  "build_time": "'$(date)'"
                }
              }' || echo "Failed to send completion signal"
          fi
