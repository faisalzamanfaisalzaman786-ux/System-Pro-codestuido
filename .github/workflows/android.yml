name: System Pro Final Ultimate Force Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Total Wipe and Force Reconstruction
        run: |
          # 1. ہر چیز کو جڑ سے ختم کرنا (Force Delete)
          rm -rf ./*
          
          # 2. اینڈرائیڈ کا مکمل ڈھانچہ بنانا
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/java/com/systempro/master

          # 3. settings.gradle (گریڈل کنفلکٹ کا مکمل حل)
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "System Pro Master"
          include ':app'
          EOF

          # 4. Root build.gradle
          cat <<EOF > build.gradle
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          # 5. app/build.gradle (بغیر کسی بیرونی لائبریری کے سادہ اور پاور فل)
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.systempro.master'
              compileSdk 34
              defaultConfig {
                  applicationId "com.systempro.master"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          EOF

          # 6. AndroidManifest.xml
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher_repair"
                  android:label="System Pro"
                  android:theme="@android:style/Theme.Material.Light.NoActionBar">
                  <activity android:name="com.systempro.master.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 7. MainActivity.java (ٹیسٹ کوڈ)
          cat <<EOF > app/src/main/java/com/systempro/master/MainActivity.java
          package com.systempro.master;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.TextView;
          import android.view.Gravity;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  TextView tv = new TextView(this);
                  tv.setText("SYSTEM PRO\nBUILD SUCCESSFUL!");
                  tv.setTextSize(30);
                  tv.setGravity(Gravity.CENTER);
                  setContentView(tv);
              }
          }
          EOF

          # 8. Vector Icon (Base64 کے متبادل کے طور پر کوڈ بیسڈ امیج)
          cat <<EOF > app/src/main/res/drawable/ic_launcher_repair.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#000000" android:pathData="M0,0h108v108h-108z" />
          </vector>
          EOF

      - name: Force Build Execution
        run: |
          # گریڈل ریپر بنانا اور پرمیشن دینا
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          # بلڈ شروع کرنا
          ./gradlew assembleDebug --stacktrace

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Master-Final
          path: app/build/outputs/apk/debug/app-debug.apk
