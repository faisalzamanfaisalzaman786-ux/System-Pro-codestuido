name: System Pro Final Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Initialize Project Structure
        run: |
          # 1. پرانی فائلوں کی مکمل صفائی
          rm -rf app build settings.gradle build.gradle gradlew gradle .gradle
          
          # 2. فولڈرز بنانا
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # 3. Settings فائل بنانا (درست ترتیب کے ساتھ)
          # 'pluginManagement' کو لازمی طور پر سب سے اوپر ہونا چاہیے
          echo "pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'System Pro Master'
          include ':app'" > settings.gradle

          # 4. Root build.gradle بنانا
          echo "plugins {
              id 'com.android.application' version '8.2.2' apply false
          }" > build.gradle

          # 5. گریڈل ریپر بنانا
          gradle wrapper --gradle-version 8.2

          # 6. ایپ لیول کی فائلیں بنانا
          echo '<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">System Pro Master</string>
          </resources>' > app/src/main/res/values/strings.xml

          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.system.pro.master'
                  minSdk 24
                  targetSdk 34
                  versionCode 759
                  versionName '1.0.759'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }" > app/build.gradle

          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

      - name: Grant Permission and Build
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
