name: System Pro APK Builder

on:
  workflow_dispatch:
    inputs:
      file_content:
        description: 'Base64 encoded JSON with package and files'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode and extract files
        run: |
          echo '${{ github.event.inputs.file_content }}' | base64 --decode > request.json
          PACKAGE=$(jq -r '.package' request.json)
          echo "PACKAGE=$PACKAGE" >> $GITHUB_ENV
          JAVA_DIR="app/src/main/java/$(echo $PACKAGE | tr '.' '/')"
          mkdir -p $JAVA_DIR
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          JAVA_CODE="$(jq -r '.files["MainActivity.java"]' request.json)"
          JAVA_CODE=$(echo "$JAVA_CODE" | sed "s/package .*/package $PACKAGE;/")
          echo "$JAVA_CODE" > $JAVA_DIR/MainActivity.java
          echo "$(jq -r '.files["activity_main.xml"]' request.json)" > app/src/main/res/layout/activity_main.xml
          MANIFEST="$(jq -r '.files["AndroidManifest.xml"]' request.json)"
          MANIFEST=$(echo "$MANIFEST" | sed "s/package=\".*\"/package=\"$PACKAGE\"/")
          echo "$MANIFEST" > app/src/main/AndroidManifest.xml
          if jq -e '.files["icon.png"]' request.json > /dev/null; then
            echo "$(jq -r '.files["icon.png"]' request.json)" | base64 --decode > app/src/main/res/drawable/icon.png
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
