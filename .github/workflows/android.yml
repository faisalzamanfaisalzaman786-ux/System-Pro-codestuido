name: System Pro AI Builder v2

on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Purge & Reconstruct Project Structure
        run: |
          # 1. ایپ سے آنے والا ڈیٹا حاصل کرنا
          PKG_NAME="${{ github.event.client_payload.package_name }}"
          APP_NAME="${{ github.event.client_payload.app_name }}"
          PKG_PATH=$(echo $PKG_NAME | sed 's/\./\//g')

          echo "Building: $APP_NAME ($PKG_NAME)"

          # 2. پرانے تمام سورس کوڈ کو صاف کرنا
          rm -rf app/src/main/java/*
          rm -rf app/src/main/res/layout/*
          
          # 3. نیا فولڈر اسٹرکچر بنانا
          mkdir -p "app/src/main/java/$PKG_PATH"
          mkdir -p "app/src/main/res/layout"

          # 4. Base64 کوڈ کو ڈی کوڈ کر کے فائلوں میں محفوظ کرنا
          echo "${{ github.event.client_payload.java_code }}" | base64 --decode > "app/src/main/java/$PKG_PATH/MainActivity.java"
          echo "${{ github.event.client_payload.layout_code }}" | base64 --decode > "app/src/main/res/layout/activity_main.xml"
          echo "${{ github.event.client_payload.manifest_code }}" | base64 --decode > "app/src/main/AndroidManifest.xml"

          # 5. Gradle فائل میں Package Name اور App Name اپ ڈیٹ کرنا
          sed -i "s/namespace .*/namespace '$PKG_NAME'/g" app/build.gradle || true
          sed -i "s/applicationId .*/applicationId '$PKG_NAME'/g" app/build.gradle || true
          
          # 6. ایپ کا نام (Strings.xml) اپ ڈیٹ کرنا
          mkdir -p app/src/main/res/values
          echo "<?xml version='1.0' encoding='utf-8'?>
          <resources>
              <string name='app_name'>$APP_NAME</string>
          </resources>" > app/src/main/res/values/strings.xml

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Clean APK
        run: ./gradlew clean assembleDebug --no-build-cache

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.package_name }}-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Error Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-logs
          path: app/build/reports/
