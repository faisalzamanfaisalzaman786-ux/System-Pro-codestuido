name: Android CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [remote-build-trigger]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Clean and Fix Project
      run: |
        # 1. پرانی عارضی فائلیں ختم کرنا
        chmod +x gradlew
        ./gradlew clean

        # 2. غلط نام والی فائلوں کو درست کرنا (صرف سورس میں)
        find app/src/main/res -name ":vi*" -type f | while read f; do
          new_name=$(echo "$f" | sed 's/:vi //g')
          mv "$f" "$new_name"
        done

        # 3. پیکیج نیم صرف سورس فائلوں میں تبدیل کرنا (build فولڈر کو چھوڑ کر)
        PKG="com.example.cameraapp"
        find app/src/main -name "AndroidManifest.xml" -type f -exec sed -i "s/package=\".*\"/package=\"$PKG\"/" {} +
        find app/src/main/java -name "*.java" -type f -exec sed -i "s/^package .*;/package $PKG;/" {} +

        # 4. SDK وارننگ فکس
        echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: System-Pro-Final-APK
        path: app/build/outputs/apk/debug/app-debug.apk
