name: Android APK Builder

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Process and Build
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          APP_NAME=$(echo "$PAYLOAD" | jq -r '.app_name // "SystemPro"')
          PACKAGE_NAME=$(echo "$PAYLOAD" | jq -r '.package_name // "com.system.pro"')
          JAVA_CODE=$(echo "$PAYLOAD" | jq -r '.java // ""')
          XML_LAYOUT=$(echo "$PAYLOAD" | jq -r '.xml // ""')
          MANIFEST_XML=$(echo "$PAYLOAD" | jq -r '.manifest // ""')
          ICON_B64=$(echo "$PAYLOAD" | jq -r '.icon_data // ""')

          PKG_PATH=$(echo "$PACKAGE_NAME" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p gradle/wrapper

          # پیکیج نیم کو مینی فیسٹ سے مکمل صاف کرنا (AGP 8.5 کی ضرورت)
          if [ -z "$MANIFEST_XML" ] || [ "$MANIFEST_XML" = "null" ]; then
             MANIFEST_XML="<?xml version=\"1.0\" encoding=\"utf-8\"?><manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"><application android:label=\"$APP_NAME\" android:theme=\"@style/Theme.SystemPro\"><activity android:name=\".MainActivity\" android:exported=\"true\"><intent-filter><action android:name=\"android.intent.action.MAIN\" /><category android:name=\"android.intent.category.LAUNCHER\" /></intent-filter></activity></application></manifest>"
          else
             MANIFEST_XML=$(echo "$MANIFEST_XML" | sed 's/package="[^"]*"//g')
          fi

          echo -e "$JAVA_CODE" > app/src/main/java/$PKG_PATH/MainActivity.java
          echo -e "$XML_LAYOUT" > app/src/main/res/layout/activity_main.xml
          echo -e "$MANIFEST_XML" > app/src/main/AndroidManifest.xml

          # جدید گریڈل کے لیے settings.gradle کی ترتیب
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "$APP_NAME"
          include ':app'
          EOF

          # Root build.gradle (صرف پلگ انز کی تعریف)
          cat <<EOF > build.gradle
          plugins {
              id 'com.android.application' version '8.5.0' apply false
              id 'com.android.library' version '8.5.0' apply false
          }
          EOF

          # App build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace '$PACKAGE_NAME'
              compileSdk 34
              defaultConfig {
                  applicationId '$PACKAGE_NAME'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildFeatures { viewBinding true }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          # گریڈل انجن سیٹ اپ
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.1-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          
          sync
          chmod +x gradlew
          # بلڈ کو فورس کرنا تاکہ پرانے ورکرز ختم ہوں
          ./gradlew clean assembleDebug --no-daemon --stacktrace --parallel
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name || 'System-Pro-V1400' }}
          path: app/build/outputs/apk/debug/*.apk
