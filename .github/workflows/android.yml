name: System Pro Ultimate Builder
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'App Package Name'
        required: true
        default: 'com.systempro.app'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📥 Checkout (Fresh Start)
        uses: actions/checkout@v4
        with:
          clean: true
          persist-credentials: false

      - name: 🛡️ Environment Cleanup
        run: |
          # گٹ ہب کے تمام پرانے کچرے کی صفائی
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          find . -maxdepth 1 ! -name '.github' ! -name '.' -exec rm -rf {} +

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Re-Build Structure (Stable Versions)
        run: |
          PKG="${{ github.event.inputs.package_name }}"
          PKG_PATH=$(echo $PKG | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 1. settings.gradle
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "SystemProApp"
          include ':app'
          EOF

          # 2. build.gradle (Project Level)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          EOF

          # 3. app/build.gradle (Fixed Dependencies for No Conflict)
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace '$PKG'
              compileSdk 34
              defaultConfig { 
                  applicationId '$PKG'
                  minSdk 24 
                  targetSdk 34 
                  versionCode 1 
                  versionName '1.0' 
              }
              buildFeatures { viewBinding true }
          }
          dependencies {
              # سٹیبل ورژن استعمال کر رہے ہیں تاکہ ایرر نہ آئے
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

          # 4. Basic Manifest & Java (برائے کمپائلیشن ٹیسٹ)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat <<EOF > app/src/main/java/$PKG_PATH/MainActivity.java
          package $PKG;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle s) { super.onCreate(s); }
          }
          EOF

      - name: 🔨 Execute Build (Force Success)
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          # تمام پرانی کیشے صاف کر کے بلڈ کریں
          ./gradlew clean :app:assembleDebug --no-daemon --stacktrace

      - name: 📦 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-APK
          path: app/build/outputs/apk/debug/*.apk
