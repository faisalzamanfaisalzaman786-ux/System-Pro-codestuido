      - name: 🔨 Final Compilation
        run: |
          # گریڈل ورژن کو 8.2 پر سیٹ کریں جو اینڈرائیڈ 8.2.2 پلگ ان کے لیے بہترین ہے
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          
          # کیشے صاف کر کے بلڈ شروع کریں
          ./gradlew clean assembleDebug --no-daemon --stacktrace
