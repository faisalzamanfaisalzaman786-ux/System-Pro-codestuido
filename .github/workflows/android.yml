name: System Pro Master Setup
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Target Package Name'
        required: true
        default: 'com.systempro.test'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Status: Initialization
        run: echo "Starting Build for ${{ github.event.inputs.package_name }}"

      - uses: actions/checkout@v4
      - name: Status: Java Setup
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Status: Creating Folders
        run: |
          PKG="${{ github.event.inputs.package_name }}"
          PKG_PATH=$(echo $PKG | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          echo "Folders created for $PKG"

      - name: Status: Generating Code
        run: |
          PKG="${{ github.event.inputs.package_name }}"
          # Build.gradle dynamic setup
          echo "plugins { id 'com.android.application' }" > app/build.gradle
          echo "android { namespace '$PKG'; compileSdk 34; defaultConfig { applicationId '$PKG'; minSdk 24; targetSdk 34 } }" >> app/build.gradle
          echo "Build files generated."

      - name: Status: Compiling APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --info

      - name: Status: Uploading
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.package_name }}-APK
          path: app/build/outputs/apk/debug/*.apk
