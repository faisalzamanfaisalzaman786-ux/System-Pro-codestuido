name: System Pro Multi-Deployment

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # یہاں آپ اپنی مرضی کے مطابق مزید ورژنز (app4, app5 وغیرہ) شامل کر سکتے ہیں
        flavor: [app1, app2, app3]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # یہ کمانڈ میٹرکس کی مدد سے باری باری تمام فلیورز بلڈ کرے گی
        run: ./gradlew assemble${{ matrix.flavor }}Release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-${{ matrix.flavor }}
          path: app/build/outputs/apk/${{ matrix.flavor }}/release/*.apk
