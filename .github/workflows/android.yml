name: System Pro Native Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build All APKs
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload Everything Found
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Full-Package
          # یہ لائن ہر جگہ سے APK تلاش کرے گی
          path: "**/build/outputs/apk/**/*.apk" 
          retention-days: 5
