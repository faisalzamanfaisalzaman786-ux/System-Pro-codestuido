name: System Pro - Auto File Router

on:
  workflow_dispatch:
    inputs:
      file_name:
        description: 'فائل کا نام'
        default: 'test_file.txt' # اگر ایپ نام نہ بھیجے تو یہ نام استعمال ہوگا
        required: false
      file_content:
        description: 'فائل کا مواد'
        default: 'Empty Content'
        required: false

jobs:
  route_and_save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create File
        run: |
          mkdir -p uploads
          echo "${{ github.event.inputs.file_content }}" > "uploads/${{ github.event.inputs.file_name }}"
          
      - name: Push to Branch
        run: |
          git config --global user.name "System Pro"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Auto upload from App"
          git push
