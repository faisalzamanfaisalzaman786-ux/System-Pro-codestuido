      - name: Gemini Dynamic Package & Folder Duty
        run: |
          # 1. یو آئی سے پیکج نیم اٹھانا
          RAW_PKG="${{ github.event.client_payload.package_name }}"
          # اگر پیکج خالی ہو تو ڈیفالٹ سیٹ کرنا
          PKG=${RAW_PKG:-"com.system.pro"}
          
          # 2. ڈاٹ (.) کو سلیش (/) میں بدل کر پاتھ بنانا
          PKG_PATH=$(echo $PKG | tr '.' '/')
          
          # 3. ڈائنامک فولڈر بنانا
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 4. جاوا فائل پروسیسنگ (پیکیج نیم سنک کرنا)
          echo "${{ github.event.client_payload.java_b64 }}" | base64 -d > raw_java.java
          
          # فائل تیار کرنا: پہلے پیکیج، پھر امپورٹ R، پھر باقی کوڈ (پرانا پیکیج ہٹا کر)
          echo "package $PKG;" > app/src/main/java/$PKG_PATH/MainActivity.java
          echo "import $PKG.R;" >> app/src/main/java/$PKG_PATH/MainActivity.java
          grep -v "package " raw_java.java >> app/src/main/java/$PKG_PATH/MainActivity.java

          # 5. مینی فیسٹ اور ریسورسز
          echo "${{ github.event.client_payload.xml_b64 }}" | base64 -d > app/src/main/res/layout/activity_main.xml
          echo "${{ github.event.client_payload.manifest_b64 }}" | base64 -d > app/src/main/AndroidManifest.xml
          
          # ضروری اسٹائلز (بلڈ پروٹیکشن)
          echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.AppCompat.Light.DarkActionBar" parent="Theme.AppCompat.Light"/></resources>' > app/src/main/res/values/styles.xml
