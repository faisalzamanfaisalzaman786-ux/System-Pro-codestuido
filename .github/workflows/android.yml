name: System Pro Build System

on:
  workflow_dispatch: # آپ گٹ ہب پر جا کر صرف بٹن دبائیں گے

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Dynamic Package Name
        run: |
          # موجودہ تاریخ اور وقت سے ایک نمبر بنانا
          TIMESTAMP=$(date +%Y%m%d%H%M)
          # نیا پیکیج نیم تیار کرنا
          DYNAMIC_PKG="com.systempro.app$TIMESTAMP"
          
          echo "Building APK with Package: $DYNAMIC_PKG"
          echo "SERIAL_NUMBER=$TIMESTAMP" >> $GITHUB_ENV
          
          # گریڈل کو براہ راست نیا پیکیج نیم پاس کرنا (جیسا آپ کی گریڈل فائل چاہتی ہے)
          ./gradlew assembleDebug -PtargetPackage=$DYNAMIC_PKG

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Build-${{ env.SERIAL_NUMBER }}
          path: app/build/outputs/apk/debug/*.apk
