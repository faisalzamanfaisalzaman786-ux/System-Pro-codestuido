name: Ultimate Project Fixer

on:
  workflow_dispatch:

jobs:
  fix-and-fill:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Force Create Project Structure
        run: |
          # پرانے خالی فولڈرز کو صاف کر کے دوبارہ بنانا تاکہ کوئی ایرر نہ آئے
          rm -rf app gradle build.gradle settings.gradle gradlew
          mkdir -p gradle/wrapper
          mkdir -p app/src/main/java/com/system/pro

          # 1. Root build.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 2. settings.gradle
          echo "include ':app'" > settings.gradle
          echo 'rootProject.name = "System Pro"' >> settings.gradle

          # 3. app/build.gradle
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.system.pro'
              compileSdk 33
              defaultConfig {
                  applicationId "com.system.pro"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

          # 4. Android Manifest (آخری فولڈر کے لیے)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:allowBackup="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 5. Gradle Wrapper جنریٹ کرنا
          gradle wrapper --gradle-version 8.0

          # تبدیلیوں کو محفوظ کرنا
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Force fix: Created all files in correct paths"
          git push --force origin main
