name: System Pro Smart Builder
on: [push, workflow_dispatch]

jobs:
  arrange-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # یہ سٹیپ فائلوں کو صحیح جگہ پر ترتیب دے گا
      - name: Arrange Android Structure
        run: |
          echo "📂 Arranging files for Android Build..."
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          # اگر فائلیں باہر پڑی ہیں تو انہیں اندر منتقل کرو
          [ -f "MainActivity.java" ] && mv MainActivity.java app/src/main/java/com/system/pro/
          [ -f "activity_main.xml" ] && mv activity_main.xml app/src/main/res/layout/
          [ -f "AndroidManifest.xml" ] && mv AndroidManifest.xml app/src/main/
          
          echo "✅ Structure Arranged."

      # گریڈل 8.5 کو سیٹ کرنا اور ایگزیکیوشن کی اجازت دینا
      - name: Setup Gradle 8.5
        run: |
          if [ ! -f "gradlew" ]; then
            echo "🔧 Generating Gradle Wrapper..."
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew

      # بلڈ پروسیس
      - name: Build APK with Gradle 8.5
        run: ./gradlew assembleDebug --stacktrace

      # اے پی کے اپلوڈ کرنا
      - name: Upload System Pro APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V108-Build
          path: "**/build/outputs/apk/debug/*.apk"
