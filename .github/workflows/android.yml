name: System Pro APK Builder

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ Repair & Clean
        run: |
          chmod +x gradlew || true
          # غیر ضروری ونڈوز کریکٹرز اور کیشے ختم کریں
          find . -type f \( -name "*.java" -o -name "*.xml" -o -name "*.gradle" \) -exec sed -i 's/\r$//' {} +
          ./gradlew clean

      - name: 🚀 Build Unique App
        run: ./gradlew assembleDebug --no-daemon

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Success-Build
          path: app/build/outputs/apk/debug/*.apk
