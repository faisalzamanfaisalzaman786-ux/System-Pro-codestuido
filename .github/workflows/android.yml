name: System Pro Dynamic Build
on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-app]

jobs:
  assemble-dynamic-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Process Dynamic Payload
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          # پے لوڈ سے پیکیج نیم نکالنا (ڈیفالٹ: com.system.pro)
          PACKAGE_NAME=$(echo "$PAYLOAD" | jq -r '.package_name // "com.system.pro"')
          PKG_PATH=$(echo "$PACKAGE_NAME" | tr '.' '/')
          
          echo "Building for Package: $PACKAGE_NAME"
          
          # 1. فولڈر اسٹرکچر بنانا
          mkdir -p app/src/main/java/$PKG_PATH
          
          # 2. جاوا فائل کو نئے پیکیج کے ساتھ سیٹ کرنا
          echo "$PAYLOAD" | jq -r '.java_b64' | base64 -d > raw_java.txt
          sed -i '/package /d' raw_java.txt
          sed -i '/import .*R;/d' raw_java.txt
          {
            echo "package $PACKAGE_NAME;"
            echo "import $PACKAGE_NAME.R;"
            echo "import androidx.core.content.ContextCompat;"
            cat raw_java.txt
          } > app/src/main/java/$PKG_PATH/MainActivity.java

          # 3. مینی فیسٹ کو کلین کرنا (پیکیج ٹیگ ہٹانا تاکہ گریڈل ہینڈل کرے)
          echo "$PAYLOAD" | jq -r '.manifest_b64' | base64 -d > app/src/main/AndroidManifest.xml
          sed -i 's/package="[^"]*"//g' app/src/main/AndroidManifest.xml

      - name: Build APK with Dynamic Property
        run: |
          # گریڈل کو ڈائنامک پیکیج پراپرٹی پاس کرنا
          ./gradlew :app:assembleDebug \
            -PdynamicPackage="${{ github.event.client_payload.package_name || 'com.system.pro' }}" \
            --no-daemon --stacktrace

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.package_name || 'Dynamic-Build' }}
          path: app/build/outputs/apk/debug/*.apk
