name: System Pro APK Generator
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # گریڈل کو ایگزیکیوٹ کرنے کی اجازت دینا (اگر فائل موجود ہو)
      - name: Grant execute permission for gradlew
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          elif [ -f "app/gradlew" ]; then
            cd app && chmod +x gradlew
          else
            echo "❌ gradlew not found!" && exit 1
          fi

      # بلڈ پروسیس (ایرر چیکنگ کے ساتھ)
      - name: Build with Gradle
        run: |
          if [ -f "gradlew" ]; then
            ./gradlew assembleDebug
          else
            cd app && ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Debug-APK
          path: "**/build/outputs/apk/debug/*.apk" # یہ خود ہی ڈھونڈ لے گا کہ APK کہاں ہے
