name: System Pro APK Builder

on:
  workflow_dispatch:
    inputs:
      file_content:
        description: 'Base64 encoded JSON with package and files'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode and debug input
        run: |
          echo "Received file_content length: ${#FILE_CONTENT}"
          echo "$FILE_CONTENT" | base64 --decode > request.json
          echo "Decoded JSON size: $(wc -c < request.json) bytes"
          cat request.json | jq '.' || echo "Invalid JSON"
          PACKAGE=$(jq -r '.package' request.json)
          echo "PACKAGE=$PACKAGE" >> $GITHUB_ENV
          echo "Package name: $PACKAGE"
        env:
          FILE_CONTENT: ${{ github.event.inputs.file_content }}

      - name: Create Android project skeleton
        run: |
          # Gradle wrapper
          mkdir -p gradle/wrapper
          curl -s -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.0.2/gradle/wrapper/gradle-wrapper.jar
          curl -s -o gradle/wrapper/gradle-wrapper.properties https://raw.githubusercontent.com/gradle/gradle/v8.0.2/gradle/wrapper/gradle-wrapper.properties
          curl -s -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.0.2/gradlew
          curl -s -o gradlew.bat https://raw.githubusercontent.com/gradle/gradle/v8.0.2/gradlew.bat
          chmod +x gradlew

          # settings.gradle
          echo "rootProject.name = 'MyApp'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          # app module directories
          mkdir -p app/src/main
          mkdir -p app/src/main/java/$(echo $PACKAGE | tr '.' '/')
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values

          # app/build.gradle
          cat > app/build.gradle << EOF
          apply plugin: 'com.android.application'

          android {
              compileSdk 34
              defaultConfig {
                  applicationId "$PACKAGE"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                  }
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
          }
          EOF

          # Empty proguard
          touch app/proguard-rules.pro

          # strings.xml
          cat > app/src/main/res/values/strings.xml << EOF
          <resources>
              <string name="app_name">System Pro</string>
          </resources>
          EOF

          # themes.xml
          cat > app/src/main/res/values/themes.xml << EOF
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">#f97316</item>
                  <item name="colorPrimaryDark">#c2410c</item>
                  <item name="colorAccent">#f97316</item>
              </style>
          </resources>
          EOF

      - name: Place user files
        run: |
          JAVA_DIR="app/src/main/java/$(echo $PACKAGE | tr '.' '/')"

          # Java file
          JAVA_CODE="$(jq -r '.files["MainActivity.java"]' request.json)"
          if [ -z "$JAVA_CODE" ] || [ "$JAVA_CODE" = "null" ]; then
            echo "❌ MainActivity.java missing in request"
            exit 1
          fi
          # Fix package line
          JAVA_CODE=$(echo "$JAVA_CODE" | sed "s/package .*/package $PACKAGE;/")
          echo "$JAVA_CODE" > $JAVA_DIR/MainActivity.java
          echo "✅ Java file written"

          # Layout file
          LAYOUT="$(jq -r '.files["activity_main.xml"]' request.json)"
          if [ -z "$LAYOUT" ] || [ "$LAYOUT" = "null" ]; then
            echo "❌ activity_main.xml missing"
            exit 1
          fi
          echo "$LAYOUT" > app/src/main/res/layout/activity_main.xml
          echo "✅ Layout file written"

          # Manifest file
          MANIFEST="$(jq -r '.files["AndroidManifest.xml"]' request.json)"
          if [ -z "$MANIFEST" ] || [ "$MANIFEST" = "null" ]; then
            echo "❌ AndroidManifest.xml missing"
            exit 1
          fi
          MANIFEST=$(echo "$MANIFEST" | sed "s/package=\".*\"/package=\"$PACKAGE\"/")
          echo "$MANIFEST" > app/src/main/AndroidManifest.xml
          echo "✅ Manifest written"

          # Icon if present
          if jq -e '.files["icon.png"]' request.json > /dev/null; then
            echo "$(jq -r '.files["icon.png"]' request.json)" | base64 --decode > app/src/main/res/drawable/icon.png
            echo "✅ Icon written"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
