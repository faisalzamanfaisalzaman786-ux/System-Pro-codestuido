name: System Pro Final Fixed
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'App Package Name'
        required: true
        default: 'com.systempro.app'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Clean Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: 2. Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Nuclear Structure Reset
        run: |
          PKG="${{ github.event.inputs.package_name }}"
          PKG_PATH=$(echo $PKG | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/values

          # Generate absolute base settings
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "SystemProApp"
          include ':app'
          EOF

          # Root Build File
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          EOF

          # App Level Build with Strict Locking
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace '$PKG'
              compileSdk 33
              defaultConfig { 
                  applicationId '$PKG'
                  minSdk 21 
                  targetSdk 33 
                  versionCode 1 
                  versionName '1.0' 
              }
              configurations.all {
                  resolutionStrategy {
                      force 'androidx.core:core:1.8.0'
                      force 'androidx.appcompat:appcompat:1.4.1'
                      force 'com.google.android.material:material:1.6.0'
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.4.1'
              implementation 'com.google.android.material:material:1.6.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.3'
          }
          EOF

          # Minimal Manifest
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # Basic Activity
          cat <<EOF > app/src/main/java/$PKG_PATH/MainActivity.java
          package $PKG;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override protected void onCreate(Bundle s) { super.onCreate(s); }
          }
          EOF

      - name: 4. Forced Clean Build
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew clean :app:assembleDebug --stacktrace --no-daemon

      - name: 5. Export APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-APK
          path: app/build/outputs/apk/debug/*.apk
