name: System Pro Compiler

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # ڈیبگ بلڈ بنائیں کیونکہ یہ خودکار سائن ہوتی ہے اور ٹیسٹنگ کے لیے بہترین ہے
      - name: Clean and Build Debug APK
        run: ./gradlew clean assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-App-Final
          # یہاں ہم نے پاتھ کو assembleDebug کے مطابق سیٹ کیا ہے
          path: app/build/outputs/apk/debug/*.apk
          overwrite: true
