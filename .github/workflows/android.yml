name: System Pro Clean-First
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # مرحلہ 1: ریپوزٹری سے رابطہ
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      # مرحلہ 2: مکمل صفائی (صفائی پہلے)
      - name: 2. Deep Cleaning
        run: |
          echo "پرانا ڈیٹا صاف کیا جا رہا ہے..."
          rm -rf app build settings.gradle build.gradle gradlew* gradle
          # نیا ڈھانچہ بنانا
          mkdir -p app/src/main/java/com/systempro
          mkdir -p app/src/main/res/layout

      # مرحلہ 3: انوائرمنٹ سیٹ اپ
      - name: 3. Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # مرحلہ 4: پروسیسنگ (ایپ بنانا)
      - name: 4. Processing Project
        run: |
          echo "include ':app'" > settings.gradle
          printf "apply plugin: 'com.android.application'\nandroid { compileSdk 33; namespace 'com.systempro'; default { applicationId 'com.systempro'; minSdk 21; targetSdk 33 } }" > app/build.gradle
          sudo apt-get update && sudo apt-get install -y gradle
          gradle assembleDebug

      # مرحلہ 5: اے پی کے محفوظ کرنا
      - name: 5. Save APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clean-Build-App
          path: app/build/outputs/apk/debug/*.apk
