name: System Pro Final Fixer

on:
  workflow_dispatch:

jobs:
  repair-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Project Structure
        run: |
          # 1. پہلے سے موجود فولڈرز کو صاف کریں تاکہ کوئی ٹکراؤ نہ ہو
          rm -rf gradle app build.gradle settings.gradle gradlew
          
          # 2. دوبارہ درست فولڈرز بنائیں
          mkdir -p gradle/wrapper
          mkdir -p app/src/main/java/com/system/pro

          # 3. ضروری فائلیں تیار کرنا
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.system.pro'
              compileSdk 33
              defaultConfig {
                  applicationId "com.system.pro"
                  minSdk 21
                  targetSdk 33
              }
          }
          EOF

          # 4. اینڈرائیڈ مینی فیسٹ (آخری فولڈر کے لیے)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro"></application>
          </manifest>
          EOF

          # 5. گریڈل ریپر جنریٹ کرنا
          gradle wrapper --gradle-version 8.0

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Fixed repository structure and added required files" || echo "No changes to commit"
          git push origin main
