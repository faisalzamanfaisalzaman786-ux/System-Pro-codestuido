name: Build Native Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:               # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest          # ورچوئل ماحول: Ubuntu

    steps:
      # 1. کوڈ چیک آؤٹ کریں
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. JDK سیٹ اپ کریں (Android بلڈ کے لیے ضروری)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'   # OpenJDK distribution
          java-version: '17'

      # 3. Gradle Wrapper کو قابلِ اجرا بنائیں
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Android APK بلڈ کریں
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      # 5. تیار کردہ APK کو آرٹیفیکٹ کے طور پر اپ لوڈ کریں
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
