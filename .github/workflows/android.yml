name: System Pro Ultimate Builder
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'App Package Name'
        required: true
        default: 'com.systempro.app'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout (Force Clean)
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: 🧹 Deep Clean Server
        run: |
          # گٹ کی تمام پرانی کنفیگریشنز اور ایکسٹرا ہیڈرز کی صفائی
          git config --global --unset-all core.sshCommand || true
          git config --global --unset-all http.https://github.com/.extraheader || true
          # تمام موجودہ فائلوں کو مٹا کر ایک نیا آغاز کریں
          rm -rf * .gradle .github/workflows/android.yml
          echo "سرور مکمل کلین ہو گیا ہے۔"

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Re-Build Structure
        run: |
          PKG="${{ github.event.inputs.package_name }}"
          PKG_PATH=$(echo $PKG | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          
          # settings.gradle - ریپوزٹریز کو زبردستی مینیج کرنا
          cat <<EOF > settings.gradle
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "SystemProApp"
          include ':app'
          EOF

          # build.gradle (Project Level)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          EOF

          # app/build.gradle (Module Level)
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace '$PKG'
              compileSdk 34
              defaultConfig { 
                  applicationId '$PKG'
                  minSdk 24 
                  targetSdk 34 
                  versionCode 1 
                  versionName '1.0' 
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

      - name: 🔨 Final Compilation (Fixed Version)
        run: |
          # گریڈل ورژن 8.2 استعمال کریں تاکہ 9.3.1 والے ایررز نہ آئیں
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          # کلین بلڈ شروع کریں
          ./gradlew clean assembleDebug --no-daemon --stacktrace

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-APK
          path: app/build/outputs/apk/debug/*.apk
