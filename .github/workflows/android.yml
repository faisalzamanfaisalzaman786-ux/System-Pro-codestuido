name: System Pro Ultimate Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4 # آفیشل ایکشن

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 3. Restore Gradle Wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            echo "Gradlew not found, generating now..."
            gradle wrapper
          fi
          chmod +x gradlew

      - name: 4. Build APK (Debug)
        run: ./gradlew assembleDebug

      - name: 5. Diagnose Failures
        if: failure()
        run: |
          echo "🔍 Checking for Common Errors..."
          # اگر بلڈ فیل ہو تو فائلز کی لسٹ دکھائے گا
          ls -R app/src/main/

      - name: 6. Upload Final APK
        if: success()
        uses: actions/upload-artifact@v4 # حتمی اور مستحکم ورژن
        with:
          name: System-Pro-Release
          path: app/build/outputs/apk/debug/*.apk
