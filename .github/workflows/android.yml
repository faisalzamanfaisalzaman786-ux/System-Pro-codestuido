name: Dynamic Package APK Builder

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      serial:
        description: 'Serial number'
        required: true
        default: '001'
      base_package:
        description: 'Base package name'
        required: true
        default: 'com.systempro.faisalzaman'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # اگر ضروری وسائل موجود نہ ہوں تو ڈیفالٹ بنا دیں
      - name: Ensure resource files exist
        run: |
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi

          if [ ! -f app/src/main/res/values/strings.xml ]; then
            echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/values/strings.xml
            echo '<resources>' >> app/src/main/res/values/strings.xml
            echo '    <string name="app_name">MyApp</string>' >> app/src/main/res/values/strings.xml
            echo '</resources>' >> app/src/main/res/values/strings.xml
          fi

          if [ ! -f app/src/main/res/values/styles.xml ]; then
            echo '<?xml version="1.0" encoding="utf-8"?>' > app/src/main/res/values/styles.xml
            echo '<resources>' >> app/src/main/res/values/styles.xml
            echo '    <style name="AppTheme" parent="android:Theme.DeviceDefault"></style>' >> app/src/main/res/values/styles.xml
            echo '</resources>' >> app/src/main/res/values/styles.xml
          fi

          if [ ! -f app/src/main/res/mipmap-hdpi/ic_launcher.png ]; then
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          fi

      # AndroidManifest.xml میں package name کو input کے مطابق تبدیل کریں
      - name: Update package name in AndroidManifest.xml
        run: |
          sed -i "s/package=\".*\"/package=\"${{ github.event.inputs.base_package }}\"/" app/src/main/AndroidManifest.xml

      # اگر آپ چاہیں تو strings.xml میں app name بھی تبدیل کر سکتے ہیں (مثلاً serial کے ساتھ)
      - name: Update app name (optional)
        run: |
          sed -i "s/<string name=\"app_name\">.*<\/string>/<string name=\"app_name\">App Serial ${{ github.event.inputs.serial }}<\/string>/" app/src/main/res/values/strings.xml

      # build.gradle میں applicationId کو بھی اسی package پر سیٹ کریں (اگر ضرورت ہو)
      - name: Update applicationId in build.gradle
        run: |
          sed -i "s/applicationId \".*\"/applicationId \"${{ github.event.inputs.base_package }}\"/" app/build.gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK with serial in name
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-serial-${{ github.event.inputs.serial }}
          path: app/build/outputs/apk/debug/app-debug.apk
