name: System Pro Final Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Create Project Structure (Fixing Missing Files)
        run: |
          # Create folders
          mkdir -p app/src/main/java/com/systempro/test
          mkdir -p app/src/main/res/layout
          
          # Create settings.gradle
          echo "include ':app'" > settings.gradle
          
          # Create root build.gradle
          echo "buildscript { repositories { google(); mavenCentral() } }" > build.gradle
          
          # Create app/build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.systempro.test'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.systempro.test'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          EOF

      - name: 4. Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: 5. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-V5-APK
          path: app/build/outputs/apk/debug/*.apk
