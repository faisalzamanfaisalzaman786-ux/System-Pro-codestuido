name: System Pro Final Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. ریپوزٹری کا کوڈ حاصل کرنا
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. جاوا سیٹ اپ کرنا
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. گریڈل سیٹ اپ (کیشے کو بند کر دیا گیا ہے تاکہ سرور ایرر نہ آئے)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      # 4. فائل کو چلانے کی اجازت دینا
      - name: Grant Execute Permission
        run: chmod +x gradlew

      # 5. ایپ کو کلین کر کے دوبارہ بلڈ کرنا
      - name: Build Debug APK
        run: ./gradlew clean assembleDebug --stacktrace
        env:
          _JAVA_OPTIONS: "-Xmx2048m"

      # 6. تیار شدہ اے پی کے اپلوڈ کرنا
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-App
          path: app/build/outputs/apk/debug/app-debug.apk
