name: System Pro Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5' # مستقل ورژن جو فیل نہیں ہوگا

      - name: 4. Ensure Wrapper Exists
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew

      - name: 5. Build APK (Debug)
        run: ./gradlew assembleDebug

      - name: 6. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-V5-APK
          path: app/build/outputs/apk/debug/*.apk
      - name: 6. Upload Final APK
        if: success()
        uses: actions/upload-artifact@v4 # حتمی اور مستحکم ورژن
        with:
          name: System-Pro-Release
          path: app/build/outputs/apk/debug/*.apk
