name: System Pro Compiler

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # دستی طور پر بلڈ شروع کرنے کے لیے

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          # یہاں ہم cache کو ری فریش کرنے کے لیے ایک نئی کی (key) استعمال کر رہے ہیں
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # سب سے اہم مرحلہ: پرانا ڈیٹا کلیئر کرنا
      - name: Clean and Build Release APK
        run: ./gradlew clean assembleRelease

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-App-Updated
          path: app/build/outputs/apk/release/*.apk
          # اگر پہلے سے کوئی فائل ہے تو اسے اوور رائٹ کریں
          overwrite: true
          # آرٹیفیکٹ کو صرف 1 دن کے لیے رکھیں تاکہ پرانا ڈیٹا جمع نہ ہو
          retention-days: 1
