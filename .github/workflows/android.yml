name: System Pro Multi-Build

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'ایپ کا نام لکھیں (مثال: My New App)'
        required: true
        default: 'System Pro'
      package_name:
        description: 'یونیک پیکیج نیم (مثال: com.faisal.app1)'
        required: true
        default: 'com.systempro.app'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Apply Custom Names
        run: |
          NEW_PKG="${{ github.event.inputs.package_name }}"
          APP_NAME="${{ github.event.inputs.app_name }}"
          OLD_PKG="com.systempro.app" # یہ وہ نام ہے جو آپ کے سورس کوڈ میں پہلے سے ہے
          
          echo "Setting App Name to: $APP_NAME"
          echo "Setting Package Name to: $NEW_PKG"

          # 1. ایپ کا نام تبدیل کرنا (strings.xml میں)
          sed -i "s/System Pro/$APP_NAME/g" app/src/main/res/values/strings.xml || true

          # 2. پیکیج نیم تمام فائلوں میں بدلنا
          grep -rl "$OLD_PKG" . --exclude-dir=.git | xargs sed -i "s/$OLD_PKG/$NEW_PKG/g"

          # 3. فولڈر سٹرکچر درست کرنا (جاوا فائلوں کے لیے)
          OLD_PATH=${OLD_PKG//./\/}
          NEW_PATH=${NEW_PKG//./\/}
          mkdir -p "app/src/main/java/$NEW_PATH"
          if [ -d "app/src/main/java/$OLD_PATH" ]; then
              cp -r app/src/main/java/$OLD_PATH/* app/src/main/java/$NEW_PATH/
              # پرانے فولڈر ہٹانا (احتیاط کے ساتھ)
              rm -rf "app/src/main/java/${OLD_PKG%%.*}" 
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: app/build/outputs/apk/debug/app-debug.apk
