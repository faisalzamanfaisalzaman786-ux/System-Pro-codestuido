name: Dynamic Android Build System

on:
  push:
    branches: [ "main" ]  # فائل سیو کرتے ہی بلڈ چلے گا
  workflow_dispatch:      # یہ لائن مینوئل "Run workflow" کا بٹن لائے گی
  repository_dispatch:
    types: [build_new_apk] # یہ آپ کی ایپ سے سگنل وصول کرے گا

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Resulting APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Master-Build
          path: app/build/outputs/apk/debug/app-debug.apk
