name: System Pro Multi-Build Engine

on:
  workflow_dispatch:
    inputs:
      # یہ وہ ان پٹس ہیں جو آپ کی ایپ (Logs کے مطابق) بھیج رہی ہے
      serial:
        description: 'Build Serial Number'
        required: false
        default: '1'
      base_package:
        description: 'New Package Name'
        required: true
        default: 'com.systempro.app'
      app_name:
        description: 'Application Name'
        required: false
        default: 'System Pro'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Auto Package & Name Changer
        run: |
          # ان پٹس حاصل کرنا
          NEW_PKG="${{ github.event.inputs.base_package }}"
          APP_NAME="${{ github.event.inputs.app_name }}"
          OLD_PKG="com.systempro.app" # یہاں وہ پیکیج لکھیں جو سورس کوڈ میں پہلے سے ہے

          echo "Updating App to: $APP_NAME with Package: $NEW_PKG"

          # 1. ایپ کا نام بدلنا (strings.xml)
          if [ -f app/src/main/res/values/strings.xml ]; then
            sed -i "s/System Pro/$APP_NAME/g" app/src/main/res/values/strings.xml
          fi

          # 2. تمام فائلوں میں پیکیج نیم ری پلیس کرنا
          grep -rl "$OLD_PKG" . --exclude-dir=.git | xargs sed -i "s/$OLD_PKG/$NEW_PKG/g"

          # 3. جاوا فولڈر سٹرکچر کو نئے پیکیج کے مطابق منتقل کرنا
          OLD_PATH=${OLD_PKG//./\/}
          NEW_PATH=${NEW_PKG//./\/}
          
          mkdir -p "app/src/main/java/$NEW_PATH"
          if [ -d "app/src/main/java/$OLD_PATH" ]; then
              cp -r app/src/main/java/$OLD_PATH/* app/src/main/java/$NEW_PATH/
              # پرانے فولڈرز کی صفائی
              rm -rf "app/src/main/java/${OLD_PKG%%.*}"
          fi

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # آرٹ فیکٹ والا فیچر (تاکہ آپ اے پی کے ڈاؤن لوڈ کر سکیں)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ github.event.inputs.base_package }}-${{ github.event.inputs.serial }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
