name: System Pro Official Build
on:
  workflow_dispatch: # مینوئلی رن کرنے کے لیے
  repository_dispatch:
    types: [build-app]

jobs:
  assemble-official-apk:
    name: "System Pro: Official APK Generation"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate Project Structure
        run: |
          echo "### 🛠️ System Pro: Pre-Build Validation" >> $GITHUB_STEP_SUMMARY
          if [ -f "gradlew" ]; then
            echo "| ⚙️ Gradle Wrapper | ✅ Found |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ⚙️ Gradle Wrapper | ❌ Missing (Generating...) |" >> $GITHUB_STEP_SUMMARY
            gradle wrapper --gradle-version 9.4.1
          fi

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Inject Payload Data (Optional Overwrite)
        run: |
          # اگر پے لوڈ کے ذریعے ڈیٹا آ رہا ہے تو یہ اسے فزیکل فائلوں پر اپلائی کرے گا
          if [ -n "${{ github.event.client_payload.colors_b64 }}" ]; then
            echo "${{ github.event.client_payload.colors_b64 }}" | base64 -d > app/src/main/res/values/colors.xml
          fi
          if [ -n "${{ github.event.client_payload.icon_data_b64 }}" ]; then
            echo "${{ github.event.client_payload.icon_data_b64 }}" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          fi

      - name: Build Official Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload System Pro Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name || 'System-Pro-Official-Build' }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 5

      - name: Build Success Summary
        if: success()
        run: |
          echo "## ✅ Build Successful!" >> $GITHUB_STEP_SUMMARY
          echo "System Pro Official APK has been generated successfully with Gradle 9.4.1." >> $GITHUB_STEP_SUMMARY
