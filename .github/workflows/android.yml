name: System Pro Build System

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Dynamic Package Name
        run: |
          # یونیک نمبر کے لیے ٹائم اسٹیمپ
          TIMESTAMP=$(date +%Y%m%d%H%M)
          NEW_PACKAGE="com.systempro.faisal.v$TIMESTAMP"
          echo "NEW_PACKAGE_NAME=$NEW_PACKAGE" >> $GITHUB_ENV
          
          # build.gradle میں تبدیلی (یہاں ہم نے ریجیکس کو بہتر کیا ہے)
          sed -i "s/namespace .*/namespace '$NEW_PACKAGE'/g" app/build.gradle
          sed -i "s/applicationId .*/applicationId '$NEW_PACKAGE'/g" app/build.gradle
          
          # تمام جاوا فائلز میں پیکیج نیم اپ ڈیٹ کرنا (تاکہ ایرر نہ آئے)
          find app/src/main/java -name "*.java" -exec sed -i "s/package .*/package $NEW_PACKAGE;/g" {} +

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-v${{ env.NEW_PACKAGE_NAME }}
          path: app/build/outputs/apk/debug/app-debug.apk
