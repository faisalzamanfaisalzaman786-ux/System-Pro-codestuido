on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # یہ حصہ لازمی ہے تاکہ ایپ اسے چلا سکے
    inputs:
      package_name:
        description: 'App Package Name'
        required: false
        default: 'com.systempro.app'
      app_icon_url:
        description: 'Icon URL'
        required: false
        default: ''
