name: System Pro Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: 4. Fix Project Structure
        run: |
          # اگر گریڈل ریپر نہیں ہے تو اسے بنائیں
          gradle wrapper
          chmod +x gradlew
          
          # اگر ایپ کا فولڈر نہیں ہے تو بنیادی فائلیں بنائیں
          if [ ! -d "app" ]; then
            mkdir -p app/src/main/java/com/systempro/test
            mkdir -p app/src/main/res/layout
          fi

      - name: 5. Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 6. Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-V5-Final
          path: "**/*.apk"
