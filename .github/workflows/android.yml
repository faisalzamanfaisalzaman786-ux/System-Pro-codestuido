s/gradle-8.4-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF

      - name: ⚙️ CREATE GRADLE PROPERTIES
        run: |
          cat > gradle.properties << 'EOF'
org.gradle.jvmargs=-Xmx2048m
android.useAndroidX=true
android.enableJetifier=true
EOF

      - name: 🏗️ SETUP GRADLE WRAPPER
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew

      - name: 🔨 BUILD APK
        run: |
          ./gradlew clean
          ./gradlew assembleDebug

      - name: 📤 UPLOAD APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-${{ steps.trigger.outputs.letters }}${{ steps.trigger.outputs.num1 }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: ✅ SUCCESS MESSAGE
        if: success()
        run: |
          echo "════════════════════════════════════════════"
          echo "✅ BUILD SUCCESSFUL"
          echo "════════════════════════════════════════════"
          echo "📦 Package: ${{ steps.trigger.outputs.final_pkg }}"
          echo "📱 App Name: ${{ steps.trigger.outputs.final_app }}"
          echo "📥 Download from Actions tab"
          echo "════════════════════════════════════════════"
