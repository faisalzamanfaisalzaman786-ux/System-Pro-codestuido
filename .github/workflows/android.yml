name: System Pro Multi-Build Engine

on:
  push:
    paths:
      - '.github/workflows/android.yml' # فائل پش ہوتے ہی بلڈ شروع ہوگی
  workflow_dispatch: # مینوئل بٹن بھی موجود رہے گا

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PACKAGE_NAME: "com.systempro.faisal" # ایپ اسے آٹو اپ ڈیٹ کرے گی

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Auto Package & Name Changer
        run: |
          NEW_PKG="${{ env.PACKAGE_NAME }}"
          echo "Updating App to: System Pro with Package: $NEW_PKG"
          
          # تمام فائلز میں پیکج نیم بدلنا
          find . -type f \( -name "*.java" -o -name "*.xml" -o -name "*.gradle" \) -print0 | xargs -0 sed -i "s/com.old.package/$NEW_PKG/g"

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: SystemPro-APK
          path: app/build/outputs/apk/debug/*.apk
