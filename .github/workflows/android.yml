name: System Pro Net Fix

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Step 1 - Reconstruct All Files
      run: |
        # فولڈرز کی تیاری
        mkdir -p app/src/main/java/com/systempro/master
        mkdir -p app/src/main/res/layout

        # 1. settings.gradle
        cat <<EOF > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "System-Pro-Master"
        include ':app'
        EOF

        # 2. build.gradle (Root)
        cat <<EOF > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
        }
        EOF

        # 3. app/build.gradle (Modern Format)
        cat <<EOF > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.systempro.master'
            compileSdk 34
            defaultConfig {
                applicationId "com.systempro.master"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        EOF

        # 4. Manifest & Java
        cat <<EOF > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:label="System Pro Net">
                <activity android:name="com.systempro.master.MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        cat <<EOF > app/src/main/java/com/systempro/master/MainActivity.java
        package com.systempro.master;
        import android.app.Activity;
        import android.os.Bundle;
        import android.widget.TextView;
        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                TextView tv = new TextView(this);
                tv.setText("Net Build Fixed: Version 8.1.1 Forced");
                setContentView(tv);
            }
        }
        EOF

        echo "android.suppressUnsupportedCompileSdk=34" > gradle.properties

    - name: Step 2 - Force Stable Gradle 8.1.1
      # یہاں ہم 9.4 کو نظر انداز کر کے 8.1.1 ڈاؤن لوڈ کر رہے ہیں
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: 8.1.1

    - name: Step 3 - Final Build
      run: gradle assembleDebug --stacktrace
