      - name: Generate Modern Gradle Files
        run: |
          # settings.gradle
          echo "rootProject.name = 'SystemProApp'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          # build.gradle (Project Level) - Gradle 8.2 استعمال کریں
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.1' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # app/build.gradle
          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace '${{ env.UNIQUE_PKG }}'
              compileSdk 34
              defaultConfig {
                  applicationId "${{ env.UNIQUE_PKG }}"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: Build APK
        # یہاں مخصوص Gradle ورژن استعمال کرنے کے لیے 'gradle' کی جگہ './gradlew' یا ورژن لاک کریں
        run: |
          # ہم خودکار طور پر ریپرز (Wrappers) سیٹ کریں گے تاکہ 9.4 ورژن استعمال نہ ہو
          gradle wrapper --gradle-version 8.2
          ./gradlew assembleRelease
