- name: Create Android Project with User Code
  run: |
    PACKAGE_NAME="${{ steps.decode.outputs.package_name }}"
    APP_NAME="${{ steps.decode.outputs.app_name }}"
    PACKAGE_PATH=$(echo $PACKAGE_NAME | tr '.' '/')

    rm -rf app/src/main/java/*

    mkdir -p app/src/main/java/$PACKAGE_PATH
    mkdir -p app/src/main/res/layout
    mkdir -p app/src/main/res/values
    mkdir -p app/src/main/res/drawable

    # --- Java: ensure package name is correct ---
    cp /tmp/MainActivity.java app/src/main/java/$PACKAGE_PATH/MainActivity.java
    sed -i "s/^package .*;/package $PACKAGE_NAME;/" app/src/main/java/$PACKAGE_PATH/MainActivity.java

    # --- Layout: clean XML before copying ---
    # Remove BOM and leading/trailing whitespace
    if [ -f /tmp/activity_main.xml ]; then
      # Remove UTF-8 BOM if present
      sed -i '1s/^\xEF\xBB\xBF//' /tmp/activity_main.xml
      # Remove leading whitespace
      sed -i '1s/^[[:space:]]*//' /tmp/activity_main.xml
      # Ensure file starts with '<' (if not, it's invalid)
      if ! head -c1 /tmp/activity_main.xml | grep -q '<'; then
        echo "Error: activity_main.xml does not start with '<'" > error_msg.txt
        exit 1
      fi
      cp /tmp/activity_main.xml app/src/main/res/layout/activity_main.xml
    else
      echo "Error: layout file missing" > error_msg.txt
      exit 1
    fi

    # --- Manifest: clean and copy ---
    if [ -f /tmp/AndroidManifest.xml ]; then
      sed -i '1s/^\xEF\xBB\xBF//' /tmp/AndroidManifest.xml
      cp /tmp/AndroidManifest.xml app/src/main/AndroidManifest.xml
      sed -i "s/package=\"[^\"]*\"/package=\"$PACKAGE_NAME\"/" app/src/main/AndroidManifest.xml
      sed -i "s/android:label=\"[^\"]*\"/android:label=\"$APP_NAME\"/" app/src/main/AndroidManifest.xml
    else
      echo "Error: manifest file missing" > error_msg.txt
      exit 1
    fi

    # --- Icon handling (safe) ---
    if [ -f /tmp/icon.png ]; then
      cp /tmp/icon.png app/src/main/res/drawable/ic_launcher.png
    else
      # Create default vector icon using printf (no here-doc)
      printf '<?xml version="1.0" encoding="utf-8"?>\n' > app/src/main/res/drawable/ic_launcher.xml
      printf '<vector xmlns:android="http://schemas.android.com/apk/res/android"\n' >> app/src/main/res/drawable/ic_launcher.xml
      printf '    android:width="24dp"\n' >> app/src/main/res/drawable/ic_launcher.xml
      printf '    android:height="24dp"\n' >> app/src/main/res/drawable/ic_launcher.xml
      printf '    android:viewportWidth="24"\n' >> app/src/main/res/drawable/ic_launcher.xml
      printf '    android:viewportHeight="24">\n' >> app/src/main/res/drawable/ic_launcher.xml
      printf '    <path\n' >> app/src/main/res/drawable/ic_launcher.xml
      printf '        android:fillColor="#FF6200EE"\n' >> app/src/main/res/drawable/ic_launcher.xml
      printf '        android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10,-4.48 10,-10S17.52,2 12,2zM12,5c1.66,0 3,1.34 3,3s-1.34,3 -3,3 -3,-1.34 -3,-3 1.34,-3 3,-3zM12,19.2c-2.5,0 -4.71,-1.28 -6,-3.22 0.03,-1.99 4,-3.08 6,-3.08 1.99,0 5.97,1.09 6,3.08 -1.29,1.94 -3.5,3.22 -6,3.22z"/>\n' >> app/src/main/res/drawable/ic_launcher.xml
      printf '</vector>\n' >> app/src/main/res/drawable/ic_launcher.xml
    fi
