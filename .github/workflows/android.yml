name: Android CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [remote-build-trigger]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Optimize for Redmi Note 14 (SDK 34)
      run: |
        PKG="com.example.cameraapp"
        
        # 1. جدید اینڈرائیڈ فونز کے لیے SDK وارننگ ختم کرنا
        echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
        # بلڈ کی رفتار بڑھانے کے لیے میموری سیٹنگز
        echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" >> gradle.properties
        
        # 2. Package Name اور Authorities درست کرنا (تاکہ انسٹالیشن میں مسئلہ نہ ہو)
        find . -name "AndroidManifest.xml" -type f -exec sed -i "s/package=\".*\"/package=\"$PKG\"/" {} +
        
        if [ -f app/build.gradle ]; then
          sed -i "s/applicationId \".*\"/applicationId \"$PKG\"/" app/build.gradle
          # جدید برانڈز کے فونز کے لیے منیمم سپورٹ سیٹ کرنا
          sed -i "s/minSdk .*/minSdk 24/" app/build.gradle
          sed -i "s/targetSdk .*/targetSdk 34/" app/build.gradle
        fi

        # 3. جاوا فائلز کی درستگی
        find . -name "*.java" -type f -exec sed -i "s/^package .*;/package $PKG;/" {} +

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK for Redmi 14
      uses: actions/upload-artifact@v4
      with:
        name: Redmi-Note-14-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
