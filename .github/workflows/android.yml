name: System Pro Complete APK Builder

on:
  repository_dispatch:
    types: [build_apk]
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package Name (e.g., com.example.app)'
        required: true
        default: 'com.example.app'
      app_name:
        description: 'App Name'
        required: true
        default: 'MyDynamicApp'
      java_code:
        description: 'Base64 encoded Java code'
        required: true
      layout_code:
        description: 'Base64 encoded Layout code'
        required: true

permissions:
  contents: write
  actions: write
  statuses: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          mkdir -p $ANDROID_SDK_ROOT

          cd $ANDROID_SDK_ROOT
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip

          mkdir -p cmdline-tools
          mv cmdline-tools_temp/* cmdline-tools/ 2>/dev/null || true
          rm -rf cmdline-tools_temp

          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/bin" >> $GITHUB_PATH

      - name: Install Android SDK Components
        run: |
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/bin
          yes | $ANDROID_HOME/cmdline-tools/bin/sdkmanager "cmdline-tools;latest" --sdk_root=$ANDROID_HOME
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin

      - name: Accept Android Licenses
        run: |
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses || true

      - name: Install Platform Tools
        run: |
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Decode and Clean Package Info
        id: decode
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            PACKAGE_NAME='${{ github.event.client_payload.package_name }}'
            APP_NAME='${{ github.event.client_payload.app_name }}'
            JAVA_BASE64='${{ github.event.client_payload.java_code }}'
            LAYOUT_BASE64='${{ github.event.client_payload.layout_code }}'
          else
            PACKAGE_NAME='${{ github.event.inputs.package_name }}'
            APP_NAME='${{ github.event.inputs.app_name }}'
            JAVA_BASE64='${{ github.event.inputs.java_code }}'
            LAYOUT_BASE64='${{ github.event.inputs.layout_code }}'
          fi

          # Replace hyphens with underscores (valid package name)
          PACKAGE_NAME_CLEAN=$(echo "$PACKAGE_NAME" | tr '-' '_')
          echo "package_name=$PACKAGE_NAME_CLEAN" >> $GITHUB_OUTPUT
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

          # Decode Java and Layout if provided
          if [ -n "$JAVA_BASE64" ]; then
            echo "$JAVA_BASE64" | base64 -d > MainActivity.java 2>/dev/null || true
          fi
          if [ -n "$LAYOUT_BASE64" ]; then
            echo "$LAYOUT_BASE64" | base64 -d > activity_main.xml 2>/dev/null || true
          fi

      - name: Create Complete Android Project
        run: |
          PACKAGE_NAME="${{ steps.decode.outputs.package_name }}"
          APP_NAME="${{ steps.decode.outputs.app_name }}"
          PACKAGE_PATH=$(echo $PACKAGE_NAME | tr '.' '/')

          mkdir -p app/src/main/java/$PACKAGE_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # Use decoded files if they exist and are valid, otherwise use default working ones
          if [ -s MainActivity.java ] && grep -q "package" MainActivity.java; then
            mv MainActivity.java app/src/main/java/$PACKAGE_PATH/
          else
            cat > app/src/main/java/$PACKAGE_PATH/MainActivity.java << JAVA_EOF
          package $PACKAGE_NAME;

          import android.os.Bundle;
          import android.widget.TextView;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
                  TextView textView = findViewById(R.id.textView);
                  textView.setText("Hello from GitHub Actions!");
              }
          }
          JAVA_EOF
          fi

          if [ -s activity_main.xml ] && grep -q "LinearLayout" activity_main.xml; then
            mv activity_main.xml app/src/main/res/layout/
          else
            cat > app/src/main/res/layout/activity_main.xml << LAYOUT_EOF
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:gravity="center"
              android:padding="20dp">
              <TextView
                  android:id="@+id/textView"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Hello World!"
                  android:textSize="24sp"/>
          </LinearLayout>
          LAYOUT_EOF
          fi

      - name: Create AndroidManifest.xml
        run: |
          PACKAGE_NAME="${{ steps.decode.outputs.package_name }}"
          APP_NAME="${{ steps.decode.outputs.app_name }}"

          cat > app/src/main/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher"
                  android:label="$APP_NAME"
                  android:theme="@style/AppTheme"
                  android:supportsRtl="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create Gradle Build Files
        run: |
          # settings.gradle
          cat > settings.gradle << EOF
          rootProject.name = "${{ steps.decode.outputs.app_name }}"
          include ':app'
          EOF

          # Project build.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          EOF

          # App build.gradle (with complete defaultConfig)
          cat > app/build.gradle << EOF
          apply plugin: 'com.android.application'

          android {
              namespace '${{ steps.decode.outputs.package_name }}'
              compileSdk 34

              defaultConfig {
                  applicationId "${{ steps.decode.outputs.package_name }}"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      debuggable true
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: Create Resource Files
        run: |
          # styles.xml
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">#6200EE</item>
                  <item name="colorPrimaryDark">#3700B3</item>
                  <item name="colorAccent">#03DAC5</item>
              </style>
          </resources>
          EOF

          # strings.xml
          cat > app/src/main/res/values/strings.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">${{ steps.decode.outputs.app_name }}</string>
          </resources>
          EOF

          # vector drawable icon
          cat > app/src/main/res/drawable/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="#FF6200EE"
                  android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10,-4.48 10,-10S17.52,2 12,2zM12,5c1.66,0 3,1.34 3,3s-1.34,3 -3,3 -3,-1.34 -3,-3 1.34,-3 3,-3zM12,19.2c-2.5,0 -4.71,-1.28 -6,-3.22 0.03,-1.99 4,-3.08 6,-3.08 1.99,0 5.97,1.09 6,3.08 -1.29,1.94 -3.5,3.22 -6,3.22z"/>
          </vector>
          EOF

      - name: Create gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          android.suppressUnsupportedCompileSdk=34
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
          EOF

      - name: Install Gradle
        run: |
          GRADLE_VERSION=8.1.1
          wget -q https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
          unzip -q gradle-${GRADLE_VERSION}-bin.zip
          sudo mv gradle-${GRADLE_VERSION} /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH
          export PATH=$PATH:/opt/gradle/bin
          gradle --version

      - name: Build APK
        run: |
          gradle clean assembleDebug --stacktrace --no-daemon

      - name: Locate APK
        id: find-apk
        run: |
          APK_PATH=$(find app/build/outputs -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found!"
            exit 1
          fi
          echo "APK found at: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.decode.outputs.app_name }}-debug
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 7

      - name: Send Repository Dispatch (Completion Signal)
        if: always()
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          STATUS="${{ job.status }}"
          APP_NAME="${{ steps.decode.outputs.app_name }}"
          PACKAGE_NAME="${{ steps.decode.outputs.package_name }}"

          if [ -n "$PAT_TOKEN" ]; then
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: Bearer $PAT_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/dispatches \
              -d '{
                "event_type": "build_complete",
                "client_payload": {
                  "status": "'"$STATUS"'",
                  "app_name": "'"$APP_NAME"'",
                  "package_name": "'"$PACKAGE_NAME"'",
                  "build_time": "'$(date)'"
                }
              }' || echo "Failed to send completion signal"
          fi
