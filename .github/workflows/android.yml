name: System Pro Universal Master Setup
on:
  workflow_dispatch:

jobs:
  build-master-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Official Directory Structure
        run: |
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/drawable
          mkdir -p gradle/wrapper

      - name: Generate Universal Manifest (Permissions & Queries)
        run: |
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="System Pro"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.SystemPro"
                  android:usesCleartextTraffic="true"
                  tools:targetApi="34">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Generate Universal Colors & Styles (Neon/Glass Design)
        run: |
          # Colors for every UI type
          cat <<EOF > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#00FFCC</color> <color name="colorPrimaryDark">#0A1022</color> <color name="colorAccent">#A855F7</color> <color name="glass_white">#4DFFFFFF</color> <color name="neon_green">#39FF14</color>
              <color name="error_red">#FF3131</color>
              <color name="white">#FFFFFF</color>
              <color name="black">#000000</color>
          </resources>
          EOF

          # Universal Theme
          cat <<EOF > app/src/main/res/values/themes.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.SystemPro" parent="Theme.AppCompat.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
                  <item name="android:windowBackground">@color/colorPrimaryDark</item>
                  <item name="android:statusBarColor">@color/colorPrimaryDark</item>
              </style>
          </resources>
          EOF

      - name: Setup Official Build Logic (Gradle 9.4.1)
        run: |
          # Root Build File
          echo "plugins { id 'com.android.application' version '8.4.0' apply false }" > build.gradle
          
          # Settings with Official Repos
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { 
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() } 
          }
          rootProject.name = "System Pro"
          include ':app'
          EOF

          # Wrapper 9.4.1
          gradle wrapper --gradle-version 9.4.1 --distribution-type bin

      - name: Commit Master Structure
        run: |
          git config --global user.name "System Pro Official"
          git config --global user.email "build@systempro.ai"
          git add .
          git commit -m "MASTER PUSH: Full Permissions, Universal Colors, and Official Gradle 9.4.1 Structure"
          git push
