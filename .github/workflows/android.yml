name: System Pro Multi-Build Engine

on:
  push:
    paths:
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PACKAGE_NAME: "com.systempro.faisal" # ایپ اسے بدل دے گی

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Robust Package Changer
        run: |
          NEW_PKG=${{ env.PACKAGE_NAME }}
          # پرانا پیکج نیم یہاں سے نکالیں (مان لیں کہ پرانا com.example.app تھا)
          OLD_PKG="com.example.app" 
          
          echo "Updating Package to: $NEW_PKG"

          # 1. فائلز کے اندر پیکج نیم بدلنا
          find . -type f \( -name "*.java" -o -name "*.xml" -o -name "*.gradle" \) -print0 | xargs -0 sed -i "s/$OLD_PKG/$NEW_PKG/g"

          # 2. فولڈر اسٹرکچر درست کرنا
          NEW_PATH=$(echo $NEW_PKG | tr '.' '/')
          OLD_PATH=$(echo $OLD_PKG | tr '.' '/')
          
          mkdir -p "app/src/main/java/$NEW_PATH"
          
          # اگر پرانا فولڈر موجود ہے تو اس کا مواد نئے میں منتقل کریں
          if [ -d "app/src/main/java/$OLD_PATH" ]; then
            cp -r app/src/main/java/$OLD_PATH/* app/src/main/java/$NEW_PATH/
          fi

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: SystemPro-Release
          path: app/build/outputs/apk/debug/*.apk
