name: System-Pro-V77-Auto-Pilot-Final

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  ai_takeover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_AI_TOKEN }} # یہاں آپ کا دیا ہوا ٹوکن استعمال ہو رہا ہے

      - name: 🧠 Connect AI Brain
        run: |
          git config --global user.name "Muzammil-AI"
          git config --global user.email "faisal.ai@systempro.com"
          echo "Connection Established with MY_AI_TOKEN"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🚀 Auto-Repair & Build
        shell: python
        run: |
          import os
          # یہ حصہ اب خود بخود فائلیں درست کرے گا
          with open("settings.gradle", "w") as f:
              f.write("rootProject.name='System-Pro-codestuido'\ninclude ':app'")
          print("Files repaired by AI Engine")

      - name: 🛠️ Build APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: 💾 Deliver Success APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Success-V77
          path: app/build/outputs/apk/debug/*.apk
