name: System Pro Official Build
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Ultimate Deep Clean
        run: |
          # ہر قسم کی پرانی کنفیگریشن اور فائلوں کا خاتمہ
          rm -rf .gradle gradle build.gradle settings.gradle gradlew gradlew.bat app src
          # گریڈل کے عارضی ہوم فولڈر کو صاف کرنا تاکہ پرانا ڈیٹا اثر نہ کرے
          rm -rf ~/.gradle/caches/
          
          mkdir -p gradle/wrapper app/src/main/java/com/system/pro app/src/main/res/values app/src/main/res/layout

      - name: Generate Official Locked Files
        run: |
          # 1. settings.gradle
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { 
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() } 
          }
          rootProject.name = 'System-Pro'
          include ':app'" > settings.gradle

          # 2. build.gradle (Root) - ورژن 8.4.0 پر لاک
          echo "plugins { id 'com.android.application' version '8.4.0' apply false }" > build.gradle

          # 3. app/build.gradle (سب سے زیادہ سٹیبل ورژنز کا انتخاب)
          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.system.pro'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes { release { minifyEnabled false } }
          }
          dependencies {
              // ان ورژنز میں انٹرنل کنفلکٹ نہیں ہوتا
              implementation 'androidx.appcompat:appcompat:1.6.0'
              implementation 'com.google.android.material:material:1.8.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.3'
          }" > app/build.gradle

          # 4. Clean Manifest
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          # 5. Simple MainActivity
          echo "package com.system.pro;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }" > app/src/main/java/com/system/pro/MainActivity.java

      - name: Build Official Wrapper
        run: |
          gradle wrapper --gradle-version 9.4.1
          chmod +x gradlew

      - name: Force Push Official Structure
        run: |
          git config --global user.name "Faisal Zaman"
          git config --global user.email "faisal@example.com"
          git add -A
          git commit -m "LOCK: Physical cleanup and stable version 9.4.1" || echo "No changes"
          git push

      - name: Execute Build
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V137-Locked
          path: "app/build/outputs/apk/debug/*.apk"
