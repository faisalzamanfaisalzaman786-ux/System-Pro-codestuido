name: Android CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # پیکج نام سیٹ کریں (سیکرٹ سے یا ڈیفالٹ)
      - name: Set package name
        id: set_pkg
        run: |
          if [ -n "${{ secrets.PACKAGE_NAME }}" ]; then
            echo "pkg=${{ secrets.PACKAGE_NAME }}" >> $GITHUB_OUTPUT
          else
            echo "pkg=com.example.cameraapp" >> $GITHUB_OUTPUT
          fi

      # ڈیبگ: پوری فائل سٹرکچر دکھائیں (تاکہ بعد میں چیک کر سکیں)
      - name: Show file tree
        run: find . -type f -not -path "./.git/*" | sort

      # تمام متعلقہ فائلوں میں پیکج نام تبدیل کریں
      - name: Update package name in all files
        run: |
          PKG="${{ steps.set_pkg.outputs.pkg }}"
          echo "Updating to package name: $PKG"

          # 1. AndroidManifest.xml (کسی بھی جگہ)
          find . -name "AndroidManifest.xml" -type f | while read manifest; do
            echo "Updating $manifest"
            sed -i "s/package=\".*\"/package=\"$PKG\"/" "$manifest"
            sed -i "s/authorities=\".*\.fileprovider\"/authorities=\"$PKG.fileprovider\"/" "$manifest"
          done

          # 2. build.gradle (کسی بھی جگہ، لیکن صرف app/ والے یا روٹ میں)
          find . -name "build.gradle" -type f | while read gradle; do
            if grep -q "applicationId" "$gradle"; then
              echo "Updating $gradle"
              sed -i "s/applicationId \".*\"/applicationId \"$PKG\"/" "$gradle"
            fi
          done

          # 3. تمام .java فائلوں میں پیکیج لائن تبدیل کریں
          find . -name "*.java" -type f | while read java; do
            if grep -q "^package .*;" "$java"; then
              echo "Updating $java"
              sed -i "s/^package .*;/package $PKG;/" "$java"
            fi
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Run Tests
        run: ./gradlew test

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Decode Keystore (optional)
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          fi

      - name: Build Release APK (optional)
        if: github.ref == 'refs/heads/main'
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK (optional)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
