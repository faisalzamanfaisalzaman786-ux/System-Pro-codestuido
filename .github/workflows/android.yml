name: System Pro Ultimate Build

on:
  workflow_dispatch: # آپ کے ویب انٹرفیس سے ٹرگر کرنے کے لیے
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. ریپوزٹری کا کوڈ چیک آؤٹ کرنا
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. جاوا ورژن 17 سیٹ اپ کرنا (Android 34+ کے لیے ضروری ہے)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. گریڈل کیشے (Cache) کو صاف کرنا تاکہ پرانا ڈیٹا ایرر نہ دے
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. فائل پرمیشنز درست کرنا
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 5. ایپ کو کمپائل کرنا (زیادہ میموری کے ساتھ تاکہ بلڈ فیل نہ ہو)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --info
        env:
          _JAVA_OPTIONS: "-Xmx2048m"

      # 6. تیار شدہ APK کو ڈاؤن لوڈ کے لیے اپلوڈ کرنا
      - name: Upload System Pro APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V1-Build
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
