name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Find and build project
        run: |
          # This command searches for the gradlew file anywhere in your repo
          GRADLEW_PATH=$(find . -name gradlew | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: gradlew file not found in the repository!"
            exit 1
          fi
          
          PROJECT_DIR=$(dirname "$GRADLEW_PATH")
          echo "Found gradlew at: $GRADLEW_PATH"
          echo "Project directory is: $PROJECT_DIR"
          
          # Grant permissions and build
          chmod +x "$GRADLEW_PATH"
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug

      - name: Upload APK (Debug)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          # This will find any APK generated in your build folders
          path: "**/build/outputs/apk/debug/*.apk"
