name: System Pro Advance Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # مینوئل رن کرنے کے لیے

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # تمام ہسٹری حاصل کرنے کے لیے تاکہ فائلیں تازہ ترین ہوں

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Auto Sequence & Package Injector (1 to 1 Crore)
        run: |
          # گٹ ہب کا رن نمبر حاصل کریں (یہ ہر دفعہ بڑھے گا)
          RUN_COUNT=${{ github.run_number }}
          NEW_PKG="com.systempro.faisal.v${RUN_COUNT}"
          
          echo "Setting up Build #${RUN_COUNT}"
          echo "New Package ID: ${NEW_PKG}"

          # 1. Build.gradle میں ایپلیکیشن آئی ڈی اور ورژن کوڈ بدلیں
          sed -i "s/applicationId \".*\"/applicationId \"$NEW_PKG\"/" app/build.gradle
          sed -i "s/versionCode .*/versionCode $RUN_COUNT/" app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"1.${RUN_COUNT}\"/" app/build.gradle

          # 2. Java فائل کے اندر پیکیج نیم کو اپ ڈیٹ کریں تاکہ کوڈ کنفلکٹ نہ ہو
          # یہ لائن آپ کے اپ لوڈ کیے گئے تازہ ترین کوڈ میں پیکیج نیم درست کرے گی
          sed -i "s/package .*;/package $NEW_PKG;/" app/src/main/java/com/systempro/faisal/MainActivity.java

          # 3. AndroidManifest.xml میں پیکیج کی مطابقت چیک کریں
          sed -i "s/package=\".*\"/package=\"$NEW_PKG\"/" app/src/main/AndroidManifest.xml

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Build with Gradle (Clean Build to avoid Default files)
        run: ./gradlew clean assembleDebug --stacktrace
        # 'clean' کمانڈ اس بات کو یقینی بناتی ہے کہ پرانی ڈیفالٹ فائلیں ڈیلیٹ ہو جائیں اور صرف نیا کوڈ استعمال ہو

      - name: Rename APK with Sequence
        run: |
          RUN_COUNT=${{ github.run_number }}
          mv app/build/outputs/apk/debug/app-debug.apk System-Pro-V${RUN_COUNT}.apk

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-App-V${{ github.run_number }}
          path: System-Pro-V${{ github.run_number }}.apk
