name: System Pro Master Deployment

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Fix Repositories & Build IDE
        run: |
          rm -rf ./*
          mkdir -p app/src/main/java/com/systempro/master
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 1. Corrected Settings (Adding Plugin Repositories)
          cat <<EOF > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "System Pro Master"
          include ':app'
          EOF

          # 2. Build Scripts
          cat <<EOF > build.gradle
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.systempro.master'
              compileSdk 34
              defaultConfig {
                  applicationId "com.systempro.master"
                  minSdk 21
                  targetSdk 34
                  versionCode 3
                  versionName "1.3-Fix"
              }
          }
          EOF

          # 3. Simple Stable UI
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="#121212"
              android:gravity="center">
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="SYSTEM PRO MASTER"
                  android:textColor="#00FF00"
                  android:textSize="26sp"
                  android:textStyle="bold"/>
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Build #742 - Repositories Fixed"
                  android:textColor="#888888"
                  android:layout_marginTop="10dp"/>
          </LinearLayout>
          EOF

          # 4. Java File
          cat <<EOF > app/src/main/java/com/systempro/master/MainActivity.java
          package com.systempro.master;
          import android.app.Activity;
          import android.os.Bundle;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
              }
          }
          EOF

          # 5. Manifest
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="System Pro"
                  android:theme="@android:style/Theme.Material.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 🚀 Master Build Execution
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📦 Delivery
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-v1.3-Fix
          path: app/build/outputs/apk/debug/app-debug.apk
