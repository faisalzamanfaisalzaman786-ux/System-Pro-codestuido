name: System Pro Master Rebuild

on:
  workflow_dispatch: # آپ کے ٹول سے ٹرگر ہوگا

jobs:
  build-structure:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Complete Project Reconstruction
        run: |
          # 1. پہلے سے موجود ہر چیز کو مٹانا تاکہ 'File exists' کا ایرر نہ آئے
          rm -rf app gradle build.gradle settings.gradle gradlew gradlew.bat
          
          # 2. پروفیشنل اینڈرائیڈ فولڈر سٹرکچر بنانا
          mkdir -p gradle/wrapper
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 3. Root Level کی فائلیں بنانا
          echo "include ':app'" > settings.gradle
          echo 'rootProject.name = "System Pro"' >> settings.gradle

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 4. App Level (Internal) کی فائل بنانا
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.system.pro'
              compileSdk 33
              defaultConfig {
                  applicationId "com.system.pro"
                  minSdk 21
                  targetSdk 33
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

          # 5. Android Manifest بنانا
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:allowBackup="true" android:supportsRtl="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # 6. ایک سادہ MainActivity بنانا تاکہ بلڈ فیل نہ ہو
          cat <<EOF > app/src/main/java/com/system/pro/MainActivity.java
          package com.system.pro;
          import android.app.Activity;
          import android.os.Bundle;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }
          EOF

          # 7. Gradle Wrapper کو صحیح طریقے سے جنریٹ کرنا
          gradle wrapper --gradle-version 8.0

          # 8. تمام تبدیلیوں کو زبردستی (Force) پش کرنا
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "MASTER REBUILD: All folders and files synchronized"
          git push origin main --force
