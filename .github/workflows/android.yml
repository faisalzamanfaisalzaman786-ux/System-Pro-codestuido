async function startLiveLog(token, repo) {
    if(pollInterval) clearInterval(pollInterval);
    
    pollInterval = setInterval(async () => {
        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/actions/runs?per_page=1`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const data = await res.json();
            const run = data.workflow_runs[0];

            if(run) {
                // اگر بلڈ چل رہی ہے (In Progress)
                if (run.status === "in_progress" || run.status === "queued") {
                    addLog(`مرحلہ: ${run.display_title || 'تیاری جاری ہے...'}`, "#3b82f6");
                }
                
                // اگر بلڈ مکمل ہو جائے
                if(run.status === "completed") {
                    clearInterval(pollInterval);
                    if(run.conclusion === "success") {
                        addLog("✅ مبارک ہو! اے پی کے کامیابی سے بن گئی ہے۔", "#10b981");
                        document.getElementById('download-btn').style.display = 'block';
                        localStorage.setItem('last_url', run.html_url);
                    } else {
                        addLog("❌ بلڈ فیل! گریڈل فائل میں ایرر موجود ہے۔", "#ef4444");
                    }
                }
            }
        } catch(e) { console.log("Updating Logs..."); }
    }, 2500); 
}
