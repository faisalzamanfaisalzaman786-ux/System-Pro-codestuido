name: System Pro Master Deployment

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Final Mega IDE Structure
        run: |
          rm -rf ./*
          mkdir -p app/src/main/java/com/systempro/master
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 1. Core Build Setup
          cat <<EOF > settings.gradle
          rootProject.name = "System Pro Master"
          include ':app'
          EOF

          cat <<EOF > build.gradle
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.systempro.master'
              compileSdk 34
              defaultConfig {
                  applicationId "com.systempro.master"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.1"
              }
          }
          EOF

          # 2. Modern IDE Dashboard UI
          cat <<EOF > app/src/main/res/layout/activity_main.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="#121212"
              android:padding="16dp">

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="SYSTEM PRO MASTER"
                  android:textColor="#00FF00"
                  android:textSize="24sp"
                  android:textStyle="bold"
                  android:layout_gravity="center"
                  android:layout_marginBottom="20dp"/>

              <Button
                  android:id="@+id/btnNewFile"
                  android:layout_width="match_parent"
                  android:layout_height="60dp"
                  android:text="➕ CREATE NEW PROJECT"
                  android:backgroundTint="#1E1E1E"
                  android:textColor="#FFFFFF"
                  android:layout_marginBottom="10dp"/>

              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Your Projects:"
                  android:textColor="#888888"
                  android:textSize="14sp"
                  android:layout_marginBottom="10dp"/>

              <ListView
                  android:id="@+id/projectList"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_weight="1"
                  android:divider="#333333"
                  android:dividerHeight="1dp"/>
          </LinearLayout>
          EOF

          # 3. MainActivity (Project Listing Logic)
          cat <<EOF > app/src/main/java/com/systempro/master/MainActivity.java
          package com.systempro.master;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.ArrayAdapter;
          import android.widget.ListView;
          import java.io.File;
          import java.util.ArrayList;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  ListView listView = findViewById(R.id.projectList);
                  loadProjects(listView);
              }

              private void loadProjects(ListView listView) {
                  File path = getExternalFilesDir(null);
                  File[] files = path.listFiles();
                  ArrayList<String> fileNames = new ArrayList<>();
                  
                  if (files != null) {
                      for (File file : files) {
                          fileNames.add("📄 " + file.getName());
                      }
                  } else {
                      fileNames.add("No projects found.");
                  }

                  ArrayAdapter<String> adapter = new ArrayAdapter<>(this, 
                      android.R.layout.simple_list_view_1, fileNames);
                  listView.setAdapter(adapter);
              }
          }
          EOF

          # 4. Manifest
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="System Pro"
                  android:theme="@android:style/Theme.Material.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 🚀 Master Build #740
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📦 Delivery
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Master-Explorer
          path: app/build/outputs/apk/debug/app-debug.apk
