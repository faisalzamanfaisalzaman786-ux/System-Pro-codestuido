name: System Pro - Locked Build
on:
  push:
  workflow_dispatch:

jobs:
  build-and-lock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create and Lock Project Structure
        run: |
          rm -rf .gradle gradle build.gradle settings.gradle gradlew gradlew.bat app src
          mkdir -p app/src/main/java/com/system/pro app/src/main/res/layout app/src/main/res/values app/src/main/assets gradle/wrapper

          # Settings File
          echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          rootProject.name = 'System-Pro'
          include ':app'" > settings.gradle

          # Root build.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.4.0' } }
          plugins { id 'com.android.application' version '8.4.0' apply false }" > build.gradle

          # App build.gradle (Stable Dependencies Fix)
          echo "apply plugin: 'com.android.application'
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.system.pro'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes { release { minifyEnabled false } }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }" > app/build.gradle

          # Java & XML Files
          echo "package com.system.pro;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
              }
          }" > app/src/main/java/com/system/pro/MainActivity.java

          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.1-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          curl -L https://github.com/gradle/gradle/raw/v9.4.1/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

      - name: Commit Locked Structure
        run: |
          git config --global user.name "Faisal Zaman"
          git config --global user.email "faisal@example.com"
          git add .
          git commit -m "FIX: Stable dependencies for Gradle 9.4.1" || echo "No changes"
          git push

      - name: Final Build Execution
        run: |
          gradle wrapper --gradle-version 9.4.1
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V130-Stable
          path: "app/build/outputs/apk/debug/*.apk"
