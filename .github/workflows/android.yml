name: System Pro Native Build

on:
  workflow_dispatch: # موبائل ایپ سے بلڈ شروع کرنے کے لیے

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # تازہ ترین v4 ورژن

      - name: Set up JDK 17
        uses: actions/setup-java@v4 # تازہ ترین v4 ورژن
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4 # v3 سے v4 پر اپڈیٹ شدہ
        with:
          name: System-Pro-Full-V1
          path: app/build/outputs/apk/debug/*.apk # درست فائل پاتھ
          retention-days: 5
