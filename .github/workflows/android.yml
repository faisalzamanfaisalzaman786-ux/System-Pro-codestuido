name: System Pro Official Build (ZIP Ingest)
on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-from-zip]

jobs:
  build-from-scratch:
    runs-on: ubuntu-latest

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download project ZIP
        run: |
          ZIP_URL="${{ github.event.client_payload.zip_asset_url }}"
          curl -L -o source_bundle.zip "$ZIP_URL"
          unzip -q source_bundle.zip -d workspace/
          ls -la workspace/

      - name: Read metadata
        id: meta
        run: |
          if [ -f workspace/build_metadata.json ]; then
            APP_NAME=$(jq -r '.app_name' workspace/build_metadata.json)
            PKG_RAW=$(jq -r '.package_name' workspace/build_metadata.json)
          else
            APP_NAME="${{ github.event.client_payload.app_name }}"
            PKG_RAW="${{ github.event.client_payload.package_name }}"
          fi
          PKG_NAME=$(echo "$PKG_RAW" | tr '[:upper:]' '[:lower:]')
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "pkg_name=$PKG_NAME" >> $GITHUB_OUTPUT

      - name: Clone a known working minimal Android app template
        run: |
          git clone https://github.com/android/android-template.git temp-template
          cp -r temp-template/app ./
          cp temp-template/build.gradle ./
          cp temp-template/settings.gradle ./
          cp -r temp-template/gradle ./gradle
          cp temp-template/gradlew ./
          cp temp-template/gradlew.bat ./
          chmod +x gradlew
          rm -rf temp-template

      - name: Override with user files
        run: |
          PKG="${{ steps.meta.outputs.pkg_name }}"
          APP_NAME="${{ steps.meta.outputs.app_name }}"
          PKG_PATH=$(echo "$PKG" | tr '.' '/')
          JAVA_DEST="app/src/main/java/$PKG_PATH"
          mkdir -p "$JAVA_DEST"

          # MainActivity
          if [ -f workspace/MainActivity.java ]; then
            # Replace package line if present
            sed -i "s/^package .*;/package $PKG;/" workspace/MainActivity.java
            cp workspace/MainActivity.java "$JAVA_DEST/MainActivity.java"
          else
            # Default activity
            cat > "$JAVA_DEST/MainActivity.java" <<EOF
package $PKG;
import android.os.Bundle;
import androidx.appcompat.app.AppCompatActivity;
public class MainActivity extends AppCompatActivity {
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);
    }
}
EOF
          fi

          # Layout
          mkdir -p app/src/main/res/layout
          if [ -f workspace/res/layout/activity_main.xml ]; then
            cp workspace/res/layout/activity_main.xml app/src/main/res/layout/activity_main.xml
          elif [ -f workspace/activity_main.xml ]; then
            cp workspace/activity_main.xml app/src/main/res/layout/activity_main.xml
          else
            # Default layout
            cat > app/src/main/res/layout/activity_main.xml <<EOF
<?xml version="1.0" encoding="utf-8"?>
<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent"
    android:layout_height="match_parent"
    android:orientation="vertical"
    android:gravity="center">
    <TextView android:text="Hello World!" android:textSize="24sp"
        android:layout_width="wrap_content" android:layout_height="wrap_content"/>
</LinearLayout>
EOF
          fi

          # Icon
          mkdir -p app/src/main/res/drawable
          if [ -f workspace/res/drawable/ic_launcher.png ]; then
            cp workspace/res/drawable/ic_launcher.png app/src/main/res/drawable/ic_launcher.png
          elif [ -f workspace/ic_launcher.png ]; then
            cp workspace/ic_launcher.png app/src/main/res/drawable/ic_launcher.png
          fi

          # Update AndroidManifest.xml (remove any package attribute, set label)
          sed -i "s/android:label=\".*\"/android:label=\"$APP_NAME\"/" app/src/main/AndroidManifest.xml
          sed -i "s/package=\".*\"//" app/src/main/AndroidManifest.xml
          # Update build.gradle namespace and applicationId
          sed -i "s/namespace \".*\"/namespace \"$PKG\"/" app/build.gradle
          sed -i "s/applicationId \".*\"/applicationId \"$PKG\"/" app/build.gradle

          # Delete any existing MainActivity in wrong package (to avoid duplicate class)
          find app/src/main/java -type f -name "MainActivity.java" ! -path "$JAVA_DEST/MainActivity.java" -delete

      - name: Build APK with full stacktrace and info
        run: |
          ./gradlew :app:assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build_log.txt
          # If build fails, print last 100 lines for debugging
          if [ $? -ne 0 ]; then
            echo "========== BUILD FAILED, LAST 100 LINES =========="
            tail -n 100 build_log.txt
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.app_name }}-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 5
