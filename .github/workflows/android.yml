name: System Pro AI Build Engine

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-app, build-from-zip]

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: "System Pro AI Engine"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: AI Guard & Workspace Setup
        run: |
          # پیکیج اور فولڈر سیٹنگ
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.system.pro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable-xxxhdpi

          # پے لوڈ کو ڈی کوڈ کرنا
          echo "${{ github.event.client_payload.java_b64 }}" | base64 -d > temp_main.java || touch temp_main.java
          echo "${{ github.event.client_payload.xml_b64 }}" | base64 -d > temp_layout.xml || touch temp_layout.xml
          echo "${{ github.event.client_payload.manifest_b64 }}" | base64 -d > temp_manifest.xml || touch temp_manifest.xml

          # پائتھون فکسر (AI Logic) جو کمنٹس اور اسٹائلز کو ختم کرے گا
          python3 -c "
          import os, re
          def smart_fix(f_in, f_out):
              if not os.path.exists(f_in) or os.stat(f_in).st_size == 0: return
              with open(f_in, 'r', encoding='utf-8', errors='ignore') as f:
                  content = f.read().strip()
              # Prolog Fix: پہلی لائن پر صرف <?xml لانا
              if '<?xml' in content:
                  content = content[content.find('<?xml'):]
              # Layout Fix: ناجائز اسٹائلز نکالنا جو بلڈ فیل کرتے ہیں
              content = re.sub(r'<style.*?>.*?</style>', '', content, flags=re.DOTALL)
              with open(f_out, 'w', encoding='utf-8') as f:
                  f.write(content)

          smart_fix('temp_layout.xml', 'app/src/main/res/layout/activity_main.xml')
          smart_fix('temp_manifest.xml', 'app/src/main/AndroidManifest.xml')
          "

          # جاوا پیکیج انجکشن
          if [ -s temp_main.java ]; then
            {
              echo "package $PKG_NAME;"
              echo "import $PKG_NAME.R;"
              sed '/package /d' temp_main.java | sed '/import .*R;/d'
            } > app/src/main/java/$PKG_PATH/MainActivity.java
          fi

          # آئیکن سیٹ اپ
          if [ ! -z "${{ github.event.client_payload.icon_data_b64 }}" ]; then
            echo "${{ github.event.client_payload.icon_data_b64 }}" | base64 -d > app/src/main/res/drawable-xxxhdpi/ic_launcher.png
          fi

      - name: Build and Auto-Fix
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug \
            -PdynamicPackage="${{ github.event.client_payload.package_name || 'com.system.pro' }}" \
            -PappName="${{ github.event.client_payload.app_name || 'SystemPro' }}" \
            --no-daemon --stacktrace || (echo '❌ Build Failed! Check Log for XML errors.' && exit 1)

      - name: Upload Green APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name || 'SystemPro-Success' }}
          path: app/build/outputs/apk/debug/*.apk
