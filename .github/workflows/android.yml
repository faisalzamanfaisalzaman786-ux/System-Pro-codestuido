name: Android CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [remote-build-trigger]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Critical File Name Fix & SDK Setup
      run: |
        # 1. غلط نام والی فائل کو درست کرنا
        # یہ کمانڈ فائل کے شروع سے غیر قانونی حروف ہٹا دے گی
        find . -name ":vi*" -type f | while read f; do
          new_name=$(echo "$f" | sed 's/:vi //g')
          mv "$f" "$new_name"
        done

        # 2. SDK 34 کی وارننگ کا حل
        echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
        
        # 3. Package Name اپ ڈیٹ
        PKG="com.example.cameraapp"
        find . -name "AndroidManifest.xml" -type f -exec sed -i "s/package=\".*\"/package=\"$PKG\"/" {} +

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Fixed-System-Pro-APK
        path: app/build/outputs/apk/debug/app-debug.apk
