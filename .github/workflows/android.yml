name: System Pro Native Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace # اسٹیک ٹریس سے ایرر کا پتہ چلے گا

      - name: Upload Actual APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Final-App
          # ہم پورے فولڈر کو اسکین کریں گے تاکہ اصلی APK چھوٹ نہ جائے
          path: "**/build/outputs/apk/debug/*.apk" 
          retention-days: 5
