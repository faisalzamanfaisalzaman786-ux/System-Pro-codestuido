
      - name: Upload Repaired APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Fixed-APK
          path: "**/*.apk" # یہ پوری ریپوزٹری میں جہاں بھی APK ملے گا اسے ڈھونڈ لے گا
name: System Pro Ultimate Repair & Build

on:
  workflow_dispatch:

jobs:
  repair-and-rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ Clean and Fix
        run: |
          chmod +x gradlew || true
          # پرانے کیشے کو مکمل ختم کریں
          ./gradlew clean
          # لائن اینڈنگز درست کریں
          find . -type f \( -name "*.java" -o -name "*.xml" -o -name "*.gradle" \) -exec sed -i 's/\r$//' {} +

      - name: 🚀 Force Build Debug
        run: ./gradlew assembleDebug --no-daemon
