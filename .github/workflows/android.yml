<?xml version="1.0" encoding="utf-8"?>
<LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
    android:layout_width="match_parent"
    android:layout_height="match_parent"
    android:orientation="vertical"
    android:padding="30dp"
    android:background="#0C111B"
    android:gravity="center">

    <TextView
        android:layout_width="wrap_content"
        android:layout_height="wrap_content"
        android:text="System Pro Calculator"
        android:textColor="#B78AFF"
        android:textSize="24sp"
        android:layout_marginBottom="30dp"/>

    <EditText 
        android:id="@+id/num1"
        android:layout_width="match_parent"
        android:layout_height="60dp"
        android:hint="پہلا نمبر"
        android:textColorHint="#5E7A9C"
        android:textColor="#FFFFFF"
        android:background="@android:drawable/editbox_background_normal"
        android:inputType="numberDecimal"
        android:padding="10dp"/>

    <EditText 
        android:id="@+id/num2"
        android:layout_width="match_parent"
        android:layout_height="60dp"
        android:hint="دوسرا نمبر"
        android:textColorHint="#5E7A9C"
        android:textColor="#FFFFFF"
        android:background="@android:drawable/editbox_background_normal"
        android:inputType="numberDecimal"
        android:layout_marginTop="15dp"
        android:padding="10dp"/>

    <Button 
        android:id="@+id/btnAdd"
        android:layout_width="match_parent"
        android:layout_height="60dp"
        android:text="جمع کریں (+)"
        android:backgroundTint="#1E3A5F"
        android:textColor="#FFFFFF"
        android:layout_marginTop="30dp"/>

    <TextView 
        android:id="@+id/result"
        android:layout_width="wrap_content"
        android:layout_height="wrap_content"
        android:text="نتیجہ: 0"
        android:textColor="#00FF88"
        android:textSize="22sp"
        android:layout_marginTop="30dp"/>

</LinearLayout>
