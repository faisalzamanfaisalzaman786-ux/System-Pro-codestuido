name: System Pro Android Build

# یہ سیکشن بتاتا ہے کہ بلڈ کب شروع ہوگی
on:
  workflow_dispatch: # یہ آپ کے HTML بٹن (System Pro) سے کنٹرول ہوگا
  push:
    branches: [ "main" ] # جب بھی آپ کوڈ پش کریں گے

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. کوڈ کو GitHub سرور پر لانا
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. جاوا (JDK) سیٹ اپ کرنا
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. گریڈل فائل کو چلانے کی اجازت دینا
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 4. اے پی کے (APK) فائل بنانا
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. تیار شدہ فائل کو ڈاؤن لوڈ کے لیے محفوظ کرنا
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-App-Build
          path: app/build/outputs/apk/debug/app-debug.apk
