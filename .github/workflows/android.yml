name: System Pro Valid APK Builder

on:
  # 1. بیرونی ایپ سے خودکار ٹریگر کے لیے (Main Trigger)
  repository_dispatch:
    types: [build_apk]

  # 2. مینوئل چیکنگ کے لیے (تاکہ آپ گٹ ہب سے بھی رن کر سکیں)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # ٹریگرنگ اور آرٹی فیکٹ ہینڈلنگ کے لیے ضروری پرمیشنز
    permissions:
      contents: write
      actions: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🔍 DEBUG TRIGGER
        run: |
          echo "════════════════════════════════════════════"
          echo "📢 TRIGGER EVENT: ${{ github.event_name }}"
          echo "📢 ACTION TYPE: ${{ github.event.action }}"
          echo "════════════════════════════════════════════"
          # پے لوڈ چیک کرنے کے لیے
          echo "📦 Received Package: ${{ github.event.client_payload.package_name }}"
          echo "📱 Received App Name: ${{ github.event.client_payload.app_name }}"
          echo "════════════════════════════════════════════"

      - name: ♾️ GENERATE VALID PACKAGE
        id: random
        run: |
          # ایپ سے ڈیٹا وصول کرنا
          PKG_FROM_APP="${{ github.event.client_payload.package_name }}"
          APP_NAME="${{ github.event.client_payload.app_name }}"
          JAVA_CODE="${{ github.event.client_payload.java_code }}"
          LAYOUT_CODE="${{ github.event.client_payload.layout_code }}"
          
          # اگر ایپ سے ڈیٹا نہ آئے تو ڈیفالٹ ویلیوز
          if [[ -z "$PKG_FROM_APP" ]]; then PKG_FROM_APP="com.systempro.app"; fi
          if [[ -z "$APP_NAME" ]]; then APP_NAME="SystemPro"; fi
          
          # والیڈ رینڈم جنریٹر (صرف حروف سے شروع ہونے والا نام)
          RANDOM_LETTERS=$(tr -dc 'a-z' < /dev/urandom | head -c 4)
          RANDOM_NUM=$((1000 + RANDOM % 9000))
          TIMESTAMP=$(date +%d%H%M)
          
          # بیس پیکج نکالنا
          BASE_PKG=$(echo "$PKG_FROM_APP" | cut -d. -f1-2)
          if [[ -z "$BASE_PKG" ]]; then BASE_PKG="com.systempro"; fi
          
          # فائنل والیڈ پیکج (Android Standards کے مطابق)
          FINAL_PKG="${BASE_PKG}.${RANDOM_LETTERS}${RANDOM_NUM:0:3}.build${TIMESTAMP}"
          UNIQUE_APP="${APP_NAME} (${RANDOM_LETTERS}${TIMESTAMP: -3})"
          
          # آؤٹ پٹس کو محفوظ کریں
          echo "unique_pkg=$FINAL_PKG" >> $GITHUB_OUTPUT
          echo "unique_app=$UNIQUE_APP" >> $GITHUB_OUTPUT
          echo "pkg_path=$(echo $FINAL_PKG | sed 's/\./\//g')" >> $GITHUB_OUTPUT
          echo "java_code=$JAVA_CODE" >> $GITHUB_OUTPUT
          echo "layout_code=$LAYOUT_CODE" >> $GITHUB_OUTPUT
          echo "random_letters=$RANDOM_LETTERS" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          
          echo "✅ Trigger Payload Processed Successfully"
