name: System Pro Master Net Final

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Full Reconstruction (Files & Gradle)
      run: |
        # 1. فولڈرز کی تیاری
        mkdir -p app/src/main/java/com/systempro/master
        mkdir -p app/src/main/res/layout

        # 2. گریڈل کی بنیادی فائلیں (چونکہ آپ کے پاس اب موجود نہیں ہیں)
        cat <<EOF > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        cat <<EOF > app/build.gradle
        apply plugin: 'com.android.application'
        android {
            namespace 'com.systempro.master'
            compileSdk 34
            defaultConfig {
                applicationId "com.systempro.master"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        EOF

        echo "include ':app'" > settings.gradle
        echo "android.suppressUnsupportedCompileSdk=34" > gradle.properties

        # 3. جاوا اور مینی فیسٹ
        cat <<EOF > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:label="System Pro Net">
                <activity android:name="com.systempro.master.MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        cat <<EOF > app/src/main/java/com/systempro/master/MainActivity.java
        package com.systempro.master;
        import android.app.Activity;
        import android.os.Bundle;
        import android.widget.TextView;
        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                TextView tv = new TextView(this);
                tv.setText("Net Build Success: Everything Reconstructed!");
                setContentView(tv);
            }
        }
        EOF

    - name: Setup Gradle Executable
      # یہ کمانڈ فائلیں نہ ہونے کی صورت میں گریڈل کو دوبارہ انسٹال کرے گی
      run: gradle wrapper

    - name: Final Build
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug
