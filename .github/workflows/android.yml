name: System Pro Master Deployment

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Auto-Repair Project Files
        run: |
          # ضروری فولڈرز بنانا
          mkdir -p app/src/main/java/com/faisal/systempro
          
          # 1. Root build.gradle (صاف ستھرا ڈھانچہ)
          echo "buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          plugins {
              id 'com.android.application' version '8.2.0' apply false
          }" > build.gradle

          # 2. settings.gradle (تمام Repositories یہاں منتقل کر دیں تاکہ ایرر نہ آئے)
          echo "pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = 'System Pro Master'
          include ':app'" > settings.gradle

          # 3. app/build.gradle (درست نیم اسپیس اور پیکیج کے ساتھ)
          echo "plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.faisal.systempro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.faisal.systempro.v1.fix'
                  minSdk 24
                  targetSdk 34
                  versionCode ${{ github.run_number }}
                  versionName '1.3-Fix'
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }" > app/build.gradle

      - name: Grant Execute Permission for Gradlew
        run: gradle wrapper --gradle-version 8.5 && chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload System Pro APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-v1.3-Fix
          path: app/build/outputs/apk/debug/app-debug.apk
