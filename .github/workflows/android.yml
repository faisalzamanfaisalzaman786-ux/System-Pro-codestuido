name: System Pro Build

on:
  workflow_dispatch: # ایپلی کیشن سے سگنل لینے کے لیے لازمی ہے

jobs:  # یہی وہ حصہ ہے جو آپ کی فائل میں موجود نہیں یا غلط ہے
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew assembleDebug
