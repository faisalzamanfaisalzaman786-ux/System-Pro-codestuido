name: System Pro Smart Builder
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Missing Project Files
        run: |
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/assets
          mkdir -p gradle/wrapper

          if [ ! -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          fi

          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            curl -L https://github.com/gradle/gradle/raw/v8.5.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          fi

          echo "include ':app'" > settings.gradle

          echo "plugins { id 'com.android.application' version '8.2.2' }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.system.pro'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              sourceSets {
                  main {
                      manifest.srcFile 'src/main/AndroidManifest.xml'
                      java.srcDirs = ['src/main/java']
                      res.srcDirs = ['src/main/res']
                      assets.srcDirs = ['src/main/assets']
                  }
              }
          }" > app/build.gradle

          if [ ! -f "app/src/main/AndroidManifest.xml" ]; then
            echo '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.system.pro"><application android:label="System Pro" android:theme="@style/Theme.AppCompat.Light.NoActionBar"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>' > app/src/main/AndroidManifest.xml
          fi

      - name: Setup Gradle
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V116
          path: "app/build/outputs/apk/debug/*.apk"
