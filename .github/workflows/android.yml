name: System Pro Complete APK Builder

on:
  repository_dispatch:
    types: [build_apk]
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package Name (e.g., com.example.app)'
        required: true
        default: 'com.example.app'
      app_name:
        description: 'App Name'
        required: true
        default: 'MyDynamicApp'
      java_code:
        description: 'Base64 encoded Java code'
        required: true
      layout_code:
        description: 'Base64 encoded Layout code'
        required: true

permissions:
  contents: write
  actions: write
  statuses: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        run: |
          # Install required packages
          sudo apt-get update
          sudo apt-get install -y wget unzip
          
          # Create SDK directory
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          
          # Download and extract command line tools
          cd $ANDROID_SDK_ROOT
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          
          # Properly organize cmdline-tools
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          rm -rf cmdline-tools 2>/dev/null || true
          mv cmdline-tools_temp cmdline-tools/latest 2>/dev/null || true
          
          # Set environment variables
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          
      - name: Verify SDK Installation
        run: |
          echo "Checking SDK location..."
          ls -la $ANDROID_HOME/cmdline-tools/latest/bin/
          which sdkmanager || echo "sdkmanager not in PATH yet"
          
      - name: Accept Android Licenses
        run: |
          # Wait for PATH to be updated
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses || true
          
      - name: Install Android Platform Tools
        run: |
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          
      - name: Decode Package Info
        id: decode
        run: |
          # Get values from either repository_dispatch or workflow_dispatch
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            PACKAGE_NAME='${{ github.event.client_payload.package_name }}'
            APP_NAME='${{ github.event.client_payload.app_name }}'
            JAVA_BASE64='${{ github.event.client_payload.java_code }}'
            LAYOUT_BASE64='${{ github.event.client_payload.layout_code }}'
          else
            PACKAGE_NAME='${{ github.event.inputs.package_name }}'
            APP_NAME='${{ github.event.inputs.app_name }}'
            JAVA_BASE64='${{ github.event.inputs.java_code }}'
            LAYOUT_BASE64='${{ github.event.inputs.layout_code }}'
          fi
          
          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          
          # Save decoded files with proper error handling
          echo "$JAVA_BASE64" | base64 -d > MainActivity.java || echo "Error decoding Java"
          echo "$LAYOUT_BASE64" | base64 -d > activity_main.xml || echo "Error decoding Layout"
          
      - name: Create Android Project Structure
        run: |
          PACKAGE_NAME="${{ steps.decode.outputs.package_name }}"
          APP_NAME="${{ steps.decode.outputs.app_name }}"
          PACKAGE_PATH=$(echo $PACKAGE_NAME | tr '.' '/')
          
          # Create project structure
          mkdir -p app/src/main/java/$PACKAGE_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          
          # Move decoded files if they exist
          if [ -f MainActivity.java ]; then
            mv MainActivity.java app/src/main/java/$PACKAGE_PATH/
          fi
          if [ -f activity_main.xml ]; then
            mv activity_main.xml app/src/main/res/layout/
          fi
          
      - name: Create AndroidManifest.xml
        run: |
          PACKAGE_NAME="${{ steps.decode.outputs.package_name }}"
          APP_NAME="${{ steps.decode.outputs.app_name }}"
          
          cat > app/src/main/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="$PACKAGE_NAME">
              
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="$APP_NAME"
                  android:theme="@style/AppTheme"
                  android:supportsRtl="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
      - name: Create Build Files
        run: |
          # Create settings.gradle
          cat > settings.gradle << EOF
          rootProject.name = "MyDynamicApp"
          include ':app'
          EOF
          
          # Create build.gradle (Project level)
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.0'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          tasks.register('clean', Delete) {
              delete rootProject.buildDir
          }
          EOF
          
          # Create app/build.gradle
          cat > app/build.gradle << EOF
          apply plugin: 'com.android.application'
          
          android {
              namespace '${{ steps.decode.outputs.package_name }}'
              compileSdk 34
              
              defaultConfig {
                  applicationId "${{ steps.decode.outputs.package_name }}"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  
                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      debuggable true
                      minifyEnabled false
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.core:core-ktx:1.12.0'
              testImplementation 'junit:junit:4.13.2'
              androidTestImplementation 'androidx.test.ext:junit:1.1.5'
              androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
          }
          EOF
          
      - name: Create Resource Files
        run: |
          # Create styles.xml
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">#6200EE</item>
                  <item name="colorPrimaryDark">#3700B3</item>
                  <item name="colorAccent">#03DAC5</item>
                  <item name="android:windowBackground">@color/white</item>
              </style>
          </resources>
          EOF
          
          # Create colors.xml
          cat > app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="purple_200">#FFBB86FC</color>
              <color name="purple_500">#FF6200EE</color>
              <color name="purple_700">#FF3700B3</color>
              <color name="teal_200">#FF03DAC5</color>
              <color name="teal_700">#FF018786</color>
              <color name="black">#FF000000</color>
              <color name="white">#FFFFFFFF</color>
          </resources>
          EOF
          
          # Create strings.xml
          cat > app/src/main/res/values/strings.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">${{ steps.decode.outputs.app_name }}</string>
          </resources>
          EOF
          
          # Create simple launcher icon (using built-in Android icon)
          mkdir -p app/src/main/res/drawable
          echo '<?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24">
              <path
                  android:fillColor="#FF6200EE"
                  android:pathData="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10 10,-4.48 10,-10S17.52,2 12,2zM12,5c1.66,0 3,1.34 3,3s-1.34,3 -3,3 -3,-1.34 -3,-3 1.34,-3 3,-3zM12,19.2c-2.5,0 -4.71,-1.28 -6,-3.22 0.03,-1.99 4,-3.08 6,-3.08 1.99,0 5.97,1.09 6,3.08 -1.29,1.94 -3.5,3.22 -6,3.22z"/>
          </vector>' > app/src/main/res/drawable/ic_launcher.xml
          
      - name: Generate Gradle Wrapper
        run: |
          # Use gradle wrapper directly from system
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew
          
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace --no-daemon
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.decode.outputs.app_name }}-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          if-no-files-found: warn
          
      - name: Create Release
        if: success()
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            COMMIT_HASH=$(git rev-parse --short HEAD)
            BUILD_DATE=$(date +'%Y-%m-%d_%H-%M-%S')
            APP_NAME="${{ steps.decode.outputs.app_name }}"
            PACKAGE_NAME="${{ steps.decode.outputs.package_name }}"
            
            # Create a tag for this build
            TAG_NAME="build-${BUILD_DATE}"
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git tag -a "$TAG_NAME" -m "Auto-build: $APP_NAME ($PACKAGE_NAME)"
            git push origin "$TAG_NAME" || echo "Tag already exists or push failed"
          fi
          
      - name: Send Repository Dispatch (Completion Signal)
        if: always()
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          STATUS="${{ job.status }}"
          APP_NAME="${{ steps.decode.outputs.app_name }}"
          PACKAGE_NAME="${{ steps.decode.outputs.package_name }}"
          
          if [ -n "$PAT_TOKEN" ]; then
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: Bearer $PAT_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/dispatches \
              -d '{
                "event_type": "build_complete",
                "client_payload": {
                  "status": "'"$STATUS"'",
                  "app_name": "'"$APP_NAME"'",
                  "package_name": "'"$PACKAGE_NAME"'",
                  "build_time": "'$(date)'",
                  "run_id": "${{ github.run_id }}"
                }
              }' || echo "Failed to send completion signal"
          else
            echo "PAT_TOKEN not set, skipping completion signal"
          fi
