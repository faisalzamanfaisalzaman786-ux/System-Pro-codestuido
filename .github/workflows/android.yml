name: Android APK Builder

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Process and Build
        env:
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          APP_NAME=$(echo "$PAYLOAD" | jq -r '.app_name // "SystemPro"')
          PACKAGE_NAME=$(echo "$PAYLOAD" | jq -r '.package_name // "com.system.pro"')
          JAVA_CODE=$(echo "$PAYLOAD" | jq -r '.java // ""')
          XML_LAYOUT=$(echo "$PAYLOAD" | jq -r '.xml // ""')
          MANIFEST_XML=$(echo "$PAYLOAD" | jq -r '.manifest // ""')

          PKG_PATH=$(echo "$PACKAGE_NAME" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/drawable
          mkdir -p gradle/wrapper

          # 🛡️ Resources Fix (Naming matching)
          echo '<vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#00BFFF" android:pathData="M0,0h108v108h-108z"/></vector>' > app/src/main/res/drawable/ic_launcher_foreground.xml
          echo '<?xml version="1.0" encoding="utf-8"?><adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android"><background android:drawable="@color/bg_dark"/><foreground android:drawable="@drawable/ic_launcher_foreground"/></adaptive-icon>' > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml
          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="bg_dark">#0F0F0F</color><color name="neon_blue">#00BFFF</color></resources>' > app/src/main/res/values/colors.xml
          
          # تھیم کا نام مینی فیسٹ کے مطابق (Theme.SystemPro) رکھا گیا ہے
          echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.SystemPro" parent="Theme.MaterialComponents.DayNight.NoActionBar"><item name="colorPrimary">@color/neon_blue</item></style></resources>' > app/src/main/res/values/themes.xml

          # ⚙️ Logic & Manifest Cleanup
          if [ -z "$JAVA_CODE" ] || [ "$JAVA_CODE" = "null" ]; then
            JAVA_CODE="package $PACKAGE_NAME;\nimport android.os.Bundle;\nimport androidx.appcompat.app.AppCompatActivity;\npublic class MainActivity extends AppCompatActivity { @Override protected void onCreate(Bundle savedInstanceState) { super.onCreate(savedInstanceState); setContentView(R.layout.activity_main); } }"
          fi
          
          if [ -z "$MANIFEST_XML" ] || [ "$MANIFEST_XML" = "null" ]; then
             MANIFEST_XML="<?xml version=\"1.0\" encoding=\"utf-8\"?><manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"><application android:label=\"$APP_NAME\" android:icon=\"@mipmap/ic_launcher\" android:theme=\"@style/Theme.SystemPro\"><activity android:name=\".MainActivity\" android:exported=\"true\"><intent-filter><action android:name=\"android.intent.action.MAIN\" /><category android:name=\"android.intent.category.LAUNCHER\" /></intent-filter></activity></application></manifest>"
          else
             # مینی فیسٹ سے پیکیج ہٹانا اور تھیم کو یقینی بنانا
             MANIFEST_XML=$(echo "$MANIFEST_XML" | sed 's/package="[^"]*"//g')
          fi

          echo -e "$JAVA_CODE" > app/src/main/java/$PKG_PATH/MainActivity.java
          echo -e "$XML_LAYOUT" > app/src/main/res/layout/activity_main.xml
          echo -e "$MANIFEST_XML" > app/src/main/AndroidManifest.xml

          # 🛠️ Configuration
          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS); repositories { google(); mavenCentral() } }
          rootProject.name = "$APP_NAME"
          include ':app'
          EOF

          echo "plugins { id 'com.android.application' version '8.5.0' apply false }" > build.gradle

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace '$PACKAGE_NAME'
              compileSdk 34
              defaultConfig { applicationId '$PACKAGE_NAME'; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.11.0' }
          EOF

          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.1-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          
          sync
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon --max-workers=2
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name || 'System-Pro-Output' }}
          path: app/build/outputs/apk/debug/*.apk
