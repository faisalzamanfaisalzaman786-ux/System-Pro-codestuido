name: System Pro Build System

# اب یہ ایپ سے آنے والے سگنل (repository_dispatch) پر کام کرے گا
on:
  repository_dispatch:
    types: [build_app]
  workflow_dispatch: # یہ صرف اس لیے رکھا ہے تاکہ آپ ضرورت پڑنے پر گٹ ہب سے بھی رن کر سکیں

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Update Package Name Dynamically
        run: |
          # یہاں ہم ایپ سے آنے والے ڈیٹا (client_payload) کو اٹھا رہے ہیں
          # اگر آپ گٹ ہب سے رن کریں گے تو یہ ڈیفالٹ ویلیوز استعمال کرے گا
          NEW_PACKAGE="${{ github.event.client_payload.base_package || github.event.inputs.base_package || 'com.systempro.master' }}"
          SERIAL="${{ github.event.client_payload.serial || github.event.inputs.serial || '001' }}"
          
          echo "Updating package name to: $NEW_PACKAGE"
          echo "Build Serial: $SERIAL"
          
          # build.gradle میں پیکیج نیم اور نیم اسپیس کو بدلنا
          sed -i "s/applicationId \".*\"/applicationId \"$NEW_PACKAGE\"/g" app/build.gradle
          sed -i "s/namespace \".*\"/namespace \"$NEW_PACKAGE\"/g" app/build.gradle

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          # اب APK فائل کا نام بھی آپ کے بھیجے ہوئے سیریل نمبر کے مطابق ہوگا
          name: SystemPro-Build-${{ github.event.client_payload.serial || github.event.inputs.serial || '001' }}
          path: app/build/outputs/apk/debug/*.apk
