name: System Pro Official Build (ZIP Ingest)
on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-from-zip]

jobs:
  assemble-official-apk:
    name: "System Pro: Build from ZIP asset"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Download project ZIP from release asset
        run: |
          ZIP_URL="${{ github.event.client_payload.zip_asset_url }}"
          if [ -z "$ZIP_URL" ]; then
            echo "❌ No ZIP url provided"
            exit 1
          fi
          curl -L -o source_bundle.zip "$ZIP_URL"
          unzip -q source_bundle.zip -d workspace/

      - name: Read build metadata
        id: metadata
        run: |
          if [ -f workspace/build_metadata.json ]; then
            APP_NAME=$(jq -r '.app_name' workspace/build_metadata.json)
            PKG_NAME=$(jq -r '.package_name' workspace/build_metadata.json)
          else
            APP_NAME="${{ github.event.client_payload.app_name }}"
            PKG_NAME="${{ github.event.client_payload.package_name }}"
          fi
          # Convert package name to lowercase if needed, but keep as is
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "pkg_name=$PKG_NAME" >> $GITHUB_OUTPUT

      - name: Inject source files into Android project
        run: |
          PKG="${{ steps.metadata.outputs.pkg_name }}"
          APP_JAVA_DIR="app/src/main/java/$(echo "$PKG" | tr '.' '/')"
          mkdir -p "$APP_JAVA_DIR"
          
          # MainActivity.java
          if [ -f workspace/MainActivity.java ]; then
            # Update package line inside MainActivity.java if needed
            sed -i "s/^package .*;/package $PKG;/" workspace/MainActivity.java
            cp workspace/MainActivity.java "$APP_JAVA_DIR/MainActivity.java"
          fi
          
          # Layout
          mkdir -p app/src/main/res/layout
          if [ -f workspace/res/layout/activity_main.xml ]; then
            cp workspace/res/layout/activity_main.xml app/src/main/res/layout/activity_main.xml
          elif [ -f workspace/activity_main.xml ]; then
            cp workspace/activity_main.xml app/src/main/res/layout/activity_main.xml
          fi

          # AndroidManifest.xml - remove package attribute completely
          if [ -f workspace/AndroidManifest.xml ]; then
            # Remove BOM and fix
            sed -i '1s/^\xEF\xBB\xBF//' workspace/AndroidManifest.xml
            sed -i '1s/^[[:space:]]*<?xml/<?xml/' workspace/AndroidManifest.xml
            # Delete any package="..." from manifest tag
            sed -i 's/package="[^"]*"//' workspace/AndroidManifest.xml
            cp workspace/AndroidManifest.xml app/src/main/AndroidManifest.xml
          fi

          # Icon
          mkdir -p app/src/main/res/drawable
          if [ -f workspace/res/drawable/ic_launcher.png ]; then
            cp workspace/res/drawable/ic_launcher.png app/src/main/res/drawable/ic_launcher.png
          elif [ -f workspace/ic_launcher.png ]; then
            cp workspace/ic_launcher.png app/src/main/res/drawable/ic_launcher.png
          fi

          # Update build.gradle (app level)
          if [ -f app/build.gradle ]; then
            # Add namespace if not exists, or replace
            if grep -q "namespace" app/build.gradle; then
              sed -i "s/namespace \".*\"/namespace \"$PKG\"/" app/build.gradle
            else
              # Insert after android {
              sed -i "/android {/a \ \ \ \ namespace \"$PKG\"" app/build.gradle
            fi
            sed -i "s/applicationId \".*\"/applicationId \"$PKG\"/" app/build.gradle
          fi

      - name: Validate and ensure valid AndroidManifest.xml (without package)
        run: |
          MANIFEST="app/src/main/AndroidManifest.xml"
          PKG="${{ steps.metadata.outputs.pkg_name }}"
          APPNAME="${{ steps.metadata.outputs.app_name }}"
          
          # If manifest still missing or invalid, create a clean one WITHOUT package attribute
          if [ ! -f "$MANIFEST" ] || ! xmllint --noout "$MANIFEST" 2>/dev/null; then
            echo "⚠️ Generating clean manifest (no package attribute)"
            cat > "$MANIFEST" <<'EOF'
            <?xml version="1.0" encoding="utf-8"?>
            <manifest xmlns:android="http://schemas.android.com/apk/res/android">
                <application android:label="APP_NAME_PLACEHOLDER">
                    <activity android:name=".MainActivity">
                        <intent-filter>
                            <action android:name="android.intent.action.MAIN"/>
                            <category android:name="android.intent.category.LAUNCHER"/>
                        </intent-filter>
                    </activity>
                </application>
            </manifest>
            EOF
            sed -i "s/APP_NAME_PLACEHOLDER/$APPNAME/" "$MANIFEST"
          fi
          echo "✅ Manifest ready (no package line):"
          head -n 6 "$MANIFEST"

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload final APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.app_name || 'SystemPro' }}-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 5

      - name: Build success summary
        if: success()
        run: |
          echo "## ✅ Build succeeded (modern manifest without package attribute)" >> $GITHUB_STEP_SUMMARY
          echo "App: **${{ steps.metadata.outputs.app_name }}**" >> $GITHUB_STEP_SUMMARY
          echo "Package: \`${{ steps.metadata.outputs.pkg_name }}\`" >> $GITHUB_STEP_SUMMARY
