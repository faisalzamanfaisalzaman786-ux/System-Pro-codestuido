      - name: Gemini Design & Build Engine
        run: |
          # فولڈرز کی تیاری
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/drawable

          # آئیکن کا حل: تصویر کو تمام ضروری سائزز میں کاپی کرنا
          if [ -n "${{ github.event.client_payload.icon_data_b64 }}" ]; then
            echo "${{ github.event.client_payload.icon_data_b64 }}" | base64 -d > base_icon.png
            cp base_icon.png app/src/main/res/mipmap-hdpi/ic_launcher.png
            cp base_icon.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp base_icon.png app/src/main/res/drawable/ic_launcher.png
            cp base_icon.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          fi

          # مینی فیسٹ کا حل: آئیکن اور تھیم کو مینی فیسٹ میں زبردستی شامل کرنا
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.microsoft.com/apk/res/android">
              <application
                  android:label="${{ github.event.client_payload.app_name || 'System Pro' }}"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:theme="@style/Theme.SystemPro">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
