name: System Pro Complete APK Builder

on:
  repository_dispatch:
    types: [build_apk]
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package Name (e.g., com.example.app)'
        required: true
        default: 'com.example.app'
      app_name:
        description: 'App Name'
        required: true
        default: 'MyDynamicApp'
      java_code:
        description: 'Base64 encoded Java code'
        required: true
      layout_code:
        description: 'Base64 encoded Layout code'
        required: true

permissions:
  contents: write
  actions: write
  statuses: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK (FINAL FIX)
        run: |
          # Install required packages
          sudo apt-get update
          sudo apt-get install -y wget unzip
          
          # Set Android SDK path
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          mkdir -p $ANDROID_SDK_ROOT
          
          # Download command line tools
          cd $ANDROID_SDK_ROOT
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          
          # Create correct directory structure
          mkdir -p cmdline-tools
          mv cmdline-tools_temp/* cmdline-tools/ 2>/dev/null || true
          rm -rf cmdline-tools_temp
          
          # Set environment variables
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/bin" >> $GITHUB_PATH
          
      - name: Install Android SDK Components
        run: |
          # Add to PATH for this step
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/bin
          
          # Install latest cmdline-tools first
          yes | $ANDROID_HOME/cmdline-tools/bin/sdkmanager "cmdline-tools;latest" --sdk_root=$ANDROID_HOME
          
          # Update PATH to use latest cmdline-tools
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          
      - name: Accept Android Licenses
        run: |
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses || true
          
      - name: Install Platform Tools
        run: |
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          
      - name: Decode Package Info
        id: decode
        run: |
          # Get values from either repository_dispatch or workflow_dispatch
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            PACKAGE_NAME='${{ github.event.client_payload.package_name }}'
            APP_NAME='${{ github.event.client_payload.app_name }}'
            JAVA_BASE64='${{ github.event.client_payload.java_code }}'
            LAYOUT_BASE64='${{ github.event.client_payload.layout_code }}'
          else
            PACKAGE_NAME='${{ github.event.inputs.package_name }}'
            APP_NAME='${{ github.event.inputs.app_name }}'
            JAVA_BASE64='${{ github.event.inputs.java_code }}'
            LAYOUT_BASE64='${{ github.event.inputs.layout_code }}'
          fi
          
          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          
          # Save decoded files
          echo "$JAVA_BASE64" | base64 -d > MainActivity.java 2>/dev/null || echo "Warning: Java code may be empty"
          echo "$LAYOUT_BASE64" | base64 -d > activity_main.xml 2>/dev/null || echo "Warning: Layout code may be empty"
          
      - name: Create Android Project Structure
        run: |
          PACKAGE_NAME="${{ steps.decode.outputs.package_name }}"
          APP_NAME="${{ steps.decode.outputs.app_name }}"
          PACKAGE_PATH=$(echo $PACKAGE_NAME | tr '.' '/')
          
          # Create project structure
          mkdir -p app/src/main/java/$PACKAGE_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          
          # Move decoded files if they exist
          if [ -f MainActivity.java ]; then
            mv MainActivity.java app/src/main/java/$PACKAGE_PATH/
          fi
          if [ -f activity_main.xml ]; then
            mv activity_main.xml app/src/main/res/layout/
          fi
          
      - name: Create AndroidManifest.xml
        run: |
          PACKAGE_NAME="${{ steps.decode.outputs.package_name }}"
          APP_NAME="${{ steps.decode.outputs.app_name }}"
          
          cat > app/src/main/AndroidManifest.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="$PACKAGE_NAME">
              
              <uses-permission android:name="android.permission.INTERNET" />
              
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="$APP_NAME"
                  android:theme="@style/AppTheme"
                  android:supportsRtl="true">
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
      - name: Create Build Files
        run: |
          # Create settings.gradle
          cat > settings.gradle << EOF
          rootProject.name = "MyDynamicApp"
          include ':app'
          EOF
          
          # Create build.gradle (Project level)
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF
          
          # Create app/build.gradle
          cat > app/build.gradle << EOF
          apply plugin: 'com.android.application'
          
          android {
              namespace '${{ steps.decode.outputs.package_name }}'
              compileSdk 34
              
              defaultConfig {
                  applicationId "${{ steps.decode.outputs.package_name }}"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug {
                      debuggable true
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF
          
      - name: Create Resource Files
        run: |
          # Create styles.xml
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">#6200EE</item>
                  <item name="colorPrimaryDark">#3700B3</item>
                  <item name="colorAccent">#03DAC5</item>
              </style>
          </resources>
          EOF
          
          # Create strings.xml
          cat > app/src/main/res/values/strings.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">${{ steps.decode.outputs.app_name }}</string>
          </resources>
          EOF
          
      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.decode.outputs.app_name }}-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          
      - name: Send Repository Dispatch (Completion Signal)
        if: always()
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          STATUS="${{ job.status }}"
          APP_NAME="${{ steps.decode.outputs.app_name }}"
          PACKAGE_NAME="${{ steps.decode.outputs.package_name }}"
          
          if [ -n "$PAT_TOKEN" ]; then
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: Bearer $PAT_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/dispatches \
              -d '{
                "event_type": "build_complete",
                "client_payload": {
                  "status": "'"$STATUS"'",
                  "app_name": "'"$APP_NAME"'",
                  "package_name": "'"$PACKAGE_NAME"'",
                  "build_time": "'$(date)'"
                }
              }' || echo "Failed to send completion signal"
          fi
