name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # مینوئل ٹرگر کے لیے ضروری

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # لیٹسٹ ورژن

      - name: Set up JDK
        uses: actions/setup-java@v4 # لیٹسٹ ورژن
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4 # 'v3' کا ایرر یہاں حل کر دیا گیا ہے
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
