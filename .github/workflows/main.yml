name: System Pro - Absolute AI Logic
on:
  repository_dispatch:
    types: [system_pro_ai_orchestrate]

permissions:
  contents: write

jobs:
  ai-orchestrator:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Deep Context Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Set Up Build Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Gemini AI Code Refactoring
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'EOF'
          import os
          import google.generativeai as genai

          genai.configure(api_key=os.environ["GEMINI_API_KEY"])
          model = genai.GenerativeModel('gemini-pro')

          # ریپوزٹری کا مکمل نقشہ تیار کرنا
          project_files = []
          for root, dirs, files in os.walk("."):
              for file in files:
                  if file.endswith(('.java', '.kt', '.xml', '.gradle')):
                      project_files.append(os.path.join(root, file))

          # Gemini کو سخت ہدایات دینا تاکہ کوئی سنٹیکس غلطی نہ ہو
          prompt = f"""
          Analyze this Android project files: {project_files[:40]}.
          Duty: Refactor everything to package 'com.faisal.systempro' and app name 'System Pro'.
          Constraint 1: NO SYNTAX ERRORS. Ensure all imports match the new directory structure.
          Constraint 2: NO DRINK REFERENCES.
          Constraint 3: Output only a bash script with 'mkdir -p', 'mv', and 'sed' commands.
          """
          
          response = model.generate_content(prompt)
          with open("refactor_engine.sh", "w") as f:
              # صرف کوڈ بلاک نکالنا اگر اے آئی نے مارک ڈاؤن استعمال کیا ہو
              clean_code = response.text.replace('```bash', '').replace('```', '')
              f.write(clean_code)
          EOF

      - name: 4. Pre-Execution Safety Check
        run: |
          if [ -f "refactor_engine.sh" ]; then
            chmod +x refactor_engine.sh
            # خالی لائنوں یا غلط کمانڈز کی صفائی
            sed -i '/^$/d' refactor_engine.sh 
          else
            echo "AI failed to generate script. Aborting to prevent errors."
            exit 1
          fi

      - name: 5. Execute Refactoring & Build
        run: |
          sh refactor_engine.sh
          chmod +x gradlew
          # صرف سنٹیکس چیک کرنے کے لیے (Assemble کے بجائے پہلے compile چیک کرنا)
          ./gradlew compileDebugJavaWithJavac --stacktrace
          ./gradlew assembleDebug

      - name: 6. Push Verified Changes
        run: |
          git config --global user.name "Muzammil-AI"
          git config --global user.email "muzammil@systempro.ai"
          git add .
          git diff-index --quiet HEAD || git commit -m "System Pro: Zero-Error AI Refactoring Completed"
          git push
