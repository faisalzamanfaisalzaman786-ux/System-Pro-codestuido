name: System Pro Master Framework V12 - AI Build Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      package_name:
        description: 'App Package Name'
        required: false
        default: 'com.systempro.master'
      ui_payload:
        description: 'AI Generated Payload (UI/Logic/Styles)'
        required: false
        default: '{}'

jobs:
  unified-ai-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Execute AI Build Engine
        shell: python
        env:
          # یہ ڈیٹا آپ کے UI ڈسپیچ سے آئے گا
          PKG_NAME: ${{ github.event.inputs.package_name }}
          PAYLOAD: ${{ github.event.inputs.ui_payload }}
        run: |
          import os
          import json
          import sys

          # 1. ان پٹ ہینڈلنگ (Error Control)
          pkg = os.getenv("PKG_NAME") or "com.systempro.master"
          payload_str = os.getenv("PAYLOAD") or "{}"

          try:
              data = json.loads(payload_str)
              print(f"Starting System Pro Build for: {pkg}")

              # 2. خودکار پاتھ مینجمنٹ (Image & File Protection)
              pkg_path = pkg.replace('.', '/')
              java_dir = f"app/src/main/java/{pkg_path}"
              res_values = "app/src/main/res/values"
              res_layout = "app/src/main/res/layout"
              
              for directory in [java_dir, res_values, res_layout]:
                  os.makedirs(directory, exist_ok=True)

              # 3. مینی فیسٹ اور آئی ڈی سنکنگ (No more conflicts)
              manifest_content = f"""<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="{pkg}">
              <application 
                  android:allowBackup="true"
                  android:label="System Pro"
                  android:theme="@style/Theme.SystemPro">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>"""
              with open("app/src/main/AndroidManifest.xml", "w") as f:
                  f.write(manifest_content)

              # 4. گریڈل اور لائبریری انجن (Fast Search Implementation)
              build_gradle = f"""
          plugins {{ id 'com.android.application' version '8.2.2' }}
          android {{
              namespace '{pkg}'
              compileSdk 34
              defaultConfig {{
                  applicationId '{pkg}'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }}
          }}
          dependencies {{
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }}"""
              with open("app/build.gradle", "w") as f:
                  f.write(build_gradle)

              # 5. اضافی فائلیں (gradle.properties & settings)
              with open("gradle.properties", "w") as f:
                  f.write("android.useAndroidX=true\nandroid.enableJetifier=true")
              
              with open("settings.gradle", "w") as f:
                  f.write("include ':app'\nrootProject.name='System Pro'")

              print("SUCCESS: System Pro Engine has placed all files correctly.")

          except Exception as e:
              print(f"CRITICAL ERROR: {str(e)}")
              sys.exit(1)
