name: System-Pro-V77-Locked-Engine

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ Setup Gradle 8.5
        run: |
          rm -rf .gradle gradle/ gradlew gradlew.bat
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: 🧠 AI-Logic-Vault (Final Path Fix)
        shell: python
        run: |
          import base64, os, re
          p = ${{ toJson(github.event.client_payload) }}
          pkg = p.get('package_name', 'com.faisal.systempro')
          app_name = p.get('app_name', 'System Pro')
          path = pkg.replace('.', '/')

          def vault_write(file_path, content):
              """مستقل حل: ڈائریکٹری چیکنگ کو محفوظ بنانا"""
              directory = os.path.dirname(file_path)
              # صرف تب فولڈر بنائیں جب راستہ روٹ سے ہٹ کر ہو
              if directory and not os.path.exists(directory):
                  os.makedirs(directory, exist_ok=True)
              with open(file_path, "w", encoding="utf-8") as f:
                  f.write(content.strip())

          # 1. روٹ فائلیں (Locked)
          settings_logic = f"""
          pluginManagement {{ repositories {{ google(); mavenCentral(); gradlePluginPortal(); }} }}
          dependencyResolutionManagement {{ 
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {{ google(); mavenCentral(); }} 
          }}
          rootProject.name = "System-Pro-codestuido"
          include ':app'
          """
          vault_write("settings.gradle", settings_logic)
          vault_write("build.gradle", "buildscript { repositories { google(); mavenCentral(); } dependencies { classpath 'com.android.tools.build:gradle:8.2.0' } }")

          # 2. ایپ ماڈیول (Locked)
          app_gradle = f"""
          apply plugin: 'com.android.application'
          android {{
              namespace '{pkg}'
              compileSdk 34
              defaultConfig {{
                  applicationId "{pkg}"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }}
          }}
          dependencies {{
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }}
          """
          vault_write("app/build.gradle", app_gradle)

          # 3. کوڈ انجکشن
          java_raw = p.get('java_b64', '')
          if java_raw:
              raw_data = java_raw.split(",")[1] if "," in java_raw else java_raw
              java_code = base64.b64decode(raw_data).decode('utf-8', errors='ignore')
              java_code = re.sub(r'package\s+[\w.]+;', f'package {pkg};', java_code)
              vault_write(f"app/src/main/java/{path}/MainActivity.java", java_code)

          # 4. مینی فیسٹ اور ریسورسز
          manifest = f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="@string/app_name" android:theme="@style/Theme.SystemPro"><activity android:name="{pkg}.MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>'
          vault_write("app/src/main/AndroidManifest.xml", manifest)
          vault_write("app/src/main/res/values/strings.xml", f'<resources><string name="app_name">{app_name}</string></resources>')
          vault_write("app/src/main/res/values/themes.xml", '<resources><style name="Theme.SystemPro" parent="Theme.MaterialComponents.DayNight.NoActionBar"/></resources>')

      - name: 🚀 Execute Build
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-Stable-V77
          path: app/build/outputs/apk/debug/*.apk
