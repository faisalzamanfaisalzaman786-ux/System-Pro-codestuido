name: System-Pro-AI-Engine

on:
  repository_dispatch:
    types: [build-app]
  push:
    branches: [main]

jobs:
  System-Pro-Build-Job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🛠️ 1. Setup Environment
        uses: actions/checkout@v4

      - name: ☕ 2. Java Configuration
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ 3. Assembly
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          mkdir -p "app/src/main/java/$PKG_PATH" "app/src/main/res/layout"
          
          cat <<'EOF' > "app/src/main/java/$PKG_PATH/MainActivity.java"
          ${{ github.event.client_payload.java }}
          EOF
          
          cat <<'EOF' > "app/src/main/res/layout/activity_main.xml"
          ${{ github.event.client_payload.xml }}
          EOF
          
          echo "include ':app'" > settings.gradle
          
          # Stable Buildscript
          cat <<EOF > build.gradle
          buildscript { 
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { 
            namespace '$PKG_NAME'
            compileSdk 34
            defaultConfig { 
              applicationId '$PKG_NAME'
              minSdk 24
              targetSdk 34
              versionCode 1
              versionName "1.0"
            }
          }
          dependencies { 
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.9.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: 🚀 4. Smart Build
        id: build_step
        continue-on-error: true
        run: |
          # Force a stable Gradle version to avoid 9.4.1 issues
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon > build_log.txt 2>&1

      - name: 🧠 5. AI Auto-Repair
        if: steps.build_step.outcome == 'failure'
        env:
          AI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Analyzing Error Logs..."
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          # Capture more specific error info
          ERROR_LOG=$(grep -A 20 "error:" build_log.txt | jq -sRr @json)
          if [ "$ERROR_LOG" == "null" ] || [ -z "$ERROR_LOG" ]; then
            ERROR_LOG=$(tail -n 50 build_log.txt | jq -sRr @json)
          fi

          JAVA_CODE=$(cat "app/src/main/java/$PKG_PATH/MainActivity.java" | jq -sRr @json)
          XML_CODE=$(cat "app/src/main/res/layout/activity_main.xml" | jq -sRr @json)

          PROMPT="Fix this Android build error: $ERROR_LOG. Provide only the corrected code for MainActivity.java inside [JAVA_FIX]...[JAVA_END] and activity_main.xml inside [XML_FIX]...[XML_END]. Do not include any drinks or ads. Just the logic."
          
          JSON_DATA=$(jq -n --arg p "$PROMPT" '{contents: [{parts: [{text: $p}]}]}')
          
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$AI_KEY" \
            -H 'Content-Type: application/json' \
            -d "$JSON_DATA")

          AI_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [[ "$AI_TEXT" == *"[JAVA_FIX]"* ]]; then
            echo "AI Fix found. Re-applying..."
            echo "$AI_TEXT" | sed -n '/\[JAVA_FIX\]/,/\[JAVA_END\]/p' | sed 's/\[JAVA_FIX\]//;s/\[JAVA_END\]//' > "app/src/main/java/$PKG_PATH/MainActivity.java"
            echo "$AI_TEXT" | sed -n '/\[XML_FIX\]/,/\[XML_END\]/p' | sed 's/\[XML_FIX\]//;s/\[XML_END\]//' > "app/src/main/res/layout/activity_main.xml"
            ./gradlew assembleDebug --no-daemon
          else
            echo "AI could not find a fix. Check your GEMINI_API_KEY and Prompt."
            exit 1
          fi

      - name: 📦 6. Final Export
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-Build
          path: app/build/outputs/apk/debug/*.apk
