name: System-Pro-V165-Absolute-Fix

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: AI Pre-Build Manager
        shell: python
        run: |
          import base64, os, re, time
          print("🧠 AI Sovereign: Resolving Version Conflicts...")
          
          p = ${{ toJson(github.event.client_payload) }}
          pkg = p.get('package_name', 'com.system.pro')
          app_name = p.get('app_name', 'System Pro')
          java_path = pkg.replace('.', '/')

          def safe_write(path, content, binary=False):
              directory = os.path.dirname(path)
              if directory: os.makedirs(directory, exist_ok=True)
              with open(path, "wb" if binary else "w") as f:
                  f.write(content)

          # 1. جدید گریڈل سنٹیکس (Avoiding 'module' error)
          # ہم یہاں 'implementation' کو سادہ سٹرنگ کے طور پر لکھ رہے ہیں جو ہر ورژن پر چلے گی
          gradle_latest = f"""
          plugins {{
              id 'com.android.application'
          }}
          android {{
              namespace '{pkg}'
              compileSdk 35
              defaultConfig {{
                  applicationId '{pkg}'
                  minSdk 26
                  targetSdk 35
              }}
          }}
          dependencies {{
              implementation "androidx.appcompat:appcompat:1.7.0"
              implementation "com.google.android.material:material:1.12.0"
          }}
          """
          safe_write("app/build.gradle", gradle_latest)
          safe_write("settings.gradle", "include ':app'")

          # 2. سیلف ہیلنگ برین انجکشن
          java_raw = p.get('java_b64', '')
          if "," in java_raw: java_raw = java_raw.split(",")[1]
          java_code = base64.b64decode(java_raw).decode('utf-8') if java_raw else "public class MainActivity extends androidx.appcompat.app.AppCompatActivity {}"
          
          healing_code = """
          private void startSelfHealing() {
              android.widget.Toast.makeText(this, "System Pro: AI Healing Active", 1).show();
          }
          """
          if "onCreate" in java_code:
              java_code = java_code.replace("super.onCreate(savedInstanceState);", "super.onCreate(savedInstanceState); startSelfHealing();")
              java_code = java_code.rstrip().rstrip('}') + "\n" + healing_code + "\n}"
          
          java_code = re.sub(r'package\s+[\w.]+;', f'package {pkg};', java_code)
          safe_write(f"app/src/main/java/{java_path}/MainActivity.java", java_code)
          
          # 3. مینی فیسٹ
          manifest = f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="{app_name}" android:theme="@style/Theme.Material3.DayNight.NoActionBar"><activity android:name="{pkg}.MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter></activity></application></manifest>'
          safe_write("app/src/main/AndroidManifest.xml", manifest)

      - name: Build with Environment Gradle
        run: |
          # ہم کسی خاص ورژن کو فورس نہیں کریں گے، جو سسٹم میں ہے وہی استعمال ہوگا
          # بس سنٹیکس ہم نے ایسا کر دیا ہے کہ ایرر نہ آئے
          gradle assembleDebug --no-daemon

      - name: Export Final APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-Stable-V165
          path: app/build/outputs/apk/debug/*.apk
