name: System-Pro-V77-Auto-Pilot

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch: # مینوئل رن کے لیے آپشن

jobs:
  auto_manage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # تمام ہسٹری کے لیے

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ AI-Self-Correction (The Locked Standard)
        shell: python
        run: |
          import os
          # گریڈل 8.5 کی ضروری فائلوں کو فزیکلی ریپوزٹری میں فکس کرنا
          def force_write(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True) if os.path.dirname(path) else None
              with open(path, "w") as f: f.write(content.strip())

          # 1. فکسڈ روٹ فائلز (اب کبھی فیل نہیں ہوں گی)
          force_write("settings.gradle", "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal(); } }\ndependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral(); } }\nrootProject.name='System-Pro-codestuido'\ninclude ':app'")
          
          force_write("build.gradle", "buildscript { repositories { google(); mavenCentral(); } dependencies { classpath 'com.android.tools.build:gradle:8.2.0' } }\nallprojects { repositories { google(); mavenCentral(); } }")

          # 2. ایپ ماڈیول اسٹرکچر
          pkg = "${{ github.event.client_payload.package_name }}" or "com.faisal.systempro"
          app_gradle = f"apply plugin: 'com.android.application'\nandroid {{ namespace '{pkg}'; compileSdk 34; defaultConfig {{ applicationId '{pkg}'; minSdk 21; targetSdk 34; versionCode 1; versionName '1.0' }} }}\ndependencies {{ implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }}"
          force_write("app/build.gradle", app_gradle)

      - name: 🚀 Execute Build & Monitor
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: 💾 Delivery
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-Stable
          path: app/build/outputs/apk/debug/*.apk
