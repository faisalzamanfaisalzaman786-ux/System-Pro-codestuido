name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # دستی طور پر رن کرنے کا آپشن

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # تمام ہسٹری نکالنے کے لیے تاکہ کوئی کنفلکٹ نہ آئے

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Deep Clean Build Data
        run: |
          chmod +x gradlew
          ./gradlew clean # پرانے بلڈ ڈیٹا کی مکمل صفائی

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error # اگر APK نہ بنے تو ایرر دکھائے
