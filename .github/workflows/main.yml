name: System-Pro-AI-Engine-v2

on:
  repository_dispatch:
    types: [build-app]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  System-Pro-Build-Job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 🛠️ 1. Setup Environment
        uses: actions/checkout@v4

      - name: ☕ 2. Java 17 Setup
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 3. Smart Engine (V9.8 Crash Guard)
        shell: python
        run: |
          import os, re, json
          
          raw_payload = r"""${{ toJson(github.event.client_payload) }}"""
          payload = json.loads(raw_payload, strict=False) if raw_payload != "null" else {}

          pkg_name = payload.get("package_name", "com.faisal.systempro")
          java_code = payload.get("java", "// System Pro Active")
          xml_code = payload.get("xml", "").strip()

          pkg_path = pkg_name.replace('.', '/')
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)

          # --- 1. Comprehensive Strings Fix ---
          # ایپ کے نام اور دیگر ضروری ویلیوز کا اندراج
          with open("app/src/main/res/values/strings.xml", "w") as f:
              f.write('<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">System Pro</string><string name="action_settings">Settings</string></resources>')

          # --- 2. Intelligent Layout Synthesis ---
          found_layouts = set(re.findall(r'R\.layout\.(\w+)', java_code))
          for layout in found_layouts:
              if layout == "activity_main" and xml_code:
                  content = xml_code
              else:
                  # اگر کوئی ڈائیلاگ یا دوسرا لے آؤٹ مسنگ ہو تو اسے کریش سے بچانے کے لیے کم از کم ایک ویو دیں
                  content = '<?xml version="1.0" encoding="utf-8"?><LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" android:id="@+id/root_container"></LinearLayout>'
              with open(f"app/src/main/res/layout/{layout}.xml", "w") as f: f.write(content)

          # --- 3. View Mocking (The Anti-Crash Secret) ---
          # جاوا کوڈ میں موجود تمام IDs کو تلاش کریں
          java_ids = set(re.findall(r'R\.id\.(\w+)', java_code))
          
          # activity_main.xml میں ان تمام IDs کے لیے پوشیدہ (Gone) ویوز بنانا
          with open("app/src/main/res/layout/activity_main.xml", "r") as f: main_xml = f.read()
          
          # کریش روکنے کے لیے: اگر کوڈ میں کوئی ID استعمال ہوئی ہے لیکن XML میں نہیں ہے، تو اسے یہاں ڈالیں
          id_mocks = ""
          for jid in java_ids:
              if f'android:id="@+id/{jid}"' not in main_xml:
                  id_mocks += f'\n    <View android:id="@+id/{jid}" android:layout_width="0dp" android:layout_height="0dp" android:visibility="gone" />'
          
          if "</RelativeLayout>" in main_xml: updated_xml = main_xml.replace("</RelativeLayout>", f"{id_mocks}\n</RelativeLayout>")
          elif "</LinearLayout>" in main_xml: updated_xml = main_xml.replace("</LinearLayout>", f"{id_mocks}\n</LinearLayout>")
          else: updated_xml = main_xml # Fallback if structure is odd

          with open("app/src/main/res/layout/activity_main.xml", "w") as f: f.write(updated_xml)

          # --- 4. Robust Style Recovery ---
          found_styles = set(re.findall(r'style/(\w+)', updated_xml))
          styles_xml = '<?xml version="1.0" encoding="utf-8"?><resources>\n'
          styles_xml += '    <style name="Theme.SystemPro" parent="Theme.AppCompat.DayNight.NoActionBar"></style>\n'
          for style in found_styles:
              styles_xml += f'    <style name="{style}" parent="Widget.AppCompat.Button"><item name="android:textAllCaps">false</item></style>\n'
          styles_xml += '</resources>'
          with open("app/src/main/res/values/styles.xml", "w") as f: f.write(styles_xml)

          # --- 5. Code Persistence ---
          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w", encoding="utf-8") as f: f.write(java_code)
          with open("app/src/main/AndroidManifest.xml", "w") as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="@string/app_name" android:theme="@style/Theme.SystemPro"><activity android:name="{pkg_name}.MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')

      - name: 🚀 4. Build APK (Direct Version Lock)
        run: |
          printf "android.useAndroidX=true\nandroid.enableJetifier=true\n" > gradle.properties
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { 
              namespace '${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}'
              compileSdk 34
              defaultConfig { minSdk 24; targetSdk 34; versionCode 1; versionName "9.8" }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF
          wget https://services.gradle.org/distributions/gradle-8.5-bin.zip -P /tmp
          sudo unzip -d /opt/gradle /tmp/gradle-8.5-bin.zip
          export PATH=$PATH:/opt/gradle/gradle-8.5/bin
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: 📦 5. Export
        if: always()
        run: |
          mkdir -p final_zip
          find . -name "*.apk" -type f -exec cp {} final_zip/SystemPro_V9_8.apk \;

      - name: 📤 6. Deployment
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Stable-Build
          path: final_zip/
