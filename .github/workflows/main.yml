name: System-Pro-V65-Autonomous-Engine
on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write # ریپوزٹری میں ڈیٹا سیو کرنے کے لیے ضروری ہے

jobs:
  AI-Architect-Build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout Knowledge Base
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup Environment (Java 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🧠 AI Analysis & Resource Discovery
        shell: bash
        run: |
          # فولڈر اسٹرکچر تیار کرنا
          mkdir -p .ai_knowledge_base/styles
          mkdir -p .ai_knowledge_base/libraries
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/java/$(echo "${{ github.event.client_payload.package_name }}" | tr '.' '/')

          # پے لوڈ کو ڈی کوڈ کرنا
          echo "${{ github.event.client_payload.java_b64 }}" | base64 --decode > "app/src/main/java/$(echo "${{ github.event.client_payload.package_name }}" | tr '.' '/执/MainActivity.java"
          echo "${{ github.event.client_payload.xml_b64 }}" | base64 --decode > "app/src/main/res/layout/activity_main.xml"
          echo "${{ github.event.client_payload.manifest_b64 }}" | base64 --decode > "app/src/main/AndroidManifest.xml"

          # 🚀 AI SEARCH & GENERATION LOGIC
          python3 -c "
          import re, os
          xml_content = open('app/src/main/res/layout/activity_main.xml').read()
          
          # 1. اسٹائلز کی تلاش (Styles Scanner)
          required_styles = re.findall(r'@style/(\w+)', xml_content)
          
          # 2. نالج بیس سے پرانے اسٹائلز لوڈ کرنا
          kb_path = '.ai_knowledge_base/styles/master_styles.xml'
          existing_content = open(kb_path).read() if os.path.exists(kb_path) else '<resources>\n</resources>'
          
          # 3. نئے اسٹائلز جنریٹ کرنا (For Games/Calculators)
          new_styles = ''
          for style in set(required_styles):
              if style not in existing_content:
                  print(f'AI: Generating new logic for {style}')
                  new_styles += f'    <style name=\"{style}\" parent=\"Widget.MaterialComponents.Button\">\n'
                  new_styles += f'        <item name=\"android:insetTop\">0dp</item>\n'
                  new_styles += f'        <item name=\"android:insetBottom\">0dp</item>\n'
                  new_styles += f'        <item name=\"cornerRadius\">8dp</item>\n'
                  new_styles += f'    </style>\n'
          
          # فائل اپ ڈیٹ کرنا
          final_styles = existing_content.replace('</resources>', new_styles + '</resources>')
          with open('app/src/main/res/values/styles.xml', 'w') as f: f.write(final_styles)
          with open(kb_path, 'w') as f: f.write(final_styles)
          "

      - name: 🏗️ Smart Build Configuration
        run: |
          # AndroidX اور Jetifier سیٹ اپ
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle
          
          # خودکار گریڈل اسکرپٹ (Calculators & Games Support)
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace '${{ github.event.client_payload.package_name }}'
              compileSdk 34
              defaultConfig {
                  applicationId '${{ github.event.client_payload.package_name }}'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              // AI can inject more libraries here based on search
          }
          EOF
          
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --quiet

      - name: 💾 AI Persistent Learning (Sync to Repo)
        if: always()
        run: |
          git config --global user.name "System-Pro-AI"
          git config --global user.email "ai-engine@systempro.pk"
          git add .ai_knowledge_base/
          git commit -m "AI Intelligence Update: Build #${{ github.run_number }} [Learned New Resources]" || exit 0
          git push origin main

      - name: 📤 APK Delivery
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Build-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
