name: System Pro Native APK Builder

on:
  # یہ حصہ آپ کی ایپ اور گٹ ہب ویب سائٹ دونوں سے مینوئل ٹرگر کی اجازت دیتا ہے
  workflow_dispatch:
    inputs:
      build_variant:
        description: 'Build Type'
        required: false
        default: 'debug'

  # کوڈ پش ہونے پر خودکار چیکنگ کے لیے
  push:
    branches:
      - main
      - master

jobs:
  build_native_app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        # یہ کمانڈ آپ کے فراہم کردہ سٹرکچر کے مطابق APK تیار کرے گی
        run: ./gradlew assembleDebug

      - name: Generate Build Logs
        if: always()
        run: |
          mkdir -p build_logs
          echo "Build Date: $(date)" > build_logs/status.txt
          echo "Runner: ${{ runner.os }}" >> build_logs/status.txt
          ls -R app/build/outputs/apk/ >> build_logs/status.txt

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Release
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs
          path: build_logs/
