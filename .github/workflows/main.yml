name: System-Pro-V62-Engine
on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  Build-Binary:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout Knowledge Base
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # کیش ہٹا دیا گیا ہے تاکہ خالی ریپوزٹری پر ایرر نہ آئے

      - name: 🧠 AI Analysis & Resource Discovery
        shell: bash
        run: |
          mkdir -p .ai_knowledge_base/styles
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          PKG_PATH=$(echo "${{ github.event.client_payload.package_name }}" | tr '.' '/')
          mkdir -p "app/src/main/java/$PKG_PATH"

          echo "${{ github.event.client_payload.java_b64 }}" | base64 --decode > "app/src/main/java/$PKG_PATH/MainActivity.java"
          echo "${{ github.event.client_payload.xml_b64 }}" | base64 --decode > "app/src/main/res/layout/activity_main.xml"
          echo "${{ github.event.client_payload.manifest_b64 }}" | base64 --decode > "app/src/main/AndroidManifest.xml"

          python3 -c "
          import re, os
          xml_content = open('app/src/main/res/layout/activity_main.xml').read()
          required_styles = re.findall(r'@style/(\w+)', xml_content)
          
          kb_path = '.ai_knowledge_base/styles/master_styles.xml'
          if not os.path.exists(kb_path):
              with open(kb_path, 'w') as f: f.write('<resources>\n</resources>')
          
          existing_content = open(kb_path).read()
          new_entries = ''
          
          for style in set(required_styles):
              if f'name=\"{style}\"' not in existing_content:
                  new_entries += f'    <style name=\"{style}\" parent=\"Widget.MaterialComponents.Button\">\n'
                  new_entries += f'        <item name=\"android:layout_width\">wrap_content</item>\n'
                  new_entries += f'        <item name=\"android:layout_height\">wrap_content</item>\n'
                  new_entries += f'    </style>\n'
          
          final_styles = existing_content.replace('</resources>', new_entries + '</resources>')
          with open('app/src/main/res/values/styles.xml', 'w') as f: f.write(final_styles)
          with open(kb_path, 'w') as f: f.write(final_styles)
          "

          echo "<resources><string name='app_name'>${{ github.event.client_payload.app_name }}</string></resources>" > app/src/main/res/values/strings.xml

      - name: 🏗️ Smart Build Configuration
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace '${{ github.event.client_payload.package_name }}'
              compileSdk 34
              defaultConfig {
                  applicationId '${{ github.event.client_payload.package_name }}'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF
          
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --quiet

      - name: 💾 AI Persistent Learning (Sync to Repo)
        if: always()
        run: |
          git config --global user.name "System-Pro-AI"
          git config --global user.email "ai-engine@systempro.pk"
          
          if [ -d ".ai_knowledge_base" ] && [ -n "$(git status --porcelain .ai_knowledge_base)" ]; then
            git add .ai_knowledge_base/
            git commit -m "AI Intelligence Update: Build #${{ github.run_number }}"
            git push origin main
          fi

      - name: 📤 Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Build
          path: app/build/outputs/apk/debug/*.apk
