name: System-Pro-V77-Starter

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  workflows: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ Initialize Clean Structure
        run: |
          rm -rf .gradle gradle/ gradlew gradlew.bat
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          # مینوئل پاتھ فکسنگ تاکہ کوئی فائل مس نہ ہو
          mkdir -p app/src/main/res/values/
          echo '<resources><style name="Theme.SystemPro" parent="Theme.MaterialComponents.DayNight.NoActionBar"/></resources>' > app/src/main/res/values/themes.xml

      - name: 🚀 First Green Build
        run: ./gradlew help # یہ صرف چیک کرے گا کہ گریڈل سیٹ اپ صحیح ہے یا نہیں
