      - name: 🧬 AI Hybrid Engine (First-Time & Payload Sync)
        shell: python
        run: |
          import os, json, re, base64, shutil, urllib.request

          # پے لوڈ حاصل کرنا
          event_path = os.getenv('GITHUB_EVENT_PATH')
          with open(event_path, 'r') as f:
              event_data = json.load(f)
          payload = event_data.get('client_payload', {})

          target_pkg = payload.get('target_package', 'com.system.pro').strip()
          pkg_path = target_pkg.replace('.', '/')
          res_folders = ['mipmap-mdpi', 'mipmap-hdpi', 'mipmap-xhdpi', 'mipmap-xxhdpi']

          # 1. URL Icon Logic (ماسٹر ڈیفالٹ لنک)
          # یہاں آپ اپنا کوئی بھی مستقل امیج لنک ڈال سکتے ہیں
          default_icon_url = "https://raw.githubusercontent.com/faisalzaman/System-Pro-codestuido/main/templates/app_icon.png" 
          icon_url = payload.get('icon_url', default_icon_url)
          
          icon_success = False
          if icon_url and icon_url.startswith('http'):
              try:
                  urllib.request.urlretrieve(icon_url, 'temp_icon.png')
                  for folder in res_folders:
                      dest_dir = f'app/src/main/res/{folder}'
                      os.makedirs(dest_dir, exist_ok=True)
                      shutil.copy('temp_icon.png', f'{dest_dir}/ic_launcher.png')
                  icon_success = True
                  print("AI: Icon synced via URL.")
              except:
                  print("AI: URL failed, checking local template...")

          # 2. Local Fallback (اگر لنک کام نہ کرے تو ٹیمپلیٹ سے اٹھائے)
          if not icon_success and os.path.exists('templates/app_icon.png'):
              for folder in res_folders:
                  os.makedirs(f'app/src/main/res/{folder}', exist_ok=True)
                  shutil.copy('templates/app_icon.png', f'app/src/main/res/{folder}/ic_launcher.png')
              icon_success = True

          # 3. Java, XML & Manifest Merger
          # یہ فنکشن پے لوڈ کو چیک کرے گا، اگر خالی ہوا تو ٹیمپلیٹ فائل سے ڈیٹا لے گا
          def get_valid_code(file_path, payload_key, fallback_text):
              if os.path.exists(file_path) and os.path.getsize(file_path) > 10:
                  with open(file_path, 'r') as f: return f.read()
              return payload.get(payload_key, fallback_text)

          java_content = get_valid_code('templates/app_logic.java', 'java_code', f"package {target_pkg};\nimport android.os.Bundle;\nimport androidx.appcompat.app.AppCompatActivity;\npublic class MainActivity extends AppCompatActivity {{ @Override protected void onCreate(Bundle savedInstanceState) {{ super.onCreate(savedInstanceState); setContentView(R.layout.activity_main); }} }}")
          java_content = re.sub(r'^package\s+[\w\.]+;', f'package {target_pkg};', java_content.strip())

          xml_content = get_valid_code('templates/app_ui.xml', 'xml_code', '<?xml version="1.0" encoding="utf-8"?><RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000000"><TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="System Pro Ready" android:textColor="#00FF00" android:layout_centerInParent="true" /></RelativeLayout>')

          # فائلیں لکھنا (Fresh Build کے لیے)
          java_dir = f'app/src/main/java/{pkg_path}'
          os.makedirs(java_dir, exist_ok=True)
          with open(f'{java_dir}/MainActivity.java', 'w', encoding='utf-8') as f: f.write(java_content)
          with open('app/src/main/res/layout/activity_main.xml', 'w', encoding='utf-8') as f: f.write(xml_content)
          
          # مینی فیسٹ مینوئل لکھنا تاکہ کوئی غلطی نہ ہو
          with open('app/src/main/AndroidManifest.xml', 'w', encoding='utf-8') as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="System Pro" android:theme="@style/Theme.AppCompat" android:icon="@mipmap/ic_launcher"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')

          with open('env_vars.sh', 'w') as f: f.write(f"export TARGET_PKG='{target_pkg}'")
