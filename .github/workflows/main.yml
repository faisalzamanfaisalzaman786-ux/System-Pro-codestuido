name: System Pro Manual Logger

on:
  # مینوئلی بٹن کے ذریعے چلانے کے لیے
  workflow_dispatch:
    inputs:
      log_level:
        description: 'Log detail level'
        required: true
        default: 'full'
  
  # فائل پش کرتے ہی چیک کرنے کے لیے (عارضی طور پر)
  push:
    branches:
      - main
      - master

jobs:
  debug_and_setup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create System Info Log
        run: |
          mkdir -p logs
          {
            echo "--- Workflow Triggered Manually ---"
            echo "Date: $(date)"
            echo "Runner OS: ${{ runner.os }}"
            echo "--- System Details ---"
            uname -a
            echo "--- Java Version ---"
            java -version
            echo "--- Android SDK Info ---"
            echo "ANDROID_HOME: $ANDROID_HOME"
            echo "--- Directory Structure ---"
            ls -R
          } > logs/full_system_report.txt

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: Native-Build-Report
          path: logs/full_system_report.txt
          retention-days: 1
