name: System Pro Ultimate Remote Builder

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      project_name:
        description: 'پروجیکٹ کا نام'
        required: true
        default: 'SystemProApp'

jobs:
  build-engine:
    runs-on: ubuntu-latest
    
    steps:
      # 1. کوڈ حاصل کریں (اسے سب سے پہلے ہونا چاہیے)
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. جاوا سیٹ اپ (بغیر کیشے کے تاکہ ایرر ختم ہو)
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # ہم نے cache ہٹا دیا ہے تاکہ "No file matched" کا ایرر نہ آئے
          overwrite-settings: true

      # 3. اینڈرائیڈ SDK سیٹ اپ
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4. چیک کریں کہ فائلیں موجود ہیں (ڈیبگنگ کے لیے)
      - name: Verify Repository Content
        run: ls -R

      # 5. اگر 'gradlew' نہیں ہے تو اسے جنریٹ کریں
      - name: Ensure Gradle Wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            echo "gradlew نہیں ملا، نیا جنریٹ کیا جا رہا ہے..."
            gradle wrapper
          fi
          chmod +x gradlew

      # 6. بلڈ پراسیس
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace
        continue-on-error: false 

      # 7. آرٹیکٹ اپ لوڈ (کامیابی کی صورت میں)
      - name: Upload Build Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.project_name }}-Release
          path: "**/*.apk" # یہ تمام فولڈرز میں APK ڈھونڈے گا
