name: System-Pro-AI-Engine

on:
  repository_dispatch:
    types: [build-app]
  push:
    branches: [main]

jobs:
  System-Pro-Build-Job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🛠️ 1. Setup Environment
        uses: actions/checkout@v4

      - name: ☕ 2. Java Configuration
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ 3. Assembly
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          mkdir -p "app/src/main/java/$PKG_PATH" "app/src/main/res/layout"
          printf "%s" "${{ github.event.client_payload.java }}" > "app/src/main/java/$PKG_PATH/MainActivity.java"
          printf "%s" "${{ github.event.client_payload.xml }}" > "app/src/main/res/layout/activity_main.xml"
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace '$PKG_NAME'; compileSdk 34; defaultConfig { applicationId '$PKG_NAME'; minSdk 24; targetSdk 34 } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }
          EOF

      - name: 🚀 4. Smart Build
        id: build_step
        continue-on-error: true
        run: |
          if [ ! -f gradlew ]; then gradle wrapper --gradle-version 8.5; fi
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon > build_log.txt 2>&1

      - name: 🧠 5. AI Auto-Repair
        if: steps.build_step.outcome == 'failure'
        env:
          AI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Analyzing with System Pro AI..."
          PKG_PATH=$(echo "${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}" | tr '.' '/')
          ERROR_LOG=$(tail -n 40 build_log.txt | jq -sRr @json)
          JAVA_CODE=$(cat "app/src/main/java/$PKG_PATH/MainActivity.java" | jq -sRr @json)
          XML_CODE=$(cat "app/src/main/res/layout/activity_main.xml" | jq -sRr @json)

          PROMPT="Fix Android build error: $ERROR_LOG. Files: Java: $JAVA_CODE, XML: $XML_CODE. Rules: Provide fixed code between [JAVA_FIX] code [JAVA_END] and [XML_FIX] code [XML_END]. No talk."
          
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$AI_KEY" \
            -H 'Content-Type: application/json' \
            -d "{\"contents\": [{\"parts\":[{\"text\": \"$PROMPT\"}]}]}")

          AI_TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')

          if [[ "$AI_TEXT" == *"[JAVA_FIX]"* ]]; then
            echo "AI Fix found. Repairing..."
            echo "$AI_TEXT" | sed -n '/\[JAVA_FIX\]/,/\[JAVA_END\]/p' | sed 's/\[JAVA_FIX\]//;s/\[JAVA_END\]//' > "app/src/main/java/$PKG_PATH/MainActivity.java"
            echo "$AI_TEXT" | sed -n '/\[XML_FIX\]/,/\[XML_END\]/p' | sed 's/\[XML_FIX\]//;s/\[XML_END\]//' > "app/src/main/res/layout/activity_main.xml"
            ./gradlew assembleDebug --no-daemon
          else
            echo "AI failed. Response: $AI_TEXT"
            exit 1
          fi

      - name: 📦 6. Final Export
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-Build
          path: app/build/outputs/apk/debug/*.apk
