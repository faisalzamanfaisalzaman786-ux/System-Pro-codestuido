name: System Pro APK Generator

on:
  push:
    branches: [ main ]
  workflow_dispatch: # آپ اسے مینوئلی بھی چلا سکتے ہیں

jobs:
  build_native_apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: '34'
          build-tools: '34.0.0'

      - name: Initialize Gradle Wrapper
        # چونکہ ہم نے پچھلے سٹیپ میں گریڈل نہیں ڈالا تھا، یہ سٹیپ اسے خود بنائے گا
        run: gradle wrapper --gradle-version 8.1

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Native-App
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 5