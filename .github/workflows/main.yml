name: System-Pro-V95-Ultimate-Auto-Path

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: AI-Path-Scanner-and-Processor
        shell: python
        run: |
          import base64, os, re
          p = ${{ toJson(github.event.client_payload) }}
          pkg = p.get('package_name', 'com.system.pro')
          app_name = p.get('app_name', 'System Pro')
          
          # آٹو پاتھ میپنگ: یہ سسٹم خود راستہ تلاش کرے گا
          java_path = pkg.replace('.', '/')
          base_dir = "app/src/main/java/" + java_path
          res_dir = "app/src/main/res"
          
          def ensure_path(path):
              if not os.path.exists(path):
                  os.makedirs(path, exist_ok=True)

          def safe_write(file_path, content, is_binary=False):
              ensure_path(os.path.dirname(file_path))
              mode = "wb" if is_binary else "w"
              with open(file_path, mode) as f:
                  f.write(content)

          # 1. ریسورسز اور اسٹائلز کی میپنگ
          ensure_path(f"{res_dir}/layout")
          ensure_path(f"{res_dir}/values")
          ensure_path(f"{res_dir}/mipmap-xxxhdpi")

          # 2. خود کار کوڈ ہیلنگ لاجک (Self-Repairing Injection)
          java_b64 = p.get('java_b64', '')
          if "," in java_b64: java_b64 = java_b64.split(",")[1]
          java_code = base64.b64decode(java_b64).decode('utf-8') if java_b64 else "public class MainActivity extends androidx.appcompat.app.AppCompatActivity {}"
          
          # پیکیج نیم کی فورس اپ ڈیٹ
          java_code = re.sub(r'package\s+[\w.]+;', f'package {pkg};', java_code)
          safe_write(f"{base_dir}/MainActivity.java", java_code)

          # 3. مینی فیسٹ اور گریڈل سنک
          manifest = f'''<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:label="{app_name}" android:icon="@mipmap/ic_launcher" android:theme="@style/Theme.AppCompat.DayNight.NoActionBar">
                  <activity android:name="{pkg}.MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>'''
          safe_write("app/src/main/AndroidManifest.xml", manifest)

      - name: Force Gradle Build
        run: |
          # گریڈل انجن کو پاتھ بتانا اور بلڈ شروع کرنا
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload Functional APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-Functional-Build
          path: app/build/outputs/apk/debug/*.apk
