      - name: 🛠️ Setup Repositories & FFmpeg Nuclear Fix
        run: |
          # پروجیکٹ لیول فائل کو درست کرنا
          cat <<EOF > android/build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.1'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://www.jitpack.io' }
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "\${rootProject.buildDir}/\${project.name}"
              project.evaluationDependsOn(':app')
          }
          EOF

          # فائنل حل: FFmpeg پلگ ان کی فائل کے اندر جا کر 6.0-2 کو 6.0 سے بدلنا
          # یہ گریڈل کو مجبور کر دے گا کہ وہ پرانا ورژن مانگے ہی نہ
          flutter pub get
          find . -name "build.gradle" -exec sed -i 's/6.0-2/6.0/g' {} +

          # ایپ لیول گریڈل میں زبردستی سیٹنگز ڈالنا
          cat <<EOF >> android/app/build.gradle
          configurations.all {
              resolutionStrategy {
                  force 'com.arthenica:ffmpeg-kit-full-gpl:6.0'
              }
          }
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdk 35
                          defaultConfig {
                              targetSdk 35
                          }
                      }
                  }
              }
          }
          EOF

          # SDK ورژن کو اپ ڈیٹ کرنا
          sed -i "s/compileSdkVersion .*/compileSdkVersion 35/" android/app/build.gradle
          sed -i "s/targetSdkVersion .*/targetSdkVersion 35/" android/app/build.gradle
          sed -i "s/minSdkVersion .*/minSdkVersion 24/" android/app/build.gradle
          sed -i "/defaultConfig {/i \    namespace \"${{ github.event.inputs.package_name }}\"" android/app/build.gradle
