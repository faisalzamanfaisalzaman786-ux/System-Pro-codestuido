name: System-Pro-AI-Engine-v2

on:
  repository_dispatch:
    types: [build-app]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  System-Pro-Build-Job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 🛠️ 1. Setup Environment
        uses: actions/checkout@v4

      - name: ☕ 2. Java Configuration (LTS 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 3. Smart AI Logic Injection (Self-Healing)
        shell: python
        run: |
          import os, re, json
          
          # Fix for Control Characters: Using strict=False to handle multiline code
          raw_payload = r"""${{ toJson(github.event.client_payload) }}"""
          
          try:
              # پے لوڈ کو محفوظ طریقے سے لوڈ کریں
              if raw_payload and raw_payload != "null":
                  payload = json.loads(raw_payload, strict=False)
              else:
                  payload = {}
          except Exception as e:
              print(f"Payload Error: {e}")
              payload = {}

          pkg_name = payload.get("package_name", "com.faisal.systempro")
          java_code = payload.get("java", "// System Pro Initialized")
          xml_code = payload.get("xml", "")
          
          # No Drinks Policy (سخت پابندی)
          forbidden = ['drink', 'alcohol', 'beer', 'wine', 'ads']
          for word in forbidden:
              java_code = re.sub(word, "SystemProCore", java_code, flags=re.IGNORECASE)

          # Auto-Package Injection
          if java_code and "package" not in java_code:
              java_code = f"package {pkg_name};\n\n" + java_code

          pkg_path = pkg_name.replace('.', '/')
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)

          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w", encoding="utf-8") as f:
              f.write(java_code)
          with open("app/src/main/res/layout/activity_main.xml", "w", encoding="utf-8") as f:
              f.write(xml_code)

          manifest = f'''<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro AI" android:theme="@style/Theme.AppCompat.DayNight.NoActionBar">
                  <activity android:name="{pkg_name}.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>'''
          with open("app/src/main/AndroidManifest.xml", "w") as f: f.write(manifest)

      - name: 🚀 4. Build Engine (Gradle & AndroidX Fix)
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript { 
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } 
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { 
              namespace '$PKG_NAME'
              compileSdk 34
              defaultConfig { applicationId '$PKG_NAME'; minSdk 24; targetSdk 34 }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: 📦 5. Export Output
        if: always()
        run: |
          mkdir -p SystemPro_Output
          find . -name "*.apk" -type f -exec cp {} SystemPro_Output/SystemPro_AI.apk \;

      - name: 📤 6. Deployment
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-AI-Package
          path: SystemPro_Output/SystemPro_AI.apk
