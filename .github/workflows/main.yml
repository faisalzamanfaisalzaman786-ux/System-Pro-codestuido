name: System-Pro-V62-Engine

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Target Package Name'
        required: false
        default: 'com.system.pro'
      app_name:
        description: 'App Display Name'
        required: false
        default: 'System Pro'
      app_icon_base64:
        description: 'Base64 encoded App Icon'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Handle App Icon Logic
        run: |
          mkdir -p app/src/main/res/drawable
          python3 -c "
          import base64
          import os

          b64_data = '${{ github.event.inputs.app_icon_base64 }}'
          target_path = 'app/src/main/res/drawable/ic_launcher.png'
          template_path = 'templates/ic_launcher.png'

          if b64_data and len(b64_data.strip()) > 50:
              try:
                  if ',' in b64_data:
                      b64_data = b64_data.split(',')[1]
                  with open(target_path, 'wb') as f:
                      f.write(base64.b64decode(b64_data))
                  print('Icon from UI applied.')
              except:
                  if os.path.exists(template_path):
                      os.system(f'cp {template_path} {target_path}')
          elif os.path.exists(template_path):
              os.system(f'cp {template_path} {target_path}')
              print('Template icon applied.')
          "

      - name: Dynamic Branding Update
        run: |
          NEW_PKG="${{ github.event.inputs.package_name }}"
          if [ -z "$NEW_PKG" ]; then NEW_PKG="com.system.pro"; fi
          
          # تمام ضروری فائلوں میں پیکیج نیم تبدیل کریں
          find . -maxdepth 4 -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.java" \) -exec sed -i "s/com.system.pro/$NEW_PKG/g" {} +

          APP_NAME="${{ github.event.inputs.app_name }}"
          if [ -z "$APP_NAME" ]; then APP_NAME="System Pro"; fi
          
          # Strings.xml میں نام اپ ڈیٹ کریں
          if [ -f app/src/main/res/values/strings.xml ]; then
            sed -i "s/<string name=\"app_name\">.*<\/string>/<string name=\"app_name\">$APP_NAME<\/string>/g" app/src/main/res/values/strings.xml
          fi

      - name: Build Application
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-V62
          path: app/build/outputs/apk/debug/*.apk
