name: Build Flutter APK (The 36-Hour Final Solution)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
      package_name:
        description: 'Package Name (e.g., com.system.pro)'
        required: true
      app_icon_base64:
        description: 'Base64 of icon image (PNG/JPG)'
        required: false
      dart_code_base64:
        description: 'Base64 of main.dart'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Create Project
        run: |
          find . -maxdepth 1 -not -path '*/.*' -not -name '.' -exec rm -rf {} +
          flutter create --org $(echo ${{ github.event.inputs.package_name }} | cut -d'.' -f1,2) --project-name system_pro_app --platforms android .

      - name: Clean Pubspec
        run: |
          cat <<EOF > pubspec.yaml
          name: system_pro_app
          description: "System Pro Ultimate Recovery"
          publish_to: none
          version: 1.0.0+1
          environment:
            sdk: ">=3.6.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            camera: any
            permission_handler: any
            path_provider: any
            flutter_background_service: any
            flutter_local_notifications: any
            workmanager: any
            video_player: any
            ffmpeg_kit_flutter_full_gpl: 6.0.3-LTS
            image_picker: any
            flutter_webrtc: 1.1.2
            livekit_client: any
            dio: any
            shared_preferences: any
            sqflite: any
            device_info_plus: any
          dev_dependencies:
            flutter_test:
              sdk: flutter
          dependency_overrides:
            path: 1.9.0
            meta: 1.15.0
          flutter:
            uses-material-design: true
          EOF

      - name: Force Android SDK 35 (Stable Environment)
        run: |
          # ہم واپس 35 پر جا رہے ہیں تاکہ ماحول مستحکم رہے
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle
          sed -i 's/JavaVersion.VERSION_1_8/JavaVersion.VERSION_17/g' android/app/build.gradle
          sed -i "/defaultConfig {/i \    namespace \"${{ github.event.inputs.package_name }}\"" android/app/build.gradle

      - name: 🛠️ THE VOODOO FIX (Auto-Patching SurfaceTextureRenderer)
        run: |
          flutter pub get
          # یہ کمانڈ اس خراب جاوا فائل کو تلاش کرے گی اور اس میں missing method ڈال دے گی
          FILE_PATH=$(find /home/runner/.pub-cache -name "SurfaceTextureRenderer.java")
          if [ -f "$FILE_PATH" ]; then
            echo "Patching SurfaceTextureRenderer.java at $FILE_PATH"
            # ایرر ختم کرنے کے لیے میتھڈ کا اضافہ
            sed -i '/public void onSurfaceAvailable/i \            @Override public void onSurfaceDestroyed(SurfaceTexture surface) {}' "$FILE_PATH"
          fi

      - name: Inject Dart Code
        run: |
          echo "${{ github.event.inputs.dart_code_base64 }}" | base64 -d > lib/main.dart

      - name: Final Build APK
        run: |
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Voodoo-Fixed-APK
          path: build/app/outputs/flutter-apk/app-release.apk
