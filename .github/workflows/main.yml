name: System-Pro-V62-Engine
on:
  repository_dispatch:
    types: [build-app]

jobs:
  Build-Binary:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧬 Resource Injection (Base64 Shield)
        shell: bash
        run: |
          APP_NAME="${{ github.event.client_payload.app_name }}"
          PKG_ID="${{ github.event.client_payload.package_name }}"
          PKG_PATH=$(echo "$PKG_ID" | tr '.' '/')

          mkdir -p "app/src/main/java/$PKG_PATH"
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable-xxhdpi
          mkdir -p app/src/main/res/values

          # Decoding UI Payload
          echo "${{ github.event.client_payload.java_b64 }}" | base64 --decode > "app/src/main/java/$PKG_PATH/MainActivity.java"
          echo "${{ github.event.client_payload.xml_b64 }}" | base64 --decode > "app/src/main/res/layout/activity_main.xml"
          echo "${{ github.event.client_payload.manifest_b64 }}" | base64 --decode > "app/src/main/AndroidManifest.xml"

          if [ ! -z "${{ github.event.client_payload.icon_data_b64 }}" ]; then
            echo "${{ github.event.client_payload.icon_data_b64 }}" | base64 --decode > app/src/main/res/drawable-xxhdpi/ic_launcher.png
          fi

          cat <<EOF > app/src/main/res/values/strings.xml
          <resources><string name="app_name">$APP_NAME</string></resources>
          EOF

      - name: 🏗️ Auto-Generate Build Scripts & Gradle Fix
        run: |
          # Create settings.gradle
          echo "include ':app'" > settings.gradle
          
          # Create root build.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # Create app build.gradle
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace '${{ github.event.client_payload.package_name }}'
              compileSdk 34
              defaultConfig {
                  applicationId '${{ github.event.client_payload.package_name }}'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          # 🚀 FIX: Auto-setup Gradle Wrapper if missing
          gradle wrapper --gradle-version 8.5

      - name: 🚀 Execute Production Build
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --quiet

      - name: 📤 Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Build
          path: app/build/outputs/apk/debug/*.apk
