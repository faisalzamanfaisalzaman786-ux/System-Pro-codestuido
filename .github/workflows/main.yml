name: System-Pro-V16-6-Streamlined

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  Self-Healing-Build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Sync
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 Framework Injection Engine (V16.6)
        shell: python
        run: |
          import os, json, re

          # پے لوڈ پروسیسنگ
          try:
              payload_raw = r"""${{ toJson(github.event.client_payload) }}"""
              payload = json.loads(payload_raw) if payload_raw != "null" else {}
          except: payload = {}

          java_code = payload.get("java", "")
          pkg_name = payload.get("package_name", "com.faisal.systempro")
          pkg_path = pkg_name.replace('.', '/')

          # 1. آئی ڈی انجکشن (Streamlining IDs)
          all_ids = list(set(re.findall(r"R\.id\.([a-zA-Z0-9_]+)", java_code)))
          
          # 2. اسمارٹ لے آؤٹ (Nested-Sync Architecture)
          widgets = ""
          for wid in all_ids:
              # ایٹریبیوٹس کو اسٹریم لائن کیا گیا ہے (72dp height, consistent padding)
              if any(x in wid.lower() for x in ["editor", "code", "input", "text"]):
                  widgets += f'<EditText android:id="@+id/{wid}" android:layout_width="match_parent" android:layout_height="320dp" android:background="#FFFFFF" android:gravity="top" android:padding="12dp" android:layout_margin="10dp" android:hint="[Input: {wid}]" android:textColor="#212121" android:elevation="2dp" android:inputType="textMultiLine|textNoSuggestions"/>\n'
              else:
                  widgets += f'<Button android:id="@+id/{wid}" android:layout_width="match_parent" android:layout_height="72dp" android:text="{wid}" android:layout_margin="8dp" android:backgroundTint="#1B4F72" android:textColor="#FFFFFF" android:textSize="17sp" android:elevation="4dp" android:textAllCaps="false"/>\n'

          # 3. انجن فائلز جنریٹ کرنا
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)

          # مین XML جس میں اسٹریم لائننگ انجیکٹڈ ہے
          main_xml = f"""<?xml version="1.0" encoding="utf-8"?>
          <androidx.coordinatorlayout.widget.CoordinatorLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto" android:layout_width="match_parent" android:layout_height="match_parent">
              <androidx.core.widget.NestedScrollView android:layout_width="match_parent" android:layout_height="match_parent" android:fillViewport="true">
                  <LinearLayout android:orientation="vertical" android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="12dp">
                      {widgets}
                  </LinearLayout>
              </androidx.core.widget.NestedScrollView>
          </androidx.coordinatorlayout.widget.CoordinatorLayout>"""

          with open("app/src/main/res/layout/activity_main.xml", "w", encoding='utf-8') as f: f.write(main_xml)
          
          # 4. جاوا میں "Safe-Wrapper" انجیکٹ کرنا (تاکہ کریش نہ ہو)
          if "setContentView" in java_code and "try {" not in java_code:
              java_code = java_code.replace("setContentView", "// Streamlined Injection\ntry { setContentView")
              # ہم فائل کے آخر میں کیچ بلاک ڈالنے کی کوشش کریں گے (بنیادی لیول پر)
          
          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w", encoding='utf-8') as f:
              f.write(java_code)

          # 5. بلڈ سیٹ اپ (Industrial Grade)
          with open("gradle.properties", "w") as f: f.write("android.useAndroidX=true\nandroid.enableJetifier=true\norg.gradle.jvmargs=-Xmx2048m")
          with open("app/build.gradle", "w") as f:
              f.write(f"plugins {{ id 'com.android.application' }}\nandroid {{ namespace '{pkg_name}'\ncompileSdk 34\ndefaultConfig {{ applicationId '{pkg_name}'\nminSdk 24\ntargetSdk 34 }} }}\ndependencies {{ implementation 'androidx.appcompat:appcompat:1.6.1'\nimplementation 'com.google.android.material:material:1.9.0' }}")
          with open("settings.gradle", "w") as f: f.write("include ':app'")
          with open("build.gradle", "w") as f: f.write("buildscript {{ repositories {{ google(); mavenCentral() }}; dependencies {{ classpath 'com.android.tools.build:gradle:8.2.2' }} }}\nallprojects {{ repositories {{ google(); mavenCentral() }} }}")
          with open("app/src/main/AndroidManifest.xml", "w") as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="System Pro Streamlined" android:theme="@style/Theme.MaterialComponents.Light.NoActionBar"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')

      - name: 🏗️ Execute Build & Inject
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 📤 Final Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V16-6-INJECTED
          path: app/build/outputs/apk/debug/*.apk
