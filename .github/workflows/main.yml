name: System Pro Master Framework V12 - AI Build Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      package_name:
        description: 'App Package Name'
        required: false
        default: 'com.systempro.master'
      ui_payload:
        description: 'AI Generated Payload (UI/Logic/Styles)'
        required: false
        default: '{}'

jobs:
  unified-ai-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (For APK Build)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Execute AI Build Engine & File Placement
        shell: python
        env:
          PKG_NAME: ${{ github.event.inputs.package_name }}
          PAYLOAD: ${{ github.event.inputs.ui_payload }}
        run: |
          import os
          import json
          import sys

          pkg = os.getenv("PKG_NAME") or "com.systempro.master"
          payload_str = os.getenv("PAYLOAD") or "{}"

          try:
              # 1. Directory Structure (Auto-Matching)
              pkg_path = pkg.replace('.', '/')
              java_dir = f"app/src/main/java/{pkg_path}"
              res_values = "app/src/main/res/values"
              
              os.makedirs(java_dir, exist_ok=True)
              os.makedirs(res_values, exist_ok=True)

              # 2. Manifest Creation (Conflict Fix)
              manifest = f"""<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="{pkg}">
              <application android:theme="@style/Theme.SystemPro" android:label="System Pro">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>"""
              with open("app/src/main/AndroidManifest.xml", "w") as f: f.write(manifest)

              # 3. Build Gradle (Unified Logic)
              gradle = f"""
          plugins {{ id 'com.android.application' version '8.2.2' }}
          android {{
              namespace '{pkg}'
              compileSdk 34
              defaultConfig {{
                  applicationId '{pkg}'
                  minSdk 24
                  targetSdk 34
              }}
          }}
          dependencies {{
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }}"""
              with open("app/build.gradle", "w") as f: f.write(gradle)

              # 4. Mandatory Files
              with open("settings.gradle", "w") as f: f.write("include ':app'")
              with open("gradle.properties", "w") as f: f.write("android.useAndroidX=true\nandroid.enableJetifier=true")

              print("FILE PLACEMENT SUCCESSFUL")

          except Exception as e:
              print(f"ERROR: {str(e)}")
              sys.exit(1)

      - name: Build APK (Auto-Compile)
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: SystemPro-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
