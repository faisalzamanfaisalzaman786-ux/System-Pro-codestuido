name: System-Pro-V1500-Ultimate-Bypass

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  bypass_sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Checkout Your Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Force Mirror Without Workflow Conflicts
        run: |
          git config --global user.name "System Pro AI"
          git config --global user.email "ai@systempro.com"

          # ان کی ریپوزٹری کو بطور ریموٹ ایڈ کرنا
          git remote add xerox https://github.com/fastlane/fastlane.git
          git fetch xerox master

          # آپ کی ریپوزٹری سے پرانا سارا ڈیٹا صاف کرنا
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +

          # سارا ڈیٹا نکالنا
          git checkout xerox/master -- .
          
          # 🛑 سب سے اہم قدم: ان کا پورا ورک فلو فولڈر جڑ سے اکھاڑ دیں
          # اس سے گٹ ہب کی سیکیورٹی کو کوئی اعتراض نہیں رہے گا
          rm -rf .github/workflows/*
          
          # اب اپنی موجودہ فائل کو واپس لانا (تاکہ یہ ورک فلو چلتا رہے)
          # ہم فرض کر رہے ہیں کہ آپ کی فائل کا نام main.yml ہے
          mkdir -p .github/workflows
          git checkout HEAD -- .github/workflows/main.yml || echo "Workflow file already exists"

          # تبدیلیوں کو محفوظ کر کے زبردستی پش کرنا
          git add -A
          git commit -m "System Pro: Final Success V1500" || echo "No changes"
          git push origin main --force
