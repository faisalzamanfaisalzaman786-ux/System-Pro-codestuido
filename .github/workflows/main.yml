name: System Pro Native APK Builder

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate Gradle Structure
        # یہ کمانڈ چیک کرے گی کہ آیا ضروری فائلیں موجود ہیں
        run: |
          if [ ! -f "settings.gradle" ]; then
            echo "rootProject.name = 'SystemPro'" > settings.gradle
          fi
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew

      - name: Build Debug APK
        # یہاں ہم 'continue-on-error' نہیں کر رہے تاکہ ہمیں اصل وجہ پتہ چلے
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-App
          # ہم پورے آؤٹ پٹ فولڈر کو سرچ کریں گے تاکہ راستہ غلط نہ ہو
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
