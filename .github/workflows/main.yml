name: System-Pro-V62-Direct-APK

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Force JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          check-latest: false # سسٹم کو نیا ورژن ڈھونڈنے سے روک دیا ہے

      - name: Force Gradle 8.5 Setup
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-disabled: true # کسی بھی پرانے کیشے کو استعمال کرنے سے روک دیا ہے

      - name: Create Dynamic Structure (Hardcoded Order)
        run: |
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          
          # Force root settings
          echo "include ':app'" > settings.gradle
          
          # Force Root Build Config
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # Force App Build Config (Namespace & SDK Locked)
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId "${{ github.event.client_payload.package_name || 'com.system.pro' }}"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

      - name: Payload Implementation
        shell: python
        run: |
          import base64, os
          p = ${{ toJson(github.event.client_payload) }}
          def save(key, path):
              data = p.get(key, '')
              if data and len(data) > 10:
                  if "," in data: data = data.split(",")[1]
                  with open(path, "wb") as f: f.write(base64.b64decode(data))

          save('java_b64', "app/src/main/java/com/system/pro/MainActivity.java")
          save('xml_b64', "app/src/main/res/layout/activity_main.xml")
          save('manifest_b64', "app/src/main/AndroidManifest.xml")
          
          icon = p.get('icon_data_b64', '')
          if len(icon) > 50: save('icon_data_b64', "app/src/main/res/drawable/ic_launcher.png")

      - name: Force Build APK
        # ہم نے 'gradlew' کے بجائے براہ راست 'gradle' استعمال کیا ہے جو اوپر لاک (Lock) کیا گیا ہے
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload Forced APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-V62-Forced
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error # اگر فائل نہ بنی تو بلڈ فیل دکھائے تاکہ ہمیں دھوکہ نہ ہو
