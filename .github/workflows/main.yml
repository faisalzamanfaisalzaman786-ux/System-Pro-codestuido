name: System Pro - Master Path Fixer & AI Build
on:
  repository_dispatch:
    types: [system_pro_master_sync]
  workflow_dispatch: # مینوئل رن کے لیے

permissions:
  contents: write

jobs:
  fix-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Full Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Set Up Python & Gemini AI
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 3. Install AI Dependencies
        run: pip install -q -U google-generativeai

      - name: 4. Gemini AI - Intelligent Path Re-Mapping
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'EOF'
          import os
          import google.generativeai as genai

          genai.configure(api_key=os.environ["GEMINI_API_KEY"])
          model = genai.GenerativeModel('gemini-pro')

          # ریپوزٹری کا ڈھانچہ اسکین کرنا
          files = []
          for root, dirs, f_names in os.walk("."):
              for f in f_names:
                  if f.endswith(('.java', '.kt', '.xml', '.gradle', '.json')):
                      files.append(os.path.join(root, f))

          # Gemini کو ہدایات تاکہ وہ پاتھ فکس کرے
          prompt = f"Analyze these files: {files[:30]}. Generate a bash script to: 1. Create directory 'app/src/main/java/com/faisal/systempro'. 2. Move all source files there. 3. Use 'sed' to update ALL package names and imports to 'com.faisal.systempro'. 4. Update 'applicationId' in build.gradle. Output ONLY bash code."
          
          response = model.generate_content(prompt)
          with open("fix_paths.sh", "w") as f:
              clean_script = response.text.replace('```bash', '').replace('```', '')
              f.write(clean_script)
          EOF

      - name: 5. Execute Path Fixes
        run: |
          if [ -f "fix_paths.sh" ]; then
            chmod +x fix_paths.sh
            sh fix_paths.sh
          else
            echo "AI Script not found!" && exit 1
          fi

      - name: 6. Verify and Build APK (Forced Build)
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace --info

      - name: 7. Upload Verified Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V${{ github.run_number }}
          # یہ وائلڈ کارڈ ہر جگہ سے APK تلاش کر لے گا
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
