name: System-Pro-V65-Main-Engine

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: AI-Master-Injector (Applying All Instructions)
        shell: python
        run: |
          import base64, os, re

          # 1. ڈیٹا لوڈ کرنا
          p = ${{ toJson(github.event.client_payload) }}
          pkg = p.get('package_name', 'com.system.pro')
          app_name = p.get('app_name', 'System Pro')
          path = pkg.replace('.', '/')

          # 2. جاوا کوڈ کی صفائی اور انجکشن (Syntax & Package Lock)
          java_raw = p.get('java_b64', '')
          if java_raw:
              if "," in java_raw: java_raw = java_raw.split(",")[1]
              java_code = base64.b64decode(java_raw).decode('utf-8', errors='ignore')
              # اے آئی کے فالتو کمنٹس ہٹانا
              java_code = re.sub(r'```java|```', '', java_code).strip()
              # پیکیج نیم کو خودکار طریقے سے سنک کرنا
              if "package " in java_code:
                  java_code = re.sub(r'package\s+[\w.]+;', f'package {pkg};', java_code)
              else:
                  java_code = f"package {pkg};\n\n" + java_code
              
              # فائل کو فزیکل فولڈر میں محفوظ کرنا
              os.makedirs(f"app/src/main/java/{path}", exist_ok=True)
              with open(f"app/src/main/java/{path}/MainActivity.java", "w") as f:
                  f.write(java_code)

          # 3. XML اور مسنگ اسٹائلز کا علاج (Resource Healer)
          xml_raw = p.get('xml_b64', '')
          if xml_raw:
              if "," in xml_raw: xml_raw = xml_raw.split(",")[1]
              xml_code = base64.b64decode(xml_raw).decode('utf-8', errors='ignore')
              xml_code = re.sub(r'```xml|```', '', xml_code).strip()
              with open("app/src/main/res/layout/activity_main.xml", "w") as f:
                  f.write(xml_code)

              # مسنگ اسٹائلز اور کلرز کو ڈھونڈ کر بنانا
              found_styles = re.findall(r'@style/([\w.]+)', xml_code)
              if found_styles:
                  with open("app/src/main/res/values/styles.xml", "a") as f: # Append mode
                      for s in set(found_styles):
                          if s not in ['AppTheme', 'AppDialogTheme']:
                              f.write(f'\n    <style name="{s}" parent="Widget.MaterialComponents.Button">\n')
                              f.write('        <item name="android:layout_width">wrap_content</item>\n')
                              f.write('        <item name="android:layout_height">wrap_content</item>\n    </style>')

          # 4. ڈائنامک پیکیج سنک (Gradle & Manifest Sync)
          # مینی فیسٹ اپ ڈیٹ
          with open("app/src/main/AndroidManifest.xml", "r") as f:
              m_content = f.read()
          m_content = re.sub(r'android:name="[\w.]+"', f'android:name="{pkg}.MainActivity"', m_content, 1)
          m_content = re.sub(r'android:label=".*"', f'android:label="{app_name}"', m_content, 1)
          with open("app/src/main/AndroidManifest.xml", "w") as f:
              f.write(m_content)

          # گریڈل اپ ڈیٹ
          with open("app/build.gradle", "r") as f:
              g_content = f.read()
          g_content = re.sub(r"namespace\s+'.*'", f"namespace '{pkg}'", g_content)
          g_content = re.sub(r'applicationId\s+".*"', f'applicationId "{pkg}"', g_content)
          with open("app/build.gradle", "w") as f:
              f.write(g_content)

      - name: Build System-Pro APK
        run: gradle assembleDebug --no-daemon

      - name: Upload Success APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-Ready
          path: app/build/outputs/apk/debug/*.apk
