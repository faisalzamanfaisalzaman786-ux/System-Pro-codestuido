name: System-Pro-AI-Engine

on:
  repository_dispatch:
    types: [build-app]
  push:
    branches: [main]

jobs:
  System-Pro-Build-Job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🛠️ 1. Setup Environment
        uses: actions/checkout@v4

      - name: ☕ 2. Java Configuration
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ 3. Initial Assembly (Base64 Secure)
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          mkdir -p "app/src/main/java/$PKG_PATH" "app/src/main/res/layout" "app/src/main/res/values"
          
          # پے لوڈ کو محفوظ طریقے سے ڈیکوڈ کر کے فائلز بنانا
          echo "${{ github.event.client_payload.java }}" | base64 -d > "app/src/main/java/$PKG_PATH/MainActivity.java" || echo "${{ github.event.client_payload.java }}" > "app/src/main/java/$PKG_PATH/MainActivity.java"
          echo "${{ github.event.client_payload.xml }}" | base64 -d > "app/src/main/res/layout/activity_main.xml" || echo "${{ github.event.client_payload.xml }}" > "app/src/main/res/layout/activity_main.xml"

      - name: 🚀 4. Smart Build
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          echo "include ':app'" > settings.gradle
          cat <<'EOF' > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { 
            namespace '$PKG_NAME'
            compileSdk 34
            defaultConfig { applicationId '$PKG_NAME'; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          dependencies { 
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.9.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF
          
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon
          
          # آپ کے فزیکل فولڈر میں فائل کاپی کرنا
          find . -name "*.apk" -type f -exec cp {} SystemPro_Output/SystemPro_v1.apk \;

      - name: 📦 6. Final Export
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-APK
          path: SystemPro_Output/SystemPro_v1.apk
