name: System-Pro-V77-AI-Bank

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏦 AI-Structure-Vault (Folders Initialization)
        run: |
          # بینک اسٹرکچر بنانا تاکہ سسٹم میچور ہو سکے
          mkdir -p .system_pro/bank/syntax
          mkdir -p .system_pro/bank/resources
          mkdir -p .system_pro/bank/libraries
          
          # گریڈل ریکوری
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: 🧠 AI-Project-Manager (Placing Files in Bank)
        shell: python
        run: |
          import base64, os, re
          p = ${{ toJson(github.event.client_payload) }}
          pkg = p.get('package_name', 'com.faisal.systempro')
          path = pkg.replace('.', '/')

          def vault_write(file_path, content, bank_path=None):
              # فائل کو پروجیکٹ میں رکھنا
              os.makedirs(os.path.dirname(file_path), exist_ok=True)
              with open(file_path, "w", encoding="utf-8") as f:
                  f.write(content.strip())
              # فائل کا ایک کاپی بینک میں محفوظ کرنا (Next Time کے لیے)
              if bank_path:
                  os.makedirs(os.path.dirname(bank_path), exist_ok=True)
                  with open(bank_path, "w", encoding="utf-8") as f:
                      f.write(content.strip())

          # --- 1. Syntax Bank Management ---
          settings_logic = f"""
          pluginManagement {{ repositories {{ google(); mavenCentral(); gradlePluginPortal(); }} }}
          dependencyResolutionManagement {{ 
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {{ google(); mavenCentral(); }} 
          }}
          rootProject.name = "System-Pro-codestuido"
          include ':app'
          """
          vault_write("settings.gradle", settings_logic, ".system_pro/bank/syntax/settings.bak")

          # --- 2. Resource Bank (Themes & Colors) ---
          theme_logic = """<resources><style name="Theme.SystemPro" parent="Theme.MaterialComponents.DayNight.NoActionBar"/></resources>"""
          vault_write("app/src/main/res/values/themes.xml", theme_logic, ".system_pro/bank/resources/neon_theme.bak")

          # --- 3. App Core (Mapping & Sync) ---
          app_gradle = f"""
          apply plugin: 'com.android.application'
          android {{
              namespace '{pkg}'
              compileSdk 34
              defaultConfig {{ applicationId "{pkg}"; minSdk 21; targetSdk 34; versionCode 1; versionName "1.0"; }}
          }}
          dependencies {{
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }}
          """
          vault_write("app/build.gradle", app_build_logic := app_gradle, ".system_pro/bank/libraries/app_build.bak")

          # جاوا اور ایکس ایم ایل کو اپنی جگہ پر پلیس کرنا
          java_raw = p.get('java_b64', '')
          if java_raw:
              java_code = base64.b64decode(java_raw.split(",")[1] if "," in java_raw else java_raw).decode('utf-8')
              java_code = re.sub(r'package\s+[\w.]+;', f'package {pkg};', java_code)
              vault_write(f"app/src/main/java/{path}/MainActivity.java", java_code)

          # مینی فیسٹ آٹو میجک
          manifest = f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:theme="@style/Theme.SystemPro"><activity android:name="{pkg}.MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>'
          vault_write("app/src/main/AndroidManifest.xml", manifest)

      - name: 🚀 Mature Build Execution
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: 💾 Artifacts Delivery
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-Stable-Build
          path: |
             app/build/outputs/apk/debug/*.apk
             .system_pro/bank/
