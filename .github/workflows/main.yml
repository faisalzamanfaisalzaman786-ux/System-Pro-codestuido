name: System-Pro-V1400-Atomic-Sync

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  atomic_sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Checkout Your Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Direct Source Injection
        run: |
          git config --global user.name "System Pro AI"
          git config --global user.email "ai@systempro.com"

          # ان کی ریپوزٹری کو ریموٹ کے طور پر جوڑنا
          git remote add xerox https://github.com/fastlane/fastlane.git
          git fetch xerox master

          # آپ کی ریپوزٹری سے پرانا سارا کچرا صاف کرنا (سوائے آپ کی اس وائی اے ایم ایل کے)
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +

          # براہ راست ڈیٹا نکالنا (بغیر .github فولڈر کے تاکہ پرمیشن ایرر نہ آئے)
          # یہ کمانڈ صرف ضروری فائلیں اٹھائے گی
          git checkout xerox/master -- .
          
          # مخصوص پریشان کن فائلیں اگر بچ گئی ہوں تو ہٹانا
          rm -rf .github/workflows/announce_release.yml || true
          rm -rf .github/workflows/ci.yml || true
          rm -rf .github/workflows/issues.yml || true

          # تبدیلیوں کو محفوظ کر کے پش کرنا
          git add .
          git commit -m "System Pro: Atomic Sync V1400 Success" || echo "No changes"
          git push origin main --force
