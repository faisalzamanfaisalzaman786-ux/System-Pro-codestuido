name: Setup Structure and Build

on:
  workflow_dispatch: # یہ بٹن سے ٹرگر کرنے کے لیے ضروری ہے

jobs:
  create_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Create Structure
        run: |
          # پیکیج نیم صرف lowercase اور underscore میں ہونا چاہیے
          if [ ! -f "pubspec.yaml" ]; then
            flutter create --project-name system_pro_codestuido .
          fi

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-APK
          path: build/app/outputs/flutter-apk/app-release.apk
