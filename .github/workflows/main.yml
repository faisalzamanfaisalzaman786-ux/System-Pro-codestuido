name: Build System Pro
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.0.0' # آپ کے pubspec.yaml کے مطابق

      - name: Extreme Clean & Fix
        run: |
          # پرانی جنریٹڈ فائلوں کو ہٹانا جو v1 embedding کا باعث بنتی ہیں
          rm -rf android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java
          
          # فلٹر کو مکمل کلین کرنا
          flutter clean
          
          # ڈیپینڈنسیز دوبارہ حاصل کرنا
          rm -f pubspec.lock
          flutter pub get

      - name: Build APK
        # ہم یہاں --no-pub استعمال کر رہے ہیں کیونکہ ہم اوپر pub get کر چکے ہیں
        run: flutter build apk --release --no-pub

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Release
          path: build/app/outputs/flutter-apk/app-release.apk
