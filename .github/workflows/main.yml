name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Direct Download & Code Injection
        shell: bash
        env:
          JAVA_CODE: ${{ github.event.client_payload.java }}
          XML_CODE: ${{ github.event.client_payload.xml }}
          PKG_NAME: ${{ github.event.client_payload.package_name }}
        run: |
          # صفائی
          rm -rf project.zip android_engine
          
          # براہ راست ZIP فائل ڈاؤن لوڈ کریں (یہ کبھی یوزر نیم نہیں مانگے گا)
          wget https://github.com/JStumpp/android-simplest-java-app/archive/refs/heads/master.zip -O project.zip
          
          # فائل کو ان زپ کریں
          unzip project.zip
          mv android-simplest-java-app-master android_engine
          cd android_engine
          
          # پیکیج سیٹ اپ
          FINAL_PKG=${PKG_NAME:-"com.faisal.systempro"}
          PKG_PATH=$(echo "$FINAL_PKG" | tr '.' '/')
          
          # پرانی فائلیں ہٹا کر نئی ڈائرکٹری بنانا
          rm -rf app/src/main/java/*
          mkdir -p app/src/main/java/$PKG_PATH
          
          # جاوا اور ایکس ایم ایل کوڈ ڈالنا
          if [ -z "$JAVA_CODE" ] || [ "$JAVA_CODE" == "null" ]; then
            echo "package $FINAL_PKG; public class MainActivity extends android.app.Activity { protected void onCreate(android.os.Bundle s){ super.onCreate(s); } }" > app/src/main/java/$PKG_PATH/MainActivity.java
          else
            echo "$JAVA_CODE" > app/src/main/java/$PKG_PATH/MainActivity.java
          fi

          if [ -z "$XML_CODE" ] || [ "$XML_CODE" == "null" ]; then
            echo '<?xml version="1.0" encoding="utf-8"?><RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#02040c"></RelativeLayout>' > app/src/main/res/layout/activity_main.xml
          else
            echo "$XML_CODE" > app/src/main/res/layout/activity_main.xml
          fi

          # مینی فیسٹ اپ ڈیٹ کرنا
          sed -i "s/com.example.simplestandroidapp/$FINAL_PKG/g" app/src/main/AndroidManifest.xml

      - name: 4. Compile APK
        run: |
          cd android_engine
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 5. Deliver Finished APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-Build
          path: android_engine/app/build/outputs/apk/debug/*.apk
