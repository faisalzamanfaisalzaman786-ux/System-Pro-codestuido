name: System Pro - Permanent Wash & Core Protection
on:
  workflow_dispatch: # مکمل کنٹرول کے لیے مینوئل رن

permissions:
  contents: write

jobs:
  wash-and-protect:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Full Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Core Protection Shield (Verification)
        run: |
          echo "🛡️ Shielding Core Android Files..."
          # چیک کرنا کہ ضروری فائلیں موجود ہیں، اگر نہیں تو بلڈ روک دی جائے گی تاکہ نقصان نہ ہو
          if [ ! -d "app/src/main" ] && [ ! -f "build.gradle" ]; then
            echo "❌ CRITICAL ERROR: Core Android structure not found. Aborting to protect data!"
            exit 1
          fi
          echo "✅ Core Structure Verified. Proceeding to Wash..."

      - name: 3. Permanent Wash (Deep Cleaning)
        run: |
          echo "🧹 Starting Permanent Wash of Non-Android files..."
          
          # تمام ونڈوز ایگزیکیوٹیبل اور بائنری فائلیں ڈیلیٹ کرنا
          find . -type f \( -name "*.exe" -o -name "*.dll" -o -name "*.bat" -o -name "*.msi" -o -name "*.bin" -o -name "*.out" \) -exec rm -rf {} +
          
          # پرانی کیشے اور لاگ فائلیں صاف کرنا جو بلڈ میں رکاوٹ بنتی ہیں
          find . -type d \( -name "build" -o -name ".externalNativeBuild" -o -name ".cxx" -o -name ".gradle" \) -exec rm -rf {} +
          
          # پرانے ڈویلپر کے وہ اسکرپٹس جو مین ایپ سے باہر ہیں (احتیاط کے ساتھ)
          find . -maxdepth 1 -type f -name "*.txt" ! -name "requirements.txt" ! -name "README.md" -delete
          
          echo "✨ Wash Complete. All traces of non-essential files removed."

      - name: 4. Secure Alignment (Package Fix)
        run: |
          echo "📂 Aligning files to: com.faisal.systempro"
          mkdir -p app/src/main/java/com/faisal/systempro
          
          # صرف جاوا اور کوٹلن فائلوں کو ان کی صحیح جگہ منتقل کرنا
          find app/src/main/java -name "*.java" -o -name "*.kt" | while read -r file; do
            filename=$(basename "$file")
            target="app/src/main/java/com/faisal/systempro/$filename"
            if [ "$file" != "$target" ]; then
              mv "$file" "$target" || true
            fi
          done

      - name: 5. Force Push Clean State (Permanent Sync)
        run: |
          git config --global user.name "Muzammil-AI"
          git config --global user.email "muzammil@systempro.ai"
          
          git add .
          
          # تبدیلیوں کو زبردستی پش کرنا تاکہ ریپوزٹری مکمل صاف ہو جائے
          if git diff --staged --quiet; then
            echo "No changes needed, repository is already clean."
          else
            git commit -m "System Pro: Permanent Wash & Core Protection Applied"
            git push origin HEAD:${{ github.ref }} --force
          fi
