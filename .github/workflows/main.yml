name: System Pro - Final Build
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # یہ سٹیپ چیک کرے گا کہ فائلیں موجود ہیں یا نہیں
      - name: Check Essential Files
        run: |
          if [ ! -f "gradlew" ]; then
            echo "Error: Gradle files are missing. Upload build.gradle and gradlew first."
            exit 1
          fi

      - name: Build Debug APK
        run: bash gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-App
          path: app/build/outputs/apk/debug/app-debug.apk
