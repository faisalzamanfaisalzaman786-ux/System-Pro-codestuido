name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Workspace Cleanup
        uses: actions/checkout@v4

      - name: 2. Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # Removed cache: 'gradle' to fix the error in screenshot

      - name: 3. Clone Base & Inject Logic
        shell: bash
        env:
          JAVA_CODE: ${{ github.event.client_payload.java }}
          XML_CODE: ${{ github.event.client_payload.xml }}
          MANIFEST_CODE: ${{ github.event.client_payload.manifest }}
          PKG_NAME: ${{ github.event.client_payload.package_name }}
        run: |
          # Fresh start: clear current workspace
          rm -rf * # Clone the reliable base repository
          git clone https://github.com/JStumpp/android-simplest-java-app.git android_engine
          cd android_engine
          
          # Setup package identity
          FINAL_PKG=${PKG_NAME:-"com.faisal.systempro"}
          PKG_PATH=$(echo "$FINAL_PKG" | tr '.' '/')
          
          # Prepare source directory
          rm -rf app/src/main/java/*
          mkdir -p app/src/main/java/$PKG_PATH
          
          # Inject Java Source
          if [ -z "$JAVA_CODE" ] || [ "$JAVA_CODE" == "null" ]; then
            echo "package $FINAL_PKG; public class MainActivity extends android.app.Activity { protected void onCreate(android.os.Bundle s){ super.onCreate(s); android.widget.Toast.makeText(this, \"Engine Ready\", 1).show(); } }" > app/src/main/java/$PKG_PATH/MainActivity.java
          else
            echo "$JAVA_CODE" > app/src/main/java/$PKG_PATH/MainActivity.java
          fi

          # Inject Layout XML
          if [ -z "$XML_CODE" ] || [ "$XML_CODE" == "null" ]; then
            echo '<?xml version="1.0" encoding="utf-8"?><RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#02040c"><TextView android:layout_centerInParent="true" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="System Pro" android:textColor="#00E5FF" android:textSize="30sp" /></RelativeLayout>' > app/src/main/res/layout/activity_main.xml
          else
            echo "$XML_CODE" > app/src/main/res/layout/activity_main.xml
          fi

          # Update Manifest Package Name
          sed -i "s/com.example.simplestandroidapp/$FINAL_PKG/g" app/src/main/AndroidManifest.xml

      - name: 4. Compile APK
        run: |
          cd android_engine
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 5. Deliver Finished APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-Build
          path: android_engine/app/build/outputs/apk/debug/*.apk
