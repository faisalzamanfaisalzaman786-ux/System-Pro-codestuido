name: System-Pro-V59-Shielded
on:
  workflow_dispatch:
    inputs:
      app_name: { description: 'App Name', required: true, default: 'System Pro' }
      package_name: { description: 'Package Name', required: true }
      java_code: { description: 'MainActivity Java', required: true, type: string }
      xml_code: { description: 'Activity Layout XML', required: true, type: string }
      manifest_code: { description: 'Manifest XML', required: true, type: string }

jobs:
  Build-Engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout
        uses: actions/checkout@v4

      - name: 🧬 1. Autonomous Resource Deployment
        shell: python
        run: |
          import os, base64

          # ڈیٹا وصول کرنا
          pkg = "${{ github.event.inputs.package_name }}".strip()
          app_name = "${{ github.event.inputs.app_name }}".strip()
          
          # ان پٹ کو محفوظ طریقے سے اٹھانا
          java_raw = """${{ github.event.inputs.java_code }}"""
          xml_raw = """${{ github.event.inputs.xml_code }}"""
          manifest_raw = """${{ github.event.inputs.manifest_code }}"""

          # فولڈرز کی مانیٹرنگ
          j_dir = f"app/src/main/java/{pkg.replace('.', '/')}"
          os.makedirs(j_dir, exist_ok=True)
          for p in ["app/src/main/res/layout", "app/src/main/res/values", "app/src/main/res/drawable"]:
              os.makedirs(p, exist_ok=True)

          # --- 🚀 ریسورس پرووائیڈر: سسٹم خودکار طریقے سے فائلیں بنائے گا ---
          # یہ وہ حصہ ہے جہاں انجن صرف ریسورسز دے گا، ایڈٹ نہیں کرے گا
          with open(f"{j_dir}/MainActivity.java", 'w', encoding='utf-8') as f:
              f.write(java_raw)

          with open("app/src/main/res/layout/activity_main.xml", 'w', encoding='utf-8') as f:
              f.write(xml_raw)

          with open('app/src/main/AndroidManifest.xml', 'w', encoding='utf-8') as f:
              f.write(manifest_raw)

          # مٹیریل لائبریریز اور کلرز کے ریسورسز
          with open('app/src/main/res/values/colors.xml', 'w') as f:
              f.write('<?xml version="1.0" encoding="utf-8"?><resources><color name="colorPrimary">#00FFCC</color><color name="colorPrimaryDark">#02040c</color><color name="colorAccent">#ff3e8b</color></resources>')

          with open('app/src/main/res/values/styles.xml', 'w') as f:
              f.write('''<resources>
                  <style name="Theme.SystemProMaster" parent="Theme.MaterialComponents.DayNight.NoActionBar"/>
                  <style name="Theme.AppCompat" parent="Theme.MaterialComponents.DayNight.NoActionBar"/>
                  <style name="ActionButton" parent="Widget.MaterialComponents.Button.TextButton"/>
                  <style name="TabButton" parent="Widget.MaterialComponents.Button.UnelevatedButton"/>
                  <style name="BuildButton" parent="Widget.MaterialComponents.Button"/>
              </resources>''')

          # Gradle اور دیگر کنفگریشنز
          with open('gradle.properties', 'w') as f: f.write("android.useAndroidX=true\nandroid.enableJetifier=true\n")
          with open('settings.gradle', 'w') as f: f.write("include ':app'")
          with open('build.gradle', 'w') as f:
              f.write("buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.0' } }\nallprojects { repositories { google(); mavenCentral() } }")
          with open('app/build.gradle', 'w') as f:
              f.write(f"apply plugin: 'com.android.application'\nandroid {{ namespace '{pkg}'; compileSdk 34; defaultConfig {{ applicationId '{pkg}'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' }} }}\ndependencies {{ implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.11.0'; implementation 'androidx.constraintlayout:constraintlayout:2.1.4' }}")

      - name: ☕ 2. Setup Java
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: 🛠️ 3. Start Guarded Build
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --quiet

      - name: 📤 4. Release Final Package
        uses: actions/upload-artifact@v4
        with: { name: System-Pro-V59-Build, path: app/build/outputs/apk/debug/*.apk }
