name: System-Pro-AI-Engine-v2

on:
  repository_dispatch:
    types: [build-app]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  System-Pro-Build-Job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 🛠️ 1. Setup Environment
        uses: actions/checkout@v4

      - name: ☕ 2. Java Configuration (LTS 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🧠 3. Smart AI Logic Injection (Self-Healing)
        shell: python
        run: |
          import os, re
          
          # پے لوڈ حاصل کریں
          payload = ${{ toJson(github.event.client_payload) }} or {}
          pkg_name = payload.get("package_name", "com.faisal.systempro")
          java_code = payload.get("java", "")
          xml_code = payload.get("xml", "")

          # 1. No Drinks & Clean Code Policy (سیکیورٹی چیک)
          forbidden_terms = ['drink', 'alcohol', 'beer', 'wine', 'advertisement']
          for term in forbidden_terms:
              if term in java_code.lower() or term in xml_code.lower():
                  print(f"⚠️ Warning: Forbidden term '{term}' detected. Cleaning code...")
                  java_code = re.sub(term, "SystemProCore", java_code, flags=re.IGNORECASE)

          # 2. Package Correction (خودکار پیکج درستگی)
          if java_code and not java_code.startswith("package"):
              java_code = f"package {pkg_name};\n\n" + java_code
          elif java_code:
              java_code = re.sub(r"package\s+[\w\.]+;", f"package {pkg_name};", java_code)

          # 3. Directory Creation
          pkg_path = pkg_name.replace('.', '/')
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)

          # 4. Smart File Writing
          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w", encoding="utf-8") as f:
              f.write(java_code if java_code else "// Empty AI Code")
          
          with open("app/src/main/res/layout/activity_main.xml", "w", encoding="utf-8") as f:
              f.write(xml_code if xml_code else "")

          # 5. Manifest Auto-Generation
          manifest = f'''<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application 
                  android:label="System Pro AI" 
                  android:theme="@style/Theme.AppCompat.DayNight.NoActionBar"
                  android:allowBackup="true">
                  <activity android:name="{pkg_name}.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>'''
          with open("app/src/main/AndroidManifest.xml", "w") as f:
              f.write(manifest)

      - name: 🚀 4. Build Engine (Gradle Optimizer)
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          echo "include ':app'" > settings.gradle
          
          # Dynamic Build Configuration
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { 
              namespace '$PKG_NAME'
              compileSdk 34
              defaultConfig { 
                  applicationId '$PKG_NAME'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF
          
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: 📦 5. Smart Verification & Export
        if: always()
        run: |
          mkdir -p SystemPro_Output
          find . -name "*.apk" -type f -exec cp {} SystemPro_Output/SystemPro_AI_v2.apk \;
          [ -f "SystemPro_Output/SystemPro_AI_v2.apk" ] && echo "Build Success" || exit 1

      - name: 📤 6. Final Deployment
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-AI-Package
          path: SystemPro_Output/SystemPro_AI_v2.apk
