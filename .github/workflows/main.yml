name: System-Pro-V900-Final-Path-Cleaner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  clean_and_mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Checkout Your Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Professional Xerox Move (No Workflows)
        run: |
          git config --global user.name "System Pro AI"
          git config --global user.email "ai@systempro.com"

          # ان کی ریپوزٹری کو عارضی طور پر الگ فولڈر میں لینا
          git clone --depth 1 https://github.com/fastlane/fastlane.git temp_xerox
          
          # 🛑 سب سے اہم قدم: ان کا ورک فلو فولڈر مکمل اڑا دینا تاکہ گٹھاب کو اعتراض نہ ہو
          rm -rf temp_xerox/.github
          
          # آپ کی ریپوزٹری سے پرانا ڈیٹا مٹانا (سوائے آپ کی اس وائی اے ایم ایل کے)
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +
          
          # نیا ڈیٹا منتقل کرنا
          shopt -s dotglob
          cp -rf temp_xerox/* .
          rm -rf temp_xerox
          
          # پش کرنا
          git add -A
          git commit -m "System Pro: Xerox Copy Success V900" || echo "Nothing to change"
          git push origin main --force
