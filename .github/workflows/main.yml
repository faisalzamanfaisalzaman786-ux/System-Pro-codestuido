name: System Pro - Auto-Dispatch Architect
on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger_system_pro_init]
  push:
    branches:
      - main # یا آپ کی جو بھی مین برانچ ہے

permissions:
  contents: write
  actions: write

jobs:
  build-structure:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Construct Standard Java Structure
        run: |
          mkdir -p app/src/main/java/com/faisal/systempro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          mkdir -p gradle/wrapper

      - name: 3. Inject Core Standard Files
        run: |
          # AndroidManifest
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.faisal.systempro">
              <application
                  android:allowBackup="true"
                  android:label="System Pro"
                  android:theme="@style/Theme.MaterialComponents.DayNight.NoActionBar">
                  <activity android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # MainActivity.java
          cat <<EOF > app/src/main/java/com/faisal/systempro/MainActivity.java
          package com.faisal.systempro;
          import android.app.Activity;
          import android.os.Bundle;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }
          EOF

          # Gradle Files
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral(); }
              dependencies { classpath "com.android.tools.build:gradle:8.2.0" }
          }
          allprojects {
              repositories { google(); mavenCentral(); }
          }
          EOF

      - name: 4. Auto-Update Sync & Force Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Muzammil-AI"
          git config --global user.email "muzammil@systempro.ai"
          git add .
          git commit -m "System Pro: Structure Update [Standard Java]" || echo "No changes"
          git push origin HEAD --force

      - name: 5. Force Auto-Dispatch Self
        if: always()
        run: |
          echo "🔄 Triggering self-dispatch to ensure update..."
          curl -X POST \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d '{"event_type": "trigger_system_pro_init"}'
