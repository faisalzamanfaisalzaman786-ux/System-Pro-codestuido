name: System-Pro-Master-Framework-V12

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # یہ بٹن کو ایکٹو رکھتا ہے

jobs:
  Unified-Build-Engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # ہم نے یہاں سے عارضی طور پر cache ہٹا دیا ہے تاکہ پہلا بلڈ صاف طریقے سے ہو
          
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # ہم یہاں کلین بلڈ کریں گے تاکہ پرانا ڈیٹا مسئلہ نہ کرے
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Upload Professional APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V12-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
