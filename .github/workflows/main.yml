name: System Pro - Final Absolute Purge
on:
  workflow_dispatch: # مینوئلی رن کرنے کے لیے

permissions:
  contents: write

jobs:
  absolute-clean:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 2. Selective Deletion (Preserve .github)
        run: |
          echo "🧹 Starting Absolute Purge..."
          
          # یہ کمانڈ .github فولڈر کے علاوہ باقی ہر چیز (فائلیں اور فولڈرز) ڈیلیٹ کر دے گی
          find . -maxdepth 1 ! -name ".github" ! -name "." ! -name ".." -exec rm -rf {} +
          
          echo "✅ Everything deleted except the .github folder."

      - name: 3. Verify and Sync
        run: |
          git config --global user.name "Muzammil-AI"
          git config --global user.email "muzammil@systempro.ai"
          
          # تمام تبدیلیوں کو ایڈ کرنا
          git add .
          
          # اگر ریپوزٹری پہلے سے صاف ہے تو میسج دے، ورنہ فورس پش کرے
          if git diff --staged --quiet; then
            echo "Repository is already in the desired clean state."
          else
            git commit -m "System Pro: Final Purge - Only .github workflow folder preserved"
            git push origin HEAD:${{ github.ref }} --force
          fi
