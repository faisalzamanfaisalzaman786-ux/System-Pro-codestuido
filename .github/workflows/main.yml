name: System Pro Ultimate Engine

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.0.2
          cache-disabled: true

      - name: 4. Python-Based Atomic Injection (Multi-File Support)
        shell: python
        env:
          JAVA_CODE: ${{ github.event.client_payload.java }}
          XML_CODE: ${{ github.event.client_payload.xml }}
          PKG_NAME: ${{ github.event.client_payload.package_name }}
        run: |
          import os

          pkg_name = os.getenv('PKG_NAME', 'com.faisal.systempro')
          pkg_path = pkg_name.replace('.', '/')
          java_code = os.getenv('JAVA_CODE', '')
          xml_code = os.getenv('XML_CODE', '')

          # فولڈرز کی تیاری
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)

          # 1. MainActivity Java
          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w", encoding="utf-8") as f:
              f.write(java_code)

          # 2. Main Layout
          with open("app/src/main/res/layout/activity_main.xml", "w", encoding="utf-8") as f:
              f.write(xml_code)

          # 3. Missing Dialog XML (Fixes #444 Error)
          # ہم ایک ڈیفالٹ ڈائیلاگ فائل بنا رہے ہیں تاکہ جاوا کوڈ اسے پہچان سکے
          dialog_xml = """<?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="wrap_content"
              android:orientation="vertical" android:padding="16dp">
              <EditText android:id="@+id/etAppName" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="App Name"/>
              <EditText android:id="@+id/etPkgName" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="Package Name"/>
              <EditText android:id="@+id/etGhToken" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="GitHub Token"/>
              <EditText android:id="@+id/etGhRepo" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="GitHub Repo"/>
          </LinearLayout>"""
          with open("app/src/main/res/layout/dialog_settings.xml", "w", encoding="utf-8") as f:
              f.write(dialog_xml)

          # گریڈل سیٹنگز
          with open("gradle.properties", "w") as f:
              f.write("android.useAndroidX=true\nandroid.enableJetifier=true\nandroid.suppressUnsupportedCompileSdk=34")
          with open("settings.gradle", "w") as f:
              f.write("include ':app'")
          with open("build.gradle", "w") as f:
              f.write("buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.1.0' } }; allprojects { repositories { google(); mavenCentral() } }")

          # App Gradle (With Design Dependencies)
          app_gradle = f"""
          plugins {{ id 'com.android.application' }}
          android {{
              namespace '{pkg_name}'
              compileSdk 33
              defaultConfig {{
                  applicationId "{pkg_name}"
                  minSdk 21
                  targetSdk 33
              }}
          }}
          dependencies {{
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }}
          """
          with open("app/build.gradle", "w") as f:
              f.write(app_gradle)

          # Styles
          styles = """<resources>
              <style name="Theme.SystemPro" parent="Theme.MaterialComponents.DayNight.NoActionBar"/>
              <style name="ActionButton" parent="Widget.MaterialComponents.Button.TextButton"/>
              <style name="TabButton" parent="Widget.MaterialComponents.Button.UnelevatedButton"/>
              <style name="BuildButton" parent="Widget.MaterialComponents.Button"/>
          </resources>"""
          with open("app/src/main/res/values/styles.xml", "w") as f:
              f.write(styles)

          # Manifest
          manifest = f"""<manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.SystemPro">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>"""
          with open("app/src/main/AndroidManifest.xml", "w") as f:
              f.write(manifest)

      - name: 5. Execute Build
        run: gradle assembleDebug --no-daemon

      - name: 6. Deliver APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-V7-Ready
          path: app/build/outputs/apk/debug/*.apk
