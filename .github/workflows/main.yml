name: System-Pro-V62-Engine

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Target Package Name'
        required: true
      app_name:
        description: 'App Display Name'
        required: true
      app_icon_base64:
        description: 'Base64 encoded App Icon'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Handle App Icon (Base64 vs Template)
        run: |
          mkdir -p app/src/main/res/drawable
          
          # Python script to handle the priority logic
          python3 -c "
          import base64
          import os

          b64_data = '${{ github.event.inputs.app_icon_base64 }}'
          target_path = 'app/src/main/res/drawable/ic_launcher.png'
          template_path = 'templates/ic_launcher.png'

          if b64_data and len(b64_data) > 10:
              print('Priority: Using Base64 icon from payload...')
              try:
                  with open(target_path, 'wb') as f:
                      f.write(base64.b64decode(b64_data))
                  print('Base64 icon decoded successfully.')
              except Exception as e:
                  print(f'Error decoding base64: {e}. Falling back to template.')
                  os.system(f'cp {template_path} {target_path}')
          else:
              print('No Base64 data found. Using template icon...')
              if os.path.exists(template_path):
                  os.system(f'cp {template_path} {target_path}')
              else:
                  print('Warning: Template icon not found!')
          "

      - name: Update Package and App Name
        run: |
          # پیکیج نیم اور ایپ نیم کی ڈائنامک تبدیلی
          NEW_PKG="${{ github.event.inputs.package_name }}"
          sed -i "s/com.system.pro/$NEW_PKG/g" app/build.gradle
          sed -i "s/com.system.pro/$NEW_PKG/g" app/src/main/AndroidManifest.xml
          # ایپ نیم اپ ڈیٹ
          sed -i "s/String app_name = \".*\"/String app_name = \"${{ github.event.inputs.app_name }}\"/g" app/src/main/res/values/strings.xml || true

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-V62
          path: app/build/outputs/apk/debug/*.apk
