      - name: System-Pro AI-Scanner
        shell: python
        run: |
          import base64, os, re

          # 1. ڈیٹا لوڈ کرنا
          p = ${{ toJson(github.event.client_payload) }}
          xml_code = base64.b64decode(p.get('xml_b64', '')).decode('utf-8', errors='ignore') if p.get('xml_b64') else ""
          
          # 2. مسنگ اسٹائلز کی تلاش (Regex کے ذریعے)
          # یہ لائن XML میں موجود ہر "@style/..." کو ڈھونڈے گی
          found_styles = re.findall(r'@style/([\w.]+)', xml_code)
          
          # ڈیفالٹ محفوظ اسٹائلز (Base Library)
          base_styles = {
              "AppTheme": "Theme.MaterialComponents.DayNight.NoActionBar",
              "ActionButton": "Widget.MaterialComponents.Button",
              "TabButton": "Widget.MaterialComponents.Button.TextButton",
              "BuildButton": "Widget.MaterialComponents.Button.UnelevatedButton"
          }

          # 3. لوکل ریسورس جنریٹر (Local Folder: res/values/auto_generated_styles.xml)
          os.makedirs("app/src/main/res/values", exist_ok=True)
          
          style_content = '<resources>\n'
          # جو اسٹائلز پے لوڈ میں ہیں لیکن لائبریری میں نہیں، انہیں خودکار طریقے سے بنائیں
          for s in set(found_styles):
              parent = base_styles.get(s, "Widget.AppCompat.Button")
              style_content += f'    <style name="{s}" parent="{parent}">\n'
              style_content += '        <item name="android:layout_width">wrap_content</item>\n'
              style_content += '        <item name="android:layout_height">wrap_content</item>\n'
              style_content += '    </style>\n'
          
          # اگر کوئی اسٹائل نہیں ملا تو کم از کم AppTheme ضرور بنائیں
          if "AppTheme" not in found_styles:
              style_content += f'    <style name="AppTheme" parent="{base_styles["AppTheme"]}"></style>\n'
          
          style_content += '</resources>'

          with open("app/src/main/res/values/auto_generated_styles.xml", "w") as f:
              f.write(style_content)
          
          print("AI Scanner: All missing styles have been healed and saved to local folder.")
