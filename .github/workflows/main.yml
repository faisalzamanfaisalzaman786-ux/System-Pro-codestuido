name: System Pro Mega Reset

on:
  workflow_dispatch:

jobs:
  total_rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Triple Clean & Setup Native Structure
        run: |
          # 1. ہر چیز کا صفایا (Total Wipe)
          rm -rf *
          
          # 2. نیٹو فولڈرز بنانا
          mkdir -p app/src/main/java/com/systempro/main
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          # 3. بلڈ فائلز لکھنا (Direct Generation)
          echo "include ':app'" > settings.gradle

          # Root build.gradle (8.1.0 کے ساتھ مستحکم ورژن)
          echo "buildscript { 
              repositories { google(); mavenCentral() } 
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' } 
          }
          allprojects { repositories { google(); mavenCentral() } }" > build.gradle

          # App build.gradle (Pure Native)
          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.systempro.main'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.systempro.main'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }" > app/build.gradle

          # MainActivity.java (Native Code)
          echo "package com.systempro.main;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.TextView;
          import android.view.Gravity;
          import android.graphics.Color;

          public class MainActivity extends Activity {
              @Override protected void onCreate(Bundle saved) {
                  super.onCreate(saved);
                  TextView tv = new TextView(this);
                  tv.setText(\"System Pro Native\nBuild Successful! ✅\");
                  tv.setTextSize(30);
                  tv.setTextColor(Color.GREEN);
                  tv.setGravity(Gravity.CENTER);
                  tv.setBackgroundColor(Color.BLACK);
                  setContentView(tv);
              }
          }" > app/src/main/java/com/systempro/main/MainActivity.java

          # AndroidManifest.xml
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Fix Wrapper & Build
        run: |
          # یہاں ہم سسٹم کے گریڈل کو بائی پاس کریں گے
          gradle wrapper --gradle-version 8.1 --distribution-type bin
          chmod +x gradlew
          
          # اب سسٹم کو اپڈیٹ کر کے بلڈ کریں گے
          git config --global user.name "System Pro Master"
          git config --global user.email "master@systempro.local"
          git add .
          git commit -m "Triple Clean: Native Structure Fixed"
          git push origin main --force
          
          # فائنل بلڈ (بغیر کسی ڈیمن کے)
          ./gradlew assembleDebug --no-daemon

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Native-App
          path: app/build/outputs/apk/debug/*.apk