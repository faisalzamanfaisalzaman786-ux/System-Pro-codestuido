name: System-Pro-V62-Engine

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Target Package Name'
        required: false
        default: 'com.system.pro'
      app_name:
        description: 'App Display Name'
        required: false
        default: 'System Pro'
      app_icon_base64:
        description: 'Base64 encoded App Icon'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Handle App Icon Logic
        run: |
          mkdir -p app/src/main/res/drawable
          python3 -c "
          import base64
          import os

          # UI سے آنے والا ڈیٹا
          b64_data = '${{ github.event.inputs.app_icon_base64 }}'
          target_path = 'app/src/main/res/drawable/ic_launcher.png'
          template_path = 'templates/ic_launcher.png'

          if b64_data and len(b64_data.strip()) > 50:
              print('UI Payload detect: Decoding Base64...')
              try:
                  # اگر Base64 میں ہیڈر (data:image/png;base64,) شامل ہو تو اسے صاف کریں
                  if ',' in b64_data:
                      b64_data = b64_data.split(',')[1]
                  with open(target_path, 'wb') as f:
                      f.write(base64.b64decode(b64_data))
              except Exception as e:
                  print(f'Error: {e}. Using Template fallback.')
                  os.system(f'cp {template_path} {target_path}')
          else:
              print('No valid Payload icon. Using templates/ic_launcher.png')
              if os.path.exists(template_path):
                  os.system(f'cp {template_path} {target_path}')
          "

      - name: Dynamic Branding Update
        run: |
          # پیکیج نیم کی تبدیلی
          NEW_PKG="${{ github.event.inputs.package_name }}"
          if [ -z "$NEW_PKG" ]; then NEW_PKG="com.system.pro"; fi
          
          find . -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.java" -o -name "*.kt" \) -exec sed -i "s/com.system.pro/$NEW_PKG/g" {} +

          # ایپ نیم کی تبدیلی
          APP_NAME="${{ github.event.inputs.app_name }}"
          if [ -z "$APP_NAME" ]; then APP_NAME="System Pro"; fi
          # strings.xml میں نام اپ ڈیٹ کریں
          mkdir -p app/src/main/res/values
          if [ -f app/src/main/res/values/strings.xml ]; then
            sed -i "s/>.*<\/string>/>$APP_NAME<\/string>/g" app/src/main/res/values/strings.xml
          fi

      - name: Build Application
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V62-Output
          path: app/build/outputs/apk/debug/*.apk
