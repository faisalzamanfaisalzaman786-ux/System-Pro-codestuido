name: System-Pro-AI-Engine-v2

on:
  repository_dispatch:
    types: [build-app]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  System-Pro-Build-Job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 🛠️ 1. Setup Environment
        uses: actions/checkout@v4

      - name: ☕ 2. Java 17 Configuration
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 3. Resource & Manifest Auto-Fixer (V4.5)
        shell: python
        run: |
          import os, re, json
          
          raw_payload = r"""${{ toJson(github.event.client_payload) }}"""
          try:
              payload = json.loads(raw_payload, strict=False) if raw_payload != "null" else {}
          except:
              payload = {}

          pkg_name = payload.get("package_name", "com.faisal.systempro")
          java_code = payload.get("java", "// System Pro Active")
          xml_code = payload.get("xml", "").strip()
          
          # No Drinks Constraint
          java_code = re.sub(r'drink|alcohol|beer|wine', "SystemProCore", java_code, flags=re.IGNORECASE)

          pkg_path = pkg_name.replace('.', '/')
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)

          # 1. Layout Logic
          if len(xml_code) < 50:
              xml_code = '<?xml version="1.0" encoding="utf-8"?>\n<RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#121212"></RelativeLayout>'
          with open("app/src/main/res/layout/activity_main.xml", "w") as f: f.write(xml_code)

          # 2. Styles & Strings (Adding default theme support)
          with open("app/src/main/res/values/styles.xml", "w") as f:
              f.write('<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.SystemPro" parent="Theme.AppCompat.DayNight.NoActionBar"><item name="colorPrimary">#00FF00</item></style></resources>')
          with open("app/src/main/res/values/strings.xml", "w") as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">System Pro</string></resources>')

          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w", encoding="utf-8") as f: f.write(java_code)

          # 3. Clean Manifest (Fixing ic_launcher error and package warning)
          manifest = f'''<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application 
                  android:label="System Pro" 
                  android:theme="@style/Theme.SystemPro"
                  android:allowBackup="true"
                  android:supportsRtl="true">
                  <activity 
                      android:name="{pkg_name}.MainActivity" 
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>'''
          with open("app/src/main/AndroidManifest.xml", "w") as f: f.write(manifest)

      - name: 🚀 4. Production Build (Final Stabilization)
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { 
              namespace '${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}'
              compileSdk 34 
              defaultConfig { applicationId '${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}'; minSdk 24; targetSdk 34; versionCode 1; versionName "4.5" }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }
          EOF
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: 📦 5. Export Output
        run: |
          mkdir -p output
          find . -name "*.apk" -type f -exec cp {} output/SystemPro_Final_V4_5.apk \;

      - name: 📤 6. Deployment
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-V4-5-Stable
          path: output/SystemPro_Final_V4_5.apk
