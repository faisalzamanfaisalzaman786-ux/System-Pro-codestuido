name: Build Flutter APK (Final JitPack Fix)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
      package_name:
        description: 'Package Name (e.g., com.system.pro)'
        required: true
      app_icon_base64:
        description: 'Base64 of icon image (PNG/JPG)'
        required: false
      dart_code_base64:
        description: 'Base64 of main.dart'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Stable Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Clean Project
        run: |
          find . -maxdepth 1 -not -path '*/.*' -not -name '.' -exec rm -rf {} +
          flutter create --org $(echo ${{ github.event.inputs.package_name }} | cut -d'.' -f1,2) --project-name system_pro_app --platforms android .

      - name: Write Pubspec (Fixed Version)
        run: |
          cat <<EOF > pubspec.yaml
          name: system_pro_app
          description: "System Pro Build"
          publish_to: none
          version: 1.0.0+1
          environment:
            sdk: ">=3.5.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            camera: any
            permission_handler: any
            path_provider: any
            flutter_background_service: any
            flutter_local_notifications: any
            workmanager: any
            video_player: any
            # یہاں ورژن کو بغیر LTS کے 6.0.3 رکھا ہے
            ffmpeg_kit_flutter_full_gpl: 6.0.3
            image_picker: any
            flutter_webrtc: 0.12.12+hotfix.1
            livekit_client: any
            dio: any
            shared_preferences: any
            sqflite: any
            device_info_plus: any
          dev_dependencies:
            flutter_test:
              sdk: flutter
          dependency_overrides:
            path: 1.9.0
            meta: 1.15.0
            flutter_webrtc: 0.12.12+hotfix.1
          flutter:
            uses-material-design: true
          EOF

      - name: 🛠️ The Global Repository Fix
        run: |
          # اینڈرائیڈ کی روٹ بلڈ فائل کو مکمل ری رائٹ کرنا
          cat <<EOF > android/build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.1'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://www.jitpack.io' }
                  maven { url "https://maven.google.com" }
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "\${rootProject.buildDir}/\${project.name}"
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

      - name: Configure App Settings (SDK 35)
        run: |
          sed -i "s/compileSdkVersion .*/compileSdkVersion 35/" android/app/build.gradle
          sed -i "s/targetSdkVersion .*/targetSdkVersion 35/" android/app/build.gradle
          sed -i "s/minSdkVersion .*/minSdkVersion 24/" android/app/build.gradle
          sed -i "/defaultConfig {/i \    namespace \"${{ github.event.inputs.package_name }}\"" android/app/build.gradle

      - name: Inject Dart Code
        run: |
          echo "${{ github.event.inputs.dart_code_base64 }}" | base64 -d > lib/main.dart

      - name: Build Release APK
        run: |
          flutter pub get
          flutter clean
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Success-APK
          path: build/app/outputs/flutter-apk/app-release.apk
