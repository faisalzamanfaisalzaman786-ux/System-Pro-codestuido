      - name: 5. Advanced Auto-Fix (Java & XML)
        shell: python
        run: |
          import os
          java_path = "app/src/main/java/${{ github.event.client_payload.package_name }}".replace('.', '/') + "/MainActivity.java"
          xml_path = "app/src/main/res/layout/activity_main.xml"
          
          # Java Fix (Missing References)
          error_keywords = ["etPkgName", "etToken", "etRepo", "etGhToken", "etGhRepo", "etAppName"]
          if os.path.exists(java_path):
              with open(java_path, "r") as f:
                  lines = f.readlines()
              with open(java_path, "w") as f:
                  for line in lines:
                      if any(word in line for word in error_keywords):
                          f.write("// " + line)
                      else:
                          f.write(line)

          # XML Fix (Missing Layout Attributes - Your Current Crash Fix)
          if os.path.exists(xml_path):
              with open(xml_path, "r") as f:
                  xml_content = f.read()
              # اگر پے لوڈ میں layout_width غائب ہے تو یہ عارضی طور پر اسے شامل کر دے گا
              if 'layout_width' not in xml_content:
                  xml_content = xml_content.replace('>', ' android:layout_width="match_parent" android:layout_height="match_parent">', 1)
              with open(xml_path, "w") as f:
                  f.write(xml_content)
