name: System Pro Remote Builder V13

on:
  # اس سیکشن کو مزید بہتر کیا گیا ہے تاکہ یو آئی کال میں مسئلہ نہ ہو
  workflow_dispatch:
    inputs:
      client_payload:
        description: 'Payload from UI'
        required: false
        default: '{}'

jobs:
  build:
    runs-on: ubuntu-latest
    # نیٹ ورک کے مسائل سے بچنے کے لیے پرمیشنز کا اضافہ
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # پے لوڈ اور ریسورسز کی درستگی
      - name: Sync UI Resources & Fix Package
        run: |
          echo "Syncing UI data..."
          # اگر پے لوڈ سے آئیکن آرہا ہے تو اسے ریپلیس کریں
          if [ -d "payload" ]; then
            find payload -name "*.png" -exec cp {} app/src/main/res/mipmap-xxxhdpi/ic_launcher.png \;
            find payload -name "*.png" -exec cp {} app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png \;
          fi
          
          # پیکج نیم کا کنفلکٹ ختم کرنا
          find app/src/main/java -name "*.java" -exec sed -i 's/package .*/package com.faisal.systempro;/g' {} +

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Build
          path: app/build/outputs/apk/debug/app-debug.apk
