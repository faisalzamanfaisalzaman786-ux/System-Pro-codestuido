name: System-Pro-Master-Framework-V12

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  Unified-Build-Engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🛠️ 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ 2. Setup Java Runtime
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # ہم نے cache ہٹا دیا ہے تاکہ پہلا 'Fresh' بلڈ کامیاب ہو سکے

      - name: 🔍 3. AI Reliability Check (File Verification)
        run: |
          if [ ! -f "gradlew" ]; then
            echo "Gradle Wrapper missing. Initializing new wrapper..."
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew

      - name: 🚀 4. Automated Build Execution
        run: |
          # آٹومیشن کے لیے ہم clean کے ساتھ assemble کریں گے
          ./gradlew clean assembleDebug --stacktrace --no-daemon

      - name: 📦 5. Artifact Delivery
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V12-Final
          path: app/build/outputs/apk/debug/*.apk
