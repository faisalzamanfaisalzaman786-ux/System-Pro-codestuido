name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Workspace Setup
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Generate Pro Structure & Themes
        shell: bash
        env:
          JAVA_CODE: ${{ github.event.client_payload.java }}
          XML_CODE: ${{ github.event.client_payload.xml }}
          PKG_NAME: ${{ github.event.client_payload.package_name }}
        run: |
          # پیکیج اور فولڈر سیٹ اپ
          FINAL_PKG=${PKG_NAME:-"com.faisal.systempro"}
          PKG_PATH=$(echo "$FINAL_PKG" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/values-night
          mkdir -p app/src/main/res/layout

          # --- ڈارک اور لائٹ موڈ کے کلرز ---
          cat <<EOF > app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#6200EE</color>
              <color name="backgroundColor">#FFFFFF</color>
              <color name="textColor">#000000</color>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values-night/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#BB86FC</color>
              <color name="backgroundColor">#121212</color>
              <color name="textColor">#FFFFFF</color>
          </resources>
          EOF

          # --- ماسٹر تھیم (Automatic switching) ---
          cat <<EOF > app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.SystemPro" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:windowBackground">@color/backgroundColor</item>
              </style>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values-night/themes.xml
          <resources>
              <style name="Theme.SystemPro" parent="android:Theme.Material.NoActionBar">
                  <item name="android:windowBackground">@color/backgroundColor</item>
              </style>
          </resources>
          EOF

          # --- کوڈ انجیکشن ---
          echo "package $FINAL_PKG; public class MainActivity extends android.app.Activity { protected void onCreate(android.os.Bundle s){ super.onCreate(s); setContentView(R.layout.activity_main); } }" > app/src/main/java/$PKG_PATH/MainActivity.java
          
          # اینڈرائیڈ کی بنیادی فائلیں
          echo "include ':app'" > settings.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.1.0' } }; allprojects { repositories { google(); mavenCentral() } }" > build.gradle
          echo "plugins { id 'com.android.application' }; android { namespace '$FINAL_PKG'; compileSdk 33; defaultConfig { applicationId '$FINAL_PKG'; minSdk 21; targetSdk 33 } }" > app/build.gradle
          
          # مینی فیسٹ
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:theme="@style/Theme.SystemPro" android:label="System Pro">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 4. Build Professional APK
        run: |
          gradle wrapper --gradle-version 8.0
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 5. Artifact Delivery
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Universal-Build
          path: app/build/outputs/apk/debug/*.apk
