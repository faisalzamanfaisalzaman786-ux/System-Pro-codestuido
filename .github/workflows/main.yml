name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Clone Base & Inject Code
        shell: bash
        env:
          JAVA_CODE: ${{ github.event.client_payload.java }}
          XML_CODE: ${{ github.event.client_payload.xml }}
          PKG_NAME: ${{ github.event.client_payload.package_name }}
        run: |
          # مکمل صفائی
          rm -rf * # بیس پروجیکٹ کلون کریں
          git clone https://github.com/JStumpp/android-simplest-java-app.git android_project
          cd android_project
          
          # پیکیج سیٹ کریں (اگر خالی ہو تو ڈیفالٹ)
          FINAL_PKG=${PKG_NAME:-"com.faisal.systempro"}
          PKG_PATH=$(echo "$FINAL_PKG" | tr '.' '/')
          
          mkdir -p app/src/main/java/$PKG_PATH
          
          # جاوا فائل لکھنا
          if [ -z "$JAVA_CODE" ]; then
            echo "package $FINAL_PKG; public class MainActivity extends android.app.Activity {}" > app/src/main/java/$PKG_PATH/MainActivity.java
          else
            echo "$JAVA_CODE" > app/src/main/java/$PKG_PATH/MainActivity.java
          fi

          # ایکس ایم ایل فائل لکھنا
          if [ -z "$XML_CODE" ]; then
            echo '<?xml version="1.0" encoding="utf-8"?><LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" />' > app/src/main/res/layout/activity_main.xml
          else
            echo "$XML_CODE" > app/src/main/res/layout/activity_main.xml
          fi

      - name: 4. Build APK
        run: |
          cd android_project
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 5. Success APK Delivery
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-APK
          path: android_project/app/build/outputs/apk/debug/*.apk
