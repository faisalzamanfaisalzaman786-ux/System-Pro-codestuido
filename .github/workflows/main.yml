name: System-Pro-AI-Engine-v2

on:
  repository_dispatch:
    types: [build-app]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  System-Pro-Build-Job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 🛠️ 1. Setup Environment
        uses: actions/checkout@v4

      - name: ☕ 2. Java 17 Setup
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 3. Smart Engine with Auto-Logging (V5.0)
        shell: python
        run: |
          import os, re, json
          
          # لاگ فائل کا آغاز
          log_content = "=== System Pro Build Log ===\n"
          
          try:
              raw_payload = r"""${{ toJson(github.event.client_payload) }}"""
              payload = json.loads(raw_payload, strict=False) if raw_payload != "null" else {}
              log_content += "Payload Loaded Successfully.\n"
          except Exception as e:
              payload = {}
              log_content += f"Payload Error: {str(e)}\n"

          pkg_name = payload.get("package_name", "com.faisal.systempro")
          java_code = payload.get("java", "// System Pro Active")
          xml_code = payload.get("xml", "").strip()
          
          # No Drinks Constraint
          java_code = re.sub(r'drink|alcohol|beer|wine', "SystemProCore", java_code, flags=re.IGNORECASE)

          pkg_path = pkg_name.replace('.', '/')
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)

          # --- اسٹائلز کی مکمل ریکوری (Fixing AAPT Errors) ---
          # XML میں استعمال ہونے والے تمام اسٹائلز نکالیں
          found_styles = re.findall(r'style/(\w+)', xml_code)
          log_content += f"Styles found in XML: {found_styles}\n"
          
          styles_xml = '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n'
          # تمام مطلوبہ اسٹائلز کو لازمی ڈیفائن کرنا
          needed_styles = set(found_styles + ["Theme.SystemPro", "ActionButton", "TabButton", "BuildButton"])
          for s in needed_styles:
              parent = "Theme.AppCompat.DayNight.NoActionBar" if "Theme" in s else "Widget.AppCompat.Button"
              styles_xml += f'    <style name="{s}" parent="{parent}"><item name="android:textAllCaps">false</item></style>\n'
          styles_xml += '</resources>'
          
          with open("app/src/main/res/values/styles.xml", "w") as f: f.write(styles_xml)
          log_content += "styles.xml generated with all required themes.\n"

          # --- لے آؤٹ اور جاوا فائلز ---
          if len(xml_code) < 50:
              xml_code = '<?xml version="1.0" encoding="utf-8"?>\n<RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent"></RelativeLayout>'
          
          with open("app/src/main/res/layout/activity_main.xml", "w") as f: f.write(xml_code)
          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w", encoding="utf-8") as f: f.write(java_code)
          
          # مینی فیسٹ (بغیر کسی آئیکن ایرر کے)
          manifest = f'''<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.SystemPro">
                  <activity android:name="{pkg_name}.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>'''
          with open("app/src/main/AndroidManifest.xml", "w") as f: f.write(manifest)
          
          # لاگ فائل محفوظ کرنا
          log_content += "Build files structure completed.\n"
          with open("SystemPro_Build_Log.txt", "w") as f: f.write(log_content)

      - name: 🚀 4. Production Build (With Error Capture)
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { 
              namespace '${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}'
              compileSdk 34 
              defaultConfig { applicationId '${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}'; minSdk 24; targetSdk 34; versionCode 1; versionName "5.0" }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }
          EOF
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon || (echo "Build Failed" >> SystemPro_Build_Log.txt)

      - name: 📦 5. Export Output & Log
        if: always()
        run: |
          mkdir -p final_output
          find . -name "*.apk" -type f -exec cp {} final_output/SystemPro_App.apk \;
          cp SystemPro_Build_Log.txt final_output/Build_Log.txt

      - name: 📤 6. Deployment
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-V5-Package
          path: final_output/
