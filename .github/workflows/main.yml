name: Build System Pro
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # یہاں ہم ورژن کو 3.10.0 یا اس سے اوپر رکھیں گے تاکہ Dart 3.0 مل سکے
          flutter-version: '3.10.0' 
          channel: 'stable'

      - name: Extreme Clean & Fix
        run: |
          flutter clean
          rm -f pubspec.lock
          flutter pub get

      - name: Build APK
        run: flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Release
          path: build/app/outputs/flutter-apk/app-release.apk
