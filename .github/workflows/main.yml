name: Build Flutter APK (Final Unified Fix)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
      package_name:
        description: 'Package Name (e.g., com.system.pro)'
        required: true
      app_icon_base64:
        description: 'Base64 of icon image (PNG/JPG)'
        required: false
      dart_code_base64:
        description: 'Base64 of main.dart'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Stable Flutter
        uses: subosito/flutter-action@v2
        with:
          # 3.24.0 ان تمام لائبریریز کے لیے بہترین بیلنس ہے
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Project
        run: |
          find . -maxdepth 1 -not -path '*/.*' -not -name '.' -exec rm -rf {} +
          flutter create --org $(echo ${{ github.event.inputs.package_name }} | cut -d'.' -f1,2) --project-name system_pro_app --platforms android .

      - name: Write Pubspec (Conflict Resolution)
        run: |
          cat <<EOF > pubspec.yaml
          name: system_pro_app
          description: "System Pro Success Build"
          publish_to: none
          version: 1.0.0+1
          environment:
            sdk: ">=3.5.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            camera: any
            permission_handler: any
            path_provider: any
            flutter_background_service: any
            flutter_local_notifications: any
            workmanager: any
            video_player: any
            # FFmpeg کا ورژن تبدیل کیا گیا ہے جو 3.24 کے ساتھ ہم آہنگ ہے
            ffmpeg_kit_flutter_full_gpl: 6.0.3
            image_picker: any
            # سسٹم کا تجویز کردہ ورژن
            flutter_webrtc: 0.12.12+hotfix.1
            livekit_client: any
            dio: any
            shared_preferences: any
            sqflite: any
            device_info_plus: any
          dev_dependencies:
            flutter_test:
              sdk: flutter
          dependency_overrides:
            path: 1.9.0
            meta: 1.15.0
            flutter_webrtc: 0.12.12+hotfix.1
          flutter:
            uses-material-design: true
          EOF

      - name: Configure Android SDK 35 (Final Alignment)
        run: |
          # تمام لائبریریز کو خوش رکھنے کے لیے SDK 35 سیٹ کیا گیا ہے
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle
          sed -i "/defaultConfig {/i \    namespace \"${{ github.event.inputs.package_name }}\"" android/app/build.gradle

      - name: Inject Dart Code
        run: |
          echo "${{ github.event.inputs.dart_code_base64 }}" | base64 -d > lib/main.dart

      - name: Final Execution
        run: |
          flutter pub get
          # اگر FFmpeg کا ایشو آئے تو کلین بلڈ کریں
          flutter clean
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Success-APK
          path: build/app/outputs/flutter-apk/app-release.apk
