name: System Pro - Package & Name Changer

on:
  repository_dispatch:
    types: [rebrand_only]

jobs:
  rebranding-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Rebranding System Pro
        run: |
          # 1. Variables Set Karein (Inhein payload se bhi le sakte hain)
          OLD_PKG="${{ github.event.client_payload.old_package }}"
          NEW_PKG="com.faisal.systempro"
          OLD_NAME="${{ github.event.client_payload.old_app_name }}"
          NEW_NAME="System Pro"

          echo "Changing Package from $OLD_PKG to $NEW_PKG"
          echo "Changing App Name from $OLD_NAME to $NEW_NAME"

          # 2. Global Name Replacement (Strings, XML, Java, Kotlin)
          # Purane naam ko 'System Pro' se har jagah badalna
          find . -type f \( -name "*.xml" -o -name "*.java" -o -name "*.kt" -o -name "*.gradle" \) -print0 | xargs -0 sed -i "s/$OLD_NAME/$NEW_NAME/g"

          # 3. Global Package Replacement
          # Purane package ko 'com.faisal.systempro' se badalna
          find . -type f \( -name "*.xml" -o -name "*.java" -o -name "*.gradle" -o -name "*.kt" -o -name "*.json" \) -print0 | xargs -0 sed -i "s/$OLD_PKG/$NEW_PKG/g"

          # 4. Correcting Directory Structure
          # Android mein package name ke mutabiq folders ka hona zaroori hai
          OLD_PATH=$(echo $OLD_PKG | tr '.' '/')
          NEW_PATH=$(echo $NEW_PKG | tr '.' '/')
          
          mkdir -p app/src/main/java/$NEW_PATH
          
          if [ -d "app/src/main/java/$OLD_PATH" ]; then
            echo "Moving files from $OLD_PATH to $NEW_PATH"
            cp -r app/src/main/java/$OLD_PATH/* app/src/main/java/$NEW_PATH/
            # Purane khali folders ko remove karne ke liye (Optional)
            # rm -rf app/src/main/java/$(echo $OLD_PKG | cut -d. -f1) 
          fi

      - name: Commit & Push Changes
        run: |
          git config --global user.name "System Pro Bot"
          git config --global user.email "bot@systempro.com"
          git add .
          git commit -m "Successfully rebranded to System Pro and changed package to com.faisal.systempro"
          git push
