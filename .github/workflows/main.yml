name: System-Pro-V17-6-Master

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  Build-Job:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Setup
        uses: actions/checkout@v4

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 AI Core Engine (V17.6)
        shell: python
        run: |
          import os, json, re, shutil
          
          # مکمل صفائی
          if os.path.exists('app'): shutil.rmtree('app')
          
          try:
              payload_raw = r"""${{ toJson(github.event.client_payload) }}"""
              payload = json.loads(payload_raw) if payload_raw != "null" else {}
          except: payload = {}

          java_code = payload.get("java", "")
          pkg_name = payload.get("package_name", "com.faisal.systempro")
          pkg_path = pkg_name.replace('.', '/')

          # ضروری ڈائریکٹریز
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)

          # 1. آٹو امپورٹ فکسر (AI Logic)
          # اگر کوڈ میں AppCompatActivity ہے لیکن امپورٹ نہیں، تو یہ اسے ڈال دے گا
          required_imports = [
              "import androidx.appcompat.app.AppCompatActivity;",
              "import android.os.Bundle;",
              "import android.view.View;",
              "import android.widget.*;"
          ]
          for imp in required_imports:
              if imp not in java_code:
                  java_code = java_code.replace(f"package {pkg_name};", f"package {pkg_name};\n{imp}")

          # 2. فکسڈ جاوا رائٹنگ
          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w", encoding='utf-8') as f:
              f.write(java_code)

          # 3. مینی فیسٹ اور تھیمز (Robust Styles)
          with open("app/src/main/res/values/themes.xml", "w") as f:
              f.write('<resources><style name="Theme.SystemPro" parent="Theme.AppCompat.Light.NoActionBar"/></resources>')
          
          with open("app/src/main/AndroidManifest.xml", "w") as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="System Pro V17.6" android:theme="@style/Theme.SystemPro"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')

          # 4. لے آؤٹ جنریٹر (Checking for R.layout.activity_main)
          with open("app/src/main/res/layout/activity_main.xml", "w") as f:
              f.write('<?xml version="1.0" encoding="utf-8"?><RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#FFFFFF"><TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="System Pro Engine Active" android:layout_centerInParent="true"/></RelativeLayout>')

          # 5. گریڈل (Modern & Fast)
          with open("app/build.gradle", "w") as f:
              f.write(f"plugins {{ id 'com.android.application' }}\nandroid {{ namespace '{pkg_name}'\ncompileSdk 34\ndefaultConfig {{ applicationId '{pkg_name}'\nminSdk 24\ntargetSdk 34 }} }}\ndependencies {{ implementation 'androidx.appcompat:appcompat:1.6.1'\nimplementation 'com.google.android.material:material:1.9.0' }}")
          
          with open("settings.gradle", "w") as f: f.write("include ':app'")
          with open("build.gradle", "w") as f: f.write("buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }\nallprojects { repositories { google(); mavenCentral() } }")

      - name: 🏗️ Execute Build
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 📤 Final Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V17-6-RELEASE
          path: app/build/outputs/apk/debug/
