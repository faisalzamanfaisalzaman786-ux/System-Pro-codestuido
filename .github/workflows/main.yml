name: Build Flutter APK (Final WebRTC & Kotlin Fix)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
      package_name:
        description: 'Package Name'
        required: true
      app_icon_base64:
        description: 'Base64 of icon'
        required: false
      dart_code_base64:
        description: 'Base64 of main.dart'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Stable Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Clean Project
        run: |
          find . -maxdepth 1 -not -path '*/.*' -not -name '.' -exec rm -rf {} +
          flutter create --org $(echo ${{ github.event.inputs.package_name }} | cut -d'.' -f1,2) --project-name system_pro_app --platforms android .

      - name: Write Pubspec
        run: |
          cat <<EOF > pubspec.yaml
          name: system_pro_app
          description: "System Pro App Build"
          publish_to: none
          version: 1.0.0+1
          environment:
            sdk: ">=3.5.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            camera: any
            permission_handler: any
            path_provider: any
            flutter_background_service: any
            flutter_local_notifications: any
            workmanager: any
            video_player: any
            # FFmpeg کو ابھی بھی ہٹا کر رکھا ہے تاکہ پہلے Kotlin کا مسئلہ حل ہو
            image_picker: any
            flutter_webrtc: 0.12.2
            livekit_client: any
            dio: any
            shared_preferences: any
            sqflite: any
            device_info_plus: any
          dev_dependencies:
            flutter_test:
              sdk: flutter
          dependency_overrides:
            path: 1.9.0
            meta: 1.15.0
          flutter:
            uses-material-design: true
          EOF

      - name: 🛠️ ⚡ High-Priority Kotlin & Build Fix
        run: |
          flutter pub get

          # 1. Project Level Build.gradle - Kotlin Version Update
          cat <<EOF > android/build.gradle
          buildscript {
              ext.kotlin_version = '1.9.22'  // جدید ترین کوٹلن ورژن
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.1'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:\$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url 'https://jitpack.io' }
              }
          }
          EOF

          # 2. Settings.gradle - Plugin Management Fix
          # فلٹر کے نئے ورژنز میں یہاں سے بھی کوٹلن ورژن کنٹرول ہوتا ہے
          cat <<EOF > android/settings.gradle
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()

              includeBuild("\$flutterSdkPath/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
              id "com.android.application" version "8.2.1" apply false
              id "org.jetbrains.kotlin.android" version "1.9.22" apply false
          }

          include ":app"
          EOF

          # 3. App Level Build.gradle - Namespace & SDK 35
          cat <<EOF > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          android {
              namespace "${{ github.event.inputs.package_name }}"
              compileSdkVersion 35
              
              defaultConfig {
                  applicationId "${{ github.event.inputs.package_name }}"
                  minSdkVersion 24
                  targetSdkVersion 35
                  versionCode 1
                  versionName "1.0"
                  multiDexEnabled true
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }
          }

          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
          }
          EOF

          # 4. Force Kotlin version on all sub-projects
          echo "subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 35
                          defaultConfig { targetSdkVersion 35 }
                      }
                  }
                  if (project.plugins.hasPlugin('kotlin-android')) {
                      project.kotlin {
                          jvmTarget = '17'
                      }
                  }
              }
          }" >> android/build.gradle

      - name: Inject Dart Code
        run: echo "${{ github.event.inputs.dart_code_base64 }}" | base64 -d > lib/main.dart

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Kotlin-Fixed-APK
          path: build/app/outputs/flutter-apk/app-release.apk
