name: System-Pro-V25.5-Hybrid-Engine
on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-app]

jobs:
  Build-Engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout Code
        uses: actions/checkout@v4

      - name: 🧼 Pre-Build Deep Clean
        run: |
          rm -rf app/src/main/java/*
          rm -rf app/src/main/res/layout/*
          rm -rf app/src/main/res/mipmap-*
          rm -rf app/build/
          echo "Workspace Cleaned."

      - name: 🏗️ Setup Official Structure
        run: |
          mkdir -p app/src/main/java
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle

      - name: 🧬 AI Hybrid Engine (Template, Payload & URL)
        shell: python
        run: |
          import os, json, re, base64, shutil, urllib.request

          # پے لوڈ حاصل کرنا
          event_path = os.getenv('GITHUB_EVENT_PATH')
          with open(event_path, 'r') as f:
              event_data = json.load(f)
          payload = event_data.get('client_payload', {})

          target_pkg = payload.get('target_package', 'com.system.pro').strip()
          pkg_path = target_pkg.replace('.', '/')
          res_folders = ['mipmap-mdpi', 'mipmap-hdpi', 'mipmap-xhdpi', 'mipmap-xxhdpi']

          # 1. URL Icon Logic (Default URL if payload is empty)
          # یہاں آپ اپنا مستقل ڈیفالٹ لنک بھی بدل سکتے ہیں
          default_icon = "https://raw.githubusercontent.com/faisalzaman/System-Pro-codestuido/main/templates/app_icon.png"
          icon_url = payload.get('icon_url', default_icon)
          
          icon_success = False
          if icon_url and icon_url.startswith('http'):
              try:
                  urllib.request.urlretrieve(icon_url, 'temp_icon.png')
                  for folder in res_folders:
                      os.makedirs(f'app/src/main/res/{folder}', exist_ok=True)
                      shutil.copy('temp_icon.png', f'app/src/main/res/{folder}/ic_launcher.png')
                  icon_success = True
                  print("AI: Icon synced via URL.")
              except:
                  print("AI: URL failed, trying fallback.")

          # 2. Base64 Fallback
          if not icon_success:
              icon_b64 = payload.get('icon_base64')
              if icon_b64 and len(icon_b64) > 100:
                  img_data = base64.b64decode(icon_b64)
                  for folder in res_folders:
                      os.makedirs(f'app/src/main/res/{folder}', exist_ok=True)
                      with open(f'app/src/main/res/{folder}/ic_launcher.png', 'wb') as f:
                          f.write(img_data)
                  icon_success = True

          # 3. Code Merger (Template or Payload)
          def get_code(file_path, payload_key, fallback):
              if os.path.exists(file_path) and os.path.getsize(file_path) > 10:
                  with open(file_path, 'r') as f: return f.read()
              return payload.get(payload_key, fallback)

          java_content = get_code('templates/app_logic.java', 'java_code', f"package {target_pkg};\nimport android.os.Bundle;\nimport androidx.appcompat.app.AppCompatActivity;\npublic class MainActivity extends AppCompatActivity {{ @Override protected void onCreate(Bundle savedInstanceState) {{ super.onCreate(savedInstanceState); setContentView(R.layout.activity_main); }} }}")
          java_content = re.sub(r'^package\s+[\w\.]+;', f'package {target_pkg};', java_content.strip())
          
          xml_content = get_code('templates/app_ui.xml', 'xml_code', '<?xml version="1.0" encoding="utf-8"?><RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000000"><TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="System Pro Ready" android:textColor="#00FF00" android:layout_centerInParent="true" /></RelativeLayout>')

          # Writing Files
          java_dir = f'app/src/main/java/{pkg_path}'
          os.makedirs(java_dir, exist_ok=True)
          with open(f'{java_dir}/MainActivity.java', 'w', encoding='utf-8') as f: f.write(java_content)
          with open('app/src/main/res/layout/activity_main.xml', 'w', encoding='utf-8') as f: f.write(xml_content)
          with open('app/src/main/AndroidManifest.xml', 'w', encoding='utf-8') as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="System Pro" android:theme="@style/Theme.AppCompat" android:icon="@mipmap/ic_launcher"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')

          with open('env_vars.sh', 'w') as f: f.write(f"export TARGET_PKG='{target_pkg}'")

      - name: 📝 Final Gradle Config
        run: |
          source env_vars.sh
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace '$TARGET_PKG'
              compileSdk 34
              defaultConfig {
                  applicationId "$TARGET_PKG"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF
          echo '<resources><style name="Theme.AppCompat" parent="Theme.MaterialComponents.DayNight.NoActionBar"/></resources>' > app/src/main/res/values/themes.xml

      - name: ☕ Setup Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew clean assembleDebug

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V25.5-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: 🚿 Post-Build Wash
        if: always()
        run: |
          rm -rf app/src/main/java/*
          rm -rf app/src/main/res/layout/*
          rm -f env_vars.sh
          echo "Workspace Cleaned for next run."
