name: System-Pro-Master-Framework-V12

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Mode'
        default: 'AI-Architect-Standard'
  push:
    branches: [ "main", "master" ]

jobs:
  Unified-AI-Build-Engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🛠️ 1. Analysis & Checkout
        uses: actions/checkout@v4

      - name: ☕ 2. Java Runtime Setup (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 3. AI Architect (Auto-Generation & Logic Sync)
        shell: python
        run: |
          import os, json
          
          # پے لوڈ کو محفوظ طریقے سے ریڈ کرنا
          try:
              raw_payload = r"""${{ toJson(github.event.client_payload) }}"""
              payload = json.loads(raw_payload) if raw_payload != "null" else {}
          except:
              payload = {}

          # ڈیفالٹ ویلیوز (اگر ڈیٹا نہ ملے)
          pkg_name = payload.get("package_name", "com.faisal.systempro")
          app_name = "System Pro V12"
          
          # ڈائریکٹری اسٹرکچر بنانا
          pkg_path = pkg_name.replace('.', '/')
          folders = [
              f"app/src/main/java/{pkg_path}",
              "app/src/main/res/layout",
              "app/src/main/res/values"
          ]
          for folder in folders: os.makedirs(folder, exist_ok=True)

          # --- 1. Automated build.gradle (Professional Settings) ---
          with open("settings.gradle", "w") as f: f.write("include ':app'")
          
          with open("build.gradle", "w") as f:
              f.write("buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }\n")
              f.write("allprojects { repositories { google(); mavenCentral() } }")

          app_gradle = f"""
          plugins {{ id 'com.android.application' }}
          android {{
              namespace '{pkg_name}'
              compileSdk 34
              defaultConfig {{
                  applicationId '{pkg_name}'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "12.0"
              }}
          }}
          dependencies {{
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }}
          """
          with open("app/build.gradle", "w") as f: f.write(app_gradle)

          # --- 2. AI UI/UX Sync (Styles & Layout) ---
          with open("app/src/main/res/values/themes.xml", "w") as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.SystemPro" parent="Theme.MaterialComponents.DayNight.NoActionBar"><item name="android:statusBarColor">#000000</item></style></resources>')

          layout_content = """<?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000000">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="System Pro AI Active" android:textColor="#39FF14" android:layout_centerInParent="true" android:textSize="24sp" />
          </RelativeLayout>"""
          with open("app/src/main/res/layout/activity_main.xml", "w") as f: f.write(layout_content)

          # --- 3. Manifest Auto-Generation ---
          manifest = f"""<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="{app_name}" android:theme="@style/Theme.SystemPro">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>"""
          with open("app/src/main/AndroidManifest.xml", "w") as f: f.write(manifest)

          # --- 4. Java Boilerplate (اگر کوڈ نہ ہو تو) ---
          java_code = payload.get("java", f"package {pkg_name};\nimport androidx.appcompat.app.AppCompatActivity;\nimport android.os.Bundle;\npublic class MainActivity extends AppCompatActivity {{ protected void onCreate(Bundle s) {{ super.onCreate(s); setContentView(R.layout.activity_main); }} }}")
          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w") as f: f.write(java_code)

      - name: 🚀 4. Build Execution
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: 📦 5. Output Management
        if: always()
        run: |
          mkdir -p final_apk
          find app/build/outputs/apk/ -name "*.apk" -exec cp {} final_apk/SystemPro_V12.apk \;

      - name: 📤 6. Deliver Artifact
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V12-Final
          path: final_apk/
