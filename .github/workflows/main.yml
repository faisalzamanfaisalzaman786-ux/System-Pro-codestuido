name: System-Pro-Smart-UI-V15-1

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  Self-Healing-Build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Sync
        uses: actions/checkout@v4

      - name: 🧠 AI Smart-Size Designer
        shell: python
        run: |
          import os, subprocess, json, re

          # ڈیٹا حاصل کرنا
          raw_payload = r"""${{ toJson(github.event.client_payload) }}"""
          payload = json.loads(raw_payload) if raw_payload != "null" else {}
          java_code = payload.get("java", "")
          pkg_name = payload.get("package_name", "com.faisal.systempro")
          pkg_path = pkg_name.replace('.', '/')

          # 1. آئی ڈیز نکالنا
          found_ids = list(set(re.findall(r"R\.id\.(\w+)", java_code)))

          # 2. اسمارٹ ڈیزائن لاجک (Size & Alignment)
          widgets_xml = ""
          
          # کیلکولیٹر کے لیے بٹنز کو گرڈ میں رکھنے کی کوشش
          is_calc = any(x in java_code.lower() for x in ["calc", "math", "digit"])
          
          if is_calc:
              # کیلکولیٹر کے لیے ہم ہر 4 بٹن کے بعد ایک نئی 'Row' بنائیں گے
              widgets_xml += '<GridLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:columnCount="4" android:rowCount="5">\n'
              for wid in found_ids:
                  widgets_xml += f"""
                  <Button
                      android:id="@+id/{wid}"
                      android:layout_width="0dp"
                      android:layout_height="80dp"
                      android:layout_columnWeight="1"
                      android:text="{wid.replace('btn', '')}"
                      android:layout_margin="2dp"
                      android:backgroundTint="#3F51B5"
                      android:textColor="#FFFFFF"
                      android:textSize="18sp" />\n"""
              widgets_xml += '</GridLayout>'
          else:
              # ایڈیٹر یا ٹارچ کے لیے لینیئر ڈیزائن
              for wid in found_ids:
                  if "Editor" in wid or "content" in wid.lower():
                      widgets_xml += f'<EditText android:id="@+id/{wid}" android:layout_width="match_parent" android:layout_height="300dp" android:gravity="top" android:background="#F5F5F5" android:padding="10dp" android:layout_margin="5dp" android:hint="{wid}"/>\n'
                  elif "Preview" in wid or "Image" in wid:
                      widgets_xml += f'<ImageView android:id="@+id/{wid}" android:layout_width="200dp" android:layout_height="200dp" android:layout_gravity="center" android:src="@android:drawable/ic_menu_report_image"/>\n'
                  else:
                      # عام بٹنز کے لیے خوبصورت اسٹائل اور متناسب سائز
                      widgets_xml += f"""
                      <Button
                          android:id="@+id/{wid}"
                          android:layout_width="match_parent"
                          android:layout_height="65dp"
                          android:text="{wid}"
                          android:layout_margin="8dp"
                          android:backgroundTint="#2196F3"
                          android:textColor="#FFFFFF"
                          android:textAllCaps="false"
                          android:textSize="16sp" />\n"""

          # 3. فائنل XML
          final_xml = f"""<?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:fillViewport="true">
              <LinearLayout android:orientation="vertical" android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="10dp" android:background="#FFFFFF">
                  <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="System Pro Smart UI" android:textSize="22sp" android:gravity="center" android:padding="15dp" android:textStyle="bold"/>
                  {widgets_xml}
              </LinearLayout>
          </ScrollView>"""

          # فائلز بنانا (باقی کوڈ وہی ہے جو بلڈ کرتا ہے)
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          with open("app/src/main/res/layout/activity_main.xml", "w") as f: f.write(final_xml)
          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w") as f: f.write(java_code)
          
          # بلڈ کنفیگریشن
          with open("app/build.gradle", "w") as f:
              f.write(f"plugins {{ id 'com.android.application' }}\nandroid {{ namespace '{pkg_name}'\ncompileSdk 34\ndefaultConfig {{ applicationId '{pkg_name}'\nminSdk 24\ntargetSdk 34 }} }}\ndependencies {{ implementation 'androidx.appcompat:appcompat:1.6.1'\nimplementation 'com.google.android.material:material:1.9.0' }}")
          with open("settings.gradle", "w") as f: f.write("include ':app'")
          with open("build.gradle", "w") as f: f.write("buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }\nallprojects { repositories { google(); mavenCentral() } }")
          with open("app/src/main/AndroidManifest.xml", "w") as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="System Pro" android:theme="@style/Theme.AppCompat.Light.NoActionBar"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')

          # بلڈ شروع
          subprocess.run(['gradle', 'wrapper', '--gradle-version', '8.5'], check=True)
          subprocess.run(['./gradlew', 'assembleDebug', '--no-daemon'], check=True)

      - name: 📦 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Smart-Sized-App
          path: app/build/outputs/apk/debug/*.apk
