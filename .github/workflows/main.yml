name: System-Pro-V50-Direct-Input
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'ایپ کا نام (مثلاً: System Pro)'
        required: true
        default: 'System Pro'
      package_name:
        description: 'پیکج نیم (مثلاً: com.system.pro)'
        required: true
        default: 'com.system.pro'
      java_code:
        description: 'جاوا کوڈ (MainActivity.java)'
        required: true
        type: string
      xml_code:
        description: 'ایکس ایم ایل کوڈ (activity_main.xml)'
        required: true
        type: string
      manifest_code:
        description: 'مینی فیسٹ کوڈ (اگر آپ اپنا مینی فیسٹ دینا چاہیں)'
        required: false
        type: string

jobs:
  Build-Engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout
        uses: actions/checkout@v4

      - name: 🧬 1. Direct Code Processing
        shell: python
        run: |
          import os, re, base64

          # ان پٹس کا ڈیٹا لینا
          pkg = "${{ github.event.inputs.package_name }}"
          app_name = "${{ github.event.inputs.app_name }}"
          java_raw = """${{ github.event.inputs.java_code }}"""
          xml_raw = """${{ github.event.inputs.xml_code }}"""
          manifest_raw = """${{ github.event.inputs.manifest_code }}"""

          # ڈھانچہ بنانا
          j_path = f"app/src/main/java/{pkg.replace('.', '/')}"
          os.makedirs(j_path, exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)
          os.makedirs("app/src/main/res/mipmap-mdpi", exist_ok=True)

          # جاوا فائل لکھنا اور پیکج نیم درست کرنا
          java_final = re.sub(r'package\s+[\w\.]+;', f'package {pkg};', java_raw)
          with open(f"{j_path}/MainActivity.java", 'w', encoding='utf-8') as f:
              f.write(java_final)

          # ایکس ایم ایل فائل لکھنا
          xml_clean = re.sub(r'<\?xml.*?\?>', '', xml_raw).strip()
          with open("app/src/main/res/layout/activity_main.xml", 'w', encoding='utf-8') as f:
              f.write('<?xml version="1.0" encoding="utf-8"?>\n' + xml_clean)

          # مینی فیسٹ کی تیاری
          if len(manifest_raw.strip()) > 20:
              final_manifest = manifest_raw
          else:
              final_manifest = f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android" package="{pkg}"><application android:label="{app_name}" android:theme="@style/Theme.AppCompat" android:icon="@mipmap/ic_launcher" android:allowBackup="true" android:supportsRtl="true"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>'
          
          with open('app/src/main/AndroidManifest.xml', 'w', encoding='utf-8') as f:
              f.write(final_manifest)

          # لازمی پراپرٹیز (جو پچھلی بار فیل ہوئی تھیں)
          with open('gradle.properties', 'w') as f:
              f.write("android.useAndroidX=true\nandroid.enableJetifier=true\n")
          
          # بلڈ فائلز
          with open('settings.gradle', 'w') as f: f.write("include ':app'")
          with open('build.gradle', 'w') as f:
              f.write("buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.0' } }\nallprojects { repositories { google(); mavenCentral() } }")
          with open('app/build.gradle', 'w') as f:
              f.write(f"apply plugin: 'com.android.application'\nandroid {{ namespace '{pkg}'; compileSdk 34; defaultConfig {{ applicationId '{pkg}'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' }} }}\ndependencies {{ implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.11.0' }}")
          with open('app/src/main/res/values/themes.xml', 'w') as f:
              f.write('<resources><style name="Theme.AppCompat" parent="Theme.MaterialComponents.DayNight.NoActionBar"/></resources>')
          with open('app/src/main/res/mipmap-mdpi/ic_launcher.png', 'wb') as f:
              f.write(base64.b64decode("iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg=="))

      - name: ☕ 2. Setup Java
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: 🛠️ 3. Final Compilation
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --quiet

      - name: 📤 4. Upload APK
        uses: actions/upload-artifact@v4
        with: { name: System-Pro-Manual-Build, path: app/build/outputs/apk/debug/*.apk }
