name: System-Pro-V16-4-Crash-Shield

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  Self-Healing-Build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Sync
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 AI Crash-Shield Engine (V16.4)
        shell: python
        run: |
          import os, json, re

          # ڈیٹا لوڈنگ
          try:
              payload_raw = r"""${{ toJson(github.event.client_payload) }}"""
              payload = json.loads(payload_raw) if payload_raw != "null" else {}
          except: payload = {}

          java_code = payload.get("java", "")
          pkg_name = payload.get("package_name", "com.faisal.systempro")
          pkg_path = pkg_name.replace('.', '/')

          # 1. ڈیپ اسکیننگ (IDs اور Layouts)
          required_layouts = set(re.findall(r"R\.layout\.([a-zA-Z0-9_]+)", java_code))
          all_ids = list(set(re.findall(r"R\.id\.([a-zA-Z0-9_]+)", java_code)))
          
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)

          # 2. کریش پروف لے آؤٹ جنریٹر
          def create_smart_layout(name, is_main=False):
              if is_main:
                  # مین لے آؤٹ میں تمام IDs کا ہونا لازمی ہے تاکہ NullPointerException نہ آئے
                  widgets = ""
                  for wid in all_ids:
                      if any(x in wid.lower() for x in ["editor", "code", "input", "text"]):
                          widgets += f'<EditText android:id="@+id/{wid}" android:layout_width="match_parent" android:layout_height="250dp" android:background="#FFFFFF" android:gravity="top" android:padding="10dp" android:layout_margin="8dp" android:hint="{wid}" android:textColor="#000000" android:inputType="textMultiLine"/>\n'
                      else:
                          widgets += f'<Button android:id="@+id/{wid}" android:layout_width="match_parent" android:layout_height="70dp" android:text="{wid}" android:layout_margin="6dp" android:backgroundTint="#1B4F72" android:textColor="#FFFFFF" android:textAllCaps="false"/>\n'
                  
                  content = f"""<?xml version="1.0" encoding="utf-8"?>
                  <androidx.core.widget.NestedScrollView xmlns:android="http://schemas.android.com/apk/res/android"
                      android:layout_width="match_parent" android:layout_height="match_parent" android:fillViewport="true">
                      <LinearLayout android:orientation="vertical" android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="10dp">
                          {widgets}
                      </LinearLayout>
                  </androidx.core.widget.NestedScrollView>"""
              else:
                  content = f'<?xml version="1.0" encoding="utf-8"?><LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="20dp"><TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="System Pro Dynamic Dialog"/></LinearLayout>'
              
              with open(f"app/src/main/res/layout/{name}.xml", "w", encoding='utf-8') as f:
                  f.write(content)

          for layout in required_layouts:
              create_smart_layout(layout, is_main=(layout == "activity_main"))
          
          # اگر activity_main لسٹ میں نہیں تھی، تو اسے لازمی بنائیں
          if "activity_main" not in required_layouts:
              create_smart_layout("activity_main", is_main=True)

          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w", encoding='utf-8') as f: f.write(java_code)
          
          # 3. میگا مینی فیسٹ (تھیم فکس کے ساتھ)
          with open("app/src/main/AndroidManifest.xml", "w", encoding='utf-8') as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="System Pro" android:theme="@style/Theme.MaterialComponents.Light.NoActionBar"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')

          # گریڈل کنفیگ
          with open("gradle.properties", "w") as f: f.write("android.useAndroidX=true\nandroid.enableJetifier=true\norg.gradle.jvmargs=-Xmx2048m")
          with open("app/build.gradle", "w") as f:
              f.write(f"plugins {{ id 'com.android.application' }}\nandroid {{ namespace '{pkg_name}'\ncompileSdk 34\ndefaultConfig {{ applicationId '{pkg_name}'\nminSdk 24\ntargetSdk 34 }} }}\ndependencies {{ implementation 'androidx.appcompat:appcompat:1.6.1'\nimplementation 'com.google.android.material:material:1.9.0' }}")
          with open("settings.gradle", "w") as f: f.write("include ':app'")
          with open("build.gradle", "w") as f: f.write("buildscript {{ repositories {{ google(); mavenCentral() }}; dependencies {{ classpath 'com.android.tools.build:gradle:8.2.2' }} }}\nallprojects {{ repositories {{ google(); mavenCentral() }} }}")

      - name: 🏗️ Build Protected APK
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 📤 Upload Final Shielded APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V16-4-SHIELDED
          path: app/build/outputs/apk/debug/*.apk
