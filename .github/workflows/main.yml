name: Build System Pro (Dynamic)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name (e.g. System Pro)'
        required: true
        default: 'System Pro'
        type: string
      package_name:
        description: 'Android Package Name (e.g. com.system.pro)'
        required: true
        default: 'com.system.pro'
        type: string
      app_icon_base64:
        description: 'Base64 encoded PNG (max 1MB) - leave empty to keep default'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter 3.10.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'
          channel: 'stable'

      - name: Fix pubspec.yaml package name (replace hyphens with underscore)
        run: |
          sed -i 's/name: System-Pro-codestuido/name: system_pro_codestuido/' pubspec.yaml

      - name: Set app display name in AndroidManifest.xml
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          if [ -z "$APP_NAME" ]; then
            APP_NAME="System Pro"
          fi
          sed -i 's/android:label=".*"/android:label="'"$APP_NAME"'"/' android/app/src/main/AndroidManifest.xml

      - name: Change Android package name (applicationId + manifest + folder structure)
        run: |
          NEW_PKG="${{ github.event.inputs.package_name }}"
          if [ -z "$NEW_PKG" ]; then
            NEW_PKG="com.system.pro"
          fi
          OLD_PKG="com.system.pro"
          # If old package not found, try to detect from build.gradle
          if ! grep -q "$OLD_PKG" android/app/build.gradle; then
            OLD_PKG=$(grep 'applicationId' android/app/build.gradle | cut -d '"' -f2)
          fi
          echo "Renaming package from $OLD_PKG to $NEW_PKG"
          
          # Update build.gradle
          sed -i "s/applicationId \"$OLD_PKG\"/applicationId \"$NEW_PKG\"/" android/app/build.gradle
          
          # Update AndroidManifest.xml package attribute
          sed -i "s/package=\"$OLD_PKG\"/package=\"$NEW_PKG\"/" android/app/src/main/AndroidManifest.xml
          
          # Move MainActivity.kt to new package directory
          OLD_PATH=$(echo $OLD_PKG | tr '.' '/')
          NEW_PATH=$(echo $NEW_PKG | tr '.' '/')
          mkdir -p android/app/src/main/kotlin/$NEW_PATH
          if [ -f "android/app/src/main/kotlin/$OLD_PATH/MainActivity.kt" ]; then
            mv android/app/src/main/kotlin/$OLD_PATH/MainActivity.kt android/app/src/main/kotlin/$NEW_PATH/MainActivity.kt
            # Update package line inside MainActivity.kt
            sed -i "s/package $OLD_PKG/package $NEW_PKG/" android/app/src/main/kotlin/$NEW_PATH/MainActivity.kt
          fi
          # Remove old empty directories (optional)
          rm -rf android/app/src/main/kotlin/$OLD_PATH || true

      - name: Replace app icon if base64 provided
        if: github.event.inputs.app_icon_base64 != ''
        run: |
          echo "${{ github.event.inputs.app_icon_base64 }}" | base64 -d > /tmp/icon.png
          # Install ImageMagick for resizing
          sudo apt-get update && sudo apt-get install -y imagemagick
          # Define sizes: mdpi=48, hdpi=72, xhdpi=96, xxhdpi=144, xxxhdpi=192
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          convert /tmp/icon.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert /tmp/icon.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert /tmp/icon.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert /tmp/icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          echo "App icon updated from base64"

      - name: Create missing styles.xml (if not exists)
        run: |
          mkdir -p android/app/src/main/res/values
          if [ ! -f android/app/src/main/res/values/styles.xml ]; then
            cat > android/app/src/main/res/values/styles.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Light.NoTitleBar">
                  <item name="android:windowBackground">@android:color/white</item>
              </style>
          </resources>
          EOF
          fi

      - name: Clean and get dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.event.inputs.package_name }}-${{ github.run_number }}.apk
          path: build/app/outputs/flutter-apk/app-release.apk
