name: System-Pro-V58-Monitor-Hub
on:
  workflow_dispatch:
    inputs:
      app_name: { description: 'App Name', required: true, default: 'System Pro' }
      package_name: { description: 'Package Name', required: true }
      java_code: { description: 'MainActivity.java (Raw Content)', required: true, type: string }
      xml_code: { description: 'activity_main.xml (Raw Content)', required: true, type: string }
      manifest_code: { description: 'AndroidManifest.xml (Raw Content)', required: true, type: string }

jobs:
  Monitoring-Engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🧬 1. Resource Monitoring & Selection
        shell: python
        run: |
          import os, base64

          # خام مال (Raw Resources) وصول کرنا
          pkg = "${{ github.event.inputs.package_name }}".strip()
          app_name = "${{ github.event.inputs.app_name }}".strip()
          java_raw = r"""${{ github.event.inputs.java_code }}"""
          xml_raw = r"""${{ github.event.inputs.xml_code }}"""
          manifest_raw = r"""${{ github.event.inputs.manifest_code }}"""

          # انجن کا مانیٹرنگ سسٹم: فولڈرز کی تیاری
          j_dir = f"app/src/main/java/{pkg.replace('.', '/')}"
          os.makedirs(j_dir, exist_ok=True)
          for path in ["app/src/main/res/layout", "app/src/main/res/values", "app/src/main/res/drawable"]:
              os.makedirs(path, exist_ok=True)

          # --- 🚀 مانیٹرنگ لاجک: کوڈ کو بغیر تبدیل کیے فائل میں ڈالنا ---
          with open(f"{j_dir}/MainActivity.java", 'w', encoding='utf-8') as f: f.write(java_raw)
          with open("app/src/main/res/layout/activity_main.xml", 'w', encoding='utf-8') as f: f.write(xml_raw)
          with open('app/src/main/AndroidManifest.xml', 'w', encoding='utf-8') as f: f.write(manifest_raw)

          # --- 🚀 ریسورس پرووائیڈر: تمام مٹیریل اور گریڈل ریسورسز مہیا کرنا ---
          # یہاں انجن خود کار طریقے سے تمام ممکنہ اسٹائلز اور کلرز فراہم کر رہا ہے
          with open('app/src/main/res/values/colors.xml', 'w') as f:
              f.write('<?xml version="1.0" encoding="utf-8"?><resources><color name="colorPrimary">#00FFCC</color><color name="colorPrimaryDark">#02040c</color><color name="colorAccent">#ff3e8b</color></resources>')

          with open('app/src/main/res/values/styles.xml', 'w') as f:
              f.write(f'''<resources>
                  <style name="Theme.SystemProMaster" parent="Theme.MaterialComponents.DayNight.NoActionBar"/>
                  <style name="Theme.AppCompat" parent="Theme.MaterialComponents.DayNight.NoActionBar"/>
                  <style name="ActionButton" parent="Widget.MaterialComponents.Button.TextButton"/>
                  <style name="TabButton" parent="Widget.MaterialComponents.Button.UnelevatedButton"/>
                  <style name="BuildButton" parent="Widget.MaterialComponents.Button"/>
              </resources>''')

          # سسٹم ڈیفالٹس
          with open('gradle.properties', 'w') as f: f.write("android.useAndroidX=true\nandroid.enableJetifier=true\n")
          with open('settings.gradle', 'w') as f: f.write("include ':app'")
          with open('build.gradle', 'w') as f:
              f.write("buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.0' } }\nallprojects { repositories { google(); mavenCentral() } }")
          
          # اپلیکیشن انجن (لائبریریز کا انتخاب)
          with open('app/build.gradle', 'w') as f:
              f.write(f"""apply plugin: 'com.android.application'
              android {{ 
                  namespace '{pkg}'
                  compileSdk 34
                  defaultConfig {{ applicationId '{pkg}'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' }} 
              }}
              dependencies {{ 
                  implementation 'androidx.appcompat:appcompat:1.6.1'
                  implementation 'com.google.android.material:material:1.11.0'
                  implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              }}""")

      - name: ☕ 2. Java Environment Setup
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: 🛠️ 3. Monitored Build Process
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --quiet

      - name: 📤 4. Deliver Monitored APK
        uses: actions/upload-artifact@v4
        with: { name: System-Pro-V58-Build, path: app/build/outputs/apk/debug/*.apk }
