      - name: 🚀 4. Smart Build
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.systempro.app' }}"
          echo "include ':app'" > settings.gradle
          cat <<'EOF' > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { 
            namespace '$PKG_NAME'
            compileSdk 34
            defaultConfig { applicationId '$PKG_NAME'; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          dependencies { 
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.9.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF
          
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon > build_log.txt 2>&1 || touch build_failed.flag
          
          # فائنل کاپی لاجک (یہ سب سے اہم ہے)
          mkdir -p SystemPro_Output
          find app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} SystemPro_Output/SystemPro_v1.apk \;

      - name: 📦 6. Final Export
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-APK
          path: SystemPro_Output/SystemPro_v1.apk
