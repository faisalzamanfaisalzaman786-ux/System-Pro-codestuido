name: Android Build & Artifact

on:
  workflow_dispatch:          # دستی طور پر UI یا API سے ٹرگر کریں
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
  # اگر آپ کسٹم ایونٹ سے بھی ٹرگر کرنا چاہیں تو repository_dispatch بھی شامل کریں
  repository_dispatch:
    types: [build-android]   # یہ ایونٹ ٹائپ آپ API کال میں بھیج سکتے ہیں

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "release" ] || [ "${{ github.event.action }}" == "build-android" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-app
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
