name: System-Pro-V1100-Final-Xerox

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  full_mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Professional Sync
        run: |
          git config --global user.name "System Pro AI"
          git config --global user.email "ai@systempro.com"

          # ان کی ریپوزٹری کلون کرنا
          git clone --depth 1 https://github.com/fastlane/fastlane.git fastlane_temp
          
          # ان کا سیکیورٹی فولڈر اڑانا
          rm -rf fastlane_temp/.github
          
          # آپ کا اپنا ورک فلو بچا کر باقی سب مٹانا
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +
          
          # نیا ڈیٹا ڈالنا
          cp -rf fastlane_temp/* .
          rm -rf fastlane_temp
          
          # زبردستی پش کرنا (Force Push)
          git add -A
          git commit -m "System Pro: Xerox Success V1100" || echo "No changes"
          git push origin main --force
