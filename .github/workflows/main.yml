name: System-Pro-V62-Engine
on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  Build-Binary:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout Knowledge Base
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 AI Analysis & Resource Discovery
        shell: bash
        run: |
          # آف لائن بنڈل اور بنیادی فولڈرز
          mkdir -p system_pro_offline_bundle/res_templates
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          
          PKG_PATH=$(echo "${{ github.event.client_payload.package_name }}" | tr '.' '/')
          mkdir -p "app/src/main/java/$PKG_PATH"

          # پے لوڈ ڈی کوڈنگ
          echo "${{ github.event.client_payload.java_b64 }}" | base64 --decode > "app/src/main/java/$PKG_PATH/MainActivity.java"
          echo "${{ github.event.client_payload.xml_b64 }}" | base64 --decode > "app/src/main/res/layout/activity_main.xml"
          echo "${{ github.event.client_payload.manifest_b64 }}" | base64 --decode > "app/src/main/AndroidManifest.xml"

          # آئیکن مینجمنٹ
          if [ ! -z "${{ github.event.client_payload.icon_data_b64 }}" ]; then
            echo "${{ github.event.client_payload.icon_data_b64 }}" | base64 --decode > app/src/main/res/drawable/ic_launcher.png
          else
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==" | base64 --decode > app/src/main/res/drawable/ic_launcher.png
          fi

          # AI Resource Logic
          python3 -c "
          import re, os
          xml_content = open('app/src/main/res/layout/activity_main.xml').read()
          required_styles = re.findall(r'@style/(\w+)', xml_content)
          kb_path = 'system_pro_offline_bundle/res_templates/master_styles.xml'
          
          initial = '<resources>\n    <style name=\"Theme.SystemProMaster\" parent=\"Theme.MaterialComponents.DayNight.NoActionBar\">\n        <item name=\"colorPrimary\">#00FFCC</item>\n    </style>\n</resources>'
          if not os.path.exists(kb_path):
              with open(kb_path, 'w') as f: f.write(initial)
          
          existing = open(kb_path).read()
          new_entries = ''
          for style in set(required_styles):
              if f'name=\"{style}\"' not in existing:
                  new_entries += f'    <style name=\"{style}\" parent=\"Widget.MaterialComponents.Button\">\n        <item name=\"android:layout_width\">wrap_content</item>\n    </style>\n'
          
          final = existing.replace('</resources>', new_entries + '</resources>')
          with open('app/src/main/res/values/styles.xml', 'w') as f: f.write(final)
          with open(kb_path, 'w') as f: f.write(final)
          "
          echo \"<resources><string name='app_name'>${{ github.event.client_payload.app_name }}</string></resources>\" > app/src/main/res/values/strings.xml

      - name: 🏗️ Smart Build Configuration
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace '${{ github.event.client_payload.package_name }}'
              compileSdk 34
              defaultConfig {
                  applicationId '${{ github.event.client_payload.package_name }}'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF
          
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: 🚀 Execute Production Build
        run: |
          # یہاں ہم مخصوص کر رہے ہیں کہ :app ماڈیول کا ٹاسک چلایا جائے
          ./gradlew :app:assembleDebug --quiet

      - name: 💾 Save Offline Resources
        if: always()
        run: |
          git config --global user.name "System-Pro-AI"
          git config --global user.email "ai-engine@systempro.pk"
          if [ -d "system_pro_offline_bundle" ] && [ -n "$(git status --porcelain system_pro_offline_bundle)" ]; then
            git add system_pro_offline_bundle/
            git commit -m "AI: Offline resources updated [Build #${{ github.run_number }}]"
            git push origin main
          fi

      - name: 📤 Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Build
          path: app/build/outputs/apk/debug/*.apk
