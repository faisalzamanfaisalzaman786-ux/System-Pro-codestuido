name: System-Pro-V75-Main-Engine

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: AI-Master-Injector (Resource Guard Mode)
        shell: python
        run: |
          import base64, os, re

          p = ${{ toJson(github.event.client_payload) }}
          pkg = p.get('package_name', 'com.system.pro')
          app_name = p.get('app_name', 'System Pro')
          path = pkg.replace('.', '/')

          def safe_write(file_path, content):
              os.makedirs(os.path.dirname(file_path), exist_ok=True)
              with open(file_path, "w", encoding="utf-8") as f:
                  f.write(content)

          # 1. Java Injection & Package Fix
          java_raw = p.get('java_b64', '')
          java_code = ""
          if java_raw:
              if "," in java_raw: java_raw = java_raw.split(",")[1]
              java_code = base64.b64decode(java_raw).decode('utf-8', errors='ignore')
              java_code = re.sub(r'```java|```', '', java_code).strip()
              java_code = re.sub(r'package\s+[\w.]+;', f'package {pkg};', java_code) if "package " in java_code else f"package {pkg};\n\n" + java_code
              safe_write(f"app/src/main/java/{path}/MainActivity.java", java_code)

          # 2. Main XML Injection
          xml_raw = p.get('xml_b64', '')
          if xml_raw:
              if "," in xml_raw: xml_raw = xml_raw.split(",")[1]
              xml_code = base64.b64decode(xml_raw).decode('utf-8', errors='ignore')
              safe_write("app/src/main/res/layout/activity_main.xml", xml_code)

          # 3. RESOURCE GUARD (مسنگ فائلز اور آئی ڈیز کا علاج)
          # اگر جاوا میں dialog_settings ہے تو فائل بناؤ
          if "dialog_settings" in java_code:
              dialog_xml = '''<?xml version="1.0" encoding="utf-8"?>
              <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
                  android:orientation="vertical" android:padding="16dp"
                  android:layout_width="match_parent" android:layout_height="wrap_content">
                  <EditText android:id="@+id/etAppName" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="App Name"/>
                  <EditText android:id="@+id/etPkgName" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="Package"/>
                  <EditText android:id="@+id/etGhToken" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="Token"/>
                  <EditText android:id="@+id/etGhRepo" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="Repo"/>
              </LinearLayout>'''
              safe_write("app/src/main/res/layout/dialog_settings.xml", dialog_xml)

          # 4. Sync Configurations
          safe_write("app/src/main/res/values/strings.xml", f'<resources><string name="app_name">{app_name}</string></resources>')
          
          # Gradle & Manifest Sync
          for f_path in ["app/build.gradle", "app/src/main/AndroidManifest.xml"]:
              if os.path.exists(f_path):
                  with open(f_path, "r") as f: c = f.read()
                  c = re.sub(r"namespace\s+'.*'", f"namespace '{pkg}'", c)
                  c = re.sub(r'applicationId\s+".*"', f'applicationId "{pkg}"', c)
                  c = re.sub(r'android:name="[\w.]+"', f'android:name="{pkg}.MainActivity"', c, 1)
                  safe_write(f_path, c)

      - name: Final Build Execution
        run: gradle assembleDebug --no-daemon

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-Stable
          path: app/build/outputs/apk/debug/*.apk
