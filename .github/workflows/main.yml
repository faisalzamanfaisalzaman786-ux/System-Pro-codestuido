name: System-Pro-AI-Engine-v2

on:
  repository_dispatch:
    types: [build-app]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  System-Pro-Build-Job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 🛠️ 1. Setup Environment
        uses: actions/checkout@v4

      - name: ☕ 2. Java Configuration (LTS 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 3. Smart Self-Healing Engine (Full Resource Guard)
        shell: python
        run: |
          import os, re, json
          
          raw_payload = r"""${{ toJson(github.event.client_payload) }}"""
          try:
              payload = json.loads(raw_payload, strict=False) if raw_payload != "null" else {}
          except:
              payload = {}

          pkg_name = payload.get("package_name", "com.faisal.systempro")
          java_code = payload.get("java", "// System Pro Active")
          xml_code = payload.get("xml", "").strip()
          
          # No Drinks Constraint
          java_code = re.sub(r'drink|alcohol|beer|wine', "SystemProCore", java_code, flags=re.IGNORECASE)

          pkg_path = pkg_name.replace('.', '/')
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)

          # --- سمارٹ ریسورس ریکوری (Smart Resource Recovery) ---
          
          # 1. اسٹائلز چیکر: XML میں استعمال ہونے والے تمام اسٹائلز نکالیں
          styles_needed = re.findall(r'style/(\w+)', xml_code)
          
          # ڈیفالٹ اسٹائلز کی لسٹ
          default_styles = {
              "ActionButton": '<item name="android:textAllCaps">false</item><item name="android:backgroundTint">#00FF00</item>',
              "TabButton": '<item name="android:background">?attr/selectableItemBackground</item>',
              "BuildButton": '<item name="android:textStyle">bold</item><item name="android:textColor">#FFFFFF</item>',
              "Theme.SystemPro": '<item name="colorPrimary">#00FF00</item><item name="android:windowBackground">#121212</item>'
          }

          styles_xml = '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n'
          # جو بھی اسٹائل XML کو چاہیے، اسے یہاں ڈیفائن کریں
          for s in set(styles_needed + ["Theme.SystemPro"]):
              inner = default_styles.get(s, '<item name="android:visibility">visible</item>')
              parent = "Theme.AppCompat.DayNight.NoActionBar" if "Theme" in s else "Widget.AppCompat.Button"
              styles_xml += f'    <style name="{s}" parent="{parent}">{inner}</style>\n'
          styles_xml += '</resources>'

          # 2. آئی ڈی ریکوری (جاوا کوڈ کی بنیاد پر)
          ids_in_java = set(re.findall(r'R\.id\.(\w+)', java_code))
          if ids_in_java:
              generated_views = ""
              for idx in ids_in_java:
                  if f'android:id="@+id/{idx}"' not in xml_code:
                      generated_views += f'\n    <View android:id="@+id/{idx}" android:layout_width="0dp" android:layout_height="0dp" android:visibility="gone" />'
              
              if "</RelativeLayout>" in xml_code: xml_code = xml_code.replace("</RelativeLayout>", f"{generated_views}\n</RelativeLayout>")
              elif "</LinearLayout>" in xml_code: xml_code = xml_code.replace("</LinearLayout>", f"{generated_views}\n</LinearLayout>")
              elif "</ConstraintLayout>" in xml_code: xml_code = xml_code.replace("</ConstraintLayout>", f"{generated_views}\n</ConstraintLayout>")

          # فائلیں لکھنا
          with open("app/src/main/res/values/styles.xml", "w") as f: f.write(styles_xml)
          with open("app/src/main/res/values/strings.xml", "w") as f: f.write('<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">System Pro</string></resources>')
          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w", encoding="utf-8") as f: f.write(java_code)
          with open("app/src/main/res/layout/activity_main.xml", "w", encoding="utf-8") as f: f.write(xml_code)

          # Manifest
          manifest = f'''<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:label="System Pro" android:theme="@style/Theme.SystemPro">
                  <activity android:name="{pkg_name}.MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>'''
          with open("app/src/main/AndroidManifest.xml", "w") as f: f.write(manifest)

      - name: 🚀 4. Build Engine (Professional)
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace '$PKG_NAME'; compileSdk 34; defaultConfig { applicationId '$PKG_NAME'; minSdk 24; targetSdk 34; versionCode 1; versionName "3.0" } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0'; implementation 'androidx.constraintlayout:constraintlayout:2.1.4' }
          EOF
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: 📦 5. Export Final APK
        if: always()
        run: |
          mkdir -p SystemPro_Output
          find . -name "*.apk" -type f -exec cp {} SystemPro_Output/SystemPro_AI_Final.apk \;

      - name: 📤 6. Deployment
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-Build
          path: SystemPro_Output/SystemPro_AI_Final.apk
