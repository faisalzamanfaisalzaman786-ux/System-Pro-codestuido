      - name: 🏗️ 3. Assembly
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          mkdir -p "app/src/main/java/$PKG_PATH" "app/src/main/res/layout"
          
          cat <<'EOF' > "app/src/main/java/$PKG_PATH/MainActivity.java"
          ${{ github.event.client_payload.java }}
          EOF
          
          cat <<'EOF' > "app/src/main/res/layout/activity_main.xml"
          ${{ github.event.client_payload.xml }}
          EOF
          
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript { 
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { 
            namespace '$PKG_NAME'
            compileSdk 34
            defaultConfig { 
              applicationId '$PKG_NAME'
              minSdk 24
              targetSdk 34
              versionCode 1            # یہ لائن لازمی ہے
              versionName "1.0"        # یہ لائن لازمی ہے
            }
          }
          dependencies { 
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: 🚀 4. Smart Build
        id: build_step
        run: |
          # گریڈل ریپر بنانا تاکہ ورژن فکس رہے
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
