name: System Pro Mega Reset

on:
  workflow_dispatch: # صرف ایک کلک پر سب کچھ ٹھیک کرنے کے لیے

jobs:
  total_rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Triple Clean & Setup
        run: |
          git config --global user.name "System Pro Master"
          git config --global user.email "master@systempro.local"
          
          # 1. سب کچھ صاف (Purge)
          rm -rf *
          
          # 2. نیٹو فولڈر سٹرکچر بنانا
          mkdir -p app/src/main/java/com/systempro/main
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

          # 3. تمام ضروری فائلیں خود جنریٹ کرنا (Automatic Coding)
          
          # Settings
          echo "include ':app'" > settings.gradle

          # Root build.gradle
          echo "buildscript { repositories { google(); mavenCentral() } 
          dependencies { classpath 'com.android.tools.build:gradle:8.2.0' } }
          allprojects { repositories { google(); mavenCentral() } }" > build.gradle

          # App build.gradle
          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.systempro.main'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.systempro.main'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }" > app/build.gradle

          # MainActivity.java (Native Code)
          echo "package com.systempro.main;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.TextView;
          import android.view.Gravity;
          public class MainActivity extends Activity {
              @Override protected void onCreate(Bundle saved) {
                  super.onCreate(saved);
                  TextView tv = new TextView(this);
                  tv.setText(\"System Pro Native App\\nSuccessfully Built!\");
                  tv.setTextSize(24);
                  tv.setGravity(Gravity.CENTER);
                  setContentView(tv);
              }
          }" > app/src/main/java/com/systempro/main/MainActivity.java

          # AndroidManifest.xml
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@android:style/Theme.DeviceDefault">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

      - name: Force Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2

      - name: Push Clean Structure
        run: |
          git add .
          git commit -m "Mega Reset: Pure Native Structure Standing"
          git push origin main --force

      - name: Build APK Immediately
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Final-App
          path: app/build/outputs/apk/debug/*.apk