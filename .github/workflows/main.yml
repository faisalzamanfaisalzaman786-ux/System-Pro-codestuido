name: System-Pro-V800-Auto-Executor

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  auto_sync_and_wipe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Checkout Your Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Direct Xerox Sync (No Errors)
        run: |
          git config --global user.name "System Pro AI"
          git config --global user.email "ai@systempro.com"

          # ان کی ریپوزٹری کو بطور ریموٹ ایڈ کرنا
          git remote add external https://github.com/fastlane/fastlane.git
          git fetch external master

          # آپ کی ریپوزٹری کو ان کے اسٹرکچر پر ری سیٹ کرنا (پورا ڈیٹا واش ہو جائے گا)
          # ہم ان کے ورک فلو فولڈر (.github) کو ہٹا دیں گے تاکہ گٹھاب اعتراض نہ کرے
          git checkout external/master -- .
          rm -rf .github/workflows/announce_release.yml # مخصوص ایرر والی فائل ہٹانا
          
          # تبدیلیوں کو زبردستی پش کرنا
          git add .
          git commit -m "System Pro: Final Xerox Sync V800" || echo "No changes"
          git push origin main --force
