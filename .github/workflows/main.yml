name: System-Pro-AI-Engine-v2

on:
  repository_dispatch:
    types: [build-app]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  System-Pro-Build-Job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 🛠️ 1. Setup Environment
        uses: actions/checkout@v4

      - name: ☕ 2. Java Configuration (LTS 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 3. Self-Healing AI Compiler (Smart Resource Generator)
        shell: python
        run: |
          import os, re, json
          
          raw_payload = r"""${{ toJson(github.event.client_payload) }}"""
          try:
              payload = json.loads(raw_payload, strict=False) if raw_payload != "null" else {}
          except:
              payload = {}

          pkg_name = payload.get("package_name", "com.faisal.systempro")
          java_code = payload.get("java", "// System Pro Active")
          xml_code = payload.get("xml", "").strip()
          
          # No Drinks Constraint
          java_code = re.sub(r'drink|alcohol|beer|wine', "SystemProCore", java_code, flags=re.IGNORECASE)

          pkg_path = pkg_name.replace('.', '/')
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)

          # --- سمارٹ XML جنریشن (جاوا کوڈ کی بنیاد پر) ---
          ids_in_java = set(re.findall(r'R\.id\.(\w+)', java_code))
          
          # اگر XML خالی ہے یا بہت چھوٹی ہے، تو ایک بنیادی ڈھانچہ بنائیں
          if len(xml_code) < 50:
              xml_code = '<?xml version="1.0" encoding="utf-8"?>\n<RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:padding="16dp">\n</RelativeLayout>'

          # تمام مسنگ آئی ڈیز کے لیے موزوں ویجیٹس خودکار طور پر لکھنا
          generated_views = ""
          for idx in ids_in_java:
              if f'android:id="@+id/{idx}"' not in xml_code:
                  # آئی ڈی کے نام سے اندازہ لگانا کہ وہ کیا ہے (مثال: btn -> Button, et -> EditText)
                  if idx.startswith("btn") or "button" in idx.lower():
                      generated_views += f'\n    <Button android:id="@+id/{idx}" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="{idx}" />'
                  elif idx.startswith("et") or "edit" in idx.lower():
                      generated_views += f'\n    <EditText android:id="@+id/{idx}" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="{idx}" />'
                  elif idx.startswith("tv") or "text" in idx.lower():
                      generated_views += f'\n    <TextView android:id="@+id/{idx}" android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="{idx}" />'
                  else:
                      generated_views += f'\n    <View android:id="@+id/{idx}" android:layout_width="0dp" android:layout_height="0dp" android:visibility="gone" />'

          # XML کو صاف ستھرا بند کرنا اور نئے ویوز شامل کرنا
          if "</RelativeLayout>" in xml_code:
              xml_code = xml_code.replace("</RelativeLayout>", f"{generated_views}\n</RelativeLayout>")
          elif "</LinearLayout>" in xml_code:
              xml_code = xml_code.replace("</LinearLayout>", f"{generated_views}\n</LinearLayout>")
          else:
              xml_code = xml_code + "\n" + generated_views

          # لے آؤٹ اور اسٹائلز لکھنا
          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w", encoding="utf-8") as f: f.write(java_code)
          with open("app/src/main/res/layout/activity_main.xml", "w", encoding="utf-8") as f: f.write(xml_code)
          with open("app/src/main/res/values/styles.xml", "w") as f:
              f.write('<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.SystemPro" parent="Theme.AppCompat.DayNight.NoActionBar"><item name="colorPrimary">#00FF00</item></style></resources>')

          # Manifest
          manifest = f'''<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:label="System Pro" android:theme="@style/Theme.SystemPro">
                  <activity android:name="{pkg_name}.MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>'''
          with open("app/src/main/AndroidManifest.xml", "w") as f: f.write(manifest)

      - name: 🚀 4. Build Engine (Professional Compilation)
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { 
              namespace '$PKG_NAME'
              compileSdk 34 
              defaultConfig { applicationId '$PKG_NAME'; minSdk 24; targetSdk 34; versionCode 1; versionName "2.5" } 
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: 📦 5. Export Smart Output
        if: always()
        run: |
          mkdir -p SystemPro_Output
          find . -name "*.apk" -type f -exec cp {} SystemPro_Output/SystemPro_AI_Smart.apk \;

      - name: 📤 6. Deployment
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Smart-Build
          path: SystemPro_Output/SystemPro_AI_Smart.apk
