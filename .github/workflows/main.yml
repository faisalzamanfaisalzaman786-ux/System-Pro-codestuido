name: System-Pro-Smart-UI-V15-2

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  Self-Healing-Build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Sync Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 AI Smart-UI & Build Engine
        shell: python
        run: |
          import os, subprocess, json, re

          # ڈیٹا حاصل کرنا
          raw_payload = r"""${{ toJson(github.event.client_payload) }}"""
          payload = json.loads(raw_payload) if raw_payload != "null" else {}
          java_code = payload.get("java", "")
          pkg_name = payload.get("package_name", "com.faisal.systempro")
          pkg_path = pkg_name.replace('.', '/')

          # 1. آئی ڈیز کا اخراج
          found_ids = list(set(re.findall(r"R\.id\.(\w+)", java_code)))

          # 2. ڈائنامک ڈیزائن جنریٹر (Size & Adjustment Focus)
          widgets_xml = ""
          
          # چیک کریں کہ کیا یہ کیلکولیٹر ہے؟
          is_calc = any(x in java_code.lower() for x in ["calc", "math", "digit", "result"])

          if is_calc:
              # کیلکولیٹر کے لیے اسمارٹ گرڈ (خودکار سائزنگ)
              widgets_xml += '<GridLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:columnCount="4" android:alignmentMode="alignMargins" android:columnOrderPreserved="false">\n'
              for wid in found_ids:
                  widgets_xml += f"""
                  <Button
                      android:id="@+id/{wid}"
                      android:layout_width="0dp"
                      android:layout_height="75dp"
                      android:layout_columnWeight="1"
                      android:layout_margin="4dp"
                      android:text="{wid.replace('btn', '')}"
                      android:backgroundTint="#2C3E50"
                      android:textColor="#FFFFFF"
                      android:textSize="18sp"
                      android:padding="10dp" />\n"""
              widgets_xml += '</GridLayout>'
          else:
              # ٹارچ یا ایڈیٹر کے لیے ایڈجسٹ ایبل لسٹ
              for wid in found_ids:
                  if "Editor" in wid or "Area" in wid:
                      widgets_xml += f'<EditText android:id="@+id/{wid}" android:layout_width="match_parent" android:layout_height="350dp" android:gravity="top" android:background="#ECF0F1" android:padding="12dp" android:layout_margin="8dp" android:hint="{wid}" android:inputType="textMultiLine"/>\n'
                  elif "Preview" in wid or "icon" in wid:
                      widgets_xml += f'<ImageView android:id="@+id/{wid}" android:layout_width="match_parent" android:layout_height="250dp" android:scaleType="centerInside" android:src="@android:drawable/ic_dialog_info" android:layout_margin="10dp"/>\n'
                  else:
                      # پروفیشنل بٹن سائز
                      widgets_xml += f"""
                      <Button
                          android:id="@+id/{wid}"
                          android:layout_width="match_parent"
                          android:layout_height="70dp"
                          android:text="{wid}"
                          android:layout_margin="10dp"
                          android:backgroundTint="#3498DB"
                          android:textColor="#FFFFFF"
                          android:textAllCaps="false"
                          android:textSize="17sp" />\n"""

          # 3. فائنل XML اسٹرکچر
          final_xml = f"""<?xml version="1.0" encoding="utf-8"?>
          <androidx.core.widget.NestedScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:fillViewport="true" android:background="#FDFEFE">
              <LinearLayout android:orientation="vertical" android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="12dp">
                  <TextView android:layout_width="match_parent" android:layout_height="wrap_content" android:text="System Pro v15.2" android:textSize="24sp" android:gravity="center" android:padding="20dp" android:textColor="#2E4053" android:textStyle="bold"/>
                  {widgets_xml}
              </LinearLayout>
          </androidx.core.widget.NestedScrollView>"""

          # فائلز لکھنا
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          with open("app/src/main/res/layout/activity_main.xml", "w") as f: f.write(final_xml)
          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w") as f: f.write(java_code)
          
          # گریڈل کنفیگریشن
          with open("app/build.gradle", "w") as f:
              f.write(f"plugins {{ id 'com.android.application' }}\nandroid {{ namespace '{pkg_name}'\ncompileSdk 34\ndefaultConfig {{ applicationId '{pkg_name}'\nminSdk 24\ntargetSdk 34 }} }}\ndependencies {{ implementation 'androidx.appcompat:appcompat:1.6.1'\nimplementation 'com.google.android.material:material:1.9.0'\nimplementation 'androidx.gridlayout:gridlayout:1.0.0' }}")
          with open("settings.gradle", "w") as f: f.write("include ':app'")
          with open("build.gradle", "w") as f: f.write("buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }\nallprojects { repositories { google(); mavenCentral() } }")
          with open("app/src/main/AndroidManifest.xml", "w") as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="System Pro" android:theme="@style/Theme.AppCompat.Light.NoActionBar"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')

          # بلڈ کے مراحل
          print("🧼 Cleaning and Building...")
          subprocess.run(['gradle', 'wrapper', '--gradle-version', '8.5'], check=True)
          # بلڈ سے پہلے کلین کریں تاکہ پرانے مسائل ختم ہوں
          subprocess.run(['./gradlew', 'clean'], check=True)
          result = subprocess.run(['./gradlew', 'assembleDebug', '--no-daemon'], capture_output=True, text=True)
          
          if result.returncode != 0:
              print("❌ ERROR LOG:\n", result.stdout, result.stderr)
              exit(1)
          else:
              print("✅ SUCCESS!")

      - name: 📦 Upload
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V15-2-APK
          path: app/build/outputs/apk/debug/*.apk
