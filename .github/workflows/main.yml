name: System Pro - Project Sanitization & Restoration
on:
  workflow_dispatch: # اسے آپ مینوئلی رن کریں گے

permissions:
  contents: write

jobs:
  sanitize-project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 1. Delete Non-Project Files (The Purge)
        run: |
          echo "Starting Purge of unnecessary files..."
          # ان فائلوں کو ڈیلیٹ کرنا جو اینڈرائیڈ پروجیکٹ کا حصہ نہیں ہیں
          find . -type f -name "*.exe" -delete
          find . -type f -name "*.bin" -delete
          find . -type f -name "*.apk" -delete
          # پرانے ڈویلپر کے کسٹم لنکس یا ٹیکسٹ فائلیں جو کام کی نہیں ہیں
          find . -maxdepth 1 -type f -name "*.txt" ! -name "requirements.txt" -delete
          find . -maxdepth 1 -type f -name "*.md" ! -name "README.md" -delete
          
          # کسی بھی نامعلوم یا فالتو فولڈر کی صفائی (احتیاط کے ساتھ)
          rm -rf .externalNativeBuild || true
          rm -rf .cxx || true

      - name: 2. Core Structure Protection
        run: |
          echo "Ensuring Core Android folders exist..."
          mkdir -p app/src/main/java/com/faisal/systempro
          mkdir -p app/src/main/res
          mkdir -p app/src/main/assets

      - name: 3. Intelligent File Relocation
        run: |
          echo "Moving Java/Kotlin files to new package structure..."
          # تمام سورس کوڈ کو تلاش کر کے نئے پیکج میں منتقل کرنا
          find . -path "./app/src/main/java/*" -name "*.java" -o -name "*.kt" | while read -r file; do
            mv "$file" app/src/main/java/com/faisal/systempro/ 2>/dev/null || true
          done

      - name: 4. Library & Resource Audit
        run: |
          echo "Validating Libraries and XML Resources..."
          # یہ یقینی بنانا کہ build.gradle اور libs فولڈر محفوظ ہیں
          ls -R app/libs || echo "No external libs found, keeping internal ones."
          ls app/src/main/res/values/themes.xml || echo "Themes.xml is safe."

      - name: 5. Final Code Integrity (Muzammil-AI)
        run: |
          git config --global user.name "System Pro Sanitizer"
          git config --global user.email "cleanup@systempro.ai"
          git add .
          git commit -m "Project Sanitized: Removed extra files, restored core structure"
          git push --force
