name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Check Files (Debug)
        run: ls -R # یہ کمانڈ لاگز میں دکھائے گی کہ فائلیں کہاں ہیں

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        # ہم نے یہاں --stacktrace شامل کیا ہے تاکہ اگر کوئی غلطی ہو تو تفصیلی رپورٹ ملے
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/*.apk" # تمام فولڈرز میں کسی بھی APK کو تلاش کرو
          if-no-files-found: error
