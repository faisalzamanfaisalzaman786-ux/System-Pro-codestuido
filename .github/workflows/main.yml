name: System Pro Ultimate Engine

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.0.2
          cache-disabled: true

      - name: 4. Build Structure & Secure Injection
        shell: bash
        env:
          JAVA_BASE64: ${{ github.event.client_payload.java }}
          XML_BASE64: ${{ github.event.client_payload.xml }}
          PKG_NAME: ${{ github.event.client_payload.package_name }}
        run: |
          rm -rf app
          FINAL_PKG=${PKG_NAME:-"com.faisal.systempro"}
          PKG_PATH=$(echo "$FINAL_PKG" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout

          # اینڈرائیڈ کی بنیادی سیٹنگز
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties
          echo "include ':app'" > settings.gradle

          # build.gradle فائلز
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace '$FINAL_PKG'
              compileSdk 33
              defaultConfig {
                  applicationId "$FINAL_PKG"
                  minSdk 21
                  targetSdk 33
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

          # اسٹائلز کا فکس
          cat <<EOF > app/src/main/res/values/styles.xml
          <resources>
              <style name="Theme.SystemPro" parent="Theme.MaterialComponents.DayNight.NoActionBar"/>
              <style name="ActionButton" parent="Widget.MaterialComponents.Button.TextButton"/>
              <style name="TabButton" parent="Widget.MaterialComponents.Button.UnelevatedButton"/>
              <style name="BuildButton" parent="Widget.MaterialComponents.Button"/>
          </resources>
          EOF

          # --- محفوظ طریقہ: کوڈ کو رائٹ کرنا ---
          # اگر کوڈ Base64 میں ہے تو اسے ڈیکوڈ کرے گا، ورنہ سادہ ٹیکسٹ لکھے گا
          if [[ "$JAVA_BASE64" == *" "* ]] || [[ -z "$JAVA_BASE64" ]]; then
            printf "%s" "$JAVA_BASE64" > app/src/main/java/$PKG_PATH/MainActivity.java
          else
            echo "$JAVA_BASE64" | base64 --decode > app/src/main/java/$PKG_PATH/MainActivity.java || printf "%s" "$JAVA_BASE64" > app/src/main/java/$PKG_PATH/MainActivity.java
          fi

          if [[ "$XML_BASE64" == *" "* ]] || [[ -z "$XML_BASE64" ]]; then
            printf "%s" "$XML_BASE64" > app/src/main/res/layout/activity_main.xml
          else
            echo "$XML_BASE64" | base64 --decode > app/src/main/res/layout/activity_main.xml || printf "%s" "$XML_BASE64" > app/src/main/res/layout/activity_main.xml
          fi

          # مینی فیسٹ
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.SystemPro">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 5. Execute Build
        run: gradle assembleDebug --no-daemon

      - name: 6. Deliver APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-V5-Final
          path: app/build/outputs/apk/debug/*.apk
