name: System-Pro-Master-Framework-V12

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

env:
  # گٹ ہب کی نئی وارننگ کو ختم کرنے کے لیے
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Unified-AI-Build-Engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🛠️ 1. Infrastructure Sync
        uses: actions/checkout@v4

      - name: ☕ 2. Java Environment Setup
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 3. AI Architect (Atomic Engine)
        shell: python
        run: |
          import os, json
          
          # پے لوڈ پروسیسنگ
          try:
              raw_payload = r"""${{ toJson(github.event.client_payload) }}"""
              payload = json.loads(raw_payload) if raw_payload != "null" else {}
          except:
              payload = {}

          pkg_name = payload.get("package_name", "com.faisal.systempro")
          pkg_path = pkg_name.replace('.', '/')
          
          # ڈائریکٹری اسٹرکچر
          dirs = [f"app/src/main/java/{pkg_path}", "app/src/main/res/layout", "app/src/main/res/values", "app/src/main/res/mipmap-mdpi"]
          for d in dirs: os.makedirs(d, exist_ok=True)

          # 1. Root Configuration
          with open("settings.gradle", "w") as f: f.write("include ':app'")
          with open("local.properties", "w") as f: f.write(f"sdk.dir=/usr/lib/android-sdk") # پاتھ فکس
          
          with open("build.gradle", "w") as f:
              f.write("buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }\n")
              f.write("allprojects { repositories { google(); mavenCentral() } }")

          # 2. App Module (Strong Sync)
          app_gradle = f"""
          plugins {{ id 'com.android.application' }}
          android {{
              namespace '{pkg_name}'
              compileSdk 34
              defaultConfig {{
                  applicationId '{pkg_name}'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "12.1"
              }}
              buildTypes {{ release {{ minifyEnabled false }} }}
          }}
          dependencies {{
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }}
          """
          with open("app/build.gradle", "w") as f: f.write(app_gradle)

          # 3. Essential Resources
          with open("app/src/main/res/values/strings.xml", "w") as f:
              f.write('<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">System Pro</string></resources>')
          with open("app/src/main/res/values/themes.xml", "w") as f:
              f.write('<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.SystemPro" parent="Theme.MaterialComponents.DayNight.NoActionBar"></style></resources>')

          # 4. Professional Manifest
          manifest = f"""<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.SystemPro">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>"""
          with open("app/src/main/AndroidManifest.xml", "w") as f: f.write(manifest)

          # 5. Java Implementation
          java_code = payload.get("java", f"package {pkg_name};\nimport androidx.appcompat.app.AppCompatActivity;\nimport android.os.Bundle;\npublic class MainActivity extends AppCompatActivity {{ @Override protected void onCreate(Bundle s) {{ super.onCreate(s); android.widget.TextView tv = new android.widget.TextView(this); tv.setText(\"System Pro V12.1 Online\"); tv.setGravity(17); tv.setTextSize(30); tv.setTextColor(android.graphics.Color.GREEN); setContentView(tv); }} }}")
          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w") as f: f.write(java_code)

      - name: 🚀 4. Production Build (Clean Execution)
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          # 'clean' کا اضافہ کیا گیا ہے تاکہ پرانی اسٹیٹ کا مسئلہ نہ آئے
          ./gradlew clean :app:assembleDebug --no-daemon --stacktrace

      - name: 📦 5. Output Management
        if: always()
        run: |
          mkdir -p build_output
          find . -name "*.apk" -type f -exec cp {} build_output/SystemPro_V12.apk \;

      - name: 📤 6. Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V12-Final-APK
          path: build_output/
