name: System-Pro-V40-Final
on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-app]

jobs:
  Build-Engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout
        uses: actions/checkout@v4

      - name: 🧼 1. Deep Clean
        run: |
          rm -rf app/src/main/java/*
          rm -rf app/src/main/res/layout/*
          rm -rf app/build/
          echo "REPORT: Workspace Sanitized."

      - name: 🏗️ 2. Structure setup
        run: |
          mkdir -p app/src/main/java
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-mdpi
          echo "android.useAndroidX=true" > gradle.properties
          echo "include ':app'" > settings.gradle

      - name: 🧬 3. AI Code Guardian
        shell: python
        run: |
          import os, json, re, shutil, urllib.request, base64
          try:
            with open(os.getenv('GITHUB_EVENT_PATH'), 'r') as f:
              payload = json.load(f).get('client_payload', {})
          except: payload = {}

          pkg = payload.get('target_package', 'com.system.pro').strip()
          
          def clean_code(code):
              if not code: return ""
              # غیر مرئی حروف اور فالتو سپیسز کا خاتمہ تاکہ کوڈ کرپٹ نہ ہو
              code = code.replace('\ufeff', '') 
              return code.strip()

          # پے لوڈ کو پہلی ترجیح، ٹیمپلیٹ کو دوسری
          java_raw = payload.get('java_code', "")
          xml_raw = payload.get('xml_code', "")

          if not java_raw and os.path.exists('templates/app_logic.java'):
              with open('templates/app_logic.java', 'r') as f: java_raw = f.read()
          if not xml_raw and os.path.exists('templates/app_ui.xml'):
              with open('templates/app_ui.xml', 'r') as f: xml_raw = f.read()

          java_content = clean_code(java_raw)
          xml_content = clean_code(xml_raw)

          # پیکیج نیم انجکشن
          java_content = re.sub(r'^package\s+[\w\.]+;', f'package {pkg};', java_content)
          
          # XML کی مکمل صفائی اور درستگی
          if 'xmlns:android' not in xml_content:
              xml_content = xml_content.replace('>', ' xmlns:android="http://schemas.android.com/apk/res/android">', 1)
          if not xml_content.startswith('<?xml'):
              xml_content = '<?xml version="1.0" encoding="utf-8"?>\n' + xml_content

          # فائلز کی تیاری
          j_dir = f"app/src/main/java/{pkg.replace('.', '/')}"
          os.makedirs(j_dir, exist_ok=True)
          with open(f"{j_dir}/MainActivity.java", 'w', encoding='utf-8') as f: f.write(java_content)
          with open("app/src/main/res/layout/activity_main.xml", 'w', encoding='utf-8') as f: f.write(xml_content)

          # بلڈ کنفیگریشن
          with open('app/src/main/AndroidManifest.xml', 'w') as f:
            f.write(f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="System Pro" android:theme="@style/Theme.AppCompat" android:icon="@mipmap/ic_launcher"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')
          with open('build.gradle', 'w') as f:
            f.write("buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.0' } }\nallprojects { repositories { google(); mavenCentral() } }")
          with open('app/build.gradle', 'w') as f:
            f.write(f"apply plugin: 'com.android.application'\nandroid {{ namespace '{pkg}'; compileSdk 34; defaultConfig {{ applicationId '{pkg}'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' }} }}\ndependencies {{ implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.11.0' }}")
          
          # Icon
          icon_path = 'app/src/main/res/mipmap-mdpi/ic_launcher.png'
          with open(icon_path, 'wb') as f: f.write(base64.b64decode("iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg=="))

      - name: 📝 4. Style Sync
        run: |
          echo '<resources><style name="Theme.AppCompat" parent="Theme.MaterialComponents.DayNight.NoActionBar"/></resources>' > app/src/main/res/values/themes.xml

      - name: ☕ 5. Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ 6. Build
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --quiet

      - name: 📤 7. Deploy
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V40-APK
          path: app/build/outputs/apk/debug/*.apk
