name: System-Pro-V55-Autonomous
on:
  workflow_dispatch:
    inputs:
      app_name: { description: 'App Name', required: true, default: 'System Pro' }
      package_name: { description: 'Package Name', required: true, default: 'com.faisal.systempro' }
      java_code: { description: 'Java Code', required: true, type: string }
      xml_code: { description: 'XML Layout', required: true, type: string }
      manifest_code: { description: 'Manifest XML', required: true, type: string }

jobs:
  Build-Engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout
        uses: actions/checkout@v4

      - name: 🧬 1. Universal Resource Binder
        shell: python
        run: |
          import os, re, base64

          pkg = "${{ github.event.inputs.package_name }}"
          app_name = "${{ github.event.inputs.app_name }}"
          java_raw = """${{ github.event.inputs.java_code }}"""
          xml_raw = """${{ github.event.inputs.xml_code }}"""
          manifest_raw = """${{ github.event.inputs.manifest_code }}"""

          # ڈھانچہ بنانا
          os.makedirs(f"app/src/main/java/{pkg.replace('.', '/')}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)
          os.makedirs("app/src/main/res/drawable", exist_ok=True)

          # --- خود مختار جاوا انجکشن ---
          java_final = re.sub(r'^[Pp]ackage\s+[\w\.]+;', f'package {pkg};', java_raw.strip(), flags=re.MULTILINE)
          with open(f"app/src/main/java/{pkg.replace('.', '/')}/MainActivity.java", 'w', encoding='utf-8') as f:
              f.write(java_final)

          # --- خود مختار XML اور اسٹائل ڈیٹیکشن ---
          with open("app/src/main/res/layout/activity_main.xml", 'w', encoding='utf-8') as f:
              f.write(xml_raw)

          # یہ لاجک XML سے تمام کسٹم اسٹائلز نکال کر انہیں ڈیفائن کر دے گی تاکہ بلڈ کبھی نہ رکے
          styles_found = re.findall(r'@style/(\w+)', xml_raw)
          style_entries = ""
          for s in set(styles_found):
              if s not in ["Theme.AppCompat", "Theme.MaterialComponents"]:
                  style_entries += f'<style name="{s}" parent="Widget.MaterialComponents.Button"/>\n'

          with open('app/src/main/res/values/styles.xml', 'w') as f:
              f.write(f'''<resources>
                  <style name="Theme.SystemProMaster" parent="Theme.MaterialComponents.DayNight.NoActionBar"/>
                  {style_entries}
              </resources>''')

          # --- مینی فیسٹ اور آئیکن ---
          with open('app/src/main/AndroidManifest.xml', 'w', encoding='utf-8') as f:
              f.write(manifest_raw)

          # ڈیفالٹ آئیکن (اگر کوئی اور نہیں دیا گیا)
          with open('app/src/main/res/drawable/ic_launcher.png', 'wb') as f:
              f.write(base64.b64decode("iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg=="))

          # اینڈرائیڈ کی تمام جدید لائبریریز کو جوڑنا
          with open('gradle.properties', 'w') as f: f.write("android.useAndroidX=true\nandroid.enableJetifier=true\n")
          with open('settings.gradle', 'w') as f: f.write("include ':app'")
          with open('build.gradle', 'w') as f:
              f.write("buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.0' } }\nallprojects { repositories { google(); mavenCentral() } }")
          with open('app/build.gradle', 'w') as f:
              f.write(f"""apply plugin: 'com.android.application'
              android {{ 
                  namespace '{pkg}'
                  compileSdk 34
                  defaultConfig {{ applicationId '{pkg}'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' }} 
              }}
              dependencies {{ 
                  implementation 'androidx.appcompat:appcompat:1.6.1'
                  implementation 'com.google.android.material:material:1.11.0'
                  implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              }}""")

      - name: ☕ 2. Setup Build Environment
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: 🛠️ 3. Start Autonomous Build
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --quiet

      - name: 📤 4. Deliver APK
        uses: actions/upload-artifact@v4
        with: { name: System-Pro-Master-Package, path: app/build/outputs/apk/debug/*.apk }
