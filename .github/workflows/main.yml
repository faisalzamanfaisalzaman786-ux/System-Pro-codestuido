name: System-Pro-Master-Framework-V12

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.vfs.watch=false -Dorg.gradle.projectcachedir=/tmp/gradle-cache"

jobs:
  Unified-AI-Build-Engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🛠️ 1. Environment Prep
        uses: actions/checkout@v4

      - name: ☕ 2. Java Runtime Setup
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 3. AI Architect (Sandbox Engine)
        shell: python
        run: |
          import os, json, shutil
          
          # پے لوڈ پروسیسنگ
          try:
              raw_payload = r"""${{ toJson(github.event.client_payload) }}"""
              payload = json.loads(raw_payload) if raw_payload != "null" else {}
          except:
              payload = {}

          pkg_name = payload.get("package_name", "com.faisal.systempro")
          pkg_path = pkg_name.replace('.', '/')
          
          # تمام پرانی اسٹیٹ کو ختم کرنا
          if os.path.exists('app'): shutil.rmtree('app')
          
          # نیا اسٹرکچر بنانا
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)

          # فائلز لکھنا (YAML کنٹرولڈ)
          with open("gradle.properties", "w") as f:
              f.write("android.useAndroidX=true\nandroid.enableJetifier=true\n")
          
          with open("settings.gradle", "w") as f: f.write("include ':app'")
          
          with open("build.gradle", "w") as f:
              f.write("buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }\n")
              f.write("allprojects { repositories { google(); mavenCentral() } }")

          app_gradle = f"""
          plugins {{ id 'com.android.application' }}
          android {{
              namespace '{pkg_name}'
              compileSdk 34
              defaultConfig {{
                  applicationId '{pkg_name}'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "12.6"
              }}
              buildTypes {{ release {{ minifyEnabled false }} }}
          }}
          dependencies {{
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }}
          """
          with open("app/build.gradle", "w") as f: f.write(app_gradle)

          manifest = f"""<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.AppCompat.DayNight.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>"""
          with open("app/src/main/AndroidManifest.xml", "w") as f: f.write(manifest)

          java_code = payload.get("java", f"package {pkg_name};\nimport android.os.Bundle;\nimport androidx.appcompat.app.AppCompatActivity;\npublic class MainActivity extends AppCompatActivity {{ @Override protected void onCreate(Bundle s) {{ super.onCreate(s); android.widget.TextView t = new android.widget.TextView(this); t.setText(\"System Pro V12.6 Sandbox\"); t.setGravity(17); t.setTextSize(30); setContentView(t); }} }}")
          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w") as f: f.write(java_code)

      - name: 🛡️ 4. Forced Execution (No-Cache Mode)
        run: |
          sync
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          # یہاں ہم گریڈل کو مجبور کر رہے ہیں کہ وہ اپنی یادداشت (Cache) کو بالکل استعمال نہ کرے
          ./gradlew :app:assembleDebug --no-daemon --no-build-cache --no-configuration-cache --stacktrace

      - name: 📦 5. Delivery Management
        if: always()
        run: |
          mkdir -p final_apk
          find . -name "*.apk" -type f -exec cp {} final_apk/SystemPro_V12.apk \;

      - name: 📤 6. Artifact Dispatch
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V12-Final-APK
          path: final_apk/
