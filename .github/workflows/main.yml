name: System-Pro-V60-Final-Infrastructure
on:
  workflow_dispatch:
    inputs:
      app_name: { description: 'App Name', required: true, default: 'System Pro' }
      package_name: { description: 'Package Name', required: true }
      java_code: { description: 'Paste Java Code', required: true, type: string }
      xml_code: { description: 'Paste XML Code', required: true, type: string }
      manifest_code: { description: 'Paste Manifest Code', required: true, type: string }

jobs:
  Build-Engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout
        uses: actions/checkout@v4

      - name: 🧬 1. Neutral Resource Deployment
        shell: bash
        run: |
          # پیکیج ڈائریکٹری تیار کرنا
          PKG_PATH=$(echo "${{ github.event.inputs.package_name }}" | tr '.' '/')
          mkdir -p "app/src/main/java/$PKG_PATH"
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          # --- 🚀 بغیر کسی تبدیلی کے براہِ راست انجکشن ---
          # یہاں ہم 'cat' استعمال کر رہے ہیں تاکہ AI یا Python کوڈ کو نہ چھیڑ سکے
          cat << 'EOF' > "app/src/main/java/$PKG_PATH/MainActivity.java"
          ${{ github.event.inputs.java_code }}
          EOF

          cat << 'EOF' > "app/src/main/res/layout/activity_main.xml"
          ${{ github.event.inputs.xml_code }}
          EOF

          cat << 'EOF' > "app/src/main/AndroidManifest.xml"
          ${{ github.event.inputs.manifest_code }}
          EOF

          # --- 🚀 ریسورس مانیٹرنگ (Standard Resources) ---
          cat << 'EOF' > "app/src/main/res/values/styles.xml"
          <resources>
              <style name="Theme.SystemProMaster" parent="Theme.MaterialComponents.DayNight.NoActionBar"/>
              <style name="Theme.AppCompat" parent="Theme.MaterialComponents.DayNight.NoActionBar"/>
              <style name="ActionButton" parent="Widget.MaterialComponents.Button.TextButton"/>
              <style name="TabButton" parent="Widget.MaterialComponents.Button.UnelevatedButton"/>
              <style name="BuildButton" parent="Widget.MaterialComponents.Button"/>
          </resources>
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="colorPrimary">#00FFCC</color><color name="colorPrimaryDark">#02040c</color><color name="colorAccent">#ff3e8b</color></resources>' > app/src/main/res/values/colors.xml

          # Gradle & Build Setup
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle
          
          cat << 'EOF' > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.0' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat << 'EOF' > app/build.gradle
          apply plugin: 'com.android.application'
          android { 
              namespace '${{ github.event.inputs.package_name }}'
              compileSdk 34
              defaultConfig { applicationId '${{ github.event.inputs.package_name }}'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' }
          }
          dependencies { 
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: ☕ 2. Setup Java
        uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: 🛠️ 3. Direct Monitored Build
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --quiet

      - name: 📤 4. Export APK
        uses: actions/upload-artifact@v4
        with: { name: System-Pro-V60-Build, path: app/build/outputs/apk/debug/*.apk }
