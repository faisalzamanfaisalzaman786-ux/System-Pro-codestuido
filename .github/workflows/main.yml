name: Build Flutter APK (SDK 36 & Surface Fix)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
      package_name:
        description: 'Package Name (e.g., com.system.pro)'
        required: true
      app_icon_base64:
        description: 'Base64 of icon image (PNG/JPG)'
        required: false
      dart_code_base64:
        description: 'Base64 of main.dart'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Create Project
        run: |
          find . -maxdepth 1 -not -path '*/.*' -not -name '.' -exec rm -rf {} +
          flutter create --org $(echo ${{ github.event.inputs.package_name }} | cut -d'.' -f1,2) --project-name system_pro_app --platforms android .

      - name: Write Pubspec
        run: |
          cat <<EOF > pubspec.yaml
          name: system_pro_app
          description: "System Pro Build"
          publish_to: none
          version: 1.0.0+1
          environment:
            sdk: ">=3.6.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            camera: any
            permission_handler: any
            path_provider: any
            flutter_background_service: any
            flutter_local_notifications: any
            workmanager: any
            video_player: any
            ffmpeg_kit_flutter_full_gpl: 6.0.3-LTS
            image_picker: any
            flutter_webrtc: any
            livekit_client: any
            dio: any
            shared_preferences: any
            sqflite: any
            device_info_plus: any
          dev_dependencies:
            flutter_test:
              sdk: flutter
          dependency_overrides:
            path: 1.9.0
            meta: 1.15.0
          flutter:
            uses-material-design: true
          EOF

      - name: Fix Android SDK to 36
        run: |
          # یہاں ہم زبردستی 36 سیٹ کر رہے ہیں تاکہ WebRTC خوش رہے
          sed -i 's/compileSdkVersion .*/compileSdkVersion 36/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 36/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle
          sed -i "/defaultConfig {/i \    namespace \"${{ github.event.inputs.package_name }}\"" android/app/build.gradle

      - name: 🛠️ Smart Patch WebRTC (Surface Fix)
        run: |
          flutter pub get
          FILE_PATH=$(find /home/runner/.pub-cache -name "SurfaceTextureRenderer.java" | head -n 1)
          if [ -n "$FILE_PATH" ]; then
            echo "Cleaning and Patching: $FILE_PATH"
            # پہلے سے موجود غلط اوور رائیڈز کو صاف کرنا اور نیا میتھڈ صحیح جگہ پر ڈالنا
            sed -i '/onSurfaceDestroyed/d' "$FILE_PATH"
            sed -i '/public void onSurfaceAvailable/i \            @Override public void onSurfaceDestroyed(android.graphics.SurfaceTexture surface) {}' "$FILE_PATH"
          fi

      - name: Inject Dart Code
        run: |
          echo "${{ github.event.inputs.dart_code_base64 }}" | base64 -d > lib/main.dart

      - name: Final APK Build
        run: |
          # ہم --no-pub استعمال کریں گے تاکہ ہماری پیچنگ ضائع نہ ہو
          flutter build apk --release --no-pub

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Success-APK
          path: build/app/outputs/flutter-apk/app-release.apk
