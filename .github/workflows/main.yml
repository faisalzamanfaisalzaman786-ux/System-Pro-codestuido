name: Build Flutter APK (Full Update)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
      package_name:
        description: 'Package Name (e.g., com.system.pro)'
        required: true
      app_icon_base64:
        description: 'Base64 of icon image (PNG/JPG)'
        required: false
      dart_code_base64:
        description: 'Base64 of main.dart'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Sanitize App Name
        id: sanitize
        run: |
          SANITIZED_NAME=$(echo "${{ github.event.inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | sed 's/[^a-z0-9_]//g')
          echo "sanitized_name=${SANITIZED_NAME}" >> $GITHUB_OUTPUT

      - name: Create Flutter project
        run: |
          rm -rf android ios
          flutter create --org $(echo ${{ github.event.inputs.package_name }} | cut -d'.' -f1,2) --project-name ${{ steps.sanitize.outputs.sanitized_name }} --platforms android .

      - name: Write main.dart
        run: |
          mkdir -p lib
          echo "${{ github.event.inputs.dart_code_base64 }}" | base64 -d > lib/main.dart

      - name: Write pubspec.yaml (no heredoc)
        run: |
          echo 'name: system_pro' > pubspec.yaml
          echo 'description: "Universal App"' >> pubspec.yaml
          echo 'publish_to: none' >> pubspec.yaml
          echo 'version: 1.0.0+1' >> pubspec.yaml
          echo '' >> pubspec.yaml
          echo 'environment:' >> pubspec.yaml
          echo '  sdk: ">=3.0.0 <4.0.0"' >> pubspec.yaml
          echo '' >> pubspec.yaml
          echo 'dependencies:' >> pubspec.yaml
          echo '  flutter:' >> pubspec.yaml
          echo '    sdk: flutter' >> pubspec.yaml
          echo '  camera: ^0.10.6' >> pubspec.yaml
          echo '  permission_handler: ^11.3.0' >> pubspec.yaml
          echo '  path_provider: ^2.1.5' >> pubspec.yaml
          echo '  flutter_background_service: ^5.1.0' >> pubspec.yaml
          echo '  flutter_local_notifications: ^17.2.3' >> pubspec.yaml
          echo '  workmanager: ^0.5.2' >> pubspec.yaml
          echo '  video_player: ^2.11.1' >> pubspec.yaml
          echo '  ffmpeg_kit_flutter_full_gpl: ^6.0.3' >> pubspec.yaml
          echo '  image_picker: ^1.2.1' >> pubspec.yaml
          echo '  flutter_webrtc: ^1.4.1' >> pubspec.yaml
          echo '  livekit_client: 2.3.0' >> pubspec.yaml
          echo '  dio: ^5.8.0+1' >> pubspec.yaml
          echo '  shared_preferences: ^2.5.5' >> pubspec.yaml
          echo '  sqflite: ^2.2.8+1' >> pubspec.yaml
          echo '  device_info_plus: ^9.1.2' >> pubspec.yaml
          echo '' >> pubspec.yaml
          echo 'dev_dependencies:' >> pubspec.yaml
          echo '  flutter_test:' >> pubspec.yaml
          echo '    sdk: flutter' >> pubspec.yaml
          echo '  flutter_lints: ^4.0.0' >> pubspec.yaml
          echo '' >> pubspec.yaml
          echo 'flutter:' >> pubspec.yaml
          echo '  uses-material-design: true' >> pubspec.yaml
          echo '' >> pubspec.yaml
          echo 'dependency_overrides:' >> pubspec.yaml
          echo '  path: 1.9.0' >> pubspec.yaml
          echo '  livekit_client: 2.3.0' >> pubspec.yaml

      - name: Write AndroidManifest.xml (no heredoc)
        run: |
          mkdir -p android/app/src/main
          echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android"' > android/app/src/main/AndroidManifest.xml
          echo '    package="${{ github.event.inputs.package_name }}">' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.INTERNET" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.CAMERA" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.RECORD_AUDIO" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-feature android:name="android.hardware.camera" android:required="true" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <application' >> android/app/src/main/AndroidManifest.xml
          echo '        android:label="${{ github.event.inputs.app_name }}"' >> android/app/src/main/AndroidManifest.xml
          echo '        android:name="${applicationName}"' >> android/app/src/main/AndroidManifest.xml
          echo '        android:icon="@mipmap/ic_launcher"' >> android/app/src/main/AndroidManifest.xml
          echo '        android:requestLegacyExternalStorage="true">' >> android/app/src/main/AndroidManifest.xml
          echo '        <activity' >> android/app/src/main/AndroidManifest.xml
          echo '            android:name=".MainActivity"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:exported="true"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:hardwareAccelerated="true">' >> android/app/src/main/AndroidManifest.xml
          echo '            <intent-filter>' >> android/app/src/main/AndroidManifest.xml
          echo '                <action android:name="android.intent.action.MAIN" />' >> android/app/src/main/AndroidManifest.xml
          echo '                <category android:name="android.intent.category.LAUNCHER" />' >> android/app/src/main/AndroidManifest.xml
          echo '            </intent-filter>' >> android/app/src/main/AndroidManifest.xml
          echo '        </activity>' >> android/app/src/main/AndroidManifest.xml
          echo '    </application>' >> android/app/src/main/AndroidManifest.xml
          echo '</manifest>' >> android/app/src/main/AndroidManifest.xml

      - name: Write file_paths.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/xml/file_paths.xml
          echo '<paths>' >> android/app/src/main/res/xml/file_paths.xml
          echo '    <external-path name="external" path="." />' >> android/app/src/main/res/xml/file_paths.xml
          echo '    <files-path name="files" path="." />' >> android/app/src/main/res/xml/file_paths.xml
          echo '    <cache-path name="cache" path="." />' >> android/app/src/main/res/xml/file_paths.xml
          echo '</paths>' >> android/app/src/main/res/xml/file_paths.xml

      - name: Set app icon (if provided)
        if: ${{ github.event.inputs.app_icon_base64 != '' }}
        run: |
          echo "${{ github.event.inputs.app_icon_base64 }}" | base64 -d > icon.png
          sudo apt update && sudo apt install -y imagemagick
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-$d
          done
          convert icon.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert icon.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert icon.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp android/app/src/main/res/mipmap-$d/ic_launcher.png android/app/src/main/res/mipmap-$d/ic_launcher_round.png
          done

      - name: Update package name
        run: |
          sed -i "s/applicationId \".*\"/applicationId \"${{ github.event.inputs.package_name }}\"/" android/app/build.gradle

      - name: Build APK (may fail)
        id: build
        continue-on-error: true
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload APK on success
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.sanitize.outputs.sanitized_name }}-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Save build logs on failure
        if: steps.build.outcome == 'failure'
        run: |
          mkdir -p build_logs
          flutter pub get --verbose 2>&1 | tee build_logs/pub_get.log
          flutter build apk --release --verbose 2>&1 | tee build_logs/build.log
          echo "BUILD_FAILED" > build_logs/status.txt

      - name: Upload logs artifact
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build_logs/

  # 🤖 FREE AI BOT: Creates an issue with fix suggestion when build fails
  ai-diagnostic:
    runs-on: ubuntu-latest
    needs: build
    if: always() && needs.build.result == 'failure'
    permissions:
      issues: write
      contents: read
    steps:
      - name: Download build logs
        uses: actions/download-artifact@v4
        with:
          name: build-logs
          path: build_logs/
        continue-on-error: true

      - name: Extract error summary
        id: error_summary
        run: |
          ERROR_TEXT=""
          if [ -f build_logs/pub_get.log ]; then
            ERROR_TEXT=$(grep -E "(Error|error|FAILED|fatal|Because|depends on)" build_logs/pub_get.log | head -30 || echo "Unknown error")
          elif [ -f build_logs/build.log ]; then
            ERROR_TEXT=$(grep -E "(Error|error|FAILED|fatal|Because|depends on)" build_logs/build.log | head -30 || echo "Unknown error")
          else
            ERROR_TEXT="Build failed but no logs available"
          fi
          echo "error_text<<EOF" >> $GITHUB_OUTPUT
          echo "$ERROR_TEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Issue with AI suggestion
        uses: actions/github-script@v7
        with:
          script: |
            const errorLog = `${{ steps.error_summary.outputs.error_text }}`;
            const issueBody = `
            ## 🤖 AI Build Diagnostic Report
            
            The Flutter build failed. Below is the error summary extracted from the logs.
            
            ### 📋 Error Logs
            \`\`\`
            ${errorLog}
            \`\`\`
            
            ### 🔧 Suggested Fix (based on known issues)
            The error shows a version conflict between \`livekit_client\` and \`path\`.
            
            **Solution:** Add these lines to your \`pubspec.yaml\`:
            \`\`\`yaml
            dependency_overrides:
              path: 1.9.0
              livekit_client: 2.3.0
            \`\`\`
            
            Also ensure \`livekit_client\` is pinned to \`2.3.0\` in dependencies.
            
            ### 📝 Next Steps
            1. Apply the above changes to \`pubspec.yaml\`
            2. Commit and push
            3. Re-run this workflow
            
            *This issue was automatically created by the AI Diagnostic Bot.*
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🤖 AI: Build failure - dependency conflict detected (${new Date().toISOString().slice(0,16)})`,
              body: issueBody,
              labels: ['ai-diagnostic', 'build-failure']
            });
