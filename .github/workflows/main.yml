name: System-Pro-Master-Framework-V14-2

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  Self-Healing-Build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ 1. Infrastructure Sync
        uses: actions/checkout@v4

      - name: ☕ 2. Java Runtime (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 3. AI Architect (Detailed Error Reporting)
        shell: python
        run: |
          import os, subprocess, json, shutil

          # پے لوڈ پروسیسنگ
          raw_payload = r"""${{ toJson(github.event.client_payload) }}"""
          payload = json.loads(raw_payload) if raw_payload != "null" else {}
          pkg_name = payload.get("package_name", "com.faisal.systempro")
          pkg_path = pkg_name.replace('.', '/')
          java_code = payload.get("java", "")

          # 1. اسٹرکچر کی تیاری
          for f in ['app', 'build', '.gradle', 'gradle']:
              if os.path.exists(f): shutil.rmtree(f)
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)

          # 2. یونیورسل لے آؤٹ (Visible IDs to avoid 'cannot find symbol')
          # ہم نے آئی ڈیز کو 'invisible' کے بجائے '1dp' سائز دیا ہے تاکہ کمپائلر انہیں ڈھونڈ سکے
          main_layout = f"""<?xml version="1.0" encoding="utf-8"?>
          <androidx.core.widget.NestedScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/monitorScroll"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:fillViewport="true">
              <LinearLayout android:orientation="vertical" android:layout_width="match_parent" android:layout_height="wrap_content">
                  <TextView android:id="@+id/monitorContent" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="System Pro Running..." />
                  
                  <View android:id="@+id/tabJava" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/tabXml" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/tabManifest" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/iconTabBtn" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/saveLocalBtn" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/exportBtn" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/loadBtn" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/openSettingsBtn" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/buildBtn" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/fetchArtifactBtn" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/downloadApkBtn" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/copyLogBtn" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/iconUploadBtn" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/javaEditor" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/xmlEditor" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/manifestEditor" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/logArea" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/iconSection" android:layout_width="1dp" android:layout_height="1dp" />
                  <View android:id="@+id/iconPreview" android:layout_width="1dp" android:layout_height="1dp" />
              </LinearLayout>
          </androidx.core.widget.NestedScrollView>"""
          with open("app/src/main/res/layout/activity_main.xml", "w") as f: f.write(main_layout)

          # 3. مینی فیسٹ اور گریڈل
          with open("app/src/main/AndroidManifest.xml", "w") as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="System Pro" android:theme="@style/Theme.AppCompat.Light.NoActionBar"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')

          with open("settings.gradle", "w") as f: f.write("include ':app'")
          with open("build.gradle", "w") as f:
              f.write("buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }\nallprojects { repositories { google(); mavenCentral() } }")
          with open("app/build.gradle", "w") as f:
              f.write(f"plugins {{ id 'com.android.application' }}\nandroid {{ namespace '{pkg_name}'\ncompileSdk 34\ndefaultConfig {{ applicationId '{pkg_name}'\nminSdk 24\ntargetSdk 34\nversionCode 1\nversionName '14.2' }} }}\ndependencies {{ implementation 'androidx.appcompat:appcompat:1.6.1'\nimplementation 'com.google.android.material:material:1.9.0' }}")

          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w") as f: f.write(java_code)

          # 4. اسمارٹ بلڈ (Catch Errors)
          print("🚀 Starting Build...")
          subprocess.run(['gradle', 'wrapper', '--gradle-version', '8.5'], check=True)
          result = subprocess.run(['./gradlew', 'assembleDebug', '--no-daemon'], capture_output=True, text=True)
          
          if result.returncode != 0:
              print("❌ ERROR DETECTED IN CODE!")
              print(result.stdout) # یہ ہمیں بتائے گا کہ اصل غلطی کہاں ہے
              print(result.stderr)
              exit(1)
          else:
              print("✅ BUILD SUCCESSFUL!")

      - name: 📦 4. Capture APK
        if: success()
        run: |
          mkdir -p build_output
          find . -name "*.apk" -exec cp {} build_output/SystemPro_V14_2.apk \;

      - name: 📤 5. Final Dispatch
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V14-2-APK
          path: build_output/
