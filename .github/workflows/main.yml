name: System-Pro-V17-0-Zero-Crash

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  Self-Healing-Build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Sync
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 Zero-Crash Shield Engine (V17.0)
        shell: python
        run: |
          import os, json, re

          try:
              payload_raw = r"""${{ toJson(github.event.client_payload) }}"""
              payload = json.loads(payload_raw) if payload_raw != "null" else {}
          except: payload = {}

          java_code = payload.get("java", "")
          pkg_name = payload.get("package_name", "com.faisal.systempro")
          pkg_path = pkg_name.replace('.', '/')

          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)

          # 1. جاوا کوڈ میں 'Global Try-Catch' انجیکٹ کرنا
          # یہ کوڈ کو کریش ہونے سے روکے گا
          if "onCreate" in java_code:
              # ہم onCreate کے آغاز میں try اور آخر میں catch انجیکٹ کر رہے ہیں
              java_code = re.sub(r'(super\.onCreate\(.*?\);)', r'\1 \ntry {', java_code)
              # فائل کے آخر میں احتیاط سے بریکٹ بیلنس کرنا
              java_code = java_code.rstrip().rstrip('}') + "\n} catch (Exception e) { e.printStackTrace(); }\n}"

          # 2. تمام IDs کی گارنٹی (Safe XML)
          all_ids = list(set(re.findall(r"R\.id\.([a-zA-Z0-9_]+)", java_code)))
          widgets = ""
          for wid in all_ids:
              if any(x in wid.lower() for x in ["editor", "code", "input", "text"]):
                  widgets += f'<EditText android:id="@+id/{wid}" android:layout_width="match_parent" android:layout_height="250dp" android:background="#FFFFFF" android:gravity="top" android:padding="10dp" android:layout_margin="5dp" android:hint="Input: {wid}" android:textColor="#000000" android:inputType="textMultiLine"/>\n'
              else:
                  widgets += f'<Button android:id="@+id/{wid}" android:layout_width="match_parent" android:layout_height="65dp" android:text="{wid}" android:layout_margin="5dp" android:backgroundTint="#1B4F72" android:textColor="#FFFFFF" android:textAllCaps="false"/>\n'

          # 3. ہائبرڈ لے آؤٹ (NestedScrollView + LinearLayout)
          main_xml = f"""<?xml version="1.0" encoding="utf-8"?>
          <androidx.core.widget.NestedScrollView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent" android:fillViewport="true" android:background="#EEEEEE">
              <LinearLayout android:orientation="vertical" android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="10dp">
                  {widgets}
              </LinearLayout>
          </androidx.core.widget.NestedScrollView>"""

          with open("app/src/main/res/layout/activity_main.xml", "w", encoding='utf-8') as f: f.write(main_xml)
          
          # ڈائیلاگ فائلز کے لیے آٹو-جنریشن (تاکہ Symbol Error نہ آئے)
          all_layouts = set(re.findall(r"R\.layout\.([a-zA-Z0-9_]+)", java_code))
          for l_name in all_layouts:
              if l_name != "activity_main":
                  with open(f"app/src/main/res/layout/{l_name}.xml", "w", encoding='utf-8') as f:
                      f.write(f'<?xml version="1.0" encoding="utf-8"?><LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="20dp"><TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="Injected: {l_name}"/></LinearLayout>')

          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w", encoding='utf-8') as f: f.write(java_code)

          # 4. میگا مینی فیسٹ اور گریڈل (Full AndroidX Support)
          with open("gradle.properties", "w") as f: f.write("android.useAndroidX=true\nandroid.enableJetifier=true")
          with open("app/build.gradle", "w") as f:
              f.write(f"plugins {{ id 'com.android.application' }}\nandroid {{ namespace '{pkg_name}'\ncompileSdk 34\ndefaultConfig {{ applicationId '{pkg_name}'\nminSdk 24\ntargetSdk 34 }} }}\ndependencies {{ implementation 'androidx.appcompat:appcompat:1.6.1'\nimplementation 'com.google.android.material:material:1.9.0' }}")
          with open("settings.gradle", "w") as f: f.write("include ':app'")
          with open("build.gradle", "w") as f: f.write("buildscript {{ repositories {{ google(); mavenCentral() }}; dependencies {{ classpath 'com.android.tools.build:gradle:8.2.2' }} }}\nallprojects {{ repositories {{ google(); mavenCentral() }} }}")
          with open("app/src/main/AndroidManifest.xml", "w") as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="System Pro V17" android:theme="@style/Theme.MaterialComponents.Light.NoActionBar"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')

      - name: 🏗️ Final Stabilized Build
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 📤 Export Protected APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V17-SHIELDED
          path: app/build/outputs/apk/debug/*.apk
