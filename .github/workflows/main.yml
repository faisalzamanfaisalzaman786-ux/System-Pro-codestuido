name: System-Pro-V62-Engine
on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  Build-Binary:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout Knowledge Base
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 AI Analysis & Resource Discovery
        shell: bash
        run: |
          mkdir -p app/src/main/res/layout app/src/main/res/values app/src/main/res/drawable
          mkdir -p system_pro_offline_bundle/res_templates
          
          PKG_PATH=$(echo "${{ github.event.client_payload.package_name }}" | tr '.' '/')
          mkdir -p "app/src/main/java/$PKG_PATH"

          echo "${{ github.event.client_payload.java_b64 }}" | base64 --decode > "app/src/main/java/$PKG_PATH/MainActivity.java"
          echo "${{ github.event.client_payload.xml_b64 }}" | base64 --decode > "app/src/main/res/layout/activity_main.xml"
          echo "${{ github.event.client_payload.manifest_b64 }}" | base64 --decode > "app/src/main/AndroidManifest.xml"

          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==" | base64 --decode > app/src/main/res/drawable/ic_launcher.png

          cat <<EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">${{ github.event.client_payload.app_name }}</string>
          </resources>
          EOF

          python3 -c "
          import re, os
          xml_content = open('app/src/main/res/layout/activity_main.xml').read()
          required_styles = re.findall(r'@style/(\w+)', xml_content)
          kb_path = 'system_pro_offline_bundle/res_templates/master_styles.xml'
          
          if not os.path.exists(kb_path):
              with open(kb_path, 'w') as f: f.write('<resources>\n    <style name=\"Theme.SystemProMaster\" parent=\"Theme.MaterialComponents.DayNight.NoActionBar\">\n        <item name=\"colorPrimary\">#00FFCC</item>\n    </style>\n</resources>')
          
          existing = open(kb_path).read()
          new_entries = ''
          for style in set(required_styles):
              if f'name=\"{style}\"' not in existing:
                  new_entries += f'    <style name=\"{style}\" parent=\"Widget.MaterialComponents.Button\"><item name=\"android:layout_width\">wrap_content</item></style>\n'
          
          final = existing.replace('</resources>', new_entries + '</resources>')
          with open('app/src/main/res/values/styles.xml', 'w') as f: f.write(final)
          with open(kb_path, 'w') as f: f.write(final)
          "

      - name: 🏗️ Configure Gradle 8.5 Environment
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace '${{ github.event.client_payload.package_name }}'
              compileSdk 34
              defaultConfig {
                  applicationId '${{ github.event.client_payload.package_name }}'
                  minSdk 24
                  targetSdk 34
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

      - name: 🚀 Run Build (Gradle 8.5)
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: 💾 Sync Offline Knowledge
        if: always()
        run: |
          git config --global user.name "System-Pro-AI"
          git config --global user.email "ai-engine@systempro.pk"
          git add system_pro_offline_bundle/ || true
          git commit -m "AI: Persistence Update" || true
          git push origin main || true

      - name: 📤 Deliver APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Build
          path: app/build/outputs/apk/debug/*.apk
