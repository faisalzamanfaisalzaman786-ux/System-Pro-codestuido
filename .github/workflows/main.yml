name: Build Flutter APK (Atomic Fix SDK 36)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
      package_name:
        description: 'Package Name (e.g., com.system.pro)'
        required: true
      app_icon_base64:
        description: 'Base64 of icon image (PNG/JPG)'
        required: false
      dart_code_base64:
        description: 'Base64 of main.dart'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Create Project
        run: |
          find . -maxdepth 1 -not -path '*/.*' -not -name '.' -exec rm -rf {} +
          flutter create --org $(echo ${{ github.event.inputs.package_name }} | cut -d'.' -f1,2) --project-name system_pro_app --platforms android .

      - name: Write Pubspec
        run: |
          cat <<EOF > pubspec.yaml
          name: system_pro_app
          description: "System Pro Build"
          publish_to: none
          version: 1.0.0+1
          environment:
            sdk: ">=3.6.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            camera: any
            permission_handler: any
            path_provider: any
            flutter_background_service: any
            flutter_local_notifications: any
            workmanager: any
            video_player: any
            ffmpeg_kit_flutter_full_gpl: 6.0.3-LTS
            image_picker: any
            flutter_webrtc: any
            livekit_client: any
            dio: any
            shared_preferences: any
            sqflite: any
            device_info_plus: any
          dev_dependencies:
            flutter_test:
              sdk: flutter
          dependency_overrides:
            path: 1.9.0
            meta: 1.15.0
          flutter:
            uses-material-design: true
          EOF

      - name: Atomic Gradle Fix (Force SDK 36)
        run: |
          # ہم پوری فائل کو دوبارہ لکھ رہے ہیں تاکہ ورژن 36 ہر صورت میں اپلائی ہو
          cat <<EOF > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "${{ github.event.inputs.package_name }}"
              compileSdk 36
              defaultConfig {
                  applicationId "${{ github.event.inputs.package_name }}"
                  minSdk 24
                  targetSdk 36
                  versionCode 1
                  versionName "1.0"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
          }
          flutter {
              source '../..'
          }
          EOF

      - name: 🛠️ Precise WebRTC Patching
        run: |
          flutter pub get
          FILE_PATH=$(find /home/runner/.pub-cache -name "SurfaceTextureRenderer.java" | head -n 1)
          if [ -n "$FILE_PATH" ]; then
            echo "Deep Cleaning & Patching: $FILE_PATH"
            # ہم پوری فائل کے اندر 'onSurfaceDestroyed' والے بلاک کو مکمل صاف کر کے دوبارہ ڈال رہے ہیں
            perl -i -0777 -pe 's/new TextureRegistry\.SurfaceProducer\.Callback\(\) \{/new TextureRegistry.SurfaceProducer.Callback() {\n            \@Override public void onSurfaceDestroyed(android.graphics.SurfaceTexture surface) {}\n/g' "$FILE_PATH"
            # ڈبل اوور رائیڈز ہٹانے کے لیے صفائی
            sed -i '125,135d' "$FILE_PATH" || true
          fi

      - name: Inject Dart Code
        run: |
          echo "${{ github.event.inputs.dart_code_base64 }}" | base64 -d > lib/main.dart

      - name: Final Build
        run: |
          flutter build apk --release --no-pub

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Success-APK
          path: build/app/outputs/flutter-apk/app-release.apk
