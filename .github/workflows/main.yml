name: System Debug and Environment Logger

on:
  workflow_dispatch: # یہ لائن آپ کو مینوئلی بٹن دبا کر ورک فلو چلانے کی اجازت دیتی ہے

jobs:
  build_logs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Environment Information
        run: |
          mkdir -p debug_info
          echo "--- System Information ---" > debug_info/system_logs.txt
          uname -a >> debug_info/system_logs.txt
          
          echo -e "\n--- Installed Software Versions ---" >> debug_info/system_logs.txt
          java -version 2>> debug_info/system_logs.txt
          node -v | sed 's/^/Node.js: /' >> debug_info/system_logs.txt
          python3 --version >> debug_info/system_logs.txt
          git --version >> debug_info/system_logs.txt
          
          echo -e "\n--- Environment Variables ---" >> debug_info/system_logs.txt
          printenv | grep -E "GITHUB_|RUNNER_" >> debug_info/system_logs.txt
          
          echo -e "\n--- Directory Structure ---" >> debug_info/system_logs.txt
          ls -R >> debug_info/system_logs.txt

      - name: Upload Logs as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: system-debug-logs
          path: debug_info/system_logs.txt
