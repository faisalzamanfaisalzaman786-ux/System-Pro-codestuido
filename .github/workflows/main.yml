name: System-Pro-V1300-Shield-Sync

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  shield_sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Checkout Your Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Force Sync (Wiping Workflow Conflicts)
        run: |
          git config --global user.name "System Pro AI"
          git config --global user.email "ai@systempro.com"

          # ان کی ریپوزٹری کو عارضی طور پر کلون کرنا
          git clone --depth 1 https://github.com/fastlane/fastlane.git temp_xerox
          
          # 🛑 سب سے اہم قدم: ان کا ورک فلو فولڈر مکمل مٹا دیں تاکہ گٹ ہب اعتراض نہ کرے
          rm -rf temp_xerox/.github
          
          # آپ کی ریپوزٹری سے پرانا سارا ڈیٹا اڑانا (سوائے آپ کی اس وائی اے ایم ایل کے)
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +
          
          # نیا ڈیٹا (Source Code, Assets, Libs) آپ کے پاس منتقل کرنا
          shopt -s dotglob
          cp -rf temp_xerox/* .
          rm -rf temp_xerox
          
          # تبدیلیوں کو زبردستی پش کرنا
          git add -A
          git commit -m "System Pro: Professional Structure Applied (V1300)" || echo "No changes"
          git push origin main --force
