name: System Pro Ultimate Engine

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.0.2
          cache-disabled: true

      - name: 4. Python-Based Absolute Write
        shell: python
        env:
          JAVA_CODE: ${{ github.event.client_payload.java }}
          XML_CODE: ${{ github.event.client_payload.xml }}
          PKG_NAME: ${{ github.event.client_payload.package_name }}
        run: |
          import os

          def safe_write(path, content):
              # ڈائریکٹری کا راستہ نکالیں
              directory = os.path.dirname(path)
              # اگر ڈائریکٹری کا نام خالی نہیں ہے اور وہ موجود نہیں ہے، تو اسے بنائیں
              if directory and not os.path.exists(directory):
                  os.makedirs(directory, exist_ok=True)
              
              # فائل لکھیں اور یقینی بنائیں کہ وہ ڈسک پر سیو ہو گئی ہے
              with open(path, "w", encoding="utf-8") as f:
                  f.write(content)
                  f.flush()
                  os.fsync(f.fileno())

          pkg_name = os.getenv('PKG_NAME', 'com.faisal.systempro')
          pkg_path = pkg_name.replace('.', '/')
          java_code = os.getenv('JAVA_CODE', '')
          xml_code = os.getenv('XML_CODE', '')

          # 1. اصلی جاوا اور لے آؤٹ فائلز
          safe_write(f"app/src/main/java/{pkg_path}/MainActivity.java", java_code)
          safe_write("app/src/main/res/layout/activity_main.xml", xml_code)

          # 2. ڈیفالٹ ڈائیلاگ سیٹنگز (تاکہ سورس ایرر نہ آئے)
          dialog_xml = """<?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="wrap_content"
              android:orientation="vertical" android:padding="16dp">
              <EditText android:id="@+id/etAppName" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="App Name"/>
              <EditText android:id="@+id/etPkgName" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="Package Name"/>
              <EditText android:id="@+id/etGhToken" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="GitHub Token"/>
              <EditText android:id="@+id/etGhRepo" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="GitHub Repo"/>
          </LinearLayout>"""
          safe_write("app/src/main/res/layout/dialog_settings.xml", dialog_xml)

          # 3. گریڈل اور سسٹم فائلز (اب یہاں ایرر نہیں آئے گا)
          safe_write("gradle.properties", "android.useAndroidX=true\nandroid.enableJetifier=true\nandroid.suppressUnsupportedCompileSdk=34")
          safe_write("settings.gradle", "include ':app'")
          safe_write("build.gradle", "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.1.0' } }; allprojects { repositories { google(); mavenCentral() } }")

          # 4. ایپ لیول بلڈ کنفیگریشن
          app_gradle = f"""
          plugins {{ id 'com.android.application' }}
          android {{
              namespace '{pkg_name}'
              compileSdk 33
              defaultConfig {{
                  applicationId "{pkg_name}"
                  minSdk 21
                  targetSdk 33
              }}
          }}
          dependencies {{
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }}
          """
          safe_write("app/build.gradle", app_gradle)

          # 5. مینی فیسٹ فائل
          manifest = f"""<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="{pkg_name}">
              <application android:label="System Pro" android:theme="@style/Theme.MaterialComponents.DayNight.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>
                  </activity>
              </application>
          </manifest>"""
          safe_write("app/src/main/AndroidManifest.xml", manifest)

          # 6. اسٹائلز
          styles = """<resources>
              <style name="ActionButton" parent="Widget.MaterialComponents.Button.TextButton"/>
              <style name="TabButton" parent="Widget.MaterialComponents.Button.UnelevatedButton"/>
              <style name="BuildButton" parent="Widget.MaterialComponents.Button"/>
          </resources>"""
          safe_write("app/src/main/res/values/styles.xml", styles)

      - name: 5. Execute Build
        run: gradle assembleDebug --no-daemon

      - name: 6. Deliver Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-V10-Final
          path: app/build/outputs/apk/debug/*.apk
