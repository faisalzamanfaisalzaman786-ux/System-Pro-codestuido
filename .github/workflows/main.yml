name: System Pro Ultimate Engine

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 4. Create Project Structure (Styles Support)
        run: |
          # ضروری فولڈرز بنائیں
          PKG_PATH=$(echo "${{ github.event.client_payload.package_name }}" | tr '.' '/')
          mkdir -p "app/src/main/java/$PKG_PATH"
          mkdir -p "app/src/main/res/layout"
          mkdir -p "app/src/main/res/values"

          # 1. gradle.properties (Fixed Parsing)
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          # 2. settings.gradle
          echo "include ':app'" > settings.gradle

          # 3. Root build.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 4. App build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace '${{ github.event.client_payload.package_name }}'
              compileSdk 34
              defaultConfig {
                  applicationId '${{ github.event.client_payload.package_name }}'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

          # 5. Styles.xml (آپ کے ایرر کو ختم کرنے کے لیے بنیادی اسٹائلز)
          cat <<EOF > app/src/main/res/values/styles.xml
          <resources>
              <style name="ActionButton" parent="Widget.MaterialComponents.Button" />
              <style name="TabButton" parent="Widget.MaterialComponents.Button.TextButton" />
              <style name="BuildButton" parent="Widget.MaterialComponents.Button" />
          </resources>
          EOF

          # 6. Java & XML Code
          echo '${{ github.event.client_payload.java }}' > "app/src/main/java/$PKG_PATH/MainActivity.java"
          echo '${{ github.event.client_payload.xml }}' > "app/src/main/res/layout/activity_main.xml"

          # 7. Android Manifest
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.MaterialComponents.DayNight.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: 5. Execute Build
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 6. Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-V11-Stable
          path: app/build/outputs/apk/debug/app-debug.apk
