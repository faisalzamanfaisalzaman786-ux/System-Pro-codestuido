name: System Pro Final Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Clean and Rebuild Structure
        run: |
          # پرانے تمام تضادات ختم کرنا
          rm -rf app settings.gradle build.gradle
          mkdir -p app/src/main/java/com/systempro/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 1. Project-level build.gradle
          echo "buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.0' } }" > build.gradle
          echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle

          # 2. Settings.gradle
          echo "include ':app'" > settings.gradle

          # 3. App-level build.gradle (Size Optimization Included)
          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.systempro.app'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.systempro.app'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }" > app/build.gradle

          # 4. Basic Manifest & Java
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHer" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          echo 'package com.systempro.app;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }' > app/src/main/java/com/systempro/app/MainActivity.java

      - name: Build APK
        run: |
          gradle wrapper --gradle-version 8.2
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V1
          path: app/build/outputs/apk/release/*.apk
