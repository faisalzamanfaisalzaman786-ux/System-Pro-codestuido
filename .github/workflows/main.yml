name: System-Pro-Master-Framework-V12

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  # دستی طور پر بلڈ رن کرنے کے لیے (UI Trigger)
  workflow_dispatch:
    inputs:
      build_reason:
        description: 'Reason for manual build'
        required: false
        default: 'Manual Trigger for System Pro V12'

jobs:
  Unified-Build-Engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Prepare Environment
        run: |
          echo "Setting up professional build environment for: ${{ github.event.inputs.build_reason }}"
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Professional APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V12-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Build Summary
        if: success()
        run: echo "System Pro V12 Build Completed Successfully!"
