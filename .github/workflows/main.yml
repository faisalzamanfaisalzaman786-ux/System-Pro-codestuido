name: System Pro Native APK Builder

on:
  # مینوئلی اور API (ایپ) سے ٹریگر کرنے کے لیے
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type (debug/release)'
        required: true
        default: 'debug'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # یہ کمانڈ نیٹو ایپ کا APK تیار کرے گی
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Native-App
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 5
