name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch: # 👈 یہ لائن مینولی رن کرنے کا بٹن دکھائے گی

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Clone Base & Inject Code
        shell: bash
        run: |
          # پرانا سارا کچرا صاف کریں
          rm -rf * # بیس پروجیکٹ کلون کریں
          git clone https://github.com/JStumpp/android-simplest-java-app.git android_project
          
          cd android_project
          
          # پیکیج کی تفصیلات (اگر پے لوڈ سے نہ آئیں تو ڈیفالٹ استعمال کریں)
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          # ڈائرکٹری بنانا
          mkdir -p app/src/main/java/$PKG_PATH
          
          # یہاں ہم پے لوڈ سے ڈیٹا ڈالیں گے
          # اگر آپ مینولی رن کر رہے ہیں تو یہ فائلیں خالی ہو سکتی ہیں، اس لیے 'test' ڈیٹا ڈال رہے ہیں
          cat <<EOF > app/src/main/java/$PKG_PATH/MainActivity.java
          ${{ github.event.client_payload.java || 'package '$PKG_NAME'; public class MainActivity extends android.app.Activity {}' }}
          EOF

          cat <<EOF > app/src/main/res/layout/activity_main.xml
          ${{ github.event.client_payload.xml || '<?xml version="1.0" encoding="utf-8"?><LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical" />' }}
          EOF

      - name: 4. Build APK
        run: |
          cd android_project
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 5. Success APK Delivery
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-APK
          path: android_project/app/build/outputs/apk/debug/*.apk
