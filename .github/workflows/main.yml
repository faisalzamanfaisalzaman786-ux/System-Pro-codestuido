name: System-Pro-AI-Engine

on:
  repository_dispatch:
    types: [build-app]
  push:
    branches: [main]

jobs:
  System-Pro-Build-Job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🛠️ 1. Setup Environment
        uses: actions/checkout@v4

      - name: ☕ 2. Java Configuration
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ 3. Initial Assembly
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.systempro.app' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          mkdir -p "app/src/main/java/$PKG_PATH" "app/src/main/res/layout" "app/src/main/res/values"
          
          cat <<'EOF' > "app/src/main/java/$PKG_PATH/MainActivity.java"
          ${{ github.event.client_payload.java }}
          EOF
          
          cat <<'EOF' > "app/src/main/res/layout/activity_main.xml"
          ${{ github.event.client_payload.xml }}
          EOF

      - name: 🧠 3.5. AI Pre-Check (پہلی حفاظت)
        env:
          AI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "AI is analyzing code before build..."
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.systempro.app' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          RAW_JAVA=$(cat "app/src/main/java/$PKG_PATH/MainActivity.java" | jq -sRr @json)
          
          PROMPT="Check this Android Java code for syntax errors or missing imports: $RAW_JAVA. Return ONLY the code between [CODE_START] and [CODE_END]."
          
          PAYLOAD=$(jq -n --arg p "$PROMPT" '{contents: [{parts: [{text: $p}]}]}')
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$AI_KEY" \
            -H 'Content-Type: application/json' -d "$PAYLOAD")
          
          FIXED_CODE=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')
          
          if [[ "$FIXED_CODE" == *"[CODE_START]"* ]]; then
             echo "Pre-build fix applied."
             echo "$FIXED_CODE" | sed -n '/\[CODE_START\]/,/\[CODE_END\]/p' | sed 's/\[CODE_START\]//;s/\[CODE_END\]//' > "app/src/main/java/$PKG_PATH/MainActivity.java"
          fi

      - name: 🚀 4. Smart Build
        id: build_step
        continue-on-error: true
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.systempro.app' }}"
          # گریڈل فائلز بنانا
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace '$PKG_NAME'; compileSdk 34; defaultConfig { applicationId '$PKG_NAME'; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0'; implementation 'androidx.constraintlayout:constraintlayout:2.1.4' }
          EOF
          
          # بلڈ رن کرنا
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace > build_log.txt 2>&1 || true

      - name: 🩹 5. AI Auto-Repair (دوسری حفاظت)
        if: always() && hashFiles('build_log.txt') != ''
        env:
          AI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if grep -q "BUILD SUCCESSFUL" build_log.txt; then
            echo "Build successful! No repair needed."
            exit 0
          fi
          
          echo "Build failed. AI is fixing the compilation error..."
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.systempro.app' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          ERROR_DATA=$(tail -n 150 build_log.txt | jq -sRr @json)
          JAVA_DATA=$(cat "app/src/main/java/$PKG_PATH/MainActivity.java" | jq -sRr @json)
          
          PROMPT="The Android build failed with error: $ERROR_DATA. Code: $JAVA_DATA. Fix it and return ONLY Java code between [CODE_START] and [CODE_END]."
          
          PAYLOAD=$(jq -n --arg p "$PROMPT" '{contents: [{parts: [{text: $p}]}]}')
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$AI_KEY" \
            -H 'Content-Type: application/json' -d "$PAYLOAD")
          
          FIXED_CODE=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [[ "$FIXED_CODE" == *"[CODE_START]"* ]]; then
             echo "Repair applied. Retrying build..."
             echo "$FIXED_CODE" | sed -n '/\[CODE_START\]/,/\[CODE_END\]/p' | sed 's/\[CODE_START\]//;s/\[CODE_END\]//' > "app/src/main/java/$PKG_PATH/MainActivity.java"
             ./gradlew :app:assembleDebug --no-daemon
          else
             echo "Final AI repair failed."
             exit 1
          fi

      - name: 📦 6. Final Export
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-APK
          path: app/build/outputs/apk/debug/*.apk
