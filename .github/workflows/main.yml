name: System Pro Ultimate Engine

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.0.2

      - name: 4. Build Professional Structure
        shell: bash
        env:
          JAVA_CODE: ${{ github.event.client_payload.java }}
          XML_CODE: ${{ github.event.client_payload.xml }}
          PKG_NAME: ${{ github.event.client_payload.package_name }}
          PERMISSIONS: ${{ github.event.client_payload.permissions }}
          EXTRA_DEPS: ${{ github.event.client_payload.dependencies }}
        run: |
          rm -rf app
          FINAL_PKG=${PKG_NAME:-"com.faisal.systempro"}
          PKG_PATH=$(echo "$FINAL_PKG" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout

          # --- 1. Crucial AndroidX Settings (Fixes Build Failure) ---
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          echo "include ':app'" > settings.gradle

          # --- 2. Master build.gradle ---
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # --- 3. App build.gradle ---
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace '$FINAL_PKG'
              compileSdk 34
              defaultConfig {
                  applicationId "$FINAL_PKG"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              $EXTRA_DEPS
          }
          EOF

          # --- 4. Permissions Logic ---
          PERMISSION_STR=""
          IFS=',' read -ra ADDR <<< "$PERMISSIONS"
          for i in "${ADDR[@]}"; do
              if [ ! -z "$i" ]; then
                PERMISSION_STR+="<uses-permission android:name=\"android.permission.$i\" />"
              fi
          done

          # --- 5. AndroidManifest ---
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              $PERMISSION_STR
              <application android:label="System Pro" android:theme="@style/Theme.MaterialComponents.DayNight.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # --- 6. Final Code Injection ---
          if [ -z "$JAVA_CODE" ] || [ "$JAVA_CODE" == "null" ]; then
            echo "package $FINAL_PKG; import android.os.Bundle; import androidx.appcompat.app.AppCompatActivity; public class MainActivity extends AppCompatActivity { @Override protected void onCreate(Bundle s){ super.onCreate(s); setContentView(R.layout.activity_main); } }" > app/src/main/java/$PKG_PATH/MainActivity.java
          else
            echo "$JAVA_CODE" > app/src/main/java/$PKG_PATH/MainActivity.java
          fi

          if [ -z "$XML_CODE" ] || [ "$XML_CODE" == "null" ]; then
            echo '<?xml version="1.0" encoding="utf-8"?><RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#FFFFFF"></RelativeLayout>' > app/src/main/res/layout/activity_main.xml
          else
            echo "$XML_CODE" > app/src/main/res/layout/activity_main.xml
          fi

      - name: 5. Execute Clean Build
        run: gradle assembleDebug --no-daemon

      - name: 6. Deliver Pro APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Ultra-v1
          path: app/build/outputs/apk/debug/*.apk
