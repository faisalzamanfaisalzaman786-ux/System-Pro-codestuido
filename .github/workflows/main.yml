name: System Pro Android Builder
on:
  push:
    branches: [ main ]
  workflow_dispatch: # اس سے ہم API کے ذریعے بلڈ شروع کر سکتے ہیں

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-App
          path: app/build/outputs/apk/debug/*.apk