name: System-Pro-V62-Engine

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Process Code and Icon
        shell: python
        run: |
          import base64
          import os

          # فیصل بھائی، یہاں ہم آپ کی UI سے آنے والا 'client_payload' نکال رہے ہیں
          java_b64 = """${{ github.event.client_payload.java_b64 }}""".strip()
          xml_b64 = """${{ github.event.client_payload.xml_b64 }}""".strip()
          manifest_b64 = """${{ github.event.client_payload.manifest_b64 }}""".strip()
          icon_b64 = """${{ github.event.client_payload.icon_data_b64 }}""".strip()

          def safe_decode(b64_str, path):
              if len(b64_str) > 10:
                  try:
                      # اگر ڈیٹا یو آر آئی ہے تو صاف کریں
                      if "," in b64_str: b64_str = b64_str.split(",")[1]
                      with open(path, "wb") as f:
                          f.write(base64.b64decode(b64_str))
                      print(f"✅ Created: {path}")
                  except Exception as e:
                      print(f"❌ Failed to decode {path}: {e}")

          # فولڈرز بنائیں
          os.makedirs("app/src/main/java/com/system/pro", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/drawable", exist_ok=True)

          # فائلوں کو لکھنا (Writing Files)
          safe_decode(java_b64, "app/src/main/java/com/system/pro/MainActivity.java")
          safe_decode(xml_b64, "app/src/main/res/layout/activity_main.xml")
          safe_decode(manifest_b64, "app/src/main/AndroidManifest.xml")
          
          # آئیکن ہینڈلنگ (Icon Handling)
          target_icon = "app/src/main/res/drawable/ic_launcher.png"
          if len(icon_b64) > 50:
              safe_decode(icon_b64, target_icon)
          else:
              template = "templates/ic_launcher.png"
              if os.path.exists(template):
                  os.system(f"cp {template} {target_icon}")
                  print("✅ Used default template icon.")

      - name: Apply Branding
        run: |
          NAME="${{ github.event.client_payload.app_name }}"
          PKG="${{ github.event.client_payload.package_name }}"
          
          [ -z "$NAME" ] && NAME="System Pro"
          [ -z "$PKG" ] && PKG="com.system.pro"

          # پیکیج نیم کی تمام فائلوں میں تبدیلی
          find . -maxdepth 10 -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.java" \) -exec sed -i "s/com.system.pro/$PKG/g" {} +
          
          # ایپ نیم اپ ڈیٹ
          if [ -f app/src/main/res/values/strings.xml ]; then
            sed -i "s/>.*<\/string>/>$NAME<\/string>/g" app/src/main/res/values/strings.xml
          fi

      - name: Build Application
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-Build
          path: app/build/outputs/apk/debug/*.apk
