name: System-Pro-V62-Modern-Safe-Build

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17 (Required for Modern Android)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Lock Gradle 8.5 (Fast & Stable)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Modern Structure & Package Mapping
        shell: python
        run: |
          import base64, os

          p = ${{ toJson(github.event.client_payload) }}
          pkg = p.get('package_name', 'com.system.pro')
          app_name = p.get('app_name', 'System Pro')
          path = pkg.replace('.', '/')

          # جدید اینڈرائیڈ کے لیے فولڈر اسٹرکچر
          os.makedirs(f"app/src/main/java/{path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)
          os.makedirs("app/src/main/res/drawable", exist_ok=True)

          def write_b64(key, file_path):
              data = p.get(key, '')
              if data and len(data) > 10:
                  if "," in data: data = data.split(",")[1]
                  content = base64.b64decode(data).decode('utf-8', errors='ignore')
                  # Auto-Sync package name
                  if key == 'java_b64' and "package " in content:
                      content = f"package {pkg};" + content[content.find(';')+1:]
                  with open(file_path, "w") as f: f.write(content)

          write_b64('java_b64', f"app/src/main/java/{path}/MainActivity.java")
          write_b64('xml_b64', "app/src/main/res/layout/activity_main.xml")

          # 1. جدید تھیم جو کریش نہیں ہوگی (AppCompat + Material)
          styles = '''<resources>
              <style name="AppTheme" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">#6200EE</item>
                  <item name="colorSecondary">#03DAC6</item>
                  <item name="android:statusBarColor">#6200EE</item>
              </style>
          </resources>'''
          with open("app/src/main/res/values/styles.xml", "w") as f: f.write(styles)
          
          # 2. مینی فیسٹ (Android 14 Ready)
          manifest = f'''<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application 
                  android:label="{app_name}" 
                  android:theme="@style/AppTheme"
                  android:allowBackup="true"
                  android:supportsRtl="true">
                  <activity android:name="{pkg}.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>'''
          with open("app/src/main/AndroidManifest.xml", "w") as f: f.write(manifest)

      - name: Strict Build Configuration
        run: |
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace '${{ github.event.client_payload.package_name || 'com.system.pro' }}'
              compileSdk 34
              defaultConfig {
                  applicationId "${{ github.event.client_payload.package_name || 'com.system.pro' }}"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: Build Modern APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-RedmiNote14-Ready
          path: app/build/outputs/apk/debug/*.apk
