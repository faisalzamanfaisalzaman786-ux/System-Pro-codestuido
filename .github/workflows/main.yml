name: System-Pro-V24.0-Clean-Build
on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-app]

jobs:
  Build-Engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout Code
        uses: actions/checkout@v4

      - name: 🧼 Pre-Build Deep Clean
        run: |
          # پچھلے کسی بھی بلڈ کے نشانات مٹانا
          rm -rf app/src/main/java/*
          rm -rf app/src/main/res/layout/*
          rm -rf app/build/
          rm -f env_vars.sh
          echo "Workspace is now clean for a fresh build."

      - name: 🏗️ Setup Official Structure
        run: |
          mkdir -p app/src/main/java
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle

      - name: 🧬 AI Template & Payload Merger
        shell: python
        run: |
          import os, json, re, shutil

          # پے لوڈ حاصل کرنا
          event_path = os.getenv('GITHUB_EVENT_PATH')
          with open(event_path, 'r') as f:
              event_data = json.load(f)
          payload = event_data.get('client_payload', {})

          target_pkg = payload.get('target_package', 'com.system.pro').strip()
          pkg_path = target_pkg.replace('.', '/')

          # فائلیں اٹھانے کا عمل (اگر ٹیمپلیٹ فولڈر موجود ہے)
          java_tmpl = 'templates/app_logic.java'
          xml_tmpl = 'templates/app_ui.xml'
          man_tmpl = 'templates/app_manifest.xml'

          # جاوا کی تیاری
          if os.path.exists(java_tmpl):
              with open(java_tmpl, 'r') as f: java_content = f.read()
          else:
              java_content = payload.get('java_code', '')

          if java_content:
              java_content = re.sub(r'^package\s+[\w\.]+;', f'package {target_pkg};', java_content.strip())
          
          # ایکس ایم ایل کی تیاری
          xml_content = ""
          if os.path.exists(xml_tmpl):
              with open(xml_tmpl, 'r') as f: xml_content = f.read()
          else:
              xml_content = payload.get('xml_code', '')

          # مینی فیسٹ کی تیاری
          if os.path.exists(man_tmpl):
              with open(man_tmpl, 'r') as f: manifest_content = f.read()
          else:
              manifest_content = '<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="System Pro" android:theme="@style/Theme.AppCompat"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>'

          # فائلوں کو فائنل پاتھ پر لکھنا
          java_dir = f'app/src/main/java/{pkg_path}'
          os.makedirs(java_dir, exist_ok=True)
          with open(f'{java_dir}/MainActivity.java', 'w', encoding='utf-8') as f: f.write(java_content)
          with open('app/src/main/res/layout/activity_main.xml', 'w', encoding='utf-8') as f: f.write(xml_content)
          with open('app/src/main/AndroidManifest.xml', 'w', encoding='utf-8') as f: f.write(manifest_content)

          with open('env_vars.sh', 'w') as f: f.write(f"export TARGET_PKG='{target_pkg}'")

      - name: 📝 Build Config Sync
        run: |
          source env_vars.sh
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects { repositories { google(); mavenCentral(); maven { url 'https://jitpack.io' } } }
          EOF

          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace '$TARGET_PKG'
              compileSdk 34
              defaultConfig {
                  applicationId "$TARGET_PKG"
                  minSdk 24
                  targetSdk 34
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF
          echo '<resources><style name="Theme.AppCompat" parent="Theme.MaterialComponents.DayNight.NoActionBar"/></resources>' > app/src/main/res/values/themes.xml

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ Build & Clean Execution
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew clean assembleDebug  # یہاں clean کمانڈ ڈیٹا واش کرے گی

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V24-Clean
          path: app/build/outputs/apk/debug/*.apk

      - name: 🚿 Post-Build Data Wash
        if: always()  # یہ قدم ہمیشہ چلے گا، چاہے بلڈ فیل ہو یا پاس
        run: |
          echo "Washing temporary files..."
          rm -rf app/src/main/java/*
          rm -rf app/src/main/res/layout/*
          rm -f env_vars.sh
          echo "Workspace washed and ready for next build."
