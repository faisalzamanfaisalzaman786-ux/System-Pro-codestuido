name: System-Pro-V62-Engine

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package Name'
        required: false
        default: 'com.system.pro'
      app_name:
        description: 'App Name'
        required: false
        default: 'System Pro'
      app_icon_base64:
        description: 'Base64 Icon'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Handle Icon and Payload
        run: |
          mkdir -p app/src/main/res/drawable
          python3 -c "
          import base64
          import os

          # فیصل بھائی، یہاں ہم پے لوڈ کو ہینڈل کر رہے ہیں
          b64 = '${{ github.event.inputs.app_icon_base64 }}'
          target = 'app/src/main/res/drawable/ic_launcher.png'
          template = 'templates/ic_launcher.png'

          if b64 and len(b64.strip()) > 100:
              try:
                  if ',' in b64: b64 = b64.split(',')[1]
                  with open(target, 'wb') as f:
                      f.write(base64.b64decode(b64))
                  print('Success: UI Icon applied.')
              except Exception as e:
                  print(f'Error: {e}. Falling back to template.')
                  if os.path.exists(template): os.system(f'cp {template} {target}')
          elif os.path.exists(template):
              os.system(f'cp {template} {target}')
              print('Default: Template icon applied.')
          "

      - name: Update Android Files
        run: |
          # پیکیج نیم کی تبدیلی
          PKG="${{ github.event.inputs.package_name }}"
          if [ -z "$PKG" ]; then PKG="com.system.pro"; fi
          find . -maxdepth 4 -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.java" \) -exec sed -i "s/com.system.pro/$PKG/g" {} +

          # ایپ کا نام تبدیل کرنا
          NAME="${{ github.event.inputs.app_name }}"
          if [ -z "$NAME" ]; then NAME="System Pro"; fi
          if [ -f app/src/main/res/values/strings.xml ]; then
            sed -i "s/>.*<\/string>/>$NAME<\/string>/g" app/src/main/res/values/strings.xml
          fi

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-V62
          path: app/build/outputs/apk/debug/*.apk
