name: System-Pro-V700-Auto-Mirror

on:
  push:
    branches:
      - main # جیسے ہی مین برانچ پر کوئی بھی تبدیلی (Update) ہوگی، یہ رن ہو جائے گا
  workflow_dispatch: # ضرورت پڑنے پر مینوئل رن کا آپشن بھی موجود رہے گا

jobs:
  auto_sovereign_sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Checkout Your Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Force Sync External Data (The Xerox Move)
        run: |
          git config --global user.name "System Pro AI"
          git config --global user.email "ai@systempro.com"

          # بیرونی ریپوزٹری (Fastlane) سے ڈیٹا لینا
          git clone --depth 1 https://github.com/fastlane/fastlane.git temp_fastlane
          
          # سیکیورٹی کے لیے ان کے ورک فلو فولڈر کو ہٹانا تاکہ ایرر نہ آئے
          rm -rf temp_fastlane/.github
          
          # آپ کی ریپوزٹری سے پرانا ڈیٹا مٹانا (سوائے گٹ اور آپ کی اس موجودہ YAML کے)
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +
          
          # نیا پروفیشنل اسٹرکچر آپ کے کوڈ ٹیب میں شفٹ کرنا
          shopt -s dotglob
          cp -rf temp_fastlane/* .
          rm -rf temp_fastlane
          
          # تبدیلیوں کو زبردستی اپ لوڈ کرنا
          git add -A
          git commit -m "Auto-Update: Xerox Structure Refreshed" || echo "No changes detected"
          git push origin main --force

      - name: 3. Verify New Files
        run: ls -R
