name: System-Pro-V32-Final
on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-app]

jobs:
  Build-Engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout Code
        uses: actions/checkout@v4

      - name: 🧼 1. Deep Wash
        run: |
          echo "REPORT: Cleaning workspace..."
          rm -rf app/src/main/java/*
          rm -rf app/src/main/res/layout/*
          rm -rf app/build/
          echo "REPORT: Cleaned."

      - name: 🏗️ 2. Structure Setup
        run: |
          echo "REPORT: Creating Directories..."
          mkdir -p app/src/main/java
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          echo "android.useAndroidX=true" > gradle.properties
          echo "include ':app'" > settings.gradle

      - name: 🧬 3. AI Hybrid Logic
        shell: python
        run: |
          import os, json, re, base64, shutil, urllib.request
          event_path = os.getenv('GITHUB_EVENT_PATH')
          with open(event_path, 'r') as f:
              event_data = json.load(f)
          payload = event_data.get('client_payload', {})
          target_pkg = payload.get('target_package', 'com.system.pro').strip()
          pkg_path = target_pkg.replace('.', '/')
          print(f"REPORT: AI Processing for {target_pkg}")

          icon_url = payload.get('icon_url')
          if icon_url:
              try:
                  urllib.request.urlretrieve(icon_url, 'icon.png')
                  for r in ['mipmap-mdpi', 'mipmap-hdpi', 'mipmap-xhdpi', 'mipmap-xxhdpi']:
                      os.makedirs(f'app/src/main/res/{r}', exist_ok=True)
                      shutil.copy('icon.png', f'app/src/main/res/{r}/ic_launcher.png')
              except: print("REPORT: Icon Fetch Failed")

          def get_code(key, path, fallback):
              c = payload.get(key, "").strip()
              if not c and os.path.exists(path):
                  with open(path, 'r') as f: c = f.read().strip()
              return c if c else fallback

          java_c = get_code('java_code', 'templates/app_logic.java', f"package {target_pkg};\nimport android.os.Bundle;\nimport androidx.appcompat.app.AppCompatActivity;\npublic class MainActivity extends AppCompatActivity {{ @Override protected void onCreate(Bundle savedInstanceState) {{ super.onCreate(savedInstanceState); setContentView(R.layout.activity_main); }} }}")
          java_c = re.sub(r'^package\s+[\w\.]+;', f'package {target_pkg};', java_c)
          xml_c = get_code('xml_code', 'templates/app_ui.xml', '<?xml version="1.0" encoding="utf-8"?><RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000000"><TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="System Pro: Engine Master" android:textColor="#00FF00" android:layout_centerInParent="true" /></RelativeLayout>')

          j_dir = f'app/src/main/java/{pkg_path}'
          os.makedirs(j_dir, exist_ok=True)
          with open(f'{j_dir}/MainActivity.java', 'w', encoding='utf-8') as f: f.write(java_c)
          with open('app/src/main/res/layout/activity_main.xml', 'w', encoding='utf-8') as f: f.write(xml_c)
          with open('app/src/main/AndroidManifest.xml', 'w', encoding='utf-8') as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="System Pro" android:theme="@style/Theme.AppCompat" android:icon="@mipmap/ic_launcher"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')

          with open('build.gradle', 'w') as f:
              f.write("buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.0' } }\nallprojects { repositories { google(); mavenCentral() } }")
          with open('app/build.gradle', 'w') as f:
              f.write(f"apply plugin: 'com.android.application'\nandroid {{ namespace '{target_pkg}'; compileSdk 34; defaultConfig {{ applicationId '{target_pkg}'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' }} }}\ndependencies {{ implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.11.0' }}")

      - name: 📋 4. Themes Sync
        run: |
          echo '<resources><style name="Theme.AppCompat" parent="Theme.MaterialComponents.DayNight.NoActionBar"/></resources>' > app/src/main/res/values/themes.xml

      - name: ☕ 5. Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ 6. Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --quiet
          echo "REPORT: Compilation Success."

      - name: 📤 7. Deployment
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Master-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: 🚿 8. Post-Build
        if: always()
        run: echo "REPORT: Process Finished."
