name: Build Flutter APK (Hybrid SDK Fix)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
      package_name:
        description: 'Package Name (e.g., com.system.pro)'
        required: true
      app_icon_base64:
        description: 'Base64 of icon image (PNG/JPG)'
        required: false
      dart_code_base64:
        description: 'Base64 of main.dart'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Create Project
        run: |
          find . -maxdepth 1 -not -path '*/.*' -not -name '.' -exec rm -rf {} +
          flutter create --org $(echo ${{ github.event.inputs.package_name }} | cut -d'.' -f1,2) --project-name system_pro_app --platforms android .

      - name: Unified Dependency (The Fix)
        run: |
          cat <<EOF > pubspec.yaml
          name: system_pro_app
          description: "System Pro Hybrid Build"
          publish_to: none
          version: 1.0.0+1
          environment:
            sdk: ">=3.6.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            camera: any
            permission_handler: any
            path_provider: any
            flutter_background_service: any
            flutter_local_notifications: any
            workmanager: any
            video_player: any
            ffmpeg_kit_flutter_full_gpl: 6.0.3-LTS
            image_picker: any
            # یہاں ہم نے ورژن کو لچکدار رکھا ہے تاکہ 34 اور 36 دونوں کے فیچرز مل سکیں
            flutter_webrtc: ">=1.1.2 <1.5.0"
            livekit_client: ">=2.5.0 <2.8.0"
            dio: any
            shared_preferences: any
            sqflite: any
            device_info_plus: any
          dev_dependencies:
            flutter_test:
              sdk: flutter
          dependency_overrides:
            meta: 1.15.0
          flutter:
            uses-material-design: true
          EOF

      - name: Auto-Fix Gradle (SDK 35 Hybrid)
        run: |
          # ہم compileSdk کو 35 پر رکھیں گے جو 36 کی جدید چیزیں بھی سمجھتا ہے اور 34 کے ساتھ بھی ہم آہنگ ہے
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle
          
          # یہ لائن گریڈل کو کہتی ہے کہ اگر کوئی لائبریری ورژن پر ضد کرے تو اسے نظر انداز کرو
          echo "configurations.all { resolutionStrategy.force 'androidx.core:core-ktx:1.13.1' }" >> android/app/build.gradle

      - name: Inject Dart Code
        run: |
          echo "${{ github.event.inputs.dart_code_base64 }}" | base64 -d > lib/main.dart

      - name: Final Execution
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Hybrid-APK
          path: build/app/outputs/flutter-apk/app-release.apk
