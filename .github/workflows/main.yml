name: Build Flutter APK (Full Update)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
      package_name:
        description: 'Package Name (e.g., com.system.pro)'
        required: true
      app_icon_base64:
        description: 'Base64 of icon image (PNG/JPG)'
        required: false
      dart_code_base64:
        description: 'Base64 of main.dart'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Sanitize App Name
        id: sanitize
        run: |
          SANITIZED_NAME=$(echo "${{ github.event.inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | sed 's/[^a-z0-9_]//g')
          echo "sanitized_name=${SANITIZED_NAME}" >> $GITHUB_OUTPUT

      - name: Create Flutter project
        run: |
          rm -rf .[^.]* *
          flutter create --org $(echo ${{ github.event.inputs.package_name }} | rev | cut -d'.' -f2- | rev) --project-name ${{ steps.sanitize.outputs.sanitized_name }} --platforms android .

      - name: Decode and write main.dart
        run: |
          mkdir -p lib
          echo "${{ github.event.inputs.dart_code_base64 }}" | base64 -d > lib/main.dart

      - name: Write pubspec.yaml (echo only)
        run: |
          echo 'name: system_pro' > pubspec.yaml
          echo 'description: "Universal Flutter App"' >> pubspec.yaml
          echo 'publish_to: none' >> pubspec.yaml
          echo 'version: 1.0.0+1' >> pubspec.yaml
          echo '' >> pubspec.yaml
          echo 'environment:' >> pubspec.yaml
          echo '  sdk: ">=3.0.0 <4.0.0"' >> pubspec.yaml
          echo '' >> pubspec.yaml
          echo 'dependencies:' >> pubspec.yaml
          echo '  flutter:' >> pubspec.yaml
          echo '    sdk: flutter' >> pubspec.yaml
          echo '  camera: ^0.10.6' >> pubspec.yaml
          echo '  permission_handler: ^11.3.0' >> pubspec.yaml
          echo '  path_provider: ^2.1.5' >> pubspec.yaml
          echo '  flutter_background_service: ^5.1.0' >> pubspec.yaml
          echo '  flutter_local_notifications: ^17.2.3' >> pubspec.yaml
          echo '  workmanager: ^0.5.2' >> pubspec.yaml
          echo '  video_player: ^2.11.1' >> pubspec.yaml
          echo '  ffmpeg_kit_flutter_full_gpl: ^6.0.3' >> pubspec.yaml
          echo '  image_picker: ^1.2.1' >> pubspec.yaml
          echo '  flutter_webrtc: ^1.4.1' >> pubspec.yaml
          echo '  livekit_client: ^2.7.0' >> pubspec.yaml
          echo '  dio: ^5.8.0+1' >> pubspec.yaml
          echo '  shared_preferences: ^2.5.5' >> pubspec.yaml
          echo '  sqflite: ^2.4.2' >> pubspec.yaml
          echo '  device_info_plus: ^9.1.2' >> pubspec.yaml
          echo '' >> pubspec.yaml
          echo 'dev_dependencies:' >> pubspec.yaml
          echo '  flutter_test:' >> pubspec.yaml
          echo '    sdk: flutter' >> pubspec.yaml
          echo '  flutter_lints: ^4.0.0' >> pubspec.yaml
          echo '' >> pubspec.yaml
          echo 'flutter:' >> pubspec.yaml
          echo '  uses-material-design: true' >> pubspec.yaml

      - name: Write AndroidManifest.xml (echo only, no heredoc)
        run: |
          mkdir -p android/app/src/main
          echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android"' > android/app/src/main/AndroidManifest.xml
          echo '    xmlns:tools="http://schemas.android.com/tools"' >> android/app/src/main/AndroidManifest.xml
          echo '    package="${{ github.event.inputs.package_name }}">' >> android/app/src/main/AndroidManifest.xml
          echo '' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.INTERNET" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.CAMERA" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.RECORD_AUDIO" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_CAMERA" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MICROPHONE" />' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-permission android:name="android.permission.MEDIA_PROJECTION" />' >> android/app/src/main/AndroidManifest.xml
          echo '' >> android/app/src/main/AndroidManifest.xml
          echo '    <uses-feature android:name="android.hardware.camera" android:required="true" />' >> android/app/src/main/AndroidManifest.xml
          echo '' >> android/app/src/main/AndroidManifest.xml
          echo '    <application' >> android/app/src/main/AndroidManifest.xml
          echo '        android:label="${{ github.event.inputs.app_name }}"' >> android/app/src/main/AndroidManifest.xml
          echo '        android:name="${applicationName}"' >> android/app/src/main/AndroidManifest.xml
          echo '        android:icon="@mipmap/ic_launcher"' >> android/app/src/main/AndroidManifest.xml
          echo '        android:requestLegacyExternalStorage="true"' >> android/app/src/main/AndroidManifest.xml
          echo '        android:usesCleartextTraffic="true"' >> android/app/src/main/AndroidManifest.xml
          echo '        android:largeHeap="true">' >> android/app/src/main/AndroidManifest.xml
          echo '' >> android/app/src/main/AndroidManifest.xml
          echo '        <activity' >> android/app/src/main/AndroidManifest.xml
          echo '            android:name=".MainActivity"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:exported="true"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:hardwareAccelerated="true"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:windowSoftInputMode="adjustResize">' >> android/app/src/main/AndroidManifest.xml
          echo '            <intent-filter>' >> android/app/src/main/AndroidManifest.xml
          echo '                <action android:name="android.intent.action.MAIN" />' >> android/app/src/main/AndroidManifest.xml
          echo '                <category android:name="android.intent.category.LAUNCHER" />' >> android/app/src/main/AndroidManifest.xml
          echo '            </intent-filter>' >> android/app/src/main/AndroidManifest.xml
          echo '        </activity>' >> android/app/src/main/AndroidManifest.xml
          echo '' >> android/app/src/main/AndroidManifest.xml
          echo '        <service' >> android/app/src/main/AndroidManifest.xml
          echo '            android:name="com.workmanager.BackgroundService"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:exported="false"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:foregroundServiceType="camera|microphone|dataSync" />' >> android/app/src/main/AndroidManifest.xml
          echo '        <service' >> android/app/src/main/AndroidManifest.xml
          echo '            android:name="flutter_local_notifications.ForegroundService"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:exported="false"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:foregroundServiceType="dataSync" />' >> android/app/src/main/AndroidManifest.xml
          echo '        <provider' >> android/app/src/main/AndroidManifest.xml
          echo '            android:name="androidx.core.content.FileProvider"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:authorities="${applicationId}.fileprovider"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:exported="false"' >> android/app/src/main/AndroidManifest.xml
          echo '            android:grantUriPermissions="true">' >> android/app/src/main/AndroidManifest.xml
          echo '            <meta-data' >> android/app/src/main/AndroidManifest.xml
          echo '                android:name="android.support.FILE_PROVIDER_PATHS"' >> android/app/src/main/AndroidManifest.xml
          echo '                android:resource="@xml/file_paths" />' >> android/app/src/main/AndroidManifest.xml
          echo '        </provider>' >> android/app/src/main/AndroidManifest.xml
          echo '    </application>' >> android/app/src/main/AndroidManifest.xml
          echo '</manifest>' >> android/app/src/main/AndroidManifest.xml

      - name: Create file_paths.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/xml/file_paths.xml
          echo '<paths>' >> android/app/src/main/res/xml/file_paths.xml
          echo '    <external-path name="external" path="." />' >> android/app/src/main/res/xml/file_paths.xml
          echo '    <files-path name="files" path="." />' >> android/app/src/main/res/xml/file_paths.xml
          echo '    <cache-path name="cache" path="." />' >> android/app/src/main/res/xml/file_paths.xml
          echo '</paths>' >> android/app/src/main/res/xml/file_paths.xml

      - name: Decode and set app icon (if provided)
        if: ${{ github.event.inputs.app_icon_base64 != '' }}
        run: |
          echo "${{ github.event.inputs.app_icon_base64 }}" | base64 -d > app_icon_raw
          sudo apt-get update && sudo apt-get install -y imagemagick
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-${density}
          done
          convert app_icon_raw -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert app_icon_raw -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert app_icon_raw -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert app_icon_raw -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert app_icon_raw -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp android/app/src/main/res/mipmap-${density}/ic_launcher.png android/app/src/main/res/mipmap-${density}/ic_launcher_round.png
          done

      - name: Update package name in build.gradle
        run: |
          sed -i "s/applicationId \".*\"/applicationId \"${{ github.event.inputs.package_name }}\"/" android/app/build.gradle

      - name: Clean and get dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.sanitize.outputs.sanitized_name }}-APK
          path: build/app/outputs/flutter-apk/app-release.apk
