name: System Pro Master Framework V12 - AI Build Engine

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      package_name:
        description: 'App Package Name'
        required: true
      ui_payload:
        description: 'AI Generated Payload (UI/Logic)'
        required: true

jobs:
  unified-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Unified AI Build Engine
        shell: python
        env:
          PKG_NAME: ${{ github.event.inputs.package_name }}
          PAYLOAD: ${{ github.event.inputs.ui_payload }}
        run: |
          import os
          import json
          import sys

          # پچھلے تمام مسئلوں کا حل: پیکیج اور پاتھ کی خودکار میچنگ
          pkg = os.getenv("PKG_NAME", "com.systempro.default")
          payload_str = os.getenv("PAYLOAD", "{}")

          try:
              data = json.loads(payload_str)
              
              # فولڈرز کی درست ترتیب (Image and Source Protection)
              pkg_path = pkg.replace('.', '/')
              java_dir = f"app/src/main/java/{pkg_path}"
              res_dir = "app/src/main/res/values"
              
              os.makedirs(java_dir, exist_ok=True)
              os.makedirs(res_dir, exist_ok=True)

              # مینی فیسٹ فکس (ID Matching)
              manifest = f"""<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="{pkg}">
              <application android:theme="@style/Theme.SystemPro" android:label="System Pro">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>"""
              with open("app/src/main/AndroidManifest.xml", "w") as f: f.write(manifest)

              # گریڈل فکس (Fast Search libraries integration)
              gradle = f"""
          plugins {{ id 'com.android.application' version '8.2.2' }}
          android {{
              namespace '{pkg}'
              compileSdk 34
              defaultConfig {{
                  applicationId '{pkg}'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }}
          }}
          dependencies {{
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }}"""
              with open("app/build.gradle", "w") as f: f.write(gradle)

              print("BUILD ENGINE SUCCESS: All systems synchronized.")

          except Exception as e:
              print(f"CRITICAL ERROR: {e}")
              sys.exit(1)
