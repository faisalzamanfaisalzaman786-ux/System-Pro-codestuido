name: System-Pro-AI-Engine-v2

on:
  repository_dispatch:
    types: [build-app]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  System-Pro-Build-Job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 🛠️ 1. Setup Environment
        uses: actions/checkout@v4

      - name: ☕ 2. Java 17 Setup
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 3. Smart Engine (V8.0 Master Link)
        shell: python
        run: |
          import os, re, json
          
          raw_payload = r"""${{ toJson(github.event.client_payload) }}"""
          payload = json.loads(raw_payload, strict=False) if raw_payload != "null" else {}

          pkg_name = payload.get("package_name", "com.faisal.systempro")
          java_code = payload.get("java", "// System Pro Active")
          xml_code = payload.get("xml", "").strip()

          pkg_path = pkg_name.replace('.', '/')
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)

          # Auto-ID Injection (Preventing Symbol Not Found errors)
          java_ids = set(re.findall(r'R\.id\.(\w+)', java_code))
          if len(xml_code) < 50:
              xml_code = '<?xml version="1.0" encoding="utf-8"?>\n<RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent">'
          
          id_views = ""
          for jid in java_ids:
              if f'id/+"{jid}"' not in xml_code:
                  id_views += f'\n    <View android:id="@+id/{jid}" android:layout_width="0dp" android:layout_height="0dp" android:visibility="gone" />'
          
          if "</RelativeLayout>" in xml_code: xml_code = xml_code.replace("</RelativeLayout>", f"{id_views}\n</RelativeLayout>")
          elif "</LinearLayout>" in xml_code: xml_code = xml_code.replace("</LinearLayout>", f"{id_views}\n</LinearLayout>")
          else: xml_code += f"{id_views}\n</RelativeLayout>"

          # Styles and Manifest Guard
          styles_xml = '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n'
          needed = set(re.findall(r'style/(\w+)', xml_code) + ["Theme.SystemPro", "ActionButton", "TabButton", "BuildButton"])
          for s in needed:
              styles_xml += f'    <style name="{s}" parent="Theme.AppCompat.DayNight.NoActionBar"><item name="android:textAllCaps">false</item></style>\n'
          styles_xml += '</resources>'

          with open("app/src/main/res/layout/activity_main.xml", "w") as f: f.write(xml_code)
          with open("app/src/main/res/values/styles.xml", "w") as f: f.write(styles_xml)
          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w", encoding="utf-8") as f: f.write(java_code)
          with open("app/src/main/AndroidManifest.xml", "w") as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="System Pro" android:theme="@style/Theme.SystemPro"><activity android:name="{pkg_name}.MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')

      - name: 🚀 4. Build APK (Direct Wrapper Fix)
        run: |
          # 1. انفراسٹرکچر سیٹ اپ
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { 
              namespace '${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}'
              compileSdk 34 
              defaultConfig { applicationId '${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}'; minSdk 24; targetSdk 34; versionCode 1; versionName "8.0" }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }
          EOF
          
          # 2. زبردستی گریڈل 8.5 سیٹ کرنا (یہ پرانے 4.4.1 کو اوور رائڈ کرے گا)
          # لاگ میں آنے والے ایرر کو ختم کرنے کے لیے یہ مرحلہ لازمی ہے
          wget https://services.gradle.org/distributions/gradle-8.5-bin.zip -P /tmp
          unzip -d /opt/gradle /tmp/gradle-8.5-bin.zip
          export PATH=$PATH:/opt/gradle/gradle-8.5/bin
          
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: 📦 5. Universal Force Export
        if: always()
        run: |
          mkdir -p final_zip
          find . -name "*.apk" -type f -exec cp {} final_zip/SystemPro_V8_Stable.apk \;
          # اگر APK نہیں بنتی تو ڈائریکٹری اسٹرکچر سیو کریں
          ls -R > final_zip/Build_Details.txt

      - name: 📤 6. Deployment
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-V8-Final
          path: final_zip/
