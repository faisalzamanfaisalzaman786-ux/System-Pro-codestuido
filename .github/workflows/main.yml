name: Build Flutter APK (Full Update)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
      package_name:
        description: 'Package Name (e.g., com.system.pro)'
        required: true
      app_icon_base64:
        description: 'Base64 of icon image (PNG)'
        required: false
      dart_code_base64:
        description: 'Base64 of main.dart'
        required: true
      pubspec_base64:
        description: 'Base64 of pubspec.yaml (optional)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Sanitize App Name
        id: sanitize
        run: |
          SANITIZED_NAME=$(echo "${{ github.event.inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | sed 's/[^a-z0-9_]//g')
          echo "sanitized_name=${SANITIZED_NAME}" >> $GITHUB_OUTPUT

      - name: Create Flutter project
        run: |
          rm -rf android ios
          flutter create --org $(echo ${{ github.event.inputs.package_name }} | cut -d'.' -f1,2) --project-name ${{ steps.sanitize.outputs.sanitized_name }} --platforms android .

      - name: Decode and write main.dart
        run: |
          echo '${{ github.event.inputs.dart_code_base64 }}' | base64 -d > lib/main.dart

      - name: Write pubspec.yaml (default if not provided)
        run: |
          if [ -n "${{ github.event.inputs.pubspec_base64 }}" ]; then
            echo '${{ github.event.inputs.pubspec_base64 }}' | base64 -d > pubspec.yaml
          else
            cat > pubspec.yaml << 'EOF'
name: system_pro
description: "Professional camera app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  camera: ^0.12.0+1
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^17.2.3
  workmanager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
EOF
          fi

      - name: Decode and set app icon
        if: ${{ github.event.inputs.app_icon_base64 != '' }}
        run: |
          echo '${{ github.event.inputs.app_icon_base64 }}' | base64 -d > app_icon.png
          sudo apt update && sudo apt install -y imagemagick
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-${density}
          done
          convert app_icon.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert app_icon.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert app_icon.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert app_icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert app_icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp android/app/src/main/res/mipmap-${density}/ic_launcher.png android/app/src/main/res/mipmap-${density}/ic_launcher_round.png
          done

      - name: Update package name and app label
        run: |
          sed -i "s/applicationId \".*\"/applicationId \"${{ github.event.inputs.package_name }}\"/" android/app/build.gradle
          sed -i 's/android:label="[^"]*"/android:label="${{ github.event.inputs.app_name }}"/' android/app/src/main/AndroidManifest.xml

      - name: Flutter clean
        run: flutter clean

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
