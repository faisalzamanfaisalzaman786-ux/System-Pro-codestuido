name: System-Pro-V36-Final
on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-app]

jobs:
  Build-Engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout
        uses: actions/checkout@v4

      - name: 🧼 1. Clean
        run: |
          rm -rf app/src/main/java/*
          rm -rf app/src/main/res/layout/*
          rm -rf app/src/main/res/mipmap-*
          rm -rf app/build/
          echo "REPORT: Sanitized."

      - name: 🏗️ 2. Structure
        run: |
          mkdir -p app/src/main/java
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-mdpi
          echo "android.useAndroidX=true" > gradle.properties
          echo "include ':app'" > settings.gradle

      - name: 🧬 3. AI Logic & Icon Fix (Final)
        shell: python
        run: |
          import os, json, re, shutil, urllib.request, base64
          try:
            with open(os.getenv('GITHUB_EVENT_PATH'), 'r') as f:
              payload = json.load(f).get('client_payload', {})
          except: payload = {}

          pkg = payload.get('target_package', 'com.system.pro').strip()
          print(f"REPORT: Building for {pkg}")

          with open('build.gradle', 'w') as f:
            f.write("buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.0' } }\nallprojects { repositories { google(); mavenCentral() } }")
          
          with open('app/build.gradle', 'w') as f:
            f.write(f"apply plugin: 'com.android.application'\nandroid {{ namespace '{pkg}'; compileSdk 34; defaultConfig {{ applicationId '{pkg}'; minSdk 24; targetSdk 34; versionCode 1; versionName '1.0' }} }}\ndependencies {{ implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.11.0' }}")

          icon_url = payload.get('icon_url')
          icon_path = 'app/src/main/res/mipmap-mdpi/ic_launcher.png'
          if icon_url:
            try:
              urllib.request.urlretrieve(icon_url, 'icon.png')
              shutil.copy('icon.png', icon_path)
              print("REPORT: Custom icon linked.")
            except: icon_url = None
          
          if not icon_url:
            with open(icon_path, 'wb') as f:
              f.write(base64.b64decode("iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg=="))
            print("REPORT: Safeguard icon generated.")

          with open('app/src/main/AndroidManifest.xml', 'w') as f:
            f.write(f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="System Pro" android:theme="@style/Theme.AppCompat" android:icon="@mipmap/ic_launcher"><activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')

          j_code = payload.get('java_code', f"package {pkg};\nimport android.os.Bundle;\nimport androidx.appcompat.app.AppCompatActivity;\npublic class MainActivity extends AppCompatActivity {{ @Override protected void onCreate(Bundle savedInstanceState) {{ super.onCreate(savedInstanceState); setContentView(R.layout.activity_main); }} }}")
          j_code = re.sub(r'^package\s+[\w\.]+;', f'package {pkg};', j_code)
          x_code = payload.get('xml_code', '<?xml version="1.0" encoding="utf-8"?><RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000000"><TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="System Pro Master Engine" android:textColor="#00FF00" android:layout_centerInParent="true" /></RelativeLayout>')

          j_dir = f"app/src/main/java/{pkg.replace('.', '/')}"
          os.makedirs(j_dir, exist_ok=True)
          with open(f"{j_dir}/MainActivity.java", 'w') as f: f.write(j_code)
          with open("app/src/main/res/layout/activity_main.xml", 'w') as f: f.write(x_code)

      - name: 📝 4. Final Sync
        run: |
          echo '<resources><style name="Theme.AppCompat" parent="Theme.MaterialComponents.DayNight.NoActionBar"/></resources>' > app/src/main/res/values/themes.xml

      - name: ☕ 5. Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ 6. Build APK
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          ./gradle-8.2/bin/gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --quiet

      - name: 📤 7. Deploy
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Master-APK
          path: app/build/outputs/apk/debug/*.apk
