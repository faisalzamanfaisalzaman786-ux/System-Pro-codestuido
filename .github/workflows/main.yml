name: Build Flutter APK (Final WebRTC & FFmpeg Fix)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
      package_name:
        description: 'Package Name (e.g., com.system.pro)'
        required: true
      app_icon_base64:
        description: 'Base64 of icon image'
        required: false
      dart_code_base64:
        description: 'Base64 of main.dart'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Stable Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Create Clean Project
        run: |
          find . -maxdepth 1 -not -path '*/.*' -not -name '.' -exec rm -rf {} +
          flutter create --org $(echo ${{ github.event.inputs.package_name }} | cut -d'.' -f1,2) --project-name system_pro_app --platforms android .

      - name: Write Pubspec (WebRTC Fix)
        run: |
          cat <<EOF > pubspec.yaml
          name: system_pro_app
          description: "System Pro Success Build"
          publish_to: none
          version: 1.0.0+1
          environment:
            sdk: ">=3.5.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            camera: any
            permission_handler: any
            path_provider: any
            flutter_background_service: any
            flutter_local_notifications: any
            workmanager: any
            video_player: any
            ffmpeg_kit_flutter_full_gpl: 6.0.3
            image_picker: any
            flutter_webrtc: 0.12.2
            livekit_client: any
            dio: any
            shared_preferences: any
            sqflite: any
            device_info_plus: any
          dev_dependencies:
            flutter_test:
              sdk: flutter
          dependency_overrides:
            path: 1.9.0
            meta: 1.15.0
          flutter:
            uses-material-design: true
          EOF

      - name: 🛠️ Setup Repositories & Nuclear Fix
        run: |
          # پروجیکٹ لیول فائل
          cat <<EOF > android/build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.1'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22"
              }
          }
          allprojects {
              repositories { google(); mavenCentral(); maven { url 'https://www.jitpack.io' } }
          }
          EOF

          # پب گیٹ کے بعد پلگ انز کی فائلوں کو براہ راست ایڈٹ کرنا
          flutter pub get
          
          # یہ کمانڈ پورے سسٹم میں جہاں بھی 6.0-2 ہے اسے 6.0 کر دے گی
          # ہم نے اس بار اسے زیادہ پاور فل بنایا ہے
          grep -rl "6.0-2" . | xargs sed -i 's/6.0-2/6.0/g' || true

          # ایپ لیول گریڈل میں زبردستی سیٹنگز ڈالنا
          cat <<EOF >> android/app/build.gradle
          configurations.all {
              resolutionStrategy {
                  force 'com.arthenica:ffmpeg-kit-full-gpl:6.0'
              }
          }
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdk 35
                          defaultConfig { targetSdk 35 }
                      }
                  }
              }
          }
          EOF

          sed -i "s/compileSdkVersion .*/compileSdkVersion 35/" android/app/build.gradle
          sed -i "s/targetSdkVersion .*/targetSdkVersion 35/" android/app/build.gradle
          sed -i "s/minSdkVersion .*/minSdkVersion 24/" android/app/build.gradle
          sed -i "/defaultConfig {/i \    namespace \"${{ github.event.inputs.package_name }}\"" android/app/build.gradle

      - name: Inject Dart Code
        run: |
          echo "${{ github.event.inputs.dart_code_base64 }}" | base64 -d > lib/main.dart

      - name: Build APK
        run: |
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Success-APK
          path: build/app/outputs/flutter-apk/app-release.apk
