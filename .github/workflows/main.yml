name: Setup Structure and Build

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
        default: 'System Pro'
      package_name:
        description: 'Android Package Name'
        required: true
        default: 'com.system.pro.v8'

jobs:
  create_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Create Project
        run: |
          # یہاں ان پٹ سے پیکیج نیم اور ایپ نیم استعمال ہو رہا ہے
          flutter create --project-name system_pro_codestuido --org ${{ github.event.inputs.package_name }} .
          
      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: build/app/outputs/flutter-apk/app-release.apk
