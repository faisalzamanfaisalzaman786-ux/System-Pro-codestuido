        name: 6. AI Auto-Fix (On Failure)
        if: failure()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PKG_NAME: ${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}
        run: |
          echo "Build failed. Invoking System Pro AI..."
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          # ڈیٹا کو انکوڈ کرنا
          ERROR_LOG=$(tail -n 30 build_log.txt | jq -sRr @json)
          JAVA_CODE=$(cat "app/src/main/java/$PKG_PATH/MainActivity.java" | jq -sRr @json)
          XML_CODE=$(cat "app/src/main/res/layout/activity_main.xml" | jq -sRr @json)
          
          # محفوظ طریقے سے JSON پیلوڈ تیار کرنا
          echo "{
            \"contents\": [{
              \"parts\":[{
                \"text\": \"The Android build failed with this error: $ERROR_LOG. Here is the Java code: $JAVA_CODE and XML: $XML_CODE. Please fix the error and return the full corrected Java and XML files. Use '---FILE_SPLIT---' as a separator between them. Return ONLY the code, no explanation.\"
              }]
            }]
          }" > payload.json

          # اب فائل کے ذریعے ڈیٹا بھیجنا
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H 'Content-Type: application/json' \
            -d @payload.json)

          # جواب کو کلین کرنا
          CLEAN_CODE=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' | sed 's/```java//g; s/```xml//g; s/```//g')
          
          if [[ "$CLEAN_CODE" == *"---FILE_SPLIT---"* ]]; then
            echo "AI found a fix. Patching files..."
            echo "$CLEAN_CODE" | awk -F'---FILE_SPLIT---' '{print $1}' > "app/src/main/java/$PKG_PATH/MainActivity.java"
            echo "$CLEAN_CODE" | awk -F'---FILE_SPLIT---' '{print $2}' > "app/src/main/res/layout/activity_main.xml"
            
            echo "Retrying build with AI corrections..."
            ./gradlew assembleDebug --no-daemon
          else
            echo "AI error or invalid response. Full response logged below:"
            echo "$RESPONSE" | jq .
            exit 1
          fi
