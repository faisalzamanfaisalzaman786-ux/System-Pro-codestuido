name: Build Flutter APK (Full Update)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
      package_name:
        description: 'Package Name (e.g., com.system.pro)'
        required: true
      app_icon_base64:
        description: 'Base64 of icon image (PNG)'
        required: false
      dart_code_base64:
        description: 'Base64 of main.dart'
        required: true
      pubspec_base64:
        description: 'Base64 of pubspec.yaml'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Sanitize App Name
        id: sanitize
        run: |
          # Creates a valid flutter project name (lowercase, underscores only)
          SANITIZED_NAME=$(echo "${{ github.event.inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | sed 's/[^a-z0-9_]//g')
          echo "sanitized_name=${SANITIZED_NAME}" >> $GITHUB_OUTPUT

      - name: Create Flutter project
        run: |
          # Clean existing files to prevent conflicts
          rm -rf .[^.]* *
          flutter create --org $(echo ${{ github.event.inputs.package_name }} | rev | cut -d'.' -f2- | rev) --project-name ${{ steps.sanitize.outputs.sanitized_name }} --platforms android .

      - name: Decode and write main.dart
        run: |
          mkdir -p lib
          echo '${{ github.event.inputs.dart_code_base64 }}' | base64 -d > lib/main.dart

      - name: Write pubspec.yaml
        run: |
          if [ -n "${{ github.event.inputs.pubspec_base64 }}" ]; then
            echo '${{ github.event.inputs.pubspec_base64 }}' | base64 -d > pubspec.yaml
          else
            cat > pubspec.yaml << 'EOF'
name: system_pro
description: "Professional camera application"
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  camera: ^0.12.0+1
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^17.2.3
  workmanager: ^0.5.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
flutter:
  uses-material-design: true
EOF
          fi

      - name: Decode and set app icon
        if: ${{ github.event.inputs.app_icon_base64 != '' }}
        run: |
          echo '${{ github.event.inputs.app_icon_base64 }}' | base64 -d > app_icon.png
          sudo apt update && sudo apt install -y imagemagick
          
          # Define icon sizes
          declare -A sizes=( ["mdpi"]="48x48" ["hdpi"]="72x72" ["xhdpi"]="96x96" ["xxhdpi"]="144x144" ["xxxhdpi"]="192x192" )
          
          for density in "${!sizes[@]}"; do
            path="android/app/src/main/res/mipmap-${density}"
            mkdir -p "$path"
            convert app_icon.png -resize "${sizes[$density]}" "${path}/ic_launcher.png"
            cp "${path}/ic_launcher.png" "${path}/ic_launcher_round.png"
          done

      - name: Update package name and app label
        run: |
          # Update Application ID in build.gradle
          sed -i "s/applicationId \".*\"/applicationId \"${{ github.event.inputs.package_name }}\"/" android/app/build.gradle
          # Update App Display Name in AndroidManifest
          sed -i 's/android:label="[^"]*"/android:label="${{ github.event.inputs.app_name }}"/' android/app/src/main/AndroidManifest.xml

      - name: Flutter build
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.sanitize.outputs.sanitized_name }}-release
          path: build/app/outputs/flutter-apk/app-release.apk
