name: Setup Pure Native Structure

on:
  workflow_dispatch:

jobs:
  initialize_native_project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Clean and Build Folders
        run: |
          git config --global user.name "System Pro Master"
          git config --global user.email "systempro@dev.local"
          # سب کچھ صاف کریں
          rm -rf *
          # ضروری فولڈرز بنائیں
          mkdir -p app/src/main/java/com/systempro/nativeapp
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

      - name: Create Structure Files
        run: |
          # 1. Settings
          echo "include ':app'" > settings.gradle

          # 2. Project build.gradle
          echo "buildscript { repositories { google(); mavenCentral() } 
          dependencies { classpath 'com.android.tools.build:gradle:8.1.0' } }
          allprojects { repositories { google(); mavenCentral() } }" > build.gradle

          # 3. App build.gradle
          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.systempro.nativeapp'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.systempro.nativeapp'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }" > app/build.gradle

          # 4. Android Manifest
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro Native">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          # 5. Basic Strings
          echo '<resources><string name="app_name">System Pro Native</string></resources>' > app/src/main/res/values/strings.xml

      - name: Push to Main
        run: |
          git add .
          git commit -m "Triple Clean: Direct Structure Setup"
          git branch -M main
          git push origin main --force
