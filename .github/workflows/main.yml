name: Build System Pro (Dynamic)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: false
        default: 'Digital Counter'
      package_name:
        description: 'Android Package Name (e.g., com.system.pro)'
        required: false
        default: 'com.system.pro'
      app_icon_base64:
        description: 'Base64 encoded PNG icon (max 512x512)'
        required: false
        default: ''
      dart_code_base64:
        description: 'Base64 encoded Dart code for lib/main.dart'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter 3.10.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'
          channel: 'stable'

      - name: Fix pubspec package name (replace hyphens)
        run: |
          sed -i 's/name: System-Pro-codestuido/name: system_pro_codestuido/' pubspec.yaml

      - name: Write Dart code from base64 (if provided)
        if: ${{ github.event.inputs.dart_code_base64 != '' }}
        run: |
          echo "${{ github.event.inputs.dart_code_base64 }}" | base64 -d > lib/main.dart

      - name: Set app display name and Android package name
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          [ -z "$APP_NAME" ] && APP_NAME="Digital Counter"
          NEW_PKG="${{ github.event.inputs.package_name }}"
          [ -z "$NEW_PKG" ] && NEW_PKG="com.system.pro"
          
          # Update AndroidManifest.xml label and package
          sed -i 's/android:label=".*"/android:label="'"$APP_NAME"'"/' android/app/src/main/AndroidManifest.xml
          sed -i "s/package=\".*\"/package=\"$NEW_PKG\"/" android/app/src/main/AndroidManifest.xml
          
          # Update build.gradle applicationId
          sed -i "s/applicationId \".*\"/applicationId \"$NEW_PKG\"/" android/app/build.gradle

      - name: Create dummy app icons (if no custom icon provided)
        if: ${{ github.event.inputs.app_icon_base64 == '' }}
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-$density
            # 1x1 transparent PNG base64
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==" | base64 -d > android/app/src/main/res/mipmap-$density/ic_launcher.png
          done

      - name: Create custom icon from base64 (if provided)
        if: ${{ github.event.inputs.app_icon_base64 != '' }}
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          echo "${{ github.event.inputs.app_icon_base64 }}" | base64 -d > /tmp/icon.png
          for size in 48 72 96 144 192; do
            case $size in
              48) density=mdpi ;;
              72) density=hdpi ;;
              96) density=xhdpi ;;
              144) density=xxhdpi ;;
              192) density=xxxhdpi ;;
            esac
            mkdir -p android/app/src/main/res/mipmap-$density
            convert /tmp/icon.png -resize ${size}x${size} android/app/src/main/res/mipmap-$density/ic_launcher.png
          done

      - name: Create styles.xml (if missing)
        run: |
          mkdir -p android/app/src/main/res/values
          if [ ! -f android/app/src/main/res/values/styles.xml ]; then
            cat > android/app/src/main/res/values/styles.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Light.NoTitleBar">
                  <item name="android:windowBackground">@android:color/white</item>
              </style>
          </resources>
          EOF
          fi

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}.apk
          path: build/app/outputs/flutter-apk/app-release.apk
