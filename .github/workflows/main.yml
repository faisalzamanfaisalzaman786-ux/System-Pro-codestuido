name: System Pro Ultimate Engine

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.0.2

      - name: 4. Build Professional Structure & Fix Styles
        shell: bash
        env:
          JAVA_CODE: ${{ github.event.client_payload.java }}
          XML_CODE: ${{ github.event.client_payload.xml }}
          PKG_NAME: ${{ github.event.client_payload.package_name }}
          PERMISSIONS: ${{ github.event.client_payload.permissions }}
          EXTRA_DEPS: ${{ github.event.client_payload.dependencies }}
        run: |
          rm -rf app
          FINAL_PKG=${PKG_NAME:-"com.faisal.systempro"}
          PKG_PATH=$(echo "$FINAL_PKG" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout

          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle

          # --- 1. Master build.gradle ---
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          # --- 2. App build.gradle ---
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace '$FINAL_PKG'
              compileSdk 34
              defaultConfig {
                  applicationId "$FINAL_PKG"
                  minSdk 21
                  targetSdk 34
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              $EXTRA_DEPS
          }
          EOF

          # --- 3. Fixing Missing Styles (ActionButton, TabButton, BuildButton) ---
          cat <<EOF > app/src/main/res/values/styles.xml
          <resources>
              <style name="Theme.SystemPro" parent="Theme.MaterialComponents.DayNight.NoActionBar"/>
              
              <style name="ActionButton" parent="Widget.MaterialComponents.Button.TextButton">
                  <item name="android:layout_width">wrap_content</item>
                  <item name="android:layout_height">wrap_content</item>
              </style>

              <style name="TabButton" parent="Widget.MaterialComponents.Button.UnelevatedButton">
                  <item name="android:layout_width">0dp</item>
                  <item name="android:layout_weight">1</item>
                  <item name="android:layout_height">match_parent</item>
              </style>

              <style name="BuildButton" parent="Widget.MaterialComponents.Button">
                  <item name="android:layout_width">match_parent</item>
                  <item name="android:layout_height">wrap_content</item>
                  <item name="android:textAllCaps">false</item>
              </style>
          </resources>
          EOF

          # --- 4. Manifest & Permissions ---
          PERMISSION_STR=""
          IFS=',' read -ra ADDR <<< "$PERMISSIONS"
          for i in "${ADDR[@]}"; do
              if [ ! -z "$i" ]; then PERMISSION_STR+="<uses-permission android:name=\"android.permission.$i\" />"; fi
          done

          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              $PERMISSION_STR
              <application android:label="System Pro" android:theme="@style/Theme.SystemPro">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHer" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # --- 5. Final Injection ---
          if [ -z "$JAVA_CODE" ] || [ "$JAVA_CODE" == "null" ]; then
            echo "package $FINAL_PKG; import android.os.Bundle; import androidx.appcompat.app.AppCompatActivity; public class MainActivity extends AppCompatActivity { @Override protected void onCreate(Bundle s){ super.onCreate(s); setContentView(R.layout.activity_main); } }" > app/src/main/java/$PKG_PATH/MainActivity.java
          else
            echo "$JAVA_CODE" > app/src/main/java/$PKG_PATH/MainActivity.java
          fi

          # یہاں آپ کا وہ XML آئے گا جو آپ پے لوڈ سے بھیج رہے ہیں
          echo "$XML_CODE" > app/src/main/res/layout/activity_main.xml

      - name: 5. Execute Build
        run: gradle assembleDebug --no-daemon

      - name: 6. Deliver Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Ultra-v2
          path: app/build/outputs/apk/debug/*.apk
