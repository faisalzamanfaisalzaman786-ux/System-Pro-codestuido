name: Build Flutter APK (Full Update)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
      package_name:
        description: 'Package Name (e.g., com.system.pro)'
        required: true
      app_icon_base64:
        description: 'Base64 of icon image (PNG/JPG)'
        required: false
      dart_code_base64:
        description: 'Base64 of main.dart'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Sanitize App Name
        id: sanitize
        run: |
          S_NAME=$(echo "${{ github.event.inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | sed 's/[^a-z0-9_]//g')
          echo "sanitized_name=${S_NAME}" >> $GITHUB_OUTPUT

      - name: Create Clean Flutter Project
        run: |
          find . -maxdepth 1 -not -path '*/.*' -not -name '.' -exec rm -rf {} +
          flutter create --org $(echo ${{ github.event.inputs.package_name }} | cut -d'.' -f1,2) --project-name ${{ steps.sanitize.outputs.sanitized_name }} --platforms android .

      - name: Version Sync (pubspec.yaml)
        run: |
          cat <<EOF > pubspec.yaml
          name: ${{ steps.sanitize.outputs.sanitized_name }}
          description: "System Pro Build Engine"
          publish_to: none
          version: 1.0.0+1
          environment:
            sdk: ">=3.6.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            camera: ^0.11.0+2
            permission_handler: ^11.3.1
            path_provider: ^2.1.4
            flutter_background_service: ^5.1.0
            flutter_local_notifications: ^17.2.3
            workmanager: ^0.5.2
            video_player: ^2.9.2
            ffmpeg_kit_flutter_full_gpl: 6.0.3-LTS
            image_picker: ^1.1.2
            flutter_webrtc: ^0.12.3
            livekit_client: ^2.5.3
            dio: ^5.7.0
            shared_preferences: ^2.3.3
            sqflite: ^2.3.3+1
            device_info_plus: ^11.1.0
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^5.0.0
          dependency_overrides:
            path: 1.9.0
            meta: 1.15.0
          flutter:
            uses-material-design: true
          EOF

      - name: Force v2 Embedding & Clean Java
        run: |
          PACKAGE_PATH=$(echo "${{ github.event.inputs.package_name }}" | tr '.' '/')
          rm -rf android/app/src/main/kotlin
          rm -rf android/app/src/main/java/*
          mkdir -p android/app/src/main/java/$PACKAGE_PATH
          cat <<EOF > android/app/src/main/java/$PACKAGE_PATH/MainActivity.java
          package ${{ github.event.inputs.package_name }};
          import io.flutter.embedding.android.FlutterActivity;
          public class MainActivity extends FlutterActivity {
          }
          EOF

      - name: Fix FFmpeg Repo & Android Config
        run: |
          # اینڈرائیڈ کی سیٹنگز میں Maven Central اور Google Repos کو یقینی بنانا
          sed -i "s/google()/google()\n        mavenCentral()\n        maven { url 'https:\/\/jitpack.io' }/g" android/build.gradle
          
          # SDK سیٹنگز
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' android/app/build.gradle
          sed -i 's/JavaVersion.VERSION_1_8/JavaVersion.VERSION_17/g' android/app/build.gradle
          sed -i "/defaultConfig {/i \    namespace \"${{ github.event.inputs.package_name }}\"" android/app/build.gradle

      - name: Write AndroidManifest.xml
        run: |
          cat <<EOF > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="${{ github.event.inputs.package_name }}">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <application
                  android:label="${{ github.event.inputs.app_name }}"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

      - name: Inject Dart Code
        run: |
          echo "${{ github.event.inputs.dart_code_base64 }}" | base64 -d > lib/main.dart

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.sanitize.outputs.sanitized_name }}-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: ✅ Final Stamp
        if: always()
        run: |
          echo "System Pro: Build #334 Fixed."
          flutter clean || true
