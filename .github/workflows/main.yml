name: System Pro Calculator Final Fix

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  total_rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Initialize Android Environment
        run: |
          # ضروری پراپرٹیز سیٹ کرنا
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # گریڈل ریپر بنانا
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Clean and Build APK
        run: |
          # پرانے بلڈ کو مکمل ختم کرنا (سب سے اہم سٹیپ)
          ./gradlew clean
          
          # اب آپ کے نئے کوڈ (Java/XML) کے ساتھ بلڈ کرنا
          ./gradlew assembleDebug --no-daemon

      - name: Upload System Pro Calc
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Calculator-V2
          path: app/build/outputs/apk/debug/*.apk