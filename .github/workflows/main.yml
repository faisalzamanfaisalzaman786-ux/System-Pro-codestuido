name: System-Pro-V62-Engine

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Package Name'
        required: false
        default: 'com.system.pro'
      app_name:
        description: 'App Name'
        required: false
        default: 'System Pro'
      app_icon_base64:
        description: 'Base64 Encoded Icon Data'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Process Base64 Icon
        shell: python
        run: |
          import base64
          import os

          # فیصل بھائی، یہاں ہم بیس 64 ڈیٹا کو محفوظ طریقے سے نکال رہے ہیں
          raw_b64 = """${{ github.event.inputs.app_icon_base64 }}""".strip()
          target_dir = "app/src/main/res/drawable"
          target_path = os.path.join(target_dir, "ic_launcher.png")
          template_path = "templates/ic_launcher.png"

          if not os.path.exists(target_dir):
              os.makedirs(target_dir)

          if len(raw_b64) > 100:
              try:
                  # اگر ڈیٹا یو آر آئی فارمیٹ میں ہے (data:image/png;base64,...) تو اسے صاف کریں
                  if "," in raw_b64:
                      raw_b64 = raw_b64.split(",")[1]
                  
                  # وائٹ سپیس اور نیو لائنز ختم کریں
                  raw_b64 = "".join(raw_b64.split())
                  
                  img_data = base64.b64decode(raw_b64)
                  with open(target_path, "wb") as f:
                      f.write(img_data)
                  print("✅ Icon successfully decoded from Base64 payload.")
              except Exception as e:
                  print(f"❌ Base64 Decoding failed: {e}")
                  if os.path.exists(template_path):
                      os.system(f"cp {template_path} {target_path}")
          else:
              print("ℹ️ No valid Base64 icon found, using template.")
              if os.path.exists(template_path):
                  os.system(f"cp {template_path} {target_path}")

      - name: Update Branding and Package
        run: |
          PKG="${{ github.event.inputs.package_name }}"
          NAME="${{ github.event.inputs.app_name }}"
          
          # ڈیفالٹ ویلیوز اگر پے لوڈ خالی ہو
          [ -z "$PKG" ] && PKG="com.system.pro"
          [ -z "$NAME" ] && NAME="System Pro"

          # پیکیج نیم کی تمام فائلوں میں تبدیلی
          find . -maxdepth 4 -type f \( -name "*.gradle" -o -name "*.xml" -o -name "*.java" \) -exec sed -i "s/com.system.pro/$PKG/g" {} +

          # ایپ نیم کی تبدیلی (Strings.xml)
          if [ -f app/src/main/res/values/strings.xml ]; then
            sed -i "s/<string name=\"app_name\">.*<\/string>/<string name=\"app_name\">$NAME<\/string>/g" app/src/main/res/values/strings.xml
          fi

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-V62
          path: app/build/outputs/apk/debug/*.apk
