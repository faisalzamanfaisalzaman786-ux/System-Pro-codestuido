name: Build Flutter APK (Full Update)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
      package_name:
        description: 'Package Name (e.g., com.system.pro)'
        required: true
      app_icon_base64:
        description: 'Base64 of icon image (PNG)'
        required: false
      dart_code_base64:
        description: 'Base64 of main.dart'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create fresh Flutter project
        run: |
          # Ensure clean directory (remove old android/ios folders if exist)
          rm -rf android ios linux macos web windows
          flutter create --org ${PACKAGE_NAME%.*} --project-name ${APP_NAME// /_} --platforms android .
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
          PACKAGE_NAME: ${{ github.event.inputs.package_name }}

      - name: Decode and write main.dart
        run: |
          echo '${{ github.event.inputs.dart_code_base64 }}' | base64 -d > lib/main.dart

      - name: Decode and set app icon
        if: ${{ github.event.inputs.app_icon_base64 != '' }}
        run: |
          echo '${{ github.event.inputs.app_icon_base64 }}' | base64 -d > app_icon.png
          # Install ImageMagick for resizing
          sudo apt update && sudo apt install -y imagemagick
          # Create all required mipmap folders
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p android/app/src/main/res/mipmap-${density}
          done
          # Generate icons for each density
          convert app_icon.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert app_icon.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert app_icon.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert app_icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert app_icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          # Copy for round icons
          cp android/app/src/main/res/mipmap-mdpi/ic_launcher.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xhdpi/ic_launcher.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          cp android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Update package name and app label
        run: |
          # Update applicationId in build.gradle
          sed -i "s/applicationId \".*\"/applicationId \"${{ github.event.inputs.package_name }}\"/" android/app/build.gradle
          # Update app name in AndroidManifest.xml
          sed -i 's/<application[^>]*/<application android:label="${{ github.event.inputs.app_name }}" /' android/app/src/main/AndroidManifest.xml

      - name: Ensure MainActivity exists (safety check)
        run: |
          if [ ! -f android/app/src/main/kotlin/com/example/*/MainActivity.kt ] && [ ! -f android/app/src/main/java/com/example/*/MainActivity.java ]; then
            echo "MainActivity missing, creating default..."
            mkdir -p android/app/src/main/kotlin/$(echo ${{ github.event.inputs.package_name }} | tr '.' '/')
            cat > android/app/src/main/kotlin/$(echo ${{ github.event.inputs.package_name }} | tr '.' '/')/MainActivity.kt <<EOF
            package ${{ github.event.inputs.package_name }}
            import io.flutter.embedding.android.FlutterActivity
            class MainActivity: FlutterActivity()
            EOF
          fi

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
