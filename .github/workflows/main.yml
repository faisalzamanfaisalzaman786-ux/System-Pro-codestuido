name: System-Pro-V600-Force-Xerox

on:
  workflow_dispatch: # اسے مینوئل رن کریں

jobs:
  force_clone:
    runs-on: ubuntu-latest
    permissions:
      contents: write # یہ پرمیشن فائلوں کو لکھنے کے لیے ضروری ہے
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Force Clone & Replace Everything
        run: |
          # گٹ کی سیٹنگز
          git config --global user.name "System Pro AI"
          git config --global user.email "ai@systempro.com"

          # عارضی فولڈر میں فاسٹ لین کو کلون کرنا
          git clone --depth 1 https://github.com/fastlane/fastlane.git fastlane_temp
          
          # گٹ ہب اور گٹ فولڈرز کو بچا کر باقی سب کچھ مٹانا
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +
          
          # نیا ڈیٹا شفٹ کرنا
          cp -rf fastlane_temp/* .
          rm -rf fastlane_temp
          
          # زبردستی پش کرنا (Force Push)
          git add -A
          git commit -m "System Pro: Forced Xerox Clone Complete"
          git push origin main --force
