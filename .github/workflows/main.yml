name: System-Pro-Advanced-Master-Setup

on:
  workflow_dispatch:

jobs:
  initialize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Advanced Nuclear Clean & Foundation Build
        run: |
          # 1. پاور فل کلیننگ (Nuclear Wipe)
          # یہ کمانڈ .git اور .github کے علاوہ تمام فائلوں اور پوشیدہ فولڈرز کو ڈیلیٹ کر دے گی
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +
          
          # 2. فولڈر اسٹرکچر کی ازسرنو تخلیق (Force Creation)
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/values-night
          mkdir -p app/src/main/res/drawable-nodpi
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/jniLibs

          # 3. روٹ فائلیں (Standard)
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > gradle.properties
          android.useAndroidX=true
          android.enableJetifier=true
          android.nonTransitiveRClass=true
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
          EOF

          # 4. پروفیشنل ایپ کنفیگریشن
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId "com.system.pro"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildFeatures { viewBinding true }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.google.android.gms:play-services-maps:18.2.0'
              implementation 'com.google.android.gms:play-services-location:21.1.0'
          }
          EOF

          # 5. بنیادی ریسورسز کی فزیکل موجودگی
          cat <<EOF > app/src/main/res/values/colors.xml
          <resources>
              <color name="colorPrimary">#6200EE</color>
              <color name="colorAccent">#03DAC5</color>
              <color name="white">#FFFFFF</color>
              <color name="black">#000000</color>
          </resources>
          EOF

          cat <<EOF > app/src/main/res/values/styles.xml
          <resources>
              <style name="AppTheme" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="android:statusBarColor">@color/colorPrimary</item>
              </style>
          </resources>
          EOF

          echo '<resources><string name="app_name">System Pro</string></resources>' > app/src/main/res/values/strings.xml

          # 6. ماسٹر مینی فیسٹ
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.CAMERA" />
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:theme="@style/AppTheme"
                  android:hardwareAccelerated="true">
                  <activity android:name="com.system.pro.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Force Push Clean Foundation
        run: |
          git config --global user.name "System-Pro-Engine"
          git config --global user.email "faisal@systempro.ai"
          git add .
          git commit -m "Nuclear Clean: Full Standard Foundation Initialized"
          git push --force
