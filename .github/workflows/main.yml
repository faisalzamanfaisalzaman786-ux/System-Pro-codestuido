name: Build Flutter APK (Final Flexible Solution)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
      package_name:
        description: 'Package Name (e.g., com.system.pro)'
        required: true
      app_icon_base64:
        description: 'Base64 of icon image (PNG/JPG)'
        required: false
      dart_code_base64:
        description: 'Base64 of main.dart'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Sanitize App Name
        id: sanitize
        run: |
          S_NAME=$(echo "${{ github.event.inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | tr ' ' '_' | sed 's/[^a-z0-9_]//g')
          echo "sanitized_name=${S_NAME}" >> $GITHUB_OUTPUT

      - name: Create Project
        run: |
          find . -maxdepth 1 -not -path '*/.*' -not -name '.' -exec rm -rf {} +
          flutter create --org $(echo ${{ github.event.inputs.package_name }} | cut -d'.' -f1,2) --project-name ${{ steps.sanitize.outputs.sanitized_name }} --platforms android .

      - name: Write Optimized pubspec.yaml
        run: |
          cat <<EOF > pubspec.yaml
          name: ${{ steps.sanitize.outputs.sanitized_name }}
          description: "Universal App"
          publish_to: none
          version: 1.0.0+1
          environment:
            sdk: ">=3.6.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            camera: ^0.11.0+2
            permission_handler: ^11.3.1
            path_provider: ^2.1.4
            flutter_background_service: ^5.1.0
            flutter_local_notifications: ^17.2.3
            workmanager: ^0.5.2
            video_player: ^2.9.2
            ffmpeg_kit_flutter_full_gpl: ^6.0.3
            image_picker: ^1.1.2
            # ورژن کو 'any' کر دیا تاکہ ایرر نہ آئے
            flutter_webrtc: any
            livekit_client: any
            dio: ^5.7.0
            shared_preferences: ^2.3.3
            sqflite: ^2.3.3+1
            device_info_plus: ^11.1.0
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^5.0.0
          dependency_overrides:
            # صرف ضروری چیزوں کو اوور رائیڈ کریں
            path: 1.9.0
            meta: 1.15.0
          flutter:
            uses-material-design: true
          EOF

      - name: Update Android SDK 36 Configuration
        run: |
          sed -i 's/compileSdkVersion .*/compileSdkVersion 36/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 36/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle
          sed -i 's/JavaVersion.VERSION_1_8/JavaVersion.VERSION_17/g' android/app/build.gradle
          sed -i "/defaultConfig {/i \    namespace \"${{ github.event.inputs.package_name }}\"" android/app/build.gradle

      - name: 🛠️ Auto-Patch Logic (The Real Solution)
        run: |
          # پہلے پیکیج حاصل کریں
          flutter pub get
          # اب کیشے میں جا کر اس فائل کو ٹھیک کریں جو ویب آر ٹی سی کا اصل مسئلہ ہے
          FILE_PATH=$(find /home/runner/.pub-cache -name "SurfaceTextureRenderer.java" | head -n 1)
          if [ -n "$FILE_PATH" ]; then
            echo "Patching file: $FILE_PATH"
            # اس لائن کو شامل کرنا ضروری ہے تاکہ کمپائلیشن ایرر نہ آئے
            sed -i '/public void onSurfaceAvailable/i \            @Override public void onSurfaceDestroyed(android.graphics.SurfaceTexture surface) {}' "$FILE_PATH"
          else
            echo "Warning: SurfaceTextureRenderer.java not found."
          fi

      - name: Inject Dart Code
        run: |
          echo "${{ github.event.inputs.dart_code_base64 }}" | base64 -d > lib/main.dart

      - name: Final Build APK
        run: |
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.sanitize.outputs.sanitized_name }}-Build
          path: build/app/outputs/flutter-apk/app-release.apk
