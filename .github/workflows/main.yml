name: System Pro Ultimate Engine

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 4. Python-Based Atomic Force Write
        shell: python
        run: |
          import os

          def safe_write(path, content):
              directory = os.path.dirname(path)
              if directory and not os.path.exists(directory):
                  os.makedirs(directory, exist_ok=True)
              with open(path, "w", encoding="utf-8") as f:
                  f.write(content)

          # بنیادی کنفیگریشن فائلز
          safe_write("gradle.properties", "android.useAndroidX=true\nandroid.enableJetifier=true\nandroid.suppressUnsupportedCompileSdk=34")
          
          java_code = """${{ github.event.client_payload.java }}"""
          xml_code = """${{ github.event.client_payload.xml }}"""
          pkg_name = "${{ github.event.client_payload.package_name }}".replace(".", "/")

          safe_write(f"app/src/main/java/{pkg_name}/MainActivity.java", java_code)
          safe_write("app/src/main/res/layout/activity_main.xml", xml_code)

      - name: 5. Generate and Execute Build
        run: |
          # اگر gradlew فائل نہیں ہے تو نئی جنریٹ کریں
          if [ ! -f gradlew ]; then
            gradle wrapper
          fi
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 6. Upload Stable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-V11-Stable
          path: app/build/outputs/apk/debug/app-debug.apk
