name: Build APK from Input
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Name of the App'
        required: true
        default: 'APKForgeApp'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # This matches the branch name your JS script pushes to
          ref: apk-build-input

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Prepare Cordova Project
        run: |
          # Ensure platforms directory exists
          cordova platform add android
          
          # Fix for Gradle permissions if necessary
          chmod +x platforms/android/gradlew

      - name: Build Android APK
        run: cordova build android --release --no-telemetry

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-release
          path: platforms/android/app/build/outputs/apk/release/*.apk
