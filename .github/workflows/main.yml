name: System Pro Remote Builder V12

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # پے لوڈ پروسیسنگ اور فائل پلیسمنٹ کا اہم مرحلہ
      - name: AI Resource Placement & Manifest Sync
        run: |
          echo "Starting AI-driven file placement..."
          # یہاں وہ منطق ہے جو پے لوڈ سے آنے والے آئیکن کو ڈیفالٹ سے بدل دے گی
          if [ -f "payload/icon.png" ]; then
            cp -rf payload/icon.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            cp -rf payload/icon.png app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
            echo "Icon updated successfully."
          fi
          
          # پیکج نیم کی درستگی (Conflicts resolve)
          find app/src/main/java -name "*.java" -exec sed -i 's/package .*/package com.faisal.systempro;/g' {} +
          echo "Package names synchronized."

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload System Pro APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
