name: Build Flutter APK (The 36-Hour Final Solution)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
      package_name:
        description: 'Package Name (e.g., com.system.pro)'
        required: true
      app_icon_base64:
        description: 'Base64 of icon image (PNG/JPG)'
        required: false
      dart_code_base64:
        description: 'Base64 of main.dart'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Create Project
        run: |
          find . -maxdepth 1 -not -path '*/.*' -not -name '.' -exec rm -rf {} +
          flutter create --org $(echo ${{ github.event.inputs.package_name }} | cut -d'.' -f1,2) --project-name system_pro_app --platforms android .

      - name: Ultimate Pubspec (Git Fix & Dependency Alignment)
        run: |
          cat <<EOF > pubspec.yaml
          name: system_pro_app
          description: "System Pro Ultimate Recovery"
          publish_to: none
          version: 1.0.0+1
          environment:
            sdk: ">=3.6.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            camera: any
            permission_handler: any
            path_provider: any
            flutter_background_service: any
            flutter_local_notifications: any
            workmanager: any
            video_player: any
            ffmpeg_kit_flutter_full_gpl: 6.0.3-LTS
            image_picker: any
            # یہاں ہم برانچ کے نام کے بغیر براہ راست ریپوزٹری اٹھا رہے ہیں تاکہ ایرر نہ آئے
            flutter_webrtc:
              git:
                url: https://github.com/flutter-webrtc/flutter-webrtc.git
            livekit_client: any
            dio: any
            shared_preferences: any
            sqflite: any
            device_info_plus: any
          dev_dependencies:
            flutter_test:
              sdk: flutter
          dependency_overrides:
            # یہ وہ پل ہیں جو تمام لائبریریز کو جوڑیں گے
            path: 1.9.0
            meta: 1.15.0
            flutter_webrtc:
              git:
                url: https://github.com/flutter-webrtc/flutter-webrtc.git
          flutter:
            uses-material-design: true
          EOF

      - name: Force Android SDK 36 (Requirement for New WebRTC)
        run: |
          # چونکہ ہم گٹ ہب سے تازہ ترین WebRTC اٹھا رہے ہیں، اس لیے اب SDK 36 لازمی ہے
          sed -i 's/compileSdkVersion .*/compileSdkVersion 36/' android/app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 36/' android/app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle
          sed -i 's/JavaVersion.VERSION_1_8/JavaVersion.VERSION_17/g' android/app/build.gradle
          sed -i "/defaultConfig {/i \    namespace \"${{ github.event.inputs.package_name }}\"" android/app/build.gradle

      - name: Inject Dart Code
        run: |
          echo "${{ github.event.inputs.dart_code_base64 }}" | base64 -d > lib/main.dart

      - name: Execution with Pub Upgrade
        run: |
          # 'pub get' کے بجائے 'pub upgrade' استعمال کر رہے ہیں تاکہ تمام گٹ ڈیپینڈنسیز تازہ ہو جائیں
          flutter pub upgrade
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Success-APK
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: ✅ The End of Conflict
        if: always()
        run: |
          echo "System Pro: Hybrid Git/SDK 36 Build Completed."
          flutter clean || true
