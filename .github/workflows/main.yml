name: System Pro Final Force Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Force Clean and Reconstruct
        # یہ سٹیپ پرانی ہر چیز کو جڑ سے ختم کر دے گا
        run: |
          rm -rf app build.gradle settings.gradle gradlew gradlew.bat gradle .gradle
          mkdir -p app/src/main/java/com/systempro/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 1. New Settings File
          echo "include ':app'" > settings.gradle

          # 2. New Root build.gradle
          echo "buildscript { 
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects { 
              repositories { google(); mavenCentral() }
          }" > build.gradle

          # 3. New App build.gradle (Optimized Size)
          echo "plugins { id 'com.android.application' }
          android {
              namespace 'com.systempro.app'
              compileSdk 34
              defaultConfig {
                  applicationId 'com.systempro.app'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  release {
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }" > app/build.gradle

          # 4. New Android Manifest
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml

          # 5. New Java File
          echo 'package com.systempro.app;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }' > app/src/main/java/com/systempro/app/MainActivity.java

      - name: Setup Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2

      - name: Build Final APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload System Pro APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Success
          path: app/build/outputs/apk/release/*.apk
