name: Build Flutter APK (WebRTC SDK Fix)

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Display Name'
        required: true
      package_name:
        description: 'Package Name'
        required: true
      dart_code:
        description: 'Paste your main.dart code HERE'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Stable Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0' # واپس لیٹسٹ ورژن پر کیونکہ WebRTC نئے فیچرز مانگ رہا ہے
          channel: 'stable'

      - name: Create Clean Project
        run: |
          find . -maxdepth 1 -not -path '*/.*' -not -name '.' -exec rm -rf {} +
          flutter create --org $(echo ${{ github.event.inputs.package_name }} | cut -d'.' -f1,2) --project-name system_pro_app --platforms android .

      - name: 🛠️ Android SDK & WebRTC Compatibility Fix
        run: |
          # پیکیج کا راستہ درست کرنا
          PKG_PATH=$(echo ${{ github.event.inputs.package_name }} | tr '.' '/')
          mkdir -p android/app/src/main/kotlin/$PKG_PATH
          
          # MainActivity.kt
          cat <<EOF > android/app/src/main/kotlin/$PKG_PATH/MainActivity.kt
          package ${{ github.event.inputs.package_name }}
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity()
          EOF

          # App Level build.gradle (SDK 34 پر سیٹ کرنا)
          cat <<EOF > android/app/build.gradle
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
          }
          def flutterRoot = localProperties.getProperty('flutter.sdk')
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply from: "\$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

          android {
              namespace "${{ github.event.inputs.package_name }}"
              compileSdkVersion 34 
              defaultConfig {
                  applicationId "${{ github.event.inputs.package_name }}"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0"
                  multiDexEnabled true
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          EOF

          # پلگ انز کے ورژن کو زبردستی کنٹرول کرنا
          echo "subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          compileSdkVersion 34
                          defaultConfig { targetSdkVersion 34 }
                      }
                  }
              }
          }" >> android/build.gradle

      - name: Write Pubspec (Fixed Versions)
        run: |
          cat <<EOF > pubspec.yaml
          name: system_pro_app
          dependencies:
            flutter: { sdk: flutter }
            shared_preferences: ^2.2.0
            path_provider: ^2.1.0
            # ہم نے ورژن کو 0.12.0 پر لاک کر دیا ہے تاکہ نئے "Callback" ایررز نہ آئیں
            flutter_webrtc: 0.12.0 
          environment: { sdk: ">=3.5.0 <4.0.0" }
          flutter: { uses-material-design: true }
          EOF

      - name: Inject Dart Code
        shell: bash
        run: |
          cat <<'EOF' > lib/main.dart
          ${{ github.event.inputs.dart_code }}
          EOF

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Success-APK
          path: build/app/outputs/flutter-apk/app-release.apk
