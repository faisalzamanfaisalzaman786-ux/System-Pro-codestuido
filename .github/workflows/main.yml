name: System Pro Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. کوڈ چیک آؤٹ کرنا
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. جاوا سیٹ اپ کرنا (Android build کے لیے ضروری ہے)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. فلٹر سیٹ اپ کرنا
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # یا جو ورژن آپ استعمال کرنا چاہیں
          channel: 'stable'

      # 4. پیکجز ڈاؤن لوڈ کرنا
      - name: Install dependencies
        run: flutter pub get
        # اگر آپ کا پروجیکٹ کسی فولڈر میں ہے تو نیچے والی لائن سے '#' ہٹا کر فولڈر کا نام لکھیں
        # working-directory: ./your_folder_name 

      # 5. APK بنانا
      - name: Build APK
        run: flutter build apk --release
        # یہاں بھی اگر ضرورت ہو تو working-directory شامل کریں
        # working-directory: ./your_folder_name

      # 6. تیار شدہ APK کو اپ لوڈ کرنا تاکہ آپ اسے ڈاؤن لوڈ کر سکیں
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
