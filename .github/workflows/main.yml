name: System-Pro-V17-2-No-Keys-Required

on:
  repository_dispatch:
    types: [build-app]
  workflow_dispatch:

jobs:
  Independent-Build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Sync
        uses: actions/checkout@v4

      - name: 🧠 Local Logic Injection (V17.2)
        shell: python
        run: |
          import os, json, re

          # ڈیٹا لوڈنگ
          try:
              payload_raw = r"""${{ toJson(github.event.client_payload) }}"""
              payload = json.loads(payload_raw) if payload_raw != "null" else {}
          except: payload = {}

          java_code = payload.get("java", "")
          
          # 1. API Key Removal Guard
          # اگر کوڈ میں کہیں 'API_KEY' یا 'Gemini' کا ذکر ہے تو یہ اسے بلاک یا نیوٹرل کر دے گا
          java_code = re.sub(r'String\s+.*API_KEY\s*=.*;', 'String API_KEY = "LOCAL_SYSTEM_PRO";', java_code)
          
          # 2. Local Error Handling (No Cloud Needed)
          # ہم ایک ایسا بلاک ڈالیں گے جو صرف لوکل ریسورسز استعمال کرے
          safe_wrapper = """
          // Injected Local Engine
          private void initializeLocalEngine() {
              try {
                  android.util.Log.d("SystemPro", "Local Engine Started - No Keys Required");
              } catch (Exception e) {}
          }
          """
          
          # جاوا کوڈ میں انجن انجیکٹ کرنا
          if "public class" in java_code:
              java_code = java_code.replace("{", "{\n" + safe_wrapper, 1)

          # باقی فائلز کی تیاری (پچھلے کامیاب ورژنز کی طرح)
          # ... (XML اور Manifest کی تیاری)
