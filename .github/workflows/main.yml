name: System-Pro-AI-Engine

on:
  repository_dispatch:
    types: [build-app]
  push:
    branches: [main]

jobs:
  System-Pro-Build-Job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🛠️ 1. Setup Environment
        uses: actions/checkout@v4

      - name: ☕ 2. Java Configuration
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 🏗️ 3. Assembly
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          mkdir -p "app/src/main/java/$PKG_PATH" "app/src/main/res/layout" "app/src/main/res/values"

          # مینی فیسٹ فائل
          cat <<EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="SystemPro" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # اسٹائلز (ایرر سے بچنے کے لیے ضروری)
          cat <<EOF > app/src/main/res/values/styles.xml
          <resources>
              <style name="Theme.AppCompat.Light.NoActionBar" parent="Theme.MaterialComponents.Light.NoActionBar" />
          </resources>
          EOF

          # جاوا اور XML کوڈ (سخت فارمیٹ)
          cat <<'EOF' > "app/src/main/java/$PKG_PATH/MainActivity.java"
          ${{ github.event.client_payload.java }}
          EOF

          cat <<'EOF' > "app/src/main/res/layout/activity_main.xml"
          ${{ github.event.client_payload.xml }}
          EOF

          # گریڈل کنفیگریشن فائلز
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace '$PKG_NAME'
              compileSdk 34
              defaultConfig {
                  applicationId '$PKG_NAME'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: 🚀 4. Smart Build
        id: build_step
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: 📦 5. Final Export
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
