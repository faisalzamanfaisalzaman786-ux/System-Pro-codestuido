      - name: 🧠 AI High-Capacity Engine (V15.9)
        shell: python
        run: |
          import os, subprocess, json, re, sys

          # بڑے پے لوڈ کے لیے سیف ہینڈلنگ
          try:
              # پے لوڈ کو فائل میں لکھنا تاکہ میموری پر بوجھ نہ پڑے
              payload_raw = r"""${{ toJson(github.event.client_payload) }}"""
              with open("payload_temp.json", "w", encoding='utf-8') as f:
                  f.write(payload_raw)
              
              with open("payload_temp.json", "r", encoding='utf-8') as f:
                  payload = json.load(f)
          except Exception as e:
              print(f"Payload Error: {e}")
              payload = {}

          java_code = payload.get("java", "")
          pkg_name = payload.get("package_name", "com.faisal.systempro")
          pkg_path = pkg_name.replace('.', '/')

          # 1. فاسٹ اسکیننگ (بڑے کوڈ کے لیے آپٹیمائزڈ)
          all_ids = list(set(re.findall(r"R\.id\.([a-zA-Z0-9_]+)", java_code)))
          
          # 2. اسمارٹ یو آئی بلڈر (Attributes & Styles)
          widgets_xml = ""
          for wid in all_ids:
              # یہاں ہم ایٹریبیوٹس کو متحرک طور پر سیٹ کر رہے ہیں
              if any(x in wid.lower() for x in ["editor", "code", "input"]):
                  widgets_xml += f"""
                  <EditText 
                      android:id="@+id/{wid}" 
                      android:layout_width="match_parent" 
                      android:layout_height="350dp" 
                      android:background="#FFFFFF" 
                      android:gravity="top" 
                      android:padding="12dp" 
                      android:layout_margin="10dp" 
                      android:hint="Input: {wid}" 
                      android:textColor="#212121"
                      android:elevation="2dp"
                      android:inputType="textMultiLine|textNoSuggestions"/>\n"""
              else:
                  # ہائی ہینڈلنگ بٹن (72dp Touch Target)
                  widgets_xml += f"""
                  <Button
                      android:id="@+id/{wid}"
                      android:layout_width="match_parent"
                      android:layout_height="72dp"
                      android:text="{wid}"
                      android:layout_margin="8dp"
                      android:backgroundTint="#1B4F72"
                      android:textColor="#FFFFFF"
                      android:textSize="17sp"
                      android:elevation="6dp"
                      android:textAllCaps="false"/>\n"""

          # 3. انفراسٹرکچر کی تیاری
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          
          # XML اور Java فائلز کی رائٹنگ
          # ہم اس بات کو یقینی بناتے ہیں کہ فائلز UTF-8 میں ہوں تاکہ بڑے پے لوڈ میں کوئی کریکٹر ضائع نہ ہو
          with open("app/src/main/res/layout/activity_main.xml", "w", encoding='utf-8') as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?>\n<androidx.core.widget.NestedScrollView xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:fillViewport="true" android:background="#F2F3F4">\n<LinearLayout android:orientation="vertical" android:layout_width="match_parent" android:layout_height="wrap_content" android:padding="12dp">\n{widgets_xml}\n</LinearLayout>\n</androidx.core.widget.NestedScrollView>')
          
          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w", encoding='utf-8') as f:
              f.write(java_code)

          # 4. بلڈ پراپرٹیز (AndroidX & Stability)
          with open("gradle.properties", "w") as f:
              f.write("android.useAndroidX=true\nandroid.enableJetifier=true\norg.gradle.jvmargs=-Xmx2048m") # ریم کی حد بڑھا دی

          # (باقی گریڈل فائلز کی رائٹنگ پہلے کی طرح...)
