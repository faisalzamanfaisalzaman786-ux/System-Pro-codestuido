      - name: 6. AI Auto-Fix (On Failure)
        if: steps.build_step.outcome == 'failure' || hashFiles('status.txt') != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PKG_NAME: ${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}
        run: |
          echo "Build failed. Invoking System Pro AI..."
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          ERROR_LOG=$(tail -n 60 build_log.txt | jq -sRr @json)
          JAVA_CODE=$(cat "app/src/main/java/$PKG_PATH/MainActivity.java" | jq -sRr @json)
          XML_CODE=$(cat "app/src/main/res/layout/activity_main.xml" | jq -sRr @json)
          
          # پرامپٹ کو مزید واضح کیا گیا ہے تاکہ AI فارمیٹ خراب نہ کرے
          echo "{
            \"contents\": [{
              \"parts\":[{
                \"text\": \"You are an Android expert. Fix this error: $ERROR_LOG. Here is the Java: $JAVA_CODE and XML: $XML_CODE. Rules: 1. Provide the full Java code. 2. Then provide the delimiter '---FILE_SPLIT---'. 3. Then provide the full XML code. 4. Do NOT include any explanations or markdown backticks. Just the raw code and the delimiter.\"
              }]
            }]
          }" > payload.json

          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H 'Content-Type: application/json' \
            -d @payload.json)

          # جواب کو نکالنے کا بہتر طریقہ
          RAW_AI_OUTPUT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')
          
          # غیر ضروری مارک ڈاؤن ہٹانا
          CLEAN_CODE=$(echo "$RAW_AI_OUTPUT" | sed 's/```java//g; s/```xml//g; s/```//g')
          
          if [[ "$CLEAN_CODE" == *"---FILE_SPLIT---"* ]]; then
            echo "AI found a fix. Patching files..."
            echo "$CLEAN_CODE" | awk -F'---FILE_SPLIT---' '{print $1}' > "app/src/main/java/$PKG_PATH/MainActivity.java"
            echo "$CLEAN_CODE" | awk -F'---FILE_SPLIT---' '{print $2}' > "app/src/main/res/layout/activity_main.xml"
            
            echo "Retrying build..."
            ./gradlew assembleDebug --no-daemon
          else
            echo "AI response did not contain the split tag. Response was:"
            echo "$RAW_AI_OUTPUT"
            exit 1
          fi
