name: System-Pro-AI-Engine-v2

on:
  repository_dispatch:
    types: [build-app]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  System-Pro-Build-Job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 🛠️ 1. Setup Environment
        uses: actions/checkout@v4

      - name: ☕ 2. Java 17 Setup
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧠 3. Smart Engine (V8.9 Resource Auto-Synthesis)
        shell: python
        run: |
          import os, re, json
          
          raw_payload = r"""${{ toJson(github.event.client_payload) }}"""
          payload = json.loads(raw_payload, strict=False) if raw_payload != "null" else {}

          pkg_name = payload.get("package_name", "com.faisal.systempro")
          java_code = payload.get("java", "// System Pro Active")
          xml_code = payload.get("xml", "").strip()

          pkg_path = pkg_name.replace('.', '/')
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)

          # --- CRASH & MISSING RESOURCE PROTECTION ---
          with open("app/src/main/res/values/strings.xml", "w") as f:
              f.write('<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">System Pro</string></resources>')

          # 1. خودکار لے آؤٹ جنریشن (Fixes R.layout.dialog_settings error)
          # ہم جاوا کوڈ میں استعمال ہونے والے تمام layouts کو تلاش کریں گے
          found_layouts = set(re.findall(r'R\.layout\.(\w+)', java_code))
          for layout in found_layouts:
              if layout == "activity_main" and xml_code:
                  content = xml_code
              else:
                  # اگر لے آؤٹ مسنگ ہے تو ایک خالی کنٹینر بنا دیں تاکہ بلڈ فیل نہ ہو
                  content = '<?xml version="1.0" encoding="utf-8"?><LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical"></LinearLayout>'
              
              with open(f"app/src/main/res/layout/{layout}.xml", "w") as f:
                  f.write(content)

          # 2. آئی ڈی انجکشن (Preventing R.id.xxx errors)
          java_ids = set(re.findall(r'R\.id\.(\w+)', java_code))
          # ہم activity_main.xml میں ان آئی ڈیز کو انجیکٹ کریں گے
          with open("app/src/main/res/layout/activity_main.xml", "r") as f:
              current_xml = f.read()
          
          id_views = ""
          for jid in java_ids:
              if f'id/+"{jid}"' not in current_xml:
                  id_views += f'\n    <View android:id="@+id/{jid}" android:layout_width="0dp" android:layout_height="0dp" android:visibility="gone" />'
          
          if "</RelativeLayout>" in current_xml: updated_xml = current_xml.replace("</RelativeLayout>", f"{id_views}\n</RelativeLayout>")
          elif "</LinearLayout>" in current_xml: updated_xml = current_xml.replace("</LinearLayout>", f"{id_views}\n</LinearLayout>")
          else: updated_xml = current_xml + f"\n"

          with open("app/src/main/res/layout/activity_main.xml", "w") as f:
              f.write(updated_xml)

          # 3. تھیم گارڈ
          styles_xml = '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n'
          needed_styles = set(re.findall(r'style/(\w+)', updated_xml) + ["Theme.SystemPro"])
          for s in needed_styles:
              styles_xml += f'    <style name="{s}" parent="Theme.AppCompat.DayNight.NoActionBar"></style>\n'
          styles_xml += '</resources>'

          with open("app/src/main/res/values/styles.xml", "w") as f: f.write(styles_xml)
          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w", encoding="utf-8") as f: f.write(java_code)
          
          with open("app/src/main/AndroidManifest.xml", "w") as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?><manifest xmlns:android="http://schemas.android.com/apk/res/android"><application android:label="@string/app_name" android:theme="@style/Theme.SystemPro"><activity android:name="{pkg_name}.MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity></application></manifest>')

      - name: 🚀 4. Build APK (Master Fix)
        run: |
          echo "android.useAndroidX=true\nandroid.enableJetifier=true" > gradle.properties
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace '${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}'; compileSdk 34; defaultConfig { minSdk 24; targetSdk 34; versionCode 1; versionName "8.9" } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }
          EOF
          
          wget https://services.gradle.org/distributions/gradle-8.5-bin.zip -P /tmp
          sudo unzip -d /opt/gradle /tmp/gradle-8.5-bin.zip
          export PATH=$PATH:/opt/gradle/gradle-8.5/bin
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: 📦 5. Final Export
        if: always()
        run: |
          mkdir -p final_zip
          find . -name "*.apk" -type f -exec cp {} final_zip/SystemPro_V8_9.apk \;

      - name: 📤 6. Deployment
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final
          path: final_zip/
