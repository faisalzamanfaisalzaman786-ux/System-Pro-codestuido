          # 3. گریڈل اور مینی فیسٹ کنفیگریشن (مکمل فکس)
          with open("gradle.properties", "w") as f:
              f.write("android.useAndroidX=true\nandroid.enableJetifier=true")
          
          # settings.gradle میں ریپوزٹریز کا ہونا لازمی ہے
          with open("settings.gradle", "w") as f:
              f.write("""
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}
include ':app'
""")
          
          # روٹ build.gradle (خالی یا بنیادی)
          with open("build.gradle", "w") as f:
              f.write("// Top-level build file")

          # ایپ لیول build.gradle (ورژن کے ساتھ)
          with open("app/build.gradle", "w") as f:
              f.write(f"""
plugins {{
    id 'com.android.application' version '8.2.2' 
}}

android {{
    namespace '{pkg_name}'
    compileSdk 34
    defaultConfig {{
        applicationId '{pkg_name}'
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }}
    buildTypes {{
        release {{
            minifyEnabled false
        }}
    }}
}}

dependencies {{
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
}}
""")
