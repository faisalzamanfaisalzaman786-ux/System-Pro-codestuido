name: System Pro Ultimate Engine

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 4. Python-Based Project Structure Creator
        shell: python
        run: |
          import os

          def safe_write(path, content):
              directory = os.path.dirname(path)
              if directory and not os.path.exists(directory):
                  os.makedirs(directory, exist_ok=True)
              with open(path, "w", encoding="utf-8") as f:
                  f.write(content.strip())

          # 1. Root settings.gradle
          safe_write("settings.gradle", "include ':app'")

          # 2. App build.gradle
          safe_write("app/build.gradle", """
          plugins { id 'com.android.application' }
          android {
              namespace '${{ github.event.client_payload.package_name }}'
              compileSdk 34
              defaultConfig {
                  applicationId '${{ github.event.client_payload.package_name }}'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          """)

          # 3. Root build.gradle
          safe_write("build.gradle", """
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          """)

          # 4. gradle.properties (FIXED LINE BY LINE)
          with open("gradle.properties", "w") as props:
              props.write("android.useAndroidX=true\\n")
              props.write("android.enableJetifier=true\\n")
          
          # 5. Java & XML Setup
          java_code = """${{ github.event.client_payload.java }}"""
          xml_code = """${{ github.event.client_payload.xml }}"""
          pkg_path = "${{ github.event.client_payload.package_name }}".replace(".", "/")
          safe_write(f"app/src/main/java/{pkg_path}/MainActivity.java", java_code)
          safe_write("app/src/main/res/layout/activity_main.xml", xml_code)
          
          # 6. Android Manifest
          safe_write("app/src/main/AndroidManifest.xml", """<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:theme="@style/Theme.MaterialComponents.DayNight.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>""")

      - name: 5. Execute Build
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
