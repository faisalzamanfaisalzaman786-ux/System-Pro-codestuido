name: System-Pro-V62-Authentic-Build

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Environment (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Payload Mapping & Resource Solidification
        shell: python
        run: |
          import base64, os

          payload = ${{ toJson(github.event.client_payload) }}
          pkg_name = payload.get('package_name', 'com.system.pro')
          app_name = payload.get('app_name', 'System Pro')
          pkg_path = pkg_name.replace('.', '/')

          # فولڈرز کی پکی ترتیب
          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          os.makedirs("app/src/main/res/values", exist_ok=True)
          os.makedirs("app/src/main/res/drawable", exist_ok=True)

          def save_b64(key, target):
              data = payload.get(key, '')
              if data and len(data) > 10:
                  if "," in data: data = data.split(",")[1]
                  with open(target, "wb") as f: f.write(base64.b64decode(data))

          # کوڈ اور لے آؤٹ کی سیونگ
          save_b64('java_b64', f"app/src/main/java/{pkg_path}/MainActivity.java")
          save_b64('xml_b64', "app/src/main/res/layout/activity_main.xml")
          
          # 1. Styles.xml بنانا (سب سے اہم سٹیپ)
          # یہ اینڈرائیڈ کو بتائے گا کہ 'AppTheme' کیا ہے تاکہ وہ کریش نہ ہو
          styles = '''<resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="colorPrimary">#6200EE</item>
                  <item name="colorAccent">#03DAC5</item>
              </style>
          </resources>'''
          with open("app/src/main/res/values/styles.xml", "w") as f: f.write(styles)

          # 2. مینی فیسٹ کی پکی کنفیگریشن
          manifest = f'''<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="{app_name}"
                  android:theme="@style/AppTheme">
                  <activity android:name="{pkg_name}.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>'''
          with open("app/src/main/AndroidManifest.xml", "w") as f: f.write(manifest)

          with open("app/src/main/res/values/strings.xml", "w") as f:
              f.write(f'<resources><string name="app_name">{app_name}</string></resources>')

      - name: Build Scripts Generation
        run: |
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace '${{ github.event.client_payload.package_name || 'com.system.pro' }}'
              compileSdk 34
              defaultConfig {
                  applicationId "${{ github.event.client_payload.package_name || 'com.system.pro' }}"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
          }
          EOF

      - name: Build APK (Final Attempt)
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-V62-Authentic
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
