name: System-Pro-V62-Direct-APK

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Dynamic Android Structure Build
        run: |
          # ہارڈ کوڈڈ پاتھس کے مطابق فولڈرز بنانا
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable
          
          # گریڈل کی ضروری فائلیں رن ٹائم پر بنانا
          echo "include ':app'" > settings.gradle
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.system.pro'
              compileSdk 34
              defaultConfig {
                  applicationId "${{ github.event.client_payload.package_name || 'com.system.pro' }}"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          EOF

      - name: Process App Payload (Java/XML)
        shell: python
        run: |
          import base64, os
          p = ${{ toJson(github.event.client_payload) }}
          def save(key, path):
              data = p.get(key, '')
              if data and len(data) > 10:
                  if "," in data: data = data.split(",")[1]
                  with open(path, "wb") as f: f.write(base64.b64decode(data))

          save('java_b64', "app/src/main/java/com/system/pro/MainActivity.java")
          save('xml_b64', "app/src/main/res/layout/activity_main.xml")
          save('manifest_b64', "app/src/main/AndroidManifest.xml")
          
          # آئیکن اگر موجود ہو
          icon = p.get('icon_data_b64', '')
          if len(icon) > 50: save('icon_data_b64', "app/src/main/res/drawable/ic_launcher.png")

      - name: Setup Gradle Wrapper (8.5)
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build Debug APK
        # یہاں ہم نے 'continue-on-error' ہٹا دیا ہے تاکہ اگر ایرر آئے تو پتہ چلے
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-V62-Standard
          path: app/build/outputs/apk/debug/*.apk
