name: System-Pro-V1200-Final-Absolute-Sync

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ultimate_sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Checkout Your Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Direct Sync (No Copy Command)
        run: |
          git config --global user.name "System Pro AI"
          git config --global user.email "ai@systempro.com"

          # بیرونی ریپوزٹری کو ریموٹ کے طور پر جوڑنا
          git remote add external https://github.com/fastlane/fastlane.git
          git fetch external master

          # آپ کی ریپوزٹری سے پرانا ڈیٹا صاف کرنا (سوائے .github کے)
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +

          # براہ راست ایکسٹرنل ڈیٹا کو اپنی مین برانچ میں نکالنا
          git checkout external/master -- .
          
          # سیکیورٹی: ان کا ورک فلو فولڈر ہٹانا تاکہ پش میں مسئلہ نہ آئے
          rm -rf .github/workflows/announce_release.yml
          rm -rf .github/workflows/ci.yml

          # زبردستی پش کرنا
          git add .
          git commit -m "System Pro: Final Absolute Sync V1200" || echo "No changes"
          git push origin main --force
