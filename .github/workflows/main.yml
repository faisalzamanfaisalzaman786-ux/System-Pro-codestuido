name: System-Pro-V601-Ultimate-Mirror

on:
  workflow_dispatch:

jobs:
  force_clone:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 1. Checkout Your Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. Force Clone & Mirror Everything
        run: |
          # گٹ کی پہچان سیٹ کرنا
          git config --global user.name "System Pro AI"
          git config --global user.email "ai@systempro.com"

          # عارضی فولڈر میں کلون کرنا
          git clone --depth 1 https://github.com/fastlane/fastlane.git fastlane_temp
          
          # .github اور .git کو بچا کر باقی سب کچھ مٹانا
          find . -maxdepth 1 ! -name '.github' ! -name '.git' ! -name '.' ! -name '..' -exec rm -rf {} +
          
          # اب تمام فائلوں کو (بشمول ڈاٹ فائلز) کاپی کرنا
          shopt -s dotglob
          cp -rf fastlane_temp/* .
          rm -rf fastlane_temp
          
          # زبردستی پش کرنا
          git add -A
          git commit -m "System Pro: Full Mirror Update V601" || echo "No changes to commit"
          git push origin main --force
