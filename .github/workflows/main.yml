name: System-Pro-AI-Engine

on:
  repository_dispatch:
    types: [build-app]
  push:
    branches: [main]

jobs:
  System-Pro-Build-Job:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ 1. Setup Environment
        uses: actions/checkout@v4

      - name: ☕ 2. Java Configuration
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ 3. Safe Assembly & Package Fix (Python)
        shell: python
        run: |
          import os, re
          pkg_name = "${{ github.event.client_payload.package_name }}" or "com.faisal.systempro"
          pkg_path = pkg_name.replace('.', '/')
          java_code = """${{ github.event.client_payload.java }}"""
          xml_code = """${{ github.event.client_payload.xml }}"""

          # کوڈ کے اندر پیکیج نیم کو خودکار درست کرنا
          corrected_java = re.sub(r'^package\s+[\w.]+;', f'package {pkg_name};', java_code, flags=re.MULTILINE)

          os.makedirs(f"app/src/main/java/{pkg_path}", exist_ok=True)
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          
          with open(f"app/src/main/java/{pkg_path}/MainActivity.java", "w", encoding="utf-8") as f:
              f.write(corrected_java)
          with open("app/src/main/res/layout/activity_main.xml", "w", encoding="utf-8") as f:
              f.write(xml_code)

      - name: 🚀 4. Smart Build (Direct Error Output)
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          echo "include ':app'" > settings.gradle
          cat <<'EOF' > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace '$PKG_NAME'; compileSdk 34
            defaultConfig { applicationId '$PKG_NAME'; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }
          EOF
          
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          # بلڈ چلانا اور ایرر کو براہ راست دکھانا
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: 📦 5. Export to Physical Folder
        if: success()
        run: |
          mkdir -p SystemPro_Output
          find app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} SystemPro_Output/SystemPro_v1.apk \;

      - name: 📦 6. Final Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-APK
          path: SystemPro_Output/*.apk
