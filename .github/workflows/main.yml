name: Build System Pro
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'
          channel: 'stable'

      - name: Repair and Build
        run: |
          # پراجیکٹ کے اندر جا کر ڈیپینڈنسیز سیٹ کرنا
          flutter pub get
          
          # اینڈرائیڈ بلڈ رن کرنا
          flutter build apk --release
