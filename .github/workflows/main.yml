      - name: Write Pubspec
        run: |
          cat <<EOF > pubspec.yaml
          name: system_pro_app
          description: "System Pro App Build"
          publish_to: none
          version: 1.0.0+1

          environment:
            sdk: ">=3.5.0 <4.0.0"

          dependencies:
            flutter:
              sdk: flutter
            camera: any
            permission_handler: any
            path_provider: any
            flutter_background_service: any
            flutter_local_notifications: any
            workmanager: any
            video_player: any
            ffmpeg_kit_flutter_full_gpl: 6.0.3
            image_picker: any
            flutter_webrtc: 0.12.2
            livekit_client: any
            dio: any
            shared_preferences: any
            sqflite: any
            device_info_plus: any

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^5.0.0

          dependency_overrides:
            path: 1.9.0
            meta: 1.15.0
            # یہ لائن FFmpeg کے 6.0-2 والے ایرر کو جڑ سے ختم کر دے گی
            ffmpeg_kit_flutter_full_gpl: 6.0.3
            # WebRTC کے استحکام کے لیے
            flutter_webrtc: 0.12.2

          flutter:
            uses-material-design: true
          EOF
