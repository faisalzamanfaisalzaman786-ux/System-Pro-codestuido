name: System Pro - Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build APK and Confirm Path
    runs-on: ubuntu-latest

    steps:
      # 1. ریپوزٹری کو چیک آؤٹ کرنا
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. جاوا سیٹ اپ کرنا
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # کیشے کو فی الحال ہٹا دیا ہے تاکہ ایرر ختم ہو سکے
          
      # 3. گریڈل فائلز کی موجودگی چیک کرنا
      - name: Check Gradle Files
        run: |
          ls -R
          if [ ! -f "gradlew" ]; then
            echo "Error: gradlew file not found in root!"
            exit 1
          fi

      # 4. پرمیشن دینا
      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      # 5. اے پی کے بنانا
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 6. پاتھ کنفرمیشن
      - name: Confirm Project Path
        run: |
          echo "Verifying System Pro Structure..."
          [ -f app/src/main/AndroidManifest.xml ] && echo "Manifest Found."

      # 7. اے پی کے اپ لوڈ کرنا
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-App
          path: app/build/outputs/apk/debug/app-debug.apk
