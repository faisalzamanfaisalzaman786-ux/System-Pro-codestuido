name: System-Pro-V90-Ultimate-Engine

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: AI-Master-Processor
        shell: python
        run: |
          import base64, os, re

          # یو آئی پے لوڈ سے ڈیٹا کا حصول
          p = ${{ toJson(github.event.client_payload) }}
          pkg = p.get('package_name', 'com.system.pro')
          app_name = p.get('app_name', 'System Pro')
          java_path = pkg.replace('.', '/')

          def write_file(path, content, binary=False):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, "wb" if binary else "w") as f:
                  f.write(content)

          def safe_decode(data):
              if not data: return b""
              if "," in data: data = data.split(",")[1]
              return base64.b64decode(data)

          # 1. ICON INJECTION (From icon_data_b64)
          icon_bytes = safe_decode(p.get('icon_data_b64', ''))
          if icon_bytes:
              write_file(f"app/src/main/res/mipmap-xxxhdpi/ic_launcher.png", icon_bytes, True)
          
          # 2. JAVA & SELF-HEALING LOGIC
          java_b = safe_decode(p.get('java_b64', ''))
          java_code = java_b.decode('utf-8', errors='ignore') if java_b else ""
          
          # 'Brain' Injection: خود کار مرمت کا نظام
          healing_engine = """
          private void runSystemProHealer() {
              android.app.ProgressDialog pd = new android.app.ProgressDialog(this);
              pd.setTitle("System Pro: AI Healing");
              pd.setMessage("Verifying resources & fixing crashes...");
              pd.setCancelable(false);
              pd.show();

              new Thread(() -> {
                  try {
                      // 1. مسنگ فولڈرز کی جانچ
                      java.io.File internalDir = new java.io.File(getFilesDir(), "assets_healed");
                      if (!internalDir.exists()) internalDir.mkdirs();
                      
                      // 2. نیٹ ورک سے متبادل ریسورس تلاش کرنا (Placeholder logic)
                      Thread.sleep(2500); 
                      
                      runOnUiThread(() -> {
                          pd.dismiss();
                          android.widget.Toast.makeText(this, "System Healed: All Resources Synced", 1).show();
                      });
                  } catch (Exception e) { e.printStackTrace(); }
              }).start();
          }
          """
          
          if "onCreate" in java_code:
              # خود بخود ہیلر کو انجیکٹ کرنا
              java_code = java_code.replace("super.onCreate(savedInstanceState);", "super.onCreate(savedInstanceState);\n        runSystemProHealer();")
              java_code = java_code.rstrip().rstrip('}') + "\n" + healing_engine + "\n}"

          java_code = re.sub(r'package\s+[\w.]+;', f'package {pkg};', java_code)
          write_file(f"app/src/main/java/{java_path}/MainActivity.java", java_code)

          # 3. XML & MANIFEST (Auto-Permission & Theme Fix)
          xml_b = safe_decode(p.get('xml_b64', ''))
          xml_content = xml_b.decode('utf-8', errors='ignore') if xml_b else ""
          write_file("app/src/main/res/layout/activity_main.xml", xml_content)

          manifest = f'''<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <application android:label="{app_name}" android:icon="@mipmap/ic_launcher" 
                  android:theme="@style/Theme.AppCompat.DayNight.NoActionBar" android:requestLegacyExternalStorage="true">
                  <activity android:name="{pkg}.MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
              </application>
          </manifest>'''
          write_file("app/src/main/AndroidManifest.xml", manifest)

          # 4. BUILD CONFIG (Libraries Sync)
          gradle_build = f"""
          plugins {{ id 'com.android.application' }}
          android {{
              namespace '{pkg}'
              compileSdk 34
              defaultConfig {{
                  applicationId '{pkg}'
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }}
          }}
          dependencies {{
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
          }}
          """
          write_file("app/build.gradle", gradle_build)
          write_file("app/src/main/res/values/strings.xml", f'<resources><string name="app_name">{app_name}</string></resources>')

      - name: Build & Heal APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Dispatch Final Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-Stable-V90
          path: app/build/outputs/apk/debug/*.apk
