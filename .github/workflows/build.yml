name: System Pro Universal Strong Builder

on:
  push:
    branches: [ main, apk-build-input ]
  repository_dispatch:
    types: [build-zip-project]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # چیک آؤٹ فیل ہونے سے بچنے کے لیے

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Initialize App Structure
        run: |
          # اگر ایپ فولڈر نہیں ہے تو اسے بنانا
          mkdir -p app/src/main/java/com/system/pro
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/assets/www

          # اگر انڈیکس فائل روٹ پر ہے تو اسے صحیح جگہ منتقل کرنا
          if [ -f "index.html" ]; then
            mv index.html app/src/main/assets/www/
          fi

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Build
          path: app/build/outputs/apk/debug/*.apk
