name: System Pro Ultimate Force Build

on:
  workflow_dispatch:

jobs:
  build_app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Directory Structure
        run: |
          mkdir -p app/src/main/java/com/systempro/main
          mkdir -p app/src/main/res/layout

      - name: Force Update Files
        run: |
          cat <<EOF > app/src/main/java/com/systempro/main/MainActivity.java
          package com.systempro.main;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.TextView;

          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle saved) {
                  super.onCreate(saved);
                  setContentView(R.id.num1); // Ensure this matches layout ID or layout file
                  // Your logic here
              }
          }
          EOF

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
  
