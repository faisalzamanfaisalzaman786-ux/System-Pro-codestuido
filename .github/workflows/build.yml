name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ main ] # اسے apk-build-input سے بدل کر main کر دیں

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # یہاں ref لکھنے کی ضرورت نہیں، یہ خود ہی main اٹھا لے گا
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - run: npm install -g cordova
      - run: cordova platform add android
      - run: cordova build android --no-telemetry
      
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: platforms/android/app/build/outputs/apk/debug/*.apk
