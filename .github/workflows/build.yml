name: System Pro Universal Strong Builder

on:
  push:
    branches: [ main, apk-build-input ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Fix Project Structure and Manifest
        run: |
          # ضروری فولڈرز بنانا
          mkdir -p app/src/main/assets/www
          
          # مینی فیسٹ سے پرانا پیکیج نیم ختم کرنا (ایرر 422 اور مینی فیسٹ فیل سے بچنے کے لیے)
          sed -i 's/package="[^"]*"//g' app/src/main/AndroidManifest.xml
          
          # اگر HTML فائل روٹ پر ہے تو اسے صحیح جگہ منتقل کرنا
          if [ -f "index.html" ]; then
            mv index.html app/src/main/assets/www/
          fi

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Final-Build
          path: app/build/outputs/apk/debug/*.apk
