name: Build APK
on:
  workflow_dispatch:
  push:
    branches:
      - apk-build-input

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: apk-build-input
          fetch-depth: 0

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Fix Directory Structure
        run: |
          # اگر آپ کی ایپ صرف index.html پش کر رہی ہے تو یہ کمانڈز ضروری ڈھانچہ خود بنائیں گی
          if [ ! -f "config.xml" ]; then
            echo "Creating missing config.xml..."
            printf "<?xml version='1.0' encoding='utf-8'?><widget id='com.system.pro.app' version='1.0.0'><name>SystemPro</name><content src='index.html' /><access origin='*' /></widget>" > config.xml
          fi
          
          if [ ! -d "www" ]; then
            mkdir www
            [ -f "index.html" ] && mv index.html www/
          fi

      - name: Build Android APK
        run: |
          # اینڈرائیڈ پلیٹ فارم شامل کرنا اور بلڈ کرنا
          cordova platform add android --no-telemetry
          cordova build android --debug --no-telemetry

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Forge-Output
          path: platforms/android/app/build/outputs/apk/debug/*.apk
