name: Build APK
on:
  workflow_dispatch:
  push:
    branches:
      - apk-build-input  # یقینی بنائیں کہ یہ برانچ ریپوزٹری میں موجود ہے

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: apk-build-input
          fetch-depth: 0

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Prepare and Build
        run: |
          # اگر آپ کی فائلیں کسی مخصوص فولڈر میں ہیں تو 'cd folder_name' استعمال کریں
          cordova platform add android --no-telemetry
          cordova build android --debug --no-telemetry

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App-Debug-APK
          path: platforms/android/app/build/outputs/apk/debug/*.apk
