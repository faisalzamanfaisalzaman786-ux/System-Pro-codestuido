name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - apk-build-input

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # یہ وہی برانچ استعمال کرے گا جہاں آپ کی ایپ فائلیں پش کر رہی ہے
          ref: apk-build-input

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Prepare Cordova Project
        run: |
          # اگر پروجیکٹ فولڈر کے اندر ہے تو وہاں جائیں، ورنہ روٹ پر چلائیں
          # ہم فرض کر رہے ہیں کہ فائلیں روٹ (root) پر پش ہو رہی ہیں
          cordova platform add android --no-telemetry
          
      - name: Build Android APK
        run: |
          # اینڈرائیڈ بلڈ شروع کریں
          cordova build android --debug --no-telemetry

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-Forge-Build
          path: platforms/android/app/build/outputs/apk/debug/*.apk
          retention-days: 5
