name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ apk-build-input ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Cordova Project
        run: |
          # اب فائلیں سیدھی روٹ پر ہیں، اس لیے یہ کمانڈ پرفیکٹ چلے گی
          cordova platform add android
          cordova build android --no-telemetry --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: platforms/android/app/build/outputs/apk/debug/*.apk
