name: Build APK
on:
  workflow_dispatch:
  push:
    branches: [ apk-build-input ] # UI اسی برانچ پر فائلیں بھیج رہا ہے

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: apk-build-input # اس برانچ کا کوڈ اٹھائیں جو UI نے بنائی ہے

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Cordova Project
        run: |
          # چونکہ UI فائلیں روٹ (Root) پر بھیج رہا ہے، اس لیے ہم براہ راست بلڈ کریں گے
          cordova platform add android
          cordova build android --no-telemetry --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: platforms/android/app/build/outputs/apk/debug/*.apk
