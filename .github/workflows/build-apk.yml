name: System Pro APK Forge Engine

on:
  # یہ بیک اینڈ سے آنے والی 'repository_dispatch' ریکویسٹ کو سنتا ہے
  repository_dispatch:
    types: [build-apk]
  # یہ مخصوص برانچ پر پش ہونے پر بھی چل سکتا ہے
  push:
    branches:
      - 'apk-build-input'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install Cordova & Dependencies
        run: |
          npm install -g cordova
          npm install

      - name: 🏗️ Add Android Platform
        run: cordova platform add android@12.0.0

      - name: 🚀 Build Android APK (Release)
        run: cordova build android --release --verbose

      - name: 📋 Organize Artifacts
        run: |
          mkdir -p build-output
          cp platforms/android/app/build/outputs/apk/release/*.apk build-output/system-pro-app.apk

      - name: 📤 Upload APK to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name || 'System-Pro-App' }}
          path: build-output/system-pro-app.apk
          retention-days: 7
