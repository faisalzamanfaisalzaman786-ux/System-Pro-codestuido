name: Build APK (APK Forge v6)

on:
  push:
    branches:
      - apk-build-input  # آپ کا UI اسی برانچ پر پش کرتا ہے

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          # موجودہ فائلوں کو محفوظ جگہ منتقل کریں (کیونکہ cordova create خالی فولڈر مانگتا ہے)
          mkdir temp_files
          mv * temp_files/ 2>/dev/null || true
          
          # نیا پروجیکٹ بنائیں
          cordova create build_dir com.systempro.forge "SystemProApp"
          
          # فائلیں واپس اپنی جگہ سیٹ کریں
          cp -r temp_files/www/* build_dir/www/
          cp temp_files/config.xml build_dir/config.xml
          
          cd build_dir
          cordova platform add android
          
          # اگر کوئی پلگ انز کی ضرورت ہو تو یہاں شامل کریں
          # cordova plugin add cordova-plugin-whitelist

      - name: Build Android APK
        run: |
          cd build_dir
          cordova build android --release -- --packageType=apk

      - name: Sign APK (Optional - Debug APK by default)
        run: |
          # یہاں آپ اپنا کی اسٹور لاجک شامل کر سکتے ہیں
          # فی الحال ہم صرف ان سائنڈ ڈیبگ اے پی کے حاصل کریں گے
          echo "APK build finished successfully"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-Forge-Build
          path: build_dir/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5

      - name: Notify Success
        run: echo "Build version v6 is ready for download from the Artifacts section."
