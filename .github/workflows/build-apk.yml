name: Build APK
on:
  workflow_dispatch: # یہ UI سے چلانے کے لیے ضروری ہے
  push:
    branches: [ main, apk-build-input ] # دونوں برانچز کو سپورٹ کرے گا

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        # ہم نے یہاں سے 'ref' والی لائن ہٹا دی ہے تاکہ یہ خود بخود صحیح برانچ ڈھونڈ لے

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Cordova Project
        run: |
          # اگر config.xml موجود ہے تو ہی بلڈ چلے گا
          if [ -f "config.xml" ]; then
            cordova platform add android
            cordova build android --no-telemetry --debug
          else
            echo "Error: config.xml not found! Your UI might not have pushed the files correctly."
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: platforms/android/app/build/outputs/apk/debug/*.apk
