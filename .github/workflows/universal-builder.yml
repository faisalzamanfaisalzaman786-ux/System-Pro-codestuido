name: System Pro Remote Builder

on:
  repository_dispatch:
    types: [build-app]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Smart Project Setup & Style Cleaning
        run: |
          APP_NAME="${{ github.event.client_payload.app_name || 'SystemProApp' }}"
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.systempro.app' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # جاوا فائل لکھنا اور پیکیج درست کرنا
          echo '${{ github.event.client_payload.java }}' > app/src/main/java/$PKG_PATH/MainActivity.java
          sed -i "1s|^package .*|package $PKG_NAME;|" app/src/main/java/$PKG_PATH/MainActivity.java

          # XML لے آؤٹ لکھنا اور غائب اسٹائلز (CalcButton وغیرہ) کو ہٹانا
          echo '${{ github.event.client_payload.xml }}' > temp_layout.xml
          # یہ کمانڈ کسی بھی ایسے اسٹائل کو ہٹا دے گی جو بلڈ روک رہا ہو
          sed -i 's/style="@style\/[^"]*"//g' temp_layout.xml
          mv temp_layout.xml app/src/main/res/layout/activity_main.xml

          # مینی فیسٹ کی مکمل صفائی
          echo '${{ github.event.client_payload.manifest }}' > temp_manifest.xml
          sed -i 's/package="[^"]*"//g' temp_manifest.xml
          sed -i 's/android:icon="[^"]*"//g' temp_manifest.xml
          sed -i 's/android:roundIcon="[^"]*"//g' temp_manifest.xml
          mv temp_manifest.xml app/src/main/AndroidManifest.xml
          
          # ڈیفالٹ ریسورسز
          echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.App" parent="Theme.MaterialComponents.DayNight.NoActionBar" /></resources>' > app/src/main/res/values/styles.xml
          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="colorPrimary">#00FFCC</color><color name="colorPrimaryDark">#000000</color></resources>' > app/src/main/res/values/colors.xml
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><resources><string name=\"app_name\">$APP_NAME</string></resources>" > app/src/main/res/values/strings.xml

      - name: 4. Final Build Configuration
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.systempro.app' }}"
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

          cat <<EOF > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "SystemPro"
          include ':app'
          EOF
          
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          EOF
          
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "$PKG_NAME"
              compileSdk 34
              defaultConfig {
                  applicationId "$PKG_NAME"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              lintOptions { abortOnError false }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: 5. Setup Gradle 8.1.1
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.1.1
          cache-disabled: true

      - name: 6. Execute Build
        run: |
          gradle assembleDebug --no-daemon

      - name: 7. Deliver APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name || 'SystemPro_Build' }}
          path: app/build/outputs/apk/debug/*.apk
