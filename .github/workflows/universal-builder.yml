name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Core Project Synthesis
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          ANDROID_MAIN="android/app/src/main"
          
          # صفائی اور فولڈر اسٹرکچر
          rm -rf $ANDROID_MAIN/java/*
          mkdir -p $ANDROID_MAIN/java/$PKG_PATH
          mkdir -p $ANDROID_MAIN/res/drawable
          mkdir -p $ANDROID_MAIN/res/layout
          
          # فائلیں لکھنا
          echo '${{ github.event.client_payload.java }}' > $ANDROID_MAIN/java/$PKG_PATH/MainActivity.java
          echo '${{ github.event.client_payload.xml }}' > $ANDROID_MAIN/res/layout/activity_main.xml
          echo '${{ github.event.client_payload.manifest }}' > $ANDROID_MAIN/AndroidManifest.xml
          
          # پیکیج نیم کی خودکار درستی
          sed -i "s|^package .*|package $PKG_NAME;|" $ANDROID_MAIN/java/$PKG_PATH/MainActivity.java
          sed -i "s|namespace '.*'|namespace '$PKG_NAME'|" android/app/build.gradle
          sed -i "s|applicationId \".*\"|applicationId \"$PKG_NAME\"|" android/app/build.gradle

          # آئیکن ہینڈلنگ
          if [ ! -z "${{ github.event.client_payload.icon_data }}" ]; then
            echo "${{ github.event.client_payload.icon_data }}" | base64 -d > $ANDROID_MAIN/res/drawable/ic_launcher.png
          fi

      - name: 4. Build with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.5 # یہاں ہم ایکشن کو ورژن سنبھالنے دیں گے
          build-root-directory: android
          arguments: assembleDebug --stacktrace

      - name: 5. Artifact Delivery
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-APK
          path: android/app/build/outputs/apk/debug/*.apk
