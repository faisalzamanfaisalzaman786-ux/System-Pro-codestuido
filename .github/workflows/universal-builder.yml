name: System Pro Master Engine (Universal AI)

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Environment Setup
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. JDK 17 Configuration
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Intelligent Project Synthesis (Self-Repair)
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          MAIN="android/app/src/main"
          
          # ڈائریکٹریز کی تیاری
          mkdir -p $MAIN/java/$PKG_PATH $MAIN/res/layout $MAIN/res/values $MAIN/res/drawable master_library/history
          
          # پے لوڈ انجیکشن (اگر ڈیٹا موجود ہو)
          echo "${{ github.event.client_payload.java }}" > $MAIN/java/$PKG_PATH/MainActivity.java
          echo "${{ github.event.client_payload.xml }}" > $MAIN/res/layout/activity_main.xml
          echo "${{ github.event.client_payload.manifest }}" > $MAIN/AndroidManifest.xml
          
          # 1. پیکیج نیم کی تمام فائلوں میں جبری درستی
          find android/ -type f \( -name "*.java" -o -name "*.xml" -o -name "build.gradle" \) -exec sed -i "s/com.faisal.systempro/$PKG_NAME/g" {} +
          sed -i "s|^package .*|package $PKG_NAME;|" $MAIN/java/$PKG_PATH/MainActivity.java
          sed -i "s|namespace '.*'|namespace '$PKG_NAME'|" android/app/build.gradle
          sed -i "s|applicationId \".*\"|applicationId \"$PKG_NAME\"|" android/app/build.gradle

          # 2. مینی فیسٹ سے تھیم نکال کر خودکار سنک کرنا (محفوظ طریقہ)
          THEME_RAW=$(grep -oP 'android:theme="@style/\K[^"]+' $MAIN/AndroidManifest.xml || echo "Theme.SystemProMaster")
          THEME_NAME=$(echo $THEME_RAW | cut -d'/' -fNF)

          # 3. یونیورسل ریسورس جنریٹر
          cat <<EOF > $MAIN/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="primary_brand">${{ github.event.client_payload.primary_color || '#00E5FF' }}</color>
              <color name="secondary_brand">${{ github.event.client_payload.secondary_color || '#39FF14' }}</color>
              <color name="app_background">#0F111A</color>
              <color name="text_high_emphasis">#FFFFFF</color>
              <color name="text_medium_emphasis">#B0BEC5</color>
              <color name="border_subtle">#33FFFFFF</color>
              <color name="text_on_primary">#000000</color>
          </resources>
          EOF

          cat <<EOF > $MAIN/res/values/themes.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="$THEME_NAME" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/primary_brand</item>
                  <item name="colorSecondary">@color/secondary_brand</item>
                  <item name="android:windowBackground">@color/app_background</item>
              </style>
              <style name="ActionButton" parent="Widget.MaterialComponents.Button.TextButton">
                  <item name="android:background">@drawable/custom_button_wrapper</item>
              </style>
              <style name="BuildButton" parent="Widget.MaterialComponents.Button">
                  <item name="android:backgroundTint">@color/secondary_brand</item>
              </style>
          </resources>
          EOF

          # بٹن ریپیئر
          if [ ! -f "$MAIN/res/drawable/custom_button_wrapper.xml" ]; then
             printf '<?xml version="1.0" encoding="utf-8"?>\n<ripple xmlns:android="http://schemas.android.com/apk/res/android" android:color="#40FFFFFF"><item><shape><solid android:color="@android:color/white"/><corners android:radius="12dp"/></shape></item></ripple>' > $MAIN/res/drawable/custom_button_wrapper.xml
          fi

      - name: 4. Build Engine (Gradle Execute)
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.5
          build-root-directory: android
          arguments: clean assembleDebug --stacktrace

      - name: 5. Build Knowledge Bank (Save Success Data)
        if: success()
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          cp android/app/src/main/res/layout/activity_main.xml master_library/history/layout_$TIMESTAMP.xml || true
          cp android/app/src/main/res/values/colors.xml master_library/history/colors_$TIMESTAMP.xml || true
          git config --global user.name "System-Pro-Bot"
          git config --global user.email "bot@systempro.com"
          git add master_library/
          git commit -m "Vocabulary Update: Saved successful build resources $TIMESTAMP" || echo "No changes"
          git push || echo "Push failed"

      - name: 6. APK Delivery
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Master-APK
          path: android/app/build/outputs/apk/debug/*.apk
