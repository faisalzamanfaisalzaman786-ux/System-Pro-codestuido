name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Core Project Synthesis
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.systempro.app' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          # ضروری فولڈرز کی تیاری (بغیر پرانا ڈیٹا مٹائے)
          mkdir -p android/app/src/main/java/$PKG_PATH
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values
          
          # یوزر کا جاوا اور XML کوڈ انجیکٹ کرنا
          echo '${{ github.event.client_payload.java }}' > android/app/src/main/java/$PKG_PATH/MainActivity.java
          echo '${{ github.event.client_payload.xml }}' > android/app/src/main/res/layout/activity_main.xml
          
          # پیکیج نیم کی ہر جگہ درستگی
          sed -i "s|^package .*|package $PKG_NAME;|" android/app/src/main/java/$PKG_PATH/MainActivity.java
          
          # ماسٹر فائلوں کو ان کی جگہوں پر منتقل کرنا
          # (یہ فائلیں ہم اگلے مرحلے میں آپ کی ریپوزٹری میں ڈالیں گے)
          cp master_app_build.gradle android/app/build.gradle
          cp master_manifest.xml android/app/src/main/AndroidManifest.xml
          
          # فائلز کے اندر پیکیج نیم اپ ڈیٹ کرنا
          sed -i "s|namespace '.*'|namespace '$PKG_NAME'|" android/app/build.gradle
          sed -i "s|package=\".*\"|package=\"$PKG_NAME\"|" android/app/src/main/AndroidManifest.xml

      - name: 4. Build Execution
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 5. Artifact Delivery
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Success-APK
          path: android/app/build/outputs/apk/debug/*.apk

      - name: 6. Build Insights
        if: always()
        run: |
          echo "### 🚀 System Pro Master Build Status" >> $GITHUB_STEP_SUMMARY
          echo "Build finished at $(date)" >> $GITHUB_STEP_SUMMARY
