name: System Pro Remote Builder

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Dynamic Package & Folder Setup
        run: |
          # پیکیج نیم موبائل UI سے آئے گا، ورنہ ڈیفالٹ استعمال ہوگا
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.system.pro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          # پرانے پیکیج فولڈرز کو صاف کر کے نیا ڈائنامک پاتھ بنانا
          rm -rf app/src/main/java/*
          mkdir -p app/src/main/java/$PKG_PATH
          
          # جاوا فائل کو صحیح ڈائنامک فولڈر میں منتقل کرنا اور پیکیج نیم اپڈیٹ کرنا
          # یہ فرض کر رہا ہے کہ آپ کی MainActivity ریپوزٹری میں موجود ہے
          cp -r .github/templates/MainActivity.java app/src/main/java/$PKG_PATH/ || cp app/src/main/java/com/system/pro/MainActivity.java app/src/main/java/$PKG_PATH/ || echo "MainActivity already in place"
          
          # فائل کے اندر پیکیج کی پہلی لائن کو ڈائنامک بنانا
          find app/src/main/java -name "*.java" -exec sed -i "1s|^package .*|package $PKG_NAME;|" {} +

      - name: 4. Final Build Configuration
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.system.pro' }}"
          
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          cat <<EOF > settings.gradle
          rootProject.name = "SystemPro"
          include ':app'
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "$PKG_NAME"
              compileSdk 34
              defaultConfig {
                  applicationId "$PKG_NAME"
                  minSdk 24
                  targetSdk 34
                  versionCode ${{ github.run_number }}
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: 5. Execute Build
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 6. Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name || 'App' }}-Build
          path: app/build/outputs/apk/debug/*.apk
