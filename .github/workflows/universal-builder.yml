name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Clone & Inject Logic
        shell: bash
        run: |
          # ایک سادہ اور فنکشنل اینڈرائیڈ پروجیکٹ کلون کریں
          git clone https://github.com/JStumpp/android-simplest-java-app.git android
          
          cd android
          
          # پیکیج نیم سیٹ کرنا
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          # پرانی جاوا فائلیں ہٹا کر نئی ڈائرکٹری بنانا
          rm -rf app/src/main/java/*
          mkdir -p app/src/main/java/$PKG_PATH
          
          # پے لوڈ سے آئی ہوئی فائلیں انجیکٹ (Inject) کرنا
          cat <<'EOF' > app/src/main/java/$PKG_PATH/MainActivity.java
          ${{ github.event.client_payload.java }}
          EOF

          cat <<'EOF' > app/src/main/res/layout/activity_main.xml
          ${{ github.event.client_payload.xml }}
          EOF

          cat <<'EOF' > app/src/main/AndroidManifest.xml
          ${{ github.event.client_payload.manifest }}
          EOF

          # پیکیج نیم کو مینی فیسٹ میں سیٹ کرنا (اگر ضرورت ہو)
          sed -i "s/com.example.simplestandroidapp/$PKG_NAME/g" app/src/main/AndroidManifest.xml

      - name: 4. Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 5. Success APK Delivery
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-APK
          path: android/app/build/outputs/apk/debug/*.apk
