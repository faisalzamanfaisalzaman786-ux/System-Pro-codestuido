name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Initialize Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.5 --distribution-type bin
          chmod +x gradlew

      - name: 4. Core Project Synthesis (Package & Icon)
        run: |
          # پیکیج نیم حاصل کرنا (اگر نہ ملے تو ڈیفالٹ استعمال کرنا)
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.systempro.app' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          ANDROID_MAIN="android/app/src/main"
          
          # فولڈرز بنانا
          mkdir -p $ANDROID_MAIN/java/$PKG_PATH
          mkdir -p $ANDROID_MAIN/res/drawable
          
          # جاوا اور ایکس ایم ایل فائلیں تیار کرنا
          echo '${{ github.event.client_payload.java }}' > $ANDROID_MAIN/java/$PKG_PATH/MainActivity.java
          echo '${{ github.event.client_payload.xml }}' > $ANDROID_MAIN/res/layout/activity_main.xml
          
          # آپ کا اپنا آئیکن اپلوڈ کرنے کی لاجک
          if [ ! -z "${{ github.event.client_payload.icon_data }}" ]; then
            echo "Custom Icon Detected. Processing..."
            echo "${{ github.event.client_payload.icon_data }}" | base64 -d > $ANDROID_MAIN/res/drawable/ic_launcher.png
          else
            # اگر آئیکن نہ بھیجا جائے تو خالی فائل بنانا تاکہ بلڈ فیل نہ ہو
            touch $ANDROID_MAIN/res/drawable/ic_launcher.png
          fi
          
          # پیکیج نیم کو تمام فائلوں میں خودکار طریقے سے ریپلیس کرنا
          sed -i "s|^package .*|package $PKG_NAME;|" $ANDROID_MAIN/java/$PKG_PATH/MainActivity.java
          sed -i "s|namespace '.*'|namespace '$PKG_NAME'|" android/app/build.gradle
          sed -i "s|applicationId \".*\"|applicationId \"$PKG_NAME\"|" android/app/build.gradle

      - name: 5. Build Execution
        run: |
          cd android
          ./gradlew clean assembleDebug --no-daemon --stacktrace

      - name: 6. Artifact Delivery
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: APK-Build
          path: android/app/build/outputs/apk/debug/*.apk
