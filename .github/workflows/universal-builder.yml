name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Smart Synthesis & Java Patching
        shell: bash
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          rm -rf android
          mkdir -p android/app/src/main/java/$PKG_PATH
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/drawable

          # جاوا کوڈ انجکشن
          cat <<'EOF' > android/app/src/main/java/$PKG_PATH/MainActivity.java
          ${{ github.event.client_payload.java }}
          EOF

          # IOException پیچ
          sed -i 's/mainHandler.post(() -> Toast.makeText(MainActivity.this, "Download failed: " + conn.getResponseCode(), Toast.LENGTH_SHORT).show());/try { int code = conn.getResponseCode(); mainHandler.post(() -> Toast.makeText(MainActivity.this, "Download failed: " + code, Toast.LENGTH_SHORT).show()); } catch (Exception e) { e.printStackTrace(); }/g' android/app/src/main/java/$PKG_PATH/MainActivity.java

          # لے آؤٹ انجکشن
          cat <<'EOF' > android/app/src/main/res/layout/activity_main.xml
          ${{ github.event.client_payload.xml }}
          EOF

          # 🛑 اہم فکس: موبائل سے آنے والے مینی فیسٹ کو گریڈل 8.5 کے قابل بنانا
          cat <<'EOF' > android/app/src/main/AndroidManifest.xml
          ${{ github.event.client_payload.manifest }}
          EOF
          
          # یہ لائن مینی فیسٹ سے package=".." والے حصے کو نکال دے گی تاکہ گریڈل ایرر نہ دے
          sed -i 's/package="[^"]*"//g' android/app/src/main/AndroidManifest.xml

          # باقی ریسورسز (آپ کے ماڈل کے مطابق)
          cat <<EOF > android/app/src/main/res/layout/dialog_settings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="wrap_content"
              android:orientation="vertical" android:padding="20dp" android:background="#1E2130">
              <EditText android:id="@+id/etAppName" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="App Name" android:textColor="#FFFFFF" android:textColorHint="#88FFFFFF"/>
              <EditText android:id="@+id/etPkgName" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="Package Name" android:textColor="#FFFFFF" android:textColorHint="#88FFFFFF"/>
              <EditText android:id="@+id/etGhToken" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="GitHub Token" android:textColor="#FFFFFF" android:textColorHint="#88FFFFFF"/>
              <EditText android:id="@+id/etGhRepo" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="GitHub Repo" android:textColor="#FFFFFF" android:textColorHint="#88FFFFFF"/>
          </LinearLayout>
          EOF

          cat <<EOF > android/app/src/main/res/drawable/ic_launcher.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#00E5FF" android:pathData="M0,0h108v108h-108z"/></vector>
          EOF

          cat <<EOF > android/app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.SystemProMaster" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/primary_brand</item>
                  <item name="colorPrimaryDark">@color/app_background</item>
                  <item name="colorAccent">@color/primary_brand</item>
              </style>
              <style name="Theme.App" parent="Theme.SystemProMaster" />
              <style name="TabButton" parent="Widget.MaterialComponents.Button.TextButton"><item name="android:textColor">#FFFFFF</item></style>
              <style name="BuildButton" parent="Widget.MaterialComponents.Button"><item name="backgroundTint">#00E5FF</item><item name="android:textColor">#02040c</item></style>
          </resources>
          EOF

          cat <<EOF > android/app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?><resources><color name="primary_brand">#00E5FF</color><color name="app_background">#02040c</color><color name="white">#FFFFFF</color></resources>
          EOF

          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><resources><string name=\"app_name\">${{ github.event.client_payload.app_name || 'SystemPro' }}</string></resources>" > android/app/src/main/res/values/strings.xml

      - name: 4. Final Gradle 8.5 Build Engine
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          cd android
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "rootProject.name = 'SystemPro'" > settings.gradle
          echo "include ':app'" >> settings.gradle
          cat <<EOF > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android { namespace "$PKG_NAME"; compileSdk 34; defaultConfig { applicationId "$PKG_NAME"; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0'; implementation 'androidx.constraintlayout:constraintlayout:2.1.4' }
          EOF

      - name: 5. Execute Compilation
        run: |
          cd android
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 6. Success APK Delivery
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-Success-APK
          path: android/app/build/outputs/apk/debug/*.apk
