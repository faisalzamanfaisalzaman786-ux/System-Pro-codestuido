name: System Pro Remote Builder

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Create Project Folders
        run: |
          PKG_PATH=$(echo "${{ github.event.client_payload.package_name }}" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi

      - name: 4. Inject Project Files
        run: |
          PKG_PATH=$(echo "${{ github.event.client_payload.package_name }}" | tr '.' '/')
          
          # MainActivity injection
          echo "${{ github.event.client_payload.java }}" > app/src/main/java/$PKG_PATH/MainActivity.java
          
          # XML Layout injection
          echo "${{ github.event.client_payload.xml }}" > app/src/main/res/layout/activity_main.xml
          
          # Manifest injection
          echo "${{ github.event.client_payload.manifest }}" > app/src/main/AndroidManifest.xml
          
          # Resources - Ensuring they are never empty to avoid Gradle crash
          STYLE_VAL="${{ github.event.client_payload.styles }}"
          if [ -z "$STYLE_VAL" ]; then STYLE_VAL='<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.App" parent="Theme.MaterialComponents.DayNight.NoActionBar" /></resources>'; fi
          echo "$STYLE_VAL" > app/src/main/res/values/styles.xml
          
          COLOR_VAL="${{ github.event.client_payload.colors }}"
          if [ -z "$COLOR_VAL" ]; then COLOR_VAL='<?xml version="1.0" encoding="utf-8"?><resources><color name="colorPrimary">#00FFCC</color></resources>'; fi
          echo "$COLOR_VAL" > app/src/main/res/values/colors.xml
          
          STRING_VAL="${{ github.event.client_payload.strings }}"
          if [ -z "$STRING_VAL" ]; then STRING_VAL='<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">SystemProApp</string></resources>'; fi
          echo "$STRING_VAL" > app/src/main/res/values/strings.xml

      - name: 5. Construct Build Logic
        run: |
          cat <<EOF > settings.gradle
          rootProject.name = "SystemProBuilder"
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "${{ github.event.client_payload.package_name }}"
              compileSdk 34
              defaultConfig {
                  applicationId "${{ github.event.client_payload.package_name }}"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { release { minifyEnabled false } }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: 6. Execution & Error Capture
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug --info # --info ہمیں کوڈ کی اصل غلطی دکھائے گا

      - name: 7. Deliver Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}
          path: app/build/outputs/apk/debug/*.apk
