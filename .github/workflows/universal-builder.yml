name: System Pro Remote Builder (Final Fix)

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4
        with:
          clean: true

      - name: 2. Deep Clean & Directory Prep
        run: |
          rm -rf android/
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/mipmap-mdpi

      - name: 3. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 4. Build Professional Project Structure
        run: |
          APP_NAME="${{ github.event.client_payload.app_name || 'SystemProApp' }}"
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.systempro.app' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          ANDROID_ROOT="android"
          
          mkdir -p $ANDROID_ROOT/app/src/main/java/$PKG_PATH
          echo '${{ github.event.client_payload.java }}' > $ANDROID_ROOT/app/src/main/java/$PKG_PATH/MainActivity.java
          sed -i "1s|^package .*|package $PKG_NAME;|" $ANDROID_ROOT/app/src/main/java/$PKG_PATH/MainActivity.java
          
          # 🛠️ Java IOException Patch
          sed -i 's/conn.getResponseCode()/try_get_code(conn)/g' $ANDROID_ROOT/app/src/main/java/$PKG_PATH/MainActivity.java
          sed -i '$ d' $ANDROID_ROOT/app/src/main/java/$PKG_PATH/MainActivity.java
          echo -e "\n    private int try_get_code(java.net.HttpURLConnection c){try{return c.getResponseCode();}catch(Exception e){return -1;}}\n}" >> $ANDROID_ROOT/app/src/main/java/$PKG_PATH/MainActivity.java

          echo '${{ github.event.client_payload.xml }}' > $ANDROID_ROOT/app/src/main/res/layout/activity_main.xml
          
          # Dialog Settings
          cat <<EOF > $ANDROID_ROOT/app/src/main/res/layout/dialog_settings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="16dp">
              <EditText android:id="@+id/etAppName" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="App Name" />
              <EditText android:id="@+id/etPkgName" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="Package Name" />
              <EditText android:id="@+id/etGhToken" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="GitHub Token" />
              <EditText android:id="@+id/etGhRepo" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="GitHub Repo" />
          </LinearLayout>
          EOF

          # Icon Handling
          if [ ! -z "${{ github.event.client_payload.icon_data }}" ]; then
            echo "${{ github.event.client_payload.icon_data }}" | base64 -d > $ANDROID_ROOT/app/src/main/res/mipmap-mdpi/ic_launcher.png
          else
            echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==" | base64 -d > $ANDROID_ROOT/app/src/main/res/mipmap-mdpi/ic_launcher.png
          fi

          # Android Manifest
          cat <<EOF > $ANDROID_ROOT/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application android:allowBackup="true" android:label="@string/app_name" android:icon="@mipmap/ic_launcher" android:theme="@style/Theme.App">
                  <activity android:name=".MainActivity" android:exported="true"><intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter></activity>
              </application>
          </manifest>
          EOF

      - name: 5. Professional Config Injection
        run: |
          ANDROID_ROOT="android"
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.systempro.app' }}"
          echo "android.useAndroidX=true" > $ANDROID_ROOT/gradle.properties
          echo "android.enableJetifier=true" >> $ANDROID_ROOT/gradle.properties
          echo "rootProject.name = 'SystemPro'" > $ANDROID_ROOT/settings.gradle
          echo "include ':app'" >> $ANDROID_ROOT/settings.gradle

          cat <<EOF > $ANDROID_ROOT/build.gradle
          buildscript { repositories { google(); mavenCentral() }
          dependencies { classpath 'com.android.tools.build:gradle:8.1.1' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > $ANDROID_ROOT/app/build.gradle
          plugins { id 'com.android.application' }
          android { namespace "$PKG_NAME"
              compileSdk 34
              defaultConfig { applicationId "$PKG_NAME"
                  minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0' }
          EOF

      - name: 6. Force Setup Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.1.1
          chmod +x gradlew

      - name: 7. Execute Professional Build
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: 8. Upload Result
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Success-APK
          path: android/app/build/outputs/apk/debug/*.apk

      - name: 9. Summary & Final Clean
        if: always()
        run: |
          echo "### 🚀 System Pro: Build Finished" >> $GITHUB_STEP_SUMMARY
          rm -rf android/
