name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Logic & Path Alignment
        shell: python
        run: |
          import os

          # پیکیج نیم اور پاتھ کی سیٹنگ
          pkg_name = "${{ github.event.client_payload.package_name }}" or "com.faisal.systempro"
          pkg_path = pkg_name.replace('.', '/')
          
          # آپ کے اسکرین شاٹ کے مطابق پاتھ سیٹ کرنا
          # ہم 'app' فولڈر کو مین بیس بنائیں گے
          base_res = "app/src/main/res"
          base_java = f"app/src/main/java/{pkg_path}"
          manifest_path = "app/src/main/AndroidManifest.xml"

          # فولڈرز بنانا (اگر موجود نہیں ہیں)
          for d in [base_java, f"{base_res}/layout", f"{base_res}/values", f"{base_res}/drawable"]:
              os.makedirs(d, exist_ok=True)

          # فائلوں کو صحیح پاتھ پر لکھنا
          with open(f"{base_java}/MainActivity.java", "w") as f: 
              f.write("""${{ github.event.client_payload.java }}""")
          
          with open(f"{base_res}/layout/activity_main.xml", "w") as f: 
              f.write("""${{ github.event.client_payload.xml }}""")
          
          with open(manifest_path, "w") as f: 
              f.write("""${{ github.event.client_payload.manifest }}""")

          # ضروری ریسورس فائلیں (تاکہ 'Resource Not Found' ایرر نہ آئے)
          with open(f"{base_res}/values/colors.xml", "w") as f:
              f.write("<?xml version='1.0' encoding='utf-8'?>\n<resources>\n<color name='primary_brand'>#00E5FF</color>\n<color name='secondary_brand'>#39FF14</color>\n<color name='text_on_primary'>#FFFFFF</color>\n<color name='text_medium_emphasis'>#80FFFFFF</color>\n<color name='app_background'>#0F111A</color>\n<color name='black'>#000000</color>\n<color name='white'>#FFFFFF</color>\n</resources>")

      - name: 4. Build Structure Verification
        run: |
          # اگر settings.gradle روٹ پر نہیں ہے تو اسے بنانا
          if [ ! -f "settings.gradle" ]; then
            echo "include ':app'" > settings.gradle
          fi
          
          # اگر gradlew موجود نہیں ہے تو اسے ڈاؤن لوڈ کرنا
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.5
          fi

      - name: 5. Execute Build
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: 6. Knowledge Sync
        if: success()
        run: |
          git config --global user.name "System-Pro-Bot"
          git config --global user.email "bot@systempro.com"
          git add . && git commit -m "Path Re-aligned to UI Screenshots" && git push || echo "No changes"

      - name: 7. APK Delivery
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Master-APK
          path: "app/build/outputs/apk/debug/*.apk"
