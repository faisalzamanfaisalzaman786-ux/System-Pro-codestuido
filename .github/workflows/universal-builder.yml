name: System Pro Remote Builder

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Setup Project
        run: |
          PKG_PATH=$(echo "${{ github.event.client_payload.package_name }}" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          # Inject Data
          echo "${{ github.event.client_payload.java }}" > app/src/main/java/$PKG_PATH/MainActivity.java
          echo "${{ github.event.client_payload.xml }}" > app/src/main/res/layout/activity_main.xml
          echo "${{ github.event.client_payload.manifest }}" > app/src/main/AndroidManifest.xml
          
          # Default Resources
          echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.App" parent="Theme.MaterialComponents.DayNight.NoActionBar" /></resources>' > app/src/main/res/values/styles.xml
          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="purple_200">#FFBB86FC</color></resources>' > app/src/main/res/values/colors.xml
          echo '<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">SystemPro</string></resources>' > app/src/main/res/values/strings.xml

      - name: 4. Build Scripts
        run: |
          echo "include ':app'" > settings.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "${{ github.event.client_payload.package_name }}"
              compileSdk 34
              defaultConfig { applicationId "${{ github.event.client_payload.package_name }}"; minSdk 24; targetSdk 34 }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: 5. Build and Show Errors
        run: |
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          # صرف ایررز دکھانے کے لیے --quiet استعمال کیا ہے
          ./gradlew assembleDebug --quiet || ./gradlew assembleDebug

      - name: 6. Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}
          path: app/build/outputs/apk/debug/*.apk
