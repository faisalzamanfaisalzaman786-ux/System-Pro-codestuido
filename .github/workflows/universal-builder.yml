name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Core Injection (The Working Method)
        shell: python
        run: |
          import os
          
          pkg_name = "${{ github.event.client_payload.package_name }}" or "com.faisal.systempro"
          pkg_path = pkg_name.replace('.', '/')
          
          # ڈائریکٹ پاتھ سیٹ کرنا
          base_path = "android/app/src/main"
          java_dir = f"{base_path}/java/{pkg_path}"
          res_dir = f"{base_path}/res"

          # ضروری فولڈرز بنانا
          os.makedirs(java_dir, exist_ok=True)
          os.makedirs(f"{res_dir}/layout", exist_ok=True)
          os.makedirs(f"{res_dir}/values", exist_ok=True)

          # فائلیں لکھنا
          with open(f"{java_dir}/MainActivity.java", "w") as f: 
              f.write("""${{ github.event.client_payload.java }}""")
          
          with open(f"{res_dir}/layout/activity_main.xml", "w") as f: 
              f.write("""${{ github.event.client_payload.xml }}""")
          
          with open(f"{base_path}/AndroidManifest.xml", "w") as f: 
              f.write("""${{ github.event.client_payload.manifest }}""")

          # کلرز فائل (تاکہ ریسورس ایرر نہ آئے)
          colors_xml = """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="primary_brand">#00E5FF</color>
              <color name="app_background">#0F111A</color>
              <color name="black">#000000</color>
              <color name="white">#FFFFFF</color>
          </resources>"""
          with open(f"{res_dir}/values/colors.xml", "w") as f: 
              f.write(colors_xml)

      - name: 4. Build Execution (Final Stage)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 5. Knowledge Sync
        if: success()
        run: |
          git config --global user.name "System-Pro-Bot"
          git config --global user.email "bot@systempro.com"
          git add . && git commit -m "Stable Build Success" && git push || echo "No changes"

      - name: 6. APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Master-APK
          path: android/app/build/outputs/apk/debug/*.apk
