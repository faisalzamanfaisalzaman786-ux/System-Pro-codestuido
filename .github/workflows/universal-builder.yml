name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Java Setup (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Core Synthesis (Success-Path with New UI)
        shell: bash
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          APP_NAME="${{ github.event.client_payload.app_name || 'System Pro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          rm -rf android
          mkdir -p android/app/src/main/java/$PKG_PATH
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/drawable

          # مینی فیسٹ (کامیاب ورژن: بغیر پیکج ایٹریبیوٹ کے)
          cat <<EOF > android/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@drawable/ic_launcher"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.SystemProMaster">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
              <uses-permission android:name="android.permission.INTERNET" />
          </manifest>
          EOF

          # جاوا کوڈ (آپ کا پے لوڈ + آٹو پیکیج سیٹنگ)
          cat <<'EOF' > android/app/src/main/java/$PKG_PATH/MainActivity.java
          ${{ github.event.client_payload.java }}
          EOF
          sed -i "1s|^package .*;|package $PKG_NAME;|" android/app/src/main/java/$PKG_PATH/MainActivity.java

          # لے آؤٹ (آپ کا ایکس ایم ایل پے لوڈ)
          cat <<'EOF' > android/app/src/main/res/layout/activity_main.xml
          ${{ github.event.client_payload.xml }}
          EOF

          # آپ کی نئی "وکبلری" (Themes, Colors, Buttons)
          cat <<EOF > android/app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.SystemProMaster" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">@color/primary_brand</item>
                  <item name="android:statusBarColor">@color/app_background</item>
              </style>
              <style name="TabButton" parent="Widget.MaterialComponents.Button.TextButton">
                  <item name="android:textColor">#FFFFFF</item>
                  <item name="android:textAllCaps">false</item>
              </style>
              <style name="BuildButton" parent="Widget.MaterialComponents.Button">
                  <item name="backgroundTint">@color/primary_brand</item>
                  <item name="android:insetTop">0dp</item>
                  <item name="android:insetBottom">0dp</item>
              </style>
          </resources>
          EOF

          cat <<EOF > android/app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="primary_brand">#00E5FF</color>
              <color name="app_background">#02040c</color>
              <color name="glass_white">#22FFFFFF</color>
          </resources>
          EOF

          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><resources><string name=\"app_name\">$APP_NAME</string></resources>" > android/app/src/main/res/values/strings.xml
          cat <<EOF > android/app/src/main/res/drawable/ic_launcher.xml
          <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108"><path android:fillColor="#00E5FF" android:pathData="M0,0h108v108h-108z"/></vector>
          EOF

      - name: 4. Build System Configuration (8.5 Only)
        run: |
          cd android
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "rootProject.name = 'SystemPro'" > settings.gradle
          echo "include ':app'" >> settings.gradle

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace "$PKG_NAME"
              compileSdk 34
              defaultConfig {
                  applicationId "$PKG_NAME"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: 5. Execute Compilation
        run: |
          cd android
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 6. Success Delivery
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}-Final-APK
          path: android/app/build/outputs/apk/debug/*.apk
