name: System Pro Remote Builder

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Dynamic Package & Folder Setup
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.system.pro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          ANDROID_ROOT="android"
          
          # اگر android کا فولڈر نہیں ہے تو بنائیں
          mkdir -p $ANDROID_ROOT/app/src/main/java
          
          # جاوا فائل کا بیک اپ اور ٹرانسفر
          mkdir -p temp_src
          cp $ANDROID_ROOT/app/src/main/java/com/system/pro/MainActivity.java temp_src/MainActivity.java || echo "No file to backup"
          
          rm -rf $ANDROID_ROOT/app/src/main/java/*
          mkdir -p $ANDROID_ROOT/app/src/main/java/$PKG_PATH
          
          if [ -f temp_src/MainActivity.java ]; then
            mv temp_src/MainActivity.java $ANDROID_ROOT/app/src/main/java/$PKG_PATH/MainActivity.java
          fi
          
          find $ANDROID_ROOT/app/src/main/java -name "*.java" -exec sed -i "1s|^package .*|package $PKG_NAME;|" {} +
          rm -rf temp_src

      - name: 4. Generate Missing Gradle Wrapper
        run: |
          cd android
          # اگر گریڈل فائلز غائب ہیں تو یہ کمانڈ انہیں جنریٹ کر دے گی
          gradle wrapper --gradle-version 8.1.1

      - name: 5. Final Build Configuration
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.system.pro' }}"
          ANDROID_ROOT="android"
          
          echo "android.useAndroidX=true" > $ANDROID_ROOT/gradle.properties
          echo "android.enableJetifier=true" >> $ANDROID_ROOT/gradle.properties
          
          cat <<EOF > $ANDROID_ROOT/settings.gradle
          rootProject.name = "SystemPro"
          include ':app'
          EOF

          cat <<EOF > $ANDROID_ROOT/app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "$PKG_NAME"
              compileSdk 34
              defaultConfig {
                  applicationId "$PKG_NAME"
                  minSdk 24
                  targetSdk 34
                  versionCode ${{ github.run_number }}
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: 6. Execute Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 7. Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name || 'App' }}-Build
          path: android/app/build/outputs/apk/debug/*.apk
