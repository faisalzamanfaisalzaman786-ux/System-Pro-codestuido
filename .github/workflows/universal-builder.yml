name: System Pro Remote Builder

on:
  repository_dispatch:
    types: [build-app]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Create Project Structure
        run: |
          PKG_PATH=$(echo "${{ github.event.client_payload.package_name }}" | tr '.' '/')
          mkdir -p app/src/main/java/$PKG_PATH
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi

      - name: 4. Inject Code from UI
        run: |
          PKG_PATH=$(echo "${{ github.event.client_payload.package_name }}" | tr '.' '/')
          echo "${{ github.event.client_payload.java }}" > app/src/main/java/$PKG_PATH/MainActivity.java
          echo "${{ github.event.client_payload.xml }}" > app/src/main/res/layout/activity_main.xml
          echo "${{ github.event.client_payload.manifest }}" > app/src/main/AndroidManifest.xml
          echo "${{ github.event.client_payload.styles }}" > app/src/main/res/values/styles.xml
          echo "${{ github.event.client_payload.colors }}" > app/src/main/res/values/colors.xml
          echo "${{ github.event.client_payload.strings }}" > app/src/main/res/values/strings.xml

      - name: 5. Generate Essential Build Files
        run: |
          # پہلے سیٹنگز اور بلڈ فائلیں بنانا تاکہ گریڈل ایرر نہ دے
          cat <<EOF > settings.gradle
          rootProject.name = "${{ github.event.client_payload.app_name }}"
          include ':app'
          EOF

          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.5.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "${{ github.event.client_payload.package_name }}"
              compileSdk 34
              defaultConfig {
                  applicationId "${{ github.event.client_payload.package_name }}"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: 6. Setup Gradle Wrapper
        run: gradle wrapper --gradle-version 8.10.2

      - name: 7. Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: 8. Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name }}
          path: app/build/outputs/apk/debug/*.apk
