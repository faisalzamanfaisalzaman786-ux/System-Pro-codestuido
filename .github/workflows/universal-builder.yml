name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Smart Code Injection
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.systempro.app' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          ANDROID_MAIN="android/app/src/main"
          
          # جاوا فائل کا فولڈر بنانا
          mkdir -p $ANDROID_MAIN/java/$PKG_PATH
          
          # یوزر کا کوڈ متعلقہ فائلوں میں ڈالنا
          echo '${{ github.event.client_payload.java }}' > $ANDROID_MAIN/java/$PKG_PATH/MainActivity.java
          echo '${{ github.event.client_payload.xml }}' > $ANDROID_MAIN/res/layout/activity_main.xml
          
          # جاوا فائل میں پیکیج نیم درست کرنا
          if grep -q "package " $ANDROID_MAIN/java/$PKG_PATH/MainActivity.java; then
            sed -i "s|^package .*|package $PKG_NAME;|" $ANDROID_MAIN/java/$PKG_PATH/MainActivity.java
          else
            echo "package $PKG_NAME;" | cat - $ANDROID_MAIN/java/$PKG_PATH/MainActivity.java > temp && mv temp $ANDROID_MAIN/java/$PKG_PATH/MainActivity.java
          fi
          
          # اسٹینڈرڈ فائلوں میں پیکیج نیم اور نیم اسپیس اپ ڈیٹ کرنا
          sed -i "s|namespace '.*'|namespace '$PKG_NAME'|" android/app/build.gradle
          sed -i "s|package=\".*\"|package=\"$PKG_NAME\"|" $ANDROID_MAIN/AndroidManifest.xml

      - name: 4. Professional Build Execution
        run: |
          cd android
          chmod +x gradlew
          ./gradlew wrapper --gradle-version 8.5
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 5. Artifact Delivery
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Success-APK
          path: android/app/build/outputs/apk/debug/*.apk

      - name: 6. Build Insights
        if: always()
        run: |
          echo "### 🚀 System Pro Master Build Status" >> $GITHUB_STEP_SUMMARY
