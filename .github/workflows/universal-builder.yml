name: System Pro Remote Builder

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Dynamic Package & Folder Setup
        run: |
          # پیکیج نیم اور پاتھ کا تعین
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.system.pro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          # اینڈرائیڈ روٹ فولڈر کا تعین (آپ کے اسکرین شاٹ کے مطابق یہ 'android' ہے)
          ANDROID_ROOT="android"
          
          echo "Setting up package: $PKG_NAME at path: $ANDROID_ROOT/app/src/main/java/$PKG_PATH"

          # عارضی طور پر موجودہ جاوا فائل کو محفوظ کرنا
          mkdir -p temp_src
          cp $ANDROID_ROOT/app/src/main/java/com/system/pro/MainActivity.java temp_src/MainActivity.java || echo "Original file not found"

          # پرانے تمام جاوا فولڈرز کی صفائی
          rm -rf $ANDROID_ROOT/app/src/main/java/*

          # نیا ڈائنامک فولڈر بنانا
          mkdir -p $ANDROID_ROOT/app/src/main/java/$PKG_PATH

          # فائل کو نئے پاتھ میں منتقل کرنا
          if [ -f temp_src/MainActivity.java ]; then
            mv temp_src/MainActivity.java $ANDROID_ROOT/app/src/main/java/$PKG_PATH/MainActivity.java
          fi

          # فائل کے اندر پیکیج کی پہلی لائن کو ڈائنامک بنانا
          find $ANDROID_ROOT/app/src/main/java -name "*.java" -exec sed -i "1s|^package .*|package $PKG_NAME;|" {} +
          rm -rf temp_src

      - name: 4. Final Build Configuration
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.system.pro' }}"
          ANDROID_ROOT="android"
          
          # Gradle Properties
          echo "android.useAndroidX=true" > $ANDROID_ROOT/gradle.properties
          echo "android.enableJetifier=true" >> $ANDROID_ROOT/gradle.properties
          
          # Settings Gradle
          cat <<EOF > $ANDROID_ROOT/settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "SystemPro"
          include ':app'
          EOF

          # App Build Gradle (Dynamic Namespace)
          cat <<EOF > $ANDROID_ROOT/app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "$PKG_NAME"
              compileSdk 34
              defaultConfig {
                  applicationId "$PKG_NAME"
                  minSdk 24
                  targetSdk 34
                  versionCode ${{ github.run_number }}
                  versionName "1.0.${{ github.run_number }}"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: 5. Execute Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 6. Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.app_name || 'App' }}-Build
          path: android/app/build/outputs/apk/debug/*.apk
