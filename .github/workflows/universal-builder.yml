name: System Pro Master Engine (Universal AI)

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Environment Setup
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. JDK 17 Configuration
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Intelligent Project Synthesis (Self-Repair)
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          MAIN="android/app/src/main"
          
          # ڈائریکٹریز کی تیاری
          mkdir -p $MAIN/java/$PKG_PATH $MAIN/res/layout $MAIN/res/values $MAIN/res/drawable master_library/history
          
          # پے لوڈ انجیکشن
          echo "${{ github.event.client_payload.java }}" > $MAIN/java/$PKG_PATH/MainActivity.java
          echo "${{ github.event.client_payload.xml }}" > $MAIN/res/layout/activity_main.xml
          echo "${{ github.event.client_payload.manifest }}" > $MAIN/AndroidManifest.xml
          
          # 1. پیکیج نیم کی درستی (بغیر کسی پیچیدہ بریکٹ کے)
          sed -i "s/com.faisal.systempro/$PKG_NAME/g" android/app/build.gradle
          sed -i "s|^package .*|package $PKG_NAME;|" $MAIN/java/$PKG_PATH/MainActivity.java
          sed -i "s|namespace '.*'|namespace '$PKG_NAME'|" android/app/build.gradle
          sed -i "s|applicationId \".*\"|applicationId \"$PKG_NAME\"|" android/app/build.gradle

          # 2. مینی فیسٹ سے تھیم کا نام نکالنا
          THEME_NAME=$(grep -oP 'android:theme="@style/\K[^"]+' $MAIN/AndroidManifest.xml || echo "Theme.SystemProMaster")

          # 3. ریسورس فائلز بنانا (printf کا محفوظ طریقہ)
          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n <color name="primary_brand">%s</color>\n <color name="secondary_brand">%s</color>\n <color name="app_background">#0F111A</color>\n <color name="text_high_emphasis">#FFFFFF</color>\n <color name="text_medium_emphasis">#B0BEC5</color>\n <color name="border_subtle">#33FFFFFF</color>\n <color name="text_on_primary">#000000</color>\n</resources>' "${{ github.event.client_payload.primary_color || '#00E5FF' }}" "${{ github.event.client_payload.secondary_color || '#39FF14' }}" > $MAIN/res/values/colors.xml

          printf '<?xml version="1.0" encoding="utf-8"?>\n<resources>\n <style name="%s" parent="Theme.MaterialComponents.DayNight.NoActionBar">\n <item name="colorPrimary">@color/primary_brand</item>\n <item name="colorSecondary">@color/secondary_brand</item>\n <item name="android:windowBackground">@color/app_background</item>\n </style>\n <style name="ActionButton" parent="Widget.MaterialComponents.Button.TextButton">\n <item name="android:background">@drawable/custom_button_wrapper</item>\n </style>\n <style name="BuildButton" parent="Widget.MaterialComponents.Button">\n <item name="android:backgroundTint">@color/secondary_brand</item>\n </style>\n</resources>' "$THEME_NAME" > $MAIN/res/values/themes.xml

          # بٹن ڈیزائن ریپیئر
          printf '<?xml version="1.0" encoding="utf-8"?>\n<ripple xmlns:android="http://schemas.android.com/apk/res/android" android:color="#40FFFFFF"><item><shape><solid android:color="@android:color/white"/><corners android:radius="12dp"/></shape></item></ripple>' > $MAIN/res/drawable/custom_button_wrapper.xml

      - name: 4. Build Engine (Gradle Execute)
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.5
          build-root-directory: android
          arguments: clean assembleDebug --stacktrace

      - name: 5. Knowledge Bank Update
        if: success()
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          mkdir -p master_library/history
          cp $MAIN/res/layout/activity_main.xml master_library/history/layout_$TIMESTAMP.xml || true
          git config --global user.name "System-Pro-Bot"
          git config --global user.email "bot@systempro.com"
          git add master_library/
          git commit -m "Library Update $TIMESTAMP" || echo "No changes"
          git push || echo "Push failed"

      - name: 6. APK Delivery
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Master-APK
          path: android/app/build/outputs/apk/debug/*.apk
