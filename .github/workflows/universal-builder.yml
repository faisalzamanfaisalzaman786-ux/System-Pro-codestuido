name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Environment Setup
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Java Configuration
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Core Logic (Python Based)
        # یہاں ہم پائتھن استعمال کر رہے ہیں تاکہ بریکٹ کا کوئی مسئلہ نہ آئے
        shell: python
        run: |
          import os

          # پے لوڈ ڈیٹا حاصل کرنا
          pkg_name = "${{ github.event.client_payload.package_name }}" or "com.faisal.systempro"
          java_code = """${{ github.event.client_payload.java }}"""
          xml_code = """${{ github.event.client_payload.xml }}"""
          manifest_code = """${{ github.event.client_payload.manifest }}"""
          
          # پاتھ بنانا (بغیر کسی شیل ایرر کے)
          pkg_path = pkg_name.replace('.', '/')
          main_dir = f"android/app/src/main"
          java_dir = f"{main_dir}/java/{pkg_path}"
          
          # فولڈرز بنانا
          os.makedirs(java_dir, exist_ok=True)
          os.makedirs(f"{main_dir}/res/layout", exist_ok=True)
          os.makedirs(f"{main_dir}/res/values", exist_ok=True)
          os.makedirs("master_library/history", exist_ok=True)
          
          # فائلیں لکھنا
          with open(f"{java_dir}/MainActivity.java", "w") as f: f.write(java_code)
          with open(f"{main_dir}/res/layout/activity_main.xml", "w") as f: f.write(xml_code)
          with open(f"{main_dir}/AndroidManifest.xml", "w") as f: f.write(manifest_code)

          # پیکیج نیم اور نیم اسپیس کی درستی
          gradle_path = "android/app/build.gradle"
          if os.path.exists(gradle_path):
              with open(gradle_path, "r") as f: content = f.read()
              content = content.replace("com.faisal.systempro", pkg_name)
              # گریڈل میں نیم اسپیس اور ایپلیکیشن آئی ڈی کو زبردستی اپ ڈیٹ کرنا
              import re
              content = re.sub(r"namespace\s+['\"].*['\"]", f"namespace '{pkg_name}'", content)
              content = re.sub(r"applicationId\s+['\"].*['\"]", f"applicationId '{pkg_name}'", content)
              with open(gradle_path, "w") as f: f.write(content)

      - name: 4. Build Execution (Gradle)
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.5
          build-root-directory: android
          arguments: assembleDebug

      - name: 5. Knowledge Bank Sync
        if: success()
        run: |
          git config --global user.name "System-Pro-Bot"
          git config --global user.email "bot@systempro.com"
          git add . && git commit -m "Auto-Update" && git push || echo "Done"

      - name: 6. APK Artifact Delivery
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Master-APK
          path: android/app/build/outputs/apk/debug/*.apk
