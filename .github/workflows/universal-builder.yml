name: System Pro Remote Builder

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Professional Project Assembly
        run: |
          APP_NAME="${{ github.event.client_payload.app_name || 'SystemProApp' }}"
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.systempro.app' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          ANDROID_ROOT="android"
          
          # پروفیشنل فولڈر اسٹرکچر بنانا
          mkdir -p $ANDROID_ROOT/app/src/main/java/$PKG_PATH
          mkdir -p $ANDROID_ROOT/app/src/main/res/layout
          mkdir -p $ANDROID_ROOT/app/src/main/res/values
          mkdir -p $ANDROID_ROOT/app/src/main/res/mipmap-xxhdpi

          # جاوا کوڈ کا انجکشن اور پیکیج کی درستگی
          echo '${{ github.event.client_payload.java }}' > $ANDROID_ROOT/app/src/main/java/$PKG_PATH/MainActivity.java
          sed -i "1s|^package .*|package $PKG_NAME;|" $ANDROID_ROOT/app/src/main/java/$PKG_PATH/MainActivity.java

          # لے آؤٹ فائل
          echo '${{ github.event.client_payload.xml }}' > $ANDROID_ROOT/app/src/main/res/layout/activity_main.xml

          # کلین اینڈرائیڈ مینی فیسٹ (پیشہ ورانہ سیٹ اپ)
          cat <<EOF > $ANDROID_ROOT/app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:supportsRtl="true"
                  android:theme="@style/Theme.App">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # آئی کن ہینڈلنگ
          if [ ! -z "${{ github.event.client_payload.icon_data }}" ]; then
            echo "${{ github.event.client_payload.icon_data }}" | base64 -d > $ANDROID_ROOT/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          fi
          
          # ریسورسز اور تھیمز
          echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.App" parent="Theme.MaterialComponents.DayNight.NoActionBar" /></resources>' > $ANDROID_ROOT/app/src/main/res/values/styles.xml
          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="colorPrimary">#00FFCC</color><color name="colorPrimaryDark">#000000</color></resources>' > $ANDROID_ROOT/app/src/main/res/values/colors.xml
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><resources><string name=\"app_name\">$APP_NAME</string></resources>" > $ANDROID_ROOT/app/src/main/res/values/strings.xml

      - name: 4. Industrial Build Configuration
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.systempro.app' }}"
          ANDROID_ROOT="android"
          
          echo "android.useAndroidX=true" > $ANDROID_ROOT/gradle.properties
          echo "android.enableJetifier=true" >> $ANDROID_ROOT/gradle.properties
          
          cat <<EOF > $ANDROID_ROOT/settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "SystemPro"
          include ':app'
          EOF

          cat <<EOF > $ANDROID_ROOT/build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.1' }
          }
          EOF

          cat <<EOF > $ANDROID_ROOT/app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "$PKG_NAME"
              compileSdk 34
              defaultConfig {
                  applicationId "$PKG_NAME"
                  minSdk 24
                  targetSdk 34
                  versionCode ${{ github.run_number }}
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: 5. Setup Gradle 8.1.1
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.1.1

      - name: 6. Execute Production Build
        run: |
          cd android
          gradle assembleDebug --no-daemon

      - name: 7. Upload Professional APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Release-Build
          path: android/app/build/outputs/apk/debug/*.apk

      - name: 8. Summary & Download Link
        if: success()
        run: |
          echo "### 🚀 System Pro: Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "Your professional APK is ready. [Download here](https://nightly.link/${{ github.repository }}/workflows/android/main/SystemPro-Release-Build.zip)" >> $GITHUB_STEP_SUMMARY
