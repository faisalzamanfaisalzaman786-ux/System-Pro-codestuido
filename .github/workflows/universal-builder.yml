name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Core Synthesis & Asset Protection
        shell: bash
        run: |
          APP_NAME="${{ github.event.client_payload.app_name || 'SystemPro' }}"
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          # فولڈرز کی درست سیٹنگ (Drawable اور Mipmap دونوں)
          mkdir -p android/app/src/main/java/$PKG_PATH
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-xxhdpi

          # کوڈ انجیکشن
          echo '${{ github.event.client_payload.java }}' > android/app/src/main/java/$PKG_PATH/MainActivity.java
          echo '${{ github.event.client_payload.xml }}' > android/app/src/main/res/layout/activity_main.xml
          
          # مینی فیسٹ فکس (آئکن پاتھ کو Mipmap پر سیٹ کرنا)
          echo '${{ github.event.client_payload.manifest }}' > android/app/src/main/AndroidManifest.xml
          sed -i 's/@drawable\/ic_launcher/@mipmap\/ic_launcher/g' android/app/src/main/AndroidManifest.xml

          # آئکن انجیکشن (دونوں جگہوں پر تاکہ ایرر نہ آئے)
          if [ ! -z "${{ github.event.client_payload.icon_data }}" ]; then
            echo "${{ github.event.client_payload.icon_data }}" | base64 -d > android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android/app/src/main/res/drawable/ic_launcher.png
          fi
          
          # تمام کلر ریسورسز کا فائنل فکس
          cat <<EOF > android/app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="primary_brand">#00E5FF</color>
              <color name="secondary_brand">#39FF14</color>
              <color name="text_on_primary">#FFFFFF</color>
              <color name="text_medium_emphasis">#80FFFFFF</color>
              <color name="app_background">#0F111A</color>
              <color name="black">#000000</color>
              <color name="white">#FFFFFF</color>
              <color name="colorPrimary">#00FFCC</color>
          </resources>
          EOF

          echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.App" parent="Theme.MaterialComponents.DayNight.NoActionBar" /></resources>' > android/app/src/main/res/values/styles.xml
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><resources><string name=\"app_name\">$APP_NAME</string></resources>" > android/app/src/main/res/values/strings.xml

      - name: 4. Build Configuration
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          cd android
          echo "rootProject.name = 'SystemPro'" > settings.gradle
          echo "include ':app'" >> settings.gradle
          
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "$PKG_NAME"
              compileSdk 34
              defaultConfig {
                  applicationId "$PKG_NAME"
                  minSdk 24
                  targetSdk 34
                  versionCode ${{ github.run_number }}
                  versionName "1.0.${{ github.run_number }}"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: 5. Execute Build (Locked to 8.5)
        run: |
          cd android
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --parallel

      - name: 6. APK Artifact Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: APK-Build-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/*.apk

      - name: 7. Direct Download Summary
        if: success()
        run: |
          echo "### 🚀 System Pro: Build Success!" >> $GITHUB_STEP_SUMMARY
          echo "Download: [Direct APK Download](https://nightly.link/${{ github.repository }}/workflows/main/main/APK-Build-${{ github.run_number }}.zip)" >> $GITHUB_STEP_SUMMARY
