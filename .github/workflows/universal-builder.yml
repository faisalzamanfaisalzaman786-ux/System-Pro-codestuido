name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Core Synthesis (Root Method)
        shell: python
        run: |
          import os
          
          pkg_name = "${{ github.event.client_payload.package_name }}" or "com.faisal.systempro"
          pkg_path = pkg_name.replace('.', '/')
          
          # فائلیں براہ راست صحیح فولڈرز میں بنانا
          java_file = f"app/src/main/java/{pkg_path}/MainActivity.java"
          xml_file = "app/src/main/res/layout/activity_main.xml"
          manifest_file = "app/src/main/AndroidManifest.xml"
          colors_file = "app/src/main/res/values/colors.xml"

          for f in [java_file, xml_file, manifest_file, colors_file]:
              os.makedirs(os.path.dirname(f), exist_ok=True)

          with open(java_file, "w") as f: f.write("""${{ github.event.client_payload.java }}""")
          with open(xml_file, "w") as f: f.write("""${{ github.event.client_payload.xml }}""")
          with open(manifest_file, "w") as f: f.write("""${{ github.event.client_payload.manifest }}""")
          with open(colors_file, "w") as f: f.write('<?xml version="1.0" encoding="utf-8"?><resources><color name="primary_brand">#00E5FF</color><color name="app_background">#0F111A</color></resources>')

      - name: 4. Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: assembleDebug
          # یہاں ہم نے 'cd android' نہیں کیا، بلکہ براہ راست روٹ سے چلایا
          build-root-directory: . 

      - name: 5. Knowledge Sync
        if: success()
        run: |
          git config --global user.name "System-Pro-Bot"
          git config --global user.email "bot@systempro.com"
          git add . && git commit -m "Restored 1:40m Success Build" && git push || echo "No changes"

      - name: 6. APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Master-APK
          path: "**/build/outputs/apk/debug/*.apk"
