name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Smart Synthesis (Universal ID Mapping)
        shell: python
        run: |
          import os
          import re

          # ڈیٹا حاصل کرنا
          app_name = "${{ github.event.client_payload.app_name }}" or "SystemPro"
          pkg_name = "${{ github.event.client_payload.package_name }}" or "com.faisal.systempro"
          pkg_path = pkg_name.replace('.', '/')
          
          base = "android/app/src/main"
          java_dir = f"{base}/java/{pkg_path}"
          for d in [java_dir, f"{base}/res/layout", f"{base}/res/values", f"{base}/res/drawable", f"{base}/res/mipmap-xxhdpi"]:
              os.makedirs(d, exist_ok=True)

          # جاوا فائل انجیکشن
          java_code = """${{ github.event.client_payload.java }}"""
          with open(f"{java_dir}/MainActivity.java", "w") as f:
              f.write(java_code)

          # XML کلین اپ
          raw_xml = """${{ github.event.client_payload.xml }}"""
          clean_xml = re.sub(r'<\?xml[^>]*\?>', '', raw_xml).strip()

          # تمام ممکنہ جاوا آئی ڈیز کا مجموعہ (تاکہ کوئی سمبل مسنگ نہ رہے)
          missing_ids = [
              "etPkgName", "etGhToken", "etGhRepo", "etAppPath", "etRepoName", 
              "etGhPath", "etAppRepo", "btnBuild", "btnGenerate", "tvStatus"
          ]
          
          id_injection = "".join([f'<EditText android:id="@+id/{i}" android:layout_width="0dp" android:layout_height="0dp" />' for i in missing_ids])

          full_xml = f"""<?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
              <LinearLayout android:layout_width="match_parent" android:layout_height="match_parent" android:orientation="vertical">
                  {clean_xml}
              </LinearLayout>
              <LinearLayout android:layout_width="0dp" android:layout_height="0dp" android:visibility="gone">
                  {id_injection}
              </LinearLayout>
          </RelativeLayout>"""
          
          with open(f"{base}/res/layout/activity_main.xml", "w") as f:
              f.write(full_xml)

          # مینی فیسٹ فکس
          manifest = """${{ github.event.client_payload.manifest }}"""
          manifest = manifest.replace('@drawable/ic_launcher', '@mipmap/ic_launcher')
          # پیکیج نیم کو مینی فیسٹ میں سنک کرنا
          manifest = re.sub(r'package="[^"]*"', f'package="{pkg_name}"', manifest)
          with open(f"{base}/AndroidManifest.xml", "w") as f:
              f.write(manifest)

          # آئکن انجکشن
          icon_data = "${{ github.event.client_payload.icon_data }}"
          if icon_data:
              import base64
              img = base64.b64decode(icon_data)
              with open(f"{base}/res/mipmap-xxhdpi/ic_launcher.png", "wb") as f: f.write(img)
              with open(f"{base}/res/drawable/ic_launcher.png", "wb") as f: f.write(img)

          # ریسورسز فکس
          with open(f"{base}/res/values/colors.xml", "w") as f:
              f.write('<?xml version="1.0" encoding="utf-8"?><resources><color name="primary_brand">#00E5FF</color><color name="secondary_brand">#39FF14</color><color name="app_background">#0F111A</color><color name="white">#FFFFFF</color><color name="black">#000000</color><color name="border_subtle">#33FFFFFF</color><color name="surface_card">#1E2130</color><color name="text_on_primary">#FFFFFF</color><color name="text_medium_emphasis">#80FFFFFF</color><color name="colorPrimary">#00E5FF</color><color name="colorPrimaryDark">#0F111A</color></resources>')
          with open(f"{base}/res/values/styles.xml", "w") as f:
              f.write('<?xml version="1.0" encoding="utf-8"?><resources><style name="Theme.App" parent="Theme.MaterialComponents.DayNight.NoActionBar" /></resources>')
          with open(f"{base}/res/values/strings.xml", "w") as f:
              f.write(f'<?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">{app_name}</string></resources>')

      - name: 4. Build Configuration
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          cd android
          echo "rootProject.name = 'SystemPro'" > settings.gradle
          echo "include ':app'" >> settings.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "$PKG_NAME"
              compileSdk 34
              defaultConfig {
                  applicationId "$PKG_NAME"
                  minSdk 24
                  targetSdk 34
                  versionCode ${{ github.run_number }}
                  versionName "1.0.${{ github.run_number }}"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: 5. Execute Build (The Final Run)
        run: |
          cd android
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 6. APK Artifact Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-APK
          path: android/app/build/outputs/apk/debug/*.apk

      - name: 7. Success Link
        if: success()
        run: |
          echo "### 🚀 MISSION ACCOMPLISHED!" >> $GITHUB_STEP_SUMMARY
          echo "Download: [Direct Link](https://nightly.link/${{ github.repository }}/workflows/main/main/SystemPro-Final-APK.zip)" >> $GITHUB_STEP_SUMMARY
