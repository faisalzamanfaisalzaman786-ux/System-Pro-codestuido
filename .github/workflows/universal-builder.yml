name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Core Synthesis (Clean Resource Injection)
        shell: bash
        run: |
          # پیکیج سیٹ اپ
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          # پرانے ریسورسز کی مکمل صفائی (Duplicate ختم کرنے کے لیے)
          rm -rf android/app/src/main/res/values/*.xml
          
          mkdir -p android/app/src/main/java/$PKG_PATH
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-xxhdpi

          # جاوا، ایکس ایم ایل اور مینی فیسٹ انجیکشن
          echo '${{ github.event.client_payload.java }}' > android/app/src/main/java/$PKG_PATH/MainActivity.java
          echo '${{ github.event.client_payload.xml }}' > android/app/src/main/res/layout/activity_main.xml
          echo '${{ github.event.client_payload.manifest }}' > android/app/src/main/AndroidManifest.xml
          
          # مینی فیسٹ درستگی
          sed -i "s/package=\"[^\"]*\"/package=\"$PKG_NAME\"/g" android/app/src/main/AndroidManifest.xml

          # آئکن ہینڈلنگ
          if [ ! -z "${{ github.event.client_payload.icon_data }}" ]; then
            echo "${{ github.event.client_payload.icon_data }}" | base64 -d > android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png android/app/src/main/res/drawable/ic_launcher.png
          fi

          # سنگل سورس ریسورس فائل (کوئی ڈوپلیکیٹ نہیں ہوگا)
          cat <<EOF > android/app/src/main/res/values/strings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">${{ github.event.client_payload.app_name || 'SystemPro' }}</string>
          </resources>
          EOF

          cat <<EOF > android/app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="primary_brand">#00E5FF</color>
              <color name="secondary_brand">#39FF14</color>
              <color name="app_background">#02040c</color>
              <color name="white">#FFFFFF</color>
              <color name="black">#000000</color>
          </resources>
          EOF

          # تمام اسٹائلز صرف اسی ایک فائل میں ہوں گے
          cat <<EOF > android/app/src/main/res/values/styles.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.App" parent="Theme.MaterialComponents.DayNight.NoActionBar" />
              
              <style name="ActionButton" parent="Widget.MaterialComponents.Button">
                  <item name="android:layout_width">0dp</item>
                  <item name="android:layout_height">wrap_content</item>
                  <item name="android:layout_weight">1</item>
                  <item name="android:textSize">10sp</item>
              </style>

              <style name="TabButton" parent="Widget.MaterialComponents.Button">
                  <item name="android:layout_width">0dp</item>
                  <item name="android:layout_height">wrap_content</item>
                  <item name="android:layout_weight">1</item>
                  <item name="android:textSize">10sp</item>
              </style>

              <style name="BuildButton" parent="Widget.MaterialComponents.Button">
                  <item name="android:layout_height">wrap_content</item>
                  <item name="backgroundTint">#00FFCC</item>
                  <item name="android:textColor">#02040c</item>
              </style>
          </resources>
          EOF

      - name: 4. Build Configuration
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          cd android
          echo "rootProject.name = 'SystemPro'" > settings.gradle
          echo "include ':app'" >> settings.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace "$PKG_NAME"
              compileSdk 34
              defaultConfig {
                  applicationId "$PKG_NAME"
                  minSdk 24
                  targetSdk 34
                  versionCode ${{ github.run_number }}
                  versionName "1.0.${{ github.run_number }}"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      - name: 5. Execute Build
        run: |
          cd android
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 6. Delivering Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Success-APK
          path: android/app/build/outputs/apk/debug/*.apk
