name: System Pro Master Engine

on:
  repository_dispatch:
    types: [build-app]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Setup Environment
        uses: actions/checkout@v4

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Core Synthesis & Java Patching
        shell: bash
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
          
          rm -rf android
          mkdir -p android/app/src/main/java/$PKG_PATH
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/drawable

          # جاوا کوڈ اور IOException پیچ
          cat <<'EOF' > android/app/src/main/java/$PKG_PATH/MainActivity.java
          ${{ github.event.client_payload.java }}
          EOF
          sed -i 's/mainHandler.post(() -> Toast.makeText(MainActivity.this, "Download failed: " + conn.getResponseCode(), Toast.LENGTH_SHORT).show());/mainHandler.post(() -> { try { int code = conn.getResponseCode(); Toast.makeText(MainActivity.this, "Download failed: " + code, Toast.LENGTH_SHORT).show(); } catch (Exception e) { e.printStackTrace(); } });/g' android/app/src/main/java/$PKG_PATH/MainActivity.java

          # مینی فیسٹ اور ریسورسز
          cat <<'EOF' > android/app/src/main/AndroidManifest.xml
          ${{ github.event.client_payload.manifest }}
          EOF
          sed -i 's/package="[^"]*"//g' android/app/src/main/AndroidManifest.xml
          
          cat <<'EOF' > android/app/src/main/res/layout/activity_main.xml
          ${{ github.event.client_payload.xml }}
          EOF

          # ڈائیلاگ، تھیمز اور کلرز
          cat <<EOF > android/app/src/main/res/layout/dialog_settings.xml
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="vertical" android:padding="20dp" android:background="#1E2130">
              <EditText android:id="@+id/etAppName" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="App Name" android:textColor="#FFFFFF" android:textColorHint="#88FFFFFF"/>
              <EditText android:id="@+id/etPkgName" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="Package Name" android:textColor="#FFFFFF" android:textColorHint="#88FFFFFF"/>
              <EditText android:id="@+id/etGhToken" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="GitHub Token" android:textColor="#FFFFFF" android:textColorHint="#88FFFFFF"/>
              <EditText android:id="@+id/etGhRepo" android:layout_width="match_parent" android:layout_height="wrap_content" android:hint="GitHub Repo" android:textColor="#FFFFFF" android:textColorHint="#88FFFFFF"/>
          </LinearLayout>
          EOF

          cat <<EOF > android/app/src/main/res/values/themes.xml
          <resources>
              <style name="Theme.SystemProMaster" parent="Theme.MaterialComponents.DayNight.NoActionBar"><item name="colorPrimary">@color/primary_brand</item></style>
              <style name="Theme.App" parent="Theme.SystemProMaster" />
              <style name="ActionButton" parent="Widget.MaterialComponents.Button.OutlinedButton"><item name="android:textColor">#FFFFFF</item></style>
          </resources>
          EOF

          cat <<EOF > android/app/src/main/res/values/colors.xml
          <?xml version="1.0" encoding="utf-8"?><resources><color name="primary_brand">#00E5FF</color><color name="app_background">#02040c</color><color name="white">#FFFFFF</color></resources>
          EOF

          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?><resources><string name=\"app_name\">${{ github.event.client_payload.app_name || 'SystemPro' }}</string></resources>" > android/app/src/main/res/values/strings.xml

      - name: 4. Generating Build Wrapper
        run: |
          PKG_NAME="${{ github.event.client_payload.package_name || 'com.faisal.systempro' }}"
          cd android
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "include ':app'" > settings.gradle
          
          # مین بلڈ فائلز
          cat <<EOF > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android { namespace "$PKG_NAME"; compileSdk 34; defaultConfig { applicationId "$PKG_NAME"; minSdk 24; targetSdk 34; versionCode 1; versionName "1.0" } }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1'; implementation 'com.google.android.material:material:1.9.0' }
          EOF

          # 🛑 اہم فکس: gradlew فائل جنریٹ کرنا
          gradle wrapper --gradle-version 8.5

      - name: 5. Execute Isolated Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 6. Success APK Delivery
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Fixed-Build
          path: android/app/build/outputs/apk/debug/*.apk
