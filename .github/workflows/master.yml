name: Dynamic APK Builder (Safe V2 - Auto Kotlin)

on:
  workflow_dispatch:
    inputs:
      build_config:
        description: 'Build config (JSON)'
        required: true
        default: '{"package_name":"com.example.app","app_display_name":"MyApp","min_sdk":21,"target_sdk":34,"use_proguard":false}'
      source_files:
        description: 'Source files (JSON with base64 for main_dart, pubspec, android_manifest, build_gradle)'
        required: true
        default: '{"main_dart":"","pubspec":"","android_manifest":"","build_gradle":""}'
      permissions:
        description: 'Permissions JSON'
        required: true
        default: '{"camera":false,"microphone":false,"vibrate":false,"location_granularity":"none"}'
      assets:
        description: 'Assets JSON (icon and additional)'
        required: true
        default: '{"app_icon_base64":"","additional_assets":[]}'
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Build payload from inputs (if manual run)
        if: github.event_name == 'workflow_dispatch'
        run: |
          jq -n \
            --argjson build_config '${{ toJson(github.event.inputs.build_config) }}' \
            --argjson source_files '${{ toJson(github.event.inputs.source_files) }}' \
            --argjson permissions '${{ toJson(github.event.inputs.permissions) }}' \
            --argjson assets '${{ toJson(github.event.inputs.assets) }}' \
            '{build_config: $build_config, source_files: $source_files, permissions: $permissions, assets: $assets}' > payload.json

      - name: Save payload to file (from dispatch)
        if: github.event_name == 'repository_dispatch'
        run: |
          echo '${{ toJson(github.event.client_payload) }}' > payload.json

      - name: Extract build config
        run: |
          PACKAGE_NAME=$(jq -r '.build_config.package_name' payload.json)
          APP_NAME=$(jq -r '.build_config.app_display_name' payload.json)
          MIN_SDK=$(jq -r '.build_config.min_sdk' payload.json)
          TARGET_SDK=$(jq -r '.build_config.target_sdk' payload.json)
          USE_PROGUARD=$(jq -r '.build_config.use_proguard' payload.json)

          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "MIN_SDK=$MIN_SDK" >> $GITHUB_ENV
          echo "TARGET_SDK=$TARGET_SDK" >> $GITHUB_ENV
          echo "USE_PROGUARD=$USE_PROGUARD" >> $GITHUB_ENV

      - name: Create fresh Flutter v2 project
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PKG" | rev | cut -d. -f1 | rev)
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android,ios .
          echo "✅ Fresh v2 project created"

      - name: Write source files from payload
        run: |
          jq -r '.source_files.main_dart // ""' payload.json | base64 -d > lib/main.dart
          jq -r '.source_files.pubspec // ""' payload.json | base64 -d > pubspec.yaml
          jq -r '.source_files.android_manifest // ""' payload.json | base64 -d > android/app/src/main/AndroidManifest.xml
          jq -r '.source_files.build_gradle // ""' payload.json | base64 -d > android/app/build.gradle
          echo "✅ All source files written"

      - name: Add dependencies (if needed)
        run: |
          flutter pub get
          # Add any missing common dependencies; ignore errors if already present
          flutter pub add webview_flutter permission_handler path_provider 2>/dev/null || true
          flutter pub get

      - name: Extract permissions and icon
        run: |
          jq '.permissions' payload.json > perms.json
          jq '.assets.additional_assets // []' payload.json > assets_list.json
          ICON_B64=$(jq -r '.assets.app_icon_base64 // ""' payload.json)
          echo "ICON_B64=$ICON_B64" >> $GITHUB_ENV

      - name: Apply permissions to AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Ensure INTERNET permission
          if ! grep -q "INTERNET" "$MANIFEST"; then
            sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
          fi
          # Ensure POST_NOTIFICATIONS for newer Android
          if ! grep -q "POST_NOTIFICATIONS" "$MANIFEST"; then
            sed -i '/<manifest/a \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "$MANIFEST"
          fi
          add_perm() {
            if ! grep -q "$2" "$MANIFEST"; then
              sed -i "/<manifest/a \    $1" "$MANIFEST"
            fi
          }
          if jq -e '.camera == true' perms.json > /dev/null; then
            add_perm '<uses-permission android:name="android.permission.CAMERA" />' "CAMERA"
          fi
          if jq -e '.microphone == true' perms.json > /dev/null; then
            add_perm '<uses-permission android:name="android.permission.RECORD_AUDIO" />' "RECORD_AUDIO"
          fi
          if jq -e '.vibrate == true' perms.json > /dev/null; then
            add_perm '<uses-permission android:name="android.permission.VIBRATE" />' "VIBRATE"
          fi
          LOC=$(jq -r '.location_granularity // "none"' perms.json)
          if [ "$LOC" = "fine" ]; then
            add_perm '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' "ACCESS_FINE_LOCATION"
          elif [ "$LOC" = "coarse" ]; then
            add_perm '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' "ACCESS_COARSE_LOCATION"
          fi
          echo "✅ Permissions added"

      - name: Set app display name
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="[^"]*"/android:label="${{ env.APP_NAME }}"/' "$MANIFEST"

      - name: Apply app icon
        run: |
          if [ -n "${{ env.ICON_B64 }}" ] && [ "${{ env.ICON_B64 }}" != "null" ]; then
            echo "${{ env.ICON_B64 }}" | base64 -d > icon.png
            for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$density
              cp icon.png android/app/src/main/res/mipmap-$density/ic_launcher.png
            done
            rm icon.png
            echo "✅ Icon applied"
          fi

      - name: Apply additional assets
        run: |
          if jq -e 'length > 0' assets_list.json > /dev/null; then
            mkdir -p assets/images
            for row in $(jq -r '.[] | @base64' assets_list.json); do
              _jq() { echo ${row} | base64 --decode | jq -r ${1}; }
              NAME=$(_jq '.name')
              B64=$(_jq '.base64')
              echo "$B64" | base64 -d > "assets/images/$NAME"
            done
            # Ensure pubspec.yaml includes assets/images
            if ! grep -q "assets/images" pubspec.yaml; then
              sed -i '/flutter:/a \  assets:\n    - assets/images/' pubspec.yaml
            fi
            echo "✅ Additional assets added"
          fi

      - name: Configure Gradle (Java 17, Kotlin 2.0.20, NDK)
        run: |
          APP_GRADLE="android/app/build.gradle"
          PKG="${{ env.PACKAGE_NAME }}"

          # Ensure compileOptions for Java 17
          if ! grep -q "compileOptions" "$APP_GRADLE"; then
            sed -i '/android {/a \    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_17\n        targetCompatibility JavaVersion.VERSION_17\n    }' "$APP_GRADLE"
          else
            sed -i 's/sourceCompatibility .*/sourceCompatibility JavaVersion.VERSION_17/' "$APP_GRADLE"
            sed -i 's/targetCompatibility .*/targetCompatibility JavaVersion.VERSION_17/' "$APP_GRADLE"
          fi

          # Set namespace
          if grep -q "namespace" "$APP_GRADLE"; then
            sed -i 's/namespace .*/namespace "'"$PKG"'"/' "$APP_GRADLE"
          else
            sed -i '/android {/a \    namespace "'"$PKG"'"' "$APP_GRADLE"
          fi

          # Set applicationId
          if grep -q "applicationId" "$APP_GRADLE"; then
            sed -i 's/applicationId .*/applicationId "'"$PKG"'"/' "$APP_GRADLE"
          else
            sed -i '/defaultConfig {/a \        applicationId "'"$PKG"'"' "$APP_GRADLE"
          fi

          # Set NDK version
          if ! grep -q "ndkVersion" "$APP_GRADLE"; then
            sed -i '/android {/a \    ndkVersion "27.0.12077973"' "$APP_GRADLE"
          else
            sed -i 's/ndkVersion .*/ndkVersion "27.0.12077973"/' "$APP_GRADLE"
          fi

          # Set minSdk and targetSdk
          sed -i 's/minSdk .*/minSdk '"${{ env.MIN_SDK }}"'/' "$APP_GRADLE"
          sed -i 's/targetSdk .*/targetSdk '"${{ env.TARGET_SDK }}"'/' "$APP_GRADLE"

          # Proguard
          if [ "${{ env.USE_PROGUARD }}" = "true" ]; then
            sed -i 's/minifyEnabled .*/minifyEnabled true/' "$APP_GRADLE"
            sed -i 's/shrinkResources .*/shrinkResources true/' "$APP_GRADLE"
          fi

          echo "✅ Gradle configured"

      - name: Enable cleartext traffic
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q 'android:usesCleartextTraffic="true"' "$MANIFEST"; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$MANIFEST"
          fi

      - name: Force Kotlin 2.0.20
        run: |
          KOTLIN_VERSION="2.0.20"
          SETTINGS="android/settings.gradle"
          if [ -f "$SETTINGS" ]; then
            sed -i 's/id "org.jetbrains.kotlin.android" version ".*"/id "org.jetbrains.kotlin.android" version "'"$KOTLIN_VERSION"'"/' "$SETTINGS"
          fi
          # Also create gradle.properties for memory and options
          cat > android/gradle.properties <<EOF
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          EOF
          # Ensure kotlinOptions.jvmTarget = 17 in app/build.gradle
          APP_GRADLE="android/app/build.gradle"
          if ! grep -q "kotlinOptions" "$APP_GRADLE"; then
            sed -i '/android {/a \    kotlinOptions {\n        jvmTarget = "17"\n    }' "$APP_GRADLE"
          else
            sed -i 's/jvmTarget = .*/jvmTarget = "17"/' "$APP_GRADLE"
          fi
          echo "✅ Kotlin forced to $KOTLIN_VERSION with jvmTarget=17"

      - name: Build release APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-${{ env.PACKAGE_NAME }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk
