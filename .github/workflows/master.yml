# File: .github/workflows/build-apk.yml
name: پلیٹ فارم ایپلیکیشن بلڈر اور اپ لوڈر

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build_apk]

env:
  FLUTTER_VERSION: '3.29.2'
  NDK_VERSION: '27.0.12077973'
  KOTLIN_VERSION: '1.9.24'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 پہلے سے موجود پروجیکٹ کو چیک کریں
        uses: actions/checkout@v4

      - name: 📂 کلائنٹ پے لوڈ کو محفوظ کریں
        run: echo '${{ toJSON(github.event.client_payload) }}' > payload.json

      - name: ☕ Java 17 ترتیب دیں
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: ⚙️ Flutter ترتیب دیں
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: 📦 لوازمات (dependencies) ترتیب دیں
        run: flutter pub get

      - name: 📱 اینڈرائیڈ کنفیگریشن مرتب کریں
        run: |
          # Kotlin/Gradle configuration
          ANDROID_DIR="android"
          mkdir -p $ANDROID_DIR/app/src/main/res/values

          # `gradle/libs.versions.toml` (version catalog) بنائیں
          mkdir -p $ANDROID_DIR/gradle
          cat > $ANDROID_DIR/gradle/libs.versions.toml << 'EOF'
          [versions]
          agp = "8.2.1"
          kotlin = "${{ env.KOTLIN_VERSION }}"

          [plugins]
          android-application = { id = "com.android.application", version.ref = "agp" }
          kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }

          [libraries]
          EOF

          # `settings.gradle.kts` (dependency management) فائل بنائیں
          cat > $ANDROID_DIR/settings.gradle.kts << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "MyApp"
          include(":app")
          EOF

          # `build.gradle.kts` (build logic) فائل بنائیں
          cat > $ANDROID_DIR/build.gradle.kts << 'EOF'
          plugins {
              alias(libs.plugins.android.application) apply false
              alias(libs.plugins.kotlin.android) apply false
          }
          EOF

          # `app/build.gradle.kts` (app-specific build logic) فائل بنائیں
          cat > $ANDROID_DIR/app/build.gradle.kts << 'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.systempro.app"
              compileSdk = 34

              ndkVersion = "${{ env.NDK_VERSION }}"

              defaultConfig {
                  applicationId = "com.systempro.app"
                  minSdk = 21
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                      signingConfig = signingConfigs.getByName("debug")
                  }
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_1_8
                  targetCompatibility = JavaVersion.VERSION_1_8
              }
              kotlinOptions {
                  jvmTarget = "1.8"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.appcompat:appcompat:1.6.1")
              implementation("com.google.android.material:material:1.11.0")
          }
          EOF

          # AndroidManifest.xml تیار کریں
          cat > $ANDROID_DIR/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="System Pro"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # MainActivity.kt تیار کریں
          mkdir -p $ANDROID_DIR/app/src/main/kotlin/com/systempro/app
          cat > $ANDROID_DIR/app/src/main/kotlin/com/systempro/app/MainActivity.kt << 'EOF'
          package com.systempro.app
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity()
          EOF

      - name: 🔄 lib/main.dart کو اصلی main.dart سے بدلیں (مگر صرف اس وقت جب وہ پے لوڈ میں ہو)
        run: |
          MAIN_B64=$(jq -r '.source_files.main_dart // empty' payload.json)
          if [[ -n "$MAIN_B64" && "$MAIN_B64" != "null" ]]; then
            echo "$MAIN_B64" | base64 -d > lib/main.dart
            echo "✅ main.dart pico se replace ho gya."
          else
            echo "⚠️ koi main.dart payload mein nahi mila, default use hoga."
          fi

      - name: 🛠️ نئے منحصر کردہ پیکجز خودکار طور پر شامل کریں
        run: |
          # باقاعدہ اظہار کے ذریعے درآمدات (imports) ڈھونڈیں اور اپنے آپ شامل کریں
          grep -oE "import 'package:([^/']+)/" lib/main.dart | sed "s/import 'package://; s/.$//" | sort -u | while read pkg; do
            if [[ "$pkg" != "flutter" ]]; then
              echo "packages add kr rahey hain: $pkg"
              flutter pub add "$pkg" || echo "⚠️ $pkg add nahi ho saka, ignoring"
            fi
          done
          flutter pub get

      - name: 📤 اشتہار بنائیں
        run: flutter build apk --release

      - name: 💾 APK اپ لوڈ کریں
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
