      - name: 🧬 ڈائنامک انجن (Python Smart Logic)
        run: |
          python3 - <<EOF
          import json
          import os
          import base64
          import re

          # 'null' کے مسئلے کو حل کرنے کے لیے ڈیٹا کو پائتھن کے مطابق ڈھالنا
          payload_raw = '''${{ toJson(github.event.client_payload) }}'''
          # یہاں ہم جاوا سکرپٹ کے null کو پائتھن کے None میں بدل رہے ہیں
          payload = json.loads(payload_raw.replace(': null', ': None'))
          
          # باقی لاجک وہی رہے گی، بس پے لوڈ اب محفوظ طریقے سے لوڈ ہوگا
          try:
              new_app_name = payload.get('build_config', {}).get('app_display_name', 'System Pro App')
              new_pkg = payload.get('build_config', {}).get('package_name', 'com.systempro.ultra')
              main_code = payload.get('source_files', {}).get('main_dart', '')
              icon_b64 = payload.get('assets', {}).get('app_icon_base64', None)

              # سورس کوڈ (main.dart) اپ ڈیٹ کریں
              if main_code:
                  with open('lib/main.dart', 'w') as f:
                      f.write(main_code)

              # مینی فیسٹ اور گریڈل میں تبدیلیاں کریں
              manifest_path = 'android/app/src/main/AndroidManifest.xml'
              if os.path.exists(manifest_path):
                  with open(manifest_path, 'r') as f: content = f.read()
                  content = re.sub(r'android:label="[^"]*"', f'android:label="{new_app_name}"', content)
                  content = content.replace('com.systempro.ultra', new_pkg)
                  with open(manifest_path, 'w') as f: f.write(content)

              gradle_path = 'android/app/build.gradle'
              if os.path.exists(gradle_path):
                  with open(gradle_path, 'r') as f: content = f.read()
                  content = content.replace('com.systempro.ultra', new_pkg)
                  with open(gradle_path, 'w') as f: f.write(content)

              # آئیکن انجن
              if icon_b64:
                  icon_data = base64.b64decode(icon_b64)
                  res_path = 'android/app/src/main/res/'
                  for folder in os.listdir(res_path):
                      if 'mipmap' in folder:
                          icon_file = os.path.join(res_path, folder, 'ic_launcher.png')
                          with open(icon_file, 'wb') as f: f.write(icon_data)
              
              print(f"✅ Build configured for: {new_app_name}")

          except Exception as e:
              print(f"❌ Error in script: {e}")
              exit(1)
          EOF
