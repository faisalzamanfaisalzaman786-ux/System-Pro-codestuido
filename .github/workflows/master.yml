name: Download FlexColorScheme into Repository

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download flex_color_scheme 8.3.0 tar.gz
        run: |
          mkdir -p packages
          cd packages
          curl -L https://pub.dev/packages/flex_color_scheme/versions/8.3.0.tar.gz -o flex_color_scheme.tar.gz
          tar -xzf flex_color_scheme.tar.gz
          rm flex_color_scheme.tar.gz
          # extracted folder name is usually "flex_color_scheme-8.3.0"
          mv flex_color_scheme-8.3.0 flex_color_scheme
          cd ..

      - name: Update pubspec.yaml with local path
        run: |
          if ! grep -q "flex_color_scheme:" pubspec.yaml; then
            echo -e "\n  flex_color_scheme:\n    path: packages/flex_color_scheme" >> pubspec.yaml
          fi

      - name: Replace main.dart with theme support
        run: |
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:flex_color_scheme/flex_color_scheme.dart';

          void main() => runApp(const MyApp());

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'System Pro Ultra',
                theme: FlexThemeData.light(
                  scheme: FlexScheme.mango,
                  useMaterial3: true,
                ),
                darkTheme: FlexThemeData.dark(
                  scheme: FlexScheme.mango,
                  useMaterial3: true,
                ),
                themeMode: ThemeMode.system,
                home: const MyHomePage(),
              );
            }
          }

          class MyHomePage extends StatelessWidget {
            const MyHomePage({super.key});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text('System Pro Ultra')),
                body: const Center(
                  child: Text('FlexColorScheme 8.3.0 is ready!'),
                ),
              );
            }
          }
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/ pubspec.yaml lib/main.dart
          git diff --cached --quiet || git commit -m "Add flex_color_scheme 8.3.0 via curl"
          git push
