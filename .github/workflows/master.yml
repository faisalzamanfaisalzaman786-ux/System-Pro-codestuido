name: System Pro Master Engine

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 کیشے اور چیک آؤٹ
        uses: actions/checkout@v4

      - name: 🛠️ فلٹر سیٹ اپ
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 🧬 ٹائٹن انجکشن انجن
        run: |
          python3 - <<EOF
          import json, os, re, base64

          try:
              # ڈیٹا لوڈنگ
              raw_payload = r'''${{ toJson(github.event.client_payload) }}'''
              data = json.loads(raw_payload)
              
              config = data.get('build_config', {})
              app_name = config.get('app_display_name', 'System Pro App')
              pkg_name = config.get('package_name', 'com.systempro.ultra')
              main_code = data.get('source_files', {}).get('main_dart', '')

              # 1. پب اسپیک میں آٹو لائبریری انجکشن (Torch اور دیگر)
              if os.path.exists('pubspec.yaml'):
                  with open('pubspec.yaml', 'r') as f: lines = f.readlines()
                  
                  # پرانی ڈوپلیکیٹ کیز کی صفائی
                  clean_lines = [l for l in lines if not any(k in l for l in ['permission_handler', 'http', 'torch'])]
                  
                  final_lines = []
                  for line in clean_lines:
                      final_lines.append(line)
                      if line.strip() == "dependencies:":
                          final_lines.append("  permission_handler: ^11.3.0\n")
                          final_lines.append("  http: ^1.2.0\n")
                          # اگر کوڈ میں torch استعمال ہوا ہے تو اسے آٹو ایڈ کرنا
                          if "package:torch/torch.dart" in main_code:
                              final_lines.append("  torch: ^1.0.0\n")
                  
                  with open('pubspec.yaml', 'w') as f: f.writelines(final_lines)

              # 2. آئیکن انجن (ڈیپ ری پلیسمنٹ)
              icon_b64 = data.get('assets', {}).get('app_icon_base64', None)
              if icon_b64:
                  if "," in icon_b64: icon_b64 = icon_b64.split(",")[1]
                  img_data = base64.b64decode(icon_b64)
                  res_dir = 'android/app/src/main/res/'
                  # اینڈرائیڈ کے تمام میپ میپ اور ڈرائبل فولڈرز میں آئیکن لکھنا
                  for root, dirs, files in os.walk(res_dir):
                      if any(x in root for x in ['mipmap', 'drawable']):
                          for name in ['ic_launcher.png', 'launcher_icon.png']:
                              with open(os.path.join(root, name), 'wb') as f:
                                  f.write(img_data)
                  print("✅ App Icon Updated in all resource folders")

              # 3. برانڈنگ اور پیکیج نیم فکس
              manifest = 'android/app/src/main/AndroidManifest.xml'
              if os.path.exists(manifest):
                  with open(manifest, 'r') as f: c = f.read()
                  c = re.sub(r'android:label="[^"]*"', f'android:label="{app_name}"', c)
                  c = c.replace('com.systempro.ultra', pkg_name)
                  with open(manifest, 'w') as f: f.write(c)

              gradle = 'android/app/build.gradle'
              if os.path.exists(gradle):
                  with open(gradle, 'r') as f: c = f.read()
                  c = c.replace('com.systempro.ultra', pkg_name)
                  with open(gradle, 'w') as f: f.write(c)

              # 4. ڈائنامک سورس کوڈ
              if main_code:
                  os.makedirs('lib', exist_ok=True)
                  with open('lib/main.dart', 'w', encoding='utf-8') as f:
                      f.write(main_code)

              print(f"🚀 Success: {app_name} is ready for compilation")
          except Exception as e:
              print(f"❌ Error: {e}"); exit(1)
          EOF

      - name: 🏗️ بلڈ اینڈرائیڈ ریلیز
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: 📤 آرٹفیکٹ اپ لوڈ
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Release
          path: build/app/outputs/flutter-apk/*.apk
