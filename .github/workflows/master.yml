name: Dynamic APK Builder (Safe V2 - Auto Kotlin)

on:
  workflow_dispatch:
    inputs:
      build_config:
        description: 'Build config (JSON)'
        required: true
        default: '{"package_name":"com.example.app","app_display_name":"MyApp","min_sdk":21,"target_sdk":34,"use_proguard":false}'
      source_files:
        description: 'Source files (JSON with base64)'
        required: true
        default: '{"main_dart":"","pubspec":""}'
      permissions:
        description: 'Permissions JSON'
        required: true
        default: '{"camera":false,"microphone":false,"vibrate":false,"location_granularity":"none"}'
      assets:
        description: 'Assets JSON (icon and additional)'
        required: true
        default: '{"app_icon_base64":"","additional_assets":[]}'
  repository_dispatch:
    types: [system_pro_build]

env:
  FLUTTER_VERSION: '3.29.2'
  KOTLIN_VERSION: '2.0.20'
  NDK_VERSION: '27.0.12077973'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Prepare Payload
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            jq -n \
              --argjson bc '${{ toJson(github.event.inputs.build_config) }}' \
              --argjson sf '${{ toJson(github.event.inputs.source_files) }}' \
              --argjson pm '${{ toJson(github.event.inputs.permissions) }}' \
              --argjson as '${{ toJson(github.event.inputs.assets) }}' \
              '{build_config: $bc, source_files: $sf, permissions: $pm, assets: $as}' > payload.json
          else
            echo '${{ toJson(github.event.client_payload) }}' > payload.json
          fi

      - name: Create Project
        run: |
          PKG=$(jq -r '.build_config.package_name' payload.json)
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PKG" | rev | cut -d. -f1 | rev)
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android .

      - name: Inject Source & Fix Pubspec
        run: |
          jq -r '.source_files.main_dart' payload.json | base64 -d > lib/main.dart
          jq -r '.source_files.pubspec' payload.json | base64 -d > pubspec.yaml
          
          # CRITICAL: Pubspec Override - Yeh line version ka masla khatam karegi
          cat >> pubspec.yaml <<EOF

          dependency_overrides:
            webview_flutter_android: 4.10.1
          EOF

      - name: Dependencies
        run: |
          flutter pub get

      - name: Android Config
        run: |
          APP_NAME=$(jq -r '.build_config.app_display_name' payload.json)
          PKG_NAME=$(jq -r '.build_config.package_name' payload.json)
          MIN_SDK=$(jq -r '.build_config.min_sdk' payload.json)
          TARGET_SDK=$(jq -r '.build_config.target_sdk' payload.json)
          
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="[^"]*"/android:label="'"$APP_NAME"'"/' "$MANIFEST"
          if ! grep -q "INTERNET" "$MANIFEST"; then
            sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
          fi

          GRADLE="android/app/build.gradle.kts"
          sed -i 's/namespace = .*/namespace = "'"$PKG_NAME"'"/' "$GRADLE"
          sed -i 's/applicationId = .*/applicationId = "'"$PKG_NAME"'"/' "$GRADLE"
          sed -i "s/minSdk = .*/minSdk = $MIN_SDK/" "$GRADLE"
          sed -i "s/targetSdk = .*/targetSdk = $TARGET_SDK/" "$GRADLE"

      - name: Final Build APK
        run: |
          # Clean lazmi hai purani files hatane ke liye
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Build
          path: build/app/outputs/flutter-apk/*.apk
