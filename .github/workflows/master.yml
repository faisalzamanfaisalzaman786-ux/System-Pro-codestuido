name: Dynamic APK Builder (Safe V2)

on:
  workflow_dispatch:
    inputs:
      build_config:
        description: 'Build config (JSON)'
        required: true
        default: '{"package_name":"com.example.app","app_display_name":"MyApp","min_sdk":21,"target_sdk":34,"use_proguard":false}'
      source_files:
        description: 'Source files (JSON with base64)'
        required: true
        default: '{"main_dart":"","pubspec":""}'
      permissions:
        description: 'Permissions JSON'
        required: true
        default: '{"camera":false,"microphone":false,"vibrate":false,"location_granularity":"none"}'
      assets:
        description: 'Assets JSON (icon and additional)'
        required: true
        default: '{"app_icon_base64":"","additional_assets":[]}'
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Save payload to file
        run: |
          echo '${{ toJson(github.event.client_payload) }}' > payload.json

      - name: Extract build config
        id: config
        run: |
          PACKAGE_NAME=$(jq -r '.build_config.package_name' payload.json)
          APP_NAME=$(jq -r '.build_config.app_display_name' payload.json)
          MIN_SDK=$(jq -r '.build_config.min_sdk' payload.json)
          TARGET_SDK=$(jq -r '.build_config.target_sdk' payload.json)
          USE_PROGUARD=$(jq -r '.build_config.use_proguard' payload.json)

          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "MIN_SDK=$MIN_SDK" >> $GITHUB_ENV
          echo "TARGET_SDK=$TARGET_SDK" >> $GITHUB_ENV
          echo "USE_PROGUARD=$USE_PROGUARD" >> $GITHUB_ENV

      - name: Create fresh Flutter v2 project
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PKG" | rev | cut -d. -f1 | rev)
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android,ios .
          echo "✅ Fresh v2 project created"

      - name: Write main.dart from payload (overwrite generated)
        run: |
          jq -r '.source_files.main_dart // ""' payload.json | base64 -d > lib/main.dart
          echo "✅ main.dart written"

      - name: Write pubspec.yaml (IGNORE user input, use correct versions)
        run: |
          cat > pubspec.yaml <<EOF
          name: system_pro_app
          description: A powerful browser app with camera support.
          version: 1.0.0+1
          environment:
            sdk: '>=3.4.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: 4.13.0
            webview_flutter_android: 4.10.1
            permission_handler: 12.0.1
            path_provider: 2.1.5
            device_info_plus: 10.1.0
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^5.0.0
          flutter:
            uses-material-design: true
          EOF
          echo "✅ pubspec.yaml written with correct versions (user input ignored)"

      - name: Add dependencies with exact versions
        run: |
          flutter pub get
          flutter pub add webview_flutter:4.13.0 webview_flutter_android:4.10.1 permission_handler:12.0.1 path_provider:2.1.5 device_info_plus:10.1.0 2>/dev/null || true
          flutter pub get
          echo "✅ Dependencies locked"

      - name: Extract permissions and icon
        run: |
          jq '.permissions' payload.json > perms.json
          jq '.assets.additional_assets // []' payload.json > assets_list.json
          ICON_B64=$(jq -r '.assets.app_icon_base64 // ""' payload.json)
          echo "ICON_B64=$ICON_B64" >> $GITHUB_ENV

      - name: Apply permissions to existing AndroidManifest.xml (v2 safe)
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Ensure internet and notifications
          if ! grep -q "INTERNET" "$MANIFEST"; then
            sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
          fi
          if ! grep -q "POST_NOTIFICATIONS" "$MANIFEST"; then
            sed -i '/<manifest/a \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "$MANIFEST"
          fi
          # Function to add permission
          add_perm() {
            if ! grep -q "$2" "$MANIFEST"; then
              sed -i "/<manifest/a \    $1" "$MANIFEST"
            fi
          }
          # Camera
          if jq -e '.camera == true' perms.json > /dev/null; then
            add_perm '<uses-permission android:name="android.permission.CAMERA" />' "CAMERA"
          fi
          # Microphone
          if jq -e '.microphone == true' perms.json > /dev/null; then
            add_perm '<uses-permission android:name="android.permission.RECORD_AUDIO" />' "RECORD_AUDIO"
          fi
          # Vibrate
          if jq -e '.vibrate == true' perms.json > /dev/null; then
            add_perm '<uses-permission android:name="android.permission.VIBRATE" />' "VIBRATE"
          fi
          # Location
          LOC=$(jq -r '.location_granularity // "none"' perms.json)
          if [ "$LOC" = "fine" ]; then
            add_perm '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' "ACCESS_FINE_LOCATION"
          elif [ "$LOC" = "coarse" ]; then
            add_perm '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' "ACCESS_COARSE_LOCATION"
          fi
          echo "✅ Permissions added"

      - name: Set app display name
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="[^"]*"/android:label="${{ env.APP_NAME }}"/' "$MANIFEST"

      - name: Apply app icon if provided
        run: |
          if [ -n "${{ env.ICON_B64 }}" ] && [ "${{ env.ICON_B64 }}" != "null" ]; then
            echo "${{ env.ICON_B64 }}" | base64 -d > icon.png
            for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$density
              cp icon.png android/app/src/main/res/mipmap-$density/ic_launcher.png
            done
            rm icon.png
            echo "✅ Icon applied"
          fi

      - name: Apply additional assets
        run: |
          if jq -e 'length > 0' assets_list.json > /dev/null; then
            mkdir -p assets/images
            for row in $(jq -r '.[] | @base64' assets_list.json); do
              _jq() {
                echo ${row} | base64 --decode | jq -r ${1}
              }
              NAME=$(_jq '.name')
              B64=$(_jq '.base64')
              echo "$B64" | base64 -d > "assets/images/$NAME"
            done
            if ! grep -q "assets/" pubspec.yaml; then
              sed -i '/flutter:/a \  assets:\n    - assets/images/' pubspec.yaml
            fi
            echo "✅ Additional assets added"
          fi

      - name: Configure Gradle (namespace, applicationId, NDK, minSdk, targetSdk)
        run: |
          # Use build.gradle.kts (created by flutter create)
          GRADLE="android/app/build.gradle.kts"
          PKG="${{ env.PACKAGE_NAME }}"

          # Ensure namespace
          if grep -q "namespace" "$GRADLE"; then
            sed -i 's/namespace(.*/namespace("'"$PKG"'")/' "$GRADLE"
          else
            sed -i '/android {/a \    namespace("'"$PKG"'")' "$GRADLE"
          fi

          # Ensure applicationId
          if grep -q "applicationId" "$GRADLE"; then
            sed -i 's/applicationId = .*/applicationId = "'"$PKG"'"/' "$GRADLE"
          else
            sed -i '/defaultConfig {/a \        applicationId = "'"$PKG"'"' "$GRADLE"
          fi

          # Set NDK version
          if grep -q "ndkVersion" "$GRADLE"; then
            sed -i 's/ndkVersion = .*/ndkVersion = "27.0.12077973"/' "$GRADLE"
          else
            sed -i '/android {/a \    ndkVersion = "27.0.12077973"' "$GRADLE"
          fi

          # Set minSdk and targetSdk
          sed -i 's/minSdk = .*/minSdk = '"${{ env.MIN_SDK }}"'/' "$GRADLE"
          sed -i 's/targetSdk = .*/targetSdk = '"${{ env.TARGET_SDK }}"'/' "$GRADLE"

          # ProGuard
          if [ "${{ env.USE_PROGUARD }}" = "true" ]; then
            sed -i 's/isMinifyEnabled = .*/isMinifyEnabled = true/' "$GRADLE"
            sed -i 's/shrinkResources = .*/shrinkResources = true/' "$GRADLE"
          fi
          echo "✅ Gradle configured"

      - name: Enable cleartext traffic for HTTP
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q 'android:usesCleartextTraffic="true"' "$MANIFEST"; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$MANIFEST"
          fi

      - name: Fix Kotlin version and Java compatibility
        run: |
          # Kotlin version in settings.gradle.kts
          SETTINGS="android/settings.gradle.kts"
          if [ -f "$SETTINGS" ]; then
            sed -i 's/id "org.jetbrains.kotlin.android" version ".*"/id "org.jetbrains.kotlin.android" version "2.0.20"/' "$SETTINGS"
          fi
          # Gradle properties
          cat > android/gradle.properties <<EOF
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          EOF
          # app/build.gradle.kts: add compileOptions and kotlinOptions
          APP_GRADLE="android/app/build.gradle.kts"
          if ! grep -q "compileOptions" "$APP_GRADLE"; then
            sed -i '/android {/a \    compileOptions {\n        sourceCompatibility = JavaVersion.VERSION_17\n        targetCompatibility = JavaVersion.VERSION_17\n    }' "$APP_GRADLE"
          fi
          if ! grep -q "kotlinOptions" "$APP_GRADLE"; then
            sed -i '/android {/a \    kotlinOptions {\n        jvmTarget = "17"\n    }' "$APP_GRADLE"
          fi
          # Ensure kotlin-stdlib dependency
          if ! grep -q "kotlin-stdlib" "$APP_GRADLE"; then
            sed -i '/dependencies {/a \    implementation("org.jetbrains.kotlin:kotlin-stdlib:2.0.20")' "$APP_GRADLE"
          fi
          echo "✅ Kotlin and Java compatibility fixed"

      - name: Build release APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-${{ env.PACKAGE_NAME }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk
