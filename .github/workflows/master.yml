name: 🔥 Fixed Build with FlexColorScheme 8.1.1

on:
  repository_dispatch:
    types: [system_pro_build]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧹 Clean everything except .git and .github
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.github' -exec rm -rf {} +

      - name: ⚙️ Setup Flutter 3.27.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable

      - name: 📱 Create fresh Flutter project (dynamic package name)
        run: |
          NEW_PACKAGE="${{ github.event.client_payload.build_config.package_name }}"
          : "${NEW_PACKAGE:=com.systempro.ultra}"
          ORG=$(echo "$NEW_PACKAGE" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$NEW_PACKAGE" | rev | cut -d. -f1 | rev)
          echo "Using org=$ORG, project=$PROJ"
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android,ios .
          echo "✅ Fresh project created"

      - name: 📄 Write pubspec.yaml (flex_color_scheme 8.1.1)
        run: |
          cat > pubspec.yaml << 'EOF'
          name: system_pro_ultra
          description: System Pro Ultra with FlexColorScheme
          version: 1.0.0+1
          environment:
            sdk: ">=3.4.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            flex_color_scheme: ^8.1.1
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^4.0.0
          flutter:
            uses-material-design: true
          EOF
          echo "✅ pubspec.yaml ready"

      - name: 🎨 Write main.dart (FlexColorScheme theme)
        run: |
          cat > lib/main.dart << 'MAIN'
          import 'package:flutter/material.dart';
          import 'package:flex_color_scheme/flex_color_scheme.dart';

          void main() => runApp(const MyApp());

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'System Pro Ultra',
                theme: FlexThemeData.light(
                  scheme: FlexScheme.mango,
                  useMaterial3: true,
                ),
                darkTheme: FlexThemeData.dark(
                  scheme: FlexScheme.mango,
                  useMaterial3: true,
                ),
                themeMode: ThemeMode.system,
                home: const MyHomePage(),
              );
            }
          }

          class MyHomePage extends StatelessWidget {
            const MyHomePage({super.key});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text('System Pro Ultra')),
                body: const Center(
                  child: Text('FlexColorScheme 8.1.1 working!'),
                ),
              );
            }
          }
          MAIN
          echo "✅ main.dart ready"

      - name: 🛠️ Fix Android files (remove package from manifest, add namespace to build.gradle)
        run: |
          # Correct AndroidManifest.xml without package attribute
          cat > android/app/src/main/AndroidManifest.xml << 'MANI'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="System Pro Ultra"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:theme="@style/LaunchTheme">
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANI

          # Correct styles.xml
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/styles.xml << 'STY'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Light.NoTitleBar">
                  <item name="android:windowBackground">@drawable/launch_background</item>
              </style>
          </resources>
          STY

          # Add namespace to build.gradle (if not present)
          GRADLE="android/app/build.gradle"
          if ! grep -q "namespace" "$GRADLE"; then
            # Insert namespace after android { line
            sed -i '/android {/a \    namespace "com.systempro.ultra"' "$GRADLE"
          fi
          echo "✅ Android files fixed (no package in manifest, namespace added)"

      - name: 🔄 Apply UI payload (app name, SDK versions, permissions, icon)
        run: |
          APP_NAME="${{ github.event.client_payload.build_config.app_display_name }}"
          MIN_SDK="${{ github.event.client_payload.build_config.min_sdk }}"
          TARGET_SDK="${{ github.event.client_payload.build_config.target_sdk }}"
          PROGUARD="${{ github.event.client_payload.build_config.use_proguard }}"
          : "${APP_NAME:=System Pro Ultra}"
          : "${MIN_SDK:=21}"
          : "${TARGET_SDK:=34}"
          : "${PROGUARD:=false}"

          MANIFEST="android/app/src/main/AndroidManifest.xml"
          GRADLE="android/app/build.gradle"

          sed -i "s/android:label=\".*\"/android:label=\"${APP_NAME}\"/" "$MANIFEST"

          # Update minSdk / targetSdk (both in defaultConfig)
          sed -i "s/minSdk[[:space:]]*=[[:space:]]*[0-9]\+/minSdk = ${MIN_SDK}/" "$GRADLE"
          sed -i "s/targetSdk[[:space:]]*=[[:space:]]*[0-9]\+/targetSdk = ${TARGET_SDK}/" "$GRADLE"
          sed -i "s/minSdk[[:space:]]\+[0-9]\+/minSdk = ${MIN_SDK}/" "$GRADLE"
          sed -i "s/targetSdk[[:space:]]\+[0-9]\+/targetSdk = ${TARGET_SDK}/" "$GRADLE"
          if [ "$PROGUARD" = "true" ]; then
            sed -i "s/minifyEnabled[[:space:]]*=[[:space:]]*false/minifyEnabled = true/" "$GRADLE"
          fi

          # Permissions
          PERMS_JSON='${{ toJson(github.event.client_payload.permissions) }}'
          if command -v jq &> /dev/null || sudo apt-get update && sudo apt-get install -y jq; then
            if [ -n "$PERMS_JSON" ] && [ "$PERMS_JSON" != "null" ]; then
              add_perm() {
                if ! grep -q "$2" "$MANIFEST"; then
                  sed -i "/<manifest>/a \    $1" "$MANIFEST"
                fi
              }
              echo "$PERMS_JSON" | jq -r 'to_entries[] | select(.value==true) | .key' | while read perm; do
                case $perm in
                  storage) add_perm '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' "READ_EXTERNAL_STORAGE"
                           add_perm '<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' "WRITE_EXTERNAL_STORAGE" ;;
                  camera) add_perm '<uses-permission android:name="android.permission.CAMERA" />' "CAMERA" ;;
                  bluetooth) add_perm '<uses-permission android:name="android.permission.BLUETOOTH" />' "BLUETOOTH"
                             add_perm '<uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />' "BLUETOOTH_ADMIN"
                             add_perm '<uses-permission android:name="android.permission.BLUETOOTH_SCAN" />' "BLUETOOTH_SCAN"
                             add_perm '<uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />' "BLUETOOTH_CONNECT" ;;
                  microphone) add_perm '<uses-permission android:name="android.permission.RECORD_AUDIO" />' "RECORD_AUDIO" ;;
                  contacts) add_perm '<uses-permission android:name="android.permission.READ_CONTACTS" />' "READ_CONTACTS"
                            add_perm '<uses-permission android:name="android.permission.WRITE_CONTACTS" />' "WRITE_CONTACTS" ;;
                  notif) add_perm '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "POST_NOTIFICATIONS" ;;
                  foreground) add_perm '<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' "FOREGROUND_SERVICE" ;;
                  sms) add_perm '<uses-permission android:name="android.permission.SEND_SMS" />' "SEND_SMS"
                       add_perm '<uses-permission android:name="android.permission.READ_SMS" />' "READ_SMS" ;;
                  vibrate) add_perm '<uses-permission android:name="android.permission.VIBRATE" />' "VIBRATE" ;;
                esac
              done
              LOC=$(echo "$PERMS_JSON" | jq -r '.location_granularity // ""')
              if [ "$LOC" = "fine" ]; then
                add_perm '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' "ACCESS_FINE_LOCATION"
              elif [ "$LOC" = "coarse" ]; then
                add_perm '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' "ACCESS_COARSE_LOCATION"
              fi
            fi
          fi

          # App icon
          ICON_B64="${{ github.event.client_payload.assets.app_icon_base64 }}"
          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "null" ]; then
            mkdir -p android/app/src/main/res/mipmap-hdpi
            echo "$ICON_B64" | base64 -d > android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            for density in mdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$density
              cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-$density/
            done
            echo "✅ App icon applied"
          fi

      - name: 🏗️ Build APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Build-${{ github.run_id }}
          path: build/app/outputs/flutter-apk/*.apk

      - name: 💾 Commit clean state (optional)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "🧹 Fixed Android manifest (no package attribute) + FlexColorScheme 8.1.1"
          git push || true
