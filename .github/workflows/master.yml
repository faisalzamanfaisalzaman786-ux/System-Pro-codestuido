name: System Pro Master Engine

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 🧬 Titan Ingestion Engine
        run: |
          python3 - <<EOF
          import json, os, re, base64

          try:
              raw_payload = r'''${{ toJson(github.event.client_payload) }}'''
              data = json.loads(raw_payload)
              
              config = data.get('build_config', {})
              app_name = config.get('app_display_name', 'System Pro App')
              pkg_name = config.get('package_name', 'com.systempro.ultra')
              
              # 1. Pubspec Cleanup (No more duplicates)
              if os.path.exists('pubspec.yaml'):
                  with open('pubspec.yaml', 'r') as f: lines = f.readlines()
                  new_lines = []
                  skip_keys = ['permission_handler', 'http'] # یہ کیز دوبارہ نہیں لکھیں گے
                  for line in lines:
                      if any(k in line for k in skip_keys) and '^' in line:
                          continue
                      new_lines.append(line)
                  # آخر میں صرف ایک بار یہ کیز شامل کریں
                  new_lines.insert(-1, "  permission_handler: ^11.3.0\n")
                  new_lines.insert(-1, "  http: ^1.2.0\n")
                  with open('pubspec.yaml', 'w') as f: f.writelines(new_lines)

              # 2. Icon Engine (Deep Injection)
              icon_b64 = data.get('assets', {}).get('app_icon_base64', None)
              if icon_b64:
                  if "," in icon_b64: icon_b64 = icon_b64.split(",")[1]
                  img_data = base64.b64decode(icon_b64)
                  res_dir = 'android/app/src/main/res/'
                  # تمام میپ میپ فولڈرز اور ڈرائبل میں آئیکن ڈالنا
                  target_folders = [f for f in os.listdir(res_dir) if 'mipmap' in f or 'drawable' in f]
                  for folder in target_folders:
                      for filename in ['ic_launcher.png', 'launcher_icon.png']:
                          target = os.path.join(res_dir, folder, filename)
                          os.makedirs(os.path.dirname(target), exist_ok=True)
                          with open(target, 'wb') as f: f.write(img_data)
                  print("✅ Icon Injected in all folders")

              # 3. Branding (Name & Package)
              m_path = 'android/app/src/main/AndroidManifest.xml'
              if os.path.exists(m_path):
                  with open(m_path, 'r') as f: c = f.read()
                  c = re.sub(r'android:label="[^"]*"', f'android:label="{app_name}"', c)
                  c = c.replace('com.systempro.ultra', pkg_name)
                  with open(m_path, 'w') as f: f.write(c)

              g_path = 'android/app/build.gradle'
              if os.path.exists(g_path):
                  with open(g_path, 'r') as f: c = f.read()
                  c = c.replace('com.systempro.ultra', pkg_name)
                  with open(g_path, 'w') as f: f.write(c)

              # 4. Source Code Injection
              main_code = data.get('source_files', {}).get('main_dart', '')
              if main_code:
                  os.makedirs('lib', exist_ok=True)
                  with open('lib/main.dart', 'w', encoding='utf-8') as f: f.write(main_code)

              print(f"🚀 Engine Optimized for {app_name}")
          except Exception as e:
              print(f"❌ Error: {e}"); exit(1)
          EOF

      - name: 🏗️ Build Pro APK
        run: |
          flutter pub upgrade
          flutter build apk --release --no-tree-shake-icons

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Release
          path: build/app/outputs/flutter-apk/*.apk
