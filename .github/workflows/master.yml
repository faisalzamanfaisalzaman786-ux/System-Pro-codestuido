name: Filter App Builder (Signed + AAB)

on:
  repository_dispatch:
    types: [filter_app_build]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Save payload
        run: echo '${{ toJson(github.event.client_payload) }}' > payload.json

      - name: Extract config
        run: |
          PACKAGE_NAME=$(jq -r '.build_config.package_name // "com.filter.app"' payload.json)
          APP_NAME=$(jq -r '.build_config.app_display_name // "Filter App"' payload.json)
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV

      - name: Create fresh Flutter project
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PKG" | rev | cut -d. -f1 | rev | tr '-' '_' | sed 's/^[0-9]/_&/')
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android .

      - name: Write main.dart
        run: |
          MAIN_B64=$(jq -r '.source_files.main_dart // ""' payload.json)
          [ -z "$MAIN_B64" ] || [ "$MAIN_B64" = "null" ] && echo "❌ No main.dart" && exit 1
          echo "$MAIN_B64" | base64 -d > lib/main.dart

      - name: Write AndroidManifest.xml
        run: |
          MANIFEST_B64=$(jq -r '.source_files.android_manifest // ""' payload.json)
          [ -z "$MANIFEST_B64" ] || [ "$MANIFEST_B64" = "null" ] && echo "❌ No manifest" && exit 1
          mkdir -p android/app/src/main
          echo "$MANIFEST_B64" | base64 -d > android/app/src/main/AndroidManifest.xml

      - name: Write pubspec.yaml from payload
        run: |
          PUBSPEC_B64=$(jq -r '.source_files.pubspec_yaml // ""' payload.json)
          if [ -n "$PUBSPEC_B64" ] && [ "$PUBSPEC_B64" != "null" ]; then
            echo "$PUBSPEC_B64" | base64 -d > pubspec.yaml
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Create assets folder
        run: mkdir -p assets

      # ========== RELEASE SIGNING SETUP ==========
      - name: Decode Keystore
        run: |
          if [ -n "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > android/app/release-keystore.jks
          else
            echo "No keystore secret – using debug signing"
          fi

      - name: Create key.properties
        run: |
          if [ -f "android/app/release-keystore.jks" ]; then
            cat > android/key.properties <<EOF
          storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}
          keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}
          storeFile=release-keystore.jks
          EOF
          else
            echo "No keystore file – skipping key.properties"
          fi

      - name: Write top-level build.gradle
        run: |
          cat > android/build.gradle <<'BUILD_GRADLE_TOP'
          buildscript {
              ext.kotlin_version = '1.9.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register('clean', Delete) {
              delete rootProject.buildDir
          }
          BUILD_GRADLE_TOP

      - name: Write app/build.gradle (conditional)
        run: |
          if [ -f "android/key.properties" ]; then
            cat > android/app/build.gradle <<'APP_GRADLE_SIGNED'
            plugins {
                id "com.android.application"
                id "kotlin-android"
                id "dev.flutter.flutter-gradle-plugin"
            }
            def keystoreProperties = new Properties()
            def keystorePropertiesFile = rootProject.file('key.properties')
            if (keystorePropertiesFile.exists()) {
                keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
            }
            android {
                namespace "${{ env.PACKAGE_NAME }}"
                compileSdk = 35
                compileOptions {
                    sourceCompatibility = JavaVersion.VERSION_17
                    targetCompatibility = JavaVersion.VERSION_17
                }
                kotlinOptions {
                    jvmTarget = "17"
                }
                defaultConfig {
                    applicationId = "${{ env.PACKAGE_NAME }}"
                    minSdk = 21
                    targetSdk = 34
                    versionCode = 1
                    versionName = "1.0"
                }
                signingConfigs {
                    release {
                        keyAlias keystoreProperties['keyAlias']
                        keyPassword keystoreProperties['keyPassword']
                        storeFile file(keystoreProperties['storeFile'] ?: "release-keystore.jks")
                        storePassword keystoreProperties['storePassword']
                    }
                }
                buildTypes {
                    release {
                        signingConfig signingConfigs.release
                        minifyEnabled false
                        shrinkResources false
                    }
                }
            }
            flutter {
                source = "../.."
            }
            APP_GRADLE_SIGNED
          else
            cat > android/app/build.gradle <<'APP_GRADLE_DEBUG'
            plugins {
                id "com.android.application"
                id "kotlin-android"
                id "dev.flutter.flutter-gradle-plugin"
            }
            android {
                namespace "${{ env.PACKAGE_NAME }}"
                compileSdk = 35
                compileOptions {
                    sourceCompatibility = JavaVersion.VERSION_17
                    targetCompatibility = JavaVersion.VERSION_17
                }
                kotlinOptions {
                    jvmTarget = "17"
                }
                defaultConfig {
                    applicationId = "${{ env.PACKAGE_NAME }}"
                    minSdk = 21
                    targetSdk = 34
                    versionCode = 1
                    versionName = "1.0"
                }
                buildTypes {
                    release {
                        signingConfig = signingConfigs.debug
                        minifyEnabled = false
                        shrinkResources = false
                    }
                }
            }
            flutter {
                source = "../.."
            }
            APP_GRADLE_DEBUG
          fi

      - name: Update app name
        run: |
          sed -i "s/android:label=\".*\"/android:label=\"${{ env.APP_NAME }}\"/" android/app/src/main/AndroidManifest.xml

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Extract and apply custom icon
        run: |
          ICON_B64=$(jq -r '.assets.app_icon_base64 // ""' payload.json)
          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "null" ]; then
            echo "$ICON_B64" | base64 -d > /tmp/icon_raw.png
            for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              case $density in
                mdpi) size=48 ;;
                hdpi) size=72 ;;
                xhdpi) size=96 ;;
                xxhdpi) size=144 ;;
                xxxhdpi) size=192 ;;
              esac
              mkdir -p android/app/src/main/res/mipmap-$density
              convert /tmp/icon_raw.png -resize ${size}x${size} android/app/src/main/res/mipmap-$density/ic_launcher.png
            done
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FilterApp-APK-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: FilterApp-AAB-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
