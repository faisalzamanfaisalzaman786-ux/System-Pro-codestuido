name: System Pro Master Engine
on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.5

      - name: System Init
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            flutter create --platforms=android --project-name=system_pro .
          fi
          # پرانی اینڈرائیڈ فائلز ہٹانا تاکہ نئے ورژن انجیکٹ ہوں
          rm -rf android/app/build.gradle android/settings.gradle

      - name: Write Android Config
        run: |
          cat <<EOF > android/settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
              id "com.android.application" version "8.2.1" apply false
              id "org.jetbrains.kotlin.android" version "1.9.22" apply false
          }
          include ":app"
          EOF

      - name: Clean & Inject Dependencies
        run: |
          # ڈپلیکیٹ کیز سے بچنے کے لیے پہلے صفائی
          sed -i '/home_widget:/d' pubspec.yaml
          sed -i '/torch_light:/d' pubspec.yaml
          sed -i '/http:/d' pubspec.yaml
          sed -i '/permission_handler:/d' pubspec.yaml
          # اب ترتیب سے نئی ڈیپینڈینسیز ڈالنا
          sed -i '/dependencies:/a \  home_widget: ^0.7.0\n  torch_light: ^1.1.0\n  http: ^1.2.0\n  permission_handler: ^11.3.0' pubspec.yaml

      - name: Prepare Dart Code
        run: |
          mkdir -p lib
          printf '%s\n' "${{ github.event.client_payload.source_files.main_dart }}" > lib/main.dart
          # ٹارچ اور اویٹ کے مسائل کا حل
          sed -i "s/package:torch\/torch.dart/package:torch_light\/torch_light.dart/g" lib/main.dart
          sed -i "s/await await/await/g" lib/main.dart
          sed -i "s/Torch.hasTorch/await TorchLight.isTorchAvailable()/g" lib/main.dart
          sed -i "s/Torch.turnOn()/await TorchLight.enableTorch()/g" lib/main.dart
          sed -i "s/Torch.turnOff()/await TorchLight.disableTorch()/g" lib/main.dart
          # ڈبل اویٹ کی دوبارہ صفائی
          sed -i "s/await await/await/g" lib/main.dart

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V6-6
          path: build/app/outputs/flutter-apk/*.apk
