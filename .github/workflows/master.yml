name: System Pro Universal Builder

on:
  repository_dispatch:
    types: [system_pro_build]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable

      - name: Decode base64 source files from payload
        run: |
          set -e
          echo "📦 Decoding base64 source files..."
          mkdir -p lib android/app/src/main

          decode_b64() {
            local b64="$1"
            local out="$2"
            if [ -n "$b64" ] && [ "$b64" != "null" ]; then
              echo "$b64" | base64 -d > "$out"
              echo "✅ Created $out"
            else
              echo "❌ Missing or null base64 for $out - using fallback"
              return 1
            fi
          }

          # main.dart
          MAIN_B64='${{ github.event.client_payload.source_files.main_dart }}'
          if ! decode_b64 "$MAIN_B64" lib/main.dart; then
            cat > lib/main.dart <<'EOF'
          // Fallback main.dart
          import 'package:flutter/material.dart';
          void main() => runApp(MyApp());
          class MyApp extends StatelessWidget {
            @override Widget build(BuildContext context) => MaterialApp(home: Scaffold(body: Center(child: Text('Error: No main.dart'))));
          }
          EOF
            echo "⚠️ Using fallback main.dart"
          fi

          # AndroidManifest.xml
          MANIFEST_B64='${{ github.event.client_payload.source_files.android_manifest }}'
          if ! decode_b64 "$MANIFEST_B64" android/app/src/main/AndroidManifest.xml; then
            cat > android/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.systempro.fallback">
              <application android:label="Fallback App" android:icon="@mipmap/ic_launcher" android:usesCleartextTraffic="true"/>
          </manifest>
          EOF
            echo "⚠️ Using fallback AndroidManifest.xml"
          fi

          # build.gradle
          GRADLE_B64='${{ github.event.client_payload.source_files.build_gradle }}'
          if ! decode_b64 "$GRADLE_B64" android/app/build.gradle; then
            # Updated template with namespace (robust)
            cat > android/app/build.gradle <<'EOF'
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) { localPropertiesFile.withInputStream { localProperties.load(it) } }
          def flutterRoot = localProperties.getProperty('flutter.sdk')
          if (flutterRoot == null) { throw new GradleException("Flutter SDK not found.") }
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
          android {
              namespace "com.systempro.template"
              compileSdk 34
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
              defaultConfig {
                  applicationId "com.systempro.template"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          flutter {
              source '../..'
          }
          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
          }
          EOF
            echo "⚠️ Using fallback build.gradle with namespace"
          fi

          # pubspec.yaml
          PUBSPEC_B64='${{ github.event.client_payload.source_files.pubspec }}'
          if ! decode_b64 "$PUBSPEC_B64" pubspec.yaml; then
            cat > pubspec.yaml <<'EOF'
          name: system_pro_app
          description: Auto-generated fallback
          version: 1.0.0+1
          environment:
            sdk: '>=3.4.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
            permission_handler: ^11.3.0
            http: ^1.2.0
            shared_preferences: ^2.2.3
          dev_d
