name: Stable Base (Use Repo AndroidManifest from Backup)

on:
  repository_dispatch:
    types: [filter_app_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      # ============================================================
      # DOWNLOAD SOURCE FROM GIST (ADVANCED ICON HANDLING)
      # ============================================================
      - name: Download source from Gist
        run: |
          GIST_ID="${{ github.event.client_payload.gist_id }}"
          
          if [ -z "$GIST_ID" ] || [ "$GIST_ID" = "null" ]; then
            echo "❌ No gist_id provided in payload"
            exit 1
          fi
          
          echo "📦 Downloading from Gist: $GIST_ID"
          
          # Create lib directory
          mkdir -p lib
          
          # ========================================
          # Download main.dart
          # ========================================
          echo "📄 Downloading main.dart..."
          curl -s -L --retry 3 \
            "https://gist.githubusercontent.com/raw/$GIST_ID/main.dart" \
            -o lib/main.dart 2>/dev/null
          
          if [ ! -s lib/main.dart ]; then
            echo "Raw URL failed, using GitHub API..."
            curl -s -L --retry 3 \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/gists/$GIST_ID" \
              -o gist_response.json
            
            jq -r '.files["main.dart"].content' gist_response.json | \
              tr -d '\r' > lib/main.dart
          fi
          
          # ========================================
          # Download icon with MULTIPLE FIXING ATTEMPTS
          # ========================================
          echo "🖼️ Downloading icon..."
          
          # Attempt 1: Raw URL
          curl -s -L --retry 3 \
            "https://gist.githubusercontent.com/raw/$GIST_ID/icon.png" \
            -o icon.png 2>/dev/null
          
          # Attempt 2: From existing API response
          if [ ! -s icon.png ] && [ -f "gist_response.json" ]; then
            ICON_CONTENT=$(jq -r '.files["icon.png"].content // empty' gist_response.json)
            if [ -n "$ICON_CONTENT" ] && [ "$ICON_CONTENT" != "null" ] && [ "$ICON_CONTENT" != "" ]; then
              echo "$ICON_CONTENT" | base64 -d > icon.png 2>/dev/null
              echo "✅ Icon decoded from API response"
            fi
          fi
          
          # Attempt 3: Fresh API call
          if [ ! -s icon.png ]; then
            curl -s -L --retry 3 \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/gists/$GIST_ID" \
              -o gist_fresh.json
            
            ICON_CONTENT=$(jq -r '.files["icon.png"].content // empty' gist_fresh.json)
            if [ -n "$ICON_CONTENT" ] && [ "$ICON_CONTENT" != "null" ] && [ "$ICON_CONTENT" != "" ]; then
              echo "$ICON_CONTENT" | base64 -d > icon.png 2>/dev/null
              echo "✅ Icon decoded from fresh API call"
            fi
            rm -f gist_fresh.json
          fi
          
          # Attempt 4: Handle double-encoded base64
          if [ -s icon.png ] && file icon.png | grep -q "ASCII"; then
            echo "⚠️ Icon appears to be ASCII, trying double decode..."
            cat icon.png | base64 -d > icon_decoded.png 2>/dev/null
            if [ -s icon_decoded.png ] && file icon_decoded.png | grep -q "PNG"; then
              mv icon_decoded.png icon.png
              echo "✅ Double decode successful!"
            fi
          fi
          
          # Attempt 5: Handle corrupted PNG header
          if [ -s icon.png ] && ! file icon.png | grep -q "PNG"; then
            echo "⚠️ Attempting to fix PNG header..."
            # Check if it starts with valid PNG signature
            if [ "$(head -c 8 icon.png | xxd -p)" != "89504e470d0a1a0a" ]; then
              echo "PNG signature missing, trying to repair..."
              printf "\x89PNG\r\n\x1a\n" | cat - icon.png > icon_fixed.png 2>/dev/null
              mv icon_fixed.png icon.png
            fi
          fi
          
          # ========================================
          # Verify and clean main.dart
          # ========================================
          if [ ! -s lib/main.dart ]; then
            echo "❌ main.dart is empty or not found"
            exit 1
          fi
          
          # Remove BOM and null bytes
          sed -i '1s/^\xEF\xBB\xBF//' lib/main.dart
          tr -d '\0' < lib/main.dart > lib/main_clean.dart
          mv lib/main_clean.dart lib/main.dart
          
          echo "✅ main.dart: $(wc -c < lib/main.dart) bytes"
          echo "First line: $(head -1 lib/main.dart)"
          
          # ========================================
          # Final icon verification
          # ========================================
          if [ -s icon.png ]; then
            if file icon.png | grep -q "PNG"; then
              echo "✅ ICON OK: $(wc -c < icon.png) bytes, PNG image"
            else
              echo "⚠️ ICON ISSUE: $(file icon.png)"
              echo "Will use default icon"
              rm -f icon.png
            fi
          else
            echo "ℹ️ No valid icon provided"
          fi
          
          # ========================================
          # Verify checksum
          # ========================================
          EXPECTED_CHECKSUM="${{ github.event.client_payload.checksum }}"
          if [ -n "$EXPECTED_CHECKSUM" ] && [ "$EXPECTED_CHECKSUM" != "null" ]; then
            ACTUAL_CHECKSUM=$(sha256sum lib/main.dart | cut -d' ' -f1)
            if [ "$EXPECTED_CHECKSUM" != "$ACTUAL_CHECKSUM" ]; then
              echo "❌ Checksum mismatch!"
              exit 1
            fi
            echo "✅ Checksum verified"
          fi
          
          rm -f gist_response.json

      - name: Extract build config from payload
        run: |
          echo "PACKAGE_NAME=${{ github.event.client_payload.build_config.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.build_config.app_display_name }}" >> $GITHUB_ENV
          echo "MIN_SDK=${{ github.event.client_payload.build_config.min_sdk }}" >> $GITHUB_ENV
          echo "TARGET_SDK=${{ github.event.client_payload.build_config.target_sdk }}" >> $GITHUB_ENV
          echo "USE_PROGUARD=${{ github.event.client_payload.build_config.use_proguard }}" >> $GITHUB_ENV
          
          echo "✅ Build config extracted"

      - name: Create fresh Flutter project
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PKG" | rev | cut -d. -f1 | rev)
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android .
          echo "✅ Fresh Flutter project created"

      - name: Verify main.dart
        run: |
          if [ ! -f "lib/main.dart" ]; then
            echo "❌ main.dart not found"
            exit 1
          fi
          echo "✅ main.dart verified"

      - name: Use repository pubspec.yaml
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            echo "❌ pubspec.yaml not found!"
            exit 1
          fi
          flutter pub get
          echo "✅ flutter pub get completed"

      - name: Copy custom AndroidManifest.xml from repository backup
        run: |
          if [ -f "android_manifest_backup/AndroidManifest.xml" ]; then
            cp android_manifest_backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
            echo "✅ Custom AndroidManifest.xml copied"
          else
            echo "❌ android_manifest_backup/AndroidManifest.xml not found"
            exit 1
          fi

      - name: Fix manifest merger conflicts
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q 'xmlns:tools=' "$MANIFEST"; then
            sed -i 's/<manifest /<manifest xmlns:tools="http:\/\/schemas.android.com\/tools" /' "$MANIFEST"
          fi
          echo "✅ Manifest fixes applied"

      - name: Remove deprecated package attribute
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if grep -q 'package="' "$MANIFEST"; then
            sed -i 's/package="[^"]*"//' "$MANIFEST"
          fi

      - name: Update app name in AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i "s/android:label=\".*\"/android:label=\"${{ env.APP_NAME }}\"/" $MANIFEST
          echo "✅ App name updated"

      - name: Fix Kotlin directory structure
        run: |
          PKG_PATH=$(echo "${{ env.PACKAGE_NAME }}" | tr '.' '/')
          mkdir -p android/app/src/main/kotlin/$PKG_PATH
          if [ -f "android/app/src/main/kotlin/com/example/app/MainActivity.kt" ]; then
            mv android/app/src/main/kotlin/com/example/app/MainActivity.kt android/app/src/main/kotlin/$PKG_PATH/MainActivity.kt
            rm -rf android/app/src/main/kotlin/com
          fi
          echo "✅ Kotlin structure fixed"

      - name: Generate build.gradle
        run: |
          rm -f android/build.gradle.kts android/app/build.gradle.kts
          cat > android/build.gradle <<'EOF'
          buildscript {
              ext.kotlin_version = '2.1.0'
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          rootProject.buildDir = '../build'
          subprojects { project.buildDir = "${rootProject.buildDir}/${project.name}" }
          subprojects { project.evaluationDependsOn(':app') }
          tasks.register('clean', Delete) { delete rootProject.buildDir }
          EOF

          cat > android/app/build.gradle <<EOF
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "${{ env.PACKAGE_NAME }}"
              compileSdk = 36
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
                  coreLibraryDesugaringEnabled true
              }
              kotlinOptions { jvmTarget = "17" }
              defaultConfig {
                  applicationId = "${{ env.PACKAGE_NAME }}"
                  minSdk = ${{ env.MIN_SDK }}
                  targetSdk = ${{ env.TARGET_SDK }}
                  versionCode = 1
                  versionName = "1.0"
                  multiDexEnabled true
              }
              buildTypes {
                  release {
                      signingConfig = signingConfigs.debug
                      minifyEnabled = ${{ env.USE_PROGUARD }}
                      shrinkResources = ${{ env.USE_PROGUARD }}
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug { minifyEnabled = false }
              }
          }
          flutter { source = "../.." }
          
          dependencies {
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
          }
          EOF
          echo "✅ build.gradle generated"

      # ============================================================
      # APPLY CUSTOM ICON (WITH ADVANCED FIXING)
      # ============================================================
      - name: Apply custom app icon
        run: |
          ICON_APPLIED=false
          
          if [ -f "icon.png" ] && [ -s "icon.png" ]; then
            echo "📷 Processing custom icon..."
            
            # Method 1: Check if already valid PNG
            if file icon.png | grep -q "PNG"; then
              echo "✅ Valid PNG detected"
              ICON_APPLIED=true
            fi
            
            # Method 2: Try to fix with ImageMagick (if available)
            if [ "$ICON_APPLIED" = "false" ]; then
              echo "Attempting to fix with ImageMagick..."
              sudo apt-get install -y imagemagick 2>/dev/null || true
              convert icon.png -resize 512x512 -background white -flatten -alpha off icon_fixed.png 2>/dev/null
              if [ -s icon_fixed.png ] && file icon_fixed.png | grep -q "PNG"; then
                mv icon_fixed.png icon.png
                echo "✅ Fixed with ImageMagick"
                ICON_APPLIED=true
              fi
            fi
            
            # Method 3: Manual PNG header fixing
            if [ "$ICON_APPLIED" = "false" ]; then
              echo "Attempting manual PNG fix..."
              # Check if content is base64
              if file icon.png | grep -q "ASCII"; then
                cat icon.png | base64 -d > icon_test.png 2>/dev/null
                if [ -s icon_test.png ] && file icon_test.png | grep -q "PNG"; then
                  mv icon_test.png icon.png
                  echo "✅ Fixed by base64 decoding"
                  ICON_APPLIED=true
                fi
              fi
            fi
            
            # Final apply if valid
            if [ "$ICON_APPLIED" = "true" ] && [ -s icon.png ]; then
              for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
                mkdir -p android/app/src/main/res/mipmap-$density
                cp icon.png android/app/src/main/res/mipmap-$density/ic_launcher.png
                cp icon.png android/app/src/main/res/mipmap-$density/ic_launcher_round.png
              done
              echo "✅ Custom icon applied to all densities"
            else
              echo "⚠️ Could not fix icon, using default Flutter icon"
              echo "Final file type: $(file icon.png 2>/dev/null || echo 'missing')"
            fi
          else
            echo "ℹ️ No custom icon provided"
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FilterApp-${{ env.PACKAGE_NAME }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk

      # ============================================================
      # CLEANUP
      # ============================================================
      - name: Cleanup temporary Gist
        if: always()
        run: |
          GIST_ID="${{ github.event.client_payload.gist_id }}"
          if [ -n "$GIST_ID" ] && [ "$GIST_ID" != "null" ]; then
            curl -X DELETE \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/gists/$GIST_ID" \
              --fail --silent || echo "⚠️ Gist may already be deleted"
            echo "✅ Temporary gist deleted: $GIST_ID"
          fi
