name: System Pro Master Engine

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 ریپوزٹری چیک آؤٹ
        uses: actions/checkout@v4

      - name: 🛠️ فلٹر انجن (اسمارٹ لوڈ)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 🧬 اے آئی اسمارٹ انجکشن (Auto-Fixer)
        run: |
          python3 - <<EOF
          import json, os, re, base64

          try:
              # ڈیٹا حاصل کرنا
              raw_payload = r'''${{ toJson(github.event.client_payload) }}'''
              data = json.loads(raw_payload)
              
              config = data.get('build_config', {})
              app_name = config.get('app_display_name', 'System Pro App')
              pkg_name = config.get('package_name', 'com.systempro.ultra')
              main_code = data.get('source_files', {}).get('main_dart', '')

              # 1. خودکار لائبریری ڈیٹیکٹر (Self-Healing)
              if os.path.exists('pubspec.yaml'):
                  with open('pubspec.yaml', 'r') as f: lines = f.readlines()
                  
                  # عام لائبریریز کی لسٹ جو ایرر دے سکتی ہیں
                  needed_libs = {
                      'torch': '  torch: ^1.0.0\n',
                      'http': '  http: ^1.2.0\n',
                      'permission_handler': '  permission_handler: ^11.3.0\n',
                      'shared_preferences': '  shared_preferences: ^2.2.2\n'
                  }
                  
                  # پرانی ڈوپلیکیٹ لائنز صاف کرنا
                  clean_lines = [l for l in lines if not any(k in l for k in needed_libs.keys())]
                  
                  final_lines = []
                  for line in clean_lines:
                      final_lines.append(line)
                      if line.strip() == "dependencies:":
                          # کوڈ اسکین کر کے ضروری لائبریری شامل کرنا
                          for key, value in needed_libs.items():
                              if key in main_code or (key == 'permission_handler'):
                                  final_lines.append(value)
                  
                  with open('pubspec.yaml', 'w') as f: f.writelines(final_lines)

              # 2. آئیکن انجن (Force Injection)
              icon_b64 = data.get('assets', {}).get('app_icon_base64', None)
              if icon_b64:
                  if "," in icon_b64: icon_b64 = icon_b64.split(",")[1]
                  img_data = base64.b64decode(icon_b64)
                  res_dir = 'android/app/src/main/res/'
                  for root, dirs, files in os.walk(res_dir):
                      if any(x in root for x in ['mipmap', 'drawable']):
                          for name in ['ic_launcher.png', 'launcher_icon.png', 'ic_launcher_round.png']:
                              with open(os.path.join(root, name), 'wb') as f: f.write(img_data)
                  print("✅ Icon Injected Successfully")

              # 3. برانڈنگ (Package & App Name)
              def update_file(path, old, new):
                  if os.path.exists(path):
                      with open(path, 'r') as f: content = f.read()
                      with open(path, 'w') as f: f.write(content.replace(old, new))

              update_file('android/app/src/main/AndroidManifest.xml', 'com.systempro.ultra', pkg_name)
              update_file('android/app/build.gradle', 'com.systempro.ultra', pkg_name)
              
              # ایپ کا نام مینی فیسٹ میں سیٹ کرنا
              m_path = 'android/app/src/main/AndroidManifest.xml'
              if os.path.exists(m_path):
                  with open(m_path, 'r') as f: c = f.read()
                  c = re.sub(r'android:label="[^"]*"', f'android:label="{app_name}"', c)
                  with open(m_path, 'w') as f: f.write(c)

              # 4. مین کوڈ انجکشن
              if main_code:
                  os.makedirs('lib', exist_ok=True)
                  with open('lib/main.dart', 'w', encoding='utf-8') as f: f.write(main_code)

              print(f"🚀 AI Engine ready for {app_name}")
          except Exception as e:
              print(f"❌ Smart Logic Error: {str(e)}"); exit(1)
          EOF

      - name: 🏗️ بلڈ اینڈرائیڈ (Auto-Repair Build)
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: 📤 اے آئی جنریٹڈ APK اپ لوڈ
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-AI-Build
          path: build/app/outputs/flutter-apk/*.apk
