name: 🔥 Universal App Builder

on:
  workflow_dispatch:
  repository_dispatch:
    types: [system_pro_build]   # یہ UI کے event_type سے match کرے گا

env:
  FLUTTER_VERSION: '3.29.2'
  NDK_VERSION: '26.3.11579264'
  KOTLIN_VERSION: '2.0.20'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 💾 Save Client Payload
        run: echo '${{ toJSON(github.event.client_payload) }}' > payload.json

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: 📦 Get Flutter Dependencies
        run: flutter pub get

      - name: 📱 Configure Android Project Core (Permissions + V2 Embedding)
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"

          # ---- فکس 1: انٹرنیٹ اور سٹوریج کی اجازتیں شامل کریں ----
          # پہلے چیک کریں کہ یہ پرمیشن پہلے سے موجود تو نہیں
          if ! grep -q "android.permission.INTERNET" "$MANIFEST_PATH"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST_PATH"
            echo "✅ Internet permission added."
          fi
          if ! grep -q "android.permission.READ_EXTERNAL_STORAGE" "$MANIFEST_PATH"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' "$MANIFEST_PATH"
            echo "✅ Read External Storage permission added."
          fi
          if ! grep -q "android.permission.WRITE_EXTERNAL_STORAGE" "$MANIFEST_PATH"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' "$MANIFEST_PATH"
            echo "✅ Write External Storage permission added."
          fi

          # ---- فکس 2: Flutter V2 Embedding کو فعال کریں ----
          # یہ پرانے اور نئے ورژن کے درمیان فرق کو ختم کرتا ہے
          if ! grep -q "flutterEmbedding" "$MANIFEST_PATH"; then
            sed -i '/<application/a\        <meta-data android:name="flutterEmbedding" android:value="2" />' "$MANIFEST_PATH"
            echo "✅ Flutter V2 Embedding enabled."
          fi

          # ---- آئیکن کے لیے فکس: پہلے سے موجود کسی بھی پرانی کنفیگریشن کو ہٹائیں ----
          # (اگر آپ نے flutter_launcher_icons استعمال کیا ہے تو یہ قدم اہم ہے)
          if grep -q "io.flutter.embedding.android.NormalTheme" "$MANIFEST_PATH"; then
            sed -i '/io.flutter.embedding.android.NormalTheme/d' "$MANIFEST_PATH"
            echo "✅ Removed old theme meta-data that was causing icon issues."
          fi

          # ---- Kotlin اور NDK ورژن کی ترتیبات درست کریں ----
          SETTINGS_GRADLE="android/settings.gradle.kts"
          if [ -f "$SETTINGS_GRADLE" ]; then
            sed -i 's/kotlin = "[^"]*"/kotlin = "${{ env.KOTLIN_VERSION }}"/' "$SETTINGS_GRADLE"
            echo "✅ Kotlin version updated."
          fi

          APP_GRADLE="android/app/build.gradle.kts"
          if [ -f "$APP_GRADLE" ]; then
            if ! grep -q "ndkVersion" "$APP_GRADLE"; then
              sed -i '/android {/a \    ndkVersion = "${{ env.NDK_VERSION }}"' "$APP_GRADLE"
            else
              sed -i 's/ndkVersion[[:space:]]*=[[:space:]]*"[^"]*"/ndkVersion = "${{ env.NDK_VERSION }}"/' "$APP_GRADLE"
            fi
            echo "✅ NDK version set."
          fi

      - name: 🎨 Override main.dart (if in payload)
        run: |
          MAIN_B64=$(jq -r '.client_payload.source_files.main_dart // empty' payload.json)
          if [[ -n "$MAIN_B64" && "$MAIN_B64" != "null" ]]; then
            echo "$MAIN_B64" | base64 -d > lib/main.dart
            echo "✅ main.dart replaced from payload."
          else
            echo "ℹ️ No main.dart in payload, keeping existing."
          fi

      - name: 🛠️ Auto-add Dependencies
        run: |
          if grep -q "import 'package:" lib/main.dart; then
            grep -oE "import 'package:([^/']+)" lib/main.dart | sed "s/import 'package://" | sort -u | while read pkg; do
              if [[ "$pkg" != "flutter" ]]; then
                echo "📦 Adding package: $pkg"
                flutter pub add "$pkg" || echo "⚠️ Failed to add $pkg"
              fi
            done
            flutter pub get
          else
            echo "ℹ️ No external packages found in main.dart"
          fi

      - name: 🔨 Build Release APK
        run: flutter build apk --release

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-APK-${{ github.run_id }}
          path: build/app/outputs/flutter-apk/*.apk
