name: Flutter Build Studio

on:
  repository_dispatch:
    types: [flutter_app_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Extract build config
        run: |
          echo "PACKAGE_NAME=${{ github.event.client_payload.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.app_name }}" >> $GITHUB_ENV
          echo "MIN_SDK=${{ github.event.client_payload.min_sdk }}" >> $GITHUB_ENV
          echo "TARGET_SDK=${{ github.event.client_payload.target_sdk }}" >> $GITHUB_ENV
          echo "HAS_ICON=${{ github.event.client_payload.has_icon }}" >> $GITHUB_ENV

      - name: Create fresh Flutter project
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PKG" | rev | cut -d. -f1 | rev)
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android .

      - name: Copy source files from repository
        run: |
          # Copy main.dart (note: source and destination are same because we're in repo root)
          # The main.dart is already in lib/ from the fresh project, but we overwrite with repo version
          if [ -f "lib/main.dart" ]; then
            echo "✅ main.dart exists in repository"
          else
            echo "❌ main.dart not found"
            exit 1
          fi
          
          # Copy pubspec.yaml and get dependencies
          if [ -f "pubspec.yaml" ]; then
            flutter pub get
            echo "✅ pubspec.yaml processed"
          else
            echo "❌ pubspec.yaml not found"
            exit 1
          fi
          
          # Copy AndroidManifest
          if [ -f "android_manifest_backup/AndroidManifest.xml" ]; then
            cp android_manifest_backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
            echo "✅ AndroidManifest.xml copied"
          else
            echo "⚠️ AndroidManifest.xml not found, using default"
          fi
          
          # Copy XML resources
          mkdir -p android/app/src/main/res/xml
          if [ -f "android_manifest_backup/file_paths.xml" ]; then
            cp android_manifest_backup/file_paths.xml android/app/src/main/res/xml/
            echo "✅ file_paths.xml copied"
          fi
          if [ -f "android_manifest_backup/network_security_config.xml" ]; then
            cp android_manifest_backup/network_security_config.xml android/app/src/main/res/xml/
            echo "✅ network_security_config.xml copied"
          fi

      - name: Update app name in manifest
        run: |
          if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
            sed -i "s/android:label=\".*\"/android:label=\"${{ env.APP_NAME }}\"/" android/app/src/main/AndroidManifest.xml
            echo "✅ App name updated to: ${{ env.APP_NAME }}"
          fi

      - name: Fix Kotlin structure
        run: |
          PKG_PATH=$(echo "${{ env.PACKAGE_NAME }}" | tr '.' '/')
          mkdir -p android/app/src/main/kotlin/$PKG_PATH
          if [ -f "android/app/src/main/kotlin/com/example/app/MainActivity.kt" ]; then
            mv android/app/src/main/kotlin/com/example/app/MainActivity.kt android/app/src/main/kotlin/$PKG_PATH/
            rm -rf android/app/src/main/kotlin/com
            echo "✅ Kotlin structure fixed"
          else
            echo "ℹ️ No Kotlin file to move"
          fi

      - name: Setup build.gradle with desugaring
        run: |
          cat > android/app/build.gradle << EOF
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "${{ env.PACKAGE_NAME }}"
              compileSdk = 36
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
                  coreLibraryDesugaringEnabled true
              }
              kotlinOptions { jvmTarget = "17" }
              defaultConfig {
                  applicationId = "${{ env.PACKAGE_NAME }}"
                  minSdk = 23
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
                  multiDexEnabled true
              }
              buildTypes {
                  release {
                      signingConfig = signingConfigs.debug
                      minifyEnabled = false
                      shrinkResources = false
                  }
                  debug {
                      minifyEnabled = false
                  }
              }
          }
          flutter { source = "../.." }
          dependencies {
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
          }
          EOF
          echo "✅ build.gradle configured with desugaring"

      - name: Apply custom app icon
        if: env.HAS_ICON == 'true'
        run: |
          if [ -f "assets/icon.png" ]; then
            if file assets/icon.png | grep -q "PNG"; then
              for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
                mkdir -p android/app/src/main/res/mipmap-$density
                cp assets/icon.png android/app/src/main/res/mipmap-$density/ic_launcher.png
                cp assets/icon.png android/app/src/main/res/mipmap-$density/ic_launcher_round.png
              done
              echo "✅ Custom icon applied"
            fi
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlutterApp-${{ env.PACKAGE_NAME }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Build Summary
        if: always()
        run: |
          echo "═══════════════════════════════════════════════════════════"
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ BUILD SUCCESSFUL"
          else
            echo "❌ BUILD FAILED"
          fi
          echo "═══════════════════════════════════════════════════════════"
          echo "Package: ${{ env.PACKAGE_NAME }}"
          echo "App Name: ${{ env.APP_NAME }}"
