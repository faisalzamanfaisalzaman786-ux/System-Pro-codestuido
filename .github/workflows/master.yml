name: System Pro Master Engine

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.5

      - name: Setup Android Project
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            flutter create --platforms=android --project-name=system_pro .
          elif [ ! -d "android" ]; then
            flutter create --platforms=android --no-overwrite .
          fi
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
          fi

      - name: Fix Dependencies
        run: |
          sed -i '/home_widget/d; /torch_light/d; /http/d; /permission_handler/d' pubspec.yaml
          sed -i '/dependencies:/a \  home_widget: ^0.7.0\n  torch_light: ^1.1.0\n  http: ^1.2.0\n  permission_handler: ^11.3.0' pubspec.yaml

      - name: Inject Source Code
        shell: python
        run: |
          import json, os
          with open(os.environ['GITHUB_EVENT_PATH'], 'r') as f:
              event = json.load(f)
          payload = event.get('client_payload', {})
          code = payload.get('source_files', {}).get('main_dart', '')
          if code:
              os.makedirs('lib', exist_ok=True)
              with open('lib/main.dart', 'w', encoding='utf-8') as f:
                  f.write(code)

      - name: Update Android Settings
        run: |
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.22"/g' android/settings.gradle
          sed -i "s/JavaVersion.VERSION_1_8/JavaVersion.VERSION_17/g" android/app/build.gradle
          sed -i "s/jvmTarget = '1.8'/jvmTarget = '17'/g" android/app/build.gradle

      - name: Build APK
        run: |
          cd android && ./gradlew clean && cd ..
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Build
          path: build/app/outputs/flutter-apk/*.apk
