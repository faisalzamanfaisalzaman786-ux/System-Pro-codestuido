name: System Pro Master Engine
on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.5

      - name: Force Reconstruction
        run: |
          # اینڈرائیڈ فولڈر کو مکمل جڑ سے ختم کرنا تاکہ سپورٹ کا مسئلہ نہ رہے
          rm -rf android
          # نیا پروجیکٹ اسٹرکچر بنانا
          flutter create --platforms=android --project-name=system_pro .
          # ڈپلیکیٹ انٹریز سے پاک پب اسپیک بنانا
          sed -i '/home_widget:/d; /torch_light:/d; /http:/d; /permission_handler:/d' pubspec.yaml
          sed -i '/dependencies:/a \  home_widget: ^0.7.0\n  torch_light: ^1.1.0\n  http: ^1.2.0\n  permission_handler: ^11.3.0' pubspec.yaml

      - name: Write Modern Android Config
        run: |
          # جدید ترین کوٹلن اور گریڈل سیٹنگز ڈالنا
          cat <<EOF > android/settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
              id "com.android.application" version "8.2.1" apply false
              id "org.jetbrains.kotlin.android" version "1.9.22" apply false
          }
          include ":app"
          EOF

      - name: Inject Clean Dart Code
        run: |
          mkdir -p lib
          printf '%s\n' "${{ github.event.client_payload.source_files.main_dart }}" > lib/main.dart
          # کوڈ کے اندر ٹارچ اور اویٹ کے مسائل درست کرنا
          sed -i "s/package:torch\/torch.dart/package:torch_light\/torch_light.dart/g" lib/main.dart
          sed -i "s/await await/await/g" lib/main.dart
          sed -i "s/Torch.hasTorch/await TorchLight.isTorchAvailable()/g" lib/main.dart
          sed -i "s/Torch.turnOn()/await TorchLight.enableTorch()/g" lib/main.dart
          sed -i "s/Torch.turnOff()/await TorchLight.disableTorch()/g" lib/main.dart
          sed -i "s/await await/await/g" lib/main.dart

      - name: Final Build Execution
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload System Pro APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V6-7
          path: build/app/outputs/flutter-apk/*.apk
