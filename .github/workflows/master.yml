name: 🔥 Final Stable Build (Safe YAML - No quoting issues)

on:
  repository_dispatch:
    types: [system_pro_build]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧹 Clean everything
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.github' ! -name 'pubspec.yaml' -exec rm -rf {} +
          rm -rf .dart_tool .packages pubspec.lock build android/.gradle ios/.symlinks android/app/build android/build .gradle
          echo "✅ Clean done"

      - name: ⚙️ Setup Flutter 3.29.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: stable

      - name: 📱 Create Flutter project
        run: |
          cp pubspec.yaml pubspec.yaml.backup
          NEW_PACKAGE="${{ github.event.client_payload.build_config.package_name }}"
          : "${NEW_PACKAGE:=com.systempro.ultra}"
          ORG=$(echo "$NEW_PACKAGE" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$NEW_PACKAGE" | rev | cut -d. -f1 | rev)
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android,ios .
          mv pubspec.yaml.backup pubspec.yaml
          echo "PACKAGE_NAME=$NEW_PACKAGE" >> $GITHUB_ENV

      # Write entire client_payload to a JSON file for safe parsing
      - name: 💾 Save payload to JSON file
        run: |
          cat > payload.json << 'EOF'
          ${{ toJSON(github.event.client_payload) }}
          EOF
          echo "✅ Payload saved"

      - name: 🔧 Fix Kotlin version
        run: |
          sed -i 's/id("org.jetbrains.kotlin.android") version "[^"]*"/id("org.jetbrains.kotlin.android") version "2.0.20"/' android/settings.gradle.kts

      - name: 🏗️ Fix Gradle files (NDK, minSdk, targetSdk)
        run: |
          APP_GRADLE="android/app/build.gradle.kts"
          if ! grep -q "ndkVersion" "$APP_GRADLE"; then
            sed -i '/android {/a \    ndkVersion = "27.0.12077973"' "$APP_GRADLE"
          else
            sed -i 's/ndkVersion[[:space:]]*=[[:space:]]*"[^"]*"/ndkVersion = "27.0.12077973"/' "$APP_GRADLE"
          fi
          sed -i 's/minSdk[[:space:]]*=[[:space:]]*[0-9]\+/minSdk = 21/' "$APP_GRADLE"
          sed -i 's/targetSdk[[:space:]]*=[[:space:]]*[0-9]\+/targetSdk = 34/' "$APP_GRADLE"

      - name: 📄 Apply pubspec.yaml
        run: |
          PUBSPEC_B64=$(jq -r '.source_files.pubspec // empty' payload.json)
          if [ -n "$PUBSPEC_B64" ] && [ "$PUBSPEC_B64" != "null" ]; then
            echo "$PUBSPEC_B64" | base64 -d > pubspec.yaml.new
            if grep -q "^name:" pubspec.yaml.new; then
              mv pubspec.yaml.new pubspec.yaml
              echo "✅ pubspec.yaml from payload"
            fi
          fi
          if [ ! -f pubspec.yaml ]; then
            cat > pubspec.yaml << 'EOF'
name: system_pro_ultra
description: Base project
version: 1.0.0+1
environment:
  sdk: ">=3.4.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  webview_flutter: ^4.13.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
flutter:
  uses-material-design: true
EOF
            echo "✅ Default pubspec.yaml"
          fi

      - name: 🎨 Override main.dart
        run: |
          MAIN_B64=$(jq -r '.source_files.main_dart // empty' payload.json)
          if [ -n "$MAIN_B64" ] && [ "$MAIN_B64" != "null" ]; then
            echo "$MAIN_B64" | base64 -d > lib/main.dart
            echo "✅ main.dart applied"
          fi

      - name: 🖼️ Override app icon
        run: |
          ICON_B64=$(jq -r '.assets.app_icon_base64 // empty' payload.json)
          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "null" ]; then
            mkdir -p android/app/src/main/res/mipmap-hdpi
            echo "$ICON_B64" | base64 -d > android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            for density in mdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$density
              cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-$density/ 2>/dev/null || true
            done
            echo "✅ App icon applied"
          fi

      - name: 📦 Auto-add dependencies
        run: |
          grep -oE "import 'package:([^/']+)" lib/main.dart | sed "s/import 'package://" | sort -u | while read pkg; do
            if [ "$pkg" != "flutter" ]; then
              dart pub add "$pkg" || true
            fi
          done
          flutter pub upgrade || true

      - name: ⚙️ Apply app config (name, SDK, permissions)
        run: |
          APP_NAME=$(jq -r '.build_config.app_display_name // "System Pro Ultra"' payload.json)
          MIN_SDK=$(jq -r '.build_config.min_sdk // 21' payload.json)
          TARGET_SDK=$(jq -r '.build_config.target_sdk // 34' payload.json)
          PROGUARD=$(jq -r '.build_config.use_proguard // false' payload.json)

          MANIFEST="android/app/src/main/AndroidManifest.xml"
          APP_GRADLE="android/app/build.gradle.kts"

          sed -i "s/android:label=\".*\"/android:label=\"$APP_NAME\"/" "$MANIFEST"
          sed -i "s/minSdk[[:space:]]*=[[:space:]]*[0-9]\+/minSdk = $MIN_SDK/" "$APP_GRADLE"
          sed -i "s/targetSdk[[:space:]]*=[[:space:]]*[0-9]\+/targetSdk = $TARGET_SDK/" "$APP_GRADLE"

          if [ "$PROGUARD" = "true" ]; then
            sed -i "s/isMinifyEnabled[[:space:]]*=[[:space:]]*false/isMinifyEnabled = true/" "$APP_GRADLE"
          fi

          # Extract permissions from payload.json
          PERMS_FILE="perms.json"
          jq '.permissions' payload.json > "$PERMS_FILE"

          add_perm() {
            if ! grep -q "$2" "$MANIFEST"; then
              sed -i "/<manifest>/a \    $1" "$MANIFEST"
            fi
          }

          add_perm '<uses-permission android:name="android.permission.INTERNET" />' "INTERNET"

          # Storage
          if [ "$(jq -r '.storage // false' "$PERMS_FILE")" = "true" ]; then
            add_perm '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' "READ_EXTERNAL_STORAGE"
            add_perm '<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' "WRITE_EXTERNAL_STORAGE"
          fi
          # Camera
          if [ "$(jq -r '.camera // false' "$PERMS_FILE")" = "true" ]; then
            add_perm '<uses-permission android:name="android.permission.CAMERA" />' "CAMERA"
          fi
          # Bluetooth
          if [ "$(jq -r '.bluetooth // false' "$PERMS_FILE")" = "true" ]; then
            add_perm '<uses-permission android:name="android.permission.BLUETOOTH" />' "BLUETOOTH"
            add_perm '<uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />' "BLUETOOTH_ADMIN"
            add_perm '<uses-permission android:name="android.permission.BLUETOOTH_SCAN" />' "BLUETOOTH_SCAN"
            add_perm '<uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />' "BLUETOOTH_CONNECT"
          fi
          # Microphone
          if [ "$(jq -r '.microphone // false' "$PERMS_FILE")" = "true" ]; then
            add_perm '<uses-permission android:name="android.permission.RECORD_AUDIO" />' "RECORD_AUDIO"
          fi
          # Contacts
          if [ "$(jq -r '.contacts // false' "$PERMS_FILE")" = "true" ]; then
            add_perm '<uses-permission android:name="android.permission.READ_CONTACTS" />' "READ_CONTACTS"
            add_perm '<uses-permission android:name="android.permission.WRITE_CONTACTS" />' "WRITE_CONTACTS"
          fi
          # Notifications
          if [ "$(jq -r '.notifications // false' "$PERMS_FILE")" = "true" ]; then
            add_perm '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "POST_NOTIFICATIONS"
          fi
          # Foreground service
          if [ "$(jq -r '.foreground_service // false' "$PERMS_FILE")" = "true" ]; then
            add_perm '<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' "FOREGROUND_SERVICE"
          fi
          # SMS
          if [ "$(jq -r '.sms // false' "$PERMS_FILE")" = "true" ]; then
            add_perm '<uses-permission android:name="android.permission.SEND_SMS" />' "SEND_SMS"
            add_perm '<uses-permission android:name="android.permission.READ_SMS" />' "READ_SMS"
          fi
          # Vibrate
          if [ "$(jq -r '.vibrate // false' "$PERMS_FILE")" = "true" ]; then
            add_perm '<uses-permission android:name="android.permission.VIBRATE" />' "VIBRATE"
          fi

          LOC=$(jq -r '.location_granularity // ""' "$PERMS_FILE")
          if [ "$LOC" = "fine" ]; then
            add_perm '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' "ACCESS_FINE_LOCATION"
          elif [ "$LOC" = "coarse" ]; then
            add_perm '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' "ACCESS_COARSE_LOCATION"
          fi

      - name: 🛠️ Final manifest and namespace fix
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/package="[^"]*" //' "$MANIFEST"
          sed -i 's/package="[^"]*"//' "$MANIFEST"

          APP_GRADLE="android/app/build.gradle.kts"
          PACKAGE_NAME="${{ env.PACKAGE_NAME }}"
          if ! grep -q "namespace" "$APP_GRADLE"; then
            sed -i "/android {/a \    namespace(\"$PACKAGE_NAME\")" "$APP_GRADLE"
          fi

          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/styles.xml << 'STY'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="LaunchTheme" parent="@android:style/Theme.Light.NoTitleBar">
        <item name="android:windowBackground">@drawable/launch_background</item>
    </style>
</resources>
STY

      - name: 🏗️ Build APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Stable-Build-${{ github.run_id }}
          path: build/app/outputs/flutter-apk/*.apk
