name: System Pro Master Engine

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Check out repository
        uses: actions/checkout@v4

      - name: 🚀 Setup Flutter (3.24.5)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.5'
          cache: true

      - name: 🛠️ Generate Android Files (Issue 5 Fix)
        run: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android .
          fi
          cd android && chmod +x gradlew && cd ..

      - name: 🧬 Force Fix Kotlin & Java (Issue 1, 2 & 5)
        run: |
          # settings.gradle میں ورژن لاک کرنا
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.22"/g' android/settings.gradle
          
          # build.gradle میں ورژن لاک کرنا
          if grep -q "ext.kotlin_version" android/build.gradle; then
            sed -i "s/ext.kotlin_version = .*/ext.kotlin_version = '1.9.22'/g" android/build.gradle
          else
            sed -i "/buildscript {/a \    ext.kotlin_version = '1.9.22'" android/build.gradle
          fi
          
          # Java 17 ٹارگٹ سیٹ کرنا
          sed -i "s/JavaVersion.VERSION_1_8/JavaVersion.VERSION_17/g" android/app/build.gradle
          sed -i "s/jvmTarget = '1.8'/jvmTarget = '17'/g" android/app/build.gradle

      - name: 🧬 Repair Pubspec & Code (Issue 3, 4 & 8)
        shell: python
        run: |
          import json, os, re

          # ڈیٹا لوڈ کرنا
          raw_payload = r'''${{ toJson(github.event.client_payload) }}'''
          data = json.loads(raw_payload)
          config = data.get('build_config', {})
          app_name = config.get('app_display_name', 'System Pro')
          pkg_name = config.get('package_name', 'com.systempro.ultra')
          main_code = data.get('source_files', {}).get('main_dart', '')

          # پب اسپیک کلین اپ (ڈپلیکیٹ ہٹانا)
          pub_path = 'pubspec.yaml'
          if os.path.exists(pub_path):
              with open(pub_path, 'r') as f: lines = f.readlines()
              targets = ['home_widget', 'torch_light', 'http', 'permission_handler']
              cleaned = [l for l in lines if not any(t in l for t in targets)]
              idx = next((i for i, s in enumerate(cleaned) if 'dependencies:' in s), -1)
              if idx != -1:
                  libs = ["  home_widget: ^0.7.0\n", "  torch_light: ^1.1.0\n", "  http: ^1.2.0\n", "  permission_handler: ^11.3.0\n"]
                  for lib in reversed(libs): cleaned.insert(idx + 1, lib)
              with open(pub_path, 'w') as f: f.writelines(cleaned)

          # مین کوڈ میں TorchLight API کی درستی
          if main_code:
              main_code = main_code.replace("package:torch/torch.dart", "package:torch_light/torch_light.dart")
              main_code = main_code.replace("Torch.hasTorch", "await TorchLight.hasTorch")
              main_code = main_code.replace("Torch.turnOn()", "await TorchLight.enableTorch()")
              main_code = main_code.replace("Torch.turnOff()", "await TorchLight.disableTorch()")
              os.makedirs('lib', exist_ok=True)
              with open('lib/main.dart', 'w', encoding='utf-8') as f: f.write(main_code)

          # مینی فیسٹ اپ ڈیٹ
          m_path = 'android/app/src/main/AndroidManifest.xml'
          if os.path.exists(m_path):
              with open(m_path, 'r') as f: m = f.read()
              m = re.sub(r'package="[^"]*"', f'package="{pkg_name}"', m)
              m = re.sub(r'android:label="[^"]*"', f'android:label="{app_name}"', m)
              with open(m_path, 'w') as f: f.write(m)

      - name: 🧹 Gradle Clean (Issue 6)
        run: |
          cd android
          ./gradlew clean
          cd ..

      - name: 🏗️ Build Release APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons --obfuscate --split-debug-info=./debug

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V4-Fixed
          path: build/app/outputs/flutter-apk/*.apk
