name: System Pro Master Engine

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 چیک آؤٹ
        uses: actions/checkout@v4

      - name: 🚀 فلٹر سٹیبل (3.24.5)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.5'
          cache: true

      - name: 🧬 سسٹم پرو الٹرا انجن (Clean Logic Edition)
        run: |
          python3 - <<EOF
          import json, os, re, base64

          try:
              raw_payload = r'''${{ toJson(github.event.client_payload) }}'''
              data = json.loads(raw_payload)
              config = data.get('build_config', {})
              
              app_name = config.get('app_display_name', 'System Pro')
              pkg_name = config.get('package_name', 'com.systempro.ultra')
              main_code = data.get('source_files', {}).get('main_dart', '')
              
              # 1. کوٹلن اور گریڈل فکس
              def fix_gradle():
                  r_gradle = 'android/build.gradle'
                  if os.path.exists(r_gradle):
                      with open(r_gradle, 'r') as f: c = f.read()
                      c = re.sub(r"ext\.kotlin_version = .*", "ext.kotlin_version = '1.9.10'", c)
                      with open(r_gradle, 'w') as f: f.write(c)
                  
                  s_gradle = 'android/settings.gradle'
                  if os.path.exists(s_gradle):
                      with open(s_gradle, 'r') as f: s = f.read()
                      s = re.sub(r'id "org\.jetbrains\.kotlin\.android" version "[^"]*"', 'id "org.jetbrains.kotlin.android" version "1.9.10"', s)
                      with open(s_gradle, 'w') as f: f.write(s)

              fix_gradle()

              # 2. پب اسپیک کلین اپ (Advanced Duplicate Prevention)
              pub_path = 'pubspec.yaml'
              if os.path.exists(pub_path):
                  with open(pub_path, 'r') as f: lines = f.readlines()
                  
                  # ان لائبریریز کو مٹانا جو ڈپلیکیٹ ہو سکتی ہیں
                  targets = ['home_widget', 'torch_light', 'http', 'permission_handler']
                  cleaned_lines = []
                  for line in lines:
                      if not any(t in line for t in targets):
                          cleaned_lines.append(line)
                  
                  # نئی لائبریریز کو محفوظ طریقے سے شامل کرنا
                  final_libs = [
                      '  home_widget: ^0.7.0\n',
                      '  torch_light: ^1.1.0\n',
                      '  http: ^1.2.0\n',
                      '  permission_handler: ^11.3.0\n'
                  ]
                  
                  for i, line in enumerate(cleaned_lines):
                      if 'dependencies:' in line:
                          for lib in final_libs:
                              cleaned_lines.insert(i + 1, lib)
                          break
                  
                  with open(pub_path, 'w') as f: f.writelines(cleaned_lines)

              # 3. مینی فیسٹ اور پیکیج نیم (Dynamic)
              manifest_path = 'android/app/src/main/AndroidManifest.xml'
              if os.path.exists(manifest_path):
                  with open(manifest_path, 'r') as f: m = f.read()
                  m = re.sub(r'package="[^"]*"', 'package="' + pkg_name + '"', m)
                  m = re.sub(r'android:label="[^"]*"', 'android:label="' + app_name + '"', m)
                  if 'ProWidgetProvider' not in m:
                      w_receiver = '\n        <receiver android:name=".ProWidgetProvider" android:exported="true"><intent-filter><action android:name="android.appwidget.action.APPWIDGET_UPDATE" /></intent-filter><meta-data android:name="android.appwidget.provider" android:resource="@xml/pro_widget_info" /></receiver>\n'
                      m = m.replace('</activity>', '</activity>' + w_receiver)
                  with open(manifest_path, 'w') as f: f.write(m)

              app_gradle = 'android/app/build.gradle'
              if os.path.exists(app_gradle):
                  with open(app_gradle, 'r') as f: g = f.read()
                  g = re.sub(r'applicationId "[^"]*"', 'applicationId "' + pkg_name + '"', g)
                  with open(app_gradle, 'w') as f: f.write(g)

              # 4. ویجٹ اور کوڈ انجکشن
              res_dir = 'android/app/src/main/res'
              os.makedirs(res_dir + '/layout', exist_ok=True); os.makedirs(res_dir + '/xml', exist_ok=True)
              with open(res_dir + '/layout/pro_widget_layout.xml', 'w') as f: f.write('<?xml version="1.0" encoding="utf-8"?>\n<RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#1A1A1A"><TextView android:layout_width="wrap_content" android:layout_height="wrap_content" android:text="' + app_name + '" android:textColor="#00FF00"/></RelativeLayout>')
              with open(res_dir + '/xml/pro_widget_info.xml', 'w') as f: f.write('<appwidget-provider xmlns:android="http://schemas.android.com/apk/res/android" android:initialLayout="@layout/pro_widget_layout"></appwidget-provider>')

              if main_code:
                  main_code = main_code.replace("hasTorch", "isTorchAvailable").replace("turnOn()", "enableTorch()")
                  os.makedirs('lib', exist_ok=True)
                  with open('lib/main.dart', 'w', encoding='utf-8') as f: f.write(main_code)

          except Exception as e:
              print(f"❌ Smart Error: {str(e)}"); exit(1)
          EOF

      - name: 🏗️ بلڈ اینڈرائیڈ ریلیز
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons --obfuscate --split-debug-info=./debug

      - name: 📤 APK اپ لوڈ
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Success-Build
          path: build/app/outputs/flutter-apk/*.apk
