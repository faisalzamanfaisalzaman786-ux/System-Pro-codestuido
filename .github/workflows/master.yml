      - name: 🧬 Dynamic Ingestion Engine
        run: |
          python3 - <<EOF
          import json
          import os
          import base64
          import re

          # ڈیٹا کو محفوظ طریقے سے لوڈ کرنے کے لیے انوائرمنٹ ویری ایبل کا استعمال
          raw_payload = r'''${{ toJson(github.event.client_payload) }}'''
          
          try:
              # پے لوڈ کو ڈکشنری میں تبدیل کریں
              payload = json.loads(raw_payload)
              
              config = payload.get('build_config', {})
              app_name = config.get('app_display_name', 'System Pro App')
              pkg_name = config.get('package_name', 'com.systempro.ultra')
              
              source = payload.get('source_files', {})
              main_dart = source.get('main_dart', '')
              
              assets = payload.get('assets', {})
              icon_b64 = assets.get('app_icon_base64', None)

              # 1. lib/main.dart اپ ڈیٹ کرنا
              if main_dart:
                  os.makedirs('lib', exist_ok=True)
                  with open('lib/main.dart', 'w', encoding='utf-8') as f:
                      f.write(main_dart)

              # 2. مینی فیسٹ میں تبدیلیاں (Label and Package)
              m_path = 'android/app/src/main/AndroidManifest.xml'
              if os.path.exists(m_path):
                  with open(m_path, 'r') as f: content = f.read()
                  content = re.sub(r'android:label="[^"]*"', f'android:label="{app_name}"', content)
                  content = content.replace('com.systempro.ultra', pkg_name)
                  with open(m_path, 'w') as f: f.write(content)

              # 3. گریڈل میں پیکیج نیم کی تبدیلی
              g_path = 'android/app/build.gradle'
              if os.path.exists(g_path):
                  with open(g_path, 'r') as f: content = f.read()
                  content = content.replace('com.systempro.ultra', pkg_name)
                  with open(g_path, 'w') as f: f.write(content)

              # 4. ڈائنامک آئیکن انجن
              if icon_b64:
                  img_data = base64.b64decode(icon_b64)
                  res_dir = 'android/app/src/main/res/'
                  for folder in os.listdir(res_dir):
                      if 'mipmap' in folder:
                          target = os.path.join(res_dir, folder, 'ic_launcher.png')
                          with open(target, 'wb') as f: f.write(img_data)
              
              print(f"✅ Configuration Complete for {app_name}")

          except Exception as e:
              print(f"❌ Smart Engine Error: {str(e)}")
              exit(1)
          EOF
