name: Build Dynamic APK

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'New Package Name (e.g., com.systempro.ultra3)'
        required: true
        default: 'com.systempro.ultra3'
        type: string
      app_name:
        description: 'App Display Name'
        required: true
        default: 'System Pro Ultra'
        type: string
      icon_base64:
        description: 'Base64 encoded PNG icon (optional)'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Clean and prepare
        run: flutter clean

      - name: Generate fresh project with correct package name
        run: |
          TARGET_PACKAGE="${{ github.event.inputs.package_name }}"
          ORG=$(echo "$TARGET_PACKAGE" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$TARGET_PACKAGE" | rev | cut -d. -f1 | rev)
          echo "Package: $TARGET_PACKAGE | Org: $ORG | Project: $PROJ"
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android,ios .
          echo "PACKAGE_NAME=$TARGET_PACKAGE" >> $GITHUB_ENV

      - name: Restore custom code (pubspec, lib, assets)
        run: |
          git checkout HEAD -- pubspec.yaml lib/ 2>/dev/null || true
          git checkout HEAD -- assets/ 2>/dev/null || true

      - name: Add dependencies
        run: |
          flutter pub add webview_flutter permission_handler
          flutter pub get

      - name: Add Android permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          PERMS=(
            '<uses-permission android:name="android.permission.INTERNET" />'
            '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />'
            '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />'
            '<uses-permission android:name="android.permission.VIBRATE" />'
          )
          for perm in "${PERMS[@]}"; do
            if ! grep -qF "$perm" "$MANIFEST"; then
              sed -i "/<manifest>/a \    $perm" "$MANIFEST"
            fi
          done

      - name: Set app name
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          sed -i 's/android:label="[^"]*"/android:label="'"$APP_NAME"'"/' android/app/src/main/AndroidManifest.xml

      - name: Set app icon (if provided)
        run: |
          ICON_B64="${{ github.event.inputs.icon_base64 }}"
          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "null" ]; then
            echo "$ICON_B64" | base64 -d > icon.png
            for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$density
              cp icon.png android/app/src/main/res/mipmap-$density/ic_launcher.png
            done
            rm icon.png
            echo "Custom icon applied"
          fi

      - name: Fix namespace and applicationId
        run: |
          GRADLE="android/app/build.gradle.kts"
          PACKAGE="${{ env.PACKAGE_NAME }}"
          # Remove any existing namespace line
          sed -i '/namespace(/d' "$GRADLE"
          # Add correct namespace
          sed -i "/android {/a \    namespace(\"$PACKAGE\")" "$GRADLE"
          # Ensure applicationId is set
          if ! grep -q "applicationId" "$GRADLE"; then
            sed -i "/defaultConfig {/a \        applicationId = \"$PACKAGE\"" "$GRADLE"
          else
            sed -i 's/applicationId = "[^"]*"/applicationId = "'"$PACKAGE"'"/' "$GRADLE"
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-${{ github.event.inputs.package_name }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk
