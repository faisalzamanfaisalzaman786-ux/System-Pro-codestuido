name: System Pro Master Engine
on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.5

      - name: Force Reconstruction
        run: |
          # مکمل صفائی تاکہ کوئی پرانی فائل مداخلت نہ کرے
          rm -rf android lib pubspec.yaml
          
          # بالکل نئی pubspec.yaml فائل بنانا (بغیر کسی ڈپلیکیٹ کے)
          cat <<EOF > pubspec.yaml
          name: system_pro
          description: "System Pro Build Engine"
          version: 1.0.0+1
          publish_to: 'none'
          environment:
            sdk: '>=3.4.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            home_widget: ^0.7.0
            torch_light: ^1.1.0
            http: ^1.2.0
            permission_handler: ^11.3.0
          dev_dependencies:
            flutter_test:
              sdk: flutter
          flutter:
            uses-material-design: true
          EOF

          # اب پروجیکٹ اسٹرکچر بنانا
          flutter create --platforms=android --project-name=system_pro .

      - name: Write Modern Android Config
        run: |
          # اینڈرائیڈ کی سیٹنگز کو جدید ترین ورژن پر فورس کرنا
          cat <<EOF > android/settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
              id "com.android.application" version "8.2.1" apply false
              id "org.jetbrains.kotlin.android" version "1.9.22" apply false
          }
          include ":app"
          EOF

      - name: Inject Clean Dart Code
        run: |
          mkdir -p lib
          printf '%s\n' "${{ github.event.client_payload.source_files.main_dart }}" > lib/main.dart
          # کوڈ کے اندر ٹارچ اور اویٹ کے ممکنہ مسائل درست کرنا
          sed -i "s/package:torch\/torch.dart/package:torch_light\/torch_light.dart/g" lib/main.dart
          sed -i "s/await await/await/g" lib/main.dart
          sed -i "s/Torch.hasTorch/await TorchLight.isTorchAvailable()/g" lib/main.dart
          sed -i "s/Torch.turnOn()/await TorchLight.enableTorch()/g" lib/main.dart
          sed -i "s/Torch.turnOff()/await TorchLight.disableTorch()/g" lib/main.dart
          sed -i "s/await await/await/g" lib/main.dart

      - name: Final Build Execution
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload System Pro APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V6-8
          path: build/app/outputs/flutter-apk/*.apk
