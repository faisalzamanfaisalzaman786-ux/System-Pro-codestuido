name: Download FlexColorScheme into Repository

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and extract flex_color_scheme 8.3.0
        run: |
          mkdir -p packages
          cd packages
          curl -L https://pub.dev/packages/flex_color_scheme/versions/8.3.0.tar.gz -o package.tar.gz
          tar -xzf package.tar.gz
          rm package.tar.gz
          # Extract ہونے کے بعد جو بھی فولڈر بنا، اسے ڈھونڈ کر flex_color_scheme رکھ دیں
          EXTRACTED_DIR=$(find . -maxdepth 1 -type d -name "flex_color_scheme*" | head -1)
          if [ -z "$EXTRACTED_DIR" ]; then
            # اگر flex_color_scheme سے شروع نہیں ہوتا تو کوئی بھی ڈائریکٹری لے لو (except current)
            EXTRACTED_DIR=$(find . -maxdepth 1 -type d ! -name . | head -1)
          fi
          if [ -n "$EXTRACTED_DIR" ] && [ "$EXTRACTED_DIR" != "./flex_color_scheme" ]; then
            mv "$EXTRACTED_DIR" flex_color_scheme
          fi
          cd ..

      - name: Update pubspec.yaml with local path
        run: |
          if ! grep -q "flex_color_scheme:" pubspec.yaml; then
            echo -e "\n  flex_color_scheme:\n    path: packages/flex_color_scheme" >> pubspec.yaml
          fi

      - name: Replace main.dart with theme support
        run: |
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:flex_color_scheme/flex_color_scheme.dart';

          void main() => runApp(const MyApp());

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'System Pro Ultra',
                theme: FlexThemeData.light(
                  scheme: FlexScheme.mango,
                  useMaterial3: true,
                ),
                darkTheme: FlexThemeData.dark(
                  scheme: FlexScheme.mango,
                  useMaterial3: true,
                ),
                themeMode: ThemeMode.system,
                home: const MyHomePage(),
              );
            }
          }

          class MyHomePage extends StatelessWidget {
            const MyHomePage({super.key});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text('System Pro Ultra')),
                body: const Center(
                  child: Text('FlexColorScheme 8.3.0 is ready!'),
                ),
              );
            }
          }
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/ pubspec.yaml lib/main.dart
          git diff --cached --quiet || git commit -m "Add flex_color_scheme 8.3.0 (robust extraction)"
          git push
