# .github/workflows/master.yml
name: 🔥 System Pro Universal Builder

on:
  workflow_dispatch:
  repository_dispatch:
    types: [system_pro_build]          # آپ کے UI کا event_type

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 💾 Save client payload
        run: echo '${{ toJSON(github.event.client_payload) }}' > payload.json

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: ⚙️ Setup Flutter 3.29.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: 📦 Get initial dependencies
        run: flutter pub get

      # ============================================================
      # NDK FIX: force NDK 27.0.12077973 in app/build.gradle.kts
      # ============================================================
      - name: 🛠️ Force NDK 27.0.12077973
        run: |
          APP_GRADLE="android/app/build.gradle.kts"
          if [ -f "$APP_GRADLE" ]; then
            if ! grep -q "ndkVersion" "$APP_GRADLE"; then
              sed -i '/android {/a \    ndkVersion = "27.0.12077973"' "$APP_GRADLE"
            else
              sed -i 's/ndkVersion[[:space:]]*=[[:space:]]*"[^"]*"/ndkVersion = "27.0.12077973"/' "$APP_GRADLE"
            fi
            echo "✅ NDK version set to 27.0.12077973"
          fi

      # ============================================================
      # FIX AndroidManifest.xml to avoid "Missing name key attribute"
      # ============================================================
      - name: 📱 Fix AndroidManifest.xml (remove broken meta-data)
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          # اگر فائل موجود نہیں تو بنائیں
          if [ ! -f "$MANIFEST" ]; then
            mkdir -p android/app/src/main
            cat > "$MANIFEST" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="System Pro" android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          fi
          
          # سب سے پہلے: کسی بھی ایسی meta-data لائن کو ہٹائیں جس میں name attribute نہ ہو
          # یہ وہی error پیدا کر رہی تھی
          sed -i '/<meta-data[^>]*>/d' "$MANIFEST"
          
          # اب ضروری پرمیشنز اور V2 Embedding شامل کریں (اگر پہلے سے موجود نہ ہوں)
          if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
          fi
          if ! grep -q "android.permission.READ_EXTERNAL_STORAGE" "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' "$MANIFEST"
          fi
          if ! grep -q "android.permission.WRITE_EXTERNAL_STORAGE" "$MANIFEST"; then
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' "$MANIFEST"
          fi
          if ! grep -q "flutterEmbedding" "$MANIFEST"; then
            sed -i '/<application/a\        <meta-data android:name="flutterEmbedding" android:value="2" />' "$MANIFEST"
          fi
          
          echo "✅ AndroidManifest.xml fixed"

      # ============================================================
      # Apply main.dart from UI payload (if exists)
      # ============================================================
      - name: 🎨 Apply main.dart
        run: |
          MAIN_B64=$(jq -r '.source_files.main_dart // empty' payload.json)
          if [ -n "$MAIN_B64" ] && [ "$MAIN_B64" != "null" ]; then
            echo "$MAIN_B64" | base64 -d > lib/main.dart
            echo "✅ main.dart applied from UI"
          fi

      # ============================================================
      # Apply pubspec.yaml from UI (if exists)
      # ============================================================
      - name: 📄 Apply pubspec.yaml
        run: |
          PUBSPEC_B64=$(jq -r '.source_files.pubspec // empty' payload.json)
          if [ -n "$PUBSPEC_B64" ] && [ "$PUBSPEC_B64" != "null" ]; then
            echo "$PUBSPEC_B64" | base64 -d > pubspec.yaml
            echo "✅ pubspec.yaml applied from UI"
          fi

      # ============================================================
      # Apply app icon
      # ============================================================
      - name: 🖼️ Apply app icon
        run: |
          ICON_B64=$(jq -r '.assets.app_icon_base64 // empty' payload.json)
          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "null" ]; then
            mkdir -p android/app/src/main/res/mipmap-hdpi
            echo "$ICON_B64" | base64 -d > android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            for density in mdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$density
              cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-$density/ 2>/dev/null || true
            done
            echo "✅ App icon applied"
          fi

      # ============================================================
      # Auto-detect and add dependencies from main.dart imports
      # ============================================================
      - name: 📦 Auto-add dependencies
        run: |
          if grep -q "import 'package:" lib/main.dart; then
            grep -oE "import 'package:([^/']+)" lib/main.dart | sed "s/import 'package://" | sort -u | while read pkg; do
              if [[ "$pkg" != "flutter" ]]; then
                echo "📦 Adding $pkg"
                flutter pub add "$pkg" || echo "⚠️ Failed to add $pkg"
              fi
            done
            flutter pub get
          fi

      # ============================================================
      # Apply build config (app name, minSdk, targetSdk)
      # ============================================================
      - name: ⚙️ Apply build config from payload
        run: |
          APP_NAME=$(jq -r '.build_config.app_display_name // "System Pro"' payload.json)
          MIN_SDK=$(jq -r '.build_config.min_sdk // 21' payload.json)
          TARGET_SDK=$(jq -r '.build_config.target_sdk // 34' payload.json)
          PACKAGE_NAME=$(jq -r '.build_config.package_name // "com.systempro.app"' payload.json)

          # Update app label in manifest
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i "s/android:label=\".*\"/android:label=\"$APP_NAME\"/" "$MANIFEST"

          # Update minSdk/targetSdk in app/build.gradle.kts
          APP_GRADLE="android/app/build.gradle.kts"
          if [ -f "$APP_GRADLE" ]; then
            sed -i "s/minSdk[[:space:]]*=[[:space:]]*[0-9]\+/minSdk = $MIN_SDK/" "$APP_GRADLE"
            sed -i "s/targetSdk[[:space:]]*=[[:space:]]*[0-9]\+/targetSdk = $TARGET_SDK/" "$APP_GRADLE"
            if ! grep -q "namespace" "$APP_GRADLE"; then
              sed -i "/android {/a \    namespace(\"$PACKAGE_NAME\")" "$APP_GRADLE"
            fi
          fi
          echo "✅ Build config applied"

      # ============================================================
      # 🔨 Build APK
      # ============================================================
      - name: 🔨 Build release APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      # ============================================================
      # 📤 Upload APK
      # ============================================================
      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Build-${{ github.run_id }}
          path: build/app/outputs/flutter-apk/*.apk
