name: Dynamic APK Builder (Safe V2 - Auto Kotlin)

on:
  workflow_dispatch:
    inputs:
      build_config:
        description: 'Build config (JSON)'
        required: true
        default: '{"package_name":"com.example.app","app_display_name":"MyApp","min_sdk":21,"target_sdk":34,"use_proguard":false}'
      source_files:
        description: 'Source files (JSON with base64)'
        required: true
        default: '{"main_dart":"","pubspec":""}'
      permissions:
        description: 'Permissions JSON'
        required: true
        default: '{"camera":false,"microphone":false,"vibrate":false,"location_granularity":"none"}'
      assets:
        description: 'Assets JSON (icon and additional)'
        required: true
        default: '{"app_icon_base64":"","additional_assets":[]}'
  repository_dispatch:
    types: [system_pro_build]

env:
  # Aapka original stable environment
  FLUTTER_VERSION: '3.29.2'
  KOTLIN_VERSION: '2.0.20'
  NDK_VERSION: '27.0.12077973'
  JAVA_VERSION: '17'
  
  # Locked versions jo Dart 3.7.2 ke sath 100% compatible hain
  WEBVIEW_FLUTTER_VER: '4.13.0'
  PERMISSION_HANDLER_VER: '12.0.1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Build payload
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            jq -n \
              --argjson bc '${{ toJson(github.event.inputs.build_config) }}' \
              --argjson sf '${{ toJson(github.event.inputs.source_files) }}' \
              --argjson pm '${{ toJson(github.event.inputs.permissions) }}' \
              --argjson as '${{ toJson(github.event.inputs.assets) }}' \
              '{build_config: $bc, source_files: $sf, permissions: $pm, assets: $as}' > payload.json
          else
            echo '${{ toJson(github.event.client_payload) }}' > payload.json
          fi

      - name: Create fresh project
        run: |
          PACKAGE_NAME=$(jq -r '.build_config.package_name' payload.json)
          ORG=$(echo "$PACKAGE_NAME" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PACKAGE_NAME" | rev | cut -d. -f1 | rev)
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android .

      - name: Write Source Files
        run: |
          jq -r '.source_files.main_dart' payload.json | base64 -d > lib/main.dart
          jq -r '.source_files.pubspec' payload.json | base64 -d > pubspec.yaml

      - name: Resolve Dependencies
        run: |
          flutter pub get
          # WebView ko update karne ke bajaye compatible version force karna
          flutter pub add webview_flutter:${{ env.WEBVIEW_FLUTTER_VER }}
          # Force the Android driver to 4.10.1 which supports Dart 3.7.2
          flutter pub add webview_flutter_android:4.10.1
          flutter pub add permission_handler:${{ env.PERMISSION_HANDLER_VER }}
          flutter pub get

      - name: Android Manifest & Label Fix
        run: |
          APP_NAME=$(jq -r '.build_config.app_display_name' payload.json)
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="[^"]*"/android:label="'"$APP_NAME"'"/' "$MANIFEST"
          if ! grep -q "INTERNET" "$MANIFEST"; then
            sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
          fi

      - name: Gradle Compatibility Fix
        run: |
          APP_GRADLE="android/app/build.gradle.kts"
          PKG_NAME=$(jq -r '.build_config.package_name' payload.json)
          MIN_SDK=$(jq -r '.build_config.min_sdk' payload.json)
          TARGET_SDK=$(jq -r '.build_config.target_sdk' payload.json)
          
          sed -i 's/namespace = .*/namespace = "'"$PKG_NAME"'"/' "$APP_GRADLE"
          sed -i 's/applicationId = .*/applicationId = "'"$PKG_NAME"'"/' "$APP_GRADLE"
          sed -i "s/minSdk = .*/minSdk = $MIN_SDK/" "$APP_GRADLE"
          sed -i "s/targetSdk = .*/targetSdk = $TARGET_SDK/" "$APP_GRADLE"
          
          # Force Java 17 Compatibility
          sed -i 's/sourceCompatibility = .*/sourceCompatibility = JavaVersion.VERSION_17/' "$APP_GRADLE"
          sed -i 's/targetCompatibility = .*/targetCompatibility = JavaVersion.VERSION_17/' "$APP_GRADLE"

      - name: Final Build
        run: |
          flutter clean
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Final-Build
          path: build/app/outputs/flutter-apk/*.apk
