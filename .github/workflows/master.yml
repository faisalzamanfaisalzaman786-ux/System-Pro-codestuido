name: Dynamic APK Builder (Safe V2 - Auto Kotlin)

on:
  workflow_dispatch:
    inputs:
      build_config:
        description: 'Build config (JSON)'
        required: true
        default: '{"package_name":"com.example.app","app_display_name":"MyApp","min_sdk":21,"target_sdk":34,"use_proguard":false}'
      source_files:
        description: 'Source files (JSON with base64)'
        required: true
        default: '{"main_dart":"","pubspec":""}'
      permissions:
        description: 'Permissions JSON'
        required: true
        default: '{"camera":false,"microphone":false,"vibrate":false,"location_granularity":"none"}'
      assets:
        description: 'Assets JSON (icon and additional)'
        required: true
        default: '{"app_icon_base64":"","additional_assets":[]}'
  repository_dispatch:
    types: [system_pro_build]

env:
  FLUTTER_VERSION: '3.41.9' 
  KOTLIN_VERSION: '1.9.22'
  # ایرر کے مطابق گریڈل ورژن 8.13 پر اپ ڈیٹ کر دیا گیا ہے
  GRADLE_VERSION: '8.13'
  NDK_VERSION: '27.0.12077973'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Build payload
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo '${{ github.event.inputs.build_config }}' > build_config.json
            echo '${{ github.event.inputs.source_files }}' > source_files.json
            echo '${{ github.event.inputs.permissions }}' > permissions.json
            echo '${{ github.event.inputs.assets }}' > assets.json
            jq -n \
              --argjson bc "$(<build_config.json)" \
              --argjson sf "$(<source_files.json)" \
              --argjson pm "$(<permissions.json)" \
              --argjson as "$(<assets.json)" \
              '{build_config: $bc, source_files: $sf, permissions: $pm, assets: $as}' > payload.json
          else
            echo '${{ toJson(github.event.client_payload) }}' > payload.json
          fi

      - name: Create fresh project
        run: |
          PKG=$(jq -r '.build_config.package_name' payload.json)
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PKG" | rev | cut -d. -f1 | rev)
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android .

      - name: Write Source Files
        run: |
          jq -r '.source_files.main_dart' payload.json | base64 -d > lib/main.dart
          jq -r '.source_files.pubspec' payload.json | base64 -d > pubspec.yaml

      - name: Force Gradle and Tooling
        run: |
          # گریڈل ورژن کو 8.13 پر سیٹ کریں جیسا کہ لاگ میں تجویز کیا گیا ہے
          sed -i 's/gradle-.*-all.zip/gradle-${{ env.GRADLE_VERSION }}-all.zip/' android/gradle/wrapper/gradle-wrapper.properties
          
          # Kotlin ورژن کو فائل کی قسم کے مطابق سیٹ کریں
          if [ -f "android/build.gradle.kts" ]; then
            sed -i 's/kotlin("android") version "[^"]*"/kotlin("android") version "${{ env.KOTLIN_VERSION }}"/' android/build.gradle.kts
          elif [ -f "android/build.gradle" ]; then
            sed -i 's/kotlin_version = .*/kotlin_version = "${{ env.KOTLIN_VERSION }}"/' android/build.gradle
          fi
          
      - name: Fix NDK & SDK Config
        run: |
          APP_GRADLE="android/app/build.gradle"
          if [ -f "android/app/build.gradle.kts" ]; then
            APP_GRADLE="android/app/build.gradle.kts"
          fi
          
          PKG_NAME=$(jq -r '.build_config.package_name' payload.json)
          MIN_SDK=$(jq -r '.build_config.min_sdk' payload.json)
          TARGET_SDK=$(jq -r '.build_config.target_sdk' payload.json)
          
          # NDK ورژن اور نیم اسپیس (Namespace) کی درستگی
          sed -i '/android {/a \    ndkVersion = "${{ env.NDK_VERSION }}"' "$APP_GRADLE"
          sed -i 's/namespace = .*/namespace = "'"$PKG_NAME"'"/' "$APP_GRADLE"
          sed -i 's/applicationId = .*/applicationId = "'"$PKG_NAME"'"/' "$APP_GRADLE"
          sed -i "s/minSdk = .*/minSdk = $MIN_SDK/" "$APP_GRADLE"
          sed -i "s/targetSdk = .*/targetSdk = $TARGET_SDK/" "$APP_GRADLE"

      - name: Final Dependency Resolve
        run: |
          flutter pub upgrade
          flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Success-Build
          path: build/app/outputs/flutter-apk/*.apk
