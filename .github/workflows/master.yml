name: Flutter Build Studio

on:
  repository_dispatch:
    types: [flutter_app_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Extract build config from payload
        run: |
          echo "PACKAGE_NAME=${{ github.event.client_payload.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.app_name }}" >> $GITHUB_ENV
          echo "MIN_SDK=${{ github.event.client_payload.min_sdk }}" >> $GITHUB_ENV
          echo "TARGET_SDK=${{ github.event.client_payload.target_sdk }}" >> $GITHUB_ENV
          echo "USE_PROGUARD=${{ github.event.client_payload.use_proguard }}" >> $GITHUB_ENV
          echo "HAS_ICON=${{ github.event.client_payload.has_icon }}" >> $GITHUB_ENV
          
          echo "KEYSTORE_BASE64=${{ secrets.KEYSTORE_BASE64 }}" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Create fresh Flutter project
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PKG" | rev | cut -d. -f1 | rev)
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android .
          echo "✅ Fresh Flutter project created"

      - name: Copy main.dart from repository
        run: |
          if [ ! -f "lib/main.dart" ]; then
            echo "❌ lib/main.dart not found"
            exit 1
          fi
          echo "✅ main.dart found"

      - name: Use repository pubspec.yaml
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            echo "❌ pubspec.yaml not found"
            exit 1
          fi
          flutter pub get
          echo "✅ flutter pub get completed"

      - name: Copy AndroidManifest and XML resources
        run: |
          mkdir -p android/app/src/main/res/xml
          
          if [ -f "android_manifest_backup/AndroidManifest.xml" ]; then
            cp android_manifest_backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
            echo "✅ AndroidManifest.xml copied"
          fi
          
          if [ -f "android_manifest_backup/file_paths.xml" ]; then
            cp android_manifest_backup/file_paths.xml android/app/src/main/res/xml/
            echo "✅ file_paths.xml copied"
          fi
          
          if [ -f "android_manifest_backup/network_security_config.xml" ]; then
            cp android_manifest_backup/network_security_config.xml android/app/src/main/res/xml/
            echo "✅ network_security_config.xml copied"
          fi

      - name: Fix AndroidManifest.xml
        run: |
          if [ -f "android/app/src/main/AndroidManifest.xml" ]; then
            sed -i 's/package="[^"]*"//g' android/app/src/main/AndroidManifest.xml
            sed -i "s/android:label=\".*\"/android:label=\"${{ env.APP_NAME }}\"/" android/app/src/main/AndroidManifest.xml
            echo "✅ AndroidManifest.xml fixed"
          fi

      - name: Create MainActivity.kt
        run: |
          PKG_PATH=$(echo "${{ env.PACKAGE_NAME }}" | tr '.' '/')
          mkdir -p "android/app/src/main/kotlin/$PKG_PATH"
          
          cat > "android/app/src/main/kotlin/$PKG_PATH/MainActivity.kt" <<EOF
          package ${{ env.PACKAGE_NAME }}
          
          import io.flutter.embedding.android.FlutterActivity
          
          class MainActivity : FlutterActivity()
          EOF
          
          rm -rf android/app/src/main/kotlin/com/example
          echo "✅ MainActivity.kt created"

      - name: Decode Keystore
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ env.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
          echo "✅ Keystore decoded"

      - name: Setup root build.gradle
        run: |
          cat > android/build.gradle <<EOF
          buildscript {
              ext.kotlin_version = '2.1.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:\$kotlin_version"
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "\${rootProject.buildDir}/\${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          
          tasks.register('clean', Delete) {
              delete rootProject.buildDir
          }
          EOF

      - name: Setup app build.gradle with signing
        run: |
          if [ -n "${{ env.KEYSTORE_PASSWORD }}" ]; then
            cat > android/key.properties <<EOF
          storePassword=${{ env.KEYSTORE_PASSWORD }}
          keyPassword=${{ env.KEY_PASSWORD }}
          keyAlias=${{ env.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF
          fi
          
          cat > android/app/build.gradle <<EOF
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }
          
          android {
              namespace "${{ env.PACKAGE_NAME }}"
              compileSdk = 36
              
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
                  coreLibraryDesugaringEnabled true
              }
              
              kotlinOptions {
                  jvmTarget = "17"
              }
              
              defaultConfig {
                  applicationId = "${{ env.PACKAGE_NAME }}"
                  minSdk = 23
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
                  multiDexEnabled true
              }
              
              signingConfigs {
                  release {
                      if (keystorePropertiesFile.exists()) {
                          keyAlias keystoreProperties['keyAlias']
                          keyPassword keystoreProperties['keyPassword']
                          storeFile file(keystoreProperties['storeFile'])
                          storePassword keystoreProperties['storePassword']
                      }
                  }
              }
              
              buildTypes {
                  release {
                      signingConfig = signingConfigs.release
                      minifyEnabled = ${{ env.USE_PROGUARD == 'true' }}
                      shrinkResources = ${{ env.USE_PROGUARD == 'true' }}
                  }
              }
          }
          
          flutter {
              source = "../.."
          }
          
          dependencies {
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
          }
          EOF
          
          echo "✅ build.gradle files configured"

      - name: Setup ProGuard (if needed)
        if: env.USE_PROGUARD == 'true'
        run: |
          cat > android/app/proguard-rules.pro <<EOF
          -keep class io.flutter.app.** { *; }
          -keep class io.flutter.plugin.**  { *; }
          -keep class io.flutter.util.**  { *; }
          -keep class io.flutter.view.**  { *; }
          -keep class io.flutter.**  { *; }
          -keep class io.flutter.plugins.**  { *; }
          EOF

      - name: Apply custom app icon
        if: env.HAS_ICON == 'true'
        run: |
          if [ -f "assets/icon.png" ]; then
            for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$density
              cp assets/icon.png android/app/src/main/res/mipmap-$density/ic_launcher.png
              cp assets/icon.png android/app/src/main/res/mipmap-$density/ic_launcher_round.png
            done
            echo "✅ Custom icon applied"
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlutterApp-${{ env.PACKAGE_NAME }}-APK-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlutterApp-${{ env.PACKAGE_NAME }}-AAB-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Build Summary
        if: always()
        run: |
          echo "═══════════════════════════════════════════════════════════"
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ BUILD SUCCESSFUL"
            echo ""
            echo "📦 OUTPUTS:"
            echo "   APK: build/app/outputs/flutter-apk/app-release.apk"
            echo "   AAB: build/app/outputs/bundle/release/app-release.aab"
          else
            echo "❌ BUILD FAILED"
          fi
          echo "═══════════════════════════════════════════════════════════"
          echo "Package: ${{ env.PACKAGE_NAME }}"
          echo "App Name: ${{ env.APP_NAME }}"
