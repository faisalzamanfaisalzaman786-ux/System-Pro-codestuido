name: System Pro Universal Builder

on:
  repository_dispatch:
    types: [system_pro_build]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable

      - name: Validate and create source files
        run: |
          set -e
          echo "📦 Validating client payload..."

          # Helper function for safe decoding
          safe_decode() {
            local input="$1"
            local output_file="$2"
            if [ -n "$input" ] && [ "$input" != "null" ]; then
              echo "$input" | sed 's/\\n/\n/g' > "$output_file"
              echo "✅ Created $output_file"
            else
              echo "❌ Missing or null content for $output_file - using fallback"
              return 1
            fi
          }

          # Create directories
          mkdir -p lib android/app/src/main

          # main.dart
          MAIN_DART='${{ github.event.client_payload.source_files.main_dart }}'
          if safe_decode "$MAIN_DART" lib/main.dart; then
            echo "main.dart decoded successfully"
          else
            cat > lib/main.dart <<'EOF'
          // Fallback main.dart
          import 'package:flutter/material.dart';
          void main() => runApp(MyApp());
          class MyApp extends StatelessWidget {
            @override
            Widget build(BuildContext context) => MaterialApp(home: Scaffold(body: Center(child: Text('Error: No main.dart provided'))));
          }
          EOF
            echo "⚠️ Using fallback main.dart"
          fi

          # AndroidManifest.xml
          MANIFEST='${{ github.event.client_payload.source_files.android_manifest }}'
          if safe_decode "$MANIFEST" android/app/src/main/AndroidManifest.xml; then
            echo "AndroidManifest.xml decoded successfully"
          else
            cat > android/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.systempro.fallback">
              <application android:label="Fallback App" android:icon="@mipmap/ic_launcher"/>
          </manifest>
          EOF
            echo "⚠️ Using fallback AndroidManifest.xml"
          fi

          # build.gradle
          GRADLE='${{ github.event.client_payload.source_files.build_gradle }}'
          if safe_decode "$GRADLE" android/app/build.gradle; then
            echo "build.gradle decoded successfully"
          else
            cat > android/app/build.gradle <<'EOF'
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) { localPropertiesFile.withInputStream { localProperties.load(it) } }
          def flutterRoot = localProperties.getProperty('flutter.sdk')
          if (flutterRoot == null) { throw new GradleException("Flutter SDK not found.") }
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
          android {
              compileSdk 34
              compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = '17' }
              defaultConfig {
                  applicationId "com.systempro.fallback"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { release { signingConfig signingConfigs.debug } }
          }
          flutter { source '../..' }
          dependencies { implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version" }
          EOF
            echo "⚠️ Using fallback build.gradle"
          fi

          # pubspec.yaml
          PUBSPEC='${{ github.event.client_payload.source_files.pubspec }}'
          if [ -n "$PUBSPEC" ] && [ "$PUBSPEC" != "null" ]; then
            echo "$PUBSPEC" | sed 's/\\n/\n/g' > pubspec.yaml
            echo "✅ pubspec.yaml from payload"
          else
            cat > pubspec.yaml <<'EOF'
          name: system_pro_app
          description: Auto-generated fallback
          version: 1.0.0+1
          environment:
            sdk: '>=3.4.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
            permission_handler: ^11.3.0
            http: ^1.2.0
            shared_preferences: ^2.2.3
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^4.0.0
          flutter:
            uses-material-design: true
          EOF
            echo "⚠️ Using fallback pubspec.yaml"
          fi

      - name: Dynamic configuration (package name, app name, SDK)
        run: |
          NEW_PACKAGE="${{ github.event.client_payload.build_config.package_name }}"
          APP_NAME="${{ github.event.client_payload.build_config.app_display_name }}"
          MIN_SDK="${{ github.event.client_payload.build_config.min_sdk }}"
          TARGET_SDK="${{ github.event.client_payload.build_config.target_sdk }}"
          PROGUARD="${{ github.event.client_payload.build_config.use_proguard }}"

          # Set defaults if missing
          : "${NEW_PACKAGE:=com.systempro.default}"
          : "${APP_NAME:=System Pro App}"
          : "${MIN_SDK:=21}"
          : "${TARGET_SDK:=34}"
          : "${PROGUARD:=false}"

          echo "📱 Configuring: package=$NEW_PACKAGE, app=$APP_NAME, minSdk=$MIN_SDK, targetSdk=$TARGET_SDK, proguard=$PROGUARD"

          # Update files only if they exist
          if [ -f android/app/src/main/AndroidManifest.xml ]; then
            sed -i "s/package=\".*\"/package=\"${NEW_PACKAGE}\"/" android/app/src/main/AndroidManifest.xml
            sed -i "s/android:label=\".*\"/android:label=\"${APP_NAME}\"/" android/app/src/main/AndroidManifest.xml
          fi

          if [ -f android/app/build.gradle ]; then
            sed -i "s/applicationId \".*\"/applicationId \"${NEW_PACKAGE}\"/" android/app/build.gradle
            sed -i "s/minSdk [0-9]\+/minSdk ${MIN_SDK}/" android/app/build.gradle
            sed -i "s/targetSdk [0-9]\+/targetSdk ${TARGET_SDK}/" android/app/build.gradle
            if [ "$PROGUARD" = "true" ]; then
              sed -i "s/minifyEnabled false/minifyEnabled true/" android/app/build.gradle
            fi
          fi

          # Remove existing activity (safe)
          sed -i '/<activity/,/<\/activity>/d' android/app/src/main/AndroidManifest.xml

          # Add FlutterActivity (v2)
          sed -i '/<application>/a \        <activity\n            android:name=".MainActivity"\n            android:exported="true"\n            android:launchMode="singleTop"\n            android:theme="@style/LaunchTheme"\n            android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"\n            android:hardwareAccelerated="true"\n            android:windowSoftInputMode="adjustResize">\n            <intent-filter>\n                <action android:name="android.intent.action.MAIN"/>\n                <category android:name="android.intent.category.LAUNCHER"/>\n            </intent-filter>\n        </activity>' android/app/src/main/AndroidManifest.xml

          # Add flutterEmbedding meta-data
          if ! grep -q "flutterEmbedding" android/app/src/main/AndroidManifest.xml; then
            sed -i '/<\/application>/i \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
          fi

          # Create MainActivity.kt
          PKG_PATH=$(echo "$NEW_PACKAGE" | tr '.' '/')
          mkdir -p "android/app/src/main/kotlin/${PKG_PATH}"
          cat > "android/app/src/main/kotlin/${PKG_PATH}/MainActivity.kt" <<EOF
          package ${NEW_PACKAGE}

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity : FlutterActivity()
          EOF

          # Remove old static package directory safely
          if [ -d "android/app/src/main/kotlin/com/systempro/template" ] && [ "$PKG_PATH" != "com/systempro/template" ]; then
            rm -rf "android/app/src/main/kotlin/com/systempro/template"
          fi

      - name: Add permissions (idempotent, no duplicates)
        run: |
          PERMS_JSON='${{ toJson(github.event.client_payload.permissions) }}'
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

          add_perm() {
            local perm_xml="$1"
            local perm_name="$2"
            if ! grep -q "$perm_name" "$MANIFEST"; then
              sed -i "/<manifest>/a \    $perm_xml" "$MANIFEST"
            fi
          }

          if [ -z "$PERMS_JSON" ] || [ "$PERMS_JSON" = "null" ]; then
            echo "ℹ️ No permissions payload, skipping."
            exit 0
          fi

          echo "$PERMS_JSON" | jq -r 'to_entries[] | select(.value==true) | .key' | while read perm; do
            case $perm in
              storage)
                add_perm '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' "READ_EXTERNAL_STORAGE"
                add_perm '<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' "WRITE_EXTERNAL_STORAGE" ;;
              camera)
                add_perm '<uses-permission android:name="android.permission.CAMERA" />' "CAMERA" ;;
              bluetooth)
                add_perm '<uses-permission android:name="android.permission.BLUETOOTH" />' "BLUETOOTH"
                add_perm '<uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />' "BLUETOOTH_ADMIN"
                add_perm '<uses-permission android:name="android.permission.BLUETOOTH_SCAN" />' "BLUETOOTH_SCAN"
                add_perm '<uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />' "BLUETOOTH_CONNECT" ;;
              microphone)
                add_perm '<uses-permission android:name="android.permission.RECORD_AUDIO" />' "RECORD_AUDIO" ;;
              contacts)
                add_perm '<uses-permission android:name="android.permission.READ_CONTACTS" />' "READ_CONTACTS"
                add_perm '<uses-permission android:name="android.permission.WRITE_CONTACTS" />' "WRITE_CONTACTS" ;;
              notif)
                add_perm '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "POST_NOTIFICATIONS" ;;
              foreground)
                add_perm '<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' "FOREGROUND_SERVICE" ;;
              sms)
                add_perm '<uses-permission android:name="android.permission.SEND_SMS" />' "SEND_SMS"
                add_perm '<uses-permission android:name="android.permission.READ_SMS" />' "READ_SMS" ;;
              vibrate)
                add_perm '<uses-permission android:name="android.permission.VIBRATE" />' "VIBRATE" ;;
            esac
          done

          LOC=$(echo "$PERMS_JSON" | jq -r '.location_granularity // ""')
          if [ "$LOC" = "fine" ]; then
            add_perm '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' "ACCESS_FINE_LOCATION"
          elif [ "$LOC" = "coarse" ]; then
            add_perm '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' "ACCESS_COARSE_LOCATION"
          fi

      - name: Set app icon (if provided)
        run: |
          ICON_B64="${{ github.event.client_payload.assets.app_icon_base64 }}"
          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "null" ]; then
            mkdir -p android/app/src/main/res/mipmap-hdpi
            echo "$ICON_B64" | base64 -d > android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            for density in mdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$density
              cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-$density/
            done
            echo "✅ App icon set"
          else
            echo "ℹ️ No app icon provided, using default"
          fi

      - name: Additional assets (if any)
        run: |
          ASSETS='${{ toJson(github.event.client_payload.assets.additional_assets) }}'
          if [ -n "$ASSETS" ] && [ "$ASSETS" != "null" ] && [ "$ASSETS" != "[]" ]; then
            echo "$ASSETS" | jq -c '.[]' 2>/dev/null | while read asset; do
              NAME=$(echo "$asset" | jq -r '.name')
              B64=$(echo "$asset" | jq -r '.base64')
              mkdir -p assets
              echo "$B64" | base64 -d > "assets/$NAME"
            done
            echo "✅ Additional assets added"
          else
            echo "ℹ️ No additional assets"
          fi

      - name: Build APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Build-${{ github.run_id }}
          path: build/app/outputs/flutter-apk/*.apk
