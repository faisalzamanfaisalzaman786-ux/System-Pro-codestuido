name: Filter App Builder (Signed + AAB)

on:
  repository_dispatch:
    types: [filter_app_build]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Save payload
        run: echo '${{ toJson(github.event.client_payload) }}' > payload.json

      - name: Extract config
        run: |
          PACKAGE_NAME=$(jq -r '.build_config.package_name // "com.filter.app"' payload.json)
          APP_NAME=$(jq -r '.build_config.app_display_name // "Filter App"' payload.json)
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV

      - name: Create fresh Flutter project
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PKG" | rev | cut -d. -f1 | rev | tr '-' '_' | sed 's/^[0-9]/_&/')
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android .

      - name: Write main.dart
        run: |
          MAIN_B64=$(jq -r '.source_files.main_dart // ""' payload.json)
          [ -z "$MAIN_B64" ] || [ "$MAIN_B64" = "null" ] && echo "❌ No main.dart" && exit 1
          echo "$MAIN_B64" | base64 -d > lib/main.dart

      - name: Write AndroidManifest.xml
        run: |
          MANIFEST_B64=$(jq -r '.source_files.android_manifest // ""' payload.json)
          [ -z "$MANIFEST_B64" ] || [ "$MANIFEST_B64" = "null" ] && echo "❌ No manifest" && exit 1
          mkdir -p android/app/src/main
          echo "$MANIFEST_B64" | base64 -d > android/app/src/main/AndroidManifest.xml

      - name: Write pubspec.yaml from payload
        run: |
          PUBSPEC_B64=$(jq -r '.source_files.pubspec_yaml // ""' payload.json)
          if [ -n "$PUBSPEC_B64" ] && [ "$PUBSPEC_B64" != "null" ]; then
            echo "$PUBSPEC_B64" | base64 -d > pubspec.yaml
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Create assets folder
        run: mkdir -p assets

      # ========== RELEASE SIGNING SETUP ==========
      - name: Decode Keystore
        run: |
          if [ -n "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > android/app/release-keystore.jks
          else
            echo "No keystore secret – using debug signing"
          fi

      - name: Create key.properties
        run: |
          if [ -f "android/app/release-keystore.jks" ]; then
            echo "storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}" > android/key.properties
            echo "keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}" >> android/key.properties
            echo "keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}" >> android/key.properties
            echo "storeFile=release-keystore.jks" >> android/key.properties
          else
            echo "No keystore file – skipping key.properties"
          fi

      - name: Write top-level build.gradle (using echo)
        run: |
          echo "buildscript {" > android/build.gradle
          echo "    ext.kotlin_version = '1.9.0'" >> android/build.gradle
          echo "    repositories {" >> android/build.gradle
          echo "        google()" >> android/build.gradle
          echo "        mavenCentral()" >> android/build.gradle
          echo "    }" >> android/build.gradle
          echo "    dependencies {" >> android/build.gradle
          echo "        classpath 'com.android.tools.build:gradle:7.3.0'" >> android/build.gradle
          echo "        classpath \"org.jetbrains.kotlin:kotlin-gradle-plugin:\$kotlin_version\"" >> android/build.gradle
          echo "    }" >> android/build.gradle
          echo "}" >> android/build.gradle
          echo "allprojects {" >> android/build.gradle
          echo "    repositories {" >> android/build.gradle
          echo "        google()" >> android/build.gradle
          echo "        mavenCentral()" >> android/build.gradle
          echo "    }" >> android/build.gradle
          echo "}" >> android/build.gradle
          echo "rootProject.buildDir = '../build'" >> android/build.gradle
          echo "subprojects {" >> android/build.gradle
          echo "    project.buildDir = \"\${rootProject.buildDir}/\${project.name}\"" >> android/build.gradle
          echo "}" >> android/build.gradle
          echo "subprojects {" >> android/build.gradle
          echo "    project.evaluationDependsOn(':app')" >> android/build.gradle
          echo "}" >> android/build.gradle
          echo "tasks.register('clean', Delete) {" >> android/build.gradle
          echo "    delete rootProject.buildDir" >> android/build.gradle
          echo "}" >> android/build.gradle

      - name: Write app/build.gradle (conditional using echo)
        run: |
          if [ -f "android/key.properties" ]; then
            # Signed release build
            echo "plugins {" > android/app/build.gradle
            echo "    id \"com.android.application\"" >> android/app/build.gradle
            echo "    id \"kotlin-android\"" >> android/app/build.gradle
            echo "    id \"dev.flutter.flutter-gradle-plugin\"" >> android/app/build.gradle
            echo "}" >> android/app/build.gradle
            echo "" >> android/app/build.gradle
            echo "def keystoreProperties = new Properties()" >> android/app/build.gradle
            echo "def keystorePropertiesFile = rootProject.file('key.properties')" >> android/app/build.gradle
            echo "if (keystorePropertiesFile.exists()) {" >> android/app/build.gradle
            echo "    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))" >> android/app/build.gradle
            echo "}" >> android/app/build.gradle
            echo "" >> android/app/build.gradle
            echo "android {" >> android/app/build.gradle
            echo "    namespace \"${{ env.PACKAGE_NAME }}\"" >> android/app/build.gradle
            echo "    compileSdk = 35" >> android/app/build.gradle
            echo "    compileOptions {" >> android/app/build.gradle
            echo "        sourceCompatibility = JavaVersion.VERSION_17" >> android/app/build.gradle
            echo "        targetCompatibility = JavaVersion.VERSION_17" >> android/app/build.gradle
            echo "    }" >> android/app/build.gradle
            echo "    kotlinOptions {" >> android/app/build.gradle
            echo "        jvmTarget = \"17\"" >> android/app/build.gradle
            echo "    }" >> android/app/build.gradle
            echo "    defaultConfig {" >> android/app/build.gradle
            echo "        applicationId = \"${{ env.PACKAGE_NAME }}\"" >> android/app/build.gradle
            echo "        minSdk = 21" >> android/app/build.gradle
            echo "        targetSdk = 34" >> android/app/build.gradle
            echo "        versionCode = 1" >> android/app/build.gradle
            echo "        versionName = \"1.0\"" >> android/app/build.gradle
            echo "    }" >> android/app/build.gradle
            echo "    signingConfigs {" >> android/app/build.gradle
            echo "        release {" >> android/app/build.gradle
            echo "            keyAlias keystoreProperties['keyAlias']" >> android/app/build.gradle
            echo "            keyPassword keystoreProperties['keyPassword']" >> android/app/build.gradle
            echo "            storeFile file(keystoreProperties['storeFile'] ?: \"release-keystore.jks\")" >> android/app/build.gradle
            echo "            storePassword keystoreProperties['storePassword']" >> android/app/build.gradle
            echo "        }" >> android/app/build.gradle
            echo "    }" >> android/app/build.gradle
            echo "    buildTypes {" >> android/app/build.gradle
            echo "        release {" >> android/app/build.gradle
            echo "            signingConfig signingConfigs.release" >> android/app/build.gradle
            echo "            minifyEnabled false" >> android/app/build.gradle
            echo "            shrinkResources false" >> android/app/build.gradle
            echo "        }" >> android/app/build.gradle
            echo "    }" >> android/app/build.gradle
            echo "}" >> android/app/build.gradle
            echo "flutter {" >> android/app/build.gradle
            echo "    source = \"../..\"" >> android/app/build.gradle
            echo "}" >> android/app/build.gradle
          else
            # Debug signing (fallback)
            echo "plugins {" > android/app/build.gradle
            echo "    id \"com.android.application\"" >> android/app/build.gradle
            echo "    id \"kotlin-android\"" >> android/app/build.gradle
            echo "    id \"dev.flutter.flutter-gradle-plugin\"" >> android/app/build.gradle
            echo "}" >> android/app/build.gradle
            echo "" >> android/app/build.gradle
            echo "android {" >> android/app/build.gradle
            echo "    namespace \"${{ env.PACKAGE_NAME }}\"" >> android/app/build.gradle
            echo "    compileSdk = 35" >> android/app/build.gradle
            echo "    compileOptions {" >> android/app/build.gradle
            echo "        sourceCompatibility = JavaVersion.VERSION_17" >> android/app/build.gradle
            echo "        targetCompatibility = JavaVersion.VERSION_17" >> android/app/build.gradle
            echo "    }" >> android/app/build.gradle
            echo "    kotlinOptions {" >> android/app/build.gradle
            echo "        jvmTarget = \"17\"" >> android/app/build.gradle
            echo "    }" >> android/app/build.gradle
            echo "    defaultConfig {" >> android/app/build.gradle
            echo "        applicationId = \"${{ env.PACKAGE_NAME }}\"" >> android/app/build.gradle
            echo "        minSdk = 21" >> android/app/build.gradle
            echo "        targetSdk = 34" >> android/app/build.gradle
            echo "        versionCode = 1" >> android/app/build.gradle
            echo "        versionName = \"1.0\"" >> android/app/build.gradle
            echo "    }" >> android/app/build.gradle
            echo "    buildTypes {" >> android/app/build.gradle
            echo "        release {" >> android/app/build.gradle
            echo "            signingConfig = signingConfigs.debug" >> android/app/build.gradle
            echo "            minifyEnabled false" >> android/app/build.gradle
            echo "            shrinkResources false" >> android/app/build.gradle
            echo "        }" >> android/app/build.gradle
            echo "    }" >> android/app/build.gradle
            echo "}" >> android/app/build.gradle
            echo "flutter {" >> android/app/build.gradle
            echo "    source = \"../..\"" >> android/app/build.gradle
            echo "}" >> android/app/build.gradle
          fi

      - name: Update app name
        run: |
          sed -i "s/android:label=\".*\"/android:label=\"${{ env.APP_NAME }}\"/" android/app/src/main/AndroidManifest.xml

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Extract and apply custom icon
        run: |
          ICON_B64=$(jq -r '.assets.app_icon_base64 // ""' payload.json)
          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "null" ]; then
            echo "$ICON_B64" | base64 -d > /tmp/icon_raw.png
            for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              case $density in
                mdpi) size=48 ;;
                hdpi) size=72 ;;
                xhdpi) size=96 ;;
                xxhdpi) size=144 ;;
                xxxhdpi) size=192 ;;
              esac
              mkdir -p android/app/src/main/res/mipmap-$density
              convert /tmp/icon_raw.png -resize ${size}x${size} android/app/src/main/res/mipmap-$density/ic_launcher.png
            done
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FilterApp-APK-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: FilterApp-AAB-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
