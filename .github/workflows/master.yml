name: System Pro Master Engine
on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.24.5

      - name: 🛠️ Initialize & Clean
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            flutter create --platforms=android --project-name=system_pro .
          fi
          # پرانی تمام کنفیگریشنز صاف کرنا تاکہ کلین بلڈ ہو
          rm -rf android/app/build.gradle android/settings.gradle

      - name: 🧬 Step 1: Force Inject Correct Config
        run: |
          # نئی settings.gradle بنانا (Kotlin 1.9.22 کے ساتھ)
          cat <<EOF > android/settings.gradle
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
              id "com.android.application" version "8.2.1" apply false
              id "org.jetbrains.kotlin.android" version "1.9.22" apply false
          }
          include ":app"
          EOF

      - name: 🧬 Step 2: Inject Dependencies
        run: |
          sed -i '/home_widget/d; /torch_light/d; /http/d; /permission_handler/d; /torch:/d' pubspec.yaml
          sed -i '/dependencies:/a \  home_widget: ^0.7.0\n  torch_light: ^1.1.0\n  http: ^1.2.0\n  permission_handler: ^11.3.0' pubspec.yaml

      - name: 🧬 Step 3: Fixed Code Injection (Clean Dart)
        run: |
          mkdir -p lib
          printf '%s\n' "${{ github.event.client_payload.source_files.main_dart }}" > lib/main.dart
          # کوڈ میں موجود غلطیوں کی صفائی
          sed -i "s/package:torch\/torch.dart/package:torch_light\/torch_light.dart/g" lib/main.dart
          sed -i "s/await await/await/g" lib/main.dart
          sed -i "s/Torch.hasTorch/await TorchLight.isTorchAvailable()/g" lib/main.dart
          sed -i "s/Torch.turnOn()/await TorchLight.enableTorch()/g" lib/main.dart
          sed -i "s/Torch.turnOff()/await TorchLight.disableTorch()/g" lib/main.dart
          # اگر کہیں غلطی سے double await رہ گیا ہو تو اسے دوبارہ صاف کریں
          sed -i "s/await await/await/g" lib/main.dart

      - name: 🏗️ Step 4: Final Build
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-V6-4
          path: build/app/outputs/flutter-apk/*.apk
