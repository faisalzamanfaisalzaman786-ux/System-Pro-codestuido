      - name: 🧬 الٹرا اسمارٹ اے آئی انجن (Full Fix)
        run: |
          python3 - <<EOF
          import json, os, re, base64

          try:
              raw_payload = r'''${{ toJson(github.event.client_payload) }}'''
              data = json.loads(raw_payload)
              config = data.get('build_config', {})
              app_name = config.get('app_display_name', 'System Pro App')
              pkg_name = config.get('package_name', 'com.systempro.ultra')
              main_code = data.get('source_files', {}).get('main_dart', '')

              # 1. ورژن لاکنگ (Kotlin & Gradle)
              def fix_gradle():
                  path = 'android/build.gradle'
                  if os.path.exists(path):
                      with open(path, 'r') as f: c = f.read()
                      c = re.sub(r"ext\.kotlin_version = .*", "ext.kotlin_version = '1.9.22'", c)
                      with open(path, 'w') as f: f.write(c)
              fix_gradle()

              # 2. اسمارٹ پیکج اور پرمیشن ڈیٹیکٹر
              if os.path.exists('pubspec.yaml'):
                  with open('pubspec.yaml', 'r') as f: lines = f.readlines()
                  
                  # لائبریری میپنگ
                  lib_map = {
                      'torch': ('  torch_light: ^1.1.0\n', 'android.permission.FLASHLIGHT'),
                      'http': ('  http: ^1.2.0\n', 'android.permission.INTERNET'),
                      'camera': ('  camera: ^0.11.0\n', 'android.permission.CAMERA'),
                      'permission_handler': ('  permission_handler: ^11.3.0\n', '')
                  }
                  
                  active_permissions = []
                  final_lines = []
                  for line in lines:
                      if "dependencies:" in line:
                          final_lines.append(line)
                          for key, (val, perm) in lib_map.items():
                              if key in main_code.lower():
                                  final_lines.append(val)
                                  if perm: active_permissions.append(perm)
                      elif not any(k in line for k in lib_map.keys()):
                          final_lines.append(line)
                  with open('pubspec.yaml', 'w') as f: f.writelines(final_lines)

                  # 3. مینی فیسٹ میں پرمیشنز انجیکٹ کرنا
                  manifest_path = 'android/app/src/main/AndroidManifest.xml'
                  if os.path.exists(manifest_path):
                      with open(manifest_path, 'r') as f: m_content = f.read()
                      for p in set(active_permissions):
                          if p not in m_content:
                              m_content = m_content.replace('</manifest>', f'    <uses-permission android:name="{p}" />\n</manifest>')
                      # پیکیج نیم اور ایپ کا نام بھی فکس کرنا
                      m_content = re.sub(r'android:label="[^"]*"', f'android:label="{app_name}"', m_content)
                      m_content = m_content.replace('com.systempro.ultra', pkg_name)
                      with open(manifest_path, 'w') as f: f.write(m_content)

              # 4. آئیکن انجن (Payload سے آئیکن اٹھانا)
              icon_data = data.get('assets', {}).get('app_icon_base64', '')
              if icon_data:
                  img = base64.b64decode(icon_data.split(",")[1] if "," in icon_data else icon_data)
                  for root, dirs, files in os.walk('android/app/src/main/res/'):
                      if any(x in root for x in ['mipmap', 'drawable']):
                          for n in ['ic_launcher.png', 'launcher_icon.png', 'ic_launcher_round.png']:
                              with open(os.path.join(root, n), 'wb') as f: f.write(img)

              # 5. سورس کوڈ ریپیئر
              if main_code:
                  main_code = main_code.replace("package:torch/torch.dart", "package:torch_light/torch_light.dart")
                  main_code = main_code.replace("Torch.", "TorchLight.").replace("hasTorch", "isTorchAvailable")
                  main_code = main_code.replace("turnOn()", "enableTorch()").replace("turnOff()", "disableTorch()")
                  os.makedirs('lib', exist_ok=True)
                  with open('lib/main.dart', 'w', encoding='utf-8') as f: f.write(main_code)

          except Exception as e:
              print(f"❌ Smart Engine Error: {str(e)}"); exit(1)
          EOF
