name: Stable Base (Use Repo AndroidManifest from Backup)

on:
  repository_dispatch:
    types: [filter_app_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Download source from Separate Gists
        run: |
          MAIN_GIST_ID="${{ github.event.client_payload.main_gist_id }}"
          ICON_GIST_ID="${{ github.event.client_payload.icon_gist_id }}"
          
          echo "═══════════════════════════════════════════════════════════"
          echo "📦 DOWNLOADING FROM SEPARATE GISTS"
          echo "═══════════════════════════════════════════════════════════"
          
          if [ -z "$MAIN_GIST_ID" ] || [ "$MAIN_GIST_ID" = "null" ]; then
            echo "❌ No main_gist_id provided"
            exit 1
          fi
          
          mkdir -p lib
          
          # Download main.dart from its own Gist
          echo "📄 Downloading main.dart from Gist: $MAIN_GIST_ID"
          curl -s -L --retry 3 "https://gist.githubusercontent.com/raw/$MAIN_GIST_ID/main.dart" -o lib/main.dart 2>/dev/null
          
          if [ ! -s lib/main.dart ]; then
            echo "Raw URL failed, using API..."
            curl -s -L --retry 3 -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/gists/$MAIN_GIST_ID" -o main_gist.json
            jq -r '.files["main.dart"].content' main_gist.json > lib/main.dart
            rm -f main_gist.json
          fi
          
          # Download icon from its own Gist (if provided)
          echo ""
          echo "🖼️ Downloading icon from Gist: ${ICON_GIST_ID:-'Not provided'}"
          
          if [ -n "$ICON_GIST_ID" ] && [ "$ICON_GIST_ID" != "null" ] && [ "$ICON_GIST_ID" != "" ]; then
            curl -s -L --retry 3 "https://gist.githubusercontent.com/raw/$ICON_GIST_ID/icon.png" -o icon.png 2>/dev/null
            
            if [ ! -s icon.png ]; then
              curl -s -L --retry 3 -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/gists/$ICON_GIST_ID" -o icon_gist.json
              ICON_CONTENT=$(jq -r '.files["icon.png"].content // empty' icon_gist.json)
              if [ -n "$ICON_CONTENT" ] && [ "$ICON_CONTENT" != "null" ]; then
                echo "$ICON_CONTENT" | base64 -d > icon.png 2>/dev/null
              fi
              rm -f icon_gist.json
            fi
            
            # Fix if corrupted (ASCII text instead of PNG)
            if [ -s icon.png ] && file icon.png | grep -q "ASCII"; then
              echo "🔧 Fixing corrupted icon (ASCII to PNG)..."
              cat icon.png | base64 -d > icon_fixed.png 2>/dev/null
              if [ -s icon_fixed.png ] && file icon_fixed.png | grep -q "PNG"; then
                mv icon_fixed.png icon.png
                echo "✅ Icon fixed successfully"
              fi
            fi
            
            # Validate icon
            if [ -s icon.png ] && file icon.png | grep -q "PNG"; then
              echo "✅ Icon valid: $(wc -c < icon.png) bytes"
            else
              echo "⚠️ No valid icon found"
              rm -f icon.png
            fi
          else
            echo "ℹ️ No icon Gist provided"
          fi
          
          # Clean main.dart
          sed -i '1s/^\xEF\xBB\xBF//' lib/main.dart
          tr -d '\0' < lib/main.dart > lib/main_clean.dart
          mv lib/main_clean.dart lib/main.dart
          
          echo ""
          echo "✅ main.dart: $(wc -c < lib/main.dart) bytes"
          
          # Verify checksum
          EXPECTED_CHECKSUM="${{ github.event.client_payload.checksum }}"
          if [ -n "$EXPECTED_CHECKSUM" ] && [ "$EXPECTED_CHECKSUM" != "null" ]; then
            ACTUAL_CHECKSUM=$(sha256sum lib/main.dart | cut -d' ' -f1)
            if [ "$EXPECTED_CHECKSUM" != "$ACTUAL_CHECKSUM" ]; then
              echo "❌ Checksum mismatch!"
              exit 1
            fi
            echo "✅ Checksum verified"
          fi

      - name: Extract build config
        run: |
          echo "PACKAGE_NAME=${{ github.event.client_payload.build_config.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.build_config.app_display_name }}" >> $GITHUB_ENV
          echo "MIN_SDK=${{ github.event.client_payload.build_config.min_sdk }}" >> $GITHUB_ENV
          echo "TARGET_SDK=${{ github.event.client_payload.build_config.target_sdk }}" >> $GITHUB_ENV
          echo "USE_PROGUARD=${{ github.event.client_payload.build_config.use_proguard }}" >> $GITHUB_ENV

      - name: Create fresh Flutter project
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PKG" | rev | cut -d. -f1 | rev)
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android .
          echo "✅ Flutter project created"

      - name: Use repository pubspec.yaml
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            echo "❌ pubspec.yaml not found"
            exit 1
          fi
          flutter pub get

      - name: Copy AndroidManifest from backup
        run: |
          if [ -f "android_manifest_backup/AndroidManifest.xml" ]; then
            cp android_manifest_backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
            echo "✅ AndroidManifest copied"
          else
            echo "❌ AndroidManifest not found"
            exit 1
          fi

      - name: Fix manifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q 'xmlns:tools=' "$MANIFEST"; then
            sed -i 's/<manifest /<manifest xmlns:tools="http:\/\/schemas.android.com\/tools" /' "$MANIFEST"
          fi
          sed -i 's/package="[^"]*"//' "$MANIFEST"
          sed -i "s/android:label=\".*\"/android:label=\"${{ env.APP_NAME }}\"/" "$MANIFEST"

      - name: Fix Kotlin structure
        run: |
          PKG_PATH=$(echo "${{ env.PACKAGE_NAME }}" | tr '.' '/')
          mkdir -p android/app/src/main/kotlin/$PKG_PATH
          if [ -f "android/app/src/main/kotlin/com/example/app/MainActivity.kt" ]; then
            mv android/app/src/main/kotlin/com/example/app/MainActivity.kt android/app/src/main/kotlin/$PKG_PATH/MainActivity.kt
            rm -rf android/app/src/main/kotlin/com
          fi

      - name: Generate build.gradle
        run: |
          rm -f android/build.gradle.kts android/app/build.gradle.kts
          cat > android/build.gradle <<'EOF'
          buildscript {
              ext.kotlin_version = '2.1.0'
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          rootProject.buildDir = '../build'
          subprojects { project.buildDir = "${rootProject.buildDir}/${project.name}" }
          subprojects { project.evaluationDependsOn(':app') }
          tasks.register('clean', Delete) { delete rootProject.buildDir }
          EOF

          cat > android/app/build.gradle <<EOF
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "${{ env.PACKAGE_NAME }}"
              compileSdk = 36
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
                  coreLibraryDesugaringEnabled true
              }
              kotlinOptions { jvmTarget = "17" }
              defaultConfig {
                  applicationId = "${{ env.PACKAGE_NAME }}"
                  minSdk = ${{ env.MIN_SDK }}
                  targetSdk = ${{ env.TARGET_SDK }}
                  versionCode = 1
                  versionName = "1.0"
                  multiDexEnabled true
              }
              buildTypes {
                  release {
                      signingConfig = signingConfigs.debug
                      minifyEnabled = ${{ env.USE_PROGUARD }}
                      shrinkResources = ${{ env.USE_PROGUARD }}
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug { minifyEnabled = false }
              }
          }
          flutter { source = "../.." }
          dependencies {
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
          }
          EOF

      - name: Apply custom app icon
        run: |
          if [ -f "icon.png" ] && [ -s "icon.png" ]; then
            if file icon.png | grep -q "PNG"; then
              echo "✅ Applying custom icon..."
              for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
                mkdir -p android/app/src/main/res/mipmap-$density
                cp icon.png android/app/src/main/res/mipmap-$density/ic_launcher.png
                cp icon.png android/app/src/main/res/mipmap-$density/ic_launcher_round.png
              done
              echo "✅ Custom icon applied"
            else
              echo "⚠️ Icon file not valid PNG"
            fi
          else
            echo "ℹ️ No custom icon provided"
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FilterApp-${{ env.PACKAGE_NAME }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Cleanup temporary Gists
        if: always()
        run: |
          MAIN_GIST_ID="${{ github.event.client_payload.main_gist_id }}"
          ICON_GIST_ID="${{ github.event.client_payload.icon_gist_id }}"
          
          if [ -n "$MAIN_GIST_ID" ] && [ "$MAIN_GIST_ID" != "null" ]; then
            curl -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/gists/$MAIN_GIST_ID" --fail --silent || true
            echo "✅ main.dart gist deleted"
          fi
          
          if [ -n "$ICON_GIST_ID" ] && [ "$ICON_GIST_ID" != "null" ] && [ "$ICON_GIST_ID" != "" ]; then
            curl -X DELETE -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/gists/$ICON_GIST_ID" --fail --silent || true
            echo "✅ icon gist deleted"
          fi
