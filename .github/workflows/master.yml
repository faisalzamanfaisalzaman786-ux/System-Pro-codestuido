name: Flutter Build Studio

on:
  repository_dispatch:
    types: [flutter_app_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Extract build config from payload
        run: |
          echo "PACKAGE_NAME=${{ github.event.client_payload.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.app_name }}" >> $GITHUB_ENV
          echo "MIN_SDK=${{ github.event.client_payload.min_sdk }}" >> $GITHUB_ENV
          echo "TARGET_SDK=${{ github.event.client_payload.target_sdk }}" >> $GITHUB_ENV
          echo "USE_PROGUARD=${{ github.event.client_payload.use_proguard }}" >> $GITHUB_ENV
          echo "HAS_ICON=${{ github.event.client_payload.has_icon }}" >> $GITHUB_ENV

      - name: Debug - Check variables
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "🔍 CHECKING VARIABLES"
          echo "═══════════════════════════════════════════════════════════"
          echo "PACKAGE_NAME: ${{ env.PACKAGE_NAME }}"
          echo "APP_NAME: ${{ env.APP_NAME }}"
          echo "MIN_SDK: ${{ env.MIN_SDK }}"
          echo "TARGET_SDK: ${{ env.TARGET_SDK }}"
          echo "HAS_ICON: ${{ env.HAS_ICON }}"
          
          if [ -z "${{ env.PACKAGE_NAME }}" ]; then
            echo "❌ PACKAGE_NAME is empty! Using default"
            echo "PACKAGE_NAME=com.filter.app" >> $GITHUB_ENV
          fi
          
          if [ -z "${{ env.APP_NAME }}" ]; then
            echo "❌ APP_NAME is empty! Using default"
            echo "APP_NAME=Filter App" >> $GITHUB_ENV
          fi

      - name: Create fresh Flutter project
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PKG" | rev | cut -d. -f1 | rev)
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android .
          echo "✅ Fresh Flutter project created"

      - name: Copy main.dart from repository
        run: |
          if [ ! -f "lib/main.dart" ]; then
            echo "❌ lib/main.dart not found"
            exit 1
          fi
          echo "✅ main.dart found"

      - name: Use repository pubspec.yaml
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            echo "❌ pubspec.yaml not found"
            exit 1
          fi
          flutter pub get
          echo "✅ flutter pub get completed"

      - name: Copy AndroidManifest and XML resources
        run: |
          mkdir -p android/app/src/main/res/xml
          
          if [ -f "android_manifest_backup/AndroidManifest.xml" ]; then
            cp android_manifest_backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
            echo "✅ AndroidManifest.xml copied"
          else
            echo "❌ AndroidManifest.xml not found"
            exit 1
          fi
          
          if [ -f "android_manifest_backup/file_paths.xml" ]; then
            cp android_manifest_backup/file_paths.xml android/app/src/main/res/xml/
            echo "✅ file_paths.xml copied"
          fi
          
          if [ -f "android_manifest_backup/network_security_config.xml" ]; then
            cp android_manifest_backup/network_security_config.xml android/app/src/main/res/xml/
            echo "✅ network_security_config.xml copied"
          fi

      - name: Fix AndroidManifest.xml
        run: |
          sed -i 's/package="[^"]*"//g' android/app/src/main/AndroidManifest.xml
          sed -i "s/android:label=\".*\"/android:label=\"${{ env.APP_NAME }}\"/" android/app/src/main/AndroidManifest.xml
          echo "✅ AndroidManifest.xml fixed"

      - name: Create MainActivity.kt
        run: |
          PACKAGE="${{ env.PACKAGE_NAME }}"
          echo "Creating MainActivity.kt for package: $PACKAGE"
          
          PKG_PATH=$(echo "$PACKAGE" | tr '.' '/')
          mkdir -p android/app/src/main/kotlin/$PKG_PATH
          
          # Write the file
          cat > android/app/src/main/kotlin/$PKG_PATH/MainActivity.kt << EOF
          package $PACKAGE
          
          import io.flutter.embedding.android.FlutterActivity
          
          class MainActivity : FlutterActivity()
          EOF
          
          # Remove old directory
          rm -rf android/app/src/main/kotlin/com
          
          # Verify
          if [ -f "android/app/src/main/kotlin/$PKG_PATH/MainActivity.kt" ]; then
            echo "✅ MainActivity.kt created successfully"
            echo "File location: android/app/src/main/kotlin/$PKG_PATH/MainActivity.kt"
            echo ""
            echo "Content:"
            cat android/app/src/main/kotlin/$PKG_PATH/MainActivity.kt
          else
            echo "❌ Failed to create MainActivity.kt"
            echo "Tried to create at: android/app/src/main/kotlin/$PKG_PATH/MainActivity.kt"
            exit 1
          fi

      - name: Setup build.gradle
        run: |
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '2.1.0'
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          rootProject.buildDir = '../build'
          subprojects { project.buildDir = "\${rootProject.buildDir}/\${project.name}" }
          subprojects { project.evaluationDependsOn(':app') }
          tasks.register('clean', Delete) { delete rootProject.buildDir }
          EOF

          cat > android/app/build.gradle << EOF
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "${{ env.PACKAGE_NAME }}"
              compileSdk = 36
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
                  coreLibraryDesugaringEnabled true
              }
              kotlinOptions { jvmTarget = "17" }
              defaultConfig {
                  applicationId = "${{ env.PACKAGE_NAME }}"
                  minSdk = 23
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
                  multiDexEnabled true
              }
              buildTypes {
                  release {
                      signingConfig = signingConfigs.debug
                      minifyEnabled = false
                      shrinkResources = false
                  }
              }
          }
          flutter { source = "../.." }
          dependencies {
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
          }
          EOF
          echo "✅ build.gradle configured"

      - name: Apply custom app icon
        if: env.HAS_ICON == 'true'
        run: |
          if [ -f "assets/icon.png" ]; then
            for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$density
              cp assets/icon.png android/app/src/main/res/mipmap-$density/ic_launcher.png
              cp assets/icon.png android/app/src/main/res/mipmap-$density/ic_launcher_round.png
            done
            echo "✅ Custom icon applied"
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlutterApp-${{ env.PACKAGE_NAME }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Build Summary
        if: always()
        run: |
          echo "═══════════════════════════════════════════════════════════"
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ BUILD SUCCESSFUL"
          else
            echo "❌ BUILD FAILED"
          fi
          echo "═══════════════════════════════════════════════════════════"
          echo "Package: ${{ env.PACKAGE_NAME }}"
          echo "App Name: ${{ env.APP_NAME }}"
