name: Dynamic APK Builder (Safe V2 - Auto Kotlin)

on:
  workflow_dispatch:
    inputs:
      build_config:
        description: 'Build config (JSON)'
        required: true
        default: '{"package_name":"com.example.app","app_display_name":"MyApp","min_sdk":21,"target_sdk":34,"use_proguard":false}'
      source_files:
        description: 'Source files (JSON with base64)'
        required: true
        default: '{"main_dart":"","pubspec":""}'
      permissions:
        description: 'Permissions JSON'
        required: true
        default: '{"camera":false,"microphone":false,"vibrate":false,"location_granularity":"none"}'
      assets:
        description: 'Assets JSON (icon and additional)'
        required: true
        default: '{"app_icon_base64":"","additional_assets":[]}'
  repository_dispatch:
    types: [system_pro_build]

env:
  FLUTTER_VERSION: '3.29.2'
  KOTLIN_VERSION: '2.0.20'
  NDK_VERSION: '27.0.12077973'
  JAVA_VERSION: '17'
  # Versions Updated for Stability
  WEBVIEW_FLUTTER_VER: '4.13.0'
  WEBVIEW_ANDROID_VER: '4.12.0' # Yeh lazmi hai ایرر ختم کرنے کے لیے
  PERMISSION_HANDLER_VER: '12.0.1'
  PATH_PROVIDER_VER: '2.1.5'
  PACKAGE_INFO_PLUS_VER: '8.3.1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Build payload from inputs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            jq -n \
              --argjson bc '${{ toJson(github.event.inputs.build_config) }}' \
              --argjson sf '${{ toJson(github.event.inputs.source_files) }}' \
              --argjson pm '${{ toJson(github.event.inputs.permissions) }}' \
              --argjson as '${{ toJson(github.event.inputs.assets) }}' \
              '{build_config: $bc, source_files: $sf, permissions: $pm, assets: $as}' > payload.json
          else
            echo '${{ toJson(github.event.client_payload) }}' > payload.json
          fi

      - name: Extract Config
        run: |
          echo "PACKAGE_NAME=$(jq -r '.build_config.package_name' payload.json)" >> $GITHUB_ENV
          echo "APP_NAME=$(jq -r '.build_config.app_display_name' payload.json)" >> $GITHUB_ENV
          echo "MIN_SDK=$(jq -r '.build_config.min_sdk' payload.json)" >> $GITHUB_ENV
          echo "TARGET_SDK=$(jq -r '.build_config.target_sdk' payload.json)" >> $GITHUB_ENV
          echo "USE_PROGUARD=$(jq -r '.build_config.use_proguard' payload.json)" >> $GITHUB_ENV

      - name: Create fresh project
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PKG" | rev | cut -d. -f1 | rev)
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android .

      - name: Write Files
        run: |
          jq -r '.source_files.main_dart' payload.json | base64 -d > lib/main.dart
          jq -r '.source_files.pubspec' payload.json | base64 -d > pubspec.yaml

      - name: Fix and Force Dependencies
        run: |
          flutter pub get
          # Force adding the specific Android implementation
          flutter pub add webview_flutter:${{ env.WEBVIEW_FLUTTER_VER }}
          flutter pub add webview_flutter_android:${{ env.WEBVIEW_ANDROID_VER }}
          flutter pub add permission_handler:${{ env.PERMISSION_HANDLER_VER }}
          flutter pub add path_provider:${{ env.PATH_PROVIDER_VER }}
          flutter pub get

      - name: Android Configurations
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Add default permissions
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
          # Apply Label
          sed -i 's/android:label="[^"]*"/android:label="${{ env.APP_NAME }}"/' "$MANIFEST"
          
          # Handle Gradle Kotlin DSL
          APP_GRADLE="android/app/build.gradle.kts"
          sed -i 's/minSdk = .*/minSdk = ${{ env.MIN_SDK }}/' "$APP_GRADLE"
          sed -i 's/targetSdk = .*/targetSdk = ${{ env.TARGET_SDK }}/' "$APP_GRADLE"
          sed -i 's/namespace = .*/namespace = "${{ env.PACKAGE_NAME }}"/' "$APP_GRADLE"
          sed -i 's/applicationId = .*/applicationId = "${{ env.PACKAGE_NAME }}"/' "$APP_GRADLE"

      - name: Build APK
        run: |
          flutter build apk --release

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Build
          path: build/app/outputs/flutter-apk/*.apk
