# File: .github/workflows/master.yml
name: 🔥 Final Stable Build - V2 Embedding Fix

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build_apk]

env:
  FLUTTER_VERSION: '3.29.2'
  NDK_VERSION: '26.3.11579264'
  KOTLIN_VERSION: '2.0.20'
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 💾 Save Client Payload
        run: echo '${{ toJSON(github.event.client_payload) }}' > payload.json

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: 📦 Get Flutter Dependencies
        run: flutter pub get

      - name: 📱 Configure Android Project (V2 Embedding + Gradle Fixes)
        run: |
          # 1. AndroidManifest.xml میں V2 Embedding کا میٹا-ڈیٹا شامل کریں
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            # پہلے سے موجود APPLICATION ٹیگ کے اندر میٹا-ڈیٹا شامل کریں
            sed -i '/<application/,/<\/application>/ s|<application|<application>\n        <meta-data android:name="flutterEmbedding" android:value="2" />|' "$MANIFEST_PATH"
            echo "✅ AndroidManifest.xml updated with V2 embedding metadata"
          else
            echo "::warning::AndroidManifest.xml not found, skipping."
          fi

          # 2. Kotlin ورژن کو Settings Gradle میں اپڈیٹ کریں
          SETTINGS_GRADLE="android/settings.gradle.kts"
          if [ -f "$SETTINGS_GRADLE" ]; then
            sed -i 's/kotlin = "[^"]*"/kotlin = "${{ env.KOTLIN_VERSION }}"/' "$SETTINGS_GRADLE"
            echo "✅ Updated Kotlin version to ${{ env.KOTLIN_VERSION }} in settings.gradle.kts"
          else
            echo "::warning::settings.gradle.kts not found."
          fi

          # 3. App Gradle میں NDK ورژن سیٹ کریں
          APP_GRADLE="android/app/build.gradle.kts"
          if [ -f "$APP_GRADLE" ]; then
            if ! grep -q "ndkVersion" "$APP_GRADLE"; then
              sed -i '/android {/a \    ndkVersion = "${{ env.NDK_VERSION }}"' "$APP_GRADLE"
            else
              sed -i 's/ndkVersion[[:space:]]*=[[:space:]]*"[^"]*"/ndkVersion = "${{ env.NDK_VERSION }}"/' "$APP_GRADLE"
            fi
            echo "✅ NDK version set to ${{ env.NDK_VERSION }} in app/build.gradle.kts"
          else
            echo "::warning::app/build.gradle.kts not found."
          fi

      - name: 🎨 Override main.dart (if in payload)
        run: |
          MAIN_B64=$(jq -r '.client_payload.source_files.main_dart // empty' payload.json)
          if [[ -n "$MAIN_B64" && "$MAIN_B64" != "null" ]]; then
            echo "$MAIN_B64" | base64 -d > lib/main.dart
            echo "✅ main.dart replaced from payload."
          else
            echo "ℹ️ No main.dart in payload, keeping existing."
          fi

      - name: 🛠️ Auto-add Dependencies
        run: |
          if grep -q "import 'package:" lib/main.dart; then
            grep -oE "import 'package:([^/']+)" lib/main.dart | sed "s/import 'package://" | sort -u | while read pkg; do
              if [[ "$pkg" != "flutter" ]]; then
                echo "📦 Adding package: $pkg"
                flutter pub add "$pkg" || echo "⚠️ Failed to add $pkg"
              fi
            done
            flutter pub get
          else
            echo "ℹ️ No external packages found in main.dart"
          fi

      - name: 🔨 Build Release APK
        run: flutter build apk --release

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-APK-${{ github.run_id }}
          path: build/app/outputs/flutter-apk/*.apk
