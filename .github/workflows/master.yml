name: System Pro Master Engine

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 چیک آؤٹ
        uses: actions/checkout@v4

      - name: 🚀 فلٹر سٹیبل لاک (3.24.5)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.5'
          cache: true

      - name: 🧬 اسمارٹ انجن (Code & Logic Repair)
        run: |
          python3 - <<EOF
          import json, os, re, base64

          try:
              raw_payload = r'''${{ toJson(github.event.client_payload) }}'''
              data = json.loads(raw_payload)
              config = data.get('build_config', {})
              app_name = config.get('app_display_name', 'System Pro App')
              pkg_name = config.get('package_name', 'com.systempro.ultra')
              main_code = data.get('source_files', {}).get('main_dart', '')

              # 1. کوٹلن ورژن لاک (1.9.22)
              gradle_path = 'android/build.gradle'
              if os.path.exists(gradle_path):
                  with open(gradle_path, 'r') as f: content = f.read()
                  content = re.sub(r"ext\.kotlin_version = .*", "ext.kotlin_version = '1.9.22'", content)
                  with open(gradle_path, 'w') as f: f.write(content)

              # 2. پب اسپیک فکس (Universal Dependencies)
              if os.path.exists('pubspec.yaml'):
                  with open('pubspec.yaml', 'r') as f: lines = f.readlines()
                  libs = {
                      'torch_light': '  torch_light: ^1.1.0\n',
                      'http': '  http: ^1.2.0\n',
                      'permission_handler': '  permission_handler: ^11.3.0\n'
                  }
                  clean_lines = [l for l in lines if not any(k in l for k in libs.keys())]
                  final_lines = []
                  for line in clean_lines:
                      final_lines.append(line)
                      if line.strip() == "dependencies:":
                          for key, value in libs.items():
                              if key in main_code or (key == 'torch_light' and 'torch' in main_code.lower()):
                                  final_lines.append(value)
                  with open('pubspec.yaml', 'w') as f: f.writelines(final_lines)

              # 3. آئیکن انجن
              icon_b64 = data.get('assets', {}).get('app_icon_base64', None)
              if icon_b64:
                  img_data = base64.b64decode(icon_b64.split(",")[1] if "," in icon_b64 else icon_b64)
                  for root, dirs, files in os.walk('android/app/src/main/res/'):
                      if any(x in root for x in ['mipmap', 'drawable']):
                          for name in ['ic_launcher.png', 'launcher_icon.png']:
                              with open(os.path.join(root, name), 'wb') as f: f.write(img_data)

              # 4. ڈائنامک کوڈ ریپیئر (TorchLight Methods Fix)
              if main_code:
                  # پرانے امپورٹس اور فنکشنز کو نئے ورژن کے مطابق بدلنا
                  main_code = main_code.replace("package:torch/torch.dart", "package:torch_light/torch_light.dart")
                  main_code = main_code.replace("Torch.", "TorchLight.")
                  # نئے ورژن کے فنکشنز کے ناموں سے تبدیل کرنا
                  main_code = main_code.replace("hasTorch", "isTorchAvailable")
                  main_code = main_code.replace("turnOn()", "enableTorch()")
                  main_code = main_code.replace("turnOff()", "disableTorch()")
                  
                  os.makedirs('lib', exist_ok=True)
                  with open('lib/main.dart', 'w', encoding='utf-8') as f: f.write(main_code)

          except Exception as e:
              print(f"❌ Smart Logic Error: {str(e)}"); exit(1)
          EOF

      - name: 🏗️ بلڈ اینڈرائیڈ ریلیز
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: 📤 اپ لوڈ سٹیبل APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Locked-Build
          path: build/app/outputs/flutter-apk/*.apk
