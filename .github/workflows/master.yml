name: System Pro Universal Builder

on:
  repository_dispatch:
    types: [system_pro_build]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable

      - name: Create Flutter project with dynamic package name
        run: |
          rm -f pubspec.yaml
          NEW_PACKAGE="${{ github.event.client_payload.build_config.package_name }}"
          : "${NEW_PACKAGE:=com.systempro.default}"
          ORG=$(echo "$NEW_PACKAGE" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$NEW_PACKAGE" | rev | cut -d. -f1 | rev)
          echo "Using org=$ORG, project=$PROJ"
          rm -rf android ios
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android,ios .
          echo "✅ Flutter project created"

      # ========== مستحکم حصہ: ڈیفالٹ فائلوں کو ہٹانا ==========
      - name: Remove default files before injecting custom ones
        run: |
          rm -f lib/main.dart
          rm -f pubspec.yaml
          rm -f android/app/src/main/AndroidManifest.xml
          rm -f android/app/build.gradle
          rm -rf android/app/src/main/res/xml
          echo "✅ Default files removed"

      # ========== network_security_config.xml ہمیشہ کے لیے بنا دیں ==========
      - name: Create network_security_config.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/network_security_config.xml <<'EOF'
<?xml version="1.0" encoding="utf-8"?>
<network-security-config>
    <base-config cleartextTrafficPermitted="true">
        <trust-anchors>
            <certificates src="system" />
        </trust-anchors>
    </base-config>
    <domain-config cleartextTrafficPermitted="true">
        <domain includeSubdomains="true">example.com</domain>
    </domain-config>
</network-security-config>
EOF
          echo "✅ network_security_config.xml created"

      # ========== UI سے آنے والی فائلیں ڈالیں ==========
      - name: Override pubspec.yaml from UI payload
        run: |
          PUBSPEC_B64='${{ github.event.client_payload.source_files.pubspec }}'
          if [ -n "$PUBSPEC_B64" ] && [ "$PUBSPEC_B64" != "null" ]; then
            echo "$PUBSPEC_B64" | base64 -d > pubspec.yaml
            echo "✅ pubspec.yaml applied"
          fi

      - name: Override main.dart from UI payload
        run: |
          MAIN_B64='${{ github.event.client_payload.source_files.main_dart }}'
          if [ -n "$MAIN_B64" ] && [ "$MAIN_B64" != "null" ]; then
            echo "$MAIN_B64" | base64 -d > lib/main.dart
            echo "✅ main.dart applied"
          fi

      - name: Override AndroidManifest.xml from UI payload
        run: |
          MANIFEST_B64='${{ github.event.client_payload.source_files.android_manifest }}'
          if [ -n "$MANIFEST_B64" ] && [ "$MANIFEST_B64" != "null" ]; then
            echo "$MANIFEST_B64" | base64 -d > android/app/src/main/AndroidManifest.xml
            echo "✅ AndroidManifest.xml applied"
          fi

      - name: Override build.gradle from UI payload
        run: |
          GRADLE_B64='${{ github.event.client_payload.source_files.build_gradle }}'
          if [ -n "$GRADLE_B64" ] && [ "$GRADLE_B64" != "null" ]; then
            echo "$GRADLE_B64" | base64 -d > android/app/build.gradle
            echo "✅ build.gradle applied"
          fi

      # ========== باقی کنفیگریشن (لیبل، SDK، پرمیشنز، آئیکن، اثاثے) ==========
      - name: Update app label, SDK versions, permissions, icon, assets
        run: |
          APP_NAME="${{ github.event.client_payload.build_config.app_display_name }}"
          MIN_SDK="${{ github.event.client_payload.build_config.min_sdk }}"
          TARGET_SDK="${{ github.event.client_payload.build_config.target_sdk }}"
          PROGUARD="${{ github.event.client_payload.build_config.use_proguard }}"

          : "${APP_NAME:=System Pro App}"
          : "${MIN_SDK:=21}"
          : "${TARGET_SDK:=34}"
          : "${PROGUARD:=false}"

          echo "📱 App name: $APP_NAME, minSdk=$MIN_SDK, targetSdk=$TARGET_SDK"

          MANIFEST="android/app/src/main/AndroidManifest.xml"
          GRADLE="android/app/build.gradle"

          # Update app label
          sed -i "s/android:label=\".*\"/android:label=\"${APP_NAME}\"/" "$MANIFEST"

          # Update minSdk and targetSdk in build.gradle
          sed -i "s/minSdk[[:space:]]*=[[:space:]]*[0-9]\+/minSdk = ${MIN_SDK}/" "$GRADLE"
          sed -i "s/targetSdk[[:space:]]*=[[:space:]]*[0-9]\+/targetSdk = ${TARGET_SDK}/" "$GRADLE"
          sed -i "s/minSdk[[:space:]]\+[0-9]\+/minSdk = ${MIN_SDK}/" "$GRADLE"
          sed -i "s/targetSdk[[:space:]]\+[0-9]\+/targetSdk = ${TARGET_SDK}/" "$GRADLE"
          if [ "$PROGUARD" = "true" ]; then
            sed -i "s/minifyEnabled[[:space:]]*=[[:space:]]*false/minifyEnabled = true/" "$GRADLE"
          fi

          # Permissions (existing code as before, no change needed)
          PERMS_JSON='${{ toJson(github.event.client_payload.permissions) }}'
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

          add_perm() {
            local perm_xml="$1"
            local perm_name="$2"
            if ! grep -q "$perm_name" "$MANIFEST"; then
              sed -i "/<manifest>/a \    $perm_xml" "$MANIFEST"
              echo "  + Added $perm_name"
            else
              echo "  - Already present: $perm_name"
            fi
          }

          if [ -n "$PERMS_JSON" ] && [ "$PERMS_JSON" != "null" ]; then
            echo "🔐 Processing permissions from payload..."
            echo "$PERMS_JSON" | jq -r 'to_entries[] | select(.value==true) | .key' > perms_list.txt
            
            while read perm; do
              case $perm in
                storage)
                  add_perm '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' "READ_EXTERNAL_STORAGE"
                  add_perm '<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' "WRITE_EXTERNAL_STORAGE"
                  ;;
                camera) add_perm '<uses-permission android:name="android.permission.CAMERA" />' "CAMERA" ;;
                bluetooth)
                  add_perm '<uses-permission android:name="android.permission.BLUETOOTH" />' "BLUETOOTH"
                  add_perm '<uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />' "BLUETOOTH_ADMIN"
                  add_perm '<uses-permission android:name="android.permission.BLUETOOTH_SCAN" />' "BLUETOOTH_SCAN"
                  add_perm '<uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />' "BLUETOOTH_CONNECT"
                  ;;
                microphone) add_perm '<uses-permission android:name="android.permission.RECORD_AUDIO" />' "RECORD_AUDIO" ;;
                contacts)
                  add_perm '<uses-permission android:name="android.permission.READ_CONTACTS" />' "READ_CONTACTS"
                  add_perm '<uses-permission android:name="android.permission.WRITE_CONTACTS" />' "WRITE_CONTACTS"
                  ;;
                notif) add_perm '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "POST_NOTIFICATIONS" ;;
                foreground) add_perm '<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' "FOREGROUND_SERVICE" ;;
                sms)
                  add_perm '<uses-permission android:name="android.permission.SEND_SMS" />' "SEND_SMS"
                  add_perm '<uses-permission android:name="android.permission.READ_SMS" />' "READ_SMS"
                  ;;
                vibrate) add_perm '<uses-permission android:name="android.permission.VIBRATE" />' "VIBRATE" ;;
              esac
            done < perms_list.txt
            
            LOC=$(echo "$PERMS_JSON" | jq -r '.location_granularity // ""')
            if [ "$LOC" = "fine" ]; then
              add_perm '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' "ACCESS_FINE_LOCATION"
            elif [ "$LOC" = "coarse" ]; then
              add_perm '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' "ACCESS_COARSE_LOCATION"
            fi
          else
            echo "ℹ️ No permissions payload"
          fi

      - name: Set app icon (if provided)
        run: |
          ICON_B64="${{ github.event.client_payload.assets.app_icon_base64 }}"
          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "null" ]; then
            mkdir -p android/app/src/main/res/mipmap-hdpi
            echo "$ICON_B64" | base64 -d > android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            for density in mdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$density
              cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-$density/
            done
            echo "✅ App icon set"
          else
            echo "ℹ️ No icon provided"
          fi

      - name: Additional assets
        run: |
          ASSETS='${{ toJson(github.event.client_payload.assets.additional_assets) }}'
          if [ -n "$ASSETS" ] && [ "$ASSETS" != "null" ] && [ "$ASSETS" != "[]" ]; then
            echo "$ASSETS" | jq -c '.[]' | while read asset; do
              NAME=$(echo "$asset" | jq -r '.name')
              B64=$(echo "$asset" | jq -r '.base64')
              mkdir -p assets
              echo "$B64" | base64 -d > "assets/$NAME"
            done
            echo "✅ Additional assets added"
          else
            echo "ℹ️ No additional assets"
          fi

      - name: Build APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Build-${{ github.run_id }}
          path: build/app/outputs/flutter-apk/*.apk
