name: System Pro Universal Builder

on:
  repository_dispatch:
    types: [system_pro_build]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable

      - name: Remove old pubspec.yaml to avoid bad dependencies
        run: |
          rm -f pubspec.yaml
          echo "Removed existing pubspec.yaml"

      - name: Create Flutter project (fresh template)
        run: |
          flutter create --project-name=system_pro_app --platforms=android,ios .

      - name: Decode and write source files from payload (overwrite everything)
        run: |
          set -e
          echo "📦 Overwriting with payload files..."

          decode_b64() {
            local b64="$1" out="$2"
            if [ -n "$b64" ] && [ "$b64" != "null" ]; then
              echo "$b64" | base64 -d > "$out"
              echo "✅ Updated $out from payload"
              return 0
            else
              echo "❌ No valid base64 for $out"
              return 1
            fi
          }

          # main.dart (mandatory)
          MAIN_B64='${{ github.event.client_payload.source_files.main_dart }}'
          if ! decode_b64 "$MAIN_B64" lib/main.dart; then
            echo "⚠️ No main.dart from payload, using fallback"
            cat > lib/main.dart <<'EOF'
          // Fallback main.dart
          import 'package:flutter/material.dart';
          void main() => runApp(MyApp());
          class MyApp extends StatelessWidget {
            @override Widget build(BuildContext context) => MaterialApp(home: Scaffold(body: Center(child: Text('Hello from System Pro'))));
          }
          EOF
          fi

          # pubspec.yaml (always override with either payload or clean default)
          PUBSPEC_B64='${{ github.event.client_payload.source_files.pubspec }}'
          if decode_b64 "$PUBSPEC_B64" pubspec.yaml; then
            echo "Using pubspec from payload"
          else
            echo "No pubspec from payload, writing clean default"
            cat > pubspec.yaml <<'EOF'
          name: system_pro_app
          description: A new Flutter project.
          version: 1.0.0+1
          environment:
            sdk: '>=3.4.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
            permission_handler: ^11.3.0
            http: ^1.2.0
            shared_preferences: ^2.2.3
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^4.0.0
          flutter:
            uses-material-design: true
          EOF
          fi

          # Note: We are NOT overwriting AndroidManifest.xml or build.gradle fully.
          # We will only modify them dynamically later.

      - name: Apply dynamic configuration (package name, app name, permissions, icon)
        run: |
          NEW_PACKAGE="${{ github.event.client_payload.build_config.package_name }}"
          APP_NAME="${{ github.event.client_payload.build_config.app_display_name }}"
          MIN_SDK="${{ github.event.client_payload.build_config.min_sdk }}"
          TARGET_SDK="${{ github.event.client_payload.build_config.target_sdk }}"
          PROGUARD="${{ github.event.client_payload.build_config.use_proguard }}"

          : "${NEW_PACKAGE:=com.systempro.default}"
          : "${APP_NAME:=System Pro App}"
          : "${MIN_SDK:=21}"
          : "${TARGET_SDK:=34}"
          : "${PROGUARD:=false}"

          echo "📱 Config: $NEW_PACKAGE, $APP_NAME, minSdk=$MIN_SDK, targetSdk=$TARGET_SDK"

          MANIFEST="android/app/src/main/AndroidManifest.xml"
          GRADLE="android/app/build.gradle"

          # Update package and label in manifest
          sed -i "s/package=\".*\"/package=\"${NEW_PACKAGE}\"/" "$MANIFEST"
          sed -i "s/android:label=\".*\"/android:label=\"${APP_NAME}\"/" "$MANIFEST"

          # Update namespace, applicationId, minSdk, targetSdk in build.gradle
          sed -i "s/namespace \".*\"/namespace \"${NEW_PACKAGE}\"/" "$GRADLE"
          sed -i "s/applicationId \".*\"/applicationId \"${NEW_PACKAGE}\"/" "$GRADLE"
          sed -i "s/minSdk [0-9]\+/minSdk ${MIN_SDK}/" "$GRADLE"
          sed -i "s/targetSdk [0-9]\+/targetSdk ${TARGET_SDK}/" "$GRADLE"
          if [ "$PROGUARD" = "true" ]; then
            sed -i "s/minifyEnabled false/minifyEnabled true/" "$GRADLE"
          fi

          # Add permissions (no duplicates)
          PERMS_JSON='${{ toJson(github.event.client_payload.permissions) }}'
          if ! command -v jq &> /dev/null; then sudo apt-get update && sudo apt-get install -y jq; fi
          add_perm() {
            local perm_xml="$1" perm_name="$2"
            if ! grep -q "$perm_name" "$MANIFEST"; then
              sed -i "/<manifest>/a \    $perm_xml" "$MANIFEST"
            fi
          }
          if [ -n "$PERMS_JSON" ] && [ "$PERMS_JSON" != "null" ]; then
            echo "$PERMS_JSON" | jq -r 'to_entries[] | select(.value==true) | .key' | while read perm; do
              case $perm in
                storage) add_perm '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' "READ_EXTERNAL_STORAGE"; add_perm '<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' "WRITE_EXTERNAL_STORAGE" ;;
                camera) add_perm '<uses-permission android:name="android.permission.CAMERA" />' "CAMERA" ;;
                bluetooth) add_perm '<uses-permission android:name="android.permission.BLUETOOTH" />' "BLUETOOTH"; add_perm '<uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />' "BLUETOOTH_ADMIN"; add_perm '<uses-permission android:name="android.permission.BLUETOOTH_SCAN" />' "BLUETOOTH_SCAN"; add_perm '<uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />' "BLUETOOTH_CONNECT" ;;
                microphone) add_perm '<uses-permission android:name="android.permission.RECORD_AUDIO" />' "RECORD_AUDIO" ;;
                contacts) add_perm '<uses-permission android:name="android.permission.READ_CONTACTS" />' "READ_CONTACTS"; add_perm '<uses-permission android:name="android.permission.WRITE_CONTACTS" />' "WRITE_CONTACTS" ;;
                notif) add_perm '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "POST_NOTIFICATIONS" ;;
                foreground) add_perm '<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' "FOREGROUND_SERVICE" ;;
                sms) add_perm '<uses-permission android:name="android.permission.SEND_SMS" />' "SEND_SMS"; add_perm '<uses-permission android:name="android.permission.READ_SMS" />' "READ_SMS" ;;
                vibrate) add_perm '<uses-permission android:name="android.permission.VIBRATE" />' "VIBRATE" ;;
              esac
            done
            LOC=$(echo "$PERMS_JSON" | jq -r '.location_granularity // ""')
            if [ "$LOC" = "fine" ]; then add_perm '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' "ACCESS_FINE_LOCATION"
            elif [ "$LOC" = "coarse" ]; then add_perm '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' "ACCESS_COARSE_LOCATION"; fi
          else
            echo "ℹ️ No permissions payload"
          fi

      - name: Set app icon (if provided)
        run: |
          ICON_B64="${{ github.event.client_payload.assets.app_icon_base64 }}"
          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "null" ]; then
            mkdir -p android/app/src/main/res/mipmap-hdpi
            echo "$ICON_B64" | base64 -d > android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            for density in mdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$density
              cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-$density/
            done
            echo "✅ App icon set"
          else echo "ℹ️ No icon provided"; fi

      - name: Additional assets
        run: |
          ASSETS='${{ toJson(github.event.client_payload.assets.additional_assets) }}'
          if [ -n "$ASSETS" ] && [ "$ASSETS" != "null" ] && [ "$ASSETS" != "[]" ]; then
            echo "$ASSETS" | jq -c '.[]' | while read asset; do
              NAME=$(echo "$asset" | jq -r '.name')
              B64=$(echo "$asset" | jq -r '.base64')
              mkdir -p assets
              echo "$B64" | base64 -d > "assets/$NAME"
            done
            echo "✅ Additional assets added"
          else echo "ℹ️ No additional assets"; fi

      - name: Build APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Build-${{ github.run_id }}
          path: build/app/outputs/flutter-apk/*.apk
