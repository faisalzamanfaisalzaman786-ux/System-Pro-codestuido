name: System Pro Master Engine

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 🧬 Smart Ingestion
        run: |
          python3 - <<EOF
          import json, os, re, base64

          # ڈیٹا لوڈنگ
          try:
              raw_payload = r'''${{ toJson(github.event.client_payload) }}'''
              data = json.loads(raw_payload)
              
              # 1. Pubspec.yaml کی صفائی (Duplicate Error Fix)
              if os.path.exists('pubspec.yaml'):
                  with open('pubspec.yaml', 'r') as f: lines = f.readlines()
                  final_lines = []
                  seen = set()
                  for line in lines:
                      match = re.match(r'^\s*([\w\-]+):', line)
                      if match:
                          key = match.group(1)
                          if key in ["permission_handler", "http"] and key in seen: continue
                          seen.add(key)
                      final_lines.append(line)
                  with open('pubspec.yaml', 'w') as f: f.writelines(final_lines)

              # 2. ڈائنامک فائل انجکشن
              app_name = data.get('build_config', {}).get('app_display_name', 'System Pro')
              pkg_name = data.get('build_config', {}).get('package_name', 'com.systempro.ultra')
              
              # Main.dart Update
              os.makedirs('lib', exist_ok=True)
              with open('lib/main.dart', 'w') as f:
                  f.write(data.get('source_files', {}).get('main_dart', ''))

              # Manifest Update
              m_path = 'android/app/src/main/AndroidManifest.xml'
              if os.path.exists(m_path):
                  with open(m_path, 'r') as f: c = f.read()
                  c = re.sub(r'android:label="[^"]*"', f'android:label="{app_name}"', c)
                  c = c.replace('com.systempro.ultra', pkg_name)
                  with open(m_path, 'w') as f: f.write(c)
              
              print("✅ Configuration Applied Successfully")
          except Exception as e:
              print(f"❌ Error: {e}")
              exit(1)
          EOF

      - name: 🏗️ Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Release
          path: build/app/outputs/flutter-apk/*.apk
