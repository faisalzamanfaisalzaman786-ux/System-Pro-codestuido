name: Flutter Build Studio

on:
  repository_dispatch:
    types: [flutter_app_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Extract build config from payload
        run: |
          echo "PACKAGE_NAME=${{ github.event.client_payload.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.app_name }}" >> $GITHUB_ENV
          echo "MIN_SDK=${{ github.event.client_payload.min_sdk }}" >> $GITHUB_ENV
          echo "TARGET_SDK=${{ github.event.client_payload.target_sdk }}" >> $GITHUB_ENV
          echo "USE_PROGUARD=${{ github.event.client_payload.use_proguard }}" >> $GITHUB_ENV
          echo "HAS_ICON=${{ github.event.client_payload.has_icon }}" >> $GITHUB_ENV
          
          echo "═══════════════════════════════════════════════════════════"
          echo "📦 BUILD CONFIGURATION"
          echo "═══════════════════════════════════════════════════════════"
          echo "Package: ${{ env.PACKAGE_NAME }}"
          echo "App Name: ${{ env.APP_NAME }}"
          echo "Min SDK: ${{ env.MIN_SDK }}"
          echo "Target SDK: ${{ env.TARGET_SDK }}"
          echo "ProGuard: ${{ env.USE_PROGUARD }}"
          echo "Has Icon: ${{ env.HAS_ICON }}"

      - name: Create fresh Flutter project
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PKG" | rev | cut -d. -f1 | rev)
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android .
          echo "✅ Fresh Flutter project created"

      - name: Copy main.dart from repository
        run: |
          if [ -f "lib/main.dart" ]; then
            echo "✅ main.dart found in repository"
            cat lib/main.dart | head -5
          else
            echo "❌ lib/main.dart not found in repository!"
            exit 1
          fi

      - name: Copy custom AndroidManifest.xml from repository backup
        run: |
          if [ -f "android_manifest_backup/AndroidManifest.xml" ]; then
            cp android_manifest_backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
            echo "✅ Custom AndroidManifest.xml copied"
          else
            echo "⚠️ No custom AndroidManifest.xml found, using default"
          fi

      - name: Fix manifest compatibility
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            if ! grep -q 'xmlns:tools=' "$MANIFEST"; then
              sed -i 's/<manifest /<manifest xmlns:tools="http:\/\/schemas.android.com\/tools" /' "$MANIFEST"
            fi
            sed -i 's/package="[^"]*"//' "$MANIFEST"
            sed -i "s/android:label=\".*\"/android:label=\"${{ env.APP_NAME }}\"/" "$MANIFEST"
            echo "✅ Manifest fixes applied"
          fi

      - name: Use repository pubspec.yaml
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            echo "❌ pubspec.yaml not found in repository root!"
            exit 1
          fi
          flutter pub get
          echo "✅ flutter pub get completed"

      - name: Fix Kotlin directory structure
        run: |
          PKG_PATH=$(echo "${{ env.PACKAGE_NAME }}" | tr '.' '/')
          mkdir -p android/app/src/main/kotlin/$PKG_PATH
          if [ -f "android/app/src/main/kotlin/com/example/app/MainActivity.kt" ]; then
            mv android/app/src/main/kotlin/com/example/app/MainActivity.kt android/app/src/main/kotlin/$PKG_PATH/MainActivity.kt
            rm -rf android/app/src/main/kotlin/com
          fi
          echo "✅ Kotlin structure fixed"

      - name: Generate build.gradle
        run: |
          rm -f android/build.gradle.kts android/app/build.gradle.kts
          cat > android/build.gradle <<'EOF'
          buildscript {
              ext.kotlin_version = '2.1.0'
              repositories { google(); mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects { repositories { google(); mavenCentral() } }
          rootProject.buildDir = '../build'
          subprojects { project.buildDir = "${rootProject.buildDir}/${project.name}" }
          subprojects { project.evaluationDependsOn(':app') }
          tasks.register('clean', Delete) { delete rootProject.buildDir }
          EOF

          cat > android/app/build.gradle <<EOF
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "${{ env.PACKAGE_NAME }}"
              compileSdk = 36
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
                  coreLibraryDesugaringEnabled true
              }
              kotlinOptions { jvmTarget = "17" }
              defaultConfig {
                  applicationId = "${{ env.PACKAGE_NAME }}"
                  minSdk = ${{ env.MIN_SDK }}
                  targetSdk = ${{ env.TARGET_SDK }}
                  versionCode = 1
                  versionName = "1.0"
                  multiDexEnabled true
              }
              buildTypes {
                  release {
                      signingConfig = signingConfigs.debug
                      minifyEnabled = ${{ env.USE_PROGUARD }}
                      shrinkResources = ${{ env.USE_PROGUARD }}
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
                  debug { minifyEnabled = false }
              }
          }
          flutter { source = "../.." }
          
          dependencies {
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
          }
          EOF
          echo "✅ build.gradle generated"

      - name: Apply custom app icon (if provided)
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "🖼️ ICON APPLICATION"
          echo "═══════════════════════════════════════════════════════════"
          
          if [ "${{ env.HAS_ICON }}" = "true" ] && [ -f "assets/icon.png" ]; then
            echo "📷 Custom icon found in repository"
            
            # Check if it's a valid PNG
            if file assets/icon.png | grep -q "PNG"; then
              echo "✅ Valid PNG icon detected"
              
              # Apply to all mipmap densities
              for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
                mkdir -p android/app/src/main/res/mipmap-$density
                cp assets/icon.png android/app/src/main/res/mipmap-$density/ic_launcher.png
                cp assets/icon.png android/app/src/main/res/mipmap-$density/ic_launcher_round.png
              done
              
              echo "✅ Custom icon applied to all densities"
            else
              echo "⚠️ Icon file exists but is not valid PNG"
              echo "File type: $(file assets/icon.png)"
              echo "ℹ️ Using default Flutter icon"
            fi
          else
            echo "ℹ️ No custom icon provided, using default Flutter icon"
          fi

      - name: Build release APK
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "🔨 BUILDING APK"
          echo "═══════════════════════════════════════════════════════════"
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlutterApp-${{ env.PACKAGE_NAME }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        if: success()
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "📦 CREATING RELEASE"
          echo "═══════════════════════════════════════════════════════════"
          
          # Install GitHub CLI
          sudo apt-get update -qq
          sudo apt-get install -y -qq gh
            
          # Create release with current timestamp
          TAG_NAME="build-${{ github.run_number }}-$(date +'%Y%m%d-%H%M%S')"
          RELEASE_NAME="Build ${{ github.run_number }} - ${{ env.APP_NAME }}"
          
          gh release create "$TAG_NAME" \
            --title "$RELEASE_NAME" \
            --notes "Build triggered from Flutter Forge UI" \
            --repo "${{ github.repository }}" \
            build/app/outputs/flutter-apk/app-release.apk
          
          echo "✅ Release created: $TAG_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        if: always()
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════"
          echo "🏁 BUILD SUMMARY"
          echo "═══════════════════════════════════════════════════════════"
          echo ""
          echo "📦 Package: ${{ env.PACKAGE_NAME }}"
          echo "📱 App Name: ${{ env.APP_NAME }}"
          echo "🖼️ Custom Icon: ${{ env.HAS_ICON }}"
          echo "✅ Build Status: ${{ job.status }}"
          echo ""
