name: 🏗️ System Pro Structure Builder

on:
  push:
    branches:
      - main  # اگر آپ کی مین برانچ کا نام 'master' ہے تو یہاں بدل دیں
  workflow_dispatch: # یہ مینوئل بٹن کے لیے بھی رہے گا

jobs:
  build_foundation:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Setup Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      - name: 🏗️ Create Full Flutter Skeleton
        run: |
          # مکمل فلٹر پروجیکٹ کی تخلیق
          flutter create . --org com.systempro.ultra --project-name system_pro_app --platforms android
          
          # سسٹم پرو کے مخصوص فولڈرز بنانا
          mkdir -p lib/core/theme
          mkdir -p lib/core/services
          mkdir -p lib/presentation/widgets
          mkdir -p lib/data/models
          mkdir -p assets/images
          mkdir -p assets/fonts

          # بنیادی فائلیں انجیکٹ کرنا تاکہ بلڈ انجن خالی جگہ نہ پائے
          echo "void main() => print('System Pro Engine Ready');" > lib/main.dart
          
          # ایک بنیادی پب اسپیک (pubspec.yaml) کو اپ ڈیٹ کرنا تاکہ ضروری پیکجز شامل ہوں
          sed -i 's/sdk: flutter/sdk: flutter\n  permission_handler: ^11.3.0\n  http: ^1.2.0/' pubspec.yaml

      - name: 💾 Finalize & Push Structure
        run: |
          git config --global user.name "System Pro Bot"
          git config --global user.email "bot@systempro.com"
          git add .
          # اگر کچھ تبدیل ہوا ہو تب ہی کمٹ کرے گا
          git diff --quiet && git diff --staged --quiet || (git commit -m "🏗️ Base infrastructure established by Titan Engine" && git push)
