name: system_pro_app
description: "Universal Flutter template for games, social apps, Firebase, utilities, etc."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  # flutter_svg: ^2.0.9         # SVG support
  # lottie: ^3.1.0              # animations

  # Storage & Networking
  shared_preferences: ^2.2.3
  http: ^1.2.0
  # dio: ^5.4.0                 # advanced HTTP client

  # Permissions & Hardware
  permission_handler: ^11.3.0
  # camera: ^0.10.5             # camera access
  # image_picker: ^1.0.7        # gallery/camera picker
  # torch_light: ^1.1.0         # flashlight
  # vibration: ^1.9.0           # vibrate device

  # Location & Maps
  # geolocator: ^12.0.0         # GPS location
  # google_maps_flutter: ^2.7.0 # Google Maps

  # Firebase (full suite)
  # firebase_core: ^3.1.0
  # firebase_auth: ^5.1.0
  # cloud_firestore: ^5.0.0
  # firebase_storage: ^12.0.0
  # firebase_messaging: ^15.0.0 # push notifications

  # Social / Authentication
  # google_sign_in: ^6.2.1
  # sign_in_with_apple: ^5.0.0

  # Ads
  # google_mobile_ads: ^5.0.0

  # Games & Multimedia
  # flame: ^1.17.0              # game engine
  # audioplayers: ^6.0.0        # sound effects

  # Utilities
  # path_provider: ^2.1.3
  # url_launcher: ^6.3.0
  # connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Assets folder structure (uncomment when needed)
  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - assets/animations/

  # Fonts (uncomment when needed)
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
