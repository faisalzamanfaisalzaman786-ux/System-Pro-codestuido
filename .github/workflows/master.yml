name: System Pro Universal Builder

on:
  repository_dispatch:
    types: [system_pro_build]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable

      - name: Create entire Android project structure (if missing)
        run: |
          set -e
          echo "🛠️ Creating Android project skeleton..."

          # Root build.gradle
          cat > android/build.gradle <<'EOF'
          buildscript {
              ext.kotlin_version = '1.9.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.1'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          tasks.register('clean', Delete) {
              delete rootProject.buildDir
          }
          EOF

          # settings.gradle
          cat > android/settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          include ':app'
          EOF

          # gradle wrapper properties
          mkdir -p android/gradle/wrapper
          cat > android/gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.3-all.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          # gradle.properties (optional, for performance)
          cat > android/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          echo "✅ Android skeleton created"

      - name: Decode base64 source files from payload
        run: |
          set -e
          echo "📦 Decoding base64 source files..."
          mkdir -p lib android/app/src/main

          decode_b64() {
            local b64="$1"
            local out="$2"
            if [ -n "$b64" ] && [ "$b64" != "null" ]; then
              echo "$b64" | base64 -d > "$out"
              echo "✅ Created $out"
            else
              echo "❌ Missing or null base64 for $out - using fallback"
              return 1
            fi
          }

          # main.dart
          MAIN_B64='${{ github.event.client_payload.source_files.main_dart }}'
          if ! decode_b64 "$MAIN_B64" lib/main.dart; then
            cat > lib/main.dart <<'EOF'
          // Fallback main.dart
          import 'package:flutter/material.dart';
          void main() => runApp(MyApp());
          class MyApp extends StatelessWidget {
            @override Widget build(BuildContext context) => MaterialApp(home: Scaffold(body: Center(child: Text('Error: No main.dart'))));
          }
          EOF
            echo "⚠️ Using fallback main.dart"
          fi

          # AndroidManifest.xml
          MANIFEST_B64='${{ github.event.client_payload.source_files.android_manifest }}'
          if ! decode_b64 "$MANIFEST_B64" android/app/src/main/AndroidManifest.xml; then
            cat > android/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.systempro.fallback">
              <application android:label="Fallback App" android:icon="@mipmap/ic_launcher" android:usesCleartextTraffic="true"/>
          </manifest>
          EOF
            echo "⚠️ Using fallback AndroidManifest.xml"
          fi

          # build.gradle (app level) - with namespace and kotlin_version
          GRADLE_B64='${{ github.event.client_payload.source_files.build_gradle }}'
          if ! decode_b64 "$GRADLE_B64" android/app/build.gradle; then
            cat > android/app/build.gradle <<'EOF'
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) { localPropertiesFile.withInputStream { localProperties.load(it) } }
          def flutterRoot = localProperties.getProperty('flutter.sdk')
          if (flutterRoot == null) { throw new GradleException("Flutter SDK not found.") }
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
          android {
              namespace "com.systempro.template"
              compileSdk 34
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
              defaultConfig {
                  applicationId "com.systempro.template"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          flutter {
              source '../..'
          }
          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
          }
          EOF
            echo "⚠️ Using fallback app/build.gradle with namespace"
          fi

          # pubspec.yaml
          PUBSPEC_B64='${{ github.event.client_payload.source_files.pubspec }}'
          if ! decode_b64 "$PUBSPEC_B64" pubspec.yaml; then
            cat > pubspec.yaml <<'EOF'
          name: system_pro_app
          description: Auto-generated fallback
          version: 1.0.0+1
          environment:
            sdk: '>=3.4.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
            permission_handler: ^11.3.0
            http: ^1.2.0
            shared_preferences: ^2.2.3
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^4.0.0
          flutter:
            uses-material-design: true
          EOF
            echo "⚠️ Using fallback pubspec.yaml"
          fi

      - name: Dynamic configuration (package, app name, SDK, activity, namespace)
        run: |
          NEW_PACKAGE="${{ github.event.client_payload.build_config.package_name }}"
          APP_NAME="${{ github.event.client_payload.build_config.app_display_name }}"
          MIN_SDK="${{ github.event.client_payload.build_config.min_sdk }}"
          TARGET_SDK="${{ github.event.client_payload.build_config.target_sdk }}"
          PROGUARD="${{ github.event.client_payload.build_config.use_proguard }}"

          : "${NEW_PACKAGE:=com.systempro.default}"
          : "${APP_NAME:=System Pro App}"
          : "${MIN_SDK:=21}"
          : "${TARGET_SDK:=34}"
          : "${PROGUARD:=false}"

          echo "📱 Config: $NEW_PACKAGE, $APP_NAME, minSdk=$MIN_SDK, targetSdk=$TARGET_SDK"

          # Update AndroidManifest
          sed -i "s/package=\".*\"/package=\"${NEW_PACKAGE}\"/" android/app/src/main/AndroidManifest.xml
          sed -i "s/android:label=\".*\"/android:label=\"${APP_NAME}\"/" android/app/src/main/AndroidManifest.xml

          # Update app/build.gradle: namespace, applicationId, minSdk, targetSdk, proguard
          sed -i "s/namespace \".*\"/namespace \"${NEW_PACKAGE}\"/" android/app/build.gradle
          if ! grep -q 'namespace' android/app/build.gradle; then
            sed -i '/android {/a \    namespace "'"${NEW_PACKAGE}"'"' android/app/build.gradle
          fi

          sed -i "s/applicationId \".*\"/applicationId \"${NEW_PACKAGE}\"/" android/app/build.gradle
          sed -i "s/minSdk [0-9]\+/minSdk ${MIN_SDK}/" android/app/build.gradle
          sed -i "s/targetSdk [0-9]\+/targetSdk ${TARGET_SDK}/" android/app/build.gradle
          if [ "$PROGUARD" = "true" ]; then
            sed -i "s/minifyEnabled false/minifyEnabled true/" android/app/build.gradle
          fi

          # Remove existing activity and add FlutterActivity
          sed -i '/<activity/,/<\/activity>/d' android/app/src/main/AndroidManifest.xml
          sed -i '/<application>/a \        <activity\n            android:name=".MainActivity"\n            android:exported="true"\n            android:launchMode="singleTop"\n            android:theme="@style/LaunchTheme"\n            android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"\n            android:hardwareAccelerated="true"\n            android:windowSoftInputMode="adjustResize">\n            <intent-filter>\n                <action android:name="android.intent.action.MAIN"/>\n                <category android:name="android.intent.category.LAUNCHER"/>\n            </intent-filter>\n        </activity>' android/app/src/main/AndroidManifest.xml

          # Add flutterEmbedding if missing
          if ! grep -q "flutterEmbedding" android/app/src/main/AndroidManifest.xml; then
            sed -i '/<\/application>/i \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
          fi

          # Create MainActivity.kt
          PKG_PATH=$(echo "$NEW_PACKAGE" | tr '.' '/')
          mkdir -p "android/app/src/main/kotlin/${PKG_PATH}"
          cat > "android/app/src/main/kotlin/${PKG_PATH}/MainActivity.kt" <<EOF
          package ${NEW_PACKAGE}
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity : FlutterActivity()
          EOF

          # Remove old static package dir if exists and different
          if [ -d "android/app/src/main/kotlin/com/systempro/template" ] && [ "$PKG_PATH" != "com/systempro/template" ]; then
            rm -rf "android/app/src/main/kotlin/com/systempro/template"
          fi

      - name: Add permissions (no duplicates)
        run: |
          PERMS_JSON='${{ toJson(github.event.client_payload.permissions) }}'
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! command -v jq &> /dev/null; then sudo apt-get update && sudo apt-get install -y jq; fi
          add_perm() {
            local perm_xml="$1"; local perm_name="$2"
            if ! grep -q "$perm_name" "$MANIFEST"; then
              sed -i "/<manifest>/a \    $perm_xml" "$MANIFEST"
            fi
          }
          if [ -z "$PERMS_JSON" ] || [ "$PERMS_JSON" = "null" ]; then echo "ℹ️ No permissions payload"; exit 0; fi
          echo "$PERMS_JSON" | jq -r 'to_entries[] | select(.value==true) | .key' | while read perm; do
            case $perm in
              storage) add_perm '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' "READ_EXTERNAL_STORAGE"; add_perm '<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' "WRITE_EXTERNAL_STORAGE" ;;
              camera) add_perm '<uses-permission android:name="android.permission.CAMERA" />' "CAMERA" ;;
              bluetooth) add_perm '<uses-permission android:name="android.permission.BLUETOOTH" />' "BLUETOOTH"; add_perm '<uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />' "BLUETOOTH_ADMIN"; add_perm '<uses-permission android:name="android.permission.BLUETOOTH_SCAN" />' "BLUETOOTH_SCAN"; add_perm '<uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />' "BLUETOOTH_CONNECT" ;;
              microphone) add_perm '<uses-permission android:name="android.permission.RECORD_AUDIO" />' "RECORD_AUDIO" ;;
              contacts) add_perm '<uses-permission android:name="android.permission.READ_CONTACTS" />' "READ_CONTACTS"; add_perm '<uses-permission android:name="android.permission.WRITE_CONTACTS" />' "WRITE_CONTACTS" ;;
              notif) add_perm '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "POST_NOTIFICATIONS" ;;
              foreground) add_perm '<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' "FOREGROUND_SERVICE" ;;
              sms) add_perm '<uses-permission android:name="android.permission.SEND_SMS" />' "SEND_SMS"; add_perm '<uses-permission android:name="android.permission.READ_SMS" />' "READ_SMS" ;;
              vibrate) add_perm '<uses-permission android:name="android.permission.VIBRATE" />' "VIBRATE" ;;
            esac
          done
          LOC=$(echo "$PERMS_JSON" | jq -r '.location_granularity // ""')
          if [ "$LOC" = "fine" ]; then add_perm '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' "ACCESS_FINE_LOCATION"
          elif [ "$LOC" = "coarse" ]; then add_perm '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' "ACCESS_COARSE_LOCATION"; fi

      - name: Set app icon (if provided)
        run: |
          ICON_B64="${{ github.event.client_payload.assets.app_icon_base64 }}"
          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "null" ]; then
            mkdir -p android/app/src/main/res/mipmap-hdpi
            echo "$ICON_B64" | base64 -d > android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            for density in mdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$density
              cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-$density/
            done
            echo "✅ App icon set"
          else echo "ℹ️ No icon provided"; fi

      - name: Additional assets (if any)
        run: |
          ASSETS='${{ toJson(github.event.client_payload.assets.additional_assets) }}'
          if [ -n "$ASSETS" ] && [ "$ASSETS" != "null" ] && [ "$ASSETS" != "[]" ]; then
            echo "$ASSETS" | jq -c '.[]' | while read asset; do
              NAME=$(echo "$asset" | jq -r '.name')
              B64=$(echo "$asset" | jq -r '.base64')
              mkdir -p assets
              echo "$B64" | base64 -d > "assets/$NAME"
            done
            echo "✅ Additional assets added"
          else echo "ℹ️ No additional assets"; fi

      - name: Build APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Build-${{ github.run_id }}
          path: build/app/outputs/flutter-apk/*.apk
