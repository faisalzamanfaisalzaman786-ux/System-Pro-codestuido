name: Flutter Build Studio

on:
  repository_dispatch:
    types: [flutter_app_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Extract build config from payload
        run: |
          echo "PACKAGE_NAME=${{ github.event.client_payload.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.app_name }}" >> $GITHUB_ENV
          echo "MIN_SDK=${{ github.event.client_payload.min_sdk }}" >> $GITHUB_ENV
          echo "TARGET_SDK=${{ github.event.client_payload.target_sdk }}" >> $GITHUB_ENV
          echo "USE_PROGUARD=${{ github.event.client_payload.use_proguard }}" >> $GITHUB_ENV
          echo "HAS_ICON=${{ github.event.client_payload.has_icon }}" >> $GITHUB_ENV
          
          echo "Package: ${{ env.PACKAGE_NAME }}"
          echo "App Name: ${{ env.APP_NAME }}"

      - name: Create fresh Flutter project
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PKG" | rev | cut -d. -f1 | rev)
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android .
          echo "✅ Fresh Flutter project created"

      - name: Copy main.dart from repository
        run: |
          if [ ! -f "lib/main.dart" ]; then
            echo "❌ lib/main.dart not found"
            exit 1
          fi
          echo "✅ main.dart found"

      - name: Use repository pubspec.yaml
        run: |
          if [ ! -f "pubspec.yaml" ]; then
            echo "❌ pubspec.yaml not found"
            exit 1
          fi
          flutter pub get
          echo "✅ flutter pub get completed"

      - name: Fix build.gradle for v2 embedding
        run: |
          # Completely replace android/build.gradle
          cat > android/build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '2.1.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.3.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          
          tasks.register('clean', Delete) {
              delete rootProject.buildDir
          }
          EOF
          
          # Completely replace android/app/build.gradle
          cat > android/app/build.gradle << EOF
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          
          android {
              namespace = "${{ env.PACKAGE_NAME }}"
              compileSdk = 36
              
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              
              kotlinOptions {
                  jvmTarget = "17"
              }
              
              defaultConfig {
                  applicationId = "${{ env.PACKAGE_NAME }}"
                  minSdk = 23
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              
              buildTypes {
                  release {
                      signingConfig = signingConfigs.debug
                      minifyEnabled = false
                      shrinkResources = false
                  }
              }
          }
          
          flutter {
              source = "../.."
          }
          EOF
          
          echo "✅ build.gradle files fixed for v2 embedding"

      - name: Create AndroidManifest.xml with all permissions
        run: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              
              <!-- Network -->
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
              
              <!-- Camera -->
              <uses-permission android:name="android.permission.CAMERA" />
              
              <!-- Storage -->
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />
              
              <!-- Microphone -->
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              
              <!-- Location -->
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              
              <!-- Bluetooth -->
              <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADVERTISE" />
              
              <!-- Notifications -->
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              
              <!-- Foreground Services -->
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_CAMERA" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MICROPHONE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              
              <!-- Contacts -->
              <uses-permission android:name="android.permission.READ_CONTACTS" />
              <uses-permission android:name="android.permission.WRITE_CONTACTS" />
              
              <!-- Calendar -->
              <uses-permission android:name="android.permission.READ_CALENDAR" />
              <uses-permission android:name="android.permission.WRITE_CALENDAR" />
              
              <!-- Phone -->
              <uses-permission android:name="android.permission.READ_PHONE_STATE" />
              <uses-permission android:name="android.permission.CALL_PHONE" />
              
              <!-- Sensors -->
              <uses-permission android:name="android.permission.BODY_SENSORS" />
              <uses-permission android:name="android.permission.ACTIVITY_RECOGNITION" />
              
              <!-- System -->
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.USE_BIOMETRIC" />
              <uses-permission android:name="android.permission.USE_FINGERPRINT" />
              
              <application
                  android:label="${{ env.APP_NAME }}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:requestLegacyExternalStorage="true"
                  android:theme="@style/LaunchTheme">
                  
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
                  
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          echo "✅ AndroidManifest.xml created"

      - name: Fix MainActivity.kt for v2 embedding
        run: |
          PKG_PATH=$(echo "${{ env.PACKAGE_NAME }}" | tr '.' '/')
          mkdir -p android/app/src/main/kotlin/$PKG_PATH
          
          cat > android/app/src/main/kotlin/$PKG_PATH/MainActivity.kt << 'EOF'
          package ${{ env.PACKAGE_NAME }}
          
          import io.flutter.embedding.android.FlutterActivity
          
          class MainActivity: FlutterActivity()
          EOF
          echo "✅ MainActivity.kt fixed"

      - name: Apply custom app icon
        run: |
          if [ "${{ env.HAS_ICON }}" = "true" ] && [ -f "assets/icon.png" ]; then
            if file assets/icon.png | grep -q "PNG"; then
              for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
                mkdir -p android/app/src/main/res/mipmap-$density
                cp assets/icon.png android/app/src/main/res/mipmap-$density/ic_launcher.png
                cp assets/icon.png android/app/src/main/res/mipmap-$density/ic_launcher_round.png
              done
              echo "✅ Custom icon applied"
            fi
          fi

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlutterApp-${{ env.PACKAGE_NAME }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Build Summary
        if: always()
        run: |
          echo "═══════════════════════════════════════════════════════════"
          echo "✅ BUILD COMPLETED"
          echo "═══════════════════════════════════════════════════════════"
          echo "Status: ${{ job.status }}"
          echo "Package: ${{ env.PACKAGE_NAME }}"
          echo "App Name: ${{ env.APP_NAME }}"
