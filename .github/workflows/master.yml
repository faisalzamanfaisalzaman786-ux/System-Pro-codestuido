name: System Pro Universal Builder

on:
  repository_dispatch:
    types: [system_pro_build]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.5
          channel: stable

      - name: Create source files from payload
        run: |
          mkdir -p lib android/app/src/main
          echo '${{ github.event.client_payload.source_files.main_dart }}' | sed 's/\\n/\n/g' > lib/main.dart
          echo '${{ github.event.client_payload.source_files.android_manifest }}' | sed 's/\\n/\n/g' > android/app/src/main/AndroidManifest.xml
          echo '${{ github.event.client_payload.source_files.build_gradle }}' | sed 's/\\n/\n/g' > android/app/build.gradle

      - name: Dynamic package name replacement across all files
        run: |
          NEW_PACKAGE="${{ github.event.client_payload.build_config.package_name }}"
          APP_NAME="${{ github.event.client_payload.build_config.app_display_name }}"
          MIN_SDK="${{ github.event.client_payload.build_config.min_sdk }}"
          TARGET_SDK="${{ github.event.client_payload.build_config.target_sdk }}"
          PROGUARD="${{ github.event.client_payload.build_config.use_proguard }}"

          # 1. AndroidManifest.xml : package attribute and label
          sed -i "s/package=\".*\"/package=\"${NEW_PACKAGE}\"/" android/app/src/main/AndroidManifest.xml
          sed -i "s/android:label=\".*\"/android:label=\"${APP_NAME}\"/" android/app/src/main/AndroidManifest.xml

          # 2. build.gradle : applicationId, minSdk, targetSdk, proguard
          sed -i "s/applicationId \".*\"/applicationId \"${NEW_PACKAGE}\"/" android/app/build.gradle
          sed -i "s/minSdk [0-9]\+/minSdk ${MIN_SDK}/" android/app/build.gradle
          sed -i "s/targetSdk [0-9]\+/targetSdk ${TARGET_SDK}/" android/app/build.gradle
          if [ "$PROGUARD" = "true" ]; then
            sed -i "s/minifyEnabled false/minifyEnabled true/" android/app/build.gradle
          fi

          # 3. Remove any existing activity (to avoid duplicates)
          sed -i '/<activity/,/<\/activity>/d' android/app/src/main/AndroidManifest.xml

          # 4. Add correct FlutterActivity (v2 embedding)
          sed -i '/<application>/a \        <activity\n            android:name=".MainActivity"\n            android:exported="true"\n            android:launchMode="singleTop"\n            android:theme="@style/LaunchTheme"\n            android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"\n            android:hardwareAccelerated="true"\n            android:windowSoftInputMode="adjustResize">\n            <intent-filter>\n                <action android:name="android.intent.action.MAIN"/>\n                <category android:name="android.intent.category.LAUNCHER"/>\n            </intent-filter>\n        </activity>' android/app/src/main/AndroidManifest.xml

          # 5. Create MainActivity.kt with correct package path
          PKG_PATH=$(echo "$NEW_PACKAGE" | tr '.' '/')
          mkdir -p "android/app/src/main/kotlin/${PKG_PATH}"
          cat > "android/app/src/main/kotlin/${PKG_PATH}/MainActivity.kt" <<EOF
          package ${NEW_PACKAGE}

          import io.flutter.embedding.android.FlutterActivity

          class MainActivity : FlutterActivity()
          EOF

          # 6. Remove any old kotlin directories that might conflict (optional, keep base template)
          # We only keep the newly created one; delete old fixed package if exists and different
          if [ -d "android/app/src/main/kotlin/com/systempro/template" ] && [ "$PKG_PATH" != "com/systempro/template" ]; then
            rm -rf "android/app/src/main/kotlin/com/systempro/template"
          fi

      - name: Add permissions (no duplicates)
        run: |
          PERMS='${{ toJson(github.event.client_payload.permissions) }}'
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          add_perm() {
            local perm_xml=$1
            local perm_name=$2
            if ! grep -q "$perm_name" "$MANIFEST"; then
              sed -i "/<manifest>/a \    $perm_xml" "$MANIFEST"
            fi
          }

          echo "$PERMS" | jq -r 'to_entries[] | select(.value==true) | .key' | while read perm; do
            case $perm in
              storage) add_perm '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' "READ_EXTERNAL_STORAGE"
                        add_perm '<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' "WRITE_EXTERNAL_STORAGE" ;;
              camera)   add_perm '<uses-permission android:name="android.permission.CAMERA" />' "CAMERA" ;;
              bluetooth) add_perm '<uses-permission android:name="android.permission.BLUETOOTH" />' "BLUETOOTH"
                         add_perm '<uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />' "BLUETOOTH_ADMIN"
                         add_perm '<uses-permission android:name="android.permission.BLUETOOTH_SCAN" />' "BLUETOOTH_SCAN"
                         add_perm '<uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />' "BLUETOOTH_CONNECT" ;;
              microphone) add_perm '<uses-permission android:name="android.permission.RECORD_AUDIO" />' "RECORD_AUDIO" ;;
              contacts) add_perm '<uses-permission android:name="android.permission.READ_CONTACTS" />' "READ_CONTACTS"
                         add_perm '<uses-permission android:name="android.permission.WRITE_CONTACTS" />' "WRITE_CONTACTS" ;;
              notif)    add_perm '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "POST_NOTIFICATIONS" ;;
              foreground) add_perm '<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' "FOREGROUND_SERVICE" ;;
              sms)      add_perm '<uses-permission android:name="android.permission.SEND_SMS" />' "SEND_SMS"
                        add_perm '<uses-permission android:name="android.permission.READ_SMS" />' "READ_SMS" ;;
              vibrate)  add_perm '<uses-permission android:name="android.permission.VIBRATE" />' "VIBRATE" ;;
            esac
          done
          
          LOC=$(echo "$PERMS" | jq -r '.location_granularity // ""')
          [ "$LOC" = "fine" ] && add_perm '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' "ACCESS_FINE_LOCATION"
          [ "$LOC" = "coarse" ] && add_perm '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' "ACCESS_COARSE_LOCATION"

      - name: Set app icon
        run: |
          ICON_B64="${{ github.event.client_payload.assets.app_icon_base64 }}"
          if [ -n "$ICON_B64" ]; then
            mkdir -p android/app/src/main/res/mipmap-hdpi
            echo "$ICON_B64" | base64 -d > android/app/src/main/res/mipmap-hdpi/ic_launcher.png
            for density in mdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$density
              cp android/app/src/main/res/mipmap-hdpi/ic_launcher.png android/app/src/main/res/mipmap-$density/
            done
          fi

      - name: Additional assets
        run: |
          ASSETS='${{ toJson(github.event.client_payload.assets.additional_assets) }}'
          echo "$ASSETS" | jq -c '.[]' 2>/dev/null | while read asset; do
            NAME=$(echo "$asset" | jq -r '.name')
            B64=$(echo "$asset" | jq -r '.base64')
            mkdir -p assets
            echo "$B64" | base64 -d > "assets/$NAME"
          done

      - name: Ensure pubspec.yaml
        run: |
          if [ ! -f pubspec.yaml ]; then
            cat > pubspec.yaml <<'EOF'
          name: system_pro_app
          description: Auto-generated by System Pro
          version: 1.0.0+1
          environment:
            sdk: '>=3.4.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            permission_handler: ^11.3.0
            http: ^1.2.0
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^4.0.0
          flutter:
            uses-material-design: true
          EOF
          fi

      - name: Build APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Build-${{ github.run_id }}
          path: build/app/outputs/flutter-apk/*.apk
