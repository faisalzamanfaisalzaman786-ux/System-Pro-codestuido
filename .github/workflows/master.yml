name: System Pro Master Builder

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  dynamic_build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      - name: 🧬 Dynamic Ingestion Engine
        run: |
          python3 - <<EOF
          import json
          import os
          import base64
          import re

          # Payload handling with null-to-none safety
          raw_data = '''${{ toJson(github.event.client_payload) }}'''
          clean_data = raw_data.replace(': null', ': None').replace(': true', ': True').replace(': false', ': False')
          
          try:
              payload = eval(clean_data)
              
              app_name = payload.get('build_config', {}).get('app_display_name', 'System Pro App')
              pkg_name = payload.get('build_config', {}).get('package_name', 'com.systempro.ultra')
              main_dart = payload.get('source_files', {}).get('main_dart', '')
              icon_b64 = payload.get('assets', {}).get('app_icon_base64', None)

              # Update lib/main.dart
              if main_dart:
                  os.makedirs('lib', exist_ok=True)
                  with open('lib/main.dart', 'w') as f:
                      f.write(main_dart)

              # Update AndroidManifest.xml (App Name & Package)
              manifest_path = 'android/app/src/main/AndroidManifest.xml'
              if os.path.exists(manifest_path):
                  with open(manifest_path, 'r') as f:
                      m_content = f.read()
                  m_content = re.sub(r'android:label="[^"]*"', f'android:label="{app_name}"', m_content)
                  m_content = m_content.replace('com.systempro.ultra', pkg_name)
                  with open(manifest_path, 'w') as f:
                      f.write(m_content)

              # Update build.gradle (Package ID)
              gradle_path = 'android/app/build.gradle'
              if os.path.exists(gradle_path):
                  with open(gradle_path, 'r') as f:
                      g_content = f.read()
                  g_content = g_content.replace('com.systempro.ultra', pkg_name)
                  with open(gradle_path, 'w') as f:
                      f.write(g_content)

              # Inject App Icon
              if icon_b64:
                  img_data = base64.b64decode(icon_b64)
                  res_dir = 'android/app/src/main/res/'
                  for folder in os.listdir(res_dir):
                      if 'mipmap' in folder:
                          target = os.path.join(res_dir, folder, 'ic_launcher.png')
                          with open(target, 'wb') as f:
                              f.write(img_data)
              
              print(f"✅ Success: Ready to build {app_name}")

          except Exception as e:
              print(f"❌ Error: {str(e)}")
              exit(1)
          EOF

      - name: 🏗️ Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: System-Pro-Build
          path: build/app/outputs/flutter-apk/*.apk
