name: Filter App Builder (Auto Manifest + Gradle)

on:
  repository_dispatch:
    types: [filter_app_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Save payload to file
        run: |
          echo '${{ toJson(github.event.client_payload) }}' > payload.json

      - name: Extract build config
        id: config
        run: |
          PACKAGE_NAME=$(jq -r '.build_config.package_name' payload.json)
          APP_NAME=$(jq -r '.build_config.app_display_name' payload.json)
          MIN_SDK=$(jq -r '.build_config.min_sdk' payload.json)
          TARGET_SDK=$(jq -r '.build_config.target_sdk' payload.json)
          USE_PROGUARD=$(jq -r '.build_config.use_proguard' payload.json)
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "MIN_SDK=$MIN_SDK" >> $GITHUB_ENV
          echo "TARGET_SDK=$TARGET_SDK" >> $GITHUB_ENV
          echo "USE_PROGUARD=$USE_PROGUARD" >> $GITHUB_ENV

      - name: Create fresh Flutter project
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PKG" | rev | cut -d. -f1 | rev)
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android .
          echo "✅ Fresh project created"

      - name: Write main.dart from payload
        run: |
          jq -r '.source_files.main_dart // ""' payload.json | base64 -d > lib/main.dart
          echo "✅ main.dart written"

      - name: Write pubspec.yaml from payload and add dependencies
        run: |
          jq -r '.source_files.pubspec // ""' payload.json | base64 -d > pubspec.yaml
          flutter pub get
          # Ensure essential filter app dependencies (if not already in pubspec)
          flutter pub add camera:^0.10.5 image_picker:^1.1.0 image_filters:^0.2.0 permission_handler:^11.3.1
          echo "✅ pubspec.yaml and dependencies ready"

      - name: Generate AndroidManifest.xml with all permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          cat > $MANIFEST <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="${{ env.PACKAGE_NAME }}">
              <!-- Permissions required for camera, gallery, internet, etc. -->
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <!-- Foreground service for long-running tasks -->
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <!-- Optional: Bluetooth if needed -->
              <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
              <application
                  android:label="${{ env.APP_NAME }}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:requestLegacyExternalStorage="true"
                  android:theme="@style/LaunchTheme">
                  <meta-data android:name="flutterEmbedding" android:value="2" />
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          echo "✅ AndroidManifest.xml generated with all permissions"

      - name: Generate build.gradle
        run: |
          GRADLE_FILE="android/app/build.gradle"
          cat > $GRADLE_FILE <<EOF
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withInputStream { localProperties.load(it) }
          }
          def flutterRoot = localProperties.getProperty('flutter.sdk')
          if (flutterRoot == null) {
              throw new GradleException("Flutter SDK not found.")
          }
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply from: "\$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
          android {
              namespace "${{ env.PACKAGE_NAME }}"
              compileSdk ${{ env.TARGET_SDK }}
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
              defaultConfig {
                  applicationId "${{ env.PACKAGE_NAME }}"
                  minSdk ${{ env.MIN_SDK }}
                  targetSdk ${{ env.TARGET_SDK }}
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled ${{ env.USE_PROGUARD }}
                      shrinkResources ${{ env.USE_PROGUARD }}
                  }
                  debug {
                      minifyEnabled false
                  }
              }
          }
          flutter {
              source '../..'
          }
          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:\$kotlin_version"
              implementation 'androidx.core:core-ktx:1.12.0'
          }
          EOF
          echo "✅ build.gradle generated"

      - name: Apply App Icon (if provided)
        run: |
          ICON_B64=$(jq -r '.assets.app_icon_base64 // ""' payload.json)
          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "null" ]; then
            echo "$ICON_B64" | base64 -d > icon.png
            for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$density
              cp icon.png android/app/src/main/res/mipmap-$density/ic_launcher.png
            done
            echo "✅ Custom app icon applied"
          else
            echo "ℹ️ No custom icon provided, using default Flutter icon"
          fi

      - name: Build release APK
        run: |
          flutter build apk --release --no-pub

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FilterApp-${{ env.PACKAGE_NAME }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
