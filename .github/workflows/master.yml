name: Dynamic APK Builder (Safe V2) - Clean Edition

on:
  workflow_dispatch:
    inputs:
      build_config:
        description: 'Build config (JSON)'
        required: true
        default: '{"package_name":"com.example.app","app_display_name":"MyApp","min_sdk":21,"target_sdk":34,"use_proguard":false}'
      source_files:
        description: 'Source files (JSON with base64)'
        required: true
        default: '{"main_dart":"","pubspec":""}'
      permissions:
        description: 'Permissions JSON'
        required: true
        default: '{"camera":false,"microphone":false,"vibrate":false,"location_granularity":"none"}'
      assets:
        description: 'Assets JSON (icon and additional)'
        required: true
        default: '{"app_icon_base64":"","additional_assets":[]}'
  repository_dispatch:
    types: [system_pro_build]

env:
  FLUTTER_VERSION: '3.29.2'
  KOTLIN_VERSION: '2.0.20'
  NDK_VERSION: '27.0.12077973'
  JAVA_VERSION: '17'
  WEBVIEW_FLUTTER_VER: '4.13.0'
  PERMISSION_HANDLER_VER: '12.0.1'
  PATH_PROVIDER_VER: '2.1.5'
  DEVICE_INFO_PLUS_VER: '10.1.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      # ============================================================
      # CLEANING STEPS - Remove all cached and build artifacts
      # ============================================================
      - name: Clean everything (local cache, build, locks, etc.)
        run: |
          echo "🧹 Cleaning Flutter project caches..."
          rm -rf ~/.pub-cache
          rm -rf .dart_tool
          rm -rf build
          rm -rf android/.gradle
          rm -rf ios/.symlinks
          rm -f pubspec.lock
          echo "✅ Cleaned all caches. Next step will re-download dependencies."

      - name: Create fresh Flutter v2 project
        run: |
          PKG=$(jq -r '.build_config.package_name' payload.json 2>/dev/null || echo "com.example.app")
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PKG" | rev | cut -d. -f1 | rev)
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android,ios .
          echo "✅ Fresh project created"

      - name: Write main.dart from user payload
        run: |
          jq -r '.source_files.main_dart // ""' payload.json | base64 -d > lib/main.dart 2>/dev/null || echo "// fallback main" > lib/main.dart
          echo "✅ main.dart written"

      - name: Write pubspec.yaml (HARDCODED with 4.10.1, ignores user input)
        run: |
          cat > pubspec.yaml <<EOF
          name: system_pro_app
          description: A powerful browser app with camera support.
          version: 1.0.0+1
          environment:
            sdk: '>=3.4.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ${{ env.WEBVIEW_FLUTTER_VER }}
            webview_flutter_android: 4.10.1
            permission_handler: ${{ env.PERMISSION_HANDLER_VER }}
            path_provider: ${{ env.PATH_PROVIDER_VER }}
            device_info_plus: ${{ env.DEVICE_INFO_PLUS_VER }}
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^5.0.0
          flutter:
            uses-material-design: true
          EOF
          # Double safety
          sed -i 's/4.13.0/4.10.1/g' pubspec.yaml
          echo "✅ pubspec.yaml written with 4.10.1"

      - name: Force re-download dependencies with exact versions
        run: |
          rm -f pubspec.lock
          flutter pub get --no-example
          flutter pub add webview_flutter:${{ env.WEBVIEW_FLUTTER_VER }} \
            webview_flutter_android:4.10.1 \
            permission_handler:${{ env.PERMISSION_HANDLER_VER }} \
            path_provider:${{ env.PATH_PROVIDER_VER }} \
            device_info_plus:${{ env.DEVICE_INFO_PLUS_VER }} 2>/dev/null || true
          flutter pub get
          echo "✅ Dependencies enforced"

      - name: Rest of the build (permissions, assets, gradle, kotlin, APK)
        run: |
          # Payload extraction (required for permissions and assets)
          if [ ! -f payload.json ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              jq -n \
                --argjson build_config '${{ toJson(github.event.inputs.build_config) }}' \
                --argjson source_files '${{ toJson(github.event.inputs.source_files) }}' \
                --argjson permissions '${{ toJson(github.event.inputs.permissions) }}' \
                --argjson assets '${{ toJson(github.event.inputs.assets) }}' \
                '{build_config: $build_config, source_files: $source_files, permissions: $permissions, assets: $assets}' > payload.json
            else
              echo '${{ toJson(github.event.client_payload) }}' > payload.json
            fi
          fi

          # Normalize package name and app name
          RAW_PKG=$(jq -r '.build_config.package_name // "com.example.app"' payload.json)
          RAW_NAME=$(jq -r '.build_config.app_display_name // "System Pro"' payload.json)
          MIN_SDK=$(jq -r '.build_config.min_sdk // 21' payload.json)
          TARGET_SDK=$(jq -r '.build_config.target_sdk // 34' payload.json)
          USE_PROGUARD=$(jq -r '.build_config.use_proguard // false' payload.json)

          PACKAGE_NAME=$(echo "$RAW_PKG" | tr '[:upper:]' '[:lower:]')
          APP_NAME=$(echo "$RAW_NAME" | tr '[:upper:]' '[:lower:]')

          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "MIN_SDK=$MIN_SDK" >> $GITHUB_ENV
          echo "TARGET_SDK=$TARGET_SDK" >> $GITHUB_ENV
          echo "USE_PROGUARD=$USE_PROGUARD" >> $GITHUB_ENV

          # Permissions and icon extraction
          jq '.permissions // {}' payload.json > perms.json
          jq '.assets.additional_assets // []' payload.json > assets_list.json
          ICON_B64=$(jq -r '.assets.app_icon_base64 // ""' payload.json)
          echo "ICON_B64=$ICON_B64" >> $GITHUB_ENV

          # Apply permissions
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          for perm in INTERNET POST_NOTIFICATIONS; do
            if ! grep -q "android.permission.$perm" "$MANIFEST"; then
              sed -i "/<manifest/a \    <uses-permission android:name=\"android.permission.$perm\" />" "$MANIFEST"
            fi
          done
          add_perm() { if ! grep -q "$2" "$MANIFEST"; then sed -i "/<manifest/a \    $1" "$MANIFEST"; fi; }
          if jq -e '.camera == true' perms.json > /dev/null; then add_perm '<uses-permission android:name="android.permission.CAMERA" />' 'CAMERA'; fi
          if jq -e '.microphone == true' perms.json > /dev/null; then add_perm '<uses-permission android:name="android.permission.RECORD_AUDIO" />' 'RECORD_AUDIO'; fi
          if jq -e '.vibrate == true' perms.json > /dev/null; then add_perm '<uses-permission android:name="android.permission.VIBRATE" />' 'VIBRATE'; fi
          LOC=$(jq -r '.location_granularity // "none"' perms.json)
          if [ "$LOC" = "fine" ]; then add_perm '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' 'ACCESS_FINE_LOCATION'; fi
          if [ "$LOC" = "coarse" ]; then add_perm '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' 'ACCESS_COARSE_LOCATION'; fi

          # Set app display name
          sed -i 's/android:label="[^"]*"/android:label="'"$APP_NAME"'"/' "$MANIFEST"

          # Apply icon
          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "null" ]; then
            echo "$ICON_B64" | base64 -d > icon.png
            for d in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$d
              cp icon.png android/app/src/main/res/mipmap-$d/ic_launcher.png
            done
            rm icon.png
          fi

          # Assets
          if jq -e 'length > 0' assets_list.json > /dev/null; then
            mkdir -p assets/images
            for row in $(jq -r '.[] | @base64' assets_list.json); do
              _jq() { echo ${row} | base64 --decode | jq -r ${1}; }
              NAME=$(_jq '.name')
              B64=$(_jq '.base64')
              echo "$B64" | base64 -d > "assets/images/$NAME"
            done
            if ! grep -q "assets/" pubspec.yaml; then
              sed -i '/flutter:/a \  assets:\n    - assets/images/' pubspec.yaml
            fi
          fi

          # Configure Gradle
          APP_GRADLE="android/app/build.gradle.kts"
          sed -i '/android {/a \    compileOptions {\n        sourceCompatibility = JavaVersion.VERSION_${{ env.JAVA_VERSION }}\n        targetCompatibility = JavaVersion.VERSION_${{ env.JAVA_VERSION }}\n    }' "$APP_GRADLE"
          sed -i '/android {/a \    namespace("'"$PACKAGE_NAME"'")' "$APP_GRADLE"
          sed -i '/defaultConfig {/a \        applicationId = "'"$PACKAGE_NAME"'"' "$APP_GRADLE"
          sed -i '/android {/a \    ndkVersion = "${{ env.NDK_VERSION }}"' "$APP_GRADLE"
          sed -i 's/minSdk = .*/minSdk = '"$MIN_SDK"'/' "$APP_GRADLE"
          sed -i 's/targetSdk = .*/targetSdk = '"$TARGET_SDK"'/' "$APP_GRADLE"
          if [ "$USE_PROGUARD" = "true" ]; then
            sed -i 's/isMinifyEnabled = .*/isMinifyEnabled = true/' "$APP_GRADLE"
            sed -i 's/shrinkResources = .*/shrinkResources = true/' "$APP_GRADLE"
          fi

          # Enable cleartext traffic
          if ! grep -q 'android:usesCleartextTraffic="true"' "$MANIFEST"; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$MANIFEST"
          fi

          # Fix Kotlin
          SETTINGS="android/settings.gradle.kts"
          sed -i 's/id "org.jetbrains.kotlin.android" version ".*"/id "org.jetbrains.kotlin.android" version "${{ env.KOTLIN_VERSION }}"/' "$SETTINGS"
          cat > android/gradle.properties <<EOF
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          EOF
          sed -i '/kotlin-stdlib/d' "$APP_GRADLE"
          sed -i "/dependencies {/a \    implementation(\"org.jetbrains.kotlin:kotlin-stdlib:${{ env.KOTLIN_VERSION }}\")" "$APP_GRADLE"
          if ! grep -q "kotlinOptions" "$APP_GRADLE"; then
            sed -i '/android {/a \    kotlinOptions {\n        jvmTarget = "${{ env.JAVA_VERSION }}"\n    }' "$APP_GRADLE"
          else
            sed -i 's/jvmTarget = .*/jvmTarget = "${{ env.JAVA_VERSION }}"/' "$APP_GRADLE"
          fi

      - name: Build release APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-${{ env.PACKAGE_NAME }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk
