name: Dynamic APK Builder (Safe V2) - Final Fix

on:
  workflow_dispatch:
    inputs:
      build_config:
        description: 'Build config (JSON)'
        required: true
        default: '{"package_name":"com.example.app","app_display_name":"MyApp","min_sdk":21,"target_sdk":34,"use_proguard":false}'
      source_files:
        description: 'Source files (JSON with base64)'
        required: true
        default: '{"main_dart":"","pubspec":""}'
      permissions:
        description: 'Permissions JSON'
        required: true
        default: '{"camera":false,"microphone":false,"vibrate":false,"location_granularity":"none"}'
      assets:
        description: 'Assets JSON (icon and additional)'
        required: true
        default: '{"app_icon_base64":"","additional_assets":[]}'
  repository_dispatch:
    types: [system_pro_build]

env:
  FLUTTER_VERSION: '3.29.2'
  KOTLIN_VERSION: '2.0.20'
  NDK_VERSION: '27.0.12077973'
  JAVA_VERSION: '17'
  WEBVIEW_FLUTTER_VER: '4.13.0'
  WEBVIEW_FLUTTER_ANDROID_VER: '4.10.1'
  PERMISSION_HANDLER_VER: '12.0.1'
  PATH_PROVIDER_VER: '2.1.5'
  DEVICE_INFO_PLUS_VER: '10.1.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Clean everything (delete old files and caches)
        run: |
          rm -rf android ios .dart_tool build
          rm -f pubspec.yaml pubspec.lock
          rm -rf ~/.pub-cache
          echo "✅ All old files and caches removed"

      - name: Prepare payload
        run: |
          if [ ! -f payload.json ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              jq -n \
                --argjson build_config '${{ toJson(github.event.inputs.build_config) }}' \
                --argjson source_files '${{ toJson(github.event.inputs.source_files) }}' \
                --argjson permissions '${{ toJson(github.event.inputs.permissions) }}' \
                --argjson assets '${{ toJson(github.event.inputs.assets) }}' \
                '{build_config: $build_config, source_files: $source_files, permissions: $permissions, assets: $assets}' > payload.json
            else
              echo '${{ toJson(github.event.client_payload) }}' > payload.json
            fi
          fi

      - name: Create fresh Flutter project
        run: |
          RAW_PKG=$(jq -r '.build_config.package_name // "com.example.app"' payload.json)
          PACKAGE_NAME=$(echo "$RAW_PKG" | tr '[:upper:]' '[:lower:]')
          ORG=$(echo "$PACKAGE_NAME" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PACKAGE_NAME" | rev | cut -d. -f1 | rev)
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android,ios .
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "✅ Fresh project created"

      - name: Extract other config
        run: |
          RAW_NAME=$(jq -r '.build_config.app_display_name // "System Pro"' payload.json)
          APP_NAME=$(echo "$RAW_NAME" | tr '[:upper:]' '[:lower:]')
          MIN_SDK=$(jq -r '.build_config.min_sdk // 21' payload.json)
          TARGET_SDK=$(jq -r '.build_config.target_sdk // 34' payload.json)
          USE_PROGUARD=$(jq -r '.build_config.use_proguard // false' payload.json)
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "MIN_SDK=$MIN_SDK" >> $GITHUB_ENV
          echo "TARGET_SDK=$TARGET_SDK" >> $GITHUB_ENV
          echo "USE_PROGUARD=$USE_PROGUARD" >> $GITHUB_ENV

      - name: Write pubspec.yaml (hardcoded correct versions)
        run: |
          cat > pubspec.yaml <<EOF
          name: system_pro_app
          description: A powerful browser app with camera support.
          version: 1.0.0+1
          environment:
            sdk: '>=3.4.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ${{ env.WEBVIEW_FLUTTER_VER }}
            webview_flutter_android: ${{ env.WEBVIEW_FLUTTER_ANDROID_VER }}
            permission_handler: ${{ env.PERMISSION_HANDLER_VER }}
            path_provider: ${{ env.PATH_PROVIDER_VER }}
            device_info_plus: ${{ env.DEVICE_INFO_PLUS_VER }}
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^5.0.0
          flutter:
            uses-material-design: true
          EOF
          echo "✅ pubspec.yaml written with correct versions"

      - name: Write main.dart (with validation and fallback)
        run: |
          USER_MAIN_B64=$(jq -r '.source_files.main_dart // ""' payload.json)
          if [ -n "$USER_MAIN_B64" ]; then
            echo "$USER_MAIN_B64" | base64 -d > lib/main_tmp.dart
            # Check if it looks like a valid Dart file
            if grep -q "void main" lib/main_tmp.dart && grep -q "import" lib/main_tmp.dart; then
              mv lib/main_tmp.dart lib/main.dart
              echo "✅ Valid main.dart provided by user"
            else
              echo "⚠️ User main.dart is invalid (contains YAML?). Using default browser app."
              rm -f lib/main_tmp.dart
              cat > lib/main.dart <<'DEFAULT_MAIN'
      import 'package:flutter/material.dart';
      import 'package:webview_flutter/webview_flutter.dart';
      import 'package:permission_handler/permission_handler.dart';
      import 'package:webview_flutter_android/webview_flutter_android.dart';

      void main() async {
        WidgetsFlutterBinding.ensureInitialized();
        await _requestPermissions();
        runApp(const MyApp());
      }

      Future<void> _requestPermissions() async {
        await [
          Permission.camera,
          Permission.microphone,
          Permission.storage,
          Permission.location,
          Permission.notification,
        ].request();
      }

      class MyApp extends StatelessWidget {
        const MyApp({super.key});
        @override
        Widget build(BuildContext context) => const MaterialApp(
          title: 'System Pro Browser',
          theme: ThemeData.dark(),
          home: BrowserScreen(),
          debugShowCheckedModeBanner: false,
        );
      }

      class BrowserScreen extends StatefulWidget {
        const BrowserScreen({super.key});
        @override
        State<BrowserScreen> createState() => _BrowserScreenState();
      }

      class _BrowserScreenState extends State<BrowserScreen> {
        late final WebViewController _controller;
        String _currentUrl = 'https://www.google.com';
        String _status = 'Loading...';

        @override
        void initState() {
          super.initState();
          _initWebView();
        }

        void _initWebView() {
          final controller = WebViewController()
            ..setJavaScriptMode(JavaScriptMode.unrestricted)
            ..setNavigationDelegate(NavigationDelegate(
              onPageStarted: (url) => setState(() {
                _currentUrl = url;
                _status = 'Loading $url';
              }),
              onPageFinished: (url) => setState(() => _status = 'Page loaded'),
              onWebResourceError: (error) => setState(() => _status = 'Error: ${error.description}'),
            ))
            ..setBackgroundColor(Colors.black)
            ..enableZoom(true);

          if (controller.platform is AndroidWebViewController) {
            (controller.platform as AndroidWebViewController)
                .setMediaCapturePermissionRequestHandler((url) async {
              return MediaCapturePermissionRequestResult.grant();
            });
          }

          controller.loadRequest(Uri.parse(_currentUrl));
          _controller = controller;
        }

        void _goToUrl(String url) {
          if (!url.startsWith('http')) url = 'https://$url';
          _controller.loadRequest(Uri.parse(url));
          setState(() => _currentUrl = url);
        }

        @override
        Widget build(BuildContext context) {
          return Scaffold(
            appBar: AppBar(
              title: const Text('System Pro Browser'),
              actions: [IconButton(icon: const Icon(Icons.refresh), onPressed: () => _controller.reload())],
            ),
            body: Column(
              children: [
                Padding(
                  padding: const EdgeInsets.all(8.0),
                  child: Row(
                    children: [
                      Expanded(
                        child: TextField(
                          decoration: const InputDecoration(hintText: 'Enter URL', border: OutlineInputBorder()),
                          onSubmitted: _goToUrl,
                        ),
                      ),
                      const SizedBox(width: 8),
                      ElevatedButton(onPressed: () => _goToUrl(_currentUrl), child: const Text('Go')),
                    ],
                  ),
                ),
                Expanded(child: WebViewWidget(controller: _controller)),
                Container(padding: const EdgeInsets.all(8.0), color: Colors.black54, child: Text(_status)),
              ],
            ),
          );
        }
      }
      DEFAULT_MAIN
              echo "✅ Default main.dart used"
            fi
          else
            echo "ℹ️ No main.dart provided. Using default."
            cat > lib/main.dart <<'DEFAULT_MAIN'
      import 'package:flutter/material.dart';
      import 'package:webview_flutter/webview_flutter.dart';
      import 'package:permission_handler/permission_handler.dart';
      import 'package:webview_flutter_android/webview_flutter_android.dart';

      void main() async {
        WidgetsFlutterBinding.ensureInitialized();
        await _requestPermissions();
        runApp(const MyApp());
      }

      Future<void> _requestPermissions() async {
        await [
          Permission.camera,
          Permission.microphone,
          Permission.storage,
          Permission.location,
          Permission.notification,
        ].request();
      }

      class MyApp extends StatelessWidget {
        const MyApp({super.key});
        @override
        Widget build(BuildContext context) => const MaterialApp(
          title: 'System Pro Browser',
          theme: ThemeData.dark(),
          home: BrowserScreen(),
          debugShowCheckedModeBanner: false,
        );
      }

      class BrowserScreen extends StatefulWidget {
        const BrowserScreen({super.key});
        @override
        State<BrowserScreen> createState() => _BrowserScreenState();
      }

      class _BrowserScreenState extends State<BrowserScreen> {
        late final WebViewController _controller;
        String _currentUrl = 'https://www.google.com';
        String _status = 'Loading...';

        @override
        void initState() {
          super.initState();
          _initWebView();
        }

        void _initWebView() {
          final controller = WebViewController()
            ..setJavaScriptMode(JavaScriptMode.unrestricted)
            ..setNavigationDelegate(NavigationDelegate(
              onPageStarted: (url) => setState(() {
                _currentUrl = url;
                _status = 'Loading $url';
              }),
              onPageFinished: (url) => setState(() => _status = 'Page loaded'),
              onWebResourceError: (error) => setState(() => _status = 'Error: ${error.description}'),
            ))
            ..setBackgroundColor(Colors.black)
            ..enableZoom(true);

          if (controller.platform is AndroidWebViewController) {
            (controller.platform as AndroidWebViewController)
                .setMediaCapturePermissionRequestHandler((url) async {
              return MediaCapturePermissionRequestResult.grant();
            });
          }

          controller.loadRequest(Uri.parse(_currentUrl));
          _controller = controller;
        }

        void _goToUrl(String url) {
          if (!url.startsWith('http')) url = 'https://$url';
          _controller.loadRequest(Uri.parse(url));
          setState(() => _currentUrl = url);
        }

        @override
        Widget build(BuildContext context) {
          return Scaffold(
            appBar: AppBar(
              title: const Text('System Pro Browser'),
              actions: [IconButton(icon: const Icon(Icons.refresh), onPressed: () => _controller.reload())],
            ),
            body: Column(
              children: [
                Padding(
                  padding: const EdgeInsets.all(8.0),
                  child: Row(
                    children: [
                      Expanded(
                        child: TextField(
                          decoration: const InputDecoration(hintText: 'Enter URL', border: OutlineInputBorder()),
                          onSubmitted: _goToUrl,
                        ),
                      ),
                      const SizedBox(width: 8),
                      ElevatedButton(onPressed: () => _goToUrl(_currentUrl), child: const Text('Go')),
                    ],
                  ),
                ),
                Expanded(child: WebViewWidget(controller: _controller)),
                Container(padding: const EdgeInsets.all(8.0), color: Colors.black54, child: Text(_status)),
              ],
            ),
          );
        }
      }
      DEFAULT_MAIN
            echo "✅ Default main.dart written"
          fi

      - name: Enforce exact dependencies
        run: |
          rm -f pubspec.lock
          flutter pub get
          flutter pub add webview_flutter:${{ env.WEBVIEW_FLUTTER_VER }} \
            webview_flutter_android:${{ env.WEBVIEW_FLUTTER_ANDROID_VER }} \
            permission_handler:${{ env.PERMISSION_HANDLER_VER }} \
            path_provider:${{ env.PATH_PROVIDER_VER }} \
            device_info_plus:${{ env.DEVICE_INFO_PLUS_VER }} 2>/dev/null || true
          flutter pub get
          echo "✅ Dependencies locked"

      - name: Permissions and icon
        run: |
          jq '.permissions // {}' payload.json > perms.json
          jq '.assets.additional_assets // []' payload.json > assets_list.json
          ICON_B64=$(jq -r '.assets.app_icon_base64 // ""' payload.json)
          echo "ICON_B64=$ICON_B64" >> $GITHUB_ENV

          MANIFEST="android/app/src/main/AndroidManifest.xml"
          for perm in INTERNET POST_NOTIFICATIONS; do
            if ! grep -q "android.permission.$perm" "$MANIFEST"; then
              sed -i "/<manifest/a \    <uses-permission android:name=\"android.permission.$perm\" />" "$MANIFEST"
            fi
          done
          add_perm() { if ! grep -q "$2" "$MANIFEST"; then sed -i "/<manifest/a \    $1" "$MANIFEST"; fi; }
          if jq -e '.camera == true' perms.json > /dev/null; then add_perm '<uses-permission android:name="android.permission.CAMERA" />' 'CAMERA'; fi
          if jq -e '.microphone == true' perms.json > /dev/null; then add_perm '<uses-permission android:name="android.permission.RECORD_AUDIO" />' 'RECORD_AUDIO'; fi
          if jq -e '.vibrate == true' perms.json > /dev/null; then add_perm '<uses-permission android:name="android.permission.VIBRATE" />' 'VIBRATE'; fi
          LOC=$(jq -r '.location_granularity // "none"' perms.json)
          if [ "$LOC" = "fine" ]; then add_perm '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' 'ACCESS_FINE_LOCATION'; fi
          if [ "$LOC" = "coarse" ]; then add_perm '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' 'ACCESS_COARSE_LOCATION'; fi

          sed -i 's/android:label="[^"]*"/android:label="${{ env.APP_NAME }}"/' "$MANIFEST"

          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "null" ]; then
            echo "$ICON_B64" | base64 -d > icon.png
            for d in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$d
              cp icon.png android/app/src/main/res/mipmap-$d/ic_launcher.png
            done
            rm icon.png
          fi

          if jq -e 'length > 0' assets_list.json > /dev/null; then
            mkdir -p assets/images
            for row in $(jq -r '.[] | @base64' assets_list.json); do
              _jq() { echo ${row} | base64 --decode | jq -r ${1}; }
              NAME=$(_jq '.name')
              B64=$(_jq '.base64')
              echo "$B64" | base64 -d > "assets/images/$NAME"
            done
            if ! grep -q "assets/" pubspec.yaml; then
              sed -i '/flutter:/a \  assets:\n    - assets/images/' pubspec.yaml
            fi
          fi

      - name: Configure Gradle
        run: |
          APP_GRADLE="android/app/build.gradle.kts"
          PKG="${{ env.PACKAGE_NAME }}"
          if ! grep -q "compileOptions" "$APP_GRADLE"; then
            sed -i '/android {/a \    compileOptions {\n        sourceCompatibility = JavaVersion.VERSION_${{ env.JAVA_VERSION }}\n        targetCompatibility = JavaVersion.VERSION_${{ env.JAVA_VERSION }}\n    }' "$APP_GRADLE"
          else
            sed -i 's/sourceCompatibility = .*/sourceCompatibility = JavaVersion.VERSION_${{ env.JAVA_VERSION }}/' "$APP_GRADLE"
            sed -i 's/targetCompatibility = .*/targetCompatibility = JavaVersion.VERSION_${{ env.JAVA_VERSION }}/' "$APP_GRADLE"
          fi
          if grep -q "namespace" "$APP_GRADLE"; then
            sed -i 's/namespace(.*/namespace("'"$PKG"'")/' "$APP_GRADLE"
          else
            sed -i '/android {/a \    namespace("'"$PKG"'")' "$APP_GRADLE"
          fi
          if grep -q "applicationId" "$APP_GRADLE"; then
            sed -i 's/applicationId = .*/applicationId = "'"$PKG"'"/' "$APP_GRADLE"
          else
            sed -i '/defaultConfig {/a \        applicationId = "'"$PKG"'"' "$APP_GRADLE"
          fi
          if grep -q "ndkVersion" "$APP_GRADLE"; then
            sed -i 's/ndkVersion = .*/ndkVersion = "${{ env.NDK_VERSION }}"/' "$APP_GRADLE"
          else
            sed -i '/android {/a \    ndkVersion = "${{ env.NDK_VERSION }}"' "$APP_GRADLE"
          fi
          sed -i 's/minSdk = .*/minSdk = '"${{ env.MIN_SDK }}"'/' "$APP_GRADLE"
          sed -i 's/targetSdk = .*/targetSdk = '"${{ env.TARGET_SDK }}"'/' "$APP_GRADLE"
          if [ "${{ env.USE_PROGUARD }}" = "true" ]; then
            sed -i 's/isMinifyEnabled = .*/isMinifyEnabled = true/' "$APP_GRADLE"
            sed -i 's/shrinkResources = .*/shrinkResources = true/' "$APP_GRADLE"
          fi
          echo "✅ Gradle configured"

      - name: Enable cleartext traffic
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q 'android:usesCleartextTraffic="true"' "$MANIFEST"; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "$MANIFEST"
          fi

      - name: Fix Kotlin
        run: |
          SETTINGS="android/settings.gradle.kts"
          if [ -f "$SETTINGS" ]; then
            sed -i 's/id "org.jetbrains.kotlin.android" version ".*"/id "org.jetbrains.kotlin.android" version "${{ env.KOTLIN_VERSION }}"/' "$SETTINGS"
          fi
          cat > android/gradle.properties <<EOF
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          EOF
          APP_GRADLE="android/app/build.gradle.kts"
          sed -i '/kotlin-stdlib/d' "$APP_GRADLE"
          sed -i "/dependencies {/a \    implementation(\"org.jetbrains.kotlin:kotlin-stdlib:${{ env.KOTLIN_VERSION }}\")" "$APP_GRADLE"
          if ! grep -q "kotlinOptions" "$APP_GRADLE"; then
            sed -i '/android {/a \    kotlinOptions {\n        jvmTarget = "${{ env.JAVA_VERSION }}"\n    }' "$APP_GRADLE"
          else
            sed -i 's/jvmTarget = .*/jvmTarget = "${{ env.JAVA_VERSION }}"/' "$APP_GRADLE"
          fi
          echo "✅ Kotlin fixed"

      - name: Build release APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-${{ env.PACKAGE_NAME }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk
