name: filter_app
description: A powerful filter application with full permission testing
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Core Features
  camera: ^0.11.2
  image_picker: ^1.1.2
  permission_handler: ^12.0.1
  webview_flutter: ^4.13.0
  image_filter_plus: ^0.0.1
  path_provider: ^2.1.5
  share_plus: ^10.1.0
  image: ^4.3.0
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  shared_preferences: ^2.3.5
  image_gallery_saver_plus: ^4.0.1
  
  # Test & Debug Features (For Permission Testing)
  device_info_plus: ^11.0.0
  connectivity_plus: ^6.0.0
  sensors_plus: ^6.0.0
  geolocator: ^13.0.0
  wifi_iot: ^0.4.0
  flutter_blue_plus: ^1.32.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
