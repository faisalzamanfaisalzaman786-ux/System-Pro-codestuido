name: filter_app
description: A professional filter application with camera, gallery, editing, and full permissions.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core
  camera: ^0.11.1
  image_picker: ^1.1.2
  permission_handler: ^12.0.1
  webview_flutter: ^4.13.0
  image_filter_plus: ^0.0.1
  gallery_saver: ^2.3.2          # تصاویر کو گیلری میں محفوظ کرنے کے لیے

  # Image & Video Processing
  image: ^4.3.0
  video_player: ^2.9.3
  file_picker: ^8.1.4

  # Utilities
  path_provider: ^2.1.5
  share_plus: ^10.1.0
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.2
  device_info_plus: ^11.2.1
  package_info_plus: ^8.1.2

  # UI & Animations
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # State Management
  provider: ^6.1.2
  flutter_bloc: ^8.1.6

  # Storage & Database
  shared_preferences: ^2.3.5
  sqflite: ^2.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Background & Notifications
  workmanager: ^0.5.2
  flutter_local_notifications: ^18.0.1

  # Sensors & Location
  geolocator: ^13.0.2
  sensors_plus: ^6.1.2

  # Bluetooth
  flutter_blue_plus: ^1.35.0

  # Audio
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/filters/
    - assets/animations/
