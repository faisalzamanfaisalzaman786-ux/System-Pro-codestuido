name: system_pro
description: "A professional camera app with video processing, screen sharing, and background services."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  camera: ^0.12.0+1
  image_picker: ^1.2.1
  video_player: ^2.11.1
  file_picker: ^10.3.10
  ffmpeg_kit_flutter_full_gpl: ^6.0.3
  dio: ^5.8.0+1
  flutter_webrtc: ^1.4.1
  livekit_client: ^2.7.0
  permission_handler: ^12.0.1
  device_info_plus: ^13.0.0
  path_provider: ^2.1.5
  # path: ^1.9.1  # ⚠️ اس لائن کو ڈیلیٹ یا کمنٹ کر دیں
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^21.0.0
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
