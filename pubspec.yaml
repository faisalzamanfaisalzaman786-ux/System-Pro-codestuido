name: system_pro
description: "A professional camera app with video processing, screen sharing, and background services."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  camera: ^0.11.3
  path_provider: ^2.1.5
  path: ^1.9.0
  image_picker: ^1.1.2
  video_player: ^2.9.3
  file_picker: ^8.1.7
  ffmpeg_kit_flutter_full_gpl: ^6.0.3
  flutter_webrtc: ^0.12.0
  livekit_client: ^2.3.0
  permission_handler: ^12.0.1
  flutter_background_service: ^5.0.1          # corrected
  flutter_background_service_android: ^5.0.1  # corrected
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.5.2
  device_info_plus: ^11.3.0
  shared_preferences: ^2.5.2
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
