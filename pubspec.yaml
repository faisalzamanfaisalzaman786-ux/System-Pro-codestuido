name: system_pro
description: "Professional camera & background service app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera & multimedia
  camera: ^0.10.6
  image_picker: ^1.2.1
  video_player: ^2.11.1
  file_picker: ^10.3.10
  ffmpeg_kit_flutter_full_gpl: ^6.0.3

  # Background services & notifications
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^17.2.3
  workmanager: ^0.5.2

  # Permissions & device info
  permission_handler: ^11.3.0
  device_info_plus: ^13.0.0

  # Storage & paths
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2

  # Networking & real‑time communication
  dio: ^5.8.0+1
  flutter_webrtc: ^1.4.1
  livekit_client: ^2.7.0

  # (path is NOT listed – SDK provides it)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
