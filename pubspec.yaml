name: system_pro_ultra
description: System Pro Ultra - Stable Complete Solution
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core & Essential
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  device_info_plus: ^11.3.0
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.0
  connectivity_plus: ^6.1.3
  flutter_native_splash: ^2.4.5
  flutter_launcher_icons: ^0.14.3

  # Networking & Data
  dio: ^5.8.0+1
  http: ^1.3.0
  web_socket_channel: ^3.0.2
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  hive_flutter: ^1.1.0
  hive_generator: ^2.0.1

  # Security & Cryptography
  flutter_secure_storage: ^9.2.4
  encrypt: ^5.0.3
  crypto: ^3.0.6
  local_auth: ^2.4.0

  # Media: Camera, Mic, Audio, Video
  camera: ^0.11.1+1
  image_picker: ^1.1.2
  record: ^6.2.0
  audio_service: ^0.18.15
  just_audio: ^0.10.0+1
  video_player: ^2.9.3
  chewie: ^1.10.0
  audioplayers: ^6.4.0

  # Hardware: Sensors, Bluetooth, NFC, WiFi
  sensors_plus: ^6.1.1
  flutter_blue_plus: ^2.2.1
  nfc_manager: ^3.4.0
  geolocator: ^13.0.2

  # UI/UX & Animations
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.3.1
  rive: ^0.13.24
  flutter_animate: ^4.5.2
  animations: ^2.0.11
  page_transition: ^2.2.1
  loading_animation_widget: ^1.3.0

  # Notifications
  flutter_local_notifications: ^21.0.0
  awesome_notifications: ^0.9.3+1

  # Background Services
  workmanager: ^0.6.0
  flutter_foreground_task: ^8.18.0

  # Downloads & Files
  flutter_download_manager: ^0.3.0
  file_picker: ^8.3.4
  archive: ^4.0.2

  # ML / AI
  google_ml_kit: ^0.20.0

  # Game Development
  flame: ^1.27.0
  flame_audio: ^2.11.0
  forge2d: ^0.14.1

  # Ads & Payments
  google_mobile_ads: ^8.0.0
  in_app_purchase: ^3.4.0

  # Printing
  printing: ^5.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.5.4
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
