name: system_pro
description: "A powerful, all-in-one Flutter app template"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ========== UI & State Management ==========
  flutter_riverpod: ^3.3.1          # Reactive state management
  go_router: ^17.1.0                # Declarative routing
  flutter_screenutil: ^5.9.3        # Responsive UI scaling

  # ========== Camera & Multimedia ==========
  camera: ^0.10.6                   # Camera control
  image_picker: ^1.2.1              # Pick images/videos from gallery
  video_player: ^2.11.1             # Video playback
  file_picker: ^10.3.10             # Pick any file
  ffmpeg_kit_flutter_full_gpl: ^6.0.3  # Video processing
  flutter_image_compress: ^2.4.0    # Image compression

  # ========== Background Services ==========
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^17.2.3
  workmanager: ^0.5.2

  # ========== Permissions & Device ==========
  permission_handler: ^11.3.0
  device_info_plus: ^13.0.0
  package_info_plus: ^8.3.0
  connectivity_plus: ^6.1.3

  # ========== Storage & Database ==========
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2
  hive_flutter: ^1.1.0              # NoSQL database
  isar_flutter_libs: ^3.1.0+1      # High performance DB (optional)

  # ========== Networking ==========
  dio: ^5.8.0+1                     # HTTP client
  retrofit: ^4.4.2                  # Type-safe Dio wrapper
  json_annotation: ^4.9.0
  web_socket_channel: ^3.0.2

  # ========== Real‑time Communication ==========
  flutter_webrtc: ^1.4.1
  livekit_client: ^2.7.0

  # ========== Utilities ==========
  url_launcher: ^6.3.1
  intl: ^0.19.0                     # Date formatting
  equatable: ^2.0.7                 # Value equality
  get_it: ^8.0.3                    # Service locator
  logger: ^2.5.0                    # Logging

  # ========== UI Helpers ==========
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
