name: system_pro
description: "A powerful, all-in-one Flutter app template optimized for Android 12+"
publish_to: 'none'
version: 1.0.0+1

environment:
  # اینڈرائیڈ 12 کے جدید پیکجز کے لیے یہ SDK ضروری ہے
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ========== UI & State Management ==========
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.0
  flutter_screenutil: ^5.9.3

  # ========== Camera & Multimedia (Android 12 Compatible) ==========
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  video_player: ^2.9.2
  file_picker: ^8.1.2
  ffmpeg_kit_flutter_full_gpl: ^6.0.3
  flutter_image_compress: ^2.3.0

  # ========== Background Services (Essential for Android 12+) ==========
  # اینڈرائیڈ 12 میں فور گراؤنڈ سروسز کے لیے ان کا اپ ڈیٹ ہونا لازمی ہے
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^17.2.3
  workmanager: ^0.5.2

  # ========== Permissions & Device ==========
  # اینڈرائیڈ 12 کے نئے Bluetooth اور Media permissions کے لیے یہ ورژنز ضروری ہیں
  permission_handler: ^11.3.1
  device_info_plus: ^11.1.0
  package_info_plus: ^8.1.1
  connectivity_plus: ^6.1.1

  # ========== Storage & Database ==========
  path_provider: ^2.1.4
  shared_preferences: ^2.3.3
  sqflite: ^2.3.3+1
  hive_flutter: ^1.1.0
  isar_flutter_libs: ^3.1.0+1

  # ========== Networking ==========
  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0
  web_socket_channel: ^3.0.1

  # ========== Real‑time Communication ==========
  # یہ ورژنز اینڈرائیڈ 12 کے نیٹ ورکنگ اسٹیک کے ساتھ بہترین کام کرتے ہیں
  flutter_webrtc: ^0.12.3
  livekit_client: ^2.12.1

  # ========== Utilities ==========
  url_launcher: ^6.3.1
  intl: ^0.19.0
  equatable: ^2.0.5
  get_it: ^8.0.0
  logger: ^2.5.0

  # ========== UI Helpers ==========
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.0
  hive_generator: ^2.0.1

# یہ اوور رائیڈز بلڈ کے دوران ورژن ٹکراؤ کو مکمل ختم کر دیں گی
dependency_overrides:
  path: 1.9.0
  meta: 1.15.0
  # اگر livekit میں webrtc کا مسئلہ آئے تو اسے یہاں سے فورس کریں
  flutter_webrtc: ^0.12.3

flutter:
  uses-material-design: true
