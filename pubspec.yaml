name: system_pro_app
description: "Universal Flutter template for all kinds of apps: UI, games, Firebase, social, maps, ads, etc."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.9
  lottie: ^3.1.0
  google_fonts: ^6.2.1

  # State Management (choose one)
  provider: ^6.1.2
  # get: ^4.6.6
  # bloc: ^8.1.4

  # Storage & Networking
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  http: ^1.2.0
  dio: ^5.4.0
  connectivity_plus: ^6.0.0

  # Permissions & Hardware
  permission_handler: ^11.3.0
  camera: ^0.10.5
  image_picker: ^1.0.7
  torch_light: ^1.1.0
  vibration: ^1.9.0
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  device_info_plus: ^10.1.0
  package_info_plus: ^6.0.0

  # Location & Maps
  geolocator: ^12.0.0
  google_maps_flutter: ^2.7.0
  geocoding: ^3.0.0

  # Firebase (Full Suite)
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0

  # Social & Authentication
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^5.0.0
  facebook_login: ^3.0.0

  # Ads
  google_mobile_ads: ^5.0.0

  # Games & Multimedia
  flame: ^1.17.0
  flame_audio: ^2.0.0
  audioplayers: ^6.0.0
  video_player: ^2.8.6

  # E-commerce / Payments
  stripe_android: ^6.0.0
  # flutter_paystack: ^1.0.0

  # Utilities
  intl: ^0.19.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_local_notifications: ^17.0.0
  webview_flutter: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Assets folders (create these in your project)
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  # Fonts (uncomment when needed)
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf

  flex_color_scheme:
    path: packages/flex_color_scheme
