name: system_pro_ultra
description: System Pro Ultra - The Complete Solution
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ============================================================
  # 1. بنیادی اور ضروری ڈیپنڈنسیز (Core & Essential)
  # ============================================================
  permission_handler: ^12.0.1      # رن ٹائم پرمیشنز (Android 13+ کے لیے اپڈیٹ شدہ)
  path_provider: ^2.1.5             # ڈیوائس کے فائل سسٹم تک رسائی
  device_info_plus: ^11.3.0         # ڈیوائس کی معلومات (OS ورژن, ماڈل وغیرہ)
  package_info_plus: ^8.3.0         # ایپ کے ورژن اور بلڈ نمبر کی معلومات
  url_launcher: ^6.3.1              # بیرونی لنکس کھولنے کے لیے
  share_plus: ^10.1.0               # مقامی شیئر ڈائیلاگ کے ذریعے مواد شیئر کرنا
  connectivity_plus: ^6.1.3         # انٹرنیٹ کنیکٹیویٹی چیک کرنا
  flutter_native_splash: ^2.4.5     # ایپ کے آغاز میں سپلیش اسکرین بنانا
  flutter_launcher_icons: ^0.14.3   # ایپ کا آئیکن بنانا

  # ============================================================
  # 2. نیٹ ورکنگ اور ڈیٹا فیچرز (Networking & Data)
  # ============================================================
  dio: ^5.8.0+1                     # HTTP کلائنٹ (انٹرسیپٹرز, درخواست منسوخی)
  http: ^1.3.0                      # بنیادی HTTP درخواستوں کے لیے
  web_socket_channel: ^3.0.2        # WebSockets کے ساتھ ریئل ٹائم کمیونیکیشن
  shared_preferences: ^2.5.3        # سادہ کی ویلیو ڈیٹا کو اسٹور کرنا
  sqflite: ^2.4.2                   # مقامی SQLite ڈیٹابیس
  hive_flutter: ^1.1.0              # تیز رفتار NoSQL ڈیٹابیس
  hive_generator: ^2.0.1            # Hive کے لیے کد جنریٹر
  isar_flutter_libs: ^4.0.0         # Isar ڈیٹابیس کے لیے مقامی لائبریریاں
  isar_generator: ^4.0.0            # Isar ڈیٹابیس کے لیے کد جنریٹر
  floor: ^1.5.0                     # sqflite کے لیے ORM (جس سے کام آسان ہو جاتا ہے)
  drift: ^2.26.0                    # رد عمل والی (reactive) SQLite ڈیٹابیس
  drift_flutter: ^2.26.0            # drift کے لیے Flutter انٹیگریشن

  # ============================================================
  # 3. حفاظت اور کرپٹوگرافی (Security & Cryptography)
  # ============================================================
  flutter_secure_storage: ^9.2.4    # حساس ڈیٹا کو محفوظ طریقے سے اسٹور کرنا
  encrypt: ^5.0.3                   # آسان AES انکرپشن
  crypto: ^3.0.6                    # ہیشنگ (SHA, MD5) اور دیگر کرپٹوگرافک افعال
  local_auth: ^2.4.0                # بائیو میٹرک تصدیق (فنگر پرنٹ, چہرہ)

  # ============================================================
  # 4. میڈیا: کیمرہ, مائکروفون, آڈیو, ویڈیو (Media: Camera, Mic, Audio, Video)
  # ============================================================
  camera: ^0.11.1+1                 # کیمرے تک رسائی (پریوو, تصاویر, ویڈیو)
  camerax: ^1.2.1                   # بہتر CameraX لائبریری کے ساتھ کیمرہ سپورٹ[reference:0]
  image_picker: ^1.1.2              # گیلری یا کیمرے سے میڈیا چننا
  record: ^6.2.0                    # مائکروفون سے آڈیو ریکارڈ کرنا[reference:1]
  audio_service: ^0.18.15           # پس منظر میں آڈیو چلانے کے لیے
  just_audio: ^0.10.0+1             # مختلف فارمیٹس کی آڈیو فائلیں چلانا
  video_player: ^2.9.3              # ویڈیو فائلیں چلانا (بنیادی)
  chewie: ^1.10.0                   # video_player کو بہتر کنٹرولز کے ساتھ لپیٹنا
  media_kit: ^1.1.0                 # جدید میڈیا پلیئر (ایک سے زیادہ فارمیٹس, کم میموری)[reference:2]
  flutter_f2f_sound: ^1.0.3         # طاقتور آڈیو پلے بیک اور ریکارڈنگ, سسٹم آڈیو کیپچر بھی[reference:3]
  audio_video_player: ^1.6.0        # آڈیو/ویڈیو پلے بیک اور ڈاؤن لوڈ[reference:4]
  flutter_sound: ^9.2.2             # آڈیو کو ریکارڈ اور چلانا
  flutter_sound_lite: ^9.2.2        # flutter_sound کا ہلکا ورژن

  # ============================================================
  # 5. ہارڈویئر تک رسائی: سینسرز, بلوٹوتھ, NFC, وائی فائی
  # 5. ہارڈویئر تک رسائی: سینسرز, بلوٹوتھ, این ایف سی, وائی فائی
  # ============================================================
  sensors_plus: ^6.1.1              # ایکسلرومیٹر, گائروسکوپ, میگنیٹومیٹر تک رسائی[reference:5]
  all_device_sensors: ^0.1.2        # تمام سینسرز (لائٹ, پریشر, سٹیپ کاؤنٹر)[reference:6]
  flutter_blue_plus: ^2.2.1         # بلوٹوتھ کم توانائی (BLE) ڈیوائسز کے ساتھ کام کرنا[reference:7]
  nfc_manager: ^3.4.0               # NFC ٹیگز کو پڑھنا اور لکھنا (iOS/Android)[reference:8]
  wifi_iot: ^0.3.19+2               # وائی فائی نیٹ ورکس اور ہاٹ سپاٹ کو کنٹرول کرنا[reference:9]
  geolocator: ^13.0.2               # جی پی ایس لوکیشن تک رسائی

  # ============================================================
  # 6. صارف انٹرفیس اور تجربہ (UI/UX & Animations)
  # ============================================================
  google_fonts: ^6.2.1              # اپنی مرضی کے فونٹ استعمال کرنا
  flutter_svg: ^2.0.10+1            # SVG امیجز کو رینڈر کرنا
  lottie: ^3.3.1                    # لیٹی اینیمیشنز (After Effects) چلانا[reference:10]
  rive: ^0.13.24                    # ریو (Rive) انٹرایکٹو اینیمیشنز چلانا[reference:11]
  flutter_animate: ^4.5.2           # یو آئی میں خوبصورت متحرک (mobile) اثرات شامل کرنا[reference:12]
  animations: ^2.0.11               # پہلے سے تیار کردہ, خوبصورت اینیمیشنز
  simple_animations: ^5.0.2         # پیچیدہ کسٹم متحرک مناظر بنانا[reference:13]
  page_transition: ^2.2.1           # اسکرینوں کے درمیان پرکشش منتقلی کے اثرات
  animated_flip_counter: ^0.3.0     # نمبروں کو پلٹنے والا اینیمیشن (جیسے ٹائمر)
  cool_alert: ^2.0.0                # خوبصورت اور کسٹم قابل الارٹ ڈائیلاگ
  flutter_staggered_animations: ^1.1.1   # لسٹوں میں ترتیب وار اینیمیشنز
  loading_animation_widget: ^1.3.0  # متنوع لوڈنگ اینیمیٹڈ وِیجٹس

  # ============================================================
  # 7. لوکل اور پش نوٹیفیکیشنز (Local & Push Notifications)
  # ============================================================
  flutter_local_notifications: ^21.0.0   # لوکل نوٹیفیکیشنز (شیڈول, بھرپور میڈیا)[reference:14]
  firebase_messaging: ^15.2.5           # FCM پش نوٹیفیکیشنز
  awesome_notifications: ^0.9.3+1       # بھرپور اور کسٹم قابل نوٹیفیکیشنز
  flutter_native_timezone: ^3.0.0       # درست ٹائم زون معلوم کرنا (نوٹیفکیشن شیڈول کے لیے)

  # ============================================================
  # 8. پس منظر میں کام (Background Services)
  # ============================================================
  workmanager: ^0.6.0               # پس منظر میں کاموں کو شیڈول کرنا (متواتر, ایک بار)[reference:15]
  flutter_foreground_task: ^8.18.0  # فورگراؤنڈ سروس شروع کرنا (ایسے کام جو طویل عرصے تک چلتے ہیں)
  flutter_lifecycle_guard: ^1.0.0-dev.1  # OEM بیٹری سیور سے بچنے کے لیے بیک گراؤنڈ ایگزیکیوشن[reference:16]

  # ============================================================
  # 9. ڈاؤن لوڈ اور فائلیں (Downloads & Files)
  # ============================================================
  flutter_download_manager: ^0.3.0       # ریزیم ایبل, متوازی اور بیچ ڈاؤن لوڈ[reference:17]
  resumable_downloader: ^0.0.36         # ڈاؤن لوڈ کو روکنے اور پھر سے شروع کرنے کی اہلیت[reference:18]
  file_picker: ^8.3.4                   # مقامی اسٹوریج سے فائلیں چننا
  archive: ^4.0.2                      # فائلوں کو (un)zip کرنا

  # ============================================================
  # 10. مشین لرننگ (Machine Learning / AI)
  # ============================================================
  tflite_flutter: ^0.11.0          # TensorFlow Lite ماڈلز (تشخیص: inference) چلانا[reference:19]
  google_ml_kit: ^0.20.0           # Google کی ایم ایل کٹ (متن کی پہچان, چہرے کا پتہ لگانا, بر کوڈ سکین)[reference:20]

  # ============================================================
  # 11. گیم ڈویلپمنٹ (Game Development)
  # ============================================================
  flame: ^1.27.0                   # 2D گیمز بنانے کے لیے مکمل انجن[reference:21]
  flame_audio: ^2.11.0             # فلیم گیمز میں آڈیو شامل کرنا
  forge2d: ^0.14.1                 # فلیم گیمز میں فزکس (طبیعیات) شامل کرنے کے لیے
  audioplayers: ^6.4.0             # کھیل میں (games) متعدد آوازیں بیک وقت چلانا

  # ============================================================
  # 12. اشتہارات اور ادائیگیاں (Ads & Payments)
  # ============================================================
  google_mobile_ads: ^8.0.0        # Google AdMob اشتہارات شامل کرنا (بینر, انٹراسٹیشل, ریوارڈڈ)[reference:22]
  facebook_audience_network: ^1.3.0  # فیس بک کے اشتہارات (میڈییشن کے ذریعے)
  unity_ads: ^3.1.0                 # یونٹی کے اشتہارات (میڈییشن کے ذریعے)
  in_app_purchase: ^3.4.0          # گوگل پلے اور ایپ اسٹور کے ذریعے ایپ میں خریداریاں[reference:23]

  # ============================================================
  # 13. پرنٹنگ اور دستاویزات (Printing & Documents)
  # ============================================================
  printing: ^5.14.2                # پی ڈی ایف دستاویزات اور امیجز کو پرنٹ کرنا
  quick_print: ^6.3.3              # مختلف قسم کے پرنٹرز کے لیے پرنٹنگ (USB, بلوٹوتھ, ESC/POS, سنمی)[reference:24]
  pdf: ^3.14.0                     # پروگرام کے ذریعے پی ڈی ایف فائلیں بنانا
  hamreen_printing: ^6.3.4         # تمام پلیٹ فارمز پر پرنٹنگ[reference:25]

  # ============================================================
  # 14. اسکرین شاٹ اور اسکرین ریکارڈنگ (Screenshots & Screen Recording)
  # ============================================================
  screenshot_callback: ^1.0.1      # اسکرین شاٹ لینے کا پتہ لگانے اور کال بیک پر عمل کرنے کے لیے[reference:26]
  screen_recording: ^1.1.0         # اسکرین ریکارڈنگ شروع کرنا اور روکنا

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.5.4             # ڈیٹا بیس کے لیے کد جنریشن (drift, hive, floor)
  flutter_lints: ^6.0.0            # کوڈ کے معیار (Linting) کے لیے
