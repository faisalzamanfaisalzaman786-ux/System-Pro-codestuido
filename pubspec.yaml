name: filter_app
description: A professional filter application with camera, gallery, and webview.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Core functionality
  camera: ^0.11.1
  image_picker: ^1.1.2
  permission_handler: ^12.0.1
  webview_flutter: ^4.13.0
  path_provider: ^2.1.5
  share_plus: ^10.1.0
  image: ^4.3.0
  flutter_image_filters: ^0.6.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  shimmer: ^3.0.0

  # State management
  provider: ^6.1.2

  # Storage & preferences
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  # Assets (optional directories)
  assets:
    - assets/images/
    - assets/icons/
    - assets/filters/
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#1E1E2E"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
